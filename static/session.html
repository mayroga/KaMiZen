<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | SESSION PRO</title>

<style>
:root{
    --neon:#00f2ff;
    --bg:#000;
    --panel:rgba(0,15,30,0.92);
    --good:#00ff88;
    --bad:#ff3355;
}

body{
    margin:0;
    background:var(--bg);
    font-family:Arial;
    color:var(--neon);
    overflow:hidden;
}

#app{
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:15px;
    padding:20px;
    box-sizing:border-box;
    position:relative;
}

/* TOP */
#topbar{
    position:absolute;
    top:10px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 10px;
}

.small-btn{
    font-size:12px;
    padding:6px 10px;
}

/* CIRCLE */
#circle{
    width:90px;
    height:90px;
    border-radius:50%;
    background:rgba(0,242,255,0.2);
    box-shadow:0 0 25px var(--neon);
    transition:all 2s ease;
}

/* MESSAGE */
#message{
    width:90%;
    max-width:750px;
    min-height:140px;
    padding:18px;
    background:var(--panel);
    border:1px solid var(--neon);
    text-align:center;
    font-size:18px;
}

/* OPTIONS */
#options{
    width:90%;
    max-width:750px;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
}

button{
    padding:14px;
    border:1px solid var(--neon);
    background:transparent;
    color:var(--neon);
    cursor:pointer;
}

button:hover{
    background:var(--neon);
    color:#000;
}

/* NAV */
#nav{
    width:90%;
    max-width:750px;
    display:flex;
    gap:10px;
}

.navbtn{
    flex:1;
}

/* TIMER */
#timer{
    font-size:14px;
    opacity:0.7;
}

/* FEEDBACK */
#overlay{
    position:absolute;
    top:0;
    width:100%;
    height:100%;
    display:none;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:bold;
}

.good{background:rgba(0,255,136,0.2);}
.bad{background:rgba(255,51,85,0.2);}
</style>
</head>

<body>

<div id="app">

    <div id="topbar">
        <button class="small-btn" onclick="toggleLang()">ES/EN</button>
        <button class="small-btn" onclick="restart()">RESTART</button>
    </div>

    <div id="overlay"></div>

    <div id="circle"></div>

    <div id="message">TOUCH TO START</div>

    <div id="timer"></div>

    <div id="options"></div>

    <div id="nav">
        <button class="navbtn" onclick="back()">BACK</button>
        <button class="navbtn" onclick="continueFlow()">CONTINUE</button>
        <button class="navbtn" onclick="skip()">SKIP</button>
    </div>

</div>

<script>

let session_id = null;
let lang = "en";
let currentBlock = null;
let history = [];

let timerInterval = null;
let breathInterval = null;

/* AUDIO */
const audio = new (window.AudioContext || window.webkitAudioContext)();

function sound(type){
    const o = audio.createOscillator();
    const g = audio.createGain();
    o.connect(g);
    g.connect(audio.destination);

    o.frequency.value = (type==="ok") ? 500 : (type==="bad") ? 120 : 300;

    g.gain.value = 0.2;
    o.start();
    o.stop(audio.currentTime+0.2);
}

/* START */
async function start(){
    if(audio.state==="suspended") await audio.resume();

    const res = await fetch("/start",{method:"POST"});
    const data = await res.json();

    session_id = data.session_id;
    history = [];

    render(data.story);
}

/* SEND */
async function send(decision){

    sound("click");

    const res = await fetch("/judge",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({session_id, decision})
    });

    const data = await res.json();

    if(data.feedback){
        showFeedback(data.feedback);
    }

    if(data.story){
        history.push(currentBlock);
        render(data.story);
    }
}

/* RENDER */
function render(block){

    clearTimers();

    currentBlock = block;

    const msg = document.getElementById("message");
    const opts = document.getElementById("options");

    opts.innerHTML="";

    msg.innerText =
        block.text?.[lang] ||
        block.analysis?.[lang] ||
        block.question?.[lang] ||
        "...";

    /* OPTIONS */
    if(block.options){
        block.options.forEach(o=>{
            const b=document.createElement("button");
            b.innerText=o.text?.[lang] || o.text?.en;
            b.onclick=()=>send(o.code);
            opts.appendChild(b);
        });
    }

    /* BREATH */
    if(block.type==="breath_focus" || block.type==="breathing"){
        startBreath(block.duration_sec);
    }

    /* SILENCE / TIMER */
    if(block.duration_sec){
        startTimer(block.duration_sec);
    }
}

/* TIMER REAL */
function startTimer(seconds){

    const t = document.getElementById("timer");
    let time = seconds;

    t.innerText = time + "s";

    timerInterval = setInterval(()=>{
        time--;
        t.innerText = time + "s";

        if(time<=0){
            clearInterval(timerInterval);
        }

    },1000);
}

/* BREATH REAL */
function startBreath(duration){

    const c = document.getElementById("circle");

    let grow = true;

    breathInterval = setInterval(()=>{
        c.style.transform = grow ? "scale(2)" : "scale(1)";
        c.style.opacity = grow ? "0.8" : "0.3";
        grow = !grow;
    },2000);

}

/* CLEAR */
function clearTimers(){
    clearInterval(timerInterval);
    clearInterval(breathInterval);
}

/* CONTROLES */
function continueFlow(){
    send("NEXT");
}

function skip(){
    send("SKIP");
}

function back(){
    if(history.length===0) return;
    render(history.pop());
}

function restart(){
    location.reload();
}

function toggleLang(){
    lang = (lang==="en") ? "es" : "en";
    if(currentBlock) render(currentBlock);
}

/* FEEDBACK */
function showFeedback(fb){

    const overlay=document.getElementById("overlay");

    overlay.style.display="flex";

    if(fb.correct){
        overlay.className="good";
        overlay.innerText = fb.reason?.[lang] || "GOOD";
        sound("ok");
    } else {
        overlay.className="bad";
        overlay.innerText = fb.reason?.[lang] || "WRONG";
        sound("bad");
    }

    setTimeout(()=>{
        overlay.style.display="none";
    },1200);
}

/* START CLICK */
document.getElementById("message").onclick = start;

</script>

</body>
</html>
