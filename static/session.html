<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAYKAMI | Life Session</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Fondo Dinámico con Zoom */
        #bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-slide {
            position: absolute;
            width: 110%; height: 110%;
            top: -5%; left: -5%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            animation: slowZoom 20s infinite alternate linear;
        }

        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        #app {
            position: relative;
            z-index: 10;
            width: 90%; max-width: 450px;
            margin: 5vh auto;
            background: rgba(15, 23, 32, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(0, 242, 255, 0.3);
        }

        #lang-toggle {
            position: absolute;
            top: 15px; right: 15px;
            padding: 5px 10px;
            background: #00f2ff;
            color: #000;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }

        #breath-circle {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 4px solid #00f2ff;
            margin: 20px auto;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 242, 255, 0.1);
        }

        #breath-instruction {
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .breathing-in { animation: expand 4s forwards linear; }
        .breathing-out { animation: contract 4s forwards linear; }

        @keyframes expand { from { transform: scale(0.8); } to { transform: scale(1.3); } }
        @keyframes contract { from { transform: scale(1.3); } to { transform: scale(0.8); } }
    </style>
</head>
<body>

<div id="bg-container"></div>

<div id="app">
    <div id="lang-toggle" onclick="toggleLanguage()">EN / ES</div>
    <h1 id="title">MAYKAMI</h1>

    <div id="setup">
        <input id="age" type="number" placeholder="Age / Edad">
        <select id="state">
            <option value="estres" data-en="Stress" data-es="Estrés">Stress / Estrés</option>
            <option value="soledad" data-en="Loneliness" data-es="Soledad">Loneliness / Soledad</option>
            <option value="perdida" data-en="Loss" data-es="Pérdida">Loss / Pérdida</option>
        </select>
        <button onclick="start()" id="start-btn">START</button>
    </div>

    <div id="game" style="display:none;">
        <div id="text-content"></div>
        <div id="breath-circle">
            <div id="breath-instruction"></div>
            <div id="timer">4</div>
        </div>
        <div id="options"></div>
    </div>
</div>

<audio id="bg-music" loop>
    <source src="https://www.chosic.com/wp-content/uploads/2021/04/Rain-And-Thunder-Nature-Sounds.mp3" type="audio/mpeg">
</audio>

<script src="/static/scripts.js"></script>
</body>
</html>
