<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | SESSION PRO NEURO</title>

<style>
body{
 margin:0;
 background:#000;
 color:#fff;
 font-family:Arial, sans-serif;
 overflow:hidden;
}

#game{
 position:relative;
 width:100vw;
 height:100vh;
}

.floating{
 position:absolute;
 font-size:14px;
 opacity:0.2;
 animation:float 6s infinite linear;
}

@keyframes float{
 from{transform:translateY(100vh);}
 to{transform:translateY(-10vh);}
}

#ui{
 position:absolute;
 top:10px;
 left:10px;
 z-index:10;
}

button{
 margin:5px;
 padding:10px;
 border:none;
 cursor:pointer;
}

.good{background:green; color:white;}
.bad{background:red; color:white;}

#silence{
 position:absolute;
 bottom:10px;
 left:10px;
 font-size:12px;
 opacity:0.8;
}

#silenceOverlay{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,0.85);
 display:none;
 align-items:center;
 justify-content:center;
 flex-direction:column;
 z-index:999;
 text-align:center;
}

#silenceOverlay h1{
 font-size:22px;
 margin-bottom:10px;
}

#silenceOverlay p{
 max-width:600px;
 opacity:0.8;
}
</style>
</head>

<body>

<div id="game"></div>

<div id="ui">
 <button onclick="startMission()">START</button>
 <button onclick="toggleLang()">EN/ES</button>
</div>

<div id="silence">Silence system inactive</div>

<div id="silenceOverlay">
 <h1>NEURO SILENCE MODE</h1>
 <p id="silenceText">Preparing...</p>
</div>

<script>
let currentLevel = 1;
let silenceActive = false;
let silenceTime = 0;
let silenceTimer;
let lastInteraction = Date.now();

function getSilenceTime(level){
 if(level<=7) return 180;
 if(level<=14) return 360;
 if(level<=21) return 600;
 if(level<=28) return 900;
 return 1200;
}

function getBreathInterval(level){
 if(level<=7) return 60000;
 if(level<=14) return 50000;
 if(level<=21) return 40000;
 if(level<=28) return 30000;
 return 25000;
}

function startSilence(level){
 silenceTime = getSilenceTime(level);
 silenceActive = true;
 document.getElementById("silence").innerText = "Silence: " + silenceTime + "s";

 document.getElementById("silenceOverlay").style.display = "flex";
 document.getElementById("silenceText").innerText = "Stay still. Control attention. Breathe.";

 let breathInterval = getBreathInterval(level);

 silenceTimer = setInterval(()=>{
  silenceTime--;
  document.getElementById("silence").innerText = "Silence: " + silenceTime + "s";

  if(silenceTime % Math.floor(breathInterval/1000) === 0){
    playBreathCue(level);
  }

  if(silenceTime <= 0){
    clearInterval(silenceTimer);
    silenceActive = false;
    document.getElementById("silence").innerText = "Silence complete";
    rewardPlayer();
    document.getElementById("silenceOverlay").style.display = "none";
  }
 },1000);
}

function playBreathCue(level){
 console.log("BREATH FLOW LEVEL " + level + ": IN... HOLD... OUT...");
 if(navigator.vibrate) navigator.vibrate(200);
}

function rewardPlayer(){
 document.body.style.background = "#003300";
 setTimeout(()=>document.body.style.background="#000",2000);
}

function penalty(intensity=1){
 document.body.style.background = "#330000";
 setTimeout(()=>document.body.style.background="#000",1500 + intensity*500);
}

function startMission(){
 startSilence(currentLevel);
}

// =========================
// NEURO-REACTIVE SYSTEM
// =========================

function triggerViolation(type="interaction"){
 if(!silenceActive) return;

 lastInteraction = Date.now();

 penalty(currentLevel);

 document.getElementById("silenceText").innerText = "Violation detected: " + type;

 if(silenceTimer){
  clearInterval(silenceTimer);
  silenceActive = false;
 }
}

window.addEventListener("keydown", ()=>triggerViolation("keyboard"));
window.addEventListener("mousemove", ()=>triggerViolation("mouse"));
window.addEventListener("touchstart", ()=>triggerViolation("touch"));
window.addEventListener("scroll", ()=>triggerViolation("scroll"));

document.addEventListener("visibilitychange", ()=>{
 if(document.hidden) triggerViolation("tab switch");
});

// anti-idle detection
setInterval(()=>{
 if(silenceActive && Date.now() - lastInteraction > 15000){
  triggerViolation("idle break");
 }
},5000);

</script>

</body>
</html>
