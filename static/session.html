<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAMIZEN | SESSION CORE</title>

<style>
:root{
    --bg:#000;
    --neon:#00f2ff;
    --green:#00ff66;
    --red:#ff0033;
    --panel:rgba(0,10,25,0.92);
    --yellow:#ffcc00;
}

body{
    margin:0;
    background:var(--bg);
    font-family:Arial;
    overflow:hidden;
    color:var(--neon);
}

/* =========================
   MAIN LAYOUT
========================= */
#app{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* =========================
   BREATH CIRCLE
========================= */
#circle{
    width:90px;
    height:90px;
    border-radius:50%;
    background:rgba(0,242,255,0.2);
    box-shadow:0 0 30px var(--neon);
    transition:2.5s ease-in-out;
    position:absolute;
    top:25%;
}

/* =========================
   MESSAGE BOX
========================= */
#message{
    position:absolute;
    bottom:190px;
    width:85%;
    max-width:720px;
    padding:18px;
    background:var(--panel);
    border:1px solid var(--neon);
    text-align:center;
    min-height:120px;
    font-size:18px;
}

/* =========================
   OPTIONS
========================= */
#options{
    position:absolute;
    bottom:70px;
    width:85%;
    max-width:720px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

button{
    padding:14px;
    border:1px solid var(--neon);
    background:transparent;
    color:var(--neon);
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:var(--neon);
    color:black;
}

/* =========================
   CONTROLS
========================= */
#controls{
    position:absolute;
    top:10px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 10px;
}

.ctrl{
    font-size:12px;
    padding:6px 10px;
}

/* =========================
   XP BAR
========================= */
#xp{
    position:absolute;
    top:50px;
    width:80%;
    height:8px;
    border:1px solid var(--neon);
}

#xpFill{
    height:100%;
    width:0%;
    background:var(--green);
}

/* =========================
   COACH
========================= */
#coach{
    position:absolute;
    bottom:140px;
    font-size:14px;
    opacity:0.8;
    text-align:center;
    width:80%;
}

/* =========================
   FULL SCREEN SIGNAL
========================= */
#signal{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:40px;
    font-weight:bold;
    z-index:999;
}

.green{
    background:var(--green);
    color:black;
}

.red{
    background:var(--red);
    color:white;
}
</style>
</head>

<body>

<div id="app">

    <div id="controls">
        <button class="ctrl" onclick="restart()">RESTART</button>
        <button class="ctrl" onclick="back()">BACK</button>
        <button class="ctrl" onclick="skip()">SKIP</button>
    </div>

    <div id="xp"><div id="xpFill"></div></div>

    <div id="circle"></div>

    <div id="coach"></div>

    <div id="message" onclick="start()">TOUCH TO START</div>

    <div id="options"></div>

    <div id="signal"></div>

</div>

<script>

let session_id=null;
let lang="en";
let loading=false;
let lastStory=null;
let audioCtx=new (window.AudioContext||window.webkitAudioContext)();

/* =========================
   AUDIO (EVENT ONLY)
========================= */
function sound(type){
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();

    o.connect(g);
    g.connect(audioCtx.destination);

    if(type==="ok") o.frequency.value=520;
    if(type==="bad") o.frequency.value=120;
    if(type==="click") o.frequency.value=300;

    g.gain.value=0.15;
    o.start();
    o.stop(audioCtx.currentTime+0.2);
}

/* =========================
   START
========================= */
async function start(){

    if(audioCtx.state==="suspended") await audioCtx.resume();

    const r=await fetch("/start",{method:"POST"});
    const d=await r.json();

    session_id=d.session_id;

    render(d);
}

/* =========================
   SEND
========================= */
async function send(decision){

    if(loading) return;
    loading=true;

    sound("click");

    const r=await fetch("/judge",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            session_id,
            decision
        })
    });

    const d=await r.json();

    render(d);

    loading=false;
}

/* =========================
   RENDER CORE
========================= */
function render(d){

    if(!d || !d.story) return;

    lastStory=d.story;

    const story=d.story;

    // TEXT SAFE
    let text="";

    if(story.text){
        text = story.text.en || story.text.es || "";
    }

    document.getElementById("message").innerText=text;

    // COACH
    document.getElementById("coach").innerText=d.coach || "";

    // XP BAR
    if(d.xp!==undefined){
        document.getElementById("xpFill").style.width=(d.xp%100)+"%";
    }

    // OPTIONS RESET
    const opt=document.getElementById("options");
    opt.innerHTML="";

    let options=story.options || [];

    if(options.length===0){
        options=[{code:"CONTINUE",text:{en:"CONTINUE",es:"CONTINUE"}}];
    }

    options.forEach(o=>{
        const b=document.createElement("button");
        b.innerText=o.text?.[lang]||o.code;
        b.onclick=()=>send(o.code);
        opt.appendChild(b);
    });

    // =========================
    // SEMAFORO FULL SCREEN
    // =========================
    const signal=document.getElementById("signal");

    if(d.signal==="green"){
        signal.className="green";
        signal.innerText="CORRECT";
        signal.style.display="flex";

        setTimeout(()=>{
            signal.style.display="none";
        },900);

    }else if(d.signal==="red"){
        signal.className="red";
        signal.innerText="INCORRECT";
        signal.style.display="flex";

        setTimeout(()=>{
            signal.style.display="none";
        },1200);
    }

    sound("ok");
}

/* =========================
   BREATH VISUAL
========================= */
setInterval(()=>{
    const c=document.getElementById("circle");
    c.style.transform="scale("+(1+Math.random()*1.2)+")";
    c.style.opacity=0.4+Math.random()*0.4;
},2500);

/* =========================
   CONTROLS
========================= */
function skip(){
    send("CONTINUE");
}

function back(){
    location.reload();
}

function restart(){
    location.reload();
}

</script>

</body>
</html>
