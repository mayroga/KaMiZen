<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | AL CIELO PRO</title>

<style>
body{
    margin:0;
    background: radial-gradient(circle,#001a33,#000);
    color:#fff;
    font-family:'Segoe UI',Arial;
    text-align:center;
    overflow:hidden;
    cursor:crosshair;
}

#topbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:rgba(0,0,0,0.3);
    z-index:100;
}

#game{ padding-top:80px; }

button{
    padding:12px 20px;
    border:2px solid #00f2ff;
    background:rgba(0,242,255,0.1);
    color:white;
    border-radius:10px;
    cursor:pointer;
}

#score-display{
    font-weight:bold;
    font-size:18px;
    color:#00f2ff;
}

.floating{
    position:absolute;
    padding:10px 18px;
    border-radius:25px;
    font-weight:bold;
    cursor:pointer;
    animation:floatUp linear forwards;
    user-select:none;
}

/* PODER */
.word-power{
    color:#00ffcc;
    border:2px solid #00ffcc;
    box-shadow:0 0 20px #00ffcc;
}

/* HUMO */
.word-smoke{
    color:#aaa;
    border:2px solid #666;
    opacity:0.7;
}

/* TRAMPA */
.word-trap{
    color:#ff9900;
    border:2px solid #ff9900;
    box-shadow:0 0 20px #ff9900;
}

@keyframes floatUp{
    from{transform:translateY(110vh);}
    to{transform:translateY(-20vh);}
}

.blast{
    transform:scale(3);
    opacity:0;
    transition:0.3s;
}

#breath{
    width:100px;
    height:100px;
    border-radius:50%;
    background:#00f2ff;
    margin:20px auto;
    display:none;
}

.flash-red{
    background:#330000 !important;
}
</style>
</head>

<body>

<div id="topbar">
<button onclick="toggleLang()">EN/ES</button>
<div id="score-display">POINTS: 0</div>
</div>

<div id="game">
<h2 id="hero-name"></h2>
<div id="breath"></div>
<div id="story">LOADING...</div>
<div id="analysis"></div>
<div id="options"></div>
</div>

<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="ok" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

<script>

// ==============================
// STATE
// ==============================
const state={
    score:0,
    lang:"en",
    silence:false,
    silenceTime:20
};

// ==============================
// AUDIO
// ==============================
const AudioSystem={
    bg:null,ok:null,bad:null,
    init(){
        this.bg=document.getElementById("bg");
        this.ok=document.getElementById("ok");
        this.bad=document.getElementById("bad");
        this.bg.volume=0.3;
        this.bg.play().catch(()=>{});
    },
    win(){this.ok.currentTime=0;this.ok.play();},
    bad(){
        this.bad.currentTime=0;
        this.bad.play();
        document.body.classList.add("flash-red");
        setTimeout(()=>document.body.classList.remove("flash-red"),200);
    }
};

// ==============================
// SPEECH (QUEUE REAL)
// ==============================
const Speech={
    q:[],busy:false,
    say(t){
        this.q.push(t);
        this.run();
    },
    run(){
        if(this.busy||!this.q.length)return;
        this.busy=true;
        const u=new SpeechSynthesisUtterance(this.q.shift());
        u.lang=state.lang==="en"?"en-US":"es-ES";
        u.onend=()=>{this.busy=false;this.run();};
        speechSynthesis.speak(u);
    }
};

// ==============================
// PSYCHOLOGY SYSTEM
// ==============================
const Psychology={

// PODER
CRITERIO:"You control your decisions. You become a leader.",
ESTRATEGIA:"You read people and build strong alliances.",
SABIDURIA:"Money becomes freedom, not stress.",
VALENTIA:"You act even with fear.",
LEALTAD:"Your family is your base.",
CALMA:"Breathing gives you control.",

// HUMO
APROBACION:"You lose yourself trying to please everyone.",
IMPULSO:"Weak mind, instant reward trap.",
EGO:"Fear of opinions kills dreams.",
VICTIMA:"No responsibility = no power.",
GASTO:"You become slave of money.",

// MODERN
TELEFONO:"The phone can control your life.",
PANTALLA:"Screens can trap your mind.",
DISTRACCION:"Noise kills focus."

};

// ==============================
// FLOATING SYSTEM (MEJORADO)
// ==============================
const Floating={

spawn(){

if(state.silence) return;

const r=Math.random();
let type,words,val,speed;

if(r>0.8){
    type="word-trap";
    words=["TELEFONO","PANTALLA","DISTRACCION"];
    val=-20;
    speed=2000;
}
else if(r>0.4){
    type="word-power";
    words=["CRITERIO","ESTRATEGIA","SABIDURIA","VALENTIA","CALMA"];
    val=20;
    speed=3000;
}
else{
    type="word-smoke";
    words=["APROBACION","IMPULSO","EGO","VICTIMA","GASTO"];
    val=-10;
    speed=5000;
}

const word=words[Math.floor(Math.random()*words.length)];

const el=document.createElement("div");
el.className="floating "+type;
el.innerText=word;
el.style.left=Math.random()*90+"vw";
el.style.animationDuration=speed+"ms";

el.onclick=()=>{

el.classList.add("blast");

state.score+=val;
updateScore();

if(val>0){
    AudioSystem.win();
    Speech.say("Power up! "+(Psychology[word]||"Good"));
}else{
    AudioSystem.bad();
    Speech.say("Warning! "+(Psychology[word]||"Bad choice"));
}

setTimeout(()=>el.remove(),300);
};

document.body.appendChild(el);

setTimeout(()=>{if(el)el.remove();},speed);
},

start(){
setInterval(()=>this.spawn(),1800);
}

};

// ==============================
// SILENCE SYSTEM
// ==============================
function startSilence(){

state.silence=true;
document.getElementById("breath").style.display="block";

Speech.say("Silence challenge. Control your mind.");

let t=state.silenceTime;

const timer=setInterval(()=>{
t--;
if(t<=0){
clearInterval(timer);
endSilence();
}
},1000);
}

function endSilence(){

state.silence=false;
document.getElementById("breath").style.display="none";

state.score+=50;
updateScore();

Speech.say("You mastered silence. Focus increased.");

}

// ==============================
// UI
// ==============================
function updateScore(){
document.getElementById("score-display").innerText="POINTS: "+state.score;
}

// ==============================
// INIT
// ==============================
function init(){

document.getElementById("hero-name").innerText="KAMIZEN PLAYER";

AudioSystem.init();
Floating.start();

// activar reto cada cierto tiempo
setInterval(()=>{
startSilence();
},30000);

}

function toggleLang(){
state.lang=state.lang==="en"?"es":"en";
}

window.onload=init;

</script>
</body>
</html>
