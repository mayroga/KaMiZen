<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN SESSION</title>

<style>
:root{
    --bg:#000;
    --neon:#00f2ff;
    --text:#fff;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:Arial, sans-serif;
    overflow:hidden;
}

/* HUD */
#hud{
    position:fixed;
    top:10px;
    left:10px;
    right:10px;
    display:flex;
    justify-content:space-between;
    z-index:1000;
    font-size:14px;
}

.hud-box{
    border:1px solid var(--neon);
    padding:8px 12px;
    border-radius:10px;
}

/* MAIN */
#container{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    padding:20px;
}

/* TEXT */
#story, #analysis{
    max-width:600px;
    margin-bottom:20px;
}

/* BUTTONS */
button{
    background:none;
    border:1px solid var(--neon);
    color:var(--text);
    padding:10px 15px;
    margin:5px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:var(--neon);
    color:#000;
}

/* OPTIONS */
#options{
    display:flex;
    flex-direction:column;
    gap:10px;
    width:100%;
    max-width:400px;
}

/* START SCREEN */
#startScreen{
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#000;
    z-index:2000;
}

/* FLOAT WORDS */
.floating{
    position:absolute;
    opacity:0.1;
    font-size:18px;
    animation:float 10s linear infinite;
}

@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-100vh);}
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
    <h1>KAMIZEN</h1>
    <button onclick="startGame()">START</button>
</div>

<!-- HUD -->
<div id="hud">
    <div class="hud-box">Points: <span id="points">0</span></div>
    <div class="hud-box">Focus: <span id="focus">100</span></div>
    <div class="hud-box">Energy: <span id="energy">100</span></div>
</div>

<!-- MAIN -->
<div id="container">

    <div id="story"></div>
    <div id="analysis"></div>

    <div id="options"></div>

    <div>
        <button onclick="prevMission()">BACK</button>
        <button onclick="nextMission()">CONTINUE</button>
        <button onclick="resetGame()">RESTART</button>
    </div>

</div>

<script>
let missions = [];
let current = 0;

let state = {
    points:0,
    focus:100,
    energy:100
};

/* SAFE LOAD */
async function loadMissions(){
    try{
        const res1 = await fetch("missions_08_14.json");
        const res2 = await fetch("missions_15_21.json");

        const data1 = await res1.json();
        const data2 = await res2.json();

        missions = [...data1.missions, ...data2.missions];

    }catch(e){
        console.error("Load error:", e);
    }
}

/* START */
async function startGame(){
    document.getElementById("startScreen").style.display="none";
    await loadMissions();
    render();
}

/* RENDER */
function render(){
    if(!missions.length) return;

    const m = missions[current];

    const storyBlock = m.blocks.find(b=>b.type==="story");
    const analysisBlock = m.blocks.find(b=>b.type==="analysis");
    const decisionBlock = m.blocks.find(b=>b.type==="decision");

    document.getElementById("story").innerText = storyBlock.text.en;
    document.getElementById("analysis").innerText = analysisBlock.text.en;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML="";

    decisionBlock.options.forEach(opt=>{
        const btn = document.createElement("button");
        btn.innerText = opt.text.en;

        btn.onclick = ()=>{
            applyResult(opt.correct);
        };

        optionsDiv.appendChild(btn);
    });

    updateHUD();
}

/* RESULT */
function applyResult(result){
    if(result === true){
        state.points += 10;
        state.focus += 2;
        state.energy += 2;
    }else if(result === "partial"){
        state.points += 5;
    }else{
        state.focus -= 5;
        state.energy -= 5;
    }

    clampStats();
    updateHUD();
}

/* LIMITS */
function clampStats(){
    state.focus = Math.max(0, Math.min(100, state.focus));
    state.energy = Math.max(0, Math.min(100, state.energy));
}

/* HUD */
function updateHUD(){
    document.getElementById("points").innerText = state.points;
    document.getElementById("focus").innerText = state.focus;
    document.getElementById("energy").innerText = state.energy;
}

/* NAV */
function nextMission(){
    if(current < missions.length-1){
        current++;
        render();
    }
}

function prevMission(){
    if(current > 0){
        current--;
        render();
    }
}

/* RESET */
function resetGame(){
    current = 0;
    state = {points:0, focus:100, energy:100};
    render();
}

/* FLOAT WORDS (NO FREEZE SAFE) */
function spawnWords(){
    const words = ["FOCUS","CONTROL","CALM","TRUTH","PAUSE"];
    setInterval(()=>{
        const w = document.createElement("div");
        w.className="floating";
        w.innerText = words[Math.floor(Math.random()*words.length)];
        w.style.left = Math.random()*100+"vw";
        document.body.appendChild(w);

        setTimeout(()=>w.remove(),10000);
    },2000);
}

spawnWords();

</script>

</body>
</html>
