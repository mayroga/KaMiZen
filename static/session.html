<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | SESSION UI V5</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
    overflow:hidden;
}

/* =========================
   TOP BAR
========================= */
#topbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:10px;
    z-index:10;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

/* =========================
   MAIN LAYOUT
========================= */
#game{
    padding:80px 20px 20px 20px;
    text-align:center;
}

#hero{
    font-size:20px;
    margin-bottom:10px;
}

/* =========================
   BREATH VISUAL (ONLY UI)
========================= */
#breath{
    width:120px;
    height:120px;
    border-radius:50%;
    background:#0044ff;
    margin:20px auto;
    transition:0.6s ease;
}

/* =========================
   TEXT AREAS
========================= */
#story, #analysis{
    margin:10px auto;
    max-width:600px;
    font-size:18px;
}

/* =========================
   OPTIONS AREA (ENGINE POPULATES)
========================= */
#options{
    margin-top:20px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
}

.option-btn{
    padding:12px 16px;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    border:none;
    min-width:140px;
}

/* =========================
   FLOATING WORDS VISUAL ONLY
========================= */
.floating{
    position:absolute;
    color:#00f2ff;
    opacity:0.8;
    font-size:14px;
    animation: floatUp 4s linear;
    pointer-events:auto;
}

@keyframes floatUp{
    from { transform: translateY(100vh); }
    to   { transform: translateY(-10vh); }
}

/* =========================
   OVERLAY SYSTEM
========================= */
#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.92);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:999;
    text-align:center;
    padding:20px;
}

#overlayTitle{
    font-size:24px;
    margin-bottom:10px;
}

#overlayText{
    max-width:600px;
}

/* =========================
   CANVAS (OPTIONAL ENGINE USE)
========================= */
#canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
}
</style>
</head>

<body>

<!-- =========================
     TOP CONTROLS (UI ONLY)
========================= -->
<div id="topbar">
    <button onclick="toggleLang()">LANG</button>
    <button onclick="window.KamizenEngine?.Mission?.load(1)">RESTART</button>
</div>

<!-- =========================
     MAIN GAME UI
========================= -->
<div id="game">

    <h1>KAMIZEN SESSION</h1>
    <h2 id="hero"></h2>

    <!-- BREATH VISUAL ONLY -->
    <div id="breath"></div>

    <!-- STORY / ANALYSIS -->
    <div id="story"></div>
    <div id="analysis"></div>

    <!-- OPTIONS GENERATED BY ENGINE -->
    <div id="options"></div>

</div>

<!-- =========================
     OVERLAY (ENGINE CONTROLLED)
========================= -->
<div id="overlay">
    <h2 id="overlayTitle"></h2>
    <p id="overlayText"></p>
</div>

<!-- =========================
     CANVAS (FOR FUTURE EFFECTS)
========================= -->
<canvas id="canvas"></canvas>

<!-- =========================
     AUDIO (ONLY ELEMENTS)
========================= -->
<audio id="bg" loop src="static/sounds/bg.mp3"></audio>
<audio id="ok" src="static/sounds/success.mp3"></audio>
<audio id="bad" src="static/sounds/glass.mp3"></audio>

<!-- =========================
     ENGINE ONLY (NO LOGIC HERE)
========================= -->
<script src="engine.js"></script>

<script>
/*
===============================
ONLY UI HELPERS (NO GAME LOGIC)
===============================
*/

function toggleLang(){
    const engine = window.KamizenEngine;
    if (!engine) return;

    const state = engine.getState?.();
    if (!state) return;

    state.lang = state.lang === "en" ? "es" : "en";
}
</script>

</body>
</html>
