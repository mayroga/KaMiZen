<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO: MATRIX TRAINING</title>

<style>
:root {
    --neon-blue:#00f2ff;
    --neon-green:#00ff41;
    --neon-red:#ff003c;
    --neon-yellow:#ffff00;
    --matrix-bg:#00050a;
}

body{
    margin:0;
    background:var(--matrix-bg);
    color:#fff;
    font-family:'Courier New', Courier, monospace;
    overflow:hidden;
    touch-action:manipulation;
    user-select:none;
}

body::before{
    content:" ";
    position:absolute;
    top:0;left:0;bottom:0;right:0;
    background:linear-gradient(rgba(18,16,16,0)50%,rgba(0,0,0,0.25)50%),
               linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06));
    background-size:100% 2px,3px 100%;
    pointer-events:none;
    z-index:100;
}

#hud{
    position:fixed;
    top:0;width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px;
    box-sizing:border-box;
    z-index:50;
}

#timer-box{
    font-size:2.5rem;
    color:var(--neon-blue);
    font-weight:bold;
    text-shadow:0 0 10px var(--neon-blue);
}

#score-box{
    font-size:1.8rem;
    padding:5px 15px;
    border:3px solid #fff;
    box-shadow:0 0 15px #fff;
}

#mastery-lvl{
    font-size:1.5rem;
    text-shadow:0 0 10px var(--neon-green);
}

#social-panel{
    position:fixed;
    bottom:20px;left:50%;
    transform:translateX(-50%);
    width:90%;
    background:rgba(0,20,40,0.95);
    border:3px solid var(--neon-blue);
    box-shadow:0 0 20px var(--neon-blue);
    padding:20px;
    display:none;
    z-index:400;
    text-align:center;
}

.floating{
    position:absolute;
    padding:12px 24px;
    font-weight:900;
    font-size:1.4rem;
    border-radius:8px;
    background:rgba(0,0,0,0.85);
    z-index:10;
    animation:floatUp 6s linear forwards;
}

.word-power{border:3px solid var(--neon-green);color:var(--neon-green);}
.word-risk{border:3px solid var(--neon-red);color:var(--neon-red);}
.word-silence{border:3px solid var(--neon-yellow);color:var(--neon-yellow);}

@keyframes floatUp{
    from{transform:translateY(110vh);}
    to{transform:translateY(-20vh);}
}

.explode{
    animation:blast .4s ease-out forwards !important;
}

@keyframes blast{
    to{transform:scale(4);opacity:0;}
}

#breath-overlay{
    position:fixed;
    top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:500;
}

#breath-circle{
    width:200px;height:200px;
    border:8px solid var(--neon-blue);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all 3.5s ease-in-out;
}

#breath-label{
    font-size:2.5rem;
    font-weight:bold;
    color:var(--neon-blue);
}

.panel{
    position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%);
    background:#000;padding:40px;
    border:4px solid var(--neon-blue);
    display:flex;flex-direction:column;gap:20px;
}

button{
    background:transparent;
    color:var(--neon-blue);
    border:2px solid var(--neon-blue);
    padding:15px;
    font-size:1.2rem;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="hud">
    <div id="timer-box">05:00</div>
    <div id="mastery-lvl">MASTERY: x1</div>
    <div id="score-box">POINTS: 0</div>
</div>

<div id="main-menu" class="panel">
    <h1>KAMIZEN: AL CIELO</h1>
    <button onclick="startGame('en')">START TRAINING (EN)</button>
    <button onclick="startGame('es')">INICIAR ENTRENAMIENTO (ES)</button>
</div>

<div id="social-panel">
    <p id="social-text"></p>
    <div id="social-options"></div>
</div>

<div id="breath-overlay">
    <h2 id="breath-title">SILENCE CHALLENGE</h2>
    <div id="breath-circle"><span id="breath-label">...</span></div>
    <p id="breath-desc"></p>
</div>

<audio id="snd-hit" src="/static/sounds/glass.mp3"></audio>
<audio id="snd-error" src="/static/sounds/trumpet.mp3"></audio>
<audio id="snd-click" src="/static/sounds/keypress.mp3"></audio>

<script>
let state={
    score:0,
    mastery:1,
    lang:'en',
    timeLeft:300, // 🔥 5 MINUTOS
    phase:'menu',
    silenceDuration:20,
    blocksCompleted:0
};

const content={
en:{
missions:[
{q:"You see someone nervous in public. What do you do?",a:"Encourage them",b:"Ignore",win:"+RESPECT",fail:"-CONNECTION"},
{q:"Someone insults you. Your move?",a:"Stay calm",b:"React angry",win:"+CONTROL",fail:"-POWER"},
{q:"A team fails. You?",a:"Motivate",b:"Blame",win:"+LEADERSHIP",fail:"-TRUST"},
{q:"You feel fear. You?",a:"Act anyway",b:"Avoid",win:"+COURAGE",fail:"-GROWTH"},
{q:"Friend lies. You?",a:"Confront calmly",b:"Ignore",win:"+TRUTH",fail:"-RESPECT"},
{q:"You fail. Next?",a:"Learn",b:"Quit",win:"+PROGRESS",fail:"-MINDSET"},
{q:"Conflict rises. You?",a:"De-escalate",b:"Fuel it",win:"+INTELLIGENCE",fail:"-CONTROL"},
{q:"Opportunity appears. You?",a:"Take it",b:"Wait",win:"+SUCCESS",fail:"-LOSS"},
{q:"Someone cries. You?",a:"Support",b:"Avoid",win:"+EMPATHY",fail:"-HUMANITY"},
{q:"You win. You?",a:"Stay humble",b:"Brag",win:"+RESPECT",fail:"-EGO"},
{q:"Team loses. You?",a:"Encourage",b:"Criticize",win:"+UNITY",fail:"-TRUST"},
{q:"You are tired. You?",a:"Push wisely",b:"Quit",win:"+DISCIPLINE",fail:"-WEAKNESS"},
{q:"Friend succeeds. You?",a:"Celebrate",b:"Envy",win:"+LOYALTY",fail:"-ENVY"},
{q:"You are wrong. You?",a:"Admit",b:"Deny",win:"+HONOR",fail:"-EGO"},
{q:"Pressure hits. You?",a:"Focus",b:"Panic",win:"+CONTROL",fail:"-CHAOS"},
{q:"You feel anger. You?",a:"Control",b:"Explode",win:"+POWER",fail:"-LOSS"},
{q:"You see injustice. You?",a:"Act",b:"Ignore",win:"+COURAGE",fail:"-WEAKNESS"},
{q:"You doubt yourself. You?",a:"Trust process",b:"Quit",win:"+FAITH",fail:"-FAIL"},
{q:"Someone helps you. You?",a:"Thank",b:"Ignore",win:"+RESPECT",fail:"-DISCONNECT"},
{q:"Time is short. You?",a:"Focus",b:"Waste",win:"+RESULT",fail:"-LOSS"},
{q:"You are alone. You?",a:"Build",b:"Scroll",win:"+GROWTH",fail:"-STAGNATION"},
{q:"You are criticized. You?",a:"Learn",b:"React",win:"+EVOLUTION",fail:"-EGO"},
{q:"You feel lazy. You?",a:"Act",b:"Delay",win:"+DISCIPLINE",fail:"-LOSS"},
{q:"You get chance. You?",a:"Take risk",b:"Avoid",win:"+SUCCESS",fail:"-MISS"},
{q:"You see fear. You?",a:"Face it",b:"Run",win:"+COURAGE",fail:"-LIMIT"}
]
},
es:{
missions:[
{q:"Ves a alguien nervioso. Qué haces?",a:"Apoyar",b:"Ignorar",win:"+RESPETO",fail:"-CONEXION"}
]
}
};

function startGame(l){
    state.lang=l;
    document.getElementById('main-menu').style.display='none';
    state.interval=setInterval(updateTimer,1000);
    state.spawnInterval=setInterval(spawnWord,1000);
    setTimeout(triggerSocialMission,10000);
}

function updateTimer(){
    state.timeLeft--;
    let m=Math.floor(state.timeLeft/60).toString().padStart(2,'0');
    let s=(state.timeLeft%60).toString().padStart(2,'0');
    document.getElementById('timer-box').innerText=`${m}:${s}`;
    if(state.timeLeft<=0)endGame();
}

function spawnWord(){
    const types=['power','risk','silence'];
    const cat=types[Math.floor(Math.random()*types.length)];
    const div=document.createElement('div');
    div.className=`floating word-${cat}`;
    div.innerText=cat.toUpperCase();
    div.style.left=Math.random()*80+"vw";

    div.onclick=()=>{
        div.classList.add('explode');
        document.getElementById('snd-click').play();

        if(cat==='risk'){
            state.score-=30;
            document.getElementById('snd-error').play();
        }else{
            state.score+=15;
            document.getElementById('snd-hit').play();
        }

        document.getElementById('score-box').innerText=`POINTS: ${state.score}`;
        setTimeout(()=>div.remove(),300);
    };

    document.body.appendChild(div);
    setTimeout(()=>div.remove(),6000);
}

function triggerSocialMission(){
    const m=content[state.lang].missions[Math.floor(Math.random()*content[state.lang].missions.length)];
    document.getElementById('social-text').innerText=m.q;
    document.getElementById('social-options').innerHTML=`
    <button onclick="resolve(true,'${m.win}')">${m.a}</button>
    <button onclick="resolve(false,'${m.fail}')">${m.b}</button>`;
    document.getElementById('social-panel').style.display='block';
}

function resolve(c,msg){
    if(c){state.score+=100;}
    else{state.score-=50;}
    alert(msg);
    document.getElementById('social-panel').style.display='none';
}

function endGame(){
    alert("FINAL SCORE: "+state.score);
    location.reload();
}
</script>

</body>
</html>
