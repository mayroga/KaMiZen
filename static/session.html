<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AL CIELO | NEURAL PROGRESSION SYSTEM</title>
    <style>
        :root {
            --neon-blue: #00f2ff; --neon-gold: #f1c40f; --neon-green: #2ecc71;
            --neon-purple: #9b59b6; --neon-red: #ff3131; --bg-dark: #020205;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; color: white; }
        
        /* UI LAYERS */
        #hud {
            position: absolute; top: env(safe-area-inset-top, 20px); width: 100%;
            display: flex; justify-content: space-evenly; z-index: 100; pointer-events: none;
        }
        .data-box {
            background: rgba(0, 0, 0, 0.85); border: 2px solid var(--neon-blue);
            padding: 10px; text-align: center; min-width: 110px; border-radius: 12px;
        }
        .label { font-size: 9px; color: var(--neon-blue); font-weight: 900; display: block; }
        .value { font-size: 22px; font-weight: 900; display: block; }

        #timer-bar {
            position: absolute; bottom: 80px; width: 80%; left: 10%; height: 4px;
            background: #222; border-radius: 2px; overflow: hidden;
        }
        #timer-fill { width: 100%; height: 100%; background: var(--neon-red); transition: 0.3s; }

        #status-msg {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            font-size: 14px; color: var(--neon-gold); letter-spacing: 2px;
        }

        /* SCREENS */
        #overlay, #lockout-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        #lockout-screen { display: none; z-index: 2000; color: var(--neon-red); }
        
        .btn {
            padding: 20px 50px; background: var(--neon-blue); color: #000; border: none;
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer; border-radius: 50px; margin-top: 20px;
        }
        
        canvas { display: block; touch-action: none; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="hud">
    <div class="data-box" style="border-color: var(--neon-gold);"><span class="label">CAPITAL</span><span id="v-money" class="value">0</span></div>
    <div class="data-box" style="border-color: var(--neon-red);"><span class="label">STABILITY</span><span id="v-health" class="value">100%</span></div>
    <div class="data-box" style="border-color: var(--neon-purple);"><span class="label">LEVEL</span><span id="v-level" class="value">1</span></div>
</div>

<div id="timer-bar"><div id="timer-fill"></div></div>
<div id="status-msg">NEURAL SYNC: <span id="v-time">27:00</span></div>

<div id="overlay">
    <h1 style="color: var(--neon-blue); letter-spacing: 10px;">AL CIELO</h1>
    <p style="color: #888;">USA SURVIVAL & DISCIPLINE PROGRESSION</p>
    <button class="btn" onclick="startApp()">ACTIVATE INTERFACE</button>
</div>

<div id="lockout-screen">
    <h1>SYSTEM LOCKOUT</h1>
    <p>Daily Training Limit Reached. Neural cooldown active.</p>
    <h2 id="cooldown-timer">08:00:00</h2>
</div>

<canvas id="gameCanvas"></canvas>

<script>
// --- CONFIGURATION ---
const SESSION_KEY = "AL_CIELO_PROGRESS";
const TOTAL_MINUTES = 27;
const LOCK_HOURS = 8;
const LEVELS = [
    { id: 1, duration: 7, name: "BASIC SURVIVAL", speed: 3, objects: ["FAMILY", "SAVINGS", "STRANGER"] },
    { id: 2, duration: 10, name: "CITIZEN ELITE", speed: 5, objects: ["DRILL", "911 CALL", "BAD LOAN"] },
    { id: 3, duration: 10, name: "FLOW MASTER", speed: 8, objects: ["INVESTMENT", "DANGER", "SECURITY"] }
];

let stats = { money: 0, health: 100, levelIdx: 0, consumedSec: 0 };
let active = false;
let objects = [];
const user = { x: 0, y: 0, size: 50 };
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- SESSION LOGIC ---
function checkLockout() {
    const data = JSON.parse(localStorage.getItem(SESSION_KEY));
    if (data) {
        const timeSinceStart = (Date.now() - data.startTime) / 3600000;
        if (timeSinceStart < LOCK_HOURS && data.consumedSec >= TOTAL_MINUTES * 60) {
            return true;
        }
        if (timeSinceStart >= LOCK_HOURS) {
            localStorage.removeItem(SESSION_KEY);
        }
    }
    return false;
}

function saveProgress() {
    let data = JSON.parse(localStorage.getItem(SESSION_KEY)) || { startTime: Date.now(), consumedSec: 0 };
    data.consumedSec = stats.consumedSec;
    localStorage.setItem(SESSION_KEY, JSON.stringify(data));
}

// --- APP CORE ---
function startApp() {
    if (checkLockout()) { showLockout(); return; }
    document.getElementById('overlay').style.display = 'none';
    active = true;
    resize();
    user.x = window.innerWidth / 2;
    user.y = window.innerHeight * 0.8;
    
    // Recovery of previous session seconds if any
    const saved = JSON.parse(localStorage.getItem(SESSION_KEY));
    if(saved) stats.consumedSec = saved.consumedSec;

    setInterval(tick, 1000);
    setInterval(spawn, 700);
    loop();
}

function tick() {
    if (!active) return;
    stats.consumedSec++;
    saveProgress();

    // Progression Logic
    const currentMin = stats.consumedSec / 60;
    if (currentMin < 7) stats.levelIdx = 0;
    else if (currentMin < 17) stats.levelIdx = 1;
    else if (currentMin < 27) stats.levelIdx = 2;
    else { endGame(); }

    updateUI();
}

function updateUI() {
    const totalSec = TOTAL_MINUTES * 60;
    const remaining = totalSec - stats.consumedSec;
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    
    document.getElementById('v-time').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
    document.getElementById('v-level').innerText = LEVELS[stats.levelIdx].id;
    document.getElementById('v-money').innerText = stats.money;
    document.getElementById('v-health').innerText = stats.health + "%";
    document.getElementById('timer-fill').style.width = (remaining / totalSec * 100) + "%";
}

function spawn() {
    if (!active) return;
    const level = LEVELS[stats.levelIdx];
    const text = level.objects[Math.floor(Math.random() * level.objects.length)];
    objects.push({
        text: text,
        x: Math.random() * (window.innerWidth - 100) + 50,
        y: -50,
        speed: level.speed,
        type: text === "STRANGER" || text === "BAD LOAN" || text === "DANGER" ? "neg" : "pos"
    });
}

function update() {
    objects.forEach((obj, i) => {
        obj.y += obj.speed;
        const dist = Math.sqrt((obj.x - user.x)**2 + (obj.y - user.y)**2);
        if (dist < user.size) {
            if (obj.type === "neg") {
                stats.health -= 20;
                stats.money = Math.floor(stats.money * 0.5);
            } else {
                stats.money += 100;
                stats.health = Math.min(100, stats.health + 5);
            }
            objects.splice(i, 1);
        }
        if (obj.y > window.innerHeight) objects.splice(i, 1);
    });

    if (stats.health <= 0) {
        alert("CRITICAL FAILURE. REBOOTING NEURAL LINK.");
        location.reload();
    }
}

function draw() {
    ctx.fillStyle = "#020205";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // User Guard
    ctx.strokeStyle = varColor('--neon-blue');
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(user.x, user.y, user.size - 10, 0, Math.PI*2); ctx.stroke();

    // Level Specific Background Glow
    const colors = [varColor('--neon-blue'), varColor('--neon-green'), varColor('--neon-purple')];
    ctx.shadowBlur = 20; ctx.shadowColor = colors[stats.levelIdx];

    objects.forEach(obj => {
        ctx.fillStyle = obj.type === "neg" ? varColor('--neon-red') : "#fff";
        ctx.font = "900 16px Orbitron";
        ctx.textAlign = "center";
        ctx.fillText(obj.text, obj.x, obj.y);
    });
    ctx.shadowBlur = 0;
}

function showLockout() {
    active = false;
    document.getElementById('lockout-screen').style.display = 'flex';
    setInterval(() => {
        const data = JSON.parse(localStorage.getItem(SESSION_KEY));
        const diff = (data.startTime + (LOCK_HOURS * 3600000)) - Date.now();
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        document.getElementById('cooldown-timer').innerText = `${h}h ${m}m ${s}s`;
    }, 1000);
}

function endGame() {
    active = false;
    saveProgress();
    showLockout();
}

function resize() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
}
function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => { user.x = e.clientX; user.y = e.clientY; });
window.addEventListener('touchmove', e => { user.x = e.touches[0].clientX; user.y = e.touches[0].clientY; e.preventDefault(); }, {passive: false});

function loop() {
    if(active) { update(); draw(); requestAnimationFrame(loop); }
}

// Check on load
if (checkLockout()) showLockout();
</script>
</body>
</html>
