<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | LIFE SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">

<style>
:root{
--blue:#00f2ff;
--red:#ff3b3b;
--gold:#ffd000;
--bg:#020205;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}

body{
background:radial-gradient(circle,#050816,#000);
color:#fff;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* CENTRO TOTAL */
#game-container{
position:relative;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* TEXTO CENTRAL */
#text-display{
font-size:28px;
text-align:center;
max-width:800px;
text-shadow:0 0 20px var(--blue);
margin-bottom:30px;
}

/* AVATAR */
#avatar{
width:80px;height:120px;
background:var(--blue);
box-shadow:0 0 30px var(--blue);
animation:breathe 2s infinite;
margin-bottom:20px;
}

@keyframes breathe{
0%,100%{transform:scale(1)}
50%{transform:scale(1.1)}
}

/* NODOS */
.node{
position:absolute;
padding:15px 25px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
animation:floatUp 4s linear forwards;
}

.opportunity{border:2px solid var(--blue);color:var(--blue);box-shadow:0 0 15px var(--blue);}
.obstacle{border:2px solid var(--red);color:var(--red);box-shadow:0 0 15px var(--red);}
.distraction{border:2px solid var(--gold);color:var(--gold);box-shadow:0 0 15px var(--gold);}

@keyframes floatUp{
0%{transform:translateY(200px) scale(0.5);opacity:0}
50%{opacity:1}
100%{transform:translateY(-400px) scale(1.2);opacity:0}
}

/* EXPLOSION */
@keyframes explode{
0%{transform:scale(1)}
50%{transform:scale(2)}
100%{transform:scale(0);opacity:0}
}

/* HUD */
#hud{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:40px;
font-size:14px;
color:var(--blue);
}

/* MISION */
#mission-box{
display:none;
flex-direction:column;
gap:15px;
max-width:600px;
}

.option{
padding:15px;
border:1px solid var(--blue);
cursor:pointer;
transition:0.3s;
}

.option:hover{
background:rgba(0,242,255,0.2);
}

/* RESPIRACION */
#breath-circle{
position:absolute;
width:150px;height:150px;
border-radius:50%;
border:4px solid var(--blue);
display:none;
animation:breathAnim 4s infinite;
}

@keyframes breathAnim{
0%{transform:scale(1)}
50%{transform:scale(1.6)}
100%{transform:scale(1)}
}

/* OVERLAY */
#overlay{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
z-index:10;
}

input{
padding:15px;
font-size:18px;
margin-bottom:20px;
background:black;
border:2px solid var(--blue);
color:white;
text-align:center;
}

button{
padding:15px 40px;
background:var(--blue);
border:none;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div id="game-container">

<div id="overlay">
<h2>ENTER NAME</h2>
<input id="name">
<button onclick="Game.start()">START</button>
</div>

<div id="hud">
<div>MONEY: <span id="money">0</span></div>
<div>PRESSURE: <span id="pressure">0</span></div>
</div>

<div id="avatar"></div>
<div id="text-display"></div>

<div id="mission-box"></div>

<div id="breath-circle"></div>

</div>

<script>
const Game = (()=>{

let state={
name:"",
money:0,
pressure:0,
phase:"init",
time:300,
session:null
};

const ELEMENTS=[
{t:"MONEY",c:"opportunity",m:100,p:0},
{t:"BUSINESS",c:"opportunity",m:300,p:5},
{t:"LIE",c:"obstacle",m:-200,p:10},
{t:"PHONE",c:"distraction",m:0,p:5}
];

/* START */
const start=async()=>{
state.name=document.getElementById("name").value;
if(!state.name)return;

document.getElementById("overlay").style.display="none";

const res=await fetch('/api/session/start');
state.session=await res.json();

showText(state.session.story.en);

setTimeout(startCycle,3000);
};

/* TEXTO */
const showText=(t)=>{
document.getElementById("text-display").innerText=t;
};

/* CICLO 5 MIN */
const startCycle=()=>{
state.phase="cycle";

let interval=setInterval(()=>{
spawn();

state.time--;

if(state.time<=0){
clearInterval(interval);
diagnosis();
}

},1000);
};

/* SPAWN */
const spawn=()=>{
if(Math.random()<0.6)return;

let el=ELEMENTS[Math.floor(Math.random()*ELEMENTS.length)];

let node=document.createElement("div");
node.className="node "+el.c;
node.innerText=el.t;

node.style.left=(Math.random()*60+20)+"%";
node.style.top="60%";

node.onclick=()=>{
state.money+=el.m;
state.pressure+=el.p;

document.getElementById("money").innerText=state.money;
document.getElementById("pressure").innerText=state.pressure;

node.style.animation="explode 0.5s forwards";
setTimeout(()=>node.remove(),500);
};

document.body.appendChild(node);
setTimeout(()=>node.remove(),4000);
};

/* DIAGNOSTICO */
const diagnosis=()=>{
showText("ANALYZING YOUR DECISIONS...");

setTimeout(()=>{
showText("RESULT: PRESSURE "+state.pressure+" / MONEY "+state.money);
startMission();
},3000);
};

/* MISION */
const startMission=()=>{
state.phase="mission";

let m=state.session.missions[0];

document.getElementById("mission-box").style.display="flex";

showText(m.q.en);

m.op.forEach((op,i)=>{
let div=document.createElement("div");
div.className="option";
div.innerText=op;

div.onclick=()=>{
showText(m.ex[i]);
setTimeout(startBreathing,3000);
};

document.getElementById("mission-box").appendChild(div);
});
};

/* RESPIRACION */
const startBreathing=()=>{
document.getElementById("mission-box").style.display="none";

showText("BREATHE IN... HOLD... RELEASE...");

let circle=document.getElementById("breath-circle");
circle.style.display="block";

/* RETO SILENCIO */
setTimeout(()=>{
circle.style.display="none";
showText("SILENCE COMPLETE. NEXT LEVEL.");
setTimeout(()=>location.reload(),3000);
},15000);
};

return{start};

})();
</script>

</body>
</html>
