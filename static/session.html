<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN CORE | ORCHESTRATED BRAIN SYSTEM</title>

<style>
:root{
  --bg:#000;
  --neon:#00f2ff;
  --green:#00ff88;
  --red:#ff0044;
  --yellow:#ffcc00;
  --panel:rgba(0,20,40,0.95);
}

/* =========================
   GLOBAL
========================= */
body{
  margin:0;
  background:var(--bg);
  color:var(--neon);
  font-family:Arial;
  overflow:hidden;
}

/* =========================
   BREATHING CORE (GLBO)
========================= */
#breath{
  position:absolute;
  top:28%;
  left:50%;
  transform:translate(-50%,-50%) scale(1);
  width:150px;
  height:150px;
  border-radius:50%;
  background:rgba(0,200,255,0.18);
  border:2px solid var(--neon);
  display:none;
}

/* =========================
   HEADER
========================= */
#header{
  position:absolute;
  top:10px;
  width:95%;
  display:flex;
  justify-content:space-between;
}

#xpBar{
  width:180px;
  height:10px;
  border:1px solid var(--neon);
}

#xpFill{
  height:100%;
  width:0%;
  background:var(--green);
  transition:0.3s;
}

/* =========================
   CORE TIMER
========================= */
#core{
  position:absolute;
  top:28%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:35px;
  width:140px;
  height:140px;
  border-radius:50%;
  border:2px solid var(--neon);
  display:flex;
  justify-content:center;
  align-items:center;
}

/* =========================
   TEXT
========================= */
#message{
  position:absolute;
  bottom:230px;
  width:90%;
  left:5%;
  padding:15px;
  border:1px solid var(--neon);
  background:var(--panel);
  text-align:center;
}

#reason{
  position:absolute;
  bottom:300px;
  width:90%;
  left:5%;
  text-align:center;
  font-size:14px;
}

/* =========================
   OPTIONS (SHUFFLE ENABLED)
========================= */
#options{
  position:absolute;
  bottom:110px;
  width:90%;
  left:5%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  padding:15px;
  border:1px solid var(--neon);
  background:black;
  color:var(--neon);
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:var(--neon);
  color:black;
}

.correct{background:var(--green)!important;color:black!important;}
.wrong{background:var(--red)!important;color:white!important;}

/* =========================
   NAV
========================= */
#nav{
  position:absolute;
  bottom:20px;
  width:90%;
  left:5%;
  display:flex;
  justify-content:space-between;
}

/* =========================
   BREAK MODE
========================= */
#break{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  text-align:center;
}
</style>
</head>

<body>

<div id="breath"></div>

<div id="header">
  <div id="xpBar"><div id="xpFill"></div></div>
  <button onclick="toggleLang()">EN/ES</button>
</div>

<div id="core">⚡</div>
<div id="reason"></div>
<div id="message">CLICK TO START</div>

<div id="options"></div>

<div id="nav">
  <button onclick="back()">BACK</button>
  <button onclick="restart()">RESTART</button>
  <button onclick="next()">NEXT</button>
</div>

<div id="break">
  <h2>🧠 BREAK MODE</h2>
  <p>Respira. Recupera tu mente.</p>
</div>

<script>

let session_id=null;
let mission=null;
let lang="en";
let xp=0;

/* =========================
   AUDIO ENGINE
========================= */
const ctx=new (window.AudioContext||window.webkitAudioContext)();

function sound(type){
  const o=ctx.createOscillator();
  const g=ctx.createGain();

  o.connect(g); g.connect(ctx.destination);

  if(type==="good") o.frequency.value=900;
  if(type==="bad") o.frequency.value=150;
  if(type==="click") o.frequency.value=500;

  g.gain.value=0.2;
  o.start();
  o.stop(ctx.currentTime+0.2);
}

/* =========================
   VOICE COACH VARIATION
========================= */
const coachPhrases=[
  "Focus now",
  "Keep control",
  "Stay present",
  "You are improving",
  "Observe and decide",
  "Calm mind active"
];

function speak(text){
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.9;
  u.lang=lang==="en"?"en-US":"es-ES";
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function randomCoach(){
  return coachPhrases[Math.floor(Math.random()*coachPhrases.length)];
}

/* =========================
   BREATHING SCENE (SYNC)
========================= */
let breathingInterval=null;

function startBreathing(){
  const b=document.getElementById("breath");
  b.style.display="block";

  clearInterval(breathingInterval);

  breathingInterval=setInterval(()=>{

    b.style.transform="translate(-50%,-50%) scale(1.6)";
    speak(lang==="en"?"Inhale":"Inhala");

    setTimeout(()=>{
      b.style.transform="translate(-50%,-50%) scale(1)";
      speak(lang==="en"?"Exhale":"Exhala");
    },4000);

  },8000);
}

function stopBreathing(){
  const b=document.getElementById("breath");
  b.style.display="none";
  clearInterval(breathingInterval);
}

/* =========================
   START
========================= */
async function start(){
  if(ctx.state==="suspended") await ctx.resume();

  const r=await fetch("/start",{method:"POST"});
  const d=await r.json();

  session_id=d.session_id;
  mission=d.mission;

  render();
}

/* =========================
   SHUFFLE (ANTI PATTERN)
========================= */
function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

/* =========================
   RENDER ENGINE (SCENES)
========================= */
function render(){

  if(!mission) return;

  const msg=document.getElementById("message");
  const opt=document.getElementById("options");

  opt.innerHTML="";
  document.getElementById("reason").innerText="";

  const textBlock=mission.blocks.find(b=>b.text);
  const text=textBlock?.text?.[lang] || "..."

  msg.innerText=text;

  speak(randomCoach()+"... "+text);

  const tvid=mission.blocks.find(b=>b.type==="tvid");

  /* =========================
     BREATHING SCENE CONTROL
  ========================= */
  const hasBreathing=mission.blocks.some(b=>b.type==="breathing");

  if(hasBreathing){
    startBreathing();
  }else{
    stopBreathing();
  }

  /* =========================
     OPTIONS SHUFFLE REQUIRED
  ========================= */
  if(tvid){
    const options=shuffle([...tvid.options]);

    options.forEach(o=>{
      const btn=document.createElement("button");
      btn.innerText=o.text[lang];

      btn.onclick=()=>choose(btn,o);

      opt.appendChild(btn);
    });
  }

  /* =========================
     TVID EXERCISE SCENE
  ========================= */
  if(mission.blocks.some(b=>b.type==="tvid_exercise")){
    runExercise();
  }
}

/* =========================
   TVID REAL EXECUTION
========================= */
function runExercise(){
  speak(lang==="en"
    ?"Close your eyes. Feel your breathing."
    :"Cierra los ojos. Siente tu respiración."
  );

  setTimeout(()=>{
    speak(lang==="en"
      ?"Smile. Hold it. You are in control."
      :"Sonríe. Mantén. Tienes control."
    );
  },4000);
}

/* =========================
   CHOOSE ANSWER
========================= */
async function choose(btn,o){

  const r=await fetch("/judge",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      session_id,
      decision:o.code
    })
  });

  const d=await r.json();

  document.getElementById("reason").innerText=o.reason?.[lang] || "";

  if(d.correct){
    btn.classList.add("correct");
    sound("good");
    speak("Correct. "+randomCoach());
  }else{
    btn.classList.add("wrong");
    sound("bad");
    speak("Incorrect. Learn and retry.");
  }

  xp=d.xp;
  document.getElementById("xpFill").style.width=(xp%100)+"%";

  if(d.break){
    showBreak();
  }

  setTimeout(()=>{
    mission=d.next_mission;
    render();
  },1800);
}

/* =========================
   BREAK SYSTEM
========================= */
function showBreak(){
  const b=document.getElementById("break");
  b.style.display="flex";

  speak("Stop. Rest your mind.");

  setTimeout(()=>{
    b.style.display="none";
  },30000);
}

/* =========================
   NAV SYSTEM
========================= */
async function next(){
  sound("click");

  const r=await fetch("/force_next",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({session_id})
  });

  const d=await r.json();

  alert(d.message);
  speak(d.message);

  xp=d.xp;
  mission=d.mission;

  render();
}

async function back(){
  sound("click");

  const r=await fetch("/force_back",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({session_id})
  });

  const d=await r.json();

  alert(d.message);
  speak(d.message);

  xp=d.xp;
  mission=d.mission;

  render();
}

function restart(){
  location.reload();
}

function toggleLang(){
  lang=lang==="en"?"es":"en";
  render();
}

/* =========================
   INIT
========================= */
document.getElementById("message").onclick=start;

</script>

</body>
</html>
