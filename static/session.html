<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | AL CIELO PRO</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #001a33, #000);
    color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    overflow: hidden;
    cursor: crosshair;
    transition: background 0.5s ease;
}

/* ===================== TOP BAR ===================== */
#topbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 12px 18px;
    z-index: 1000;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    box-sizing: border-box;
}

#score-display {
    font-weight: bold;
    font-size: 1.1rem;
    color: #00f2ff;
}

#hero-name {
    margin-top: 80px;
    font-size: 1.8rem;
    color: #ffffff;
    text-shadow: 0 0 10px #00f2ff;
}

/* ===================== GAME AREA ===================== */
#game {
    padding-top: 20px;
    position: relative;
    z-index: 10;
}

#top-ui {
    display: flex;
    justify-content: space-around;
    font-weight: bold;
    font-size: 1rem;
    color: #00f2ff;
    margin-top: 10px;
}

#stat-focus, #stat-life {
    opacity: 0.9;
}

/* ===================== BUTTONS ===================== */
button {
    padding: 12px 18px;
    margin: 8px;
    font-size: 16px;
    border: 2px solid #00f2ff;
    background: rgba(0, 242, 255, 0.08);
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.25s;
}

button:hover {
    background: #00f2ff;
    color: #000;
    box-shadow: 0 0 15px #00f2ff;
}

.opt-btn {
    display: block;
    width: 85%;
    max-width: 520px;
    margin: 10px auto;
    text-align: left;
}

/* ===================== BREATH ===================== */
#breath {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle, #00f2ff, #0066ff);
    margin: 20px auto;
    transition: transform 4s ease-in-out;
    box-shadow: 0 0 30px #00f2ff;
    display: none;
}

/* ===================== FLOATING WORDS ===================== */
.floating {
    position: absolute;
    padding: 8px 16px;
    border-radius: 20px;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    z-index: 50;
    animation: floatUp 5s linear forwards;
}

@keyframes floatUp {
    from { transform: translateY(110vh) rotate(0deg); }
    to { transform: translateY(-20vh) rotate(20deg); }
}

/* ===================== WORD COLORS ===================== */
.word-good {
    background: rgba(0, 255, 0, 0.15);
    color: #00ff00;
    border: 2px solid #00ff00;
    box-shadow: 0 0 15px #00ff00;
}

.word-bad {
    background: rgba(255, 0, 0, 0.08);
    color: #ff6666;
    border: 1px solid #ff0000;
    box-shadow: 0 0 10px rgba(255,0,0,0.4);
}

.word-neutral {
    color: #ffff66;
    border: 2px solid #ffff66;
}

/* ===================== BLAST ===================== */
.blast {
    animation: burst 0.4s forwards;
    pointer-events: none;
}

@keyframes burst {
    to { transform: scale(4); opacity: 0; }
}

/* ===================== UI BOX ===================== */
#explanation-box {
    background: rgba(0,0,0,0.85);
    border-left: 4px solid #00f2ff;
    padding: 18px;
    margin: 20px auto;
    width: 80%;
    display: none;
    font-size: 1.1rem;
    border-radius: 0 12px 12px 0;
}

/* ===================== TEXT ===================== */
#story {
    font-size: 1.4rem;
    margin: 20px;
    font-weight: bold;
}

#analysis {
    color: #00f2ff;
    font-style: italic;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div id="topbar">
    <button onclick="KamizenEngine.toggleLang()">EN / ES</button>
    <div id="score-display">POINTS: 0</div>
</div>

<!-- GAME -->
<div id="game">

    <div id="top-ui">
        <div id="stat-focus">FOCUS: 100%</div>
        <div id="stat-life">ENERGY: ⚡⚡⚡</div>
    </div>

    <h2 id="hero-name"></h2>

    <div id="breath"></div>

    <div id="story"></div>
    <div id="analysis"></div>

    <div id="explanation-box"></div>

    <div id="options"></div>
</div>

<!-- AUDIO -->
<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="ok" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

<!-- ENGINE ONLY (NO DUPLICATED LOGIC) -->
<script src="/static/engine.js"></script>

</body>
</html>
