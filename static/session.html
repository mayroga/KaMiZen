<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN CORE ORCHESTRATED</title>

<style>
:root{
  --bg:#000;
  --neon:#00f2ff;
  --green:#00ff88;
  --red:#ff0044;
  --panel:rgba(0,20,40,0.95);
}

body{
  margin:0;
  background:var(--bg);
  color:var(--neon);
  font-family:Arial;
  overflow:hidden;
}

/* ================= BREATH SCENE ================= */
#breath{
  position:absolute;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%) scale(1);
  width:150px;
  height:150px;
  border-radius:50%;
  background:rgba(0,200,255,0.2);
  border:2px solid var(--neon);
  display:none;
  transition:4s ease-in-out;
}

/* HEADER */
#header{
  position:absolute;
  top:10px;
  width:95%;
  display:flex;
  justify-content:space-between;
}

#xpBar{
  width:180px;
  height:10px;
  border:1px solid var(--neon);
}
#xpFill{
  height:100%;
  width:0%;
  background:var(--green);
}

/* MESSAGE */
#message{
  position:absolute;
  bottom:230px;
  width:90%;
  left:5%;
  padding:15px;
  border:1px solid var(--neon);
  background:var(--panel);
  text-align:center;
}

/* COACH */
#coach{
  position:absolute;
  bottom:320px;
  width:90%;
  left:5%;
  text-align:center;
  font-size:14px;
  opacity:0.9;
}

/* OPTIONS */
#options{
  position:absolute;
  bottom:110px;
  width:90%;
  left:5%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  padding:15px;
  border:1px solid var(--neon);
  background:black;
  color:var(--neon);
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:var(--neon);
  color:black;
}

.correct{background:var(--green)!important;color:black!important;}
.wrong{background:var(--red)!important;color:white!important;}

/* NAV */
#nav{
  position:absolute;
  bottom:20px;
  width:90%;
  left:5%;
  display:flex;
  justify-content:space-between;
}

/* BREAK */
#break{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}
</style>
</head>

<body>

<div id="breath"></div>

<div id="header">
  <div id="xpBar"><div id="xpFill"></div></div>
</div>

<div id="coach"></div>
<div id="message">CLICK TO START</div>
<div id="options"></div>

<div id="nav">
  <button onclick="back()">BACK</button>
  <button onclick="restart()">RESTART</button>
  <button onclick="next()">NEXT</button>
</div>

<div id="break">
  <h2>🧠 BREAK MODE</h2>
  <p>Descanso obligatorio. Sin pantalla.</p>
</div>

<script>

let session_id=null;
let mission=null;
let lang="en";
let xp=0;
let scene="idle";
let sessionStart=Date.now();

/* ================= AUDIO ================= */
const ctx=new (window.AudioContext||window.webkitAudioContext)();

function sound(type){
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination);

  if(type==="good") o.frequency.value=1000;
  if(type==="bad") o.frequency.value=150;
  if(type==="click") o.frequency.value=500;
  if(type==="breath") o.frequency.value=600;

  g.gain.value=0.2;
  o.start();
  o.stop(ctx.currentTime+0.25);
}

/* ================= COACH VARIATION ================= */
const coachLines=[
  "Focus is your power.",
  "Keep control of your mind.",
  "You are improving.",
  "Stay present.",
  "Breathe and decide.",
  "Calm mind, strong actions."
];

function coachSpeak(extra=""){
  const text = coachLines[Math.floor(Math.random()*coachLines.length)] + " " + extra;
  document.getElementById("coach").innerText=text;

  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

/* ================= BREATHING SCENE ================= */
function startBreathScene(){
  scene="breathing";

  const b=document.getElementById("breath");
  b.style.display="block";

  let inhale=true;

  const interval=setInterval(()=>{

    if(scene!=="breathing"){
      clearInterval(interval);
      b.style.display="none";
      return;
    }

    if(inhale){
      b.style.transform="translate(-50%,-50%) scale(1.4)";
      coachSpeak("Inhale");
      sound("breath");
    }else{
      b.style.transform="translate(-50%,-50%) scale(1)";
      coachSpeak("Exhale");
      sound("breath");
    }

    inhale=!inhale;

  },4000);
}

/* ================= SCENE CONTROL ================= */
function setScene(type){
  scene=type;
}

/* ================= START ================= */
async function start(){
  if(ctx.state==="suspended") await ctx.resume();

  const r=await fetch("/start",{method:"POST"});
  const d=await r.json();

  session_id=d.session_id;
  mission=d.mission;

  render();
}

/* ================= RENDER ORCHESTRATION ================= */
function render(){

  const msg=document.getElementById("message");
  const opt=document.getElementById("options");

  opt.innerHTML="";

  const textBlock=mission.blocks.find(b=>b.text);
  const tvid=mission.blocks.find(b=>b.type==="tvid");
  const exercise=mission.blocks.find(b=>b.type==="tvid_exercise");
  const breath=mission.blocks.find(b=>b.type==="breathing");

  /* ================= BREATH SCENE ================= */
  if(breath){
    setScene("breathing");
    startBreathScene();
    coachSpeak("Respiración activa. Sigue el ritmo.");
    msg.innerText="BREATHING SCENE ACTIVE";
    return;
  }

  /* STOP BREATH */
  scene="question";
  document.getElementById("breath").style.display="none";

  /* ================= QUESTION ================= */
  if(textBlock){
    msg.innerText=textBlock.text?.[lang] || "...";
    coachSpeak();
  }

  if(tvid){
    tvid.options.forEach(o=>{
      const btn=document.createElement("button");
      btn.innerText=o.text?.[lang];

      btn.onclick=()=>choose(btn,o);

      opt.appendChild(btn);
    });
  }

  /* ================= EXERCISE ================= */
  if(exercise){
    coachSpeak("TVID exercise mode activated.");
    setTimeout(()=>{
      coachSpeak("Close eyes. Reset mind.");
    },2000);
  }

  checkSessionTime();
}

/* ================= ANSWER ================= */
async function choose(btn,o){

  const r=await fetch("/judge",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({session_id,decision:o.code})
  });

  const d=await r.json();

  document.getElementById("message").innerText=o.reason?.[lang] || "";

  if(d.correct){
    btn.classList.add("correct");
    sound("good");
    coachSpeak("Correct decision.");
  }else{
    btn.classList.add("wrong");
    sound("bad");
    coachSpeak("Learn from this.");
  }

  xp=d.xp;
  document.getElementById("xpFill").style.width=(xp%100)+"%";

  if(d.break){
    showBreak();
  }

  setTimeout(()=>{
    mission=d.next_mission;
    render();
  },2000);
}

/* ================= BREAK ================= */
function showBreak(){
  document.getElementById("break").style.display="flex";
  coachSpeak("Rest time. No screen.");

  setTimeout(()=>{
    document.getElementById("break").style.display="none";
  },30000);
}

/* ================= TIME CONTROL (ANTI ADDICTION) ================= */
function checkSessionTime(){
  const mins=(Date.now()-sessionStart)/60000;

  if(mins>=15){
    document.getElementById("break").style.display="flex";
    coachSpeak("Session complete. Good work.");

    setTimeout(()=>{
      location.reload();
    },20000);
  }
}

/* ================= NAV ================= */
async function next(){
  const r=await fetch("/force_next",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({session_id})});
  const d=await r.json();
  mission=d.mission;
  xp=d.xp;
  render();
}

async function back(){
  const r=await fetch("/force_back",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({session_id})});
  const d=await r.json();
  mission=d.mission;
  xp=d.xp;
  render();
}

function restart(){
  location.reload();
}

/* ================= INIT ================= */
document.getElementById("message").onclick=start;

</script>

</body>
</html>
