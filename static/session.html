<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KaMiZen</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;margin:0;padding:0;font-family:Inter}

body{
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
transition:background 1s;
}

#app{
width:95%;
max-width:420px;
background:#111827;
border-radius:25px;
padding:25px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
display:flex;
flex-direction:column;
align-items:center;
}

#logo{
font-size:30px;
margin-bottom:5px;
}

#subtitle{
font-size:13px;
opacity:0.7;
margin-bottom:10px;
}

#mental-panel{
width:100%;
background:#020617;
padding:12px;
border-radius:12px;
margin-bottom:15px;
}

.bar{
height:6px;
background:#1e293b;
border-radius:10px;
margin-top:4px;
overflow:hidden;
}

.bar-fill{
height:6px;
background:#22c55e;
width:40%;
}

#block{
font-size:20px;
text-align:center;
margin:20px 0;
min-height:120px;
}

button{
padding:14px;
margin:8px;
border:none;
border-radius:12px;
cursor:pointer;
background:#2563eb;
color:white;
width:100%;
}

.secondary{
background:#374151;
}

.breath-circle{
width:140px;
height:140px;
border-radius:50%;
background:radial-gradient(circle,#60a5fa,#2563eb);
margin:20px auto;
transition:transform 4s ease-in-out;
}

</style>

</head>

<body>

<div id="app">

<div id="logo">KaMiZen</div>

<div id="subtitle">Entrenamiento mental diario</div>

<div id="mental-panel">

<div id="streak">Racha: 0 días</div>

<div id="level">Nivel KaMiZen: 1</div>

Disciplina
<div class="bar">
<div id="disciplina-bar" class="bar-fill"></div>
</div>

Claridad
<div class="bar">
<div id="claridad-bar" class="bar-fill"></div>
</div>

Calma
<div class="bar">
<div id="calma-bar" class="bar-fill"></div>
</div>

</div>

<div id="block">
Bienvenido a tu sesión KaMiZen
</div>

<button id="start-btn">Iniciar Sesión</button>

<button id="next-btn" style="display:none">Siguiente</button>

<button id="restart-btn" class="secondary" style="display:none">
Reiniciar
</button>

</div>

<script src="/static/scripts.js"></script>

</body>
</html>
