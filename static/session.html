<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAMIZEN | SESSION PRO</title>

<style>
:root{
    --neon:#00f2ff;
    --bg:#000;
    --panel:rgba(0,15,30,0.92);
    --good:rgba(0,255,100,0.25);
    --bad:rgba(255,0,0,0.25);
}

body{
    margin:0;
    background:var(--bg);
    font-family:Arial;
    color:var(--neon);
    overflow:hidden;
}

/* MAIN */
#app{
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    position:relative;
}

/* BREATH */
#circle{
    width:90px;
    height:90px;
    border-radius:50%;
    background:rgba(0,242,255,0.2);
    box-shadow:0 0 40px var(--neon);
    transition:transform 2.5s ease-in-out, opacity 1s ease;
}

/* MESSAGE */
#message{
    position:absolute;
    bottom:200px;
    width:90%;
    max-width:800px;
    padding:18px;
    background:var(--panel);
    border:1px solid var(--neon);
    text-align:center;
    min-height:120px;
    font-size:18px;
}

/* OPTIONS (3 visible always) */
#options{
    position:absolute;
    bottom:80px;
    width:90%;
    max-width:800px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

button{
    padding:14px;
    background:transparent;
    border:1px solid var(--neon);
    color:var(--neon);
    font-weight:bold;
    cursor:pointer;
    font-size:14px;
}

button:hover{
    background:var(--neon);
    color:#000;
}

/* TOP */
#controls{
    position:absolute;
    top:10px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 10px;
}

.ctrl-btn{
    font-size:12px;
    padding:6px 10px;
}

/* SILENCE */
#silence{
    position:absolute;
    top:55px;
    font-size:12px;
    opacity:0.8;
}

/* LANGUAGE */
#langBox{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
}

.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    opacity:0;
    pointer-events:none;
    transition:0.4s;
    z-index:10;
}

.overlay.good{ background:var(--good); }
.overlay.bad{ background:var(--bad); }

</style>
</head>

<body>

<div id="app">

    <!-- OVERLAY FEEDBACK -->
    <div id="overlay" class="overlay"></div>

    <!-- CONTROLS -->
    <div id="controls">
        <button onclick="back()">BACK</button>
        <button onclick="skip()">SKIP</button>
        <button onclick="restart()">RESET</button>
    </div>

    <!-- LANGUAGE -->
    <div id="langBox">
        <button onclick="toggleLang()">EN / ES</button>
    </div>

    <!-- SILENCE -->
    <div id="silence">SILENCE: <span id="silenceLevel">0</span>s</div>

    <!-- BREATH -->
    <div id="circle"></div>

    <!-- MESSAGE -->
    <div id="message" onclick="start()">TOUCH TO START</div>

    <!-- OPTIONS -->
    <div id="options"></div>

</div>

<script>

/* ================= STATE ================= */
let session_id = null;
let history = [];
let lang = "en";
let loading = false;

/* ================= AUDIO ================= */
const audio = new (window.AudioContext || window.webkitAudioContext)();

function sound(type){

    const o = audio.createOscillator();
    const g = audio.createGain();

    o.connect(g);
    g.connect(audio.destination);

    o.type="sine";

    if(type==="ok"){ o.frequency.value=520; g.gain.value=0.2; }
    if(type==="fail"){ o.frequency.value=120; g.gain.value=0.3; }
    if(type==="click"){ o.frequency.value=300; g.gain.value=0.1; }
    if(type==="win"){ o.frequency.value=880; g.gain.value=0.25; }
    if(type==="crash"){ o.frequency.value=60; g.gain.value=0.4; }

    o.start();
    o.stop(audio.currentTime+0.25);
}

/* ================= START ================= */
async function start(){

    if(audio.state==="suspended") await audio.resume();

    const res = await fetch("/start",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({profile:{lang}})
    });

    const data = await res.json();

    session_id = data.session_id;
    history = [];

    render(data);
}

/* ================= SEND ================= */
async function send(code){

    if(loading) return;
    loading = true;

    const res = await fetch("/judge",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ session_id, decision:code })
    });

    const data = await res.json();

    history.push(data);

    showFeedback(data);

    render(data);

    loading = false;
}

/* ================= FEEDBACK ================= */
function showFeedback(data){

    const overlay = document.getElementById("overlay");

    let correct = true;

    if(data?.story?.options){
        const opt = data.story.options.find(o=>o.code);
        if(opt && opt.correct===false) correct=false;
    }

    overlay.className = "overlay " + (correct ? "good" : "bad");
    overlay.style.opacity = 1;

    sound(correct ? "win" : "crash");

    setTimeout(()=>{
        overlay.style.opacity = 0;
    },700);
}

/* ================= RENDER ================= */
function render(data){

    if(!data || !data.story) return;

    const s = data.story;

    const msg = document.getElementById("message");

    msg.innerText =
        (s.text && (s.text[lang] || s.text.en)) ||
        s.question ||
        "..."

    document.getElementById("options").innerHTML = "";

    /* BREATH SYSTEM */
    if(s.type==="breathing"){
        startBreath(s);
    } else {
        stopBreath();
    }

    /* SILENCE */
    if(s.type==="silence_challenge"){
        document.getElementById("silenceLevel").innerText =
            s.duration_sec || 20;
    } else {
        document.getElementById("silenceLevel").innerText = "0";
    }

    /* OPTIONS ALWAYS 3 */
    let opts = s.options || [];

    while(opts.length < 3){
        opts.push({code:"TDB", text:{en:"CONTINUE",es:"CONTINUAR"}});
    }

    opts.slice(0,3).forEach(o=>{
        const b=document.createElement("button");
        b.innerText=o.text?.[lang] || "OK";
        b.onclick=()=>send(o.code);
        document.getElementById("options").appendChild(b);
    });

    sound("ok");
}

/* ================= BREATH ================= */
let breathInterval;

function startBreath(s){

    const c=document.getElementById("circle");

    let i=0;
    clearInterval(breathInterval);

    breathInterval=setInterval(()=>{

        const phase = Math.sin(i);

        const scale = 1 + phase*0.8;

        c.style.transform = `scale(${scale})`;
        c.style.opacity = 0.4 + (phase+1)/4;

        i+=0.4;

    },200);
}

function stopBreath(){
    clearInterval(breathInterval);
    document.getElementById("circle").style.transform="scale(1)";
}

/* ================= SILENCE GUIDED ================= */
setInterval(()=>{

    const phrases = [
        "POWER",
        "CALM",
        "LOVE",
        "ENERGY",
        "PEACE",
        "AWARENESS"
    ];

    if(Math.random()>0.7){
        document.getElementById("message").innerText =
            phrases[Math.floor(Math.random()*phrases.length)];
    }

},4000);

/* ================= CONTROLS ================= */
function skip(){ sound("click"); send("TDB"); }

function back(){
    if(history.length<2) return;
    sound("click");
    const prev = history[history.length-2];
    render(prev);
    history.pop();
}

function restart(){ sound("fail"); location.reload(); }

function toggleLang(){
    lang = (lang==="en") ? "es" : "en";
}

/* SAFETY VISUAL LOOP */
setInterval(()=>{
    const c=document.getElementById("circle");
    c.style.opacity = 0.4 + Math.random()*0.4;
},2500);

</script>

</body>
</html>
