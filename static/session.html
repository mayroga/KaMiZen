<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KaMiZen</title>

<style>

body{

background:#020617;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

#app{

width:420px;
background:#111827;
padding:20px;
border-radius:20px;
text-align:center;

}

#circle{

width:150px;
height:150px;
border-radius:50%;
background:radial-gradient(circle,#60a5fa,#2563eb);
margin:20px auto;
transition:transform 4s ease-in-out;

}

button{

padding:10px;
margin:5px;
width:80%;

}

.bar{

height:6px;
background:#1e293b;
margin:5px;

}

.fill{

height:6px;
background:#22c55e;
width:40%;

}

</style>

</head>

<body>

<div id="app">

<h2>KaMiZen</h2>

<div id="streak">Racha 0</div>

<div id="level">Nivel 1</div>

Disciplina
<div class="bar"><div id="disciplina-bar" class="fill"></div></div>

Claridad
<div class="bar"><div id="claridad-bar" class="fill"></div></div>

Calma
<div class="bar"><div id="calma-bar" class="fill"></div></div>

<div id="circle"></div>

<div id="block">

Bienvenido a KaMiZen

</div>

<button id="start-btn">Iniciar</button>

<button id="next-btn" style="display:none">Siguiente</button>

<button id="restart-btn" style="display:none">Reiniciar</button>

</div>

<script src="/static/scripts.js"></script>

</body>
</html>
