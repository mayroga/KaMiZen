<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MAYKAMI | NEUROGAME</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-gold: #f1c40f;
            --neon-green: #2ecc71;
            --neon-red: #e74c3c;
            --bg-dark: #050505;
        }

        body { 
            margin: 0; overflow: hidden; 
            background: var(--bg-dark); 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
        }

        #ui-layer {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 10px;
            z-index: 100; pointer-events: none;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.6);
            border-left: 4px solid var(--neon-blue);
            padding: 10px 20px;
            min-width: 200px;
            backdrop-filter: blur(5px);
        }

        .stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: #aaa; }
        .stat-value { font-size: 24px; font-weight: 900; display: block; }

        canvas { display: block; cursor: none; }

        #msg-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; text-align: center;
        }

        .btn-reboot {
            margin-top: 30px; padding: 15px 40px;
            background: var(--neon-blue); border: none;
            color: #000; font-weight: bold; cursor: pointer;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="ui-layer">
    <div class="stat-card" style="border-color: var(--neon-gold);">
        <span class="stat-label">CAPITAL</span>
        <span id="val-money" class="stat-value">0</span>
    </div>
    <div class="stat-card" style="border-color: var(--neon-green);">
        <span class="stat-label">ESTABILIDAD</span>
        <span id="val-health" class="stat-value">100%</span>
    </div>
    <div class="stat-card" style="border-color: var(--neon-blue);">
        <span class="stat-label">NEGOCIOS</span>
        <span id="val-biz" class="stat-value">0</span>
    </div>
</div>

<div id="msg-overlay">
    <h1 id="final-status" style="font-size: 40px; color: var(--neon-blue);">SESIÓN COMPLETADA</h1>
    <p id="final-msg" style="max-width: 500px; margin-top: 20px; line-height: 1.6;"></p>
    <button class="btn-reboot" onclick="location.reload()">REINICIAR INTERFAZ</button>
</div>

<canvas id="neuroCanvas"></canvas>

<script>
const canvas = document.getElementById('neuroCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameActive = true;
let stats = { money: 0, health: 100, biz: 0 };

const player = {
    x: canvas.width / 2,
    y: canvas.height - 100,
    w: 60,
    h: 20,
    color: '#00f2ff'
};

const items = [];
const config = [
    { label: 'CAPITAL', emoji: '💰', val: 100, type: 'money', color: '#f1c40f' },
    { label: 'NEGOCIO', emoji: '🤝', val: 1, type: 'biz', color: '#3498db' },
    { label: 'FAMILIA', emoji: '🏠', val: 15, type: 'health', color: '#2ecc71' },
    { label: 'PAZ', emoji: '😊', val: 10, type: 'health', color: '#9b59b6' },
    { label: 'AMENAZA', emoji: '⚠️', val: -25, type: 'threat', color: '#e74c3c' },
    { label: 'STRESS', emoji: '🛑', val: -15, type: 'health', color: '#95a5a6' }
];

function spawn() {
    if(!gameActive) return;
    const c = config[Math.floor(Math.random() * config.length)];
    items.push({
        x: Math.random() * (canvas.width - 100) + 50,
        y: -50,
        speed: 3 + Math.random() * 4,
        ...c
    });
}

function update() {
    if (!gameActive) return;

    items.forEach((item, i) => {
        item.y += item.speed;

        // Detección de Colisión Proporcional
        if (item.y > player.y - 20 && item.y < player.y + 20 &&
            item.x > player.x - 40 && item.x < player.x + 40) {
            
            applyEffect(item);
            items.splice(i, 1);
        }

        if (item.y > canvas.height) items.splice(i, 1);
    });

    if (Math.random() < 0.03) spawn();
    if (stats.health <= 0) endGame("SISTEMA COLAPSADO", "El exceso de presión o falta de paz detuvo tu crecimiento. El equilibrio es la clave.");
    if (stats.money >= 2000) endGame("ÉXITO ALCANZADO", "Has logrado capitalizar sin perder tu centro. Nivel de consciencia: Superior.");
}

function applyEffect(item) {
    if (item.type === 'money') stats.money += item.val;
    if (item.type === 'biz') stats.biz += item.val;
    if (item.type === 'health' || item.type === 'threat') {
        stats.health = Math.min(100, stats.health + item.val);
    }
    
    document.getElementById('val-money').innerText = stats.money;
    document.getElementById('val-health').innerText = stats.health + "%";
    document.getElementById('val-biz').innerText = stats.biz;
}

function draw() {
    ctx.fillStyle = 'rgba(5, 5, 5, 0.2)'; // Estela de movimiento
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Dibujar Jugador (Puntero Neón)
    ctx.shadowBlur = 15;
    ctx.shadowColor = player.color;
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x - 30, player.y, 60, 4);

    // Dibujar Palabras Flotantes
    items.forEach(item => {
        ctx.shadowBlur = 10;
        ctx.shadowColor = item.color;
        ctx.fillStyle = item.color;
        ctx.font = "900 14px Orbitron";
        ctx.fillText(item.label, item.x - 20, item.y - 10);
        ctx.font = "30px Arial";
        ctx.fillText(item.emoji, item.x - 15, item.y + 20);
    });
}

function endGame(title, msg) {
    gameActive = false;
    document.getElementById('msg-overlay').style.display = 'flex';
    document.getElementById('final-status').innerText = title;
    document.getElementById('final-msg').innerText = msg;
}

// Control por Mouse/Touch
window.addEventListener('mousemove', e => {
    player.x = e.clientX;
});

window.addEventListener('touchmove', e => {
    player.x = e.touches[0].clientX;
});

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
