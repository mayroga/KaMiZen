<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | SURVIVAL PRO SYSTEM</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #001a33, #000);
    color: #fff;
    font-family: Arial;
    text-align: center;
    overflow: hidden;
    cursor: crosshair;
}

/* TOP BAR */
#topbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: rgba(0,0,0,0.3);
}

/* GAME */
#game { padding-top: 80px; }

/* BUTTONS */
button {
    padding: 14px 20px;
    border: 2px solid #00f2ff;
    background: rgba(0,242,255,0.1);
    color: white;
    border-radius: 12px;
    cursor: pointer;
}

/* BREATH */
#breath {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, #00f2ff, #0044ff);
    margin: 20px auto;
    display: none;
    box-shadow: 0 0 30px #00f2ff;
    transition: transform 4s ease-in-out;
}

/* FLOATING WORDS */
.floating-word {
    position: absolute;
    padding: 10px 16px;
    border-radius: 16px;
    font-weight: bold;
    cursor: pointer;
    animation: floatUp 4.5s linear forwards;
}

.good { color:#00ff00; border:2px solid #00ff00; }
.bad { color:#ff0000; border:2px solid #ff0000; }
.neutral { color:#ffff00; border:2px solid #ffff00; }

@keyframes floatUp {
    from { transform: translateY(110vh); }
    to { transform: translateY(-20vh); }
}

/* 💥 EXPLOSION MÁS FUERTE */
.blast {
    animation: explode 0.25s forwards;
}

@keyframes explode {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(6); opacity: 0; }
}

/* TEXT */
#story { font-size: 1.4rem; margin: 20px; font-weight: bold; }
#analysis { color: #00f2ff; }

#explanation-box {
    background: rgba(0,0,0,0.85);
    border-left: 4px solid #00f2ff;
    padding: 15px;
    width: 80%;
    margin: 20px auto;
    display: none;
}
</style>
</head>

<body>

<div id="topbar">
    <button onclick="toggleLang()">EN/ES</button>
    <div id="score-display">ENERGY: 0</div>
</div>

<div id="game">

    <h2 id="hero-name">KAMIZEN</h2>

    <!-- 🌬️ BREATH SYSTEM -->
    <div id="breath"></div>

    <div id="story">Loading...</div>
    <div id="analysis"></div>

    <div id="explanation-box"></div>
    <div id="options"></div>
</div>

<!-- 🔊 SONIDOS -->
<audio id="glass" src="/static/sounds/glass.mp3"></audio>
<audio id="noise" src="/static/sounds/noise.mp3"></audio>

<script>

/* =========================
   STATE
========================= */
let score = 0;

/* =========================
   WORDS
========================= */
const WORDS = [
    {w:"SURVIVAL",v:15,impact:"good"},
    {w:"ESCAPE",v:15,impact:"good"},
    {w:"AWARENESS",v:12,impact:"good"},

    {w:"FEAR",v:-12,impact:"bad"},
    {w:"PANIC",v:-15,impact:"bad"},
    {w:"DANGER",v:-10,impact:"bad"}
];

/* =========================
   BREATH SYSTEM 🌬️
========================= */
function startBreath() {
    const b = document.getElementById("breath");
    b.style.display = "block";

    let grow = true;

    setInterval(() => {
        b.style.transform = grow ? "scale(2.2)" : "scale(1)";
        grow = !grow;
    }, 4000);
}

/* =========================
   SOUND SYSTEM 🔊
========================= */
function playSound(type){
    if(type === "good"){
        document.getElementById("glass").currentTime = 0;
        document.getElementById("glass").play();
    } else {
        document.getElementById("noise").currentTime = 0;
        document.getElementById("noise").play();
    }
}

/* =========================
   FLOATING WORDS ⚡
========================= */
function spawnWord(){

    const w = WORDS[Math.floor(Math.random()*WORDS.length)];

    const el = document.createElement("div");
    el.className = "floating-word " + w.impact;
    el.innerText = w.w;
    el.style.left = Math.random()*90 + "vw";

    el.onclick = () => {

        score += w.v;

        playSound(w.impact === "good" ? "good" : "bad");

        el.classList.add("blast");

        document.getElementById("analysis").innerText =
            w.impact === "good"
            ? `${w.w} strengthens survival awareness`
            : `${w.w} triggers risk behavior`;

        document.getElementById("score-display").innerText =
            "ENERGY: " + score;

        setTimeout(()=>el.remove(), 250);
    };

    document.body.appendChild(el);

    setTimeout(()=>el.remove(), 4500);
}

/* =========================
   LOOP
========================= */
setInterval(spawnWord, 900);

/* =========================
   INIT
========================= */
startBreath();

</script>

</body>
</html>
