<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KaMiZen | Neuro-Entrenamiento de Vida</title>
    <style>
        :root {
            --zen-cyan: #00f2ff;
            --caution-gold: #f1c40f;
            --danger-red: #ff3131;
            --honor-green: #2ecc71;
            --void-black: #050508;
        }
        body { 
            margin: 0; overflow: hidden; background: var(--void-black); 
            color: white; font-family: 'Orbitron', sans-serif; touch-action: none;
        }
        
        /* HUD - Conciencia de Recursos */
        #hud {
            position: absolute; top: 15px; width: 100%;
            display: flex; justify-content: space-evenly; z-index: 100;
        }
        .stat-card {
            background: rgba(0, 0, 0, 0.85); border-left: 4px solid var(--zen-cyan);
            padding: 8px 15px; min-width: 100px;
        }
        .stat-label { font-size: 9px; color: var(--zen-cyan); display: block; }
        .stat-value { font-size: 18px; font-weight: 900; }

        /* Escenario de Vida */
        #stage {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 30px;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050508 100%);
        }

        #action-text { font-size: 2rem; text-transform: uppercase; margin-bottom: 10px; text-shadow: 0 0 15px var(--zen-cyan); }
        #context-text { font-size: 1.1rem; color: #cbd5e0; max-width: 600px; line-height: 1.6; margin-bottom: 30px; }

        /* Botones de Acción Crítica */
        .choice-stack { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 450px; }
        .btn-choice {
            padding: 18px; background: rgba(255,255,255,0.05); border: 1px solid var(--zen-cyan);
            color: white; font-family: 'Orbitron'; font-weight: 600; cursor: pointer;
            transition: all 0.3s; position: relative; overflow: hidden;
        }
        .btn-choice:hover { background: var(--zen-cyan); color: black; }

        /* Simulador de Amenazas (Obstáculos en movimiento) */
        #threat-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 10; opacity: 0.6; }

        /* Respiración de Reseteo (El ancla) */
        #anchor-wrap { display: none; text-align: center; }
        #anchor-circle {
            width: 180px; height: 180px; border: 8px solid var(--zen-cyan);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 40px var(--zen-cyan); transition: transform 2s ease-in-out;
        }

        .hidden { display: none !important; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="hud">
    <div class="stat-card"><span class="stat-label">CAPITAL DE VIDA</span><span id="v-assets" class="stat-value">$0</span></div>
    <div class="stat-card" style="border-color: var(--caution-gold)"><span class="stat-label">RESILIENCIA</span><span id="v-health" class="stat-value">100%</span></div>
    <div class="stat-card" style="border-color: var(--danger-red)"><span class="stat-label">ALERTA</span><span id="v-alert" class="stat-value">BAJA</span></div>
</div>

<canvas id="threat-canvas"></canvas>

<div id="stage">
    <h1 id="action-text">Iniciando KaMiZen</h1>
    <p id="context-text">El mundo no se detiene. Tu mente es tu único refugio y tu mejor arma. Identifícate para entrar al campo de entrenamiento.</p>
    
    <div id="setup-area">
        <input type="text" id="user-name" placeholder="NOMBRE DEL APRENDIZ" style="background:transparent; border:2px solid var(--zen-cyan); color:white; padding:15px; font-family:'Orbitron'; text-align:center; width:280px; outline:none;">
        <br><br>
        <button id="init-btn" class="btn-choice" style="width: 315px; background: var(--zen-cyan); color: black;">COMENZAR DESAFÍO</button>
    </div>

    <div id="interaction-area" class="hidden">
        <div class="choice-stack" id="choice-container"></div>
    </div>

    <div id="anchor-wrap">
        <div id="anchor-circle"><span id="anchor-label" style="font-weight: 900;">INHALA</span></div>
        <p id="anchor-desc" style="margin-top: 20px; color: var(--caution-gold);"></p>
    </div>
</div>

<script>
    let state = { name: "", money: 10, health: 100, alert: "NORMAL" };
    let synth = window.speechSynthesis;

    const ui = {
        action: document.getElementById('action-text'),
        context: document.getElementById('context-text'),
        setup: document.getElementById('setup-area'),
        interact: document.getElementById('interaction-area'),
        choices: document.getElementById('choice-container'),
        anchor: document.getElementById('anchor-wrap'),
        circle: document.getElementById('anchor-circle'),
        label: document.getElementById('anchor-label'),
        assets: document.getElementById('v-assets'),
        health: document.getElementById('v-health')
    };

    function speak(txt) {
        synth.cancel();
        let utterance = new SpeechSynthesisUtterance(txt);
        utterance.rate = 0.9;
        utterance.pitch = 0.8;
        synth.speak(utterance);
    }

    document.getElementById('init-btn').onclick = async () => {
        state.name = document.getElementById('user-name').value || "Aprendiz";
        ui.setup.classList.add('hidden');
        ui.interact.classList.remove('hidden');
        runTrainingCycle();
    };

    async function runTrainingCycle() {
        // Escenario 1: Seguridad Inmediata (El entorno)
        await processScenario(
            "CRUZANDO LA CALLE",
            `${state.name}, vas camino a la escuela. Ves un helado al otro lado de la calle, pero el semáforo está en amarillo y un auto viene rápido. ¿Qué haces?`,
            [
                { t: "Correr para llegar rápido", c: false, ex: "ERROR. Priorizaste un deseo impulsivo sobre tu vida. El riesgo fue fatal.", h: -40, m: 0 },
                { t: "Esperar y observar el entorno", c: true, ex: "BIEN. El helado puede esperar, tu vida no. Paciencia es poder.", h: 0, m: 10 }
            ]
        );

        // Reset emocional (Respiración)
        await runBreathing("DOMINA TU IMPULSO", "La gratificación inmediata es una trampa. Respira para recuperar el control.");

        // Escenario 2: Relaciones y Respeto (Bullying/Conflicto)
        await processScenario(
            "DESAFÍO SOCIAL",
            "Un compañero se burla de tus zapatos frente a otros. Sientes el calor en tu pecho. Todos esperan que reacciones.",
            [
                { t: "Responder con un insulto", c: false, ex: "PERDISTE. Te pusiste a su nivel. Le diste el poder de controlar tus emociones.", h: -20, m: 0 },
                { t: "Mantener calma y retirarte", c: true, ex: "VICTORIA. Tu paz no está en venta. El silencio del fuerte aturde al débil.", h: 10, m: 50 }
            ]
        );
        
        // Escenario 3: Finanzas y Prioridades (Oportunidad vs Amenaza)
        await processScenario(
            "EL CAPITAL DE MAÑANA",
            "Tienes $100. Quieres el juego de moda, pero tus zapatos están rotos y te hacen daño al caminar. ¿Cómo usas tu activo?",
            [
                { t: "Comprar el juego (Placer)", c: false, ex: "MAL. Caminarás con dolor por un placer efímero. Eso no es KaMiZen.", h: -10, m: -100 },
                { t: "Arreglar tus zapatos (Necesidad)", c: true, ex: "EXCELENTE. El respeto por ti mismo empieza por cuidar tus herramientas de vida.", h: 20, m: -40 }
            ]
        );

        showFinalReport();
    }

    async function processScenario(title, context, options) {
        ui.action.innerText = title;
        ui.context.innerText = context;
        ui.choices.innerHTML = "";
        speak(context);

        return new Promise(resolve => {
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn-choice';
                btn.innerText = opt.t;
                btn.onclick = async () => {
                    ui.choices.innerHTML = "";
                    ui.context.innerText = opt.ex;
                    speak(opt.ex);
                    state.health += opt.h;
                    state.money += opt.m;
                    updateHUD();
                    await new Promise(r => setTimeout(r, 4000));
                    resolve();
                };
                ui.choices.appendChild(btn);
            });
        });
    }

    async function runBreathing(title, desc) {
        ui.interact.classList.add('hidden');
        ui.anchor.style.display = "block";
        ui.action.innerText = title;
        document.getElementById('anchor-desc').innerText = desc;
        speak(desc);

        for(let i=0; i<3; i++) {
            ui.label.innerText = "INHALA FUERZA";
            ui.circle.style.transform = "scale(1.4)";
            await new Promise(r => setTimeout(r, 3000));
            ui.label.innerText = "EXHALA MIEDO";
            ui.circle.style.transform = "scale(1.0)";
            await new Promise(r => setTimeout(r, 3000));
        }
        ui.anchor.style.display = "none";
        ui.interact.classList.remove('hidden');
    }

    function updateHUD() {
        ui.assets.innerText = "$" + state.money;
        ui.health.innerText = Math.max(0, state.health) + "%";
        if(state.health < 50) ui.health.style.color = "var(--danger-red)";
    }

    function showFinalReport() {
        ui.action.innerText = "DIAGNÓSTICO KAMIZEN";
        let rank = state.health > 80 ? "SENSEI" : "APRENDIZ EN RIESGO";
        ui.context.innerText = `${state.name}, tu Resiliencia es de ${state.health}%. \nTu capacidad de enfrentar la vida se basa en tu DISCIPLINA, no en tu suerte. Regresa cuando estés listo para elevar tu nivel.`;
        speak(ui.context.innerText);
    }
</script>
</body>
</html>
