<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AL CIELO | AURA BY MAY ROGA</title>
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #000;
            --accent: #ff00ff;
            --panel: rgba(0, 15, 30, 0.95);
            --danger: #ff4444;
            --success: #33ff33;
            --warning: #ffcc00;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--neon);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-transform: uppercase;
        }

        #app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #001a1a 0%, #000 80%);
            position: relative;
        }

        #header {
            position: absolute;
            top: 20px;
            width: 90%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #category-tag {
            font-size: 14px;
            letter-spacing: 5px;
            margin-bottom: 15px;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
            font-weight: bold;
            text-align: center;
        }

        #stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
        }

        .box {
            border: 1px solid var(--neon);
            background: rgba(0, 242, 255, 0.05);
            padding: 10px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.1);
        }

        .label { font-size: 9px; display: block; margin-bottom: 5px; opacity: 0.7; }
        .val { font-size: 22px; font-weight: bold; font-family: 'Courier New', monospace; }

        #breathing-circle {
            width: 140px;
            height: 140px;
            border: 4px solid var(--neon);
            border-radius: 50%;
            margin: 20px auto;
            display: none;
            box-shadow: 0 0 20px var(--neon);
            transition: transform 4s ease-in-out, background 4s ease-in-out;
        }

        .inhale { transform: scale(1.8); background: rgba(0, 242, 255, 0.2); }
        .exhale { transform: scale(0.8); background: transparent; }

        #message-container {
            width: 85%;
            max-width: 850px;
            margin: 20px 0;
            text-align: center;
        }

        #timer {
            font-size: 45px;
            color: var(--accent);
            margin-bottom: 10px;
            display: none;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 15px var(--accent);
        }

        #message {
            min-height: 180px;
            padding: 25px;
            border: 2px solid var(--neon);
            background: var(--panel);
            font-size: 18px;
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
            margin-bottom: 20px;
            cursor: pointer;
            overflow-y: auto;
        }

        #options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 85%;
            max-width: 850px;
        }

        .opt-btn {
            padding: 18px;
            border: 1px solid var(--neon);
            background: transparent;
            color: var(--neon);
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .opt-btn:hover { background: var(--neon); color: var(--bg); box-shadow: 0 0 15px var(--neon); }

        #feedback-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
            display: none;
        }

        .impact-red { background: rgba(255, 0, 0, 0.3); animation: flash 0.3s; }
        .impact-green { background: rgba(0, 255, 0, 0.3); animation: flash 0.3s; }
        
        @keyframes flash { from { opacity: 1; } to { opacity: 0; } }

        #controls { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; }
        .btn-ctrl { border: 1px solid var(--accent); color: var(--accent); font-size: 10px; padding: 8px 15px; background: transparent; cursor: pointer; }
        #speaker-icon { position: absolute; bottom: 20px; left: 20px; font-size: 24px; cursor: pointer; opacity: 0.6; }
        #clear-btn { border-color: var(--danger); color: var(--danger); font-weight: bold; }

        @media (max-width: 600px) {
            #stats { grid-template-columns: repeat(2, 1fr); }
            #options-container { grid-template-columns: 1fr; }
            #message { font-size: 15px; min-height: 140px; }
        }
    </style>
</head>
<body>

<div id="feedback-overlay"></div>

<div id="app">
    <div id="header">
        <div id="category-tag">AL CIELO | AURA PROTOCOL</div>
        <div id="stats">
            <div class="box"><span class="label">MENTAL</span><span id="mental" class="val">100</span></div>
            <div class="box"><span class="label">SOCIAL</span><span id="social" class="val">100</span></div>
            <div class="box"><span class="label">KARMA</span><span id="karma" class="val">0</span></div>
            <div class="box"><span class="label">DISCIPLINA</span><span id="disc" class="val">100</span></div>
        </div>
    </div>

    <div id="message-container">
        <div id="timer">00:00</div>
        <div id="breathing-circle"></div>
        <div id="message" onclick="startOrContinue()">
            SISTEMA EN ESPERA...<br>
            [ TOCAR PARA CONECTAR ]
        </div>
    </div>

    <div id="options-container"></div>

    <div id="speaker-icon" onclick="toggleVoice()">🔊</div>

    <div id="controls">
        <button id="clear-btn" class="btn-ctrl" onclick="resetApp()">BORRAR DATOS</button>
        <button class="btn-ctrl" onclick="toggleLanguage()">ES / EN</button>
    </div>
</div>

<script>
    let session_id = localStorage.getItem("aura_sid");
    let current_lang = localStorage.getItem("aura_lang") || "es";
    let voice_enabled = true;
    let timer_interval = null;
    let is_loading = false;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
        if (!type || audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        if (type === "explosion") {
            osc.type = "sawtooth";
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            triggerVisualImpact("red");
        } else if (type === "lottery") {
            osc.type = "sine";
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            triggerVisualImpact("green");
        }
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    }

    function triggerVisualImpact(color) {
        const overlay = document.getElementById("feedback-overlay");
        overlay.className = color === "red" ? "impact-red" : "impact-green";
        overlay.style.display = "block";
        setTimeout(() => overlay.style.display = "none", 300);
    }

    async function startOrContinue() {
        if (is_loading) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();

        if (!session_id) {
            is_loading = true;
            try {
                const res = await fetch("/start", {
                    method: "POST",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({ profile: { lang: current_lang } })
                });
                const data = await res.json();
                session_id = data.session_id;
                localStorage.setItem("aura_sid", session_id);
                updateUI(data);
            } catch (e) {
                console.error("Connection Error", e);
                document.getElementById("message").innerText = "ERROR DE CONEXIÓN. REINTENTANDO...";
            } finally {
                is_loading = false;
            }
        }
    }

    async function handleChoice(code) {
        if (is_loading) return;
        is_loading = true;
        
        try {
            const res = await fetch("/judge", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ session_id, decision: code })
            });
            const data = await res.json();
            
            if (data.status === "wait" || data.status === "cooldown") {
                is_loading = false;
                return;
            }
            
            if (data.story && data.story.feedback_audio) {
                playSound(data.story.feedback_audio);
            }
            
            updateUI(data);
        } catch (e) {
            console.error("Judge Error", e);
        } finally {
            is_loading = false;
        }
    }

    function updateUI(data) {
        if (!data.state || !data.story) return;
        resetVisuals(); // Limpiar todo antes de pintar lo nuevo

        document.getElementById("mental").innerText = data.state.mental;
        document.getElementById("social").innerText = data.state.social;
        document.getElementById("karma").innerText = data.state.karma;
        document.getElementById("disc").innerText = data.state.discipline;

        const story = data.story;
        const text = current_lang === "en" ? story.text_en : story.text_es;
        document.getElementById("message").innerText = text;
        document.getElementById("category-tag").innerText = story.category;

        if (voice_enabled) speak(text);

        if (story.type.includes("breathing")) {
            startBreathing(story.duration_sec);
        } else if (story.type === "silence_challenge") {
            startSilence(story.duration_sec);
        } else if (story.type === "riddle") {
            renderRiddle(story);
        } else {
            renderOptions(story.options);
        }
    }

    function renderOptions(options) {
        const container = document.getElementById("options-container");
        container.innerHTML = "";
        
        const opts = (options && options.length > 0) ? options : [{ code: "TDB", text: { en: "CONTINUE", es: "CONTINUAR" } }];
        
        opts.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "opt-btn";
            btn.innerText = current_lang === "en" ? (opt.text.en || opt.text.es) : (opt.text.es || opt.text.en);
            btn.onclick = () => handleChoice(opt.code);
            container.appendChild(btn);
        });
    }

    function renderRiddle(story) {
        const container = document.getElementById("options-container");
        container.innerHTML = "";
        const btn = document.createElement("button");
        btn.className = "opt-btn";
        btn.style.gridColumn = "1 / span 2";
        btn.innerText = current_lang === "en" ? "REVEAL TRUTH" : "REVELAR VERDAD";
        btn.onclick = () => {
            const ans = current_lang === "en" ? story.answer.en : story.answer.es;
            const ins = current_lang === "en" ? story.insight.en : story.insight.es;
            document.getElementById("message").innerText = ans + "\n\n" + ins;
            renderOptions([{ code: "TDB", text: { en: "UNDERSTOOD", es: "ENTENDIDO" } }]);
        };
        container.appendChild(btn);
    }

    function startBreathing(seconds) {
        const circle = document.getElementById("breathing-circle");
        circle.style.display = "block";
        let elapsed = 0;
        
        // Primera pulsación inmediata
        circle.classList.add("inhale");
        
        timer_interval = setInterval(() => {
            elapsed += 4;
            if (elapsed >= seconds) {
                clearInterval(timer_interval);
                handleChoice("TDB");
            } else {
                circle.classList.toggle("inhale");
                circle.classList.toggle("exhale");
            }
        }, 4000);
    }

    function startSilence(seconds) {
        const timerDiv = document.getElementById("timer");
        timerDiv.style.display = "block";
        let remaining = seconds;
        
        timer_interval = setInterval(() => {
            let mins = Math.floor(remaining / 60);
            let secs = remaining % 60;
            timerDiv.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            remaining--;
            if (remaining < 0) {
                clearInterval(timer_interval);
                handleChoice("TDB");
            }
        }, 1000);
    }

    function resetVisuals() {
        if (timer_interval) {
            clearInterval(timer_interval);
            timer_interval = null;
        }
        document.getElementById("breathing-circle").style.display = "none";
        document.getElementById("breathing-circle").classList.remove("inhale", "exhale");
        document.getElementById("timer").style.display = "none";
        document.getElementById("options-container").innerHTML = "";
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const ut = new SpeechSynthesisUtterance(text);
        ut.lang = current_lang === "en" ? "en-US" : "es-US";
        ut.rate = 0.95;
        window.speechSynthesis.speak(ut);
    }

    function toggleLanguage() {
        current_lang = current_lang === "en" ? "es" : "en";
        localStorage.setItem("aura_lang", current_lang);
        resetApp(); 
    }

    function toggleVoice() {
        voice_enabled = !voice_enabled;
        document.getElementById("speaker-icon").innerText = voice_enabled ? "🔊" : "🔇";
        if (!voice_enabled) window.speechSynthesis.cancel();
    }

    function resetApp() {
        localStorage.removeItem("aura_sid");
        location.reload();
    }

    // Auto-conectar si ya hay sesión
    if (session_id) {
        window.onload = startOrContinue;
    }
</script>
</body>
</html>
