<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAMIZEN | AL CIELO PRO</title>

<style>

/* ===================== CORE DARK SYSTEM (NO CHANGES AL FONDO) ===================== */
body {
    margin: 0;
    background: radial-gradient(circle, #001a33, #000); /* ❗ NO CAMBIADO */
    color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    user-select: none;
}

/* ===================== TOPBAR ===================== */
#topbar {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 12px 20px;
    z-index: 1000;
    background: rgba(0,0,0,0.75);
    border-bottom: 2px solid #00f2ff;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

#score-display {
    font-size: 1.9rem;
    font-weight: 900;
    color: #00f2ff;
    text-shadow: 0 0 12px #00f2ff;
}

/* 🔥 TIMER BIG (IMPORTANT FOR USER ATTENTION) */
#timer {
    font-size: 3rem;
    font-weight: 900;
    color: #ffffff;
    text-shadow: 0 0 15px #00f2ff;
    font-family: monospace;
}

/* ===================== GAME AREA ===================== */
#game {
    position: absolute;
    top: 70px;
    bottom: 120px;
    width: 100%;
    overflow: hidden;
}

/* ===================== FLOATING WORDS ===================== */
.floating {
    position: absolute;
    padding: 10px 22px;
    border-radius: 40px;
    font-weight: 900;
    cursor: pointer;
    animation: floatUp 5s linear forwards;
    background: rgba(0,0,0,0.5);
}

.word-good {
    color: #39ff14;
    border: 2px solid #39ff14;
    box-shadow: 0 0 12px #39ff14;
}

.word-bad {
    color: #ff3131;
    border: 2px solid #ff3131;
    box-shadow: 0 0 12px #ff3131;
}

.word-neutral {
    color: #ffdf00;
    border: 2px solid #ffdf00;
    box-shadow: 0 0 12px #ffdf00;
}

@keyframes floatUp {
    from { transform: translateY(110vh); }
    to { transform: translateY(-20vh); }
}

/* ===================== LEARNING ZONE ===================== */
#learning {
    display: none;
    position: absolute;
    top: 80px;
    width: 100%;
    text-align: center;
}

#story {
    font-size: 1.7rem;
    margin: 20px auto;
    max-width: 850px;
    color: #fff;
}

#analysis {
    font-size: 1.3rem;
    margin: 10px auto;
    max-width: 800px;
    color: #ccc;
}

/* ===================== BREATH SYSTEM ===================== */
#breath {
    width: 160px;
    height: 160px;
    margin: 25px auto;
    border-radius: 50%;
    background: radial-gradient(circle, #00f2ff, #0033ff);
    box-shadow: 0 0 40px #00f2ff;
    display: none;
    animation: breathe 6s infinite ease-in-out;
}

@keyframes breathe {
    0%,100% { transform: scale(0.8); opacity: 0.6; }
    50% { transform: scale(1.3); opacity: 1; }
}

/* ===================== EXPLANATION ===================== */
#explain {
    position: absolute;
    bottom: 140px;
    width: 100%;
    text-align: center;
    font-size: 1.2rem;
    color: #ffdf00;
}

/* ===================== CONTROLS (DARK ONLY) ===================== */
#controls {
    position: fixed;
    bottom: 15px;
    width: 100%;
    text-align: center;
}

button {
    padding: 12px 18px;
    margin: 6px;
    font-size: 15px;
    border-radius: 12px;
    border: 2px solid #00f2ff;
    background: rgba(0,0,0,0.6); /* ❗ DARK ONLY */
    color: #fff;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    box-shadow: 0 0 15px #00f2ff;
}

</style>
</head>

<body>

<!-- ===================== TOPBAR ===================== -->
<div id="topbar">
    <div id="score-display">POINTS: 0</div>
    <div id="timer">00:00</div>
</div>

<!-- ===================== GAME ===================== -->
<div id="game"></div>

<!-- ===================== LEARNING ===================== -->
<div id="learning">
    <div id="story"></div>
    <div id="analysis"></div>
    <div id="breath"></div>
</div>

<!-- ===================== EXPLANATION ===================== -->
<div id="explain"></div>

<!-- ===================== CONTROLS ===================== -->
<div id="controls">
    <button onclick="KamizenEngine.init()">START</button>
    <button onclick="KamizenEngine.changeLang()">ESP/ENG</button>
    <button onclick="KamizenEngine.reset()">RESET</button>
</div>

<!-- ===================== AUDIO ===================== -->
<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="win" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

<!-- ===================== ENGINE ===================== -->
<script src="/static/engine.js"></script>

</body>
</html>
