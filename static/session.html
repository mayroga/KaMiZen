<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | AL CIELO PRO</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #001a33, #000);
    color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    overflow: hidden;
    cursor: crosshair;
    transition: background 0.5s;
}

#topbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    z-index: 100;
    background: rgba(0,0,0,0.4);
}

#score-display {
    font-size: 1.4rem;
    font-weight: bold;
    color: #00f2ff;
    letter-spacing: 1px;
}

#game {
    padding-top: 90px;
    position: relative;
    z-index: 10;
}

#top-ui {
    display: flex;
    justify-content: space-around;
    font-weight: bold;
    font-size: 1.2rem;
    color: #00f2ff;
}

button {
    padding: 14px 22px;
    margin: 10px;
    font-size: 18px;
    border: 2px solid #00f2ff;
    background: rgba(0, 242, 255, 0.1);
    color: white;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.25s;
}

button:hover {
    background: #00f2ff;
    color: #000;
    box-shadow: 0 0 20px #00f2ff;
}

.opt-btn {
    display: block;
    width: 85%;
    max-width: 520px;
    margin: 12px auto;
    text-align: left;
}

#breath {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle, #00f2ff, #0066ff);
    margin: 25px auto;
    transition: transform 4s ease-in-out;
    box-shadow: 0 0 30px #00f2ff;
    display: none;
}

/* Floating Words */
.floating {
    position: absolute;
    padding: 8px 18px;
    border-radius: 20px;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    z-index: 50;
    animation: floatUp 5s linear forwards;
}

.word-good {
    color: #00ff00;
    border: 2px solid #00ff00;
    box-shadow: 0 0 15px #00ff00;
}

.word-bad {
    color: #ff0000;
    border: 2px solid #ff0000;
    box-shadow: 0 0 15px #ff0000;
}

.word-neutral {
    color: #ffff00;
    border: 2px solid #ffff00;
}

@keyframes floatUp {
    from { transform: translateY(110vh); }
    to { transform: translateY(-20vh); }
}

.blast {
    animation: burst 0.4s forwards;
    pointer-events: none;
}

@keyframes burst {
    to { transform: scale(4); opacity: 0; }
}

#explanation-box {
    background: rgba(0,0,0,0.85);
    border-left: 5px solid #00f2ff;
    padding: 20px;
    margin: 20px auto;
    width: 85%;
    display: none;
    font-size: 1.2rem;
    border-radius: 0 15px 15px 0;
}

#story {
    font-size: 1.6rem;
    margin: 20px;
    font-weight: bold;
}

#analysis {
    color: #00f2ff;
    font-style: italic;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<div id="topbar">
    <button onclick="toggleLang()">EN / ES</button>
    <div id="score-display">PUNTOS: 0</div>
</div>

<div id="game">
    <div id="top-ui">
        <div id="stat-focus">FOCUS: 100%</div>
        <div id="stat-life">ENERGY: ⚡⚡⚡</div>
    </div>

    <h2 id="hero-name"></h2>
    <div id="breath"></div>

    <div id="story">Cargando misión...</div>
    <div id="analysis"></div>

    <div id="explanation-box"></div>
    <div id="options"></div>
</div>

<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="ok" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

<script>
let lang = "en";
let missionId = 1;
let score = 0;
let silenceMinutes = 3;
let currentMissionData = null;

const player = { name: "", hero: "" };

const wordPool = {
    good: ["FOCUS","TRUTH","POWER","CONTROL","RESPECT"],
    bad: ["FEAR","LIE","LAZY","ANGER"],
    neutral: ["STREET","CITY","WALK","WAIT"]
};

async function init() {
    player.name = prompt("Tu nombre:") || "Player";
    player.hero = prompt("Tu héroe:") || "Kamizen";
    document.getElementById("hero-name").innerText = player.hero;

    startMusic();
    startFloating();
    loadNextMission();
}

function startMusic() {
    const bg = document.getElementById("bg");
    bg.volume = 0.35;
    bg.playbackRate = 1.1;
    bg.play().catch(()=>{});
}

function speak(text) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang === "en" ? "en-US" : "es-ES";
    u.rate = 0.9;
    speechSynthesis.speak(u);
}

function toggleLang() {
    lang = lang === "en" ? "es" : "en";
    if(currentMissionData) renderMission(currentMissionData);
}

async function loadNextMission() {
    try {
        const res = await fetch(`/api/mission/${missionId}`);
        if(!res.ok){ missionId = 1; return loadNextMission(); }
        currentMissionData = await res.json();
        renderMission(currentMissionData);
    } catch {
        console.log("Error misión");
    }
}

function renderMission(m) {
    const story = m.blocks.find(b=>b.type==="story").text[lang];
    const analysis = m.blocks.find(b=>b.type==="analysis").text[lang];
    const decision = m.blocks.find(b=>b.type==="decision");

    setText("story", story);
    setText("analysis", "");
    clearOptions();
    hide("explanation-box");
    hide("breath");

    speak(story);

    setTimeout(()=>{
        setText("analysis", analysis);
        speak(analysis);
    },3500);

    setTimeout(()=>{
        renderOptions(decision.options);
    },7000);
}

function renderOptions(options) {
    const c = document.getElementById("options");
    c.innerHTML = "";
    options.forEach(opt=>{
        const b = document.createElement("button");
        b.className = "opt-btn";
        b.innerText = opt.text[lang];
        b.onclick = ()=>handleChoice(opt);
        c.appendChild(b);
    });
}

function handleChoice(opt) {
    clearOptions();
    const box = document.getElementById("explanation-box");

    box.innerText = opt.explanation[lang];
    show("explanation-box");

    if(opt.correct){
        document.body.style.background = "#003300";
        score += 20;
        play("ok");
    } else {
        document.body.style.background = "#330000";
        score -= 10;
        play("bad");
    }

    updateScore();
    speak(box.innerText);

    setTimeout(()=>{
        document.body.style.background = "";
        startSilence();
    },6000);
}

function startSilence() {
    show("breath");
    setText("story", `SILENCIO: ${silenceMinutes} MIN`);
    setText("analysis","Respira. No toques nada.");

    runBreath();

    let t = silenceMinutes * 60;
    const timer = setInterval(()=>{
        t--;
        if(t<=0){
            clearInterval(timer);
            silenceDone();
        }
    },1000);
}

function runBreath(){
    const b = document.getElementById("breath");
    let grow=true;
    const i = setInterval(()=>{
        if(b.style.display==="none"){clearInterval(i);return;}
        b.style.transform = grow?"scale(2.5)":"scale(1)";
        grow=!grow;
    },4000);
}

function silenceDone(){
    hide("breath");
    silenceMinutes = Math.min(silenceMinutes+1,20);
    missionId++;
    loadNextMission();
}

function startFloating(){
    setInterval(()=>{
        const type = Math.random()>0.7?"bad":(Math.random()>0.4?"good":"neutral");
        const word = wordPool[type][Math.floor(Math.random()*wordPool[type].length)];

        const el = document.createElement("div");
        el.className = `floating word-${type}`;
        el.innerText = word;
        el.style.left = Math.random()*90+"vw";

        el.onmousedown=()=>{
            el.classList.add("blast");
            if(type==="good"){score+=5; play("ok");}
            if(type==="bad"){score-=10; play("bad");}
            updateScore();
            setTimeout(()=>el.remove(),300);
        };

        document.body.appendChild(el);
        setTimeout(()=>el.remove(),5000);

    },2000);
}

function updateScore(){
    setText("score-display",`PUNTOS: ${score}`);
}

function setText(id,v){document.getElementById(id).innerText=v;}
function show(id){document.getElementById(id).style.display="block";}
function hide(id){document.getElementById(id).style.display="none";}
function clearOptions(){document.getElementById("options").innerHTML="";}
function play(id){document.getElementById(id).play();}

window.onload = init;
</script>

</body>
</html>
