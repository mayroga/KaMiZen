<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAMIZEN KIDS - MATRIX TRAINING</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family: Arial;
    text-align:center;
}

#container {
    padding:20px;
    max-width:800px;
    margin:auto;
}

h1 {
    color:#00f2ff;
}

.card {
    border:1px solid #00f2ff;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
}

button {
    margin-top:10px;
    padding:10px;
    border:none;
    background:#00f2ff;
    cursor:pointer;
    font-weight:bold;
}

.word {
    position:absolute;
    color:#00f2ff;
    font-size:14px;
    opacity:0.4;
    animation: float 6s infinite linear;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div id="container">
    <h1>KAMIZEN MATRIX TRAINING</h1>
    <div id="mission"></div>
    <button onclick="nextMission()">NEXT</button>
</div>

<script>

let currentMission = 1;

// =========================
// LOAD MISSION
// =========================
async function loadMission(id) {
    let res = await fetch(`/api/mission/${id}`);
    let data = await res.json();

    if (data.error) {
        document.getElementById("mission").innerHTML = "MISSION NOT FOUND";
        return;
    }

    render(data);
}

// =========================
// RENDER MISSION
// =========================
function render(m) {
    let html = `
        <div class="card">
            <h2>LEVEL ${m.level} - ${m.theme}</h2>
    `;

    m.blocks.forEach(b => {
        if (b.type === "story" || b.type === "analysis") {
            html += `<p>${b.text.en}</p>`;
        }

        if (b.type === "decision") {
            b.options.forEach(opt => {
                html += `<button onclick="choose('${opt.code}', ${opt.correct})">${opt.text.en}</button><br>`;
            });
        }
    });

    html += `</div>`;

    document.getElementById("mission").innerHTML = html;
}

// =========================
// DECISION
// =========================
function choose(code, correct) {
    alert(correct ? "✔ GOOD CHOICE" : "✘ TRY AGAIN");
}

// =========================
// NEXT MISSION (LOOP 1-35)
// =========================
async function nextMission() {
    let res = await fetch(`/api/next/${currentMission}`);
    let data = await res.json();

    currentMission = data.next;
    loadMission(currentMission);
}

// INIT
loadMission(currentMission);

// =========================
// FLOATING WORDS (MATRIX UI)
// =========================
const words = ["FOCUS","CALM","CONTROL","BREATH","PAUSE","LEAD"];

setInterval(() => {
    let w = document.createElement("div");
    w.className = "word";
    w.innerText = words[Math.floor(Math.random()*words.length)];
    w.style.left = Math.random()*100 + "vw";
    document.body.appendChild(w);

    setTimeout(()=>w.remove(), 6000);
}, 800);

</script>

</body>
</html>
