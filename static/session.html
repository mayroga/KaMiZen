<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1.0"/>

<title>KAMIZEN LIFE SYSTEM</title>

<style>

:root{
    --bg:#0b1220;
    --card:#111a2e;
    --primary:#3b82f6;
    --success:#22c55e;
    --danger:#ef4444;
    --text:#ffffff;
    --dim:#94a3b8;
}

/* =========================
   BASE
========================= */

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:Segoe UI, Arial, sans-serif;
    display:flex;
    justify-content:center;
    min-height:100vh;
}

#app{
    width:100%;
    max-width:760px;
    padding:20px;
}

/* =========================
   CARD
========================= */

.card{
    background:var(--card);
    border-radius:18px;
    padding:22px;
    margin:14px 0;
    border:1px solid rgba(255,255,255,.05);
    box-shadow:0 12px 30px rgba(0,0,0,.35);
}

/* =========================
   TEXT
========================= */

h1,h2,h3{
    margin:10px 0;
}

.center{
    text-align:center;
}

.small{
    font-size:13px;
    color:var(--dim);
    line-height:1.5;
}

/* =========================
   BUTTONS
========================= */

button{
    width:100%;
    border:none;
    border-radius:14px;
    padding:15px;
    margin-top:12px;
    cursor:pointer;
    font-size:15px;
    font-weight:700;
    color:white;
    background:var(--primary);
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
    opacity:.96;
}

button:disabled{
    opacity:.6;
    cursor:not-allowed;
    transform:none;
}

/* =========================
   ANSWERS
========================= */

.answer{
    background:#1f2937;
    border-left:4px solid var(--primary);
    padding:14px;
    margin:10px 0;
    border-radius:12px;
    cursor:pointer;
    transition:.2s;
    user-select:none;
}

.answer:hover{
    background:#374151;
    transform:translateX(4px);
}

/* =========================
   BREATH SYSTEM
========================= */

.breath-circle{
    width:170px;
    height:170px;
    margin:28px auto;
    border-radius:50%;
    border:4px solid var(--primary);

    display:flex;
    align-items:center;
    justify-content:center;

    position:relative;
    overflow:hidden;

    transition:
        transform 4s ease-in-out,
        border-color 1s ease,
        box-shadow 1s ease;

    background:
        radial-gradient(
            circle at center,
            rgba(59,130,246,.35),
            rgba(59,130,246,.08)
        );

    box-shadow:
        0 0 25px rgba(59,130,246,.25),
        inset 0 0 25px rgba(255,255,255,.05);
}

.breath-circle::before{
    content:"";
    position:absolute;
    inset:-20px;
    border-radius:50%;
    background:
        conic-gradient(
            from 0deg,
            rgba(59,130,246,.25),
            rgba(34,197,94,.20),
            rgba(59,130,246,.25)
        );

    animation:spin 10s linear infinite;
}

.breath-circle span{
    position:relative;
    z-index:2;
    font-size:24px;
    font-weight:800;
    letter-spacing:2px;
    text-shadow:0 0 10px rgba(255,255,255,.25);
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

/* =========================
   FEEDBACK COLORS
========================= */

.correct{
    border-left:6px solid var(--success);
}

.correct h3{
    color:var(--success);
}

.wrong{
    border-left:6px solid var(--danger);
}

.wrong h3{
    color:var(--danger);
}

/* =========================
   MOBILE
========================= */

@media(max-width:600px){

    #app{
        padding:14px;
    }

    .card{
        padding:18px;
    }

    .breath-circle{
        width:145px;
        height:145px;
    }

    .breath-circle span{
        font-size:20px;
    }
}

</style>
</head>

<body>

<!-- =========================
     ENGINE ROOT
========================= -->

<div id="app">

    <div class="card center">

        <h1 style="color:var(--primary);">
            KAMIZEN LIFE SYSTEM
        </h1>

        <p class="small">
            Awareness • Control • Safety • Focus
        </p>

    </div>

</div>

<!-- =========================
     MAIN ENGINE
========================= -->

<script src="/static/js/engine.js"></script>

</body>
</html>
