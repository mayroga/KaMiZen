<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaykaMi | Vida Real</title>

<style>
body{
    margin:0;
    background:#0f1720;
    color:#fff;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#app{
    width:95%;
    max-width:420px;
    background:#1b2735;
    border-radius:15px;
    padding:20px;
    text-align:center;
}

h1{color:#00f2ff;}

input, select{
    width:100%;
    padding:12px;
    margin:10px 0;
}

button{
    padding:14px;
    width:100%;
    margin-top:10px;
    background:#00f2ff;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

#text-content{
    margin:20px 0;
    font-size:18px;
}

#breath-circle{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid #00f2ff;
    margin:20px auto;
    display:none;
    align-items:center;
    justify-content:center;
}

.breathing{
    animation: breathe 4s infinite;
}

@keyframes breathe{
    0%{transform:scale(0.8);}
    50%{transform:scale(1.2);}
    100%{transform:scale(0.8);}
}
</style>
</head>

<body>

<div id="app">

<h1>MAYKAMI</h1>

<div id="setup">
<input id="age" placeholder="Edad">
<select id="state">
<option value="estres">Estrés</option>
<option value="soledad">Soledad</option>
<option value="perdida">Pérdida</option>
<option value="confusion">Confusión</option>
</select>

<button onclick="start()">START</button>
</div>

<div id="game" style="display:none;">
<div id="profile"></div>
<div id="text-content"></div>

<div id="breath-circle">
<div id="timer">0</div>
</div>

<div id="options"></div>

<button id="main-btn">CONTINUE</button>
</div>

</div>

<script src="/static/scripts.js"></script>

</body>
</html>
