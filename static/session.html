<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | AL CIELO PRO</title>

<style>
:root{
    --neon:#00f2ff;
    --bg:#000;
}

body{
    margin:0;
    background: radial-gradient(circle, #001a33, #000);
    color:#fff;
    font-family: 'Segoe UI', Arial;
    text-align:center;
    overflow:hidden;
    cursor: crosshair;
}

/* ================= TOP BAR ================= */
#topbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 15px;
    background:rgba(0,0,0,0.4);
    z-index:100;
}

#controls button{
    margin:3px;
}

/* ================= STATS ================= */
#stats{
    display:flex;
    gap:15px;
    font-weight:bold;
    color:var(--neon);
    font-size:1.2rem;
}

/* ================= MAIN ================= */
#game{
    padding-top:80px;
}

#hero-name{
    font-size:1.5rem;
    color:var(--neon);
}

#story{
    font-size:1.6rem;
    margin:20px;
    font-weight:bold;
}

#analysis{
    color:var(--neon);
    font-style:italic;
    margin-bottom:20px;
}

/* ================= BUTTONS ================= */
button{
    padding:12px 20px;
    font-size:16px;
    border:2px solid var(--neon);
    background:rgba(0,242,255,0.1);
    color:white;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:var(--neon);
    color:black;
    box-shadow:0 0 15px var(--neon);
}

.opt-btn{
    display:block;
    width:80%;
    max-width:500px;
    margin:10px auto;
    text-align:left;
}

/* ================= BREATH ================= */
#breath{
    width:100px;
    height:100px;
    border-radius:50%;
    background: radial-gradient(circle, #00f2ff, #0066ff);
    margin:20px auto;
    display:none;
    transition: transform 4s ease-in-out;
    box-shadow:0 0 30px #00f2ff;
}

/* ================= FLOATING ================= */
.floating{
    position:absolute;
    padding:8px 18px;
    border-radius:20px;
    font-weight:bold;
    cursor:pointer;
    animation: floatUp 5s linear forwards;
}

.word-good{ color:#00ff00; border:2px solid #00ff00; }
.word-bad{ color:#ff0000; border:2px solid #ff0000; }
.word-neutral{ color:#ffff00; border:2px solid #ffff00; }

@keyframes floatUp{
    from{ transform:translateY(110vh);}
    to{ transform:translateY(-20vh);}
}

.blast{ animation:burst 0.4s forwards;}
@keyframes burst{ to{ transform:scale(4); opacity:0;} }

/* ================= EXPLANATION ================= */
#explanation-box{
    display:none;
    background:rgba(0,0,0,0.8);
    border-left:5px solid var(--neon);
    padding:15px;
    margin:20px auto;
    width:80%;
    border-radius:10px;
}

/* ================= START SCREEN ================= */
#start-screen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:200;
}

#start-screen h1{
    color:var(--neon);
    font-size:2rem;
    margin-bottom:20px;
}

</style>
</head>

<body>

<!-- 🔝 TOPBAR -->
<div id="topbar">
    <div id="controls">
        <button onclick="startGame()">START</button>
        <button onclick="KamizenEngine.toggleLang()">EN/ES</button>
        <button onclick="location.reload()">RESTART</button>
    </div>

    <div id="stats">
        <div id="score-display">PUNTOS: 0</div>
        <div id="focus-display">FOCUS: 100%</div>
        <div id="energy-display">ENERGY: ⚡⚡⚡</div>
    </div>
</div>

<!-- 🎮 GAME -->
<div id="game">
    <h2 id="hero-name"></h2>

    <div id="breath"></div>

    <div id="story">Bienvenido a Kamizen</div>
    <div id="analysis"></div>

    <div id="explanation-box"></div>
    <div id="options"></div>
</div>

<!-- 🚀 START SCREEN -->
<div id="start-screen">
    <h1>KAMIZEN: AL CIELO</h1>
    <button onclick="startGame()">INICIAR</button>
</div>

<!-- 🔊 AUDIO -->
<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="ok" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

<!-- 🧠 ENGINE -->
<script src="/static/engine.js"></script>

<script>
function startGame(){
    document.getElementById("start-screen").style.display = "none";
    KamizenEngine.init();
}
</script>

</body>
</html>
