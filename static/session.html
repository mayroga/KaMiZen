<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KAMIZEN | TOTAL REALITY SIMULATOR</title>
    <style>
        :root {
            --primary: #00f2ff;
            --money: #00ff88;
            --danger: #ff3131;
            --love: #ff69b4;
            --wisdom: #bc13fe;
            --bg: #010208;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }

        body {
            background: var(--bg);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            perspective: 1000px;
        }

        /* ESCENARIO INFINITO */
        #world {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0e1a 0%, #000 100%);
            z-index: 0;
        }

        #path-grid {
            position: absolute;
            bottom: 0; left: 50%;
            width: 400vw; height: 100vh;
            background: 
                linear-gradient(0deg, transparent 24%, rgba(0, 242, 255, 0.05) 25%, rgba(0, 242, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 242, 255, 0.05) 75%, rgba(0, 242, 255, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 242, 255, 0.05) 25%, rgba(0, 242, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 242, 255, 0.05) 75%, rgba(0, 242, 255, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            transform: translateX(-50%) rotateX(70deg);
            transform-origin: bottom;
            animation: move-grid 2s linear infinite;
        }

        @keyframes move-grid {
            from { background-position: 0 0; }
            to { background-position: 0 50px; }
        }

        /* AVATAR PROFESIONAL */
        #avatar-container {
            position: absolute;
            bottom: 15%; left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
        }

        #avatar {
            width: 50px; height: 80px;
            background: linear-gradient(to bottom, var(--primary), #0044ff);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            box-shadow: 0 0 30px var(--primary);
            animation: hover 2s infinite ease-in-out;
        }

        #player-tag {
            margin-top: 10px;
            font-size: 14px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            background: rgba(0,0,0,0.5);
            padding: 2px 10px;
        }

        @keyframes hover {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* LIFE ELEMENTS (EL TODO) */
        .life-element {
            position: absolute;
            padding: 12px 25px;
            background: rgba(0,0,0,0.8);
            border-left: 5px solid #fff;
            font-weight: 900;
            cursor: pointer;
            z-index: 50;
            white-space: nowrap;
            transition: 0.1s;
        }

        .cat-school { border-color: var(--primary); color: var(--primary); }
        .cat-money { border-color: var(--money); color: var(--money); }
        .cat-danger { border-color: var(--danger); color: var(--danger); }
        .cat-love { border-color: var(--love); color: var(--love); }
        .cat-wisdom { border-color: var(--wisdom); color: var(--wisdom); }

        @keyframes flow-down {
            0% { transform: translate(-50%, -100%) scale(0.2); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(-50%, 500px) scale(2.5); opacity: 0; }
        }

        /* HUD & UI */
        #hud {
            position: absolute;
            top: 20px; width: 100%;
            display: flex; justify-content: space-around;
            z-index: 500;
        }

        .hud-stat {
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border: 1px solid var(--primary);
            backdrop-filter: blur(10px);
        }

        #boot-screen {
            position: fixed;
            inset: 0; background: var(--bg);
            z-index: 1000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .kamizen-input {
            background: transparent; border: 2px solid var(--primary);
            color: #fff; padding: 20px; font-size: 24px; text-align: center;
            margin-bottom: 20px; width: 80%; max-width: 400px;
        }

        /* CÍRCULO RESPIRATORIO */
        #breath-portal {
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; height: 300px;
            border-radius: 50%;
            border: 10px solid var(--primary);
            display: none; justify-content: center; align-items: center;
            z-index: 600;
            background: rgba(0, 242, 255, 0.1);
        }

        .inhaling { animation: breathe-in 4s ease-in-out forwards; }
        @keyframes breathe-in {
            0% { transform: translate(-50%, -50%) scale(1); }
            100% { transform: translate(-50%, -50%) scale(1.6); }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="world">
        <div id="path-grid"></div>
    </div>

    <div id="hud" style="display:none;">
        <div class="hud-stat">LEVEL: <span id="val-block">01</span></div>
        <div class="hud-stat">EXPERIENCE: <span id="val-exp">0</span></div>
        <div class="hud-stat">WISDOM: <span id="val-wise">0</span></div>
    </div>

    <div id="avatar-container" style="display:none;">
        <div id="avatar"></div>
        <div id="player-tag">PLAYER</div>
    </div>

    <div id="boot-screen">
        <h1 style="margin-bottom:40px; letter-spacing:10px; color:var(--primary);">KAMIZEN SYSTEM</h1>
        <input type="text" id="name-in" class="kamizen-input" placeholder="IDENTITY NAME">
        <button class="hud-stat" onclick="Engine.init()" style="cursor:pointer; background:var(--primary); color:#000; font-weight:900;">START SIMULATION</button>
    </div>

    <div id="narrative-box" style="position:fixed; top:25%; width:100%; text-align:center; z-index:400; pointer-events:none; display:none;">
        <h2 id="text-stream" style="padding:0 20px; text-shadow:0 0 15px #000;"></h2>
    </div>

    <div id="breath-portal">
        <h1 id="breath-label">INHALE</h1>
    </div>

    <audio id="mus-dopamine" loop src="https://assets.mixkit.co/music/preview/mixkit-deep-urban-623.mp3"></audio>
    <audio id="sfx-shatter" src="https://www.soundjay.com/misc/sounds/glass-break-1.mp3"></audio>

    <script>
        const Engine = (() => {
            let state = {
                name: "", block: 1, exp: 0, wise: 0, 
                session: null,
                lifeItems: [
                    // ESCUELA
                    { t: "KNOWLEDGE", c: "cat-school", e: 10, w: 5 },
                    { t: "BULLYING", c: "cat-danger", e: 0, w: 15 },
                    { t: "FRIENDSHIP", c: "cat-love", e: 5, w: 10 },
                    { t: "EXAMS", c: "cat-school", e: 20, w: 2 },
                    // CALLE / PELIGRO
                    { t: "STRANGER", c: "cat-danger", e: 0, w: 30 },
                    { t: "STREET SMARTS", c: "cat-wisdom", e: 15, w: 15 },
                    { t: "EMERGENCY", c: "cat-danger", e: 5, w: 40 },
                    // NEGOCIOS / DINERO
                    { t: "INVESTMENT", c: "cat-money", e: 50, w: 20 },
                    { t: "SAVINGS", c: "cat-money", e: 30, w: 10 },
                    { t: "SCAM / DECEPTION", c: "cat-danger", e: -20, w: 50 },
                    { t: "WORK ETHIC", c: "cat-wisdom", e: 40, w: 10 },
                    // FAMILIA / AMOR
                    { t: "RESPECT", c: "cat-love", e: 10, w: 20 },
                    { t: "PARENTS", c: "cat-love", e: 0, w: 25 },
                    { t: "TRUTH", c: "cat-wisdom", e: 0, w: 50 },
                    // SALUD / BIENESTAR
                    { t: "MEDITATION", c: "cat-wisdom", e: 10, w: 30 },
                    { t: "EXERCISE", c: "cat-school", e: 20, w: 10 },
                    { t: "MENTAL FOCUS", c: "cat-wisdom", e: 15, w: 25 },
                    { t: "JUNK FOOD", c: "cat-danger", e: 5, w: -10 }
                ]
            };

            const init = async () => {
                const name = document.getElementById('name-in').value;
                if(!name) return alert("IDENTITY REQUIRED");
                state.name = name;

                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('hud').style.display = 'flex';
                document.getElementById('avatar-container').style.display = 'block';
                document.getElementById('player-tag').innerText = state.name;
                document.getElementById('mus-dopamine').play();

                const res = await fetch('/api/session/start');
                state.session = await res.json();
                state.block = state.session.index;
                document.getElementById('val-block').innerText = state.block.toString().padStart(2, '0');

                startSequence();
            };

            const speak = (txt, cb) => {
                const u = new SpeechSynthesisUtterance(txt);
                u.lang = 'en-US'; u.rate = 0.9; u.onend = cb;
                window.speechSynthesis.speak(u);
            };

            const startSequence = () => {
                const intro = state.session.story.en;
                const box = document.getElementById('narrative-box');
                box.style.display = 'block';
                document.getElementById('text-stream').innerText = intro;
                
                speak(intro, () => {
                    setTimeout(() => {
                        box.style.display = 'none';
                        runLifeFlow();
                    }, 2000);
                });
            };

            const runLifeFlow = () => {
                let iterations = 0;
                const interval = setInterval(() => {
                    spawnItem();
                    iterations++;
                    if(iterations > 25) { // Más densidad de objetos
                        clearInterval(interval);
                        setTimeout(startMissionMode, 6000);
                    }
                }, 800);
            };

            const spawnItem = () => {
                const data = state.lifeItems[Math.floor(Math.random()*state.lifeItems.length)];
                const item = document.createElement('div');
                item.className = `life-element ${data.c}`;
                item.innerText = data.t;
                item.style.left = (20 + Math.random() * 60) + "%";
                item.style.animation = "flow-down 4s linear forwards";
                
                item.onclick = (e) => {
                    state.exp += data.e;
                    state.wise += data.w;
                    updateHUD();
                    explode(e.clientX, e.clientY);
                    document.getElementById('sfx-shatter').currentTime = 0;
                    document.getElementById('sfx-shatter').play();
                    item.remove();
                };

                document.body.appendChild(item);
                setTimeout(() => item.remove(), 4000);
            };

            const updateHUD = () => {
                document.getElementById('val-exp').innerText = state.exp;
                document.getElementById('val-wise').innerText = state.wise;
            };

            const explode = (x, y) => {
                for(let i=0; i<10; i++) {
                    const p = document.createElement('div');
                    p.style.position = 'fixed';
                    p.style.left = x + 'px'; p.style.top = y + 'px';
                    p.style.width = '5px'; p.style.height = '5px';
                    p.style.background = var(--primary);
                    p.style.zIndex = '1000';
                    document.body.appendChild(p);
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * 100;
                    p.animate([
                        { transform: 'translate(0,0)', opacity: 1 },
                        { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`, opacity: 0 }
                    ], 500);
                    setTimeout(() => p.remove(), 500);
                }
            };

            const startMissionMode = () => {
                const mission = state.session.missions[0];
                const box = document.getElementById('narrative-box');
                box.style.display = 'block';
                
                let step = 0;
                const process = () => {
                    const b = mission.b[step];
                    if(!b) { startBreathing(); return; }

                    if(b.t === 'v' || b.t === 'h' || b.story) {
                        const txt = b.tx ? b.tx.en : b.story.en;
                        document.getElementById('text-stream').innerText = txt;
                        speak(txt, () => { setTimeout(() => { step++; process(); }, 1500); });
                    } else if(b.t === 'd') {
                        // Aquí se renderizan opciones... (simplificado para flujo continuo)
                        document.getElementById('text-stream').innerText = b.q.en;
                        speak(b.q.en, () => { setTimeout(() => { step++; process(); }, 3000); });
                    } else { step++; process(); }
                };
                process();
            };

            const startBreathing = () => {
                const portal = document.getElementById('breath-portal');
                const label = document.getElementById('breath-label');
                const box = document.getElementById('text-stream');
                
                portal.style.display = 'flex';
                box.innerText = "AUTOMATIC RECOVERY: OXYGENATING BRAIN";
                
                let time = 30; // 30s base
                const timer = setInterval(() => {
                    portal.classList.toggle('inhaling');
                    label.innerText = portal.classList.contains('inhaling') ? "INHALE" : "EXHALE";
                    time -= 4;
                    if(time <= 0) {
                        clearInterval(timer);
                        finalize();
                    }
                }, 4000);
            };

            const finalize = () => {
                document.getElementById('text-stream').innerText = "SYSTEM REBOOTING FOR NEXT BLOCK...";
                speak("Level complete. System rebooting.", () => {
                    location.reload();
                });
            };

            return { init };
        })();
    </script>
</body>
</html>
