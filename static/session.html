<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAYKAMI SESSION</title>

<style>
body {
    margin:0;
    padding:0;
    background:#05080a;
    color:white;
    font-family:Segoe UI;
    overflow:hidden;
}

/* START */
#startScreen{
    position:fixed;
    inset:0;
    background:#05080a;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:20px;
    z-index:999;
}

input{
    padding:12px;
    font-size:18px;
    text-align:center;
}

button{
    padding:12px 30px;
    background:#00f2ff;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

/* TIMER GRANDE */
#timer{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:60px;
    color:#00f2ff;
    font-weight:bold;
}

/* CENTER TEXT */
#centerText{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:34px;
    text-align:center;
    width:80%;
}

/* WORDS */
.word{
    position:absolute;
    font-size:20px;
    color:#00f2ff;
    cursor:pointer;
    animation:float 5s linear forwards;
}

@keyframes float{
    from{transform:translateY(0); opacity:1;}
    to{transform:translateY(-250px); opacity:0;}
}

/* EXPLODE */
.explode{
    transform:scale(2);
    opacity:0;
    transition:0.2s;
}
</style>
</head>

<body>

<div id="startScreen">
    <h1 style="color:#00f2ff">MAYKAMI</h1>
    <input id="nameInput" placeholder="Enter Name">
    <button onclick="startApp()">START</button>
</div>

<div id="timer">00:00</div>
<div id="centerText"></div>

<script>

let running = false;
let intervals = [];
let audioEnabled = false;

/* =========================
   START
========================= */
function startApp(){

    const name = document.getElementById("nameInput").value;
    if(!name) return;

    document.getElementById("startScreen").style.display="none";

    audioEnabled = true;

    running = true;
    loop();
}

/* =========================
   MAIN LOOP
========================= */
async function loop(){

    while(true){

        let data = await fetch("/api/session/start").then(r=>r.json());

        const story = data?.story?.en || "NO STORY";
        const mission = data?.mission?.b?.[0]?.tx?.en || "MISSION";

        /* STORY + VOICE */
        await speak(story);
        showText(story);
        await wait(5000);

        /* GAME 1 */
        await floatingGame(300);

        /* MISSION */
        showText(mission);
        await wait(5000);

        /* GAME 2 */
        await floatingGame(300);

        /* BREATH */
        await breathing(data.index);

        clearAll();
    }
}

/* =========================
   SPEECH (FIX VOICE)
========================= */
function speak(text){
    return new Promise(resolve=>{
        if(!audioEnabled) return resolve();

        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = "en-US";
        msg.rate = 1;

        msg.onend = resolve;
        speechSynthesis.speak(msg);
    });
}

/* =========================
   TEXT UI
========================= */
function showText(t){
    document.getElementById("centerText").innerText = t;
}

function wait(ms){
    return new Promise(r=>setTimeout(r,ms));
}

/* =========================
   TIMER FORMAT MIN:SEC
========================= */
function formatTime(s){
    let m = Math.floor(s/60);
    let sec = s % 60;
    return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}

/* =========================
   FLOATING GAME (ONLY DURING GAME)
========================= */
function floatingGame(time){

    return new Promise(resolve=>{

        let t = time;

        const timer = setInterval(()=>{

            t--;

            document.getElementById("timer").innerText = formatTime(t);

            spawnWord();

            if(t<=0){
                clearInterval(timer);
                resolve();
            }

        },1000);

        intervals.push(timer);
    });
}

/* =========================
   WORDS WITH EXPLOSION
========================= */
function spawnWord(){

    const words = ["FOCUS","CALM","TRUTH","CONTROL","POWER"];

    const el = document.createElement("div");
    el.className="word";
    el.innerText = words[Math.floor(Math.random()*words.length)];

    el.style.left = Math.random()*window.innerWidth+"px";
    el.style.top = (window.innerHeight-100)+"px";

    el.onclick = ()=>{

        el.classList.add("explode");

        setTimeout(()=>el.remove(),200);
    };

    document.body.appendChild(el);

    setTimeout(()=>el.remove(),5000);
}

/* =========================
   BREATHING
========================= */
function breathing(index){

    return new Promise(resolve=>{

        let t=20;

        const b=setInterval(()=>{

            t--;

            document.getElementById("centerText").innerText =
                (t%2===0)?"INHALE":"EXHALE";

            if(t<=0){
                clearInterval(b);
                resolve();
            }

        },1000);

        intervals.push(b);
    });
}

/* =========================
   CLEAN MEMORY (NO FREEZE)
========================= */
function clearAll(){
    intervals.forEach(i=>clearInterval(i));
    intervals=[];
}

</script>

</body>
</html>
