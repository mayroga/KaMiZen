<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAMIZEN ENGINE v1</title>

<style>
body {
    margin:0;
    background:#000;
    color:#00f2ff;
    font-family: Arial;
}

.container {
    padding:20px;
}

.block {
    border:1px solid #00f2ff;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
}

button {
    margin:5px;
    padding:10px;
    background:#111;
    color:#00f2ff;
    border:1px solid #00f2ff;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 KAMIZEN ENGINE</h1>

<div id="game"></div>

</div>

<script>

async function start() {
    await fetch("/api/start", {method:"POST"});
    load();
}

async function load() {
    const res = await fetch("/api/state");
    const data = await res.json();

    const block = data.block;
    const game = document.getElementById("game");

    if (!block) {
        game.innerHTML = "<h2>FINISHED</h2>";
        return;
    }

    render(block);
}

function render(block) {
    const game = document.getElementById("game");

    let html = `<div class="block">`;

    html += `<h2>${block.type}</h2>`;

    if (block.text) {
        html += `<p>${block.text.en || ""}</p>`;
    }

    if (block.guide) {
        html += `<p>🎯 ${block.guide.en}</p>`;
    }

    if (block.options) {
        block.options.forEach(opt => {
            html += `
                <button onclick="answer('${opt.code}')">
                    ${opt.text.en}
                </button>
            `;
        });
    }

    html += `<br><br><button onclick="next()">NEXT</button>`;

    html += `</div>`;

    game.innerHTML = html;
}

async function next() {
    await fetch("/api/next", {method:"POST"});
    load();
}

async function answer(code) {
    const res = await fetch("/api/answer", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({code})
    });

    const data = await res.json();
    alert(data.correct ? "✔ CORRECTO" : "❌ INCORRECTO");
}

start();

</script>

</body>
</html>
