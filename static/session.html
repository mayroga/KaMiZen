<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaMiZen - Al Cielo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-blur: rgba(0, 0, 0, 0.4);
            --accent-blue: #0ea5e9;
            --text-main: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body {
            background: #000;
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            transition: background-image 2s ease-in-out;
        }

        #app-container {
            width: 90%;
            max-width: 420px;
            background: var(--bg-blur);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.6;
            font-weight: 600;
        }

        #content-area {
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 { font-size: 24px; font-weight: 600; margin-bottom: 12px; line-height: 1.2; }
        p { font-size: 18px; font-weight: 300; opacity: 0.9; line-height: 1.6; }

        /* Círculo de Respiración Neuro-Sincronizado */
        #breath-indicator {
            width: 120px;
            height: 120px;
            margin: 20px auto;
            border-radius: 50%;
            border: 2px solid var(--accent-blue);
            display: none;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .breathing-animation {
            animation: breathe 4s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(0.8); opacity: 0.3; background: rgba(14, 165, 233, 0); }
            50% { transform: scale(1.2); opacity: 1; background: rgba(14, 165, 233, 0.2); }
        }

        /* Controles de Interacción */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:active { transform: scale(0.98); background: rgba(255, 255, 255, 0.2); }
        
        .btn-primary { background: var(--accent-blue); border: none; font-weight: 600; }

        /* Utilidades */
        .hidden { display: none !important; }
        #timer { font-family: monospace; font-size: 14px; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="header" id="mission-tag">KaMiZen Architecture</div>
        
        <div id="content-area">
            <h1 id="title">Preparando sistema...</h1>
            <p id="description">Sincronizando frecuencia de éxito.</p>
        </div>

        <div id="breath-indicator">
            <span id="timer">00</span>
        </div>

        <div id="quiz-options" class="controls hidden">
            </div>

        <div class="controls">
            <button id="main-action" class="btn-primary" onclick="engine.next()">Comenzar Misión</button>
            <button id="translate-btn" onclick="engine.toggleLanguage()">Español / English</button>
            <button id="delete-btn" style="opacity: 0.4; font-size: 12px;" onclick="location.reload()">Borrar Sesión</button>
        </div>
    </div>

    <audio id="voice-player"></audio>
    <audio id="bg-music" loop></audio>

    <script>
        const engine = {
            lang: 'es',
            currentMission: 0,
            currentBlock: 0,
            missions: [],
            
            async init() {
                const response = await fetch('/api/missions');
                const data = await response.json();
                this.missions = data.missions;
                this.updateUI();
                this.setupAudio();
            },

            setupAudio() {
                const music = document.getElementById('bg-music');
                // Configuración estricta de volumen: Música siempre al 20%
                music.volume = 0.2; 
            },

            updateUI() {
                const mission = this.missions[this.currentMission];
                const block = mission.blocks[this.currentBlock];
                
                document.getElementById('mission-tag').innerText = mission.category;
                
                if (block.type === 'voice' || block.type === 'story' || block.type === 'strategy') {
                    document.getElementById('title').innerText = mission.category;
                    document.getElementById('description').innerText = block.text[this.lang];
                    document.getElementById('breath-indicator').style.display = 'none';
                    this.playAudio(block.type, mission.level);
                }

                if (block.type === 'breathing') {
                    document.getElementById('title').innerText = "Respiración T-VID";
                    document.getElementById('description').innerText = block.text[this.lang];
                    const circle = document.getElementById('breath-indicator');
                    circle.style.display = 'flex';
                    circle.classList.add('breathing-animation');
                    this.startTimer(block.duration);
                }

                if (block.type === 'quiz') {
                    this.showQuiz(block);
                }
            },

            playAudio(type, level) {
                const music = document.getElementById('bg-music');
                // Cambia la música según el nivel: Poder, Dopamina, Riqueza
                const tracks = {
                    1: 'https://assets.mixkit.co/music/preview/mixkit-tech-house-vibes-130.mp3', // Dopamina/Energía
                    2: 'https://assets.mixkit.co/music/preview/mixkit-deep-urban-623.mp3',      // Estrategia/Poder
                    3: 'https://assets.mixkit.co/music/preview/mixkit-complex-772.mp3'       // Maestría/Al Cielo
                };
                
                if (music.src !== tracks[level]) {
                    music.src = tracks[level];
                    music.play();
                }
            },

            showQuiz(block) {
                const container = document.getElementById('quiz-options');
                container.innerHTML = '';
                container.classList.remove('hidden');
                document.getElementById('description').innerText = block.question[this.lang];

                block.options[this.lang].forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.innerText = opt;
                    btn.onclick = () => this.checkAnswer(idx, block.correct);
                    container.appendChild(btn);
                });
            },

            checkAnswer(selected, correct) {
                if (selected === correct) {
                    alert("Correcto. Elevando frecuencia.");
                    document.getElementById('quiz-options').classList.add('hidden');
                    this.next();
                } else {
                    alert("Reenfoca. Inténtalo de nuevo.");
                }
            },

            startTimer(seconds) {
                let timeLeft = seconds;
                const timerDisplay = document.getElementById('timer');
                const interval = setInterval(() => {
                    timerDisplay.innerText = timeLeft;
                    timeLeft--;
                    if (timeLeft < 0) {
                        clearInterval(interval);
                        document.getElementById('breath-indicator').classList.remove('breathing-animation');
                        this.next();
                    }
                }, 1000);
            },

            next() {
                this.currentBlock++;
                if (this.currentBlock >= this.missions[this.currentMission].blocks.length) {
                    this.currentBlock = 0;
                    this.currentMission++;
                }
                this.updateUI();
            },

            toggleLanguage() {
                this.lang = this.lang === 'es' ? 'en' : 'es';
                this.updateUI();
            }
        };

        window.onload = () => engine.init();
    </script>
</body>
</html>
