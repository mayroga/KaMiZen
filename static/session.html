<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | EXPERIENCE</title>

<style>
:root{
    --neon:#00f2ff;
    --bg:#000;
    --panel:rgba(0,15,30,0.92);
}

body{
    margin:0;
    background:#000;
    font-family:Arial;
    color:#00f2ff;
    overflow:hidden;
}

#app{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:20px;
    padding:20px;
    box-sizing:border-box;
}

#message{
    max-width:800px;
    padding:20px;
    border:1px solid #00f2ff;
    background:rgba(0,10,20,0.9);
    text-align:center;
    font-size:20px;
    min-height:160px;
    line-height:1.5;
}

#circle{
    width:100px;
    height:100px;
    border-radius:50%;
    background:rgba(0,242,255,0.15);
    box-shadow:0 0 30px #00f2ff;
    transition:all 2s ease;
}

#options{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    width:90%;
    max-width:800px;
}

button{
    padding:14px;
    background:transparent;
    border:1px solid #00f2ff;
    color:#00f2ff;
    cursor:pointer;
}

button:hover{
    background:#00f2ff;
    color:#000;
}

#nav{
    display:flex;
    gap:10px;
    width:90%;
    max-width:800px;
}

.navbtn{
    flex:1;
}

#timer{
    font-size:14px;
    opacity:0.7;
}
</style>
</head>

<body>

<div id="app">

<div>
<button onclick="toggleLang()">ES/EN</button>
<button onclick="restart()">RESTART</button>
</div>

<div id="circle"></div>

<div id="message">TOUCH TO START</div>

<div id="timer"></div>

<div id="options"></div>

<div id="nav">
<button class="navbtn" onclick="back()">BACK</button>
<button class="navbtn" onclick="continueFlow()">CONTINUE</button>
<button class="navbtn" onclick="skip()">SKIP</button>
</div>

</div>

<script>

let session_id=null;
let lang="en";
let currentBlock=null;
let history=[];

let timerInt=null;
let breathInt=null;
let musicOsc=null;

/* AUDIO BASE */
const ctx = new (window.AudioContext||window.webkitAudioContext)();

/* VOZ */
function speak(text){
    if(!text) return;

    speechSynthesis.cancel();

    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = lang==="es"?"es-ES":"en-US";
    utter.rate = 0.9;
    utter.pitch = 1;

    speechSynthesis.speak(utter);
}

/* MUSICA */
function playMusic(type){

    if(musicOsc){
        musicOsc.stop();
    }

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.type="sine";

    if(type==="calm") osc.frequency.value=110;
    if(type==="focus") osc.frequency.value=180;
    if(type==="power") osc.frequency.value=260;

    gain.gain.value=0.05;

    osc.start();

    musicOsc = osc;
}

/* START */
async function start(){

    await ctx.resume();

    const res = await fetch("/start",{method:"POST"});
    const data = await res.json();

    session_id=data.session_id;
    history=[];

    render(data.story);
}

/* SEND */
async function send(code){

    const res = await fetch("/judge",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({session_id,decision:code})
    });

    const data = await res.json();

    if(data.story){
        history.push(currentBlock);
        render(data.story);
    }
}

/* RENDER */
function render(block){

    clearAll();

    currentBlock=block;

    const msg=document.getElementById("message");
    const opts=document.getElementById("options");

    opts.innerHTML="";

    let text =
        block.text?.[lang] ||
        block.analysis?.[lang] ||
        block.question?.[lang] ||
        "...";

    msg.innerText=text;

    speak(text);

    /* TIPOS DE BLOQUE */
    switch(block.type){

        case "story":
            playMusic("calm");
        break;

        case "analysis":
            playMusic("focus");
        break;

        case "breath_focus":
        case "breathing":
            playMusic("calm");
            startBreath(block.duration_sec);
        break;

        case "riso_tvid":
            playMusic("power");
        break;

        case "silence_challenge":
            playMusic("calm");
        break;

        case "tvid":
            playMusic("focus");
        break;
    }

    /* OPCIONES */
    if(block.options){
        block.options.forEach(o=>{
            const b=document.createElement("button");
            b.innerText=o.text?.[lang]||o.text?.en;

            b.onclick=()=>{
                send(o.code);
            };

            opts.appendChild(b);
        });
    }

    /* TIEMPO */
    if(block.duration_sec){
        startTimer(block.duration_sec);
    }
}

/* TIMER REAL */
function startTimer(sec){

    const t=document.getElementById("timer");

    let s=sec;

    t.innerText=s+"s";

    timerInt=setInterval(()=>{
        s--;
        t.innerText=s+"s";

        if(s<=0){
            clearInterval(timerInt);
        }
    },1000);
}

/* BREATH */
function startBreath(){

    const c=document.getElementById("circle");

    let grow=true;

    breathInt=setInterval(()=>{
        c.style.transform=grow?"scale(2)":"scale(1)";
        c.style.opacity=grow?"0.8":"0.3";
        grow=!grow;
    },2000);
}

/* CONTROL */
function continueFlow(){
    send("NEXT");
}

function skip(){
    send("SKIP");
}

function back(){
    if(history.length===0) return;
    render(history.pop());
}

function restart(){
    location.reload();
}

function toggleLang(){
    lang=(lang==="en")?"es":"en";
    if(currentBlock) render(currentBlock);
}

/* CLEAR */
function clearAll(){
    clearInterval(timerInt);
    clearInterval(breathInt);
    speechSynthesis.cancel();
}

/* START */
document.getElementById("message").onclick=start;

</script>

</body>
</html>
