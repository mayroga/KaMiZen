<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | AL CIELO PRO</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #001a33, #000);
    color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    overflow: hidden;
    cursor: crosshair;
    transition: background 0.5s;
}

#topbar {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 25px;
    z-index: 100;
    background: rgba(0,0,0,0.4);
}

#top-ui {
    display: flex;
    justify-content: space-around;
    align-items: center;
    font-weight: bold;
    font-size: 1.2rem;
    color: #00f2ff;
}

#score-display {
    font-size: 1.5rem;
    color: #00f2ff;
}

#timer {
    font-size: 1.2rem;
    color: #fff;
    margin-top: 5px;
}

#game {
    padding-top: 100px;
}

button {
    padding: 12px 20px;
    margin: 8px;
    font-size: 16px;
    border: 2px solid #00f2ff;
    background: rgba(0, 242, 255, 0.1);
    color: white;
    border-radius: 12px;
    cursor: pointer;
}

button:hover {
    background: #00f2ff;
    color: #000;
}

#controls {
    position: fixed;
    bottom: 20px;
    width: 100%;
}

.floating {
    position: absolute;
    padding: 8px 18px;
    border-radius: 20px;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    animation: floatUp 5s linear forwards;
}

.word-good { color: #00ff00; border: 2px solid #00ff00; }
.word-bad { color: #ff0000; border: 2px solid #ff0000; }
.word-neutral { color: #ffff00; border: 2px solid #ffff00; }

@keyframes floatUp {
    from { transform: translateY(110vh); }
    to { transform: translateY(-20vh); }
}

#learning {
    display: none;
    padding: 20px;
}

#breath {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle, #00f2ff, #0066ff);
    margin: 20px auto;
    display: none;
}

#options button {
    display: block;
    width: 80%;
    margin: 10px auto;
}
</style>
</head>

<body>

<div id="topbar">
    <div id="top-ui">
        <div>FOCUS: 100%</div>
        <div id="score-display">POINTS: 0</div>
        <div>ENERGY: ⚡⚡⚡</div>
    </div>
    <div id="timer">00:00</div>
</div>

<div id="game"></div>

<div id="learning">
    <div id="story"></div>
    <div id="analysis"></div>
    <div id="breath"></div>
    <div id="options"></div>
</div>

<div id="controls">
    <button onclick="startGame()">START</button>
    <button onclick="continueGame()">CONTINUE</button>
    <button onclick="backGame()">BACK</button>
</div>

<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="win" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

<script>
let phase = 1;
let score = 0;
let timer = 0;
let interval = null;
let gameHistory = [];

const wordPool = {
    good: ["FOCUS","POWER","TRUTH","CONTROL"],
    bad: ["FEAR","LIE","LAZY","ANGER"],
    neutral: ["CITY","WALK","WAIT"]
};

function startGame(){
    reset();
    phase = 1;
    runPhase1(300);
}

function continueGame(){
    if(phase===2) runPhase3();
}

function backGame(){
    location.reload();
}

function reset(){
    clearInterval(interval);
    document.getElementById("learning").style.display="none";
}

function runPhase1(duration){
    spawnWords();
    runTimer(duration, ()=>{
        phase = 2;
        stopWords();
        runLearning();
    });
}

function runPhase3(){
    const duration = score > 0 ? 600 : 180;
    phase = 1;
    runPhase1(duration);
}

function runLearning(){
    document.getElementById("learning").style.display="block";
    document.getElementById("story").innerText="Learning phase started. Follow instructions.";
    document.getElementById("analysis").innerText="Do not touch. Breathe.";
    startSilence(360);
}

function startSilence(seconds){
    const breath = document.getElementById("breath");
    breath.style.display="block";

    let touched = false;
    document.body.onclick = ()=> touched=true;

    runTimer(seconds, ()=>{
        breath.style.display="none";
        document.body.onclick = null;
        phase = 3;
        runPhase3();
    });

    if(touched){
        score -= 20;
    }
}

function runTimer(seconds, callback){
    timer = seconds;
    updateTimer();

    interval = setInterval(()=>{
        timer--;
        updateTimer();
        if(timer<=0){
            clearInterval(interval);
            saveScore();
            callback();
        }
    },1000);
}

function updateTimer(){
    const m = Math.floor(timer/60).toString().padStart(2,'0');
    const s = (timer%60).toString().padStart(2,'0');
    document.getElementById("timer").innerText = m+":"+s;
}

let wordInterval;

function spawnWords(){
    wordInterval = setInterval(()=>{
        const type = Math.random()>0.7?"bad":(Math.random()>0.4?"good":"neutral");
        const word = wordPool[type][Math.floor(Math.random()*wordPool[type].length)];

        const el = document.createElement("div");
        el.className = "floating word-"+type;
        el.innerText = word;
        el.style.left = Math.random()*90+"vw";

        el.onmousedown = ()=>{
            if(type==="good"){ score+=5; play("win"); }
            if(type==="bad"){ score-=10; play("bad"); }
            updateScore();
            el.remove();
        };

        document.body.appendChild(el);
        setTimeout(()=>el.remove(),5000);

    },1500);
}

function stopWords(){
    clearInterval(wordInterval);
    document.querySelectorAll(".floating").forEach(e=>e.remove());
}

function updateScore(){
    document.getElementById("score-display").innerText = "POINTS: "+score;
}

function play(id){
    const a = document.getElementById(id);
    a.currentTime=0;
    a.play();
}

function saveScore(){
    gameHistory.push(score);
    if(gameHistory.length>3) gameHistory.shift();
}

window.onload = ()=>{
    document.getElementById("bg").play().catch(()=>{});
};
</script>

</body>
</html>
