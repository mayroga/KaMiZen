<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AL CIELO - KAMIZEN BY MAY ROGA</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-gold: #f1c40f;
            --neon-red: #ff3131;
            --bg-dark: #050508;
            --neon-green: #2ecc71;
            --neon-orange: #ff8c00;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; overflow: hidden; background: var(--bg-dark); 
            color: white; font-family: 'Orbitron', sans-serif; touch-action: none; 
            height: 100vh; width: 100vw;
        }
        
        #hud {
            position: absolute; top: 10px; width: 100%;
            display: flex; justify-content: space-evenly;
            z-index: 1000; pointer-events: none; padding: 0 5px;
        }
        .data-box {
            background: rgba(0, 0, 0, 0.9); border: 1px solid var(--neon-blue);
            padding: 5px; text-align: center; flex: 1; margin: 0 3px; max-width: 110px;
        }
        .label { font-size: 8px; color: var(--neon-blue); letter-spacing: 1px; display: block; text-transform: uppercase; }
        .value { font-size: 14px; font-weight: 900; display: block; }
        #general-clock { position: absolute; bottom: 10px; right: 10px; color: var(--neon-gold); font-size: 12px; z-index: 1000; }
        #game-clock { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); color: var(--neon-red); font-size: 20px; font-weight: 900; z-index: 1000; }

        #stage {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 20px; z-index: 500; background: radial-gradient(circle, #111 0%, #000 100%);
        }

        #display-text { font-size: 1.5rem; font-weight: 900; color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); margin-bottom: 15px; width: 100%; }
        #sub-text { font-size: 1rem; color: #ccc; max-width: 600px; line-height: 1.4; }

        .btn-core {
            padding: 15px 30px; background: var(--neon-blue); color: black; border: none;
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer; margin-top: 20px;
            text-transform: uppercase; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        #options-container { margin-top: 20px; display: grid; gap: 10px; width: 100%; max-width: 400px; }
        .btn-opt {
            padding: 12px; background: rgba(0,242,255,0.1); border: 1px solid var(--neon-blue);
            color: white; font-family: 'Orbitron'; font-size: 0.8rem; cursor: pointer; transition: 0.3s;
        }

        #breath-wrap { display: none; margin-top: 20px; position: relative; }
        #breath-circle {
            width: 150px; height: 150px; border: 5px solid var(--neon-blue);
            border-radius: 50%; transition: transform 2s ease-in-out;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 30px var(--neon-blue);
        }
        #breath-info { font-size: 0.7rem; color: var(--neon-gold); margin-top: 15px; max-width: 250px; }

        #gameCanvas { position: fixed; inset: 0; display: none; z-index: 100; cursor: crosshair; }
        .skip-btn { position: absolute; bottom: 20px; left: 20px; font-size: 10px; opacity: 0.6; z-index: 2000; }

        .overlay-full { position: fixed; inset: 0; background: black; z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input[type="text"] { background: transparent; border: 2px solid var(--neon-blue); color: white; padding: 10px; font-family: 'Orbitron'; text-align: center; outline: none; }

        @media (min-width: 768px) {
            #display-text { font-size: 2.5rem; }
            #sub-text { font-size: 1.2rem; }
            .data-box { max-width: 150px; }
            .value { font-size: 20px; }
        }
    </style>
</head>
<body>

<div id="hud">
    <div class="data-box"><span class="label">NET WORTH</span><span id="stat-money" class="value">$0</span></div>
    <div class="data-box" style="border-color: var(--neon-gold);"><span class="label">SESSION</span><span id="stat-id" class="value">0</span></div>
    <div class="data-box" style="border-color: var(--neon-red);"><span class="label">STABILITY</span><span id="stat-health" class="value">100%</span></div>
</div>

<div id="stage">
    <div id="content-area">
        <h2 id="display-text">WELCOME TO KAMIZEN</h2>
        <p id="sub-text">Please enter your identification to begin.</p>
        <div id="input-wrap" style="margin-top: 20px;">
            <input type="text" id="client-name" placeholder="YOUR NAME">
        </div>
        <div id="options-container"></div>
        <button id="main-btn" class="btn-core">INITIALIZE</button>
    </div>

    <div id="breath-wrap">
        <div id="breath-circle">
            <span id="breath-label" style="font-size: 1rem; font-weight: 900;">INHALE</span>
        </div>
        <div id="breath-info"></div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>
<div id="general-clock">MISSION TIME: 00:00</div>
<div id="game-clock" class="hidden">00:00</div>
<button class="btn-core skip-btn hidden" id="skip-btn">SKIP PHASE</button>

<script>
    let stats = { money: 0, health: 100, index: 0, name: "Explorer", wrongClicks: 0 };
    let sessionData = null;
    let totalSeconds = 0;
    let gameSeconds = 300;
    let isGameRunning = false;
    let audioCtx = null;
    let synth = window.speechSynthesis;
    
    const ui = {
        text: document.getElementById('display-text'),
        sub: document.getElementById('sub-text'),
        mainBtn: document.getElementById('main-btn'),
        optCont: document.getElementById('options-container'),
        breath: document.getElementById('breath-wrap'),
        circle: document.getElementById('breath-circle'),
        label: document.getElementById('breath-label'),
        info: document.getElementById('breath-info'),
        canvas: document.getElementById('gameCanvas'),
        gClock: document.getElementById('general-clock'),
        gameClock: document.getElementById('game-clock'),
        skip: document.getElementById('skip-btn')
    };

    const ctx = ui.canvas.getContext('2d');
    let objects = [];
    let player = { x: window.innerWidth/2, y: window.innerHeight - 80 };

    const sleep = ms => new Promise(r => setTimeout(r, ms));
    
    function speak(text) {
        synth.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.rate = 0.85;
        msg.pitch = 0.9;
        msg.lang = 'en-US';
        synth.speak(msg);
    }

    function updateStats() {
        document.getElementById('stat-money').innerText = "$" + stats.money;
        document.getElementById('stat-health').innerText = stats.health + "%";
        document.getElementById('stat-id').innerText = stats.index;
    }

    ui.mainBtn.onclick = () => {
        const nameInput = document.getElementById('client-name').value;
        if(nameInput) stats.name = nameInput;
        document.getElementById('input-wrap').classList.add('hidden');
        ui.mainBtn.classList.add('hidden');
        startGeneralClock();
        runFullFlow();
    };

    function startGeneralClock() {
        setInterval(() => {
            totalSeconds++;
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            ui.gClock.innerText = `MISSION TIME: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }, 1000);
    }

    async function runFullFlow() {
        const res = fetch('/api/session/start');
        sessionData = res.json();
        stats.index = sessionData.index;
        updateStats();

        playPhaseStory();
        runWordGame(300);
        playPhaseMissions();
        runWordGame(300);
        showFinalDiagnostic();
    }
</script>
</body>
</html>
