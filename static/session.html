<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MAYKAMI | NEURAL INTERFACE</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #0044ff;
            --neon-red: #ff3131;
            --bg: #03050a;
            --font-main: 'Orbitron', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ESCENARIO 3D */
        #life-path {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0e1a 0%, #03050a 100%);
            z-index: 0;
            perspective: 600px;
            display: none;
        }

        #road {
            position: absolute;
            bottom: 0; left: 50%;
            width: 200%; height: 80%;
            background: repeating-linear-gradient(0deg, rgba(0, 242, 255, 0.05) 0px, rgba(0, 242, 255, 0.05) 2px, transparent 2px, transparent 50px);
            transform: translateX(-50%) rotateX(60deg);
        }

        /* AVATAR */
        #avatar-container {
            position: absolute;
            bottom: 15%; left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            display: none;
        }

        #avatar-sprite {
            width: 50px; height: 85px;
            background: var(--primary);
            box-shadow: 0 0 25px var(--primary);
            border-radius: 4px;
            margin-bottom: 10px;
            animation: breathe-avatar 2s infinite ease-in-out;
        }

        @keyframes breathe-avatar {
            0%, 100% { transform: scaleY(1); opacity: 0.8; }
            50% { transform: scaleY(1.08); opacity: 1; }
        }

        /* NODOS FLOTANTES (PILARES) */
        .word-node {
            position: absolute;
            padding: 8px 15px;
            border: 1px solid var(--primary);
            color: var(--primary);
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            z-index: 5;
            text-transform: uppercase;
            white-space: nowrap;
            animation: travel-3d 4s linear forwards;
        }

        @keyframes travel-3d {
            from { transform: translate(-50%, -100%) scale(0.1); opacity: 0; }
            20% { opacity: 1; }
            to { transform: translate(-50%, 600px) scale(2.5); opacity: 0; }
        }

        /* UI ELEMENTS */
        #main-container {
            width: 90%;
            max-width: 800px;
            text-align: center;
            z-index: 100;
            margin-top: 10vh;
        }

        #text-narrator {
            font-size: 28px;
            font-weight: 300;
            line-height: 1.4;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
            transition: opacity 0.5s;
        }

        #timer {
            position: absolute;
            top: 20px;
            font-size: 80px;
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            opacity: 0.3;
            z-index: 10;
        }

        .control-bar {
            position: fixed;
            bottom: 40px;
            display: flex;
            gap: 15px;
            z-index: 1000;
        }

        .btn-system {
            padding: 15px 35px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
        }

        .btn-primary { background: var(--primary); color: #000; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }

        #decision-area {
            display: none;
            flex-direction: column;
            gap: 12px;
            margin-top: 30px;
        }

        .option-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .option-card:hover { border-color: var(--primary); background: rgba(0, 242, 255, 0.1); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="life-path">
        <div id="road"></div>
    </div>

    <div id="timer">05:00</div>

    <div id="avatar-container">
        <div id="avatar-sprite"></div>
        <div style="font-family: 'Orbitron'; font-size: 10px; color: var(--primary);">NEURAL_AVATAR</div>
    </div>

    <div id="main-container">
        <div id="text-narrator">INITIALIZING MAYKAMI...</div>
        <div id="decision-area"></div>
    </div>

    <div class="control-bar">
        <button id="btn-start" class="btn-system btn-primary" onclick="KaMiZen.beginSession()">START MISSION</button>
        <button id="btn-continue" class="btn-system btn-primary" style="display:none;" onclick="KaMiZen.handleFlow()">CONTINUE</button>
    </div>

    <audio id="bg-music" loop src="https://assets.mixkit.co/music/preview/mixkit-techno-vibe-147.mp3"></audio>

    <script>
        const KaMiZen = (() => {
            let state = {
                phase: 'init',
                timerVal: 300,
                missionIdx: 0,
                stepIdx: 0,
                sessionData: null
            };

            const PILARES = ["LIMITS", "METHOD", "VALUE", "BALANCE", "LOYALTY", "AUTONOMY"];

            const speak = (text, callback) => {
                const ut = new SpeechSynthesisUtterance(text);
                ut.lang = 'en-US';
                ut.rate = 0.9;
                ut.onend = callback;
                window.speechSynthesis.speak(ut);
            };

            const beginSession = async () => {
                document.getElementById('btn-start').style.display = 'none';
                // Simulamos fetch de API
                state.sessionData = {
                    story: { en: "Welcome to the Neural Path. Your objective is to align your core values while navigating professional pressure." },
                    missions: [
                        { b: [
                            { t: 'd', q: {en: "A high-paying client asks you to bypass safety protocols. What is your move?"}, op: ["Strict Refusal", "Negotiate", "Accept Risk"], c: 0, ex: ["Correct. Safety is non-negotiable.", "Risk remains. Incorrect.", "Dangerous. High liability."] }
                        ]}
                    ]
                };
                
                state.phase = 'introduction';
                updateNarrator(state.sessionData.story.en);
                speak(state.sessionData.story.en, () => {
                    document.getElementById('btn-continue').style.display = 'block';
                });
            };

            const handleFlow = () => {
                document.getElementById('btn-continue').style.display = 'none';
                if(state.phase === 'introduction') startNeuralCycle();
                else if(state.phase === 'cycle-complete') startMissionMode();
            };

            const startNeuralCycle = () => {
                state.phase = 'cycling';
                document.getElementById('life-path').style.display = 'block';
                document.getElementById('avatar-container').style.display = 'block';
                document.getElementById('bg-music').play();
                updateNarrator("SYNCHRONIZE WITH THE CORE VALUES");

                const cycle = setInterval(() => {
                    state.timerVal--;
                    document.getElementById('timer').innerText = new Date(state.timerVal * 1000).toISOString().substr(14, 5);
                    if (Math.random() > 0.6) spawnNode();
                    if (state.timerVal <= 280) { // Reducido para demo a 20 seg
                        clearInterval(cycle);
                        completeCycle();
                    }
                }, 1000);
            };

            const spawnNode = () => {
                const word = PILARES[Math.floor(Math.random() * PILARES.length)];
                const node = document.createElement('div');
                node.className = 'word-node';
                node.innerText = word;
                node.style.left = "50%";
                node.onclick = () => {
                    node.style.background = "var(--primary)";
                    node.style.color = "#000";
                    setTimeout(() => node.remove(), 100);
                };
                document.getElementById('life-path').appendChild(node);
                setTimeout(() => node.remove(), 4000);
            };

            const completeCycle = () => {
                state.phase = 'cycle-complete';
                document.getElementById('bg-music').pause();
                updateNarrator("NEURAL ALIGNMENT SUCCESSFUL. READY FOR MISSION.");
                speak("Neural alignment successful.", () => {
                    document.getElementById('btn-continue').style.display = 'block';
                });
            };

            const startMissionMode = () => {
                document.getElementById('life-path').style.display = 'none';
                document.getElementById('avatar-container').style.display = 'none';
                processMissionStep();
            };

            const processMissionStep = () => {
                const step = state.sessionData.missions[0].b[state.stepIdx];
                const area = document.getElementById('decision-area');
                area.style.display = 'flex';
                area.innerHTML = '';
                
                updateNarrator(step.q.en);
                step.op.forEach((o, i) => {
                    const card = document.createElement('div');
                    card.className = 'option-card';
                    card.innerText = o;
                    card.onclick = () => {
                        updateNarrator(step.ex[i]);
                        speak(step.ex[i], () => {
                            alert("Session Complete. Returning to Hub.");
                            location.reload();
                        });
                    };
                    area.appendChild(card);
                });
            };

            const updateNarrator = (txt) => {
                document.getElementById('text-narrator').innerText = txt;
            };

            return { beginSession, handleFlow };
        })();
    </script>
</body>
</html>
