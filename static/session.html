<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAMIZEN</title>

<style>
:root{
--neon-blue:#00f2ff;
--neon-green:#2ecc71;
--neon-red:#ff3131;
--bg:#020205;
}
body{margin:0;background:var(--bg);color:white;font-family:Orbitron;overflow:hidden}

/* HUD */
#hud{position:fixed;top:10px;width:100%;display:flex;justify-content:center;z-index:100}
#timer{font-size:28px;color:var(--neon-red);border:2px solid var(--neon-red);padding:5px 15px}

/* OVERLAY */
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:var(--bg);z-index:999}
#text{font-size:20px;max-width:600px;padding:20px}

/* BREATH */
#breath{
width:120px;height:120px;border-radius:50%;
border:4px solid var(--neon-blue);
display:none;align-items:center;justify-content:center;
font-size:14px;
animation:breathAnim 4s infinite;
}
@keyframes breathAnim{
0%{transform:scale(1)}
50%{transform:scale(1.4)}
100%{transform:scale(1)}
}

canvas{display:block}
button{padding:10px 20px;margin-top:20px}
</style>
</head>

<body>

<div id="hud">
<div id="timer">10:00</div>
</div>

<div id="overlay">
<div id="text">KAMIZEN</div>
<div id="breath">INHALE</div>
<button onclick="startFlow()">START</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
// ==================== BASE GAME (TU MOTOR) ====================
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');

let stats={money:0,health:100,legacy:0};
let active=false,objects=[];
const user={x:0,y:0,size:60};

const variants={
good:[{t:"SAVE",s:"money",i:100,c:"#2ecc71"}],
bad:[{t:"DANGER",s:"health",i:-30,c:"#ff3131"}]
};

function spawn(){
if(!active)return;
const type=Math.random()>0.5?"good":"bad";
const item=variants[type][0];
objects.push({...item,x:Math.random()*canvas.width,y:-50,speed:3});
}

function update(){
if(!active)return;
objects.forEach((o,i)=>{
o.y+=o.speed;
let d=Math.hypot(o.x-user.x,o.y-user.y);
if(d<50){
if(o.s==="money")stats.money+=o.i;
if(o.s==="health")stats.health+=o.i;
objects.splice(i,1);
}
});
}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.beginPath();
ctx.arc(user.x,user.y,40,0,Math.PI*2);
ctx.strokeStyle="#00f2ff";
ctx.stroke();

objects.forEach(o=>{
ctx.fillStyle=o.c;
ctx.fillText(o.t,o.x,o.y);
});
}

function loop(){
if(active){
update();draw();
requestAnimationFrame(loop);
}
}

window.addEventListener('mousemove',e=>{
user.x=e.clientX;user.y=e.clientY;
});

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener('resize',resize);

// ==================== KAMIZEN FLOW ====================

let sessionTime=600;
let globalTimer;

function updateTimer(){
sessionTime--;
let m=Math.floor(sessionTime/60);
let s=sessionTime%60;
document.getElementById("timer").innerText=
`${m}:${s<10?"0":""}${s}`;
if(sessionTime<=0)endAll();
}

// ==================== FLOW ====================

async function startFlow(){
document.getElementById("overlay").style.display="none";
globalTimer=setInterval(updateTimer,1000);

const data=await fetch("/api/session/start").then(r=>r.json());

await showText(data.story.en,5000);

await gamePhase(300);

await diagnostic("FIRST");

await missionPhase(data.missions[0]);

await gamePhase(300);

await diagnostic("FINAL");

await finalBreath();

endAll();
}

// ==================== PHASES ====================

function showText(text,time){
return new Promise(res=>{
overlayOn(text);
setTimeout(res,time);
});
}

function overlayOn(text){
document.getElementById("overlay").style.display="flex";
document.getElementById("text").innerText=text;
}

function overlayOff(){
document.getElementById("overlay").style.display="none";
}

// GAME
function gamePhase(sec){
return new Promise(res=>{
overlayOff();
active=true;
let t=sec;

const sp=setInterval(spawn,800);

const timer=setInterval(()=>{
t--;
if(t<=0){
clearInterval(timer);
clearInterval(sp);
active=false;
res();
}
},1000);

loop();
});
}

// DIAGNOSTIC
function diagnostic(type){
return new Promise(res=>{
let msg="";

if(stats.health<50)msg="Low stability";
else msg="Stable";

if(stats.money>300)msg+=" | Good decisions";
else msg+=" | Needs improvement";

overlayOn(type+" DIAGNOSTIC: "+msg);
setTimeout(res,4000);
});
}

// MISSION
async function missionPhase(mission){
for(let step of mission.b){

if(step.t==="v"||step.t==="h"){
await showText(step.tx.en,3000);
}

if(step.t==="d"){
await decision(step);
}

if(step.t==="sil"){
await silence(step);
}

if(step.t==="breath_auto"){
await breath(step.d);
}

}
}

// DECISION
function decision(step){
return new Promise(res=>{
let txt=step.q.en+"\n"+step.op.join(" | ");
overlayOn(txt);

setTimeout(()=>{
res();
},4000);
});
}

// SILENCE
function silence(step){
return new Promise(res=>{
overlayOn(step.tx.en);
setTimeout(res,step.d*1000);
});
}

// BREATH
function breath(seconds){
return new Promise(res=>{
const b=document.getElementById("breath");
b.style.display="flex";
overlayOn("");

let t=seconds;

const i=setInterval(()=>{
b.innerText=(t%4<2)?"INHALE":"EXHALE";
t--;
if(t<=0){
clearInterval(i);
b.style.display="none";
res();
}
},1000);
});
}

// FINAL BREATH
function finalBreath(){
return breath(15);
}

// END
function endAll(){
overlayOn("SESSION COMPLETE");
clearInterval(globalTimer);
}

// ====================
</script>
</body>
</html>
