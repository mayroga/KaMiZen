<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | AL CIELO PRO</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #001a33, #000);
    color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    overflow: hidden;
    cursor: crosshair;
    transition: background 0.5s;
}

#topbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 15px;
    z-index: 100;
    background: rgba(0,0,0,0.3);
}

/* 🔥 TOP UI REORGANIZADO */
#top-ui {
    display: flex;
    justify-content: space-around;
    font-weight: bold;
    font-size: 1.2rem;
    color: #00f2ff;
    gap: 20px;
    align-items: center;
}

#game { padding-top: 80px; position: relative; z-index: 10; }

button {
    padding: 15px 25px;
    margin: 10px;
    font-size: 18px;
    border: 2px solid #00f2ff;
    background: rgba(0, 242, 255, 0.1);
    color: white;
    border-radius: 12px;
    cursor: pointer;
}

button:hover {
    background: #00f2ff;
    color: #000;
}

.opt-btn {
    display: block;
    width: 80%;
    max-width: 500px;
    margin: 10px auto;
    text-align: left;
}

/* 🔵 BREATH NO INTERFIERE UI */
#breath {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle, #00f2ff, #0066ff);
    margin: 20px auto;
    display: none;
    position: relative;
    z-index: 5;
    pointer-events: none;
    opacity: 0.8;
}

/* FLOATING WORDS */
.floating {
    position: absolute;
    padding: 8px 18px;
    border-radius: 20px;
    font-weight: bold;
    cursor: pointer;
    animation: floatUp 5s linear forwards;
    z-index: 20;
}

@keyframes floatUp {
    from { transform: translateY(110vh); }
    to { transform: translateY(-20vh); }
}

.blast {
    transform: scale(3);
    opacity: 0;
    transition: 0.3s;
}

#explanation-box {
    background: rgba(0,0,0,0.8);
    border-left: 5px solid #00f2ff;
    padding: 20px;
    margin: 20px auto;
    width: 80%;
    display: none;
}
</style>
</head>

<body>

<div id="topbar">
    <button onclick="toggleLang()">EN/ES</button>

    <!-- 🔥 POINTS MOVIDO AQUÍ -->
    <div id="top-ui">
        <div id="stat-focus">FOCUS: 100%</div>
        <div id="points-display">POINTS: 0</div>
        <div id="stat-life">ENERGY</div>
    </div>
</div>

<div id="game">

<h2 id="hero-name"></h2>

<div id="breath"></div>

<div id="story">Loading Mission...</div>
<div id="analysis"></div>

<div id="explanation-box"></div>
<div id="options"></div>

</div>

<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="ok" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

<script>

let lang = "en";
let missionId = 1;
let score = 0;
let currentMissionData = null;

// =====================================================
const state = {
    score: 0,
    lang: "en",
    mode: "mission"
};

// =====================================================
const LIFE_MAP = {
    FEAR: {
        situation: "Threat detected",
        strategy: "Do not freeze. Act fast.",
        power: "INSTINCT reaction 0.5s"
    },
    SHIELD: {
        situation: "Manipulation detected",
        strategy: "Question urgency and offers.",
        power: "SHIELD: deception filter"
    },
    SURVIVAL: {
        situation: "Danger zone",
        strategy: "Cover first, escape second.",
        power: "SURVIVAL priority"
    }
};

// =====================================================
const wordPool = {
good: ["FOCUS","TRUTH","CALM","POWER","CONTROL","RESPECT","ACTION","SURVIVAL","INSTINCT","ESCAPE","AWARENESS","ALERT","REACTION"],
bad: ["FEAR","LIE","CHAOS","IMPULSE","LAZY","ANGRY","SHAME","THREAT","FREEZE","VICTIM","PANIC","DANGER","TRAP"],
neutral: ["STREET","CITY","WALK","WATCH","WAIT","VOICE"]
};

// =====================================================
function init(){
    document.getElementById("hero-name").innerText = "KAMIZEN";
    startFloatingSystem();
    loadNextMission();
}

// =====================================================
function speak(t){
    let u=new SpeechSynthesisUtterance(t);
    u.lang="en-US";
    u.rate=0.9;
    speechSynthesis.speak(u);
}

// =====================================================
async function loadNextMission(){
    try{
        const res=await fetch(`/api/mission/${missionId}`);
        currentMissionData=await res.json();
        renderMission(currentMissionData);
    }catch{}
}

// =====================================================
function renderMission(m){

const story=m.blocks.find(b=>b.type==="story").text.en;
const analysis=m.blocks.find(b=>b.type==="analysis").text.en;
const decision=m.blocks.find(b=>b.type==="decision");

document.getElementById("story").innerText=story;
document.getElementById("analysis").innerText="";

speak(story);

setTimeout(()=>{
document.getElementById("analysis").innerText=analysis;
speak(analysis);
},3000);

setTimeout(()=>displayOptions(decision.options),6000);
}

// =====================================================
function displayOptions(options){
const c=document.getElementById("options");
c.innerHTML="";

options.forEach(opt=>{
let b=document.createElement("button");
b.className="opt-btn";
b.innerText=opt.text.en;
b.onclick=()=>handleChoice(opt);
c.appendChild(b);
});
}

// =====================================================
function handleChoice(opt){

const box=document.getElementById("explanation-box");
box.style.display="block";

const info=LIFE_MAP[opt.key];

if(opt.correct){
score+=20;
speak("Correct decision");
box.innerText=info?info.strategy:"Correct choice";
}else{
score-=10;
speak("Incorrect decision");
box.innerText="Wrong reaction";
}

updatePoints();

setTimeout(()=>startSilence(),4000);
}

// =====================================================
// 🔥 POINT SYSTEM CENTRAL
// =====================================================
function updatePoints(){
    document.getElementById("points-display").innerText = "POINTS: " + score;
}

// =====================================================
function startSilence(){

const time=Math.min(20+missionId,60);

document.getElementById("story").innerText="SILENCE MODE: "+time+" SECONDS";

let t=time;

const id=setInterval(()=>{

t--;
if(t<=0){
clearInterval(id);
missionId++;
loadNextMission();
}

},1000);
}

// =====================================================
function startFloatingSystem(){

setInterval(()=>{

const type=Math.random()>0.7?"bad":Math.random()>0.4?"good":"neutral";
const word=wordPool[type][Math.floor(Math.random()*wordPool[type].length)];

const el=document.createElement("div");
el.className="floating";
el.innerText=word;
el.style.left=Math.random()*90+"vw";
el.style.color=type==="good"?"#00ff00":type==="bad"?"#ff0000":"#ffff00";
el.style.border="2px solid currentColor";

el.onclick=()=>{

const info=LIFE_MAP[word];

if(type==="good") score+=5;
if(type==="bad") score-=10;

updatePoints();

el.classList.add("blast");
setTimeout(()=>el.remove(),300);

if(info){
document.getElementById("analysis").innerText=
info.situation+" | "+info.strategy+" | "+info.power;
speak(info.strategy);
}

};

document.body.appendChild(el);
setTimeout(()=>el.remove(),5000);

},1200);
}

window.onload=init;

</script>
</body>
</html>
