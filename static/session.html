<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KAMIZEN LIFE SYSTEM - CORE SESSION</title>

<style>

:root{
    --bg:#0b1220;
    --card:#111a2e;
    --primary:#3b82f6;
    --success:#22c55e;
    --danger:#ef4444;
    --text:#ffffff;
    --dim:#94a3b8;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Segoe UI, Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
    min-height:100vh;
}

#app{
    width:100%;
    max-width:720px;
    padding:20px;
}

/* =========================
   CARD SYSTEM
========================= */

.card{
    background:var(--card);
    padding:20px;
    border-radius:16px;
    margin:15px 0;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    border:1px solid rgba(255,255,255,0.05);
}

/* =========================
   BUTTONS
========================= */

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:var(--primary);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:translateY(-2px);
}

button:nth-child(2){
    background:#64748b;
}

button:nth-child(3){
    background:var(--danger);
}

/* =========================
   ANSWERS
========================= */

.answer{
    background:#1f2937;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    cursor:pointer;
    border-left:4px solid var(--primary);
    transition:0.2s;
}

.answer:hover{
    transform:translateX(5px);
    background:#374151;
}

/* =========================
   BREATHING VISUAL
========================= */

.breath-circle{
    width:140px;
    height:140px;
    border-radius:50%;
    margin:30px auto;
    border:4px solid var(--primary);
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform 4s ease-in-out;
}

/* =========================
   TEXT
========================= */

h1,h2,h3{
    margin:10px 0;
}

.small{
    font-size:12px;
    color:var(--dim);
}

.center{
    text-align:center;
}

</style>

</head>

<body>

<div id="app">

    <!-- =========================
         INTRO HEADER (STATIC ONLY)
    ========================== -->

    <div class="card center">

        <h2 style="color:var(--primary);">
            KAMIZEN LIFE SYSTEM
        </h2>

        <h3>
            BODY • CALM • FOCUS • PRESENCE
        </h3>

        <p class="small">
            Stories + Missions Active
        </p>

    </div>

    <!-- =========================
         MAIN ENGINE SCREEN
    ========================== -->

    <div id="screen" class="card center">

        <h3>Loading system...</h3>

        <p class="small">
            Initializing stories & missions
        </p>

    </div>

    <!-- =========================
         BREATHING VISUAL (CONTROLLED BY ENGINE)
    ========================== -->

    <div class="card center">

        <h3>Breathing Module</h3>

        <div class="breath-circle" id="breathCircle">

            <span id="breathLabel">
                FOCUS
            </span>

        </div>

        <p class="small">
            Controlled by system engine (auto + manual hybrid mode)
        </p>

    </div>

</div>

<!-- =========================
     ENGINE CONTROLLER
========================= -->

<script src="/static/js/engine.js"></script>

</body>

</html>
