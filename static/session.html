<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAMIZEN | SURVIVAL SESSION</title>

<style>
/* =====================================================
   🌌 GLOBAL STYLE (DOPAMINE + CONTROL INTERFACE)
===================================================== */

body {
    margin: 0;
    background: radial-gradient(circle, #001a33, #000);
    color: #fff;
    font-family: Arial, sans-serif;
    overflow: hidden;
    text-align: center;
}

/* =====================================================
   📊 TOP BAR
===================================================== */

#topbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: rgba(0,0,0,0.4);
    z-index: 100;
}

#score-display {
    font-weight: bold;
    color: #00f2ff;
}

/* =====================================================
   🎮 GAME AREA
===================================================== */

#game {
    padding-top: 80px;
}

/* =====================================================
   🧠 TEXT BLOCKS
===================================================== */

#story {
    font-size: 1.6rem;
    margin: 20px;
    font-weight: bold;
}

#analysis {
    color: #00f2ff;
    margin-bottom: 20px;
}

/* =====================================================
   🎯 BUTTONS
===================================================== */

button {
    padding: 14px 20px;
    margin: 8px;
    font-size: 16px;
    border: 2px solid #00f2ff;
    background: rgba(0,242,255,0.1);
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #00f2ff;
    color: black;
}

/* =====================================================
   🎮 OPTIONS
===================================================== */

.opt-btn {
    display: block;
    width: 80%;
    max-width: 500px;
    margin: 10px auto;
    text-align: left;
}

/* =====================================================
   🧘 BREATH SYSTEM
===================================================== */

#breath {
    width: 100px;
    height: 100px;
    margin: 20px auto;
    border-radius: 50%;
    background: radial-gradient(circle, #00f2ff, #0066ff);
    box-shadow: 0 0 25px #00f2ff;
    display: none;
    transition: transform 3s ease-in-out;
}

/* =====================================================
   🌌 FLOATING WORDS
===================================================== */

.floating-word {
    position: absolute;
    padding: 8px 16px;
    border-radius: 20px;
    font-weight: bold;
    cursor: pointer;
    animation: floatUp 5s linear forwards;
    user-select: none;
}

@keyframes floatUp {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* =====================================================
   📦 EXPLANATION BOX
===================================================== */

#explanation-box {
    background: rgba(0,0,0,0.85);
    border-left: 4px solid #00f2ff;
    padding: 15px;
    margin: 20px auto;
    width: 80%;
    display: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- =====================================================
     📊 TOP UI
===================================================== -->
<div id="topbar">
    <button onclick="KamizenEngine.toggleLang()">EN/ES</button>
    <div id="score-display">POINTS: 0</div>
</div>

<!-- =====================================================
     🎮 GAME CONTAINER
===================================================== -->
<div id="game">

    <div id="story">Loading mission...</div>
    <div id="analysis"></div>

    <div id="breath"></div>

    <div id="explanation-box"></div>

    <div id="options"></div>

</div>

<!-- =====================================================
     🔊 AUDIO (ENGINE CONTROLLED ONLY)
===================================================== -->
<audio id="bg" src="/static/sounds/bg.mp3" loop></audio>
<audio id="ok" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/error.mp3"></audio>

<!-- =====================================================
     🚀 ENGINE LOAD
===================================================== -->
<script src="/static/engine.js"></script>

<script>
/**
 * 🧠 SESSION LAYER RULES:
 * - NO GAME LOGIC HERE
 * - ONLY FALLBACK UI SYNC (SAFE MODE)
 * - ENGINE IS MASTER
 */

window.onload = () => {
    if (window.KamizenEngine) {
        KamizenEngine.init();
    } else {
        document.getElementById("story").innerText =
            "ENGINE OFFLINE - SAFE MODE ACTIVE";
    }
};
</script>

</body>
</html>
