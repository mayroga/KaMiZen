<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN CORE</title>

<style>
:root{
  --bg:#000;
  --neon:#00f2ff;
  --green:#00ff88;
  --red:#ff0044;
  --yellow:#ffcc00;
  --panel:rgba(0,20,40,0.95);
}

body{
  margin:0;
  background:var(--bg);
  color:var(--neon);
  font-family:Arial;
  overflow:hidden;
}

/* BREATHING CIRCLE */
#breath{
  position:absolute;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%) scale(1);
  width:140px;
  height:140px;
  border-radius:50%;
  background:rgba(0,200,255,0.2);
  border:2px solid var(--neon);
  transition:4s linear;
}

/* HEADER */
#header{
  position:absolute;
  top:10px;
  width:95%;
  display:flex;
  justify-content:space-between;
}

#xpBar{
  width:180px;
  height:10px;
  border:1px solid var(--neon);
}
#xpFill{
  height:100%;
  width:0%;
  background:var(--green);
  transition:0.3s;
}

/* TEXT */
#message{
  position:absolute;
  bottom:230px;
  width:90%;
  left:5%;
  padding:15px;
  border:1px solid var(--neon);
  background:var(--panel);
  text-align:center;
}

#reason{
  position:absolute;
  bottom:300px;
  width:90%;
  left:5%;
  text-align:center;
}

/* OPTIONS */
#options{
  position:absolute;
  bottom:110px;
  width:90%;
  left:5%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  padding:15px;
  border:1px solid var(--neon);
  background:black;
  color:var(--neon);
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:var(--neon);
  color:black;
}

.correct{ background:var(--green)!important; color:black!important;}
.wrong{ background:var(--red)!important; color:white!important;}

/* NAV */
#nav{
  position:absolute;
  bottom:20px;
  width:90%;
  left:5%;
  display:flex;
  justify-content:space-between;
}

/* BREAK */
#break{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}
</style>
</head>

<body>

<div id="breath"></div>

<div id="header">
  <div id="xpBar"><div id="xpFill"></div></div>
  <button onclick="toggleLang()">EN/ES</button>
</div>

<div id="reason"></div>
<div id="message">CLICK TO START</div>

<div id="options"></div>

<div id="nav">
  <button onclick="back()">BACK</button>
  <button onclick="restart()">RESTART</button>
  <button onclick="next()">NEXT</button>
</div>

<div id="break">
  <h2>🧠 BREAK MODE</h2>
  <p>Respira. 30 segundos sin pantalla.</p>
</div>

<script>
let session_id=null;
let mission=null;
let lang="en";
let xp=0;

/* AUDIO */
const ctx=new (window.AudioContext||window.webkitAudioContext)();

function sound(type){
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination);

  if(type==="win") o.frequency.value=1000;
  if(type==="lose") o.frequency.value=120;
  if(type==="click") o.frequency.value=500;

  g.gain.value=0.3;
  o.start();
  o.stop(ctx.currentTime+0.3);
}

/* VOZ COACH */
function speak(text){
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.9;
  u.lang=lang==="en"?"en-US":"es-ES";
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

/* RESPIRACIÓN REAL */
function startBreathing(){
  const b=document.getElementById("breath");

  setInterval(()=>{
    b.style.transform="translate(-50%,-50%) scale(1.5)";
    speak(lang==="en"?"Inhale...":"Inhala...");

    setTimeout(()=>{
      b.style.transform="translate(-50%,-50%) scale(1)";
      speak(lang==="en"?"Exhale...":"Exhala...");
    },4000);

  },8000);
}

/* START */
async function start(){
  if(ctx.state==="suspended") await ctx.resume();

  const r=await fetch("/start",{method:"POST"});
  const d=await r.json();

  session_id=d.session_id;
  mission=d.mission;

  startBreathing();
  render();
}

/* SHUFFLE */
function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

/* RENDER */
function render(){
  if(!mission) return;

  const msg=document.getElementById("message");
  const opt=document.getElementById("options");

  opt.innerHTML="";
  document.getElementById("reason").innerText="";

  let textBlock=mission.blocks.find(b=>b.text);
  let text=textBlock?.text?.[lang] || "...";

  msg.innerText=text;
  speak(text);

  let tvid=mission.blocks.find(b=>b.type==="tvid");

  if(tvid){
    let options=shuffle([...tvid.options]);

    options.forEach(o=>{
      const btn=document.createElement("button");
      btn.innerText=o.text[lang];

      btn.onclick=()=>choose(btn,o);

      opt.appendChild(btn);
    });
  }

  /* EJECUCIÓN REAL TVID */
  if(mission.blocks.some(b=>b.type==="tvid_exercise")){
    runExercise();
  }
}

/* EJERCICIO REAL */
function runExercise(){
  speak("Close your eyes. Breathe deep.");

  setTimeout(()=>{
    speak("Now smile. Hold it.");
  },4000);
}

/* CHOOSE */
async function choose(btn,o){

  const r=await fetch("/judge",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      session_id,
      decision:o.code
    })
  });

  const d=await r.json();

  document.getElementById("reason").innerText=o.reason[lang];

  if(d.correct){
    btn.classList.add("correct");
    sound("win");
    speak("Correct. You gain control and focus.");
  }else{
    btn.classList.add("wrong");
    sound("lose");
    speak("Wrong. You lose focus. Learn and improve.");
  }

  xp=d.xp;
  document.getElementById("xpFill").style.width=(xp%100)+"%";

  if(d.break){
    showBreak();
  }

  setTimeout(()=>{
    mission=d.next_mission;
    render();
  },2000);
}

/* BREAK */
function showBreak(){
  const b=document.getElementById("break");
  b.style.display="flex";

  speak("Stop. Your brain needs recovery.");

  setTimeout(()=>{
    b.style.display="none";
  },30000);
}

/* NAV CASTIGO */
async function next(){
  sound("click");

  const r=await fetch("/force_next",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({session_id})
  });

  const d=await r.json();

  alert(d.message);
  speak(d.message);

  xp=d.xp;
  mission=d.mission;
  render();
}

async function back(){
  sound("click");

  const r=await fetch("/force_back",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({session_id})
  });

  const d=await r.json();

  alert(d.message);
  speak(d.message);

  xp=d.xp;
  mission=d.mission;
  render();
}

function restart(){
  location.reload();
}

function toggleLang(){
  lang=lang==="en"?"es":"en";
  render();
}

/* INIT */
document.getElementById("message").onclick=start;
</script>

</body>
</html>
