<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>KaMiZen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: #000;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-position: center;
            background-repeat: no-repeat;
            background-size: 110%;
            /* Transición suave para evitar parpadeo negro */
            transition: background-image 3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .zoom-active {
            animation: infiniteZoom 25s ease-in-out infinite alternate;
        }

        @keyframes infiniteZoom {
            from { background-size: 110%; }
            to { background-size: 155%; }
        }

        #app {
            width: 92%;
            max-width: 400px;
            /* Panel ultra transparente */
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 35px;
            padding: 30px 20px;
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 70vh;
        }

        #logo {
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1.5px;
            margin-bottom: 10px;
        }

        #mental-panel {
            display: flex; justify-content: space-around;
            font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
            color: rgba(255,255,255,0.6); margin-bottom: 20px;
        }

        #text-content {
            font-size: 19px; font-weight: 300; line-height: 1.4;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        #breath-circle {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 2px solid #60a5fa;
            background: rgba(96, 165, 250, 0.1);
            margin: 20px auto;
            display: none;
            justify-content: center; align-items: center;
            position: relative;
        }

        .breathing-anim {
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(0.9); box-shadow: 0 0 10px rgba(96,165,250,0.2); }
            50% { transform: scale(1.25); box-shadow: 0 0 40px rgba(96,165,250,0.6); }
        }

        #timer-display {
            font-size: 45px; font-weight: 600; color: #60a5fa;
        }

        button {
            padding: 16px; border: none; border-radius: 20px;
            cursor: pointer; background: #2563eb; color: white;
            font-weight: 600; font-size: 16px; width: 100%;
            transition: 0.3s;
        }

        button:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); }

        .secondary { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); margin-top: 10px; }

        #warning-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 1000; justify-content: center; align-items: center; padding: 20px;
        }

        /* Responsive Fixes */
        @media (max-height: 700px) {
            #app { padding: 20px; min-height: 85vh; }
            #logo { font-size: 26px; }
            #text-content { font-size: 17px; }
        }
    </style>
</head>
<body class="zoom-active">
    <audio id="bg-music" loop></audio>
    
    <div id="warning-modal">
        <div style="text-align: center;">
            <h2 style="color:#ef4444; margin-bottom:15px;">INACTIVITY</h2>
            <button onclick="resetInactivity()">I AM AWAKE</button>
        </div>
    </div>

    <div id="app">
        <button id="lang-btn" style="width: auto; position: absolute; top: 15px; right: 15px; padding: 5px 12px; font-size: 12px;">ES</button>
        <div id="logo">KaMiZen</div>
        
        <div id="mental-panel">
            <span id="streak">Streak: 0</span>
            <span id="level-display">Lv. 1</span>
        </div>

        <div id="block-container">
            <div id="text-content">Focus your mind...</div>
            <div id="breath-circle"><span style="font-size: 10px;">BREATHE</span></div>
            <div id="timer-display" style="display:none;">00:00</div>
        </div>
        
        <div id="action-area">
            <button id="main-btn">START</button>
            <div style="display: flex; gap: 8px; margin-top: 10px;">
                <button id="back-btn" class="secondary" style="font-size: 11px;">BACK</button>
                <button id="fwd-btn" class="secondary" style="font-size: 11px;">SKIP</button>
            </div>
        </div>
    </div>

    <script src="/static/scripts.js"></script>
</body>
</html>
