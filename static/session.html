<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN SESSION</title>

<style>
:root {
    --neon-blue:#00f2ff;
    --neon-green:#00ff41;
    --neon-red:#ff003c;
    --neon-yellow:#ffff00;
    --matrix-bg:#00050a;
    --neon-gold:#ffcc00;
}

body{
    margin:0;
    background:var(--matrix-bg);
    color:#fff;
    font-family:'Courier New', monospace;
    overflow:hidden;
}

/* HUD */
#hud{
    position:fixed;
    top:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px;
    z-index:50;
}
#timer-box{font-size:2.5rem;color:var(--neon-blue);}
#score-box{font-size:2rem;border:2px solid #fff;padding:5px 15px;}
#mastery-lvl{color:var(--neon-green);}

/* stats */
#life-stats{
    position:fixed;
    bottom:20px;
    left:20px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    z-index:50;
}
.stat-pill{background:#000;padding:8px;border:1px solid #333}

/* floating words */
.floating{
    position:absolute;
    padding:12px 25px;
    font-weight:bold;
    border-radius:8px;
    background:rgba(0,0,0,0.9);
    cursor:pointer;
    z-index:10;
    animation:floatUp 10s linear forwards; /* MÁS LENTO */
}

/* colores */
.word-power{border:2px solid var(--neon-green);color:var(--neon-green);}
.word-risk{border:2px solid var(--neon-red);color:var(--neon-red);}
.word-silence{border:2px solid var(--neon-yellow);color:var(--neon-yellow);}
.word-money{border:2px solid var(--neon-gold);color:var(--neon-gold);}
.word-business{border:2px solid #00e5ff;color:#00e5ff;}
.word-growth{border:2px solid #00ff99;color:#00ff99;}

@keyframes floatUp{
    from{transform:translateY(110vh);}
    to{transform:translateY(-20vh);}
}

/* EXPLOSIÓN */
.explode{
    animation:blast 0.4s ease-out forwards!important;
}
@keyframes blast{
    0%{transform:scale(1);opacity:1;}
    100%{transform:scale(3.5);opacity:0;}
}

/* overlay */
#overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:200;
}

/* BOTÓN CENTRAL */
#continue-btn{
    margin-top:25px;
    padding:15px 30px;
    border:2px solid #fff;
    cursor:pointer;
    display:block; /* SIEMPRE VISIBLE */
}

/* breathing */
#breath-container{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:300px;
    height:300px;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999; /* SIEMPRE ENCIMA */
}

#breath-circle{
    width:140px;
    height:140px;
    border-radius:50%;
    border:3px solid var(--neon-blue);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:var(--neon-blue);
    animation:breathAnim 6s ease-in-out infinite;
}

@keyframes breathAnim{
    0%{transform:scale(0.7);}
    50%{transform:scale(1.4);}
    100%{transform:scale(0.7);}
}
</style>
</head>

<body>

<div id="hud">
    <div id="timer-box">05:00</div>
    <div id="score-box">0</div>
    <div id="mastery-lvl">x1</div>
</div>

<div id="life-stats">
    <div class="stat-pill">Respect <span id="v-respect">50</span></div>
    <div class="stat-pill">Peace <span id="v-peace">50</span></div>
    <div class="stat-pill">Lead <span id="v-lead">50</span></div>
    <div class="stat-pill">Money <span id="v-money">100</span></div>
    <div class="stat-pill">Safety <span id="v-safety">100</span></div>
    <div class="stat-pill">Happy <span id="v-happy">50</span></div>
</div>

<div id="breath-container">
    <div id="breath-circle">INHALE</div>
</div>

<div id="overlay">
    <h1 id="phase-title"></h1>
    <p id="phase-desc"></p>
    <div id="decision-grid"></div>
    <button id="continue-btn">CONTINUE</button>
</div>

<script>

/* AUDIO (NO TOCADO) */
const AudioEngine={
ctx:null,
init(){
if(this.ctx)return;
this.ctx=new(window.AudioContext||window.webkitAudioContext)();
this.music();
},
music(){
const loop=()=>{
let o=this.ctx.createOscillator();
let g=this.ctx.createGain();
o.frequency.value=220+Math.random()*200;
g.gain.value=0.03;
o.connect(g);g.connect(this.ctx.destination);
o.start();o.stop(this.ctx.currentTime+0.3);
setTimeout(loop,300);
};
loop();
},
click(){
let o=this.ctx.createOscillator();
let g=this.ctx.createGain();
o.frequency.value=700;
g.gain.value=0.1;
o.connect(g);g.connect(this.ctx.destination);
o.start();o.stop(this.ctx.currentTime+0.1);
},
explode(){
let buffer=this.ctx.createBuffer(1,this.ctx.sampleRate*0.1,this.ctx.sampleRate);
let data=buffer.getChannelData(0);
for(let i=0;i<data.length;i++)data[i]=Math.random()*2-1;
let n=this.ctx.createBufferSource();
n.buffer=buffer;
let g=this.ctx.createGain();
g.gain.value=0.2;
n.connect(g);g.connect(this.ctx.destination);
n.start();
}
};

document.addEventListener("click",()=>AudioEngine.init(),{once:true});

/* STATE */
let state={
score:0,
stats:{respect:50,peace:50,lead:50,money:100,happy:50,safety:100}
};

/* HUD */
function updateHUD(){
document.getElementById("score-box").innerText=state.score;
for(let k in state.stats){
document.getElementById("v-"+k).innerText=state.stats[k];
}
}

/* WORDS (ORIGINALES) */
const words={
power:["LISTEN FIRST","STAY CALM","THINK BEFORE","CONTROL EMOTION","RESPECT OTHERS"],
risk:["REACT ANGRY","BLAME OTHERS","LOSE CONTROL","FOLLOW CROWD"],
silence:["OBSERVE PEOPLE","BREATHE DEEP","WAIT MOMENT","INNER CONTROL"],
money:["INVEST SMART","BUILD VALUE","CASHFLOW","SAVE MONEY","THINK SCALE"],
business:["BUILD SYSTEM","SELL VALUE","LEAD MARKET","BRAND POWER","EXPAND NETWORK"],
growth:["LEARN FAST","IMPROVE DAILY","BUILD SKILL","LONG TERM THINK"]
};

/* SPAWN MEJORADO */
function spawnWord(){

const cats=["power","risk","silence","money","business","growth"];
const c=cats[Math.floor(Math.random()*cats.length)];

let div=document.createElement("div");
div.className="floating word-"+c;
div.innerText=words[c][Math.floor(Math.random()*words[c].length)];

let x=Math.random()*80;
let y=110;
let dx=(Math.random()*2-1)*0.2; /* MÁS SUAVE */
let dy=-0.25; /* MÁS LENTO */

function move(){
x+=dx;
y+=dy;

if(x<0||x>90)dx*=-1;

div.style.left=x+"vw";
div.style.top=y+"vh";

requestAnimationFrame(move);
}
move();

/* CLICK */
div.onclick=()=>{
if(div.dataset.clicked)return;
div.dataset.clicked=true;

div.classList.add("explode");

AudioEngine.click();
setTimeout(()=>AudioEngine.explode(),50);

/* lógica */
let positive=["power","silence","money","business","growth"].includes(c);

if(positive){
state.score+=20;
}else{
state.score-=15;
}

/* stats */
if(c==="power")state.stats.respect++;
if(c==="silence")state.stats.peace++;
if(c==="business")state.stats.lead++;
if(c==="money")state.stats.money++;
if(c==="growth")state.stats.happy++;
if(c==="risk")state.stats.safety--;

updateHUD();
};

document.body.appendChild(div);
setTimeout(()=>div.remove(),10000);
}

/* LOOP */
setInterval(spawnWord,1200);

updateHUD();

</script>

</body>
</html>
