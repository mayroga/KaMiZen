<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | AL CIELO PRO</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #001a33, #000);
    color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    overflow: hidden;
    cursor: crosshair;
    transition: background 0.5s;
}

#topbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 15px;
    z-index: 100;
    background: rgba(0,0,0,0.3);
}

#top-ui {
    display: flex;
    justify-content: space-around;
    font-weight: bold;
    font-size: 1.2rem;
    color: #00f2ff;
    gap: 20px;
    align-items: center;
}

#game { padding-top: 80px; position: relative; z-index: 10; }

button {
    padding: 15px 25px;
    margin: 10px;
    font-size: 18px;
    border: 2px solid #00f2ff;
    background: rgba(0, 242, 255, 0.1);
    color: white;
    border-radius: 12px;
    cursor: pointer;
}

button:hover {
    background: #00f2ff;
    color: #000;
}

.opt-btn {
    display: block;
    width: 80%;
    max-width: 500px;
    margin: 10px auto;
    text-align: left;
}

#breath {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle, #00f2ff, #0066ff);
    margin: 20px auto;
    display: none;
    position: relative;
    z-index: 5;
    pointer-events: none;
    opacity: 0.75;
    box-shadow: 0 0 25px #00f2ff;
}

.floating {
    position: absolute;
    padding: 10px 20px;
    border-radius: 20px;
    font-weight: bold;
    cursor: pointer;
    animation: floatUp 5s linear forwards;
    z-index: 20;
    transition: transform 0.2s ease;
}

.blast {
    transform: scale(6);
    opacity: 0;
    transition: 0.25s ease;
}

@keyframes floatUp {
    from { transform: translateY(110vh); }
    to { transform: translateY(-20vh); }
}

#explanation-box {
    background: rgba(0,0,0,0.8);
    border-left: 5px solid #00f2ff;
    padding: 20px;
    margin: 20px auto;
    width: 80%;
    display: none;
}
</style>
</head>

<body>

<div id="topbar">
    <button onclick="toggleLang()">EN/ES</button>

    <div id="top-ui">
        <div id="stat-focus">FOCUS: 100%</div>
        <div id="points-display">POINTS: 0</div>
        <div id="stat-life">ENERGY</div>
    </div>
</div>

<div id="game">

<h2 id="hero-name"></h2>

<div id="breath"></div>

<div id="story">Loading Mission...</div>
<div id="analysis"></div>

<div id="explanation-box"></div>
<div id="options"></div>

</div>

<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="ok" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

<script>

/* =========================
   ORIGINAL SESSION SYSTEM (NO TOCAR)
========================= */

let lang = "en";
let missionId = 1;
let score = 0;
let currentMissionData = null;

const wordPool = {
good: ["FOCUS","TRUTH","CALM","POWER","CONTROL","RESPECT","ACTION","SURVIVAL","INSTINCT","ESCAPE","AWARENESS","ALERT","REACTION"],
bad: ["FEAR","LIE","CHAOS","IMPULSE","LAZY","ANGRY","SHAME","THREAT","FREEZE","VICTIM","PANIC","DANGER","TRAP"],
neutral: ["STREET","CITY","WALK","WATCH","WAIT","VOICE"]
};

function init(){
    document.getElementById("hero-name").innerText = "KAMIZEN";
    startFloatingSystem();
    loadNextMission();

    // 🔥 INIT BACKUP ENGINE (NO INTERFIERE)
    try{
        KamizenEngine.init();
    }catch(e){}
}

function speak(t){
    let u=new SpeechSynthesisUtterance(t);
    u.lang="en-US";
    u.rate=0.9;
    speechSynthesis.speak(u);
}

async function loadNextMission(){
    try{
        const res=await fetch(`/api/mission/${missionId}`);
        currentMissionData=await res.json();
        renderMission(currentMissionData);
    }catch{}
}

function renderMission(m){

const story=m.blocks.find(b=>b.type==="story").text.en;
const analysis=m.blocks.find(b=>b.type==="analysis").text.en;
const decision=m.blocks.find(b=>b.type==="decision");

document.getElementById("story").innerText=story;
document.getElementById("analysis").innerText="";

speak(story);

setTimeout(()=>{
document.getElementById("analysis").innerText=analysis;
speak(analysis);
},3000);

setTimeout(()=>displayOptions(decision.options),6000);
}

function displayOptions(options){
const c=document.getElementById("options");
c.innerHTML="";

options.forEach(opt=>{
let b=document.createElement("button");
b.className="opt-btn";
b.innerText=opt.text.en;
b.onclick=()=>handleChoice(opt);
c.appendChild(b);
});
}

function handleChoice(opt){

const box=document.getElementById("explanation-box");
box.style.display="block";

if(opt.correct){
score+=20;
box.innerText=opt.explanation?.en || "Correct decision";
}else{
score-=10;
box.innerText=opt.explanation?.en || "Wrong decision";
}

updatePoints();
setTimeout(()=>startSilence(),3000);
}

function updatePoints(){
    document.getElementById("points-display").innerText = "POINTS: " + score;
}

/* =========================
   SILENCE + BREATH
========================= */

function startSilence(){

const time=Math.min(20+missionId,60);
document.getElementById("story").innerText="SILENCE MODE: "+time+" SECONDS";

startBreath();

let t=time;

const id=setInterval(()=>{
t--;
if(t<=0){
clearInterval(id);
stopBreath();
missionId++;
loadNextMission();
}
},1000);
}

let breathInterval;

function startBreath(){
    const b=document.getElementById("breath");
    b.style.display="block";
    let grow=true;

    breathInterval=setInterval(()=>{
        b.style.transform = grow ? "scale(2.5)" : "scale(1)";
        grow=!grow;
    },2000);
}

function stopBreath(){
    clearInterval(breathInterval);
    document.getElementById("breath").style.display="none";
}

/* =========================
   FLOATING SYSTEM
========================= */

function startFloatingSystem(){

setInterval(()=>{

const type=Math.random()>0.7?"bad":Math.random()>0.4?"good":"neutral";
const word=wordPool[type][Math.floor(Math.random()*wordPool[type].length)];

const el=document.createElement("div");
el.className="floating";
el.innerText=word;
el.style.left=Math.random()*90+"vw";
el.style.color=type==="good"?"#00ff00":type==="bad"?"#ff0000":"#ffff00";
el.style.border="2px solid currentColor";

el.onclick=()=>{
if(type==="good") score+=5;
if(type==="bad") score-=10;

document.getElementById("analysis").innerText =
"Word: "+word+" → Repetition builds identity.";

updatePoints();

el.style.transform="scale(6)";
el.style.opacity="0";

setTimeout(()=>el.remove(),300);
};

document.body.appendChild(el);
setTimeout(()=>el.remove(),5000);

},1200);
}

/* =========================
   🔥 BACKUP ENGINE (NO INTERFIERE)
========================= */

const KamizenEngine = (() => {

    const state = {
        score: 0,
        lang: "en",
        missions: [],
        missionIndex: 0
    };

    const DOM = {
        set(id,val){
            const el=document.getElementById(id);
            if(el) el.innerText=val;
        }
    };

    const Speech = {
        say(t){
            const u=new SpeechSynthesisUtterance(t);
            u.lang=state.lang==="es"?"es-ES":"en-US";
            speechSynthesis.speak(u);
        }
    };

    const Loader = {
        async loadAll(){
            const files=[
                "/static/missions_01_07.json",
                "/static/missions_15_21.json"
            ];
            for(let f of files){
                try{
                    const res=await fetch(f);
                    const data=await res.json();
                    state.missions.push(...data.missions);
                }catch{}
            }
        }
    };

    const Mission = {
        load(){
            if(!state.missions.length) return;

            const m=state.missions[state.missionIndex];
            const story=m.blocks.find(b=>b.type==="story").text[state.lang];

            DOM.set("analysis","[Backup Engine Ready]");
            Speech.say("Backup system active");
        }
    };

    return{
        async init(){
            await Loader.loadAll();
            Mission.load();
        }
    };

})();

/* ========================= */

window.onload=init;

</script>
</body>
</html>
