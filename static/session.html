<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>KaMiZen - NeuroFinancial Game</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<header>🔥 KaMiZen – 10 Min NeuroFinancial Game</header>

<div class="container">

<div class="left">

<div class="box">

<div class="status">
<div>🔥 Conectados: <span id="participants">0</span>/500</div>
<div class="timer">⏳ <span id="time">10:00</span></div>
</div>

</div>

<div class="box">

<div class="question" id="question">
Cargando desafío...
</div>

<input type="text" id="answerInput" placeholder="Escribe tu respuesta aquí...">

<button class="primary" onclick="sendAnswer()">
Enviar
</button>

<button onclick="skipChallenge()">
⏩ Adelantar
</button>

<div class="feedback" id="feedback"></div>

</div>

<div class="box">
<h3>🏆 Top 5 Traders</h3>
<div id="ranking"></div>
</div>

</div>

<div class="right">

<div class="box">
<h3>💬 Chat</h3>
<div class="chat-box" id="chatBox"></div>
</div>

</div>

</div>

<script src="/static/scripts.js"></script>
<script src="/static/app.js"></script>

</body>
</html>
