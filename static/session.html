<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AL CIELO - LIFE STRATEGY</title>
    <style>
        :root {
            --neon-blue: #00f2ff; --neon-gold: #f1c40f; --neon-green: #2ecc71;
            --neon-purple: #9b59b6; --neon-red: #ff3131; --bg-dark: #020205;
        }
        body { margin: 0; overflow: hidden; background: var(--bg-dark); color: white; font-family: 'Orbitron', sans-serif; cursor: none; }
        
        /* HUD SUPERIOR REFORZADO */
        #hud { position: absolute; top: 0; width: 100%; display: flex; justify-content: space-evenly; z-index: 100; background: rgba(0,0,0,0.8); padding: 10px 0; border-bottom: 1px solid var(--neon-blue); }
        .data-box { text-align: center; min-width: 100px; }
        .label { font-size: 10px; color: var(--neon-blue); font-weight: 900; display: block; letter-spacing: 1px; }
        .value { font-size: 22px; font-weight: 900; color: #fff; }
        
        /* RELOJ GIGANTE */
        #timer-box { border: 2px solid var(--neon-red); padding: 5px 20px; border-radius: 10px; animation: pulse 2s infinite; }
        #val-time { font-size: 30px; color: var(--neon-red); }

        /* SISTEMA DE OVERLAY (HISTORIAS Y MISIONES) */
        #overlay-system { position: fixed; inset: 0; background: var(--bg-dark); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        #content-area { max-width: 800px; width: 90%; }
        .mission-text { font-size: 18px; line-height: 1.6; color: #fff; margin: 20px 0; }
        .scientific-inf { font-size: 12px; color: var(--neon-blue); font-style: italic; margin-top: 10px; }
        
        /* CÍRCULO RESPIRATORIO KAMIZEN */
        #breathing-node { 
            width: 250px; height: 250px; 
            border: 8px solid var(--neon-blue); 
            border-radius: 50%; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            margin: 30px auto;
            box-shadow: 0 0 50px var(--neon-blue);
            transition: transform 4s ease-in-out; 
        }
        #breathing-text { font-size: 24px; font-weight: 900; color: var(--neon-blue); text-transform: uppercase; }

        .btn-start { padding: 20px 60px; background: var(--neon-blue); border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; border-radius: 50px; box-shadow: 0 0 30px var(--neon-blue); margin-top: 30px; transition: 0.3s; }
        .btn-start:hover { transform: scale(1.1); }

        canvas { display: block; }
        #flash-effect { position: fixed; inset: 0; pointer-events: none; z-index: 99; opacity: 0; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="flash-effect"></div>

<div id="hud">
    <div id="timer-box" class="data-box"><span class="label">SESSION TIME</span><span id="val-time">05:00</span></div>
    <div class="data-box"><span class="label">CAPITAL</span><span id="val-money" class="value">0</span></div>
    <div class="data-box"><span class="label">STABILITY</span><span id="val-health" class="value">100%</span></div>
    <div class="data-box"><span class="label">LEGACY</span><span id="val-legacy" class="value">0</span></div>
</div>

<div id="overlay-system">
    <div id="content-area">
        <h1 id="display-title" style="color: var(--neon-gold); letter-spacing: 5px;">INITIALIZING...</h1>
        <div id="display-body" class="mission-text"></div>
        
        <!-- Círculo Azul Automático -->
        <div id="breathing-node"><span id="breathing-text">INHALE</span></div>
        
        <div id="display-inf" class="scientific-inf"></div>
        <button id="action-btn" class="btn-start" onclick="Engine.start()">START TRAINING</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<!-- Audio Effects -->
<audio id="sfxGlass" src="https://actions.google.com/sounds/v1/science_fiction/glitch_sequence.ogg"></audio>

<script src="static/js/engine.js"></script>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const flash = document.getElementById('flash-effect');

// Configuración de juego integrada con las palabras de engine.js
let gameActive = false;
let gameSeconds = 300;
let objects = [];
const user = { x: 0, y: 0, size: 50 };

const pillars = [
    { id: "LIMITS", c: "#ff3131", impact: "health", val: -15 },
    { id: "VALUE", c: "#f1c40f", impact: "money", val: 100 },
    { id: "BALANCE", c: "#2ecc71", impact: "health", val: 10 },
    { id: "LEGACY", c: "#9b59b6", impact: "legacy", val: 20 },
    { id: "METHOD", c: "#00f2ff", impact: "aware", val: 15 }
];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Seguimiento de entrada
const updatePos = (e) => {
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    user.x = clientX;
    user.y = clientY;
};
window.addEventListener('mousemove', updatePos);
window.addEventListener('touchmove', updatePos, {passive: false});

function spawnObject() {
    if(!gameActive) return;
    const type = pillars[Math.floor(Math.random() * pillars.length)];
    objects.push({
        ...type,
        x: Math.random() * (canvas.width - 100) + 50,
        y: -50,
        speed: 3 + Math.random() * 4
    });
}

function updateGame() {
    if(!gameActive) return;
    
    objects.forEach((obj, i) => {
        obj.y += obj.speed;
        
        // Colisión
        const dist = Math.sqrt((obj.x - user.x)**2 + (obj.y - user.y)**2);
        if(dist < user.size) {
            triggerFlash(obj.val > 0 ? 'rgba(0,242,255,0.2)' : 'rgba(255,49,49,0.2)');
            // Actualizar HUD localmente
            if(obj.impact === 'money') document.getElementById('val-money').innerText = parseInt(document.getElementById('val-money').innerText) + obj.val;
            if(obj.impact === 'health') {
                let h = parseInt(document.getElementById('val-health').innerText);
                document.getElementById('val-health').innerText = Math.max(0, Math.min(100, h + obj.val)) + "%";
            }
            if(obj.impact === 'legacy') document.getElementById('val-legacy').innerText = parseInt(document.getElementById('val-legacy').innerText) + obj.val;
            
            objects.splice(i, 1);
            document.getElementById('sfxGlass').cloneNode().play();
        }
        if(obj.y > canvas.height + 50) objects.splice(i, 1);
    });
}

function drawGame() {
    ctx.fillStyle = 'rgba(2, 2, 5, 0.2)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Usuario (Cursor)
    ctx.strokeStyle = varColor('--neon-blue');
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(user.x, user.y, user.size, 0, Math.PI*2);
    ctx.stroke();

    // Objetos
    objects.forEach(obj => {
        ctx.fillStyle = obj.c;
        ctx.font = "bold 14px Orbitron";
        ctx.textAlign = "center";
        ctx.fillText(obj.id, obj.x, obj.y - 15);
        
        ctx.beginPath();
        ctx.arc(obj.x, obj.y, 10, 0, Math.PI*2);
        ctx.fill();
    });
    
    if(gameActive) requestAnimationFrame(drawGame);
}

function varColor(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).strip;
}

function triggerFlash(color) {
    flash.style.background = color;
    flash.style.opacity = "1";
    setTimeout(() => flash.style.opacity = "0", 150);
}

// Interfaz para engine.js
window.GameVisuals = {
    toggleOverlay: (show) => {
        document.getElementById('overlay-system').style.display = show ? 'flex' : 'none';
        gameActive = !show;
        if(gameActive) {
            objects = [];
            drawGame();
            spawnInterval = setInterval(spawnObject, 800);
        } else {
            clearInterval(spawnInterval);
        }
    },
    updateContent: (title, body, inf = "") => {
        document.getElementById('display-title').innerText = title;
        document.getElementById('display-body').innerText = body;
        document.getElementById('display-inf').innerText = inf;
    },
    runBreathing: (seconds, actionText) => {
        const node = document.getElementById('breathing-node');
        const txt = document.getElementById('breathing-text');
        node.style.display = 'flex';
        txt.innerText = actionText;
        
        if(actionText.toLowerCase().includes("inhale") || actionText.toLowerCase().includes("inhala")) {
            node.style.transform = "scale(1.3)";
        } else {
            node.style.transform = "scale(0.8)";
        }
    },
    stopBreathing: () => {
        document.getElementById('breathing-node').style.display = 'none';
    }
};

let spawnInterval;
Engine.init();
</script>
</body>
</html>
