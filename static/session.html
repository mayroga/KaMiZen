<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KAMIZEN LIFE SYSTEM - AURA CORE</title>

<style>
:root {
    --bg-deep: #0b1220;
    --card-bg: #111a2e;
    --primary: #3b82f6;
    --success: #22c55e;
    --danger: #ef4444;
    --text-main: #ffffff;
    --text-dim: #94a3b8;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg-deep);
    color: var(--text-main);
    display: flex;
    justify-content: center;
}

#app {
    width: 100%;
    max-width: 650px;
    padding: 20px;
}

/* CARDS */
.card {
    background: var(--card-bg);
    padding: 20px;
    border-radius: 16px;
    margin: 15px 0;
    border: 1px solid rgba(255,255,255,0.05);
}

/* TITLE */
.title {
    color: var(--primary);
    text-align: center;
}

/* ANSWERS */
.answer {
    background: #1f2937;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    cursor: pointer;
    border-left: 4px solid var(--primary);
    transition: 0.2s;
}

.answer:hover {
    transform: translateX(4px);
    background: #374151;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: var(--primary);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* FEEDBACK */
.feedback {
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
}

.success { background: rgba(34,197,94,0.2); }
.error { background: rgba(239,68,68,0.2); }

/* BREATHING (REAL FIX) */
.breath {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    margin: 25px auto;
    border: 4px solid var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: breathe 8s infinite ease-in-out;
    font-weight: bold;
}

@keyframes breathe {
    0%,100% { transform: scale(0.9); }
    50% { transform: scale(1.25); border-color: var(--success); }
}

.small {
    font-size: 12px;
    color: var(--text-dim);
}
</style>
</head>

<body>

<div id="app">

    <!-- HEADER -->
    <div class="card">
        <h2 class="title">KAMIZEN LIFE SYSTEM</h2>
        <p class="small">Awareness • Control • Discipline • Focus</p>
    </div>

    <!-- STORY + MISSION RENDERED BY ENGINE.JS -->
    <div id="app-root"></div>

    <!-- BREATHING MODULE (CONTROLLED BY ENGINE) -->
    <div class="card" style="text-align:center;">
        <h3>Breathing System</h3>
        <div id="respiratoryCircle" class="breath">
            <span id="breathAction">FOCUS</span>
        </div>
        <p class="small">Autonomous regulation active</p>
    </div>

</div>

<script src="/static/js/engine.js"></script>

</body>
</html>
