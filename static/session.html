<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | ENGINE V2 AAA</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
overflow:hidden;
text-align:center;
}

#topbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:10px;
z-index:10;
}

#game{
padding:60px 20px;
}

#hero{
font-size:20px;
color:#00f2ff;
}

#story,#analysis{
margin:15px;
font-size:18px;
min-height:40px;
}

#options button{
padding:12px;
margin:8px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.correct{background:green;color:white;}
.wrong{background:red;color:white;}

#breath{
width:120px;
height:120px;
border-radius:50%;
background:#00f2ff;
margin:20px auto;
transition:4s;
}

.floating{
position:absolute;
color:#00f2ff;
opacity:0.7;
animation:float 5s linear;
font-size:14px;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

#overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:20;
padding:20px;
}

button{
background:#111;
color:white;
border:1px solid #333;
}

</style>
</head>

<body>

<div id="topbar">
<button onclick="toggleLang()">LANG</button>
<button onclick="startSilence()">SILENCE</button>
</div>

<div id="game">
<h1>KAMIZEN ENGINE</h1>
<h2 id="hero"></h2>

<div id="breath"></div>

<div id="story"></div>
<div id="analysis"></div>
<div id="options"></div>
</div>

<div id="overlay">
<h2 id="overlayTitle"></h2>
<p id="overlayText"></p>
</div>

<!-- AUDIO -->
<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="ok" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>
<audio id="tick" src="/static/sounds/tick.mp3"></audio>

<script>

let lang="en";
let mission=1;
let floatingWords=[];
let currentMission=null;
let locked=false;

let player={real:"",hero:""};

async function init(){
player.real=prompt("Player name");
player.hero=prompt("Hero name");

document.getElementById("hero").innerText=player.hero;

document.getElementById("bg").volume=0.3;
document.getElementById("bg").play().catch(()=>{});

breathing();
await loadMission();
startFloating();
}

function speak(t){
let s=new SpeechSynthesisUtterance(t);
s.lang = lang==="en"?"en-US":"es-ES";
s.rate=0.85;
speechSynthesis.speak(s);
}

function toggleLang(){
lang = lang==="en"?"es":"en";
loadMission();
}

async function loadMission(){
let res=await fetch(`/api/mission/${mission}`);
if(!res.ok)return;

currentMission=await res.json();

floatingWords = currentMission.ui?.floating_words || [];

render(currentMission);
}

function render(m){

locked=false;

let story=m.blocks.find(b=>b.type==="story");
let analysis=m.blocks.find(b=>b.type==="analysis");
let decision=m.blocks.find(b=>b.type==="decision");

document.getElementById("story").innerText=story.text[lang];
document.getElementById("analysis").innerText="";

speak(story.text[lang]);

setTimeout(()=>{
document.getElementById("analysis").innerText=analysis.text[lang];
speak(analysis.text[lang]);
},3500);

setTimeout(()=>{
createOptions(decision.options);
},7000);
}

function createOptions(options){
let o=document.getElementById("options");
o.innerHTML="";

options.forEach(opt=>{
let b=document.createElement("button");
b.innerText=opt.text[lang];

b.onclick=()=>answer(opt.correct, b);

o.appendChild(b);
});
}

async function answer(correct, btn){
if(locked)return;
locked=true;

let ok=document.getElementById("ok");
let bad=document.getElementById("bad");

if(correct){
btn.classList.add("correct");
ok.play();
speak("Correct choice");
}else{
btn.classList.add("wrong");
bad.play();
speak("Wrong choice");
}

await wait(1200);
await runTVid(currentMission, correct);

mission++;
if(mission>35)mission=1;
loadMission();
}

// =========================
// TVID ENGINE AAA
// =========================

async function runTVid(m, correct){

let type = "DEFAULT";
let theme = (m.theme||"").toUpperCase();

if(theme.includes("ANGER")||theme.includes("CONTROL")) type="ANGER";
if(theme.includes("FEAR")||theme.includes("COURAGE")) type="FEAR";
if(theme.includes("DIGITAL")) type="DIGITAL";
if(theme.includes("TRUTH")) type="TRUTH";
if(theme.includes("PRESSURE")) type="PRESSURE";

showOverlay("TVID MODE", "Processing response...");

switch(type){

case "ANGER":
await breathCycle(3);
speak("Control your reaction");
break;

case "FEAR":
await breathCycle(3);
speak("Fear is not danger");
break;

case "DIGITAL":
await breathCycle(2);
speak("Recover attention");
break;

case "TRUTH":
await breathCycle(2);
speak("Truth builds identity");
break;

case "PRESSURE":
await breathCycle(4);
speak("Pause creates intelligence");
break;

default:
await breathCycle(2);
speak("Return to awareness");
}

closeOverlay();
}

function showOverlay(t,txt){
document.getElementById("overlayTitle").innerText=t;
document.getElementById("overlayText").innerText=txt;
document.getElementById("overlay").style.display="flex";
}

function closeOverlay(){
document.getElementById("overlay").style.display="none";
}

function wait(ms){return new Promise(r=>setTimeout(r,ms));}

// =========================
// BREATHING SYSTEM
// =========================

function breathing(){
let b=document.getElementById("breath");
let grow=true;

setInterval(()=>{
b.style.transform = grow?"scale(1.6)":"scale(1)";
grow=!grow;
},4000);
}

async function breathCycle(n){
for(let i=0;i<n;i++){
speak("Inhale");
await wait(2500);
speak("Exhale");
await wait(2500);
}
}

// =========================
// FLOATING SYSTEM (FROM JSON)
// =========================

function startFloating(){
setInterval(()=>{
if(!floatingWords.length)return;

let d=document.createElement("div");
d.className="floating";
d.style.left=Math.random()*100+"vw";
d.innerText=floatingWords[Math.floor(Math.random()*floatingWords.length)];

document.body.appendChild(d);

setTimeout(()=>d.remove(),5000);

},900);
}

// =========================
// SILENCE SYSTEM (3 → 20 MIN READY)
// =========================

async function startSilence(){

speak("Silence challenge started");

let level = Math.min(mission, 35);
let duration = 180 + (level * 30); // 3 min → scaling future to 20 min

for(let t=duration;t>0;t--){
await wait(1000);
if(t%10===0) document.getElementById("tick").play();
}

speak("Silence completed");
}

init();

</script>

</body>
</html>
