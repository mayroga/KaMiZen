<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAMIZEN SESSION FULL</title>

<style>
:root{
    --neon-blue:#00f2ff;
    --neon-red:#ff3131;
    --neon-green:#2ecc71;
    --neon-gold:#f1c40f;
    --bg:#050508;
}

body{
    margin:0;
    overflow:hidden;
    background:var(--bg);
    font-family:'Orbitron';
    color:white;
}

/* HUD */
#hud{
    position:absolute;
    top:10px;
    width:100%;
    display:flex;
    justify-content:space-evenly;
    z-index:100;
}
.data-box{
    border:2px solid var(--neon-blue);
    padding:10px;
    background:black;
}

/* OVERLAYS */
.overlay{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:black;
    z-index:2000;
    text-align:center;
}

/* BUTTONS */
.btn{
    padding:15px 30px;
    margin:10px;
    font-weight:900;
    border:none;
    cursor:pointer;
    background:var(--neon-blue);
}

/* OPTIONS */
.opt{ width:80%; max-width:500px; }
.correct{ background:var(--neon-green); }
.wrong{ background:var(--neon-red); }

/* BREATH */
#circle{
    width:220px;height:220px;
    border-radius:50%;
    border:6px solid var(--neon-blue);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:2rem;
    transition:2s;
}

</style>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>

<body>

<div id="hud">
<div class="data-box">💰 <span id="money">0</span></div>
<div class="data-box">❤️ <span id="health">100</span></div>
<div class="data-box">LVL <span id="lvl">1</span></div>
</div>

<!-- START -->
<div id="start" class="overlay">
<h1>KAMIZEN</h1>
<button class="btn" onclick="start()">START</button>
</div>

<!-- STORY -->
<div id="story" class="overlay" style="display:none;">
<p id="storyText"></p>
<button class="btn" onclick="continueStory()">CONTINUE</button>
</div>

<!-- MISSION -->
<div id="mission" class="overlay" style="display:none;">
<h2 id="q"></h2>
<div id="ops"></div>
<div id="exp"></div>
<button id="nextM" class="btn" style="display:none;">CONTINUE</button>
</div>

<!-- BREATH -->
<div id="breath" class="overlay" style="display:none;">
<div id="circle"><span id="btext">INHALA</span></div>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let data,active=false;
let objects=[];
let stats={money:0,health:100,lvl:0};
let user={x:0,y:0,size:50};

canvas.width=innerWidth;
canvas.height=innerHeight;

/* ================= API ================= */
async function loadSession(){
    const r = await fetch("/api/session/start");
    data = await r.json();
}

/* ================= STORY ================= */
function runStory(){
    return new Promise(res=>{
        let box=document.getElementById("story");
        let txt=document.getElementById("storyText");

        txt.innerText="";
        box.style.display="flex";

        let s=data.story.en;
        let i=0;

        let t=setInterval(()=>{
            txt.innerText+=s[i++];
            if(i>=s.length){
                clearInterval(t);
                speechSynthesis.speak(new SpeechSynthesisUtterance(s));
            }
        },25);

        window.continueStory=()=>{
            speechSynthesis.cancel();
            box.style.display="none";
            res();
        }
    });
}

/* ================= MISSION ================= */
async function runMission(i){
return new Promise(res=>{

    const mission=data.missions[i];
    const d=mission.b.find(x=>x.t==="d");

    const box=document.getElementById("mission");
    const q=document.getElementById("q");
    const ops=document.getElementById("ops");
    const exp=document.getElementById("exp");
    const next=document.getElementById("nextM");

    box.style.display="flex";
    q.innerText=d.q.en;
    ops.innerHTML="";
    exp.innerText="";
    next.style.display="none";

    d.op.forEach((o,index)=>{
        let b=document.createElement("button");
        b.className="btn opt";
        b.innerText=o;

        b.onclick=()=>{
            const ok=index===d.c;

            b.classList.add(ok?"correct":"wrong");

            exp.innerText=d.expl.en;
            next.style.display="block";

            if(ok) stats.money+=500;
            else stats.health-=20;

            updateHUD();
        };

        ops.appendChild(b);
    });

    next.onclick=()=>{
        box.style.display="none";
        res();
    };

});
}

/* ================= BREATH ================= */
function runBreath(){
return new Promise(res=>{
    const box=document.getElementById("breath");
    const c=document.getElementById("circle");
    const t=document.getElementById("btext");

    box.style.display="flex";

    let i=0;
    let int=setInterval(()=>{
        let inhale=i%2===0;
        t.innerText=inhale?"INHALA":"EXHALA";
        c.style.transform=inhale?"scale(1.4)":"scale(1)";
        i++;

        if(i>6){
            clearInterval(int);
            box.style.display="none";
            res();
        }
    },2000);
});
}

/* ================= GAME ================= */
function spawn(){
    if(!active) return;

    objects.push({
        x:Math.random()*canvas.width,
        y:-20,
        text:Math.random()>0.5?"GOOD":"BAD",
        type:Math.random()>0.5?"pos":"neg",
        speed:2+Math.random()*2
    });
}

function update(){
    if(!active) return;

    objects.forEach((o,i)=>{
        o.y+=o.speed;

        let d=Math.hypot(o.x-user.x,o.y-user.y);
        if(d<user.size){
            if(o.type==="pos") stats.money+=100;
            else stats.health-=10;

            objects.splice(i,1);
        }
    });

    updateHUD();
}

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.3)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    objects.forEach(o=>{
        ctx.fillStyle=o.type==="pos"?"#0f0":"#f00";
        ctx.fillText(o.text,o.x,o.y);

        /* LASER DESDE INICIO */
        ctx.strokeStyle=o.type==="pos"?"#0ff":"#f00";
        ctx.beginPath();
        ctx.moveTo(o.x,o.y);
        ctx.lineTo(user.x,user.y);
        ctx.stroke();
    });

    ctx.beginPath();
    ctx.arc(user.x,user.y,30,0,Math.PI*2);
    ctx.strokeStyle="#0ff";
    ctx.stroke();
}

/* ================= HUD ================= */
function updateHUD(){
    money.innerText=stats.money;
    health.innerText=stats.health;
    lvl.innerText=stats.lvl+1;
}

/* ================= FLOW ================= */
async function start(){

    document.getElementById("start").style.display="none";

    await loadSession();

    await runStory();

    active=true;
    await wait(60000);
    active=false;

    await runMission(0);

    active=true;
    await wait(60000);
    active=false;

    await runMission(0);

    active=true;
    await wait(60000);
    active=false;

    await runBreath();

    alert("END SESSION");
    location.reload();
}

function wait(ms){return new Promise(r=>setTimeout(r,ms));}

/* LOOP */
setInterval(spawn,1200);
function loop(){update();draw();requestAnimationFrame(loop);}
loop();

/* INPUT */
onmousemove=e=>{user.x=e.clientX;user.y=e.clientY;}
ontouchmove=e=>{
    user.x=e.touches[0].clientX;
    user.y=e.touches[0].clientY;
}
</script>
</body>
</html>
