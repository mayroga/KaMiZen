<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>

<title>KAMIZEN LIFE SYSTEM</title>

<style>

/* =========================================================
   ROOT
========================================================= */

:root{

    --bg:#08111f;
    --card:#111c2f;

    --blue:#3b82f6;
    --green:#22c55e;
    --red:#ef4444;

    --text:#ffffff;
    --dim:#94a3b8;

    --shadow:0 10px 30px rgba(0,0,0,.35);
}

/* =========================================================
   BASE
========================================================= */

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,
body{
    margin:0;
    padding:0;
    min-height:100%;
}

body{

    background:
    radial-gradient(circle at top,
    #12203a 0%,
    #08111f 60%);

    color:var(--text);

    font-family:
    Segoe UI,
    Arial,
    sans-serif;

    display:flex;
    justify-content:center;

    overflow-x:hidden;
}

/* =========================================================
   APP
========================================================= */

#app{

    width:100%;
    max-width:760px;

    padding:
    18px
    18px
    40px
    18px;
}

/* =========================================================
   CARD
========================================================= */

.card{

    background:rgba(17,28,47,.96);

    border:
    1px solid rgba(255,255,255,.06);

    border-radius:22px;

    padding:22px;

    margin-bottom:18px;

    box-shadow:var(--shadow);

    backdrop-filter:blur(10px);

    animation:fadeIn .35s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* =========================================================
   TEXT
========================================================= */

h1,h2,h3{
    margin-top:0;
    line-height:1.3;
}

p{
    line-height:1.7;
}

.center{
    text-align:center;
}

.small{

    color:var(--dim);

    font-size:13px;

    line-height:1.5;
}

/* =========================================================
   BUTTONS
========================================================= */

button{

    width:100%;

    border:none;

    border-radius:18px;

    padding:18px;

    margin-bottom:14px;

    background:linear-gradient(
        135deg,
        #2563eb,
        #3b82f6
    );

    color:white;

    font-size:15px;
    font-weight:700;

    cursor:pointer;

    transition:.22s;

    box-shadow:
    0 8px 22px rgba(59,130,246,.25);
}

button:hover{

    transform:
    translateY(-2px)
    scale(1.01);
}

button:disabled{

    opacity:.65;

    cursor:not-allowed;

    transform:none;
}

/* =========================================================
   ANSWERS
========================================================= */

.answer{

    background:#18253d;

    border-left:
    5px solid var(--blue);

    padding:15px;

    border-radius:14px;

    margin-top:12px;

    cursor:pointer;

    transition:.18s;

    font-weight:600;
}

.answer:hover{

    background:#22314d;

    transform:translateX(5px);
}

/* =========================================================
   BREATHING SYSTEM
========================================================= */

.breath-circle{

    width:190px;
    height:190px;

    margin:
    25px auto;

    border-radius:50%;

    position:relative;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
    radial-gradient(circle,
    rgba(59,130,246,.25),
    rgba(34,197,94,.08));

    border:
    4px solid rgba(59,130,246,.7);

    transition:
    transform 4s ease-in-out,
    box-shadow 4s ease-in-out;
}

.breath-circle::before{

    content:"";

    position:absolute;

    width:150px;
    height:150px;

    border-radius:50%;

    border:
    2px solid rgba(255,255,255,.08);
}

.breath-inner{

    width:120px;
    height:120px;

    border-radius:50%;

    background:
    linear-gradient(
        145deg,
        rgba(59,130,246,.35),
        rgba(34,197,94,.18)
    );

    display:flex;
    align-items:center;
    justify-content:center;

    text-align:center;

    font-weight:800;

    letter-spacing:1px;

    font-size:18px;

    box-shadow:
    inset 0 0 20px rgba(255,255,255,.08);
}

/* =========================================================
   TIMER
========================================================= */

.timer{

    margin-top:18px;

    display:inline-block;

    padding:
    10px
    18px;

    border-radius:999px;

    background:
    rgba(255,255,255,.08);

    font-weight:700;

    color:#dbeafe;

    letter-spacing:1px;
}

/* =========================================================
   STATUS COLORS
========================================================= */

.good{
    color:var(--green);
}

.bad{
    color:var(--red);
}

/* =========================================================
   MOBILE
========================================================= */

@media(max-width:640px){

    #app{
        padding:14px;
    }

    .card{
        padding:18px;
        border-radius:18px;
    }

    .breath-circle{

        width:165px;
        height:165px;
    }

    .breath-inner{

        width:105px;
        height:105px;

        font-size:16px;
    }

    button{
        font-size:14px;
    }
}

</style>

</head>

<body>

<!-- ======================================================
     SINGLE ENGINE ROOT
======================================================= -->

<div id="app"></div>

<!-- ======================================================
     ENGINE
======================================================= -->

<script src="/static/js/engine.js"></script>

</body>
</html>
