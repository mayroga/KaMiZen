<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAMIZEN | SESSION PRO</title>

<style>
:root{
    --neon:#00f2ff;
    --bg:#000;
    --panel:rgba(0,15,30,0.92);
    --good:#00ff88;
    --bad:#ff3355;
}

/* ================= BASE ================= */
body{
    margin:0;
    background:var(--bg);
    font-family:Arial;
    color:var(--neon);
    overflow:hidden;
}

#app{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    gap:15px;
    padding:20px;
    box-sizing:border-box;
}

/* ================= BREATH ================= */
#circle{
    width:80px;
    height:80px;
    border-radius:50%;
    background:rgba(0,242,255,0.2);
    box-shadow:0 0 25px var(--neon);
    transition:transform 2.5s ease, opacity 1s ease;
}

/* ================= TEXT PANEL ================= */
#message{
    width:90%;
    max-width:750px;
    min-height:140px;
    padding:18px;
    background:var(--panel);
    border:1px solid var(--neon);
    text-align:center;
    font-size:18px;
    line-height:1.4;
}

/* ================= OPTIONS ================= */
#options{
    width:90%;
    max-width:750px;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
}

button{
    padding:14px;
    border:1px solid var(--neon);
    background:transparent;
    color:var(--neon);
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
    font-size:14px;
}

button:hover{
    background:var(--neon);
    color:#000;
}

/* ================= TOP ================= */
#topbar{
    position:absolute;
    top:10px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 10px;
    box-sizing:border-box;
}

.small-btn{
    font-size:12px;
    padding:6px 10px;
}

/* ================= FEEDBACK ================= */
#overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:bold;
    z-index:10;
}

.good{
    background:rgba(0,255,136,0.25);
    color:var(--good);
}

.bad{
    background:rgba(255,51,85,0.25);
    color:var(--bad);
}
</style>
</head>

<body>

<div id="app">

    <!-- TOP -->
    <div id="topbar">
        <button class="small-btn" onclick="toggleLang()">ES/EN</button>
        <button class="small-btn" onclick="restart()">RESTART</button>
        <button class="small-btn" onclick="skip()">SKIP</button>
    </div>

    <!-- FEEDBACK OVERLAY -->
    <div id="overlay"></div>

    <!-- BREATH -->
    <div id="circle"></div>

    <!-- TEXT -->
    <div id="message">TOUCH TO START</div>

    <!-- OPTIONS -->
    <div id="options"></div>

</div>

<script>

/* ================= STATE ================= */
let session_id = null;
let lang = "en";
let loading = false;
let breathInterval = null;

/* ================= AUDIO ================= */
const audio = new (window.AudioContext || window.webkitAudioContext)();

function sound(type){

    const o = audio.createOscillator();
    const g = audio.createGain();

    o.connect(g);
    g.connect(audio.destination);

    o.type = "sine";

    if(type==="ok") o.frequency.value=520;
    if(type==="bad") o.frequency.value=120;
    if(type==="click") o.frequency.value=300;

    g.gain.value = 0.2;

    o.start();
    o.stop(audio.currentTime + 0.2);
}

/* ================= START ================= */
async function start(){

    if(audio.state==="suspended") await audio.resume();

    const res = await fetch("/start",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            profile:{lang}
        })
    });

    const data = await res.json();

    session_id = data.session_id;

    render(data.story);
}

/* ================= SEND ================= */
async function send(code){

    if(loading) return;
    loading = true;

    sound("click");

    const res = await fetch("/judge",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            session_id,
            decision:code
        })
    });

    const data = await res.json();

    if(data.feedback){
        showFeedback(data.feedback);
    }

    render(data.next);

    loading = false;
}

/* ================= RENDER ================= */
function render(block){

    if(!block) return;

    document.getElementById("options").innerHTML = "";

    const msg = document.getElementById("message");

    /* TEXT */
    if(block.text){
        msg.innerText = block.text[lang] || block.text.en || "";
    }

    if(block.analysis){
        msg.innerText = block.analysis[lang] || block.analysis.en || "";
    }

    /* BREATH */
    if(block.type==="breath_focus"){
        startBreath();
    }else{
        stopBreath();
    }

    /* OPTIONS (ONLY TVID) */
    if(block.type==="tvid" && Array.isArray(block.options)){

        block.options.forEach(o=>{
            const b = document.createElement("button");
            b.innerText = o.text?.[lang] || o.text?.en;
            b.onclick = ()=>send(o.code);
            document.getElementById("options").appendChild(b);
        });
    }
}

/* ================= BREATH ================= */
function startBreath(){
    const c = document.getElementById("circle");

    let grow = true;

    clearInterval(breathInterval);

    breathInterval = setInterval(()=>{
        c.style.transform = grow ? "scale(2)" : "scale(1)";
        c.style.opacity = grow ? "0.8" : "0.3";
        grow = !grow;
    },2500);
}

function stopBreath(){
    clearInterval(breathInterval);
}

/* ================= FEEDBACK ================= */
function showFeedback(fb){

    const overlay = document.getElementById("overlay");

    overlay.style.display = "flex";

    if(fb.correct){
        overlay.className = "good";
        overlay.innerText = fb.reason?.[lang] || fb.reason?.en || "GOOD";
        sound("ok");
    }else{
        overlay.className = "bad";
        overlay.innerText = fb.reason?.[lang] || fb.reason?.en || "WRONG";
        sound("bad");
    }

    setTimeout(()=>{
        overlay.style.display = "none";
    },1200);
}

/* ================= CONTROLS ================= */
function toggleLang(){
    lang = (lang==="en") ? "es" : "en";
}

function skip(){
    send("SKIP");
}

function restart(){
    location.reload();
}

/* ================= INIT ================= */
document.getElementById("message").onclick = start;

</script>

</body>
</html>
