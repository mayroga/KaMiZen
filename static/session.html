<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>KaMiZen – Experiencia Mental</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>🔥 KaMiZen – 10 Min de Bienestar y Poder</header>

<div class="container">

<div class="left">
  <div class="box">
    <div class="status">
      ⏳ Tiempo: <span id="time">10:00</span>
    </div>
  </div>

  <div class="box">
    <div class="question" id="question">Cargando reto...</div>
    <button onclick="playNarration()">🔊 Escuchar historia/ejercicio</button>

    <input type="text" id="answerInput" placeholder="Escribe tu respuesta aquí...">
    <button class="primary" onclick="submitAnswer()">Enviar Respuesta</button>
    <button onclick="showAnswer()">Ver Respuesta</button>
    
    <div class="feedback" id="feedback"></div>
  </div>
</div>

</div>

<script src="/static/scripts.js"></script>
</body>
</html>
