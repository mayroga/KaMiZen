<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAMIZEN LIFE SYSTEM</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #0b0f1a;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

#startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0b0f1a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
}

input, button {
    padding: 12px;
    font-size: 18px;
}

#centerText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 80%;
    font-size: 22px;
}

#timer {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 16px;
}

.word {
    position: absolute;
    color: #00f2ff;
    font-size: 16px;
    animation: float 5s linear forwards;
}

@keyframes float {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-200px); opacity: 0; }
}
</style>
</head>

<body>

<!-- ================= START SCREEN ================= -->
<div id="startScreen">
    <h1>KAMIZEN LIFE SYSTEM</h1>
    <input id="nameInput" placeholder="Enter your name">
    <button onclick="startApp()">START</button>
    <div id="error" style="color:red;"></div>
</div>

<!-- ================= UI ================= -->
<div id="timer"></div>
<div id="centerText"></div>

<script>

let userName = localStorage.getItem("kamizen_name") || "";
let missionIndex = parseInt(localStorage.getItem("mission_index") || "1");

if(userName){
    document.getElementById("nameInput").value = userName;
}

/* =========================
   SAFE START
========================= */
function startApp(){

    const input = document.getElementById("nameInput").value.trim();
    const error = document.getElementById("error");

    if(!input){
        error.innerText = "Enter a valid name";
        return;
    }

    userName = input;
    localStorage.setItem("kamizen_name", userName);

    document.getElementById("startScreen").style.display = "none";

    runCycle().catch(err => {
        console.error("SYSTEM ERROR:", err);
        document.getElementById("centerText").innerText =
            "SYSTEM ERROR - RELOADING...";
        setTimeout(()=>location.reload(), 3000);
    });
}

/* =========================
   LOAD DATA SAFE
========================= */
async function loadData(index){
    try {
        const res = await fetch(`/api/session/data/${index}`);

        if(!res.ok) throw new Error("Backend error");

        return await res.json();

    } catch (e) {
        console.error("Fetch error:", e);

        return {
            story: { story: { en: "ERROR LOADING STORY" } },
            mission: { b: [{ tx: { en: "ERROR LOADING MISSION" } }] }
        };
    }
}

/* =========================
   MAIN LOOP
========================= */
async function runCycle(){

    while(true){

        let index = parseInt(localStorage.getItem("mission_index") || "1");

        const data = await loadData(index);

        await showText(data.story?.story?.en || "NO STORY", 5000);

        await floatingGame(300);

        await showText(data.mission?.b?.[0]?.tx?.en || "NO MISSION", 5000);

        await floatingGame(300);

        await breathingPhase(index);

        nextIndex();
    }
}

/* =========================
   TEXT DISPLAY SAFE
========================= */
function showText(text, time){
    return new Promise(resolve => {

        const el = document.getElementById("centerText");
        el.innerText = text;

        setTimeout(() => {
            el.innerText = "";
            resolve();
        }, time);
    });
}

/* =========================
   FLOATING GAME
========================= */
function floatingGame(duration){

    return new Promise(resolve => {

        let t = duration;

        const timer = setInterval(() => {

            t--;

            document.getElementById("timer").innerText = t;

            spawnWord();

            if(t <= 0){
                clearInterval(timer);
                resolve();
            }

        }, 1000);
    });
}

/* =========================
   WORDS
========================= */
function spawnWord(){

    const words = ["FOCUS","CALM","TRUTH","CONTROL","AWARENESS","DISCIPLINE"];

    const w = document.createElement("div");
    w.className = "word";
    w.innerText = words[Math.floor(Math.random() * words.length)];

    w.style.left = Math.random() * window.innerWidth + "px";
    w.style.top = Math.random() * window.innerHeight + "px";

    document.body.appendChild(w);

    setTimeout(() => w.remove(), 5000);
}

/* =========================
   BREATHING + SILENCE
========================= */
function breathingPhase(index){

    return new Promise(resolve => {

        let silence = Math.min(30 + index * 5, 180);
        let t = 30;

        const breath = setInterval(() => {

            t--;

            document.getElementById("centerText").innerText =
                (t % 2 === 0) ? "INHALE" : "EXHALE";

            if(t <= 0){
                clearInterval(breath);
                startSilence(silence, resolve);
            }

        }, 1000);
    });
}

/* =========================
   SILENCE
========================= */
function startSilence(seconds, resolve){

    let t = seconds;

    document.getElementById("centerText").innerText = "SILENCE";

    const s = setInterval(() => {

        t--;
        document.getElementById("timer").innerText = t;

        if(t <= 0){
            clearInterval(s);
            resolve();
        }

    }, 1000);
}

/* =========================
   INDEX CONTROL
========================= */
function nextIndex(){

    let i = parseInt(localStorage.getItem("mission_index") || "1");

    i++;

    if(i > 35) i = 1;

    localStorage.setItem("mission_index", i);
}

</script>

</body>
</html>
