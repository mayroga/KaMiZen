<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KAMIZEN LIFE SYSTEM - USA CORE</title>

<style>
:root{
    --bg:#0b1220;
    --card:rgba(17, 26, 46, 0.85);
    --primary:#3b82f6;
    --success:#22c55e;
    --text:#ffffff;
}

*{ box-sizing:border-box; margin:0; padding:0; }

html, body{
    width:100%;
    min-height:100%;
    overflow-x:hidden;
    background:#000;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color:var(--text);
}

/* =========================
   SISTEMA DE FONDOS MASIVO
========================= */
.background-engine {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: -10;
    overflow: hidden;
    background: #000;
}

.slide {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity 2.5s ease-in-out;
    transform: scale(1.1); /* Efecto de zoom ligero */
    filter: brightness(0.8) contrast(1.2);
}

.slide.active {
    opacity: 1;
    transform: scale(1); /* Animación de entrada */
    transition: opacity 2.5s ease-in-out, transform 10s linear;
}

.overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, rgba(0,0,0,0) 30%, rgba(0,0,0,0.8) 100%);
    z-index: -5;
    pointer-events: none;
}

/* =========================
   INTERFAZ
========================= */
#app {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 750px;
    margin: auto;
    padding: 20px;
}

.card {
    background: var(--card);
    backdrop-filter: blur(12px);
    padding: 25px;
    border-radius: 20px;
    margin: 20px 0;
    box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.1);
}

.breath-circle {
    width: 150px; height: 150px;
    border-radius: 50%;
    margin: 20px auto;
    border: 5px solid var(--primary);
    display: flex; align-items: center; justify-content: center;
    animation: breathe 7s infinite ease-in-out;
    box-shadow: 0 0 30px var(--primary);
}

@keyframes breathe {
    0%, 100% { transform: scale(0.9); opacity: 0.6; }
    50% { transform: scale(1.15); opacity: 1; border-color: var(--success); box-shadow: 0 0 50px var(--success); }
}

button {
    width: 100%; padding: 15px; border: none; border-radius: 12px;
    background: var(--primary); color: #fff; font-weight: bold;
    cursor: pointer; transition: 0.3s;
}

button:hover { background: #2563eb; transform: scale(1.02); }

input {
    width: 100%; padding: 15px; border-radius: 12px; border: none;
    background: #1f2937; color: #fff; text-align: center; margin-bottom: 10px;
}
</style>
</head>
<body>

<div class="background-engine" id="bgEngine">
    <div id="img1" class="slide active"></div>
    <div id="img2" class="slide"></div>
</div>
<div class="overlay"></div>

<div id="app">
    <div class="card center" style="text-align: center;">
        <h2 style="color:var(--primary); font-size: 32px;">KAMIZEN LIFE SYSTEM</h2>
        <p style="font-size: 14px; opacity: 0.8;">Advanced Neural Interface • USA Edition</p>
        
        <div style="margin-top:20px;">
            <input type="number" id="missionSelector" min="1" max="49" value="1" />
            <button onclick="jumpToMission()">ACTIVATE MISSION</button>
        </div>
    </div>

    <div id="screen" class="card">
        <h3 id="displayTitle">SYSTEM READY</h3>
        <p id="displayText">Initiating visual synchronization... Focus on the natural flow.</p>
    </div>

    <div class="card center" style="text-align: center;">
        <h3>Core Breathing</h3>
        <div class="breath-circle"><span id="breathText">FOCUS</span></div>
    </div>
</div>

<script>
const slides = [document.getElementById('img1'), document.getElementById('img2')];
let currentIdx = 0;

// Temas que fascinan a niños de 5-14 años (USA tastes: Animals, Space, Epic Landscapes)
const keywords = [
    'wolf', 'tiger', 'galaxy', 'nebula', 'ocean-wave', 'tornado', 'lightning', 
    'forest', 'mountain-peak', 'underwater', 'lion', 'eagle', 'volcano', 
    'aurora-borealis', 'deep-space', 'desert-dunes', 'redwood-forest'
];

function getImageUrl() {
    // Generamos un término aleatorio para que cada carga sea diferente de las 100+ disponibles
    const term = keywords[Math.floor(Math.random() * keywords.length)];
    const salt = Math.floor(Math.random() * 5000);
    // Usamos Unsplash Source para mayor calidad visual en USA
    return `https://images.unsplash.com/photo-${salt}?auto=format&fit=crop&w=1920&q=80&sig=${salt}&keyword=${term}`;
}

// Fallback en caso de error de carga
function getFallbackUrl() {
    const salt = Math.floor(Math.random() * 1000);
    return `https://picsum.photos/1920/1080?random=${salt}`;
}

// Inicialización
slides[0].style.backgroundImage = `url('${getImageUrl()}')`;
slides[1].style.backgroundImage = `url('${getImageUrl()}')`;

async function rotateBackground() {
    const nextIdx = (currentIdx + 1) % 2;
    const nextImg = new Image();
    const newUrl = getImageUrl();

    nextImg.src = newUrl;
    nextImg.onload = () => {
        slides[nextIdx].style.backgroundImage = `url('${newUrl}')`;
        slides[currentIdx].classList.remove('active');
        slides[nextIdx].classList.add('active');
        currentIdx = nextIdx;
    };
    nextImg.onerror = () => {
        slides[nextIdx].style.backgroundImage = `url('${getFallbackUrl()}')`;
    };
}

// Rotación cada 7 segundos exactos
setInterval(rotateBackground, 7000);

// Sincronización con el contenido de la App
const screenObserver = new MutationObserver(() => {
    // Al detectar cambio de texto, aceleramos la transición para cambiar de ambiente
    rotateBackground();
});
screenObserver.observe(document.getElementById('screen'), { childList: true, characterData: true, subtree: true });

</script>

<script src="/static/js/engine.js"></script>

</body>
</html>
