<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaMiZen Session</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0b0b; color: white; text-align: center; }
        #container { max-width: 600px; margin: auto; padding: 40px 20px; }
        .block { background: #141414; padding: 30px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        button { padding: 15px 20px; margin: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .option { background: #222; color: #ccc; border: 1px solid #444; width: 80%; }
        .option:hover { background: #333; color: white; }
        .correct { background: #1f8f3a !important; color: white; }
        .wrong { background: #b02a2a !important; color: white; }
        #timer { font-size: 24px; color: #ffcc00; margin: 20px 0; }
        .clear-btn { background: #444; color: white; margin-top: 50px; font-size: 12px; opacity: 0.6; }
    </style>
</head>
<body>

<div id="container">
    <h1 style="letter-spacing: 4px; color: #444;">KAMIZEN</h1>
    <div id="content">
        <button onclick="initSession()" style="background:#fff; color:#000; padding: 20px 40px;">INICIAR MISIÓN</button>
    </div>
    <button class="clear-btn" onclick="location.reload()">BORRAR SESIÓN</button>
</div>

<script>
let sessionId = null;
const content = document.getElementById("content");

async function initSession() {
    const res = await fetch("/start", { method: "POST" });
    const data = await res.json();
    sessionId = data.session_id;
    render(data.story);
}

async function nextStep(decision = "AUTO") {
    const res = await fetch("/judge", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, decision: decision })
    });
    const data = await res.json();
    render(data.story);
}

function render(block) {
    content.innerHTML = "";
    const div = document.createElement("div");
    div.className = "block";

    // Manejo de textos simples
    if (["story", "analysis", "micro_explanation", "final_lesson"].includes(block.type)) {
        div.innerHTML = `<p style="font-size:1.2em; line-height:1.6;">${block.text?.es || ""}</p>`;
        content.appendChild(div);
        setTimeout(() => nextStep(), 4000);
    } 
    // Manejo de respiración y risa
    else if (["breath_focus", "riso_tvid"].includes(block.type)) {
        div.innerHTML = `<p>${block.text?.es || block.guide?.es || ""}</p><div id="timer">⏳</div>`;
        content.appendChild(div);
        runTimer(block.duration_sec || 30);
    }
    // Manejo de TVID (Opciones)
    else if (block.type === "tvid") {
        div.innerHTML = `<h3 style="color:#666;">DECIDE</h3>`;
        (block.options || []).forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "option";
            btn.innerText = opt.text?.es || "";
            btn.onclick = () => {
                btn.classList.add(opt.correct ? "correct" : "wrong");
                setTimeout(() => nextStep(opt.code), 1000);
            };
            div.appendChild(btn);
        });
        content.appendChild(div);
    }
    // Fin
    else if (block.type === "end") {
        div.innerHTML = `<h2>${block.text?.es || "FIN"}</h2>`;
        content.appendChild(div);
    }
}

function runTimer(sec) {
    let t = sec;
    const display = document.getElementById("timer");
    const interval = setInterval(() => {
        display.innerText = "⏳ " + t;
        if (t-- <= 0) {
            clearInterval(interval);
            nextStep();
        }
    }, 1000);
}
</script>
</body>
</html>
