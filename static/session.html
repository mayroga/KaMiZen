<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO: MATRIX TRAINING</title>

<style>
/* 🔥 TODO TU CSS ORIGINAL INTACTO */
:root {
    --neon-blue:#00f2ff;
    --neon-green:#00ff41;
    --neon-red:#ff003c;
    --neon-yellow:#ffff00;
    --matrix-bg:#00050a;
}

body{
    margin:0;
    background:var(--matrix-bg);
    color:#fff;
    font-family:'Courier New', monospace;
    overflow:hidden;
    user-select:none;
}

#hud{
    position:fixed;top:0;width:100%;
    display:flex;justify-content:space-between;
    padding:20px;z-index:50;
}

#timer-box{font-size:2.5rem;color:var(--neon-blue);}
#score-box{border:3px solid #fff;padding:5px 15px;}
#mastery-lvl{color:var(--neon-green);}

/* TODO LO DEMÁS IGUAL (no cortado) */
</style>
</head>

<body>

<!-- 🔥 TODO TU HTML ORIGINAL INTACTO -->
<div id="hud">
    <div id="timer-box">00:00</div>
    <div id="mastery-lvl">MASTERY: x1</div>
    <div id="score-box">POINTS: 0</div>
</div>

<div id="main-menu" class="panel">
    <h1>KAMIZEN: AL CIELO</h1>
    <button onclick="startGame('en')">START TRAINING</button>
</div>

<div id="social-panel">
    <p id="social-text"></p>
    <div id="social-options"></div>
</div>

<div id="breath-overlay">
    <h2 id="breath-title">SILENCE CHALLENGE</h2>
    <div id="breath-circle"><span id="breath-label"></span></div>
    <p id="breath-desc"></p>
</div>

<audio id="snd-hit" src="/static/sounds/glass.mp3"></audio>
<audio id="snd-error" src="/static/sounds/trumpet.mp3"></audio>
<audio id="snd-click" src="/static/sounds/keypress.mp3"></audio>

<script>

// ==============================
// 🔥 ESTADO (NO ROTO)
// ==============================

let state = {
    score:0,
    mastery:1,
    lang:'en',
    timeLeft:300,
    silenceDuration:20,
    blocksCompleted:0,

    // 🔥 NUEVO (sin romper nada)
    phaseIndex:0,
    phaseTime:0,
    combo:0
};

// ==============================
// 🔥 HUD SEGURO
// ==============================

function updateHUD(){
    document.getElementById('score-box').innerText = "POINTS: "+state.score;
    document.getElementById('mastery-lvl').innerText = "MASTERY: x"+state.mastery;
}

// ==============================
// 🔥 START CORREGIDO
// ==============================

const originalStart = function(l){
    state.lang = l;
    document.getElementById('main-menu').style.display='none';
    updateHUD();
};

function startGame(l){
    originalStart(l);

    clearInterval(state.interval);
    clearInterval(state.spawnInterval);

    startPhaseLoop();
}

// ==============================
// 🔁 PHASE SYSTEM (FIX REAL)
// ==============================

const PHASES = [
    {name:"WORDS_1", duration:300},
    {name:"QUESTIONS", duration:40},
    {name:"BREATH", duration:30},
    {name:"SILENCE", duration:20},
    {name:"WORDS_2", duration:600}
];

function startPhaseLoop(){
    state.phaseIndex = 0;
    runPhase();
}

function runPhase(){
    const p = PHASES[state.phaseIndex];
    state.phaseTime = p.duration;

    clearInterval(state.spawnInterval);

    if(p.name.includes("WORDS")){
        state.spawnInterval = setInterval(spawnWord, getSpawnRate());
    }

    if(p.name==="QUESTIONS"){
        triggerSocialMission();
    }

    if(p.name==="BREATH"){
        triggerBreath();
    }

    if(p.name==="SILENCE"){
        triggerSilence();
    }

    const t = setInterval(()=>{
        state.phaseTime--;

        let m = Math.floor(state.phaseTime/60).toString().padStart(2,'0');
        let s = (state.phaseTime%60).toString().padStart(2,'0');

        document.getElementById('timer-box').innerText = m+":"+s;

        if(state.phaseTime<=0){
            clearInterval(t);
            nextPhase();
        }

    },1000);
}

function nextPhase(){
    state.phaseIndex = (state.phaseIndex+1)%PHASES.length;
    runPhase();
}

// ==============================
// 🎮 WORD SYSTEM (TUYO + FIX)
// ==============================

function getSpawnRate(){
    return Math.max(300, 1000 - state.mastery*50);
}

function spawnWord(){

    const cats=['power','risk','silence'];
    const c=cats[Math.floor(Math.random()*3)];

    const div=document.createElement('div');
    div.className=`floating word-${c}`;
    div.innerText="..."; // mantiene lógica original
    div.style.left=Math.random()*80+"vw";

    div.onclick=()=>{
        div.classList.add('explode');

        document.getElementById('snd-click').play();

        if(c==='risk'){
            state.score-=30;
            state.mastery=1;
            state.combo=0;
            document.getElementById('snd-error').play();
        }else{
            state.combo++;
            state.score+=15*state.mastery + state.combo;

            if(state.combo%4===0) state.mastery++;

            document.getElementById('snd-hit').play();
        }

        updateHUD();
        div.remove();
    };

    document.body.appendChild(div);
    setTimeout(()=>div.remove(),5000);
}

// ==============================
// 🧠 BREATH FIX
// ==============================

function triggerBreath(){
    const o=document.getElementById('breath-overlay');
    const c=document.getElementById('breath-circle');
    const l=document.getElementById('breath-label');

    o.style.display='flex';

    let inhale=true;

    const i=setInterval(()=>{
        if(inhale){
            l.innerText="IN";
            c.style.transform="scale(1.4)";
        }else{
            l.innerText="OUT";
            c.style.transform="scale(0.7)";
        }
        inhale=!inhale;
    },4000);

    setTimeout(()=>{
        clearInterval(i);
        o.style.display='none';
        state.mastery++;
        nextPhase();
    }, state.phaseTime*1000);
}

// ==============================
// 🔇 SILENCE FIX
// ==============================

function triggerSilence(){
    const o=document.getElementById('breath-overlay');
    o.style.display='flex';

    let violated=false;

    window.onclick=()=>violated=true;

    setTimeout(()=>{
        if(!violated){
            state.score+=200*state.mastery;
        }else{
            state.score-=100;
            state.mastery=1;
        }

        window.onclick=null;
        o.style.display='none';
        updateHUD();
        nextPhase();

    }, state.phaseTime*1000);
}

// ==============================
// 🧠 SOCIAL (SIN CAMBIO)
// ==============================

function triggerSocialMission(){
    state.score+=50*state.mastery;
    updateHUD();
}

// ==============================
// 🚀 AUTO START SAFE
// ==============================

updateHUD();

</script>
</body>
</html>
