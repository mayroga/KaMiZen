<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO - KAMIZEN</title>
    <style>
        :root { --blue: #00d4ff; --gold: #ffd700; --green: #2ecc71; --red: #e74c3c; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* Reloj Maestro */
        #master-clock { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 6rem; font-weight: 900; color: var(--blue); z-index: 1000; text-shadow: 0 0 20px rgba(0,212,255,0.6); pointer-events: none; }

        /* Paisajes y Escenario */
        #game-world { position: fixed; inset: 0; transition: background 2s; background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d); }
        .landscape-zen { background: linear-gradient(to bottom, #134e5e, #71b280) !important; }
        .landscape-city { background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364) !important; }

        /* El Muñequito (Avatar) */
        #avatar-container { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); z-index: 100; transition: all 0.5s; text-align: center; }
        .stickman { stroke: white; stroke-width: 4; fill: none; }
        .meditating { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* Área de Respiración (Silencio) */
        #breath-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border: 8px solid white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; background: rgba(255,255,255,0.1); z-index: 500; transition: transform 4s linear; }

        /* Historias (Overlay) */
        #story-box { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; padding: 40px; text-align: center; }
        #story-content { font-size: 1.8rem; line-height: 1.6; max-width: 800px; color: #f0f0f0; }

        /* Palabras Flotantes */
        .word { position: absolute; padding: 15px 25px; border: 2px solid white; border-radius: 30px; background: rgba(0,0,0,0.6); font-weight: bold; cursor: pointer; animation: fall 8s linear forwards; }
        @keyframes fall { from { top: -50px; } to { top: 110vh; } }
    </style>
</head>
<body>

    <div id="master-clock">15:00</div>
    
    <div id="game-world">
        <!-- Avatar -->
        <div id="avatar-container" class="meditating">
            <svg width="100" height="150" viewBox="0 0 100 150">
                <circle cx="50" cy="30" r="20" class="stickman"/>
                <path d="M50 50 L50 110 M50 70 L20 50 M50 70 L80 50 M50 110 L20 140 M50 110 L80 140" class="stickman"/>
            </svg>
            <div id="avatar-label" style="margin-top:10px; font-weight:bold; letter-spacing:2px;">ESPECIALISTA</div>
        </div>

        <div id="breath-overlay">INHALE</div>
    </div>

    <!-- Pantalla de Historias -->
    <div id="story-box">
        <h1 id="story-title" style="color:var(--gold); font-size: 3rem;"></h1>
        <p id="story-content"></p>
        <button onclick="closeStory()" style="margin-top:30px; padding:20px 60px; font-size:1.5rem; background:var(--green); border:none; color:white; border-radius:10px; cursor:pointer;">I AM READY</button>
    </div>

    <script src="/static/js/engine.js"></script>
</body>
</html>
