<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AL CIELO - KAMIZEN BY MAY ROGA</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-gold: #f1c40f;
            --neon-red: #ff3131;
            --bg-dark: #050508;
            --neon-green: #2ecc71;
            --neon-orange: #ff8c00;
            --neon-yellow: #ffff00;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; overflow: hidden; background: var(--bg-dark); 
            color: white; font-family: 'Orbitron', sans-serif; touch-action: none; 
            height: 100vh; width: 100vw;
        }
        
        /* HUD & TIMERS */
        #hud {
            position: absolute; top: 10px; width: 100%;
            display: flex; justify-content: space-evenly;
            z-index: 1000; pointer-events: none; padding: 0 5px;
        }
        .data-box {
            background: rgba(0, 0, 0, 0.9); border: 1px solid var(--neon-blue);
            padding: 5px; text-align: center; flex: 1; margin: 0 3px; max-width: 110px;
        }
        .label { font-size: 8px; color: var(--neon-blue); letter-spacing: 1px; display: block; text-transform: uppercase; }
        .value { font-size: 14px; font-weight: 900; display: block; }
        
        #general-clock { position: absolute; bottom: 10px; right: 10px; color: var(--neon-gold); font-size: 12px; z-index: 1000; font-weight: 900; }
        #game-clock { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); color: var(--neon-red); font-size: 24px; font-weight: 900; z-index: 1000; text-shadow: 0 0 10px var(--neon-red); }

        /* ESCENARIO PRINCIPAL */
        #stage {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 20px; z-index: 500; background: radial-gradient(circle, #111 0%, #000 100%);
        }

        #display-text { font-size: 1.5rem; font-weight: 900; color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); margin-bottom: 15px; width: 100%; }
        #sub-text { font-size: 1rem; color: #ccc; max-width: 600px; line-height: 1.4; font-weight: 400; }

        /* BOTONES INTERACTIVOS */
        .btn-core {
            padding: 15px 30px; background: var(--neon-blue); color: black; border: none;
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer; margin-top: 20px;
            text-transform: uppercase; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            box-shadow: 0 0 20px var(--neon-blue);
        }
        #options-container { margin-top: 20px; display: grid; gap: 10px; width: 100%; max-width: 400px; }
        .btn-opt {
            padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--neon-blue);
            color: white; font-family: 'Orbitron'; font-size: 0.8rem; cursor: pointer; transition: 0.3s;
        }

        /* RESPIRACIÓN CIRCULAR */
        #breath-wrap { display: none; margin-top: 20px; flex-direction: column; align-items: center; }
        #breath-circle {
            width: 140px; height: 140px; border: 6px solid var(--neon-blue);
            border-radius: 50%; transition: transform 2s ease-in-out;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px var(--neon-blue);
        }
        #breath-info { font-size: 0.8rem; color: var(--neon-gold); margin-top: 20px; max-width: 280px; font-weight: 900; }

        /* JUEGO (CANVAS) */
        #gameCanvas { position: fixed; inset: 0; display: none; z-index: 100; cursor: crosshair; }
        .skip-btn { position: absolute; bottom: 20px; left: 20px; font-size: 10px; opacity: 0.7; z-index: 2000; background: #333; color: white; padding: 5px 10px; border: 1px solid #555; }

        .hidden { display: none !important; }
        input[type="text"] { background: transparent; border: 2px solid var(--neon-blue); color: white; padding: 12px; font-family: 'Orbitron'; text-align: center; outline: none; width: 250px; }

        @media (min-width: 768px) {
            #display-text { font-size: 2.5rem; }
            #sub-text { font-size: 1.2rem; }
            #breath-circle { width: 200px; height: 200px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="hud">
    <div class="data-box"><span class="label">ASSETS</span><span id="stat-money" class="value">$0</span></div>
    <div class="data-box" style="border-color: var(--neon-gold);"><span class="label">STATUS</span><span id="stat-status" class="value">INIT</span></div>
    <div class="data-box" style="border-color: var(--neon-red);"><span class="label">STABILITY</span><span id="stat-health" class="value">100%</span></div>
</div>

<div id="stage">
    <div id="content-area">
        <h2 id="display-text">KAMIZEN SYSTEM</h2>
        <p id="sub-text">IDENTIFY YOURSELF TO PROCEED WITH TRAINING.</p>
        <div id="input-wrap" style="margin-top: 20px;">
            <input type="text" id="client-name" placeholder="ENTER NAME">
        </div>
        <div id="options-container"></div>
        <button id="main-btn" class="btn-core">INITIALIZE</button>
    </div>

    <div id="breath-wrap">
        <div id="breath-circle">
            <span id="breath-label" style="font-size: 1.2rem; font-weight: 900;">INHALE</span>
        </div>
        <div id="breath-info"></div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>
<div id="general-clock">MISSION TIME: 00:00</div>
<div id="game-clock" class="hidden">05:00</div>
<button class="skip-btn hidden" id="skip-btn">SKIP PHASE</button>

<script>
    // --- GLOBAL STATE ---
    let stats = { money: 0, health: 100, name: "Explorer", wrongClicks: 0, totalTime: 0 };
    let sessionData = null;
    let isGameRunning = false;
    let gameTimer = 300;
    const synth = window.speechSynthesis;
    
    const ui = {
        text: document.getElementById('display-text'),
        sub: document.getElementById('sub-text'),
        mainBtn: document.getElementById('main-btn'),
        optCont: document.getElementById('options-container'),
        breath: document.getElementById('breath-wrap'),
        circle: document.getElementById('breath-circle'),
        label: document.getElementById('breath-label'),
        info: document.getElementById('breath-info'),
        canvas: document.getElementById('gameCanvas'),
        gClock: document.getElementById('general-clock'),
        gameClock: document.getElementById('game-clock'),
        skip: document.getElementById('skip-btn'),
        input: document.getElementById('input-wrap')
    };

    const ctx = ui.canvas.getContext('2d');
    let objects = [];
    let player = { x: window.innerWidth/2, y: window.innerHeight - 100 };

    // --- UTILS ---
    const sleep = ms => new Promise(r => setTimeout(r, ms));
    
    function speak(text) {
        synth.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.rate = 0.8; // Narración pausada
        msg.pitch = 0.9;
        msg.lang = 'en-US';
        synth.speak(msg);
    }

    function updateHUD() {
        document.getElementById('stat-money').innerText = "$" + stats.money;
        document.getElementById('stat-health').innerText = stats.health + "%";
        document.getElementById('stat-status').innerText = stats.health > 50 ? "STABLE" : "CRITICAL";
    }

    // --- SYSTEM START ---
    ui.mainBtn.onclick = async () => {
        const nameVal = document.getElementById('client-name').value;
        if(nameVal) stats.name = nameVal;
        ui.input.classList.add('hidden');
        ui.mainBtn.classList.add('hidden');
        
        startGeneralClock();
        await startProcess();
    };

    function startGeneralClock() {
        setInterval(() => {
            stats.totalTime++;
            const m = Math.floor(stats.totalTime / 60);
            const s = stats.totalTime % 60;
            ui.gClock.innerText = `MISSION TIME: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }, 1000);
    }

    async function startProcess() {
        // Fetch JSON Data (Simulado para estructura)
        const response = await fetch('/api/session/start');
        sessionData = await response.json();

        // 1. STORIES (PIES)
        await playStories();

        // 2. PRIMER JUEGO (MANOS - 5 MIN)
        await runWordGame(300);

        // 3. MISSIONS & RESPIRACIÓN (CABEZA)
        await playMissions();

        // 4. SEGUNDO JUEGO (MANOS - 5 MIN)
        await runWordGame(300);

        // 5. DIAGNÓSTICO FINAL
        await showFinalDiagnostic();
    }

    // --- PHASE: STORIES ---
    async function playStories() {
        ui.text.innerText = "NARRATIVE SEQUENCE";
        ui.sub.innerText = sessionData.story.en;
        speak(ui.sub.innerText);
        
        // Espera mínima para que termine o botón continue
        await sleep(3000);
        ui.mainBtn.innerText = "CONTINUE";
        ui.mainBtn.classList.remove('hidden');
        
        return new Promise(resolve => {
            ui.mainBtn.onclick = () => {
                ui.mainBtn.classList.add('hidden');
                resolve();
            }
        });
    }

    // --- PHASE: MISSIONS & DECISIONS ---
    async function playMissions() {
        const blocks = sessionData.missions[0].b;
        for (const block of blocks) {
            ui.optCont.innerHTML = "";
            ui.breath.style.display = "none";
            ui.sub.innerText = "";

            if (block.t === 'd') { // Decisiones con 4 colores
                ui.text.innerText = block.q.en;
                speak(block.q.en);
                await new Promise(resolve => {
                    block.op.forEach((opt, idx) => {
                        const btn = document.createElement('button');
                        btn.className = 'btn-opt';
                        btn.innerText = opt;
                        btn.onclick = () => {
                            // Lógica de colores requerida
                            if(idx === block.c) { btn.style.backgroundColor = 'var(--neon-green)'; stats.money += 1000; }
                            else if(idx === 0) { btn.style.backgroundColor = 'var(--neon-red)'; stats.health -= 20; }
                            else if(idx === 1) { btn.style.backgroundColor = 'var(--neon-orange)'; stats.health -= 15; }
                            else { btn.style.backgroundColor = 'var(--neon-yellow)'; btn.style.color = 'black'; stats.health -= 5; }
                            
                            ui.sub.innerText = block.ex[idx];
                            speak(block.ex[idx]);
                            updateHUD();
                            ui.mainBtn.innerText = "CONTINUE ACTION";
                            ui.mainBtn.classList.remove('hidden');
                            ui.mainBtn.onclick = () => { ui.mainBtn.classList.add('hidden'); resolve(); };
                        };
                        ui.optCont.appendChild(btn);
                    });
                });
            } 
            else if (block.t === 'br' || block.t === 'sil' || block.t === 'breath_auto') {
                ui.text.innerText = block.t === 'sil' ? "CALM & OBSERVATION" : "BREATHING PROTOCOL";
                ui.breath.style.display = "flex";
                ui.info.innerText = block.inf?.en || "Lowering cortisol to increase neural confidence.";
                speak(ui.info.innerText);
                
                let duration = Math.max(block.d || 19, 19); 
                let cycles = Math.floor(duration / 4);
                
                for(let i=0; i<cycles; i++) {
                    ui.label.innerText = "INHALE";
                    ui.circle.style.transform = "scale(1.4)";
                    await sleep(2000);
                    ui.label.innerText = "EXHALE";
                    ui.circle.style.transform = "scale(1.0)";
                    await sleep(2000);
                }
            }
            // Limpieza de memoria después de cada bloque
            objects = [];
        }
    }

    // --- PHASE: WORD GAME (LASERS & 5 MIN) ---
    async function runWordGame(seconds) {
        ui.canvas.style.display = "block";
        ui.gameClock.classList.remove('hidden');
        ui.skip.classList.remove('hidden');
        isGameRunning = true;
        gameTimer = seconds;

        const timerInterval = setInterval(() => {
            if(!isGameRunning) return;
            gameTimer--;
            const m = Math.floor(gameTimer/60);
            const s = gameTimer % 60;
            ui.gameClock.innerText = `${m}:${String(s).padStart(2,'0')}`;
            if(gameTimer <= 0) endWordGame();
        }, 1000);

        function endWordGame() {
            clearInterval(timerInterval);
            isGameRunning = false;
            ui.canvas.style.display = "none";
            ui.gameClock.classList.add('hidden');
            ui.skip.classList.add('hidden');
            objects = []; // Limpieza de memoria
            return;
        }

        ui.skip.onclick = () => { gameTimer = 0; endWordGame(); };

        // Game Loop
        gameAnimate();
        spawnWords();

        return new Promise(resolve => {
            const checkEnd = setInterval(() => {
                if(!isGameRunning) { clearInterval(checkEnd); resolve(); }
            }, 100);
        });
    }

    function spawnWords() {
        if(!isGameRunning) return;
        const words = [
            {t: "FOCUS", p: true}, {t: "SAVINGS", p: true}, {t: "CALM", p: true},
            {t: "ANXIETY", p: false}, {t: "LIES", p: false}, {t: "CHAOS", p: false}
        ];
        const w = words[Math.floor(Math.random()*words.length)];
        objects.push({
            text: w.t, pos: w.p,
            x: Math.random()*ui.canvas.width, y: -50,
            s: 2 + Math.random()*2
        });
        setTimeout(spawnWords, 1200);
    }

    function gameAnimate() {
        if(!isGameRunning) return;
        ctx.fillStyle = 'rgba(5,5,8,0.2)';
        ctx.fillRect(0,0,ui.canvas.width, ui.canvas.height);

        objects.forEach((obj, i) => {
            obj.y += obj.s;
            ctx.fillStyle = obj.pos ? 'var(--neon-blue)' : 'var(--neon-red)';
            ctx.font = "900 18px Orbitron";
            ctx.textAlign = "center";
            ctx.fillText(obj.text, obj.x, obj.y);

            // Laser effect
            ctx.strokeStyle = obj.pos ? 'rgba(0,242,255,0.1)' : 'rgba(255,49,49,0.1)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(obj.x, obj.y); ctx.lineTo(player.x, player.y); ctx.stroke();

            if(obj.y > ui.canvas.height) objects.splice(i, 1);
        });

        requestAnimationFrame(gameAnimate);
    }

    // Interacción
    ui.canvas.onmousedown = (e) => {
        if(!isGameRunning) return;
        player.x = e.clientX; player.y = e.clientY;
        objects.forEach((obj, i) => {
            const d = Math.sqrt((e.clientX-obj.x)**2 + (e.clientY-obj.y)**2);
            if(d < 40) {
                if(!obj.pos) {
                    stats.wrongClicks++;
                    if(stats.wrongClicks >= 3) triggerStopPenalty();
                } else {
                    stats.money += 200;
                    updateHUD();
                }
                objects.splice(i, 1);
            }
        });
    };

    async function triggerStopPenalty() {
        isGameRunning = false;
        stats.wrongClicks = 0;
        const msg = "System Interrupted. You are focusing on negative patterns. Calm your mind to rejoin the mission.";
        ui.text.innerText = "FOCUS RECOVERY REQUIRED";
        ui.sub.innerText = msg;
        speak(msg);
        
        ui.optCont.innerHTML = '<button class="btn-core" id="sign-btn">I COMMIT AND REJOIN</button>';
        document.getElementById('sign-btn').onclick = () => {
            ui.optCont.innerHTML = "";
            isGameRunning = true;
            gameAnimate();
            spawnWords();
        };
    }

    // --- PHASE: FINAL DIAGNOSTIC ---
    async function showFinalDiagnostic() {
        ui.text.innerText = "FINAL NEURO-DIAGNOSTIC";
        const diag = stats.health > 70 ? "Excellent Stability." : "Stability Recovery Needed.";
        const recommendation = "\nScientific Note: Box Breathing (4-4-4-4) lowers cortisol in seconds, providing immediate confidence to the developing brain.";
        
        ui.sub.innerText = `${stats.name}: ${diag} Your total assets: $${stats.money}. ${recommendation}`;
        speak(ui.sub.innerText);
        
        ui.mainBtn.innerText = "RESTART SYSTEM";
        ui.mainBtn.classList.remove('hidden');
        ui.mainBtn.onclick = () => location.reload();
    }

    // --- RESPONSIVE LOGIC ---
    window.onresize = () => {
        ui.canvas.width = window.innerWidth;
        ui.canvas.height = window.innerHeight;
        player.x = ui.canvas.width/2;
        player.y = ui.canvas.height - 100;
    };
    window.onresize();
</script>
</body>
</html>
