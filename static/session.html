<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAMIZEN SESSION - DEFENSE MODE</title>

<style>
:root {
    --neon-blue: #00f2ff;
    --neon-gold: #f1c40f;
    --neon-red: #ff3131;
    --bg-dark: #050508;
}

body {
    margin: 0;
    overflow: hidden;
    background: var(--bg-dark);
    color: white;
    font-family: 'Orbitron', sans-serif;
    cursor: none;
    touch-action: none;
}

#hud {
    position: absolute;
    top: 15px;
    width: 100%;
    display: flex;
    justify-content: space-evenly;
    z-index: 100;
    pointer-events: none;
}

.data-box {
    background: rgba(0, 0, 0, 0.95);
    border: 2px solid var(--neon-blue);
    padding: 10px;
    text-align: center;
    min-width: 130px;
}

.label {
    font-size: 10px;
    color: var(--neon-blue);
    font-weight: 900;
}

.value {
    font-size: 24px;
    font-weight: 900;
}

#timer-display {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    color: var(--neon-red);
    font-size: 35px;
    font-weight: 900;
    z-index: 100;
}

#overlay, #discipline-block {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, #111 0%, #000 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    text-align: center;
}

#discipline-block {
    background: rgba(150, 0, 0, 0.98);
    display: none;
    z-index: 5000;
}

.start-btn, .commit-btn {
    padding: 25px 50px;
    background: var(--neon-blue);
    color: black;
    border: none;
    font-weight: 900;
    cursor: pointer;
    font-size: 1.2rem;
    margin-top: 20px;
}

.commit-btn { background: white; }

canvas { display: block; }
</style>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>

<body>

<div id="timer-display">TIME REMAINING: <span id="clock">27:00</span></div>

<div id="hud">
    <div class="data-box"><span class="label">NET WORTH</span><span id="val-money" class="value">$0</span></div>
    <div class="data-box"><span class="label">STABILITY</span><span id="val-health" class="value">100%</span></div>
    <div class="data-box"><span class="label">LEVEL</span><span id="val-rank" class="value">1</span></div>
</div>

<div id="discipline-block">
    <h1>HALTED</h1>
    <div>CRITICAL COLLISION DETECTED</div>
    <div id="dynamic-message">Discipline is the bridge between goals and accomplishment.</div>
    <button class="commit-btn" onclick="resumeTraining()">I ACCEPT</button>
</div>

<div id="overlay">
    <h1>KAMIZEN SESSION</h1>
    <button class="start-btn" onclick="startGame()">INITIALIZE TRAINING</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stats = { money: 0, health: 100, totalSeconds: 27 * 60 };
let active = false;
let objects = [];
let lasers = [];
let user = { x: canvas.width/2, y: canvas.height/2, size: 30 };
let consecutiveErrors = 0;

function safeSpeak(t){
    try {
        speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(t);
        speechSynthesis.speak(msg);
    } catch(e){}
}

function startGame(){
    document.getElementById("overlay").style.display = "none";
    active = true;
    safeSpeak("System Active. Eliminate obstacles. Secure wealth.");
    
    setInterval(spawn, 700);
    setInterval(autoFire, 400); // Disparo automático
    
    loop();
}

function spawn(){
    if(!active) return;

    const posWords = ["OPPORTUNITY","WEALTH","WISDOM","MONEY","GROWTH"];
    const negWords = ["DEBT","STAGNATION","LAZINESS","ERROR","DOUBT"];
    
    const isNeg = Math.random() > 0.7;
    const text = isNeg ? negWords[Math.floor(Math.random()*negWords.length)] : posWords[Math.floor(Math.random()*posWords.length)];

    objects.push({
        text,
        x: Math.random()*canvas.width,
        y: -20,
        speed: 2 + Math.random()*3,
        type: isNeg ? "neg" : "pos",
        width: ctx.measureText(text).width + 20
    });
}

function autoFire(){
    if(!active) return;
    // El láser apunta a la oportunidad más cercana o a la amenaza roja
    let target = objects.find(o => o.y > 0);
    if(target) {
        lasers.push({
            x: user.x,
            y: user.y,
            targetX: target.x,
            targetY: target.y,
            life: 10
        });
    }
}

function update(){
    if(!active) return;

    objects.forEach((o, i) => {
        // Lógica de movimiento: Las rojas persiguen al jugador
        if(o.type === "neg") {
            const angle = Math.atan2(user.y - o.y, user.x - o.x);
            o.x += Math.cos(angle) * (o.speed * 0.8);
            o.y += Math.sin(angle) * (o.speed * 0.8);
        } else {
            o.y += o.speed;
        }

        // Colisión con el Jugador
        const distToUser = Math.hypot(o.x - user.x, o.y - user.y);
        if(distToUser < user.size + 10) {
            if(o.type === "neg") {
                stats.health -= 15;
                consecutiveErrors++;
                if(consecutiveErrors >= 3) {
                    active = false;
                    document.getElementById("discipline-block").style.display = "flex";
                }
            } else {
                stats.money += 100;
                consecutiveErrors = 0;
            }
            objects.splice(i, 1);
        }

        // Colisión con Láser
        lasers.forEach((l, li) => {
            const distToLaser = Math.hypot(o.x - l.targetX, o.y - l.targetY);
            if(distToLaser < 30) {
                if(o.type === "pos") stats.money += 50; // Recolecta al disparar
                objects.splice(i, 1);
                lasers.splice(li, 1);
            }
        });

        if(o.y > canvas.height) objects.splice(i, 1);
    });

    lasers.forEach((l, i) => {
        l.life--;
        if(l.life <= 0) lasers.splice(i, 1);
    });

    document.getElementById("val-money").innerText = "$" + stats.money;
    document.getElementById("val-health").innerText = stats.health + "%";
}

function draw(){
    ctx.fillStyle = "rgba(5, 5, 8, 0.3)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Dibujar Láseres
    lasers.forEach(l => {
        ctx.beginPath();
        ctx.moveTo(user.x, user.y);
        ctx.lineTo(l.targetX, l.targetY);
        ctx.strokeStyle = varColor('--neon-blue');
        ctx.lineWidth = 2;
        ctx.stroke();
        
        ctx.beginPath();
        ctx.arc(l.targetX, l.targetY, 5, 0, Math.PI*2);
        ctx.fillStyle = "white";
        ctx.fill();
    });

    // Dibujar Palabras
    objects.forEach(o => {
        ctx.shadowBlur = 10;
        ctx.shadowColor = o.type === "neg" ? "red" : "#00ff41";
        ctx.fillStyle = o.type === "neg" ? "red" : "#00ff41";
        ctx.font = "bold 20px Orbitron";
        ctx.fillText(o.text, o.x, o.y);
        ctx.shadowBlur = 0;
    });

    // Dibujar Jugador (Círculo Azul)
    ctx.beginPath();
    ctx.arc(user.x, user.y, user.size, 0, Math.PI * 2);
    ctx.strokeStyle = varColor('--neon-blue');
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.fillStyle = "rgba(0, 242, 255, 0.1)";
    ctx.fill();
}

function varColor(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name);
}

function loop(){
    update();
    draw();
    if(active) requestAnimationFrame(loop);
}

window.addEventListener("mousemove", (e) => {
    user.x = e.clientX;
    user.y = e.clientY;
});

function resumeTraining(){
    consecutiveErrors = 0;
    stats.health = 100;
    document.getElementById("discipline-block").style.display = "none";
    active = true;
    loop();
}

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
