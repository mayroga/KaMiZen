<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO: TOTAL LIFE TRAINING</title>
<style>
:root {
    --neon-blue:#00f2ff; --neon-green:#00ff41; --neon-red:#ff003c;
    --neon-yellow:#ffff00; --matrix-bg:#00050a; --neon-gold: #ffcc00;
}
body {
    margin:0; background:var(--matrix-bg); color:#fff;
    font-family:'Courier New', monospace; overflow:hidden; user-select:none;
    transition: background 0.4s ease;
}

/* FLASH COLORS */
.flash-green { background: rgba(0, 255, 65, 0.4) !important; }
.flash-yellow { background: rgba(255, 255, 0, 0.3) !important; }
.flash-orange { background: rgba(255, 140, 0, 0.3) !important; }
.flash-red { background: rgba(255, 0, 60, 0.4) !important; }

#security-alert {
    position: fixed; top: 0; left: 0; width: 100%; height: 8px;
    background: var(--neon-green); z-index: 1000; box-shadow: 0 0 15px var(--neon-green);
}

#lang-btn {
    position:fixed; bottom:20px; right:20px; z-index:999;
    padding:10px 18px; border:2px solid var(--neon-blue);
    background:rgba(0,0,0,0.8); color:var(--neon-blue); cursor:pointer; 
    font-weight: bold; border-radius: 5px;
}

#hud {
    position:fixed; top:20px; width:100%; display:flex;
    justify-content:space-between; padding:20px; z-index:50; box-sizing: border-box;
}
#timer-box { font-size:2.8rem; color:var(--neon-blue); text-shadow:0 0 20px var(--neon-blue); }
#score-box { border:3px solid #fff; padding:8px 20px; font-size:1.8rem; background:rgba(255,255,255,0.1); }

#life-stats {
    position: fixed; bottom: 20px; left: 20px; display: flex; flex-wrap: wrap;
    gap: 12px; z-index: 50; max-width: 80%;
}
.stat-pill { border: 2px solid #333; padding: 10px 15px; font-size: 0.9rem; background: rgba(0,0,0,0.9); border-radius: 6px; }
.stat-pill span { font-weight: bold; color: var(--neon-blue); }

.floating {
    position: absolute; padding: 15px 30px; font-weight: 900; font-size: 1.5rem;
    border-radius: 10px; background: rgba(0,0,0,0.9); z-index: 10;
    animation: floatUp 4s linear forwards; cursor: pointer;
}
.word-power { border: 3px solid var(--neon-green); color: var(--neon-green); }
.word-risk { border: 3px solid var(--neon-red); color: var(--neon-red); }
.word-silence { border: 3px solid var(--neon-yellow); color: var(--neon-yellow); }

@keyframes floatUp {
    from { transform: translateY(110vh) rotate(-5deg); }
    to { transform: translateY(-25vh) rotate(5deg); }
}

#overlay {
    position:fixed; width:100%; height:100%; background:rgba(0,5,10,0.95);
    display:none; align-items:center; justify-content:center;
    flex-direction:column; z-index:500; text-align:center; padding:30px;
}

#breath-circle {
    width:250px; height:250px; border:8px solid var(--neon-blue);
    border-radius:50%; margin:30px; display:none; align-items:center; 
    justify-content:center; font-size:1.5rem; transition: transform 4s ease-in-out;
}
.inhale { transform: scale(1.4); box-shadow: 0 0 40px var(--neon-blue); }
.exhale { transform: scale(0.8); }

#decision-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:20px;
    margin-top:30px; width:100%; max-width:800px;
}
.choice-btn {
    padding:20px; border:2px solid var(--neon-blue);
    background:none; color:#fff; cursor:pointer; font-weight: bold;
}
</style>
</head>
<body>

<div id="security-alert"></div>
<button id="lang-btn" onclick="toggleLang()">EN</button>

<div id="hud">
    <div id="timer-box">05:00</div>
    <div id="score-box">0</div>
</div>

<div id="life-stats">
    <div class="stat-pill">Respect: <span id="v-respect">50</span></div>
    <div class="stat-pill">Peace: <span id="v-peace">50</span></div>
    <div class="stat-pill">Lead: <span id="v-lead">50</span></div>
    <div class="stat-pill">Money: $<span id="v-money">100</span></div>
    <div class="stat-pill">Safety: <span id="v-safety">100</span></div>
    <div class="stat-pill">Happy: <span id="v-happy">50</span></div>
</div>

<div id="overlay">
    <h1 id="phase-title" style="color:var(--neon-blue)"></h1>
    <div id="breath-circle">BREATH</div>
    <p id="phase-desc" style="font-size:1.4rem; max-width:800px; line-height:1.6;"></p>
    <div id="decision-grid"></div>
</div>

<script>
let lang = "en";
let gameMode = "idle";
let timeLeft = 300;
let state = {
    score: 0,
    stats: { respect:50, peace:50, lead:50, money:100, safety:100, happy:50 },
    spawnRate: 1100
};

// ================= VOZ MASCULINA =================
function speak(text) {
    speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    const voices = speechSynthesis.getVoices();
    // Intenta buscar una voz masculina (Google US English es usualmente masculina en muchos sistemas)
    msg.voice = voices.find(v => v.name.includes('Male') || v.name.includes('David') || v.name.includes('Google US English')) || voices[0];
    msg.lang = lang === "en" ? "en-US" : "es-ES";
    msg.rate = 0.9;
    speechSynthesis.speak(msg);
}

// ================= TIMER =================
setInterval(() => {
    if (timeLeft > 0) {
        timeLeft--;
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById("timer-box").innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
}, 1000);

function toggleLang() {
    lang = lang === "en" ? "es" : "en";
    document.getElementById("lang-btn").innerText = lang.toUpperCase();
    speak(lang === "en" ? "English mode" : "Modo español");
}

// ================= HUD =================
function updateHUD() {
    document.getElementById("score-box").innerText = state.score;
    for (let key in state.stats) {
        let el = document.getElementById(`v-${key}`);
        if(el) el.innerText = state.stats[key];
    }
}

// ================= WORDS =================
function spawnWord() {
    if (gameMode !== "words") return;
    const cats = ["power", "risk", "silence"];
    const c = cats[Math.floor(Math.random() * 3)];
    const div = document.createElement("div");
    div.className = `floating word-${c}`;
    const wordList = ["WILL","VISION","HONOR","NOISE","FEAR","CALM","PEACE"];
    div.innerText = wordList[Math.floor(Math.random()*wordList.length)];
    div.style.left = Math.random() * 80 + "vw";
    div.onclick = () => {
        state.score += (c === "power" ? 20 : (c === "risk" ? -40 : 10));
        updateHUD();
        div.remove();
    };
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 4000);
}

// ================= RESPIRACIÓN Y SILENCIO =================
const breathLessons = [
    { text: "Breathing oxygenates the brain and stabilizes the heart rate.", es: "La respiración oxigena el cerebro y estabiliza el ritmo cardíaco." },
    { text: "Controlled inhalation strengthens the diaphragm and reduces cortisol.", es: "La inhalación controlada fortalece el diafragma y reduce el cortisol." }
];

function breathing(isSilence = false) {
    return new Promise(resolve => {
        gameMode = isSilence ? "silence" : "breathing";
        const overlay = document.getElementById("overlay");
        const circle = document.getElementById("breath-circle");
        const desc = document.getElementById("phase-desc");
        
        overlay.style.display = "flex";
        circle.style.display = "flex";
        document.getElementById("phase-title").innerText = isSilence ? "SILENCE CHALLENGE" : "BREATHING RESET";
        
        const lesson = breathLessons[Math.floor(Math.random() * breathLessons.length)];
        speak(lang === "en" ? lesson.text : lesson.es);
        desc.innerText = lang === "en" ? lesson.text : lesson.es;

        let t = isSilence ? 40 : 20;
        const cycle = setInterval(() => {
            const step = t % 10;
            if (step > 5) {
                circle.className = "inhale";
                if(!isSilence) speak(lang === "en" ? "Inhale deep" : "Inhala profundo");
            } else if (step > 2) {
                circle.className = "exhale";
                if(!isSilence) speak(lang === "en" ? "Exhale slow" : "Exhala lento");
            } else {
                circle.className = "";
                if(!isSilence) speak(lang === "en" ? "Hold" : "Retén");
            }

            if (t <= 0) {
                clearInterval(cycle);
                overlay.style.display = "none";
                circle.style.display = "none";
                resolve();
            }
            t--;
        }, 2000);
    });
}

// ================= PREGUNTAS CON FLASH Y EXPLICACIÓN =================
async function triggerQuestion() {
    return new Promise(async (resolve) => {
        const res = await fetch(`/api/mission/next?lang=${lang}`);
        const data = await res.json();

        const overlay = document.getElementById("overlay");
        const grid = document.getElementById("decision-grid");
        const desc = document.getElementById("phase-desc");
        const title = document.getElementById("phase-title");

        title.innerText = data.theme;
        desc.innerText = data.story;
        speak(data.story);
        grid.innerHTML = "";

        data.options.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "choice-btn";
            btn.innerText = opt.text;
            btn.onclick = () => {
                // Flash de color basado en puntaje
                if (opt.score >= 20) document.body.className = "flash-green";
                else if (opt.score > 5) document.body.className = "flash-yellow";
                else if (opt.score >= 0) document.body.className = "flash-orange";
                else document.body.className = "flash-red";

                state.score += opt.score;
                updateHUD();
                
                // Explicación obligatoria
                grid.innerHTML = "";
                desc.innerText = opt.explanation;
                speak(opt.explanation);

                // Solo avanza tras 3 segundos de la explicación
                setTimeout(() => {
                    document.body.className = "";
                    overlay.style.display = "none";
                    resolve();
                }, 4000);
            };
            grid.appendChild(btn);
        });
        overlay.style.display = "flex";
    });
}

// ================= MAIN LOOP =================
async function playWords(sec) {
    return new Promise(res => {
        gameMode = "words";
        let end = Date.now() + sec * 1000;
        function loop() {
            if (Date.now() > end) { gameMode = "idle"; return res(); }
            spawnWord();
            setTimeout(loop, state.spawnRate);
        }
        loop();
    });
}

async function run() {
    updateHUD();
    while(true) {
        await playWords(20);
        await breathing(false);
        await triggerQuestion();
        await playWords(30);
        await breathing(true); // Reto de silencio
        await triggerQuestion();
    }
}

window.onload = () => {
    // Necesario para cargar voces en algunos navegadores
    speechSynthesis.onvoiceschanged = () => { if(gameMode==="idle") run(); };
    run();
};
</script>
</body>
</html>
