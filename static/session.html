<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO: MATRIX TRAINING</title>

<style>
:root {
    --neon-blue:#00f2ff;
    --neon-green:#00ff41;
    --neon-red:#ff003c;
    --neon-yellow:#ffff00;
    --matrix-bg:#00050a;
}

body{
    margin:0;
    background:var(--matrix-bg);
    color:#fff;
    font-family:'Courier New', monospace;
    overflow:hidden;
    user-select:none;
}

#hud{
    position:fixed;top:0;width:100%;
    display:flex;justify-content:space-between;
    padding:20px;z-index:50;
}

#timer-box{font-size:2.5rem;color:var(--neon-blue);}
#score-box{border:3px solid #fff;padding:5px 15px;}
#mastery-lvl{color:var(--neon-green);}

/* Estilos de Palabras Actualizados */
.floating {
    position: absolute;
    padding: 12px 24px;
    font-weight: 900;
    font-size: 1.4rem;
    border-radius: 8px;
    background: rgba(0,0,0,0.85);
    z-index: 10;
    animation: floatUp 6s linear forwards;
    transition: transform 0.1s;
}

.word-power { border: 3px solid var(--neon-green); color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
.word-risk { border: 3px solid var(--neon-red); color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red); }
.word-silence { border: 3px solid var(--neon-yellow); color: var(--neon-yellow); text-shadow: 0 0 10px var(--neon-yellow); }

@keyframes floatUp {
    from { transform: translateY(110vh); opacity: 1; }
    to { transform: translateY(-20vh); opacity: 0; }
}

/* Efecto de Explosión */
.explode {
    animation: blast 0.4s ease-out forwards !important;
    pointer-events: none;
}

@keyframes blast {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(2.5); opacity: 0.5; filter: brightness(2); }
    100% { transform: scale(4); opacity: 0; }
}

#overlay{
    position:fixed;
    width:100%;height:100%;
    background:#000;
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:500;
}

#circle{
    width:200px;height:200px;
    border:6px solid var(--neon-blue);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    transition:all 4s ease;
}

button{
    padding:15px;
    background:none;
    border:2px solid var(--neon-blue);
    color:var(--neon-blue);
    cursor:pointer;
}
</style>
</head>

<body>

<div id="hud">
    <div id="timer-box">00:00</div>
    <div id="mastery-lvl">x1</div>
    <div id="score-box">0</div>
</div>

<div id="overlay">
    <h1 id="phase-title"></h1>
    <div id="circle"><span id="breath-label"></span></div>
    <p id="phase-desc"></p>
</div>

<audio id="hit" src="/static/sounds/glass.mp3"></audio>
<audio id="error" src="/static/sounds/trumpet.mp3"></audio>

<script>

let state={
    score:0,
    mastery:1,
    combo:0,
    phase:0,
    difficulty:1,
    timer:0,
    playing:false,
    spawnRate:1200
};

const phases=[
    {name:"WORDS",duration:300},
    {name:"QUESTIONS",duration:40},
    {name:"BREATH",duration:30},
    {name:"SILENCE",duration:20},
    {name:"WORDS+",duration:600}
];

const words={
    power:["WILL","FOCUS","DISCIPLINE"],
    risk:["EGO","NOISE","LAZY"],
    silence:["CALM","WAIT","BREATHE"]
};

function start(){
    state.playing=true;
    nextPhase();
}

function nextPhase(){
    state.phase=(state.phase+1)%phases.length;
    const p=phases[state.phase];

    state.timer=p.duration;

    if(p.name.includes("WORDS")){
        startWords();
    }
    else if(p.name==="QUESTIONS"){
        startQuestions();
    }
    else if(p.name==="BREATH"){
        startBreath();
    }
    else if(p.name==="SILENCE"){
        startSilence();
    }
}

function loopTimer(){
    const t=setInterval(()=>{
        state.timer--;
        updateHUD();

        if(state.timer<=0){
            clearInterval(t);
            nextPhase();
        }
    },1000);
}

function startWords(){
    document.getElementById("overlay").style.display="none";
    state.spawnInterval=setInterval(spawnWord, state.spawnRate);
    loopTimer();
}

function spawnWord(){
    const cats=["power","risk","silence"];
    const c=cats[Math.floor(Math.random()*3)];
    const list=words[c];

    const div=document.createElement("div");
    div.className=`floating word-${c}`;
    div.innerText=list[Math.floor(Math.random()*list.length)];
    div.style.left=Math.random()*80+"vw";

    div.onclick=()=>{
        // Añadir clase de explosión al hacer clic
        div.classList.add('explode');
        
        if(c==="risk"){
            state.score-=30;
            state.combo=0;
            state.mastery=1;
            document.getElementById("error").play();
        }else{
            state.combo++;
            let bonus=10+state.combo;
            state.score+=bonus*state.mastery;
            if(state.combo%5===0) state.mastery++;
            document.getElementById("hit").play();
        }
        updateHUD();
        
        // Remover el elemento después de que termine la animación blast
        setTimeout(()=>div.remove(), 400);
    };

    document.body.appendChild(div);
    setTimeout(()=>{ if(div) div.remove(); }, 5000);

    state.spawnRate=Math.max(400, state.spawnRate - 5);
}

function startQuestions(){
    clearInterval(state.spawnInterval);
    showOverlay("DECISION", "Choose correctly under pressure");
    setTimeout(()=>{
        state.score+=50*state.mastery;
        nextPhase();
    },4000);
}

function startBreath(){
    showOverlay("BREATH", "Control = Power");
    const circle=document.getElementById("circle");
    const label=document.getElementById("breath-label");
    let inhale=true;
    const cycle=setInterval(()=>{
        if(inhale){
            label.innerText="IN";
            circle.style.transform="scale(1.4)";
        }else{
            label.innerText="OUT";
            circle.style.transform="scale(0.7)";
        }
        inhale=!inhale;
    },4000);
    setTimeout(()=>{
        clearInterval(cycle);
        state.mastery++;
        nextPhase();
    }, state.timer*1000);
}

function startSilence(){
    showOverlay("SILENCE", "Do nothing. Absolute control.");
    let violated=false;
    window.onmousemove=()=>violated=true;
    window.onclick=()=>violated=true;
    setTimeout(()=>{
        if(!violated){
            state.score+=200*state.mastery;
        }else{
            state.score-=100;
        }
        window.onmousemove=null;
        window.onclick=null;
        nextPhase();
    }, state.timer*1000);
}

function showOverlay(title,desc){
    const o=document.getElementById("overlay");
    o.style.display="flex";
    document.getElementById("phase-title").innerText=title;
    document.getElementById("phase-desc").innerText=desc;
}

function updateHUD(){
    document.getElementById("score-box").innerText=state.score;
    document.getElementById("mastery-lvl").innerText="x"+state.mastery;
    let m=Math.floor(state.timer/60).toString().padStart(2,"0");
    let s=(state.timer%60).toString().padStart(2,"0");
    document.getElementById("timer-box").innerText=`${m}:${s}`;
}

start();

</script>
</body>
</html>
