<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN PRO SYSTEM</title>

<style>
:root{
    --neon:#00f2ff;
    --bg:#000;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--neon);
    font-family:Arial;
    overflow:hidden;
    transition:0.4s;
}

#app{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
}

/* XP BAR */
#xpContainer{
    position:absolute;
    top:10px;
    width:80%;
    height:10px;
    background:#111;
}

#xpBar{
    height:100%;
    width:0%;
    background:var(--neon);
}

#level{
    position:absolute;
    top:25px;
}

/* TIMER */
#timer{
    position:absolute;
    top:50px;
    font-size:18px;
}

/* MESSAGE */
#message{
    position:absolute;
    bottom:200px;
    width:85%;
    max-width:700px;
    padding:20px;
    border:1px solid var(--neon);
    text-align:center;
    font-size:22px;
}

/* OPTIONS */
#options{
    position:absolute;
    bottom:70px;
    width:85%;
    max-width:700px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

button{
    padding:15px;
    font-size:18px;
    background:transparent;
    border:1px solid var(--neon);
    color:var(--neon);
    cursor:pointer;
}

/* BREATH CIRCLE */
#circle{
    width:70px;
    height:70px;
    border-radius:50%;
    background:rgba(0,242,255,0.25);
    box-shadow:0 0 30px var(--neon);
    transition:transform 2s, opacity 2s;
}

/* SOFT STATES */
.success{
    background:rgba(0,255,120,0.10) !important;
}

.fail{
    background:rgba(255,0,0,0.10) !important;
}
</style>
</head>

<body>

<div id="app">

<div id="xpContainer"><div id="xpBar"></div></div>
<div id="level">LEVEL 1</div>
<div id="timer">--</div>

<div id="circle"></div>

<div id="message" onclick="start()">TAP TO START</div>

<div id="options"></div>

</div>

<script>

/* ================= STATE ================= */
let session_id=null;
let xp=0;
let level=1;
let errors=0;
let lang="en";
let timer;
let breath;

/* ================= AUDIO ================= */
const audio = new (window.AudioContext || window.webkitAudioContext)();

/* CLICK */
function clickSound(){
    const o=audio.createOscillator();
    const g=audio.createGain();

    o.type="sine";
    o.frequency.value=300;

    g.gain.value=0.1;

    o.connect(g);
    g.connect(audio.destination);

    o.start();
    o.stop(audio.currentTime+0.1);
}

/* FAIL = glass break */
function failSound(){
    const o=audio.createOscillator();
    const g=audio.createGain();

    o.type="square";
    o.frequency.value=90;

    g.gain.value=0.2;

    o.connect(g);
    g.connect(audio.destination);

    o.start();
    o.stop(audio.currentTime+0.25);
}

/* WIN = magic lottery */
function winSound(){
    const o=audio.createOscillator();
    const g=audio.createGain();

    o.type="sine";

    let f=300;
    const int=setInterval(()=>{
        f+=30;
        o.frequency.setValueAtTime(f,audio.currentTime);
    },50);

    g.gain.value=0.15;

    o.connect(g);
    g.connect(audio.destination);

    o.start();

    setTimeout(()=>{
        clearInterval(int);
        o.stop();
    },500);
}

/* ================= START ================= */
async function start(){

    if(audio.state==="suspended") await audio.resume();

    const r=await fetch("/start",{method:"POST"});
    const d=await r.json();

    session_id=d.session_id;

    render(d);
}

/* ================= SEND ================= */
async function send(code){

    clickSound();

    const r=await fetch("/judge",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({session_id,decision:code})
    });

    const d=await r.json();

    handleState(d);
    render(d);
}

/* ================= STATE HANDLER ================= */
function handleState(d){

    document.body.classList.remove("success","fail");

    if(d.state==="success"){
        document.body.classList.add("success");
        xp+=10;
        winSound();
    }

    if(d.state==="fail"){
        document.body.classList.add("fail");
        xp-=5;
        errors++;
        failSound();
    }

    if(xp>=100){
        level++;
        xp=0;
    }

    document.getElementById("xpBar").style.width=xp+"%";
    document.getElementById("level").innerText="LEVEL "+level;

    if(errors>=3){
        setTimeout(()=>{
            location.reload();
        },2000);
    }
}

/* ================= RENDER ================= */
function render(d){

    const s=d.story;
    if(!s) return;

    document.getElementById("message").innerText =
        s.text_en || s.text_es || "";

    document.getElementById("options").innerHTML="";

    stopBreath();

    if(s.type==="breathing"){
        startBreath();
    }

    if(s.type==="tvid_break"){
        startBreath();
        startTimer(60);
    }

    if(s.type==="quiz" || s.type==="tvid"){
        startTimer(5);
    }

    let opts=s.options || [];

    if(opts.length===0){
        opts=[{code:"NEXT",text:{en:"CONTINUE",es:"CONTINUAR"}}];
    }

    opts.forEach(o=>{
        const b=document.createElement("button");
        b.innerText=o.text?.[lang] || "OK";
        b.onclick=()=>send(o.code);
        document.getElementById("options").appendChild(b);
    });
}

/* ================= TIMER ================= */
function startTimer(sec){

    let t=sec;
    document.getElementById("timer").innerText=t;

    clearInterval(timer);

    timer=setInterval(()=>{
        t--;
        document.getElementById("timer").innerText=t;

        if(t<=0){
            clearInterval(timer);
            send("TIMEOUT");
        }
    },1000);
}

/* ================= BREATH ================= */
function startBreath(){

    const c=document.getElementById("circle");
    let grow=true;

    clearInterval(breath);

    breath=setInterval(()=>{

        c.style.transform=grow?"scale(2.2)":"scale(1)";
        c.style.opacity=grow?0.9:0.4;

        grow=!grow;

    },2000);
}

function stopBreath(){
    clearInterval(breath);
}

/* ================= LANG ================= */
function toggleLang(){
    lang = lang==="en"?"es":"en";
}

</script>

</body>
</html>
