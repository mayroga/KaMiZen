<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN SESSION</title>

<style>
body{
    margin:0;
    padding:0;
    background:#05080a;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

/* START SCREEN */
#startScreen{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:20px;
    background:#05080a;
    z-index:10;
}

input{
    padding:12px;
    font-size:18px;
    text-align:center;
}

button{
    padding:12px 25px;
    background:#00f2ff;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

/* HUD */
#timer{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:50px;
    color:#00f2ff;
}

#centerText{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:32px;
    text-align:center;
    width:80%;
}

/* WORDS */
.word{
    position:absolute;
    color:#00f2ff;
    font-size:20px;
    cursor:pointer;
    animation:float 5s linear forwards;
}

@keyframes float{
    from{transform:translateY(0);opacity:1;}
    to{transform:translateY(-200px);opacity:0;}
}
</style>
</head>

<body>

<div id="startScreen">
    <h1 style="color:#00f2ff">KAMIZEN</h1>
    <input id="nameInput" placeholder="Enter name">
    <button onclick="startApp()">START</button>
</div>

<div id="timer">00:00</div>
<div id="centerText"></div>

<script>

/* =========================
   STATE ONLY UI SIDE
========================= */
let user = localStorage.getItem("kamizen_name") || "";

/* =========================
   START APP (NO ENGINE LOGIC)
========================= */
function startApp(){

    const name = document.getElementById("nameInput").value.trim();
    if(!name) return;

    user = name;
    localStorage.setItem("kamizen_name", user);

    document.getElementById("startScreen").style.display = "none";

    // 🔥 SOLO INICIALIZA ENGINE EXTERNO
    if(window.KamizenEngine){
        window.KamizenEngine.start();
    } else {
        console.error("ENGINE NOT LOADED");
    }
}

/* =========================
   RENDER FUNCTIONS (ENGINE CALLS THESE)
========================= */

/* TEXT */
window.UI_showText = function(text){
    document.getElementById("centerText").innerText = text || "";
}

/* TIMER MM:SS */
window.UI_setTimer = function(seconds){

    let m = Math.floor(seconds / 60);
    let s = seconds % 60;

    document.getElementById("timer").innerText =
        `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

/* WORD SPAWN (ONLY VISUAL) */
window.UI_spawnWord = function(word){

    const el = document.createElement("div");
    el.className = "word";
    el.innerText = word;

    el.style.left = Math.random()*window.innerWidth + "px";
    el.style.top = (window.innerHeight - 100) + "px";

    el.onclick = () => {
        el.remove();
    };

    document.body.appendChild(el);

    setTimeout(()=>el.remove(),5000);
}

/* BREATH STATE */
window.UI_breath = function(text){
    document.getElementById("centerText").innerText = text;
}

</script>

<!-- ENGINE SEPARADO -->
<script src="static/js/engine.js"></script>

</body>
</html>
