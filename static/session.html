<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MAYKAMI NEURO-EXPERIENCE</title>
<style>
    :root { --primary: #00f2ff; --bg: #05070d; --correct: #00ff88; --wrong: #ff2e2e; }
    body { margin:0; background: var(--bg); color:#fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow:hidden; }
    
    /* UI ELEMENTS */
    #timer { position:absolute; top:20px; left:50%; transform:translateX(-50%); font-size:90px; color:var(--primary); font-weight:bold; z-index:1000; text-shadow: 0 0 20px rgba(0,242,255,0.6); }
    #centerContainer { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:40px; text-align:center; z-index:500; }
    #mainText { font-size:32px; line-height:1.4; max-width:90%; transition: opacity 0.5s; }

    /* QUIZ SYSTEM */
    #quizContainer { display:none; grid-template-columns: 1fr 1fr; gap: 20px; width: 80%; margin-top: 30px; }
    .option-btn { padding:20px; font-size:20px; background:rgba(255,255,255,0.05); border:2px solid var(--primary); color:#fff; border-radius:15px; cursor:pointer; transition: 0.3s; }
    #quizExplanation { margin-top:20px; font-size:18px; font-style:italic; min-height: 1.5em; }

    /* CONTROLS */
    .btn-action { margin-top:30px; padding:15px 50px; font-size:22px; background:var(--primary); color:#000; border:none; border-radius:50px; cursor:pointer; font-weight:bold; box-shadow: 0 0 20px var(--primary); display:none; }

    /* GAMEPLAY */
    .word { position:absolute; font-size:26px; color:var(--primary); font-weight:bold; cursor:pointer; animation: floatUp 5s linear forwards; z-index:600; text-shadow: 0 0 10px #000; }
    @keyframes floatUp { 0%{transform:translateY(100vh); opacity:0;} 10%{opacity:1;} 90%{opacity:1;} 100%{transform:translateY(-10vh); opacity:0;} }
    #explanationBox { position:absolute; bottom:30px; left:30px; width:350px; padding:20px; background: rgba(0,242,255,0.1); border-left: 5px solid var(--primary); font-size:17px; opacity:0; transition: 0.5s; z-index:700; }

    /* BREATHING & SILENCE */
    #breathContainer { display:none; position:fixed; inset:0; background:var(--bg); flex-direction:column; justify-content:center; align-items:center; z-index:2000; }
    #breathCircle { width: 250px; height: 250px; border-radius: 50%; border: 8px solid var(--primary); display:flex; justify-content:center; align-items:center; font-size:28px; font-weight:bold; transition: 4s ease-in-out; box-shadow: 0 0 50px var(--primary); margin-bottom: 50px; }
    #scienceInfo { width: 70%; font-size: 20px; line-height: 1.6; color: var(--primary); text-align: center; }
</style>
</head>
<body>

<div id="timer">00:00</div>

<div id="centerContainer">
    <div id="mainText">Initializing MayKaMi Neuro-System...</div>
    <div id="quizContainer"></div>
    <div id="quizExplanation"></div>
    <button id="btnNext" class="btn-action" onclick="Engine.nextStep()">CONTINUE</button>
</div>

<div id="explanationBox">
    <strong id="expTitle"></strong><br><span id="expBody"></span>
</div>

<div id="breathContainer">
    <div id="breathCircle">IDLE</div>
    <div id="scienceInfo"></div>
</div>

<!-- AUDIOS -->
<audio id="bgMusic" loop src="https://assets.mixkit.co/music/preview/mixkit-deep-urban-623.mp3"></audio>
<audio id="sfxCorrect" src="https://www.myinstants.com/media/sounds/ding-sound-effect_1.mp3"></audio>
<audio id="sfxWrong" src="https://www.myinstants.com/media/sounds/error_CD7s197.mp3"></audio>
<audio id="sfxBreak" src="https://www.soundjay.com/misc/sounds/glass-break-01.mp3"></audio>

<script>
const Engine = (() => {
    let state = {
        phase: 'init',
        data: null,
        lang: 'en',
        gameCount: 0,
        stats: {},
        quizIdx: 0,
        gameInterval: null
    };

    const pillars = {
        "STRATEGY": { en: "The art of planning. Managing resources to win the long game.", color: "#00f2ff" },
        "DISCIPLINE": { en: "Neural consistency. Doing what is necessary, not what is easy.", color: "#00ff88" },
        "RESILIENCE": { en: "Capacity to thrive under pressure. Anti-fragile mindset.", color: "#ffa500" },
        "WEALTH": { en: "A state of value. It follows the solution you provide to others.", color: "#ffd700" },
        "LEGACY": { en: "Impact beyond existence. Building structures that transcend time.", color: "#ffffff" }
    };

    const init = async () => {
        const res = await fetch("/api/session/start");
        state.data = await res.json();
        playSequence("story");
    };

    // --- NARRATIVA ---
    const playSequence = (phase) => {
        state.phase = phase;
        let text = "";
        
        if(phase === "story") text = state.data.story[state.lang];
        if(phase === "mission") text = state.data.mission.b[0].tx[state.lang];

        document.getElementById("mainText").innerText = text;
        document.getElementById("mainText").style.opacity = "1";
        
        // Voz de Narrador Profesional (Respeta puntuación)
        const synth = window.speechSynthesis;
        const msg = new SpeechSynthesisUtterance(text);
        const voices = synth.getVoices();
        msg.voice = voices.find(v => v.name.includes("David") || v.name.includes("Male")) || voices[0];
        msg.rate = 0.85; 
        msg.pitch = 1.0;
        
        msg.onend = () => {
            if(phase === "story") setTimeout(() => playSequence("mission"), 1500);
            else {
                document.getElementById("btnNext").style.display = "block";
                document.getElementById("btnNext").innerText = "START TRAINING PHASE";
            }
        };
        synth.speak(msg);
    };

    // --- JUEGO DE PALABRAS ---
    const startGame = () => {
        state.phase = 'game';
        document.getElementById("mainText").style.opacity = "0";
        document.getElementById("btnNext").style.display = "none";
        document.getElementById("bgMusic").play();
        
        let timeLeft = 300; // 5 Minutos
        state.gameInterval = setInterval(() => {
            timeLeft--;
            document.getElementById("timer").innerText = formatTime(timeLeft);
            spawnWord();
            if(timeLeft <= 0) {
                clearInterval(state.gameInterval);
                state.gameCount++;
                if(state.gameCount === 1) startQuiz();
                else runSilenceChallenge();
            }
        }, 1000);
    };

    const spawnWord = () => {
        const keys = Object.keys(pillars);
        const k = keys[Math.floor(Math.random()*keys.length)];
        const p = pillars[k];
        
        const el = document.createElement("div");
        el.className = "word";
        el.innerText = k;
        el.style.left = (Math.random() * 80 + 10) + "%";
        el.style.color = p.color;
        
        el.onclick = () => {
            document.getElementById("sfxBreak").cloneNode().play();
            state.stats[k] = (state.stats[k] || 0) + 1;
            // Explicación en esquina
            document.getElementById("explanationBox").style.opacity = "1";
            document.getElementById("expTitle").innerText = k;
            document.getElementById("expBody").innerText = p.en;
            el.remove();
        };
        document.body.appendChild(el);
    };

    // --- CUESTIONARIO ---
    const startQuiz = () => {
        state.phase = 'quiz';
        document.getElementById("bgMusic").pause();
        document.getElementById("mainText").style.opacity = "1";
        document.getElementById("mainText").innerText = "KNOWLEDGE RECTIFICATION";
        document.getElementById("quizContainer").style.display = "grid";
        loadQuestion();
    };

    const loadQuestion = () => {
        const qData = state.data.mission.b[0].qs[state.quizIdx];
        document.getElementById("mainText").innerText = qData.q[state.lang];
        const container = document.getElementById("quizContainer");
        container.innerHTML = "";
        document.getElementById("quizExplanation").innerText = "";

        qData.as.forEach((ans, i) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = ans.tx[state.lang];
            btn.onclick = () => checkAnswer(i, ans.is_c, ans.ex[state.lang]);
            container.appendChild(btn);
        });
    };

    const checkAnswer = (idx, isCorrect, explanation) => {
        const buttons = document.querySelectorAll(".option-btn");
        const synth = window.speechSynthesis;
        
        if(isCorrect) {
            buttons[idx].style.background = "var(--correct)";
            document.getElementById("sfxCorrect").play();
            const msg = new SpeechSynthesisUtterance("Correct.");
            synth.speak(msg);
        } else {
            buttons[idx].style.background = "var(--wrong)";
            document.getElementById("sfxWrong").play();
            const msg = new SpeechSynthesisUtterance("Incorrect.");
            synth.speak(msg);
        }

        document.getElementById("quizExplanation").innerText = explanation;
        document.getElementById("btnNext").style.display = "block";
        document.getElementById("btnNext").innerText = state.quizIdx < 3 ? "NEXT QUESTION" : "START SECOND TRAINING";
    };

    // --- RETO DE SILENCIO & RESPIRACIÓN ---
    const runSilenceChallenge = async () => {
        state.phase = 'silence';
        document.getElementById("timer").innerText = "00:00";
        document.getElementById("breathContainer").style.display = "flex";
        
        // Bloque 1 (30s) -> Bloque 35 (180s)
        const block = state.data.index || 1;
        let totalSeconds = Math.min(30 + (block - 1) * 4.4, 180);
        let t = Math.round(totalSeconds);

        document.getElementById("scienceInfo").innerText = "El silencio y la respiración rítmica reducen la actividad de la amígdala cerebral, bajando el cortisol y permitiendo que la corteza prefrontal tome el mando de tu lógica financiera y personal.";

        while (t > 0) {
            document.getElementById("timer").innerText = formatTime(t);
            await breathCycle("INHALA", 1.6);
            await breathCycle("RETIENE", 1.6);
            await breathCycle("EXHALA", 1.0);
            t -= 12; // Ciclo de 12 segundos
            if(t < 0) t = 0;
        }
        showFinalDiagnosis();
    };

    const breathCycle = (label, scale) => {
        return new Promise(r => {
            const circle = document.getElementById("breathCircle");
            circle.innerText = label;
            circle.style.transform = `scale(${scale})`;
            circle.style.borderColor = label === "EXHALA" ? "white" : "var(--primary)";
            setTimeout(r, 4000);
        });
    };

    const showFinalDiagnosis = () => {
        document.getElementById("breathContainer").style.display = "none";
        document.getElementById("mainText").style.opacity = "1";
        document.getElementById("timer").style.display = "none";
        
        const topPillar = Object.keys(state.stats).reduce((a, b) => state.stats[a] > state.stats[b] ? a : b, "Focus");
        
        document.getElementById("mainText").innerHTML = `
            <h1 style="color:var(--primary)">NEURO-DIAGNOSIS COMPLETE</h1>
            <p style="font-size:24px">Your session shows a high affinity for: <b>${topPillar}</b>.</p>
            <p>Your nervous system is now recalibrated. Logic override: ACTIVE.</p>
            <button class="btn-action" style="display:block" onclick="location.reload()">RESTART PROGRAM</button>
        `;
    };

    const formatTime = (s) => {
        const m = Math.floor(s/60);
        const sec = s%60;
        return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    };

    return {
        nextStep: () => {
            if(state.phase === 'mission') startGame();
            else if(state.phase === 'quiz') {
                if(state.quizIdx < 3) {
                    state.quizIdx++;
                    document.getElementById("btnNext").style.display = "none";
                    loadQuestion();
                } else {
                    document.getElementById("quizContainer").style.display = "none";
                    document.getElementById("quizExplanation").innerText = "";
                    startGame(); // Segundo juego de 5 min
                }
            }
        }
    };
})();

window.onload = () => {
    // Necesitamos un clic inicial para el audio del navegador
    document.body.onclick = () => {
        if(document.getElementById("mainText").innerText.includes("Initializing")) {
            Engine.nextStep = Engine.nextStep; // Bind
            const init = async () => {
                const res = await fetch("/api/session/start");
                const data = await res.json();
                // Iniciar motor con el primer clic
                document.body.onclick = null; 
                location.href = "#started"; 
                // Aquí podrías llamar a una función start real
            };
        }
    };
    // Iniciar automáticamente tras el fetch
    fetch("/api/session/start")
        .then(res => res.json())
        .then(data => {
            // Lógica de inicio...
        });
};

// Re-binding Engine to global scope para los botones
window.Engine = Engine;
// Auto-start
Engine.init = async () => {
    const res = await fetch("/api/session/start");
    Engine.data = await res.json();
    // Iniciar con un overlay para cumplir con políticas de audio
    document.getElementById("mainText").innerHTML = "MAYKAMI NEURO-SYSTEM<br><button class='btn-action' style='display:block' onclick='Engine.start()'>ENTER FREQUENCY</button>";
};

Engine.start = () => {
    document.getElementById("btnNext").style.display = "none";
    Engine.initReal();
};

Engine.initReal = async () => {
    const res = await fetch("/api/session/start");
    Engine.data = await res.json();
    // Aquí empieza la secuencia real
    // ... (Lógica de playSequence)
};

// Ejecución manual para asegurar el orden
setTimeout(() => {
    Engine.initReal = async () => {
        const res = await fetch("/api/session/start");
        Engine.data = await res.json();
        // Llamada interna para empezar
        const startNarrative = (type) => {
            Engine.phase = type;
            let txt = type === "story" ? Engine.data.story.en : Engine.data.mission.b[0].tx.en;
            document.getElementById("mainText").innerText = txt;
            const msg = new SpeechSynthesisUtterance(txt);
            const v = speechSynthesis.getVoices();
            msg.voice = v.find(x => x.name.includes("David")) || v[0];
            msg.onend = () => {
                if(type === "story") startNarrative("mission");
                else document.getElementById("btnNext").style.display = "block";
            };
            speechSynthesis.speak(msg);
        };
        startNarrative("story");
    };
    Engine.initReal();
}, 1000);
</script>
</body>
</html>
