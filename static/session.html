<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMIZEN | AL CIELO PRO</title>
    <style>
        /* Estilo Dopamina/Sonic */
        body { 
            margin: 0; 
            background: radial-gradient(circle, #001a33, #000); 
            color: #fff; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; 
            overflow: hidden; 
            cursor: crosshair;
            transition: background 0.5s;
        }

        #topbar { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            padding: 15px; 
            z-index: 100;
            background: rgba(0,0,0,0.3);
        }

        #game { padding-top: 80px; position: relative; z-index: 10; }

        #top-ui { display: flex; justify-content: space-around; font-weight: bold; font-size: 1.2rem; color: #00f2ff; }

        button { 
            padding: 15px 25px; 
            margin: 10px; 
            font-size: 18px; 
            border: 2px solid #00f2ff; 
            background: rgba(0, 242, 255, 0.1); 
            color: white; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        button:hover { background: #00f2ff; color: #000; box-shadow: 0 0 20px #00f2ff; }
        
        /* Botones de respuesta específicos */
        .opt-btn { display: block; width: 80%; max-width: 500px; margin: 10px auto; text-align: left; }

        #breath { 
            width: 100px; height: 100px; border-radius: 50%; 
            background: radial-gradient(circle, #00f2ff, #0066ff); 
            margin: 20px auto; 
            transition: transform 4s ease-in-out; 
            box-shadow: 0 0 30px #00f2ff;
            display: none; /* Se activa en retos */
        }

        /* Palabras Flotantes */
        .floating { 
            position: absolute; 
            padding: 8px 18px; 
            border-radius: 20px; 
            font-weight: bold; 
            cursor: pointer;
            user-select: none;
            z-index: 50;
            animation: floatUp 5s linear forwards;
        }
        .word-good { color: #00ff00; border: 2px solid #00ff00; box-shadow: 0 0 15px #00ff00; text-shadow: 0 0 10px #00ff00; }
        .word-bad { color: #ff0000; border: 2px solid #ff0000; box-shadow: 0 0 15px #ff0000; text-shadow: 0 0 10px #ff0000; }
        .word-neutral { color: #ffff00; border: 2px solid #ffff00; text-shadow: 0 0 10px #ffff00; }

        @keyframes floatUp { 
            from { transform: translateY(110vh) rotate(0deg); } 
            to { transform: translateY(-20vh) rotate(20deg); } 
        }

        .blast { animation: burst 0.4s forwards; pointer-events: none; }
        @keyframes burst { to { transform: scale(4); opacity: 0; } }

        #explanation-box { 
            background: rgba(0,0,0,0.8); 
            border-left: 5px solid #00f2ff;
            padding: 20px; 
            margin: 20px auto; 
            width: 80%;
            display: none; 
            font-size: 1.2rem;
            border-radius: 0 15px 15px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #story { font-size: 1.5rem; margin: 20px; font-weight: bold; }
        #analysis { color: #00f2ff; font-style: italic; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="topbar">
    <button onclick="toggleLang()">EN/ES</button>
    <div id="score-display">PUNTOS: 0</div>
</div>

<div id="game">
    <div id="top-ui">
        <div id="stat-focus">FOCUS: 100%</div>
        <div id="stat-life">ENERGY: ⚡⚡⚡</div>
    </div>
    
    <h2 id="hero-name"></h2>
    <div id="breath"></div>
    
    <div id="story">Cargando Misión...</div>
    <div id="analysis"></div>
    
    <div id="explanation-box"></div>
    <div id="options"></div>
</div>

<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="ok" src="/static/sounds/success.mp3"></audio> <audio id="bad" src="/static/sounds/glass.mp3"></audio> <script>
let lang = "en";
let missionId = 1;
let score = 0;
let silenceMinutes = 3; 
let currentMissionData = null;

const player = { name: "", hero: "" };

// Configuración de palabras para disparar
const wordPool = {
    good: ["FOCUS", "TRUTH", "CALM", "POWER", "CONTROL", "RESPECT", "ACTION"],
    bad: ["FEAR", "LIE", "CHAOS", "IMPULSE", "LAZY", "ANGRY", "SHAME"],
    neutral: ["STREET", "CITY", "WALK", "WATCH", "WAIT", "VOICE"]
};

async function init() {
    player.name = prompt("Tu nombre real:") || "Player 1";
    player.hero = prompt("Nombre de tu Héroe:") || "Kamizen Ninja";
    document.getElementById("hero-name").innerText = player.hero;

    startMusic();
    startFloatingSystem();
    loadNextMission();
}

function startMusic() {
    let bg = document.getElementById("bg");
    bg.volume = 0.4;
    bg.playbackRate = 1.1; // Ritmo Sonic
    bg.play().catch(() => console.log("Click para iniciar audio"));
}

function speak(text) {
    window.speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang = lang === "en" ? "en-US" : "es-ES";
    msg.rate = 0.9;
    window.speechSynthesis.speak(msg);
}

function toggleLang() {
    lang = lang === "en" ? "es" : "en";
    if (currentMissionData) renderMission(currentMissionData);
}

async function loadNextMission() {
    try {
        const res = await fetch(`/api/mission/${missionId}`);
        if (!res.ok) { missionId = 1; loadNextMission(); return; }
        currentMissionData = await res.json();
        renderMission(currentMissionData);
    } catch (e) {
        console.error("Error cargando misión");
    }
}

function renderMission(m) {
    const story = m.blocks.find(b => b.type === "story").text[lang];
    const analysis = m.blocks.find(b => b.type === "analysis").text[lang];
    const decision = m.blocks.find(b => b.type === "decision");

    document.getElementById("story").innerText = story;
    document.getElementById("analysis").innerText = "";
    document.getElementById("options").innerHTML = "";
    document.getElementById("explanation-box").style.display = "none";
    document.getElementById("breath").style.display = "none";

    speak(story);

    setTimeout(() => {
        document.getElementById("analysis").innerText = analysis;
        speak(analysis);
    }, 3500);

    setTimeout(() => {
        displayOptions(decision.options);
    }, 7000);
}

function displayOptions(options) {
    const oDiv = document.getElementById("options");
    oDiv.innerHTML = "";
    
    // El sistema asegura al menos 4 opciones según la lógica de tu JSON
    options.forEach(opt => {
        let b = document.createElement("button");
        b.className = "opt-btn";
        b.innerText = opt.text[lang];
        b.onclick = () => handleChoice(opt);
        oDiv.appendChild(b);
    });
}

async function handleChoice(option) {
    document.getElementById("options").innerHTML = "";
    const box = document.getElementById("explanation-box");
    const okSound = document.getElementById("ok");
    const badSound = document.getElementById("bad");

    box.innerText = option.explanation ? option.explanation[lang] : (option.correct ? "¡Correcto!" : "Incorrecto");
    box.style.display = "block";

    if (option.correct === true) {
        document.body.style.backgroundColor = "#004400";
        okSound.play();
        score += 20;
        speak(getRandomSynonym(true) + ". " + box.innerText);
    } else {
        document.body.style.backgroundColor = "#440000";
        badSound.play();
        score -= 10;
        speak(getRandomSynonym(false) + ". " + box.innerText);
    }

    document.getElementById("score-display").innerText = `PUNTOS: ${score}`;

    setTimeout(() => {
        document.body.style.backgroundColor = "";
        startSilenceReto();
    }, 6000);
}

function getRandomSynonym(isCorrect) {
    const goods = ["¡Excelente!", "¡Poderoso!", "¡Sabio!", "¡Magnífico!", "¡Nivel Sonic!"];
    const bads = ["¡Cuidado!", "¡Piénsalo bien!", "¡Error de matriz!", "¡Atención!", "¡Recalibrando!"];
    return isCorrect ? goods[Math.floor(Math.random()*goods.length)] : bads[Math.floor(Math.random()*bads.length)];
}

async function startSilenceReto() {
    const breath = document.getElementById("breath");
    const story = document.getElementById("story");
    const analysis = document.getElementById("analysis");
    
    story.innerText = `RETO DE SILENCIO: ${silenceMinutes} MINUTOS`;
    analysis.innerText = "Controla tu respiración. No toques nada.";
    
    const explanations = [
        "El silencio es donde tu mente se vuelve indestructible.",
        "Respirar con control es el verdadero superpoder de un líder.",
        "En la calma encuentras la respuesta que la prisa te oculta.",
        "Tu energía sigue a tu atención. Domina tu atención ahora."
    ];
    
    speak(explanations[Math.floor(Math.random()*explanations.length)] + " Iniciando respiración guiada.");
    
    breath.style.display = "block";
    runBreathingAnimation();

    // Simulación del tiempo (progresivo)
    let seconds = silenceMinutes * 60;
    const timer = setInterval(() => {
        seconds--;
        if (seconds <= 0) {
            clearInterval(timer);
            completeSilence();
        }
    }, 1000);
}

function runBreathingAnimation() {
    const b = document.getElementById("breath");
    let grow = true;
    const interval = setInterval(() => {
        if (document.getElementById("breath").style.display === "none") {
            clearInterval(interval);
            return;
        }
        b.style.transform = grow ? "scale(2.5)" : "scale(1)";
        grow = !grow;
    }, 4000);
}

function completeSilence() {
    speak("Reto completado. Tu mente está lista.");
    silenceMinutes = Math.min(silenceMinutes + 1, 20); // Sube de 1 en 1 hasta 20
    missionId++;
    if (missionId > 35) missionId = 1;
    loadNextMission();
}

// Sistema de Disparos a Palabras
function startFloatingSystem() {
    setInterval(() => {
        const type = Math.random() > 0.7 ? "bad" : (Math.random() > 0.4 ? "good" : "neutral");
        const word = wordPool[type][Math.floor(Math.random() * wordPool[type].length)];
        
        const el = document.createElement("div");
        el.className = `floating word-${type}`;
        el.innerText = word;
        el.style.left = Math.random() * 90 + "vw";
        
        el.onmousedown = () => {
            el.classList.add("blast");
            if (type === "good") { score += 5; document.getElementById("ok").play(); }
            if (type === "bad") { score -= 10; document.getElementById("bad").play(); }
            if (type === "neutral") { /* Las neutrales pueden cambiar si quieres */ }
            document.getElementById("score-display").innerText = `PUNTOS: ${score}`;
            setTimeout(() => el.remove(), 400);
        };

        document.body.appendChild(el);
        setTimeout(() => { if(el) el.remove(); }, 5000);
    }, 2000);
}

window.onload = init;
</script>
</body>
</html>
