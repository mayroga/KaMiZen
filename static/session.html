<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AL CIELO - CORE SESSION</title>

    <style>
        :root {
            --bg: #0b1220;
            --card: #111a2e;
            --primary: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --text: #ffffff;
            --dim: #94a3b8;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 700px;
            padding: 20px;
        }

        /* =========================
           CARD SYSTEM
        ========================= */
        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 20px;
            margin: 15px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        /* =========================
           BUTTONS
        ========================= */
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        button:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        button:disabled {
            background: #1e293b;
            color: var(--dim);
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* =========================
           ANSWERS (TRIVIA)
        ========================= */
        .answer {
            background: #1f2937;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            cursor: pointer;
            border-left: 5px solid var(--primary);
            transition: 0.2s;
            font-size: 1rem;
        }

        .answer:hover {
            background: #374151;
            transform: translateX(8px);
        }

        /* =========================
           BREATHING VISUAL
        ========================= */
        .breath-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 20px auto;
            border: 5px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }

        /* =========================
           UI HELPERS
        ========================= */
        h1, h2, h3 { margin: 10px 0; line-height: 1.2; }
        .small { font-size: 13px; color: var(--dim); }
        .center { text-align: center; }
        
        input[type="number"] {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #0f172a;
            color: white;
            font-size: 1rem;
            margin-bottom: 10px;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
        }

    </style>
</head>
<body>

<div id="app-container">

    <!-- HEADER ESTÁTICO -->
    <div class="card center">
        <h2 style="color:var(--primary); margin:0;">AL CIELO</h2>
        <p class="small" style="margin-top:5px;">
            Neural Training • Awareness • Control
        </p>
    </div>

    <!-- SUPERFICIE DEL MOTOR (ENGINE SURFACE) -->
    <div id="engine-surface">
        <div class="card center">
            <h3>Initializing...</h3>
            <p class="small">Connecting to advisory nodes</p>
        </div>
    </div>

    <!-- CONTROL DE NAVEGACIÓN DIRECTA -->
    <div class="card">
        <label class="small" style="display:block; margin-bottom:8px; text-align:left;">
            DIRECT MISSION ACCESS
        </label>
        <input id="missionInput" type="number" placeholder="Enter ID (1 - 49)">
        <button onclick="jumpToMissionUI()" style="background:#0ea5e9;">
            GO TO MISSION
        </button>
    </div>

</div>

<!-- CARGA DEL MOTOR PRINCIPAL -->
<script src="/static/js/engine.js"></script>

<script>
    /**
     * Puente entre la UI de session.html y el estado de engine.js
     */
    function jumpToMissionUI() {
        const input = document.getElementById("missionInput");
        const id = Number(input.value);

        if (!id || id < 1) {
            alert("Please enter a valid Mission ID");
            return;
        }

        // Acceso directo al estado y renderizado de engine.js
        if (typeof state !== 'undefined' && state.initialized) {
            const index = state.missions.findIndex(m => m.id === id);
            
            if (index !== -1) {
                window.speechSynthesis.cancel();
                state.currentIndex = index;
                state.currentBlock = 0;
                state.phase = "story";
                render();
                input.value = ""; // Limpiar input
            } else {
                alert("Mission ID not found in data");
            }
        } else {
            alert("System is still loading, please wait...");
        }
    }
</script>

</body>
</html>
