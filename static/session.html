<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AL CIELO: TOTAL LIFE TRAINING</title>

    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #00ff41;
            --neon-red: #ff003c;
            --neon-yellow: #ffff00;
            --matrix-bg: #00050a;
            --neon-gold: #ffcc00;
        }

        body {
            margin: 0;
            background: var(--matrix-bg);
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            user-select: none;
            transition: background 0.3s;
        }

        /* Efectos de Feedback Visual */
        .correct-flash { background: #002a00 !important; transition: 0.3s; }
        .wrong-flash { background: #2a0000 !important; transition: 0.3s; }

        #security-alert {
            position: fixed; top: 0; left: 0; width: 100%; height: 8px;
            background: var(--neon-green); z-index: 1000;
            box-shadow: 0 0 15px var(--neon-green);
        }

        #lang-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 999;
            padding: 12px 20px; border: 2px solid var(--neon-blue);
            background: rgba(0,0,0,0.8); color: var(--neon-blue);
            cursor: pointer; font-weight: bold; border-radius: 5px;
        }

        #hud {
            position: fixed; top: 20px; width: 100%;
            display: flex; justify-content: space-between;
            padding: 20px; z-index: 50; box-sizing: border-box;
        }

        #timer-box { font-size: 2.5rem; color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); }
        #score-box { border: 2px solid #fff; padding: 5px 15px; font-size: 1.5rem; background: rgba(255,255,255,0.1); }

        #life-stats {
            position: fixed; bottom: 80px; left: 20px;
            display: flex; flex-wrap: wrap; gap: 10px; z-index: 50; max-width: 90%;
        }

        .stat-pill {
            border: 1px solid #444; padding: 8px 12px; font-size: 0.8rem;
            background: rgba(0,0,0,0.85); border-radius: 4px;
        }
        .stat-pill span { color: var(--neon-blue); font-weight: bold; }

        /* Círculo de Respiración Central */
        #breath-circle {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 200px; height: 200px; border-radius: 50%;
            border: 5px solid var(--neon-blue); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; z-index: 10000; background: rgba(0,0,0,0.9);
            box-shadow: 0 0 30px var(--neon-blue);
        }

        .inhale-anim { animation: inhale 4s infinite ease-in-out; }
        @keyframes inhale {
            0%, 100% { transform: translate(-50%,-50%) scale(0.8); opacity: 0.6; }
            50% { transform: translate(-50%,-50%) scale(1.3); opacity: 1; }
        }

        /* Overlay de Misión */
        #overlay {
            position: fixed; width: 100%; height: 100%;
            background: rgba(0,5,10,0.95); display: flex;
            align-items: center; justify-content: center;
            flex-direction: column; z-index: 500; text-align: center; padding: 20px;
            box-sizing: border-box;
        }

        #phase-title { color: var(--neon-blue); font-size: 1.8rem; margin-bottom: 10px; text-transform: uppercase; }
        #phase-desc { font-size: 1.2rem; max-width: 600px; line-height: 1.4; margin-bottom: 20px; color: #ccc; }

        #decision-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            width: 100%; max-width: 700px;
        }

        .choice-btn {
            padding: 20px; border: 2px solid var(--neon-blue);
            background: rgba(0, 242, 255, 0.05); color: #fff;
            cursor: pointer; font-size: 1rem; transition: 0.2s;
        }
        .choice-btn:hover { background: var(--neon-blue); color: #000; }

        #continue-btn {
            margin-top: 30px; padding: 15px 40px; border: 2px solid var(--neon-green);
            background: none; color: var(--neon-green); font-weight: bold;
            display: none; cursor: pointer;
        }

        #explanation-text { margin-top: 20px; font-style: italic; color: var(--neon-yellow); display: none; max-width: 600px; }
    </style>
</head>

<body>

    <div id="security-alert"></div>
    <button id="lang-btn" onclick="toggleLang()">ES</button>

    <div id="hud">
        <div id="timer-box">05:00</div>
        <div id="score-box">SCORE: 0</div>
    </div>

    <div id="life-stats">
        <div class="stat-pill">Peace: <span id="v-peace">50</span></div>
        <div class="stat-pill">Safety: <span id="v-safety">100</span>%</div>
        <div class="stat-pill">Respect: <span id="v-respect">50</span></div>
        <div class="stat-pill">Money: $<span id="v-money">100</span></div>
    </div>

    <!-- Guía de Respiración -->
    <div id="breath-circle">
        <div id="breath-txt" style="font-size: 1.5rem; font-weight: bold;"></div>
        <div id="breath-timer" style="font-size: 1rem; margin-top: 10px;"></div>
    </div>

    <!-- Contenedor Principal de Asesoría -->
    <div id="overlay">
        <h1 id="phase-title">LOADING MISSION...</h1>
        <p id="phase-desc"></p>
        <div id="decision-grid"></div>
        <div id="explanation-text"></div>
        <button id="continue-btn" onclick="fetchNextMission()">NEXT PHASE</button>
    </div>

    <script>
        let currentLang = 'es';
        let timeLeft = 300;
        let score = 0;

        // --- AUDIO ENGINE (Básico) ---
        const Sound = {
            click: () => { /* Implementar sonido corto */ },
            success: () => { document.body.classList.add('correct-flash'); setTimeout(()=>document.body.classList.remove('correct-flash'), 300); },
            fail: () => { document.body.classList.add('wrong-flash'); setTimeout(()=>document.body.classList.remove('wrong-flash'), 300); }
        };

        // --- LÓGICA DE MISIÓN ---
        async function fetchNextMission() {
            try {
                // Limpiar UI
                document.getElementById('decision-grid').innerHTML = '';
                document.getElementById('continue-btn').style.display = 'none';
                document.getElementById('explanation-text').style.display = 'none';
                document.getElementById('breath-circle').style.display = 'none';
                
                const res = await fetch(`/api/mission/next?lang=${currentLang}`);
                const data = await res.json();

                if (data.end) {
                    alert("Sesión finalizada");
                    location.reload();
                    return;
                }

                renderMission(data);
            } catch (err) {
                console.error("Error cargando misión:", err);
            }
        }

        function renderMission(data) {
            document.getElementById('phase-title').innerText = data.title;
            document.getElementById('phase-desc').innerText = data.story || data.header;

            // Renderizar Opciones
            if (data.options && data.options.length > 0) {
                data.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.innerText = opt.text;
                    btn.onclick = () => handleChoice(opt);
                    document.getElementById('decision-grid').appendChild(btn);
                });
            }

            // Si hay bloques interactivos (Respiración/Silencio), se disparan después de la decisión o manual
            window.pendingInteractions = data.interactive_blocks;
        }

        function handleChoice(opt) {
            const expDiv = document.getElementById('explanation-text');
            expDiv.innerText = opt.explanation;
            expDiv.style.display = 'block';

            if (opt.is_correct) {
                Sound.success();
                score += 20;
                document.getElementById('score-box').innerText = `SCORE: ${score}`;
            } else {
                Sound.fail();
            }

            // Bloquear botones después de elegir
            document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);

            // Mostrar botón para seguir a la parte interactiva o siguiente misión
            if (window.pendingInteractions && window.pendingInteractions.length > 0) {
                const nextStepBtn = document.getElementById('continue-btn');
                nextStepBtn.innerText = currentLang === 'es' ? "INICIAR ENTRENAMIENTO" : "START TRAINING";
                nextStepBtn.style.display = 'block';
                nextStepBtn.onclick = () => playInteractions();
            } else {
                document.getElementById('continue-btn').style.display = 'block';
                document.getElementById('continue-btn').onclick = fetchNextMission;
            }
        }

        // --- CICLO DE RESPIRACIÓN / SILENCIO ---
        async function playInteractions() {
            const circle = document.getElementById('breath-circle');
            const txt = document.getElementById('breath-txt');
            const bTimer = document.getElementById('breath-timer');
            
            document.getElementById('overlay').style.display = 'none';
            circle.style.display = 'flex';

            for (let block of window.pendingInteractions) {
                txt.innerText = block.text;
                circle.className = (block.type === 'br' || block.type === 'breath_auto') ? 'inhale-anim' : '';
                
                let count = block.duration;
                while (count > 0) {
                    bTimer.innerText = count + "s";
                    await new Promise(r => setTimeout(r, 1000));
                    count--;
                }
            }

            circle.style.display = 'none';
            document.getElementById('overlay').style.display = 'flex';
            fetchNextMission(); // Cargar siguiente misión automáticamente
        }

        function toggleLang() {
            currentLang = currentLang === 'es' ? 'en' : 'es';
            document.getElementById('lang-btn').innerText = currentLang.toUpperCase();
            fetchNextMission();
        }

        // --- TIMER GLOBAL ---
        setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                document.getElementById('timer-box').innerText = 
                    `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }
        }, 1000);

        // Iniciar
        window.onload = fetchNextMission;
    </script>
</body>
</html>
