<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KAMIZEN LIFE SYSTEM - CORE SESSION</title>

<style>
:root{
    --bg:#0b1220;
    --card:#111a2e;
    --primary:#3b82f6;
    --success:#22c55e;
    --danger:#ef4444;
    --text:#ffffff;
    --dim:#94a3b8;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Segoe UI, Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
    min-height:100vh;
}

#app{
    width:100%;
    max-width:720px;
    padding:20px;
}

/* =========================
   CARD SYSTEM
========================= */

.card{
    background:var(--card);
    padding:18px;
    border-radius:16px;
    margin:14px 0;
    box-shadow:0 10px 25px rgba(0,0,0,0.35);
    border:1px solid rgba(255,255,255,0.05);
}

/* =========================
   BUTTONS
========================= */

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:var(--primary);
    color:white;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:translateY(-2px);
}

/* =========================
   ANSWERS
========================= */

.answer{
    background:#1f2937;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    cursor:pointer;
    border-left:4px solid var(--primary);
    transition:0.2s;
    font-size:15px;
}

.answer:hover{
    transform:translateX(5px);
    background:#374151;
}

/* =========================
   BREATHING VISUAL (SAFE ONLY - ENGINE OVERRIDES)
========================= */

.breath-circle{
    width:140px;
    height:140px;
    border-radius:50%;
    margin:25px auto;
    border:4px solid var(--primary);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    letter-spacing:1px;
    animation: breathe 6s infinite ease-in-out;
}

/* default animation fallback ONLY (engine can override) */
@keyframes breathe{
    0%{transform:scale(0.85);opacity:0.7;}
    50%{transform:scale(1.2);opacity:1;border-color:var(--success);}
    100%{transform:scale(0.85);opacity:0.7;}
}

/* =========================
   TEXT STYLES
========================= */

h1,h2,h3{
    margin:10px 0;
}

.small{
    font-size:12px;
    color:var(--dim);
}

.center{
    text-align:center;
}

/* =========================
   OPTIONAL EXAM MODE BUTTON
========================= */

.exam-mode{
    margin-top:10px;
    background:#1d4ed8;
    font-size:14px;
}

.exam-mode:hover{
    background:#2563eb;
}

</style>
</head>

<body>

<div id="app">

    <!-- STATIC HEADER (NO ENGINE CONTROL HERE) -->
    <div class="card center">
        <h2 style="color:var(--primary);">
            KAMIZEN LIFE SYSTEM
        </h2>

        <p class="small">
            Awareness • Control • Safety • Focus
        </p>
    </div>

    <!-- SYSTEM LOADING / ENGINE CONTROLLED AREA -->
    <div id="screen" class="card center">
        <h3>Loading system...</h3>
        <p class="small">Initializing neural missions</p>
    </div>

    <!-- OPTIONAL EXAM ACCESS (NEW FEATURE) -->
    <div class="card center">

        <h3>Exam Training Hub</h3>

        <p class="small">
            How to React Before & During Exams
        </p>

        <!-- OPTIONAL BUTTONS (ENGINE CAN HOOK THESE LATER) -->
        <button class="exam-mode"
                onclick="window.location.href='/exam36-42.html'">
            Calm Before Exams (Level 1)
        </button>

        <button class="exam-mode"
                onclick="window.location.href='/exam43-49.html'">
            Body & Stress Control (Level 2)
        </button>

        <p class="small">
            Optional modules – no interruption to main system
        </p>

    </div>

    <!-- BREATHING VISUAL (PURE VISUAL ONLY - ENGINE OVERRIDES) -->
    <div class="card center">

        <h3>Breathing Module</h3>

        <div class="breath-circle">
            <span>FOCUS</span>
        </div>

        <p class="small">
            Controlled by engine.js (do not modify manually)
        </p>

    </div>

</div>

<!-- ENGINE (FULL CONTROL SYSTEM) -->
<script src="/static/js/engine.js"></script>

</body>
</html>
