<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | SESSION CORE</title>

<style>
/* =========================
   BASE VISUAL CLEAN UI
========================= */

body {
    margin: 0;
    background: radial-gradient(circle, #001a33, #000);
    color: white;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
}

/* =========================
   TOP SAFE AREA (NO UI BLOCK)
========================= */

#top-ui {
    position: fixed;
    top: 10px;
    width: 100%;
    display: flex;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
}

/* =========================
   BOTTOM CONTROL BAR
========================= */

#control-bar {
    position: fixed;
    bottom: 15px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 10px;
    z-index: 10;
    pointer-events: none;
}

/* =========================
   BUTTON STYLE
========================= */

.control-btn {
    pointer-events: auto;
    padding: 12px 18px;
    font-size: 14px;
    border: 1px solid #00f2ff;
    background: rgba(0, 242, 255, 0.08);
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    backdrop-filter: blur(6px);
    white-space: nowrap;
}

.control-btn:hover {
    background: #00f2ff;
    color: black;
}

/* =========================
   RESPONSIVE MOBILE FIX
========================= */

@media (max-width: 600px) {
    .control-btn {
        padding: 10px 12px;
        font-size: 12px;
    }
}
</style>
</head>

<body>

<!-- =========================
     TOP BAR (SOLO INFO FUTURA)
========================= -->
<div id="top-ui"></div>

<!-- =========================
     SESSION GAME CONTAINER
     (CONTROLADO SOLO POR ENGINE)
========================= -->
<div id="game"></div>

<!-- =========================
     CONTROL BAR (ONLY BUTTONS)
========================= -->
<div id="control-bar">

    <button class="control-btn">EN/ES</button>

    <button class="control-btn">START</button>

    <button class="control-btn">CONTINUE</button>

    <button class="control-btn">PAUSE</button>

    <button class="control-btn">RESTART</button>

    <button class="control-btn">BACK</button>

</div>

</body>
</html>
