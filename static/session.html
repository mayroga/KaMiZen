<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN CORE</title>

<style>
:root{
  --bg:#000;
  --neon:#00f2ff;
  --green:#00ff88;
  --red:#ff0044;
  --yellow:#ffcc00;
  --panel:rgba(0,20,40,0.95);
}

body{
  margin:0;
  background:var(--bg);
  color:var(--neon);
  font-family:Arial;
  overflow:hidden;
}

/* HEADER */
#header{
  position:absolute;
  top:10px;
  width:95%;
  display:flex;
  justify-content:space-between;
}

#xpBar{
  width:180px;
  height:10px;
  border:1px solid var(--neon);
}
#xpFill{
  height:100%;
  width:0%;
  background:var(--green);
  transition:0.3s;
}

/* CORE */
#core{
  position:absolute;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
  border:2px solid var(--neon);
  width:140px;
  height:140px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* TEXT */
#message{
  position:absolute;
  bottom:230px;
  width:90%;
  left:5%;
  padding:15px;
  border:1px solid var(--neon);
  background:var(--panel);
  text-align:center;
}

#reason{
  position:absolute;
  bottom:300px;
  width:90%;
  left:5%;
  text-align:center;
}

/* OPTIONS */
#options{
  position:absolute;
  bottom:110px;
  width:90%;
  left:5%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  padding:15px;
  border:1px solid var(--neon);
  background:black;
  color:var(--neon);
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:var(--neon);
  color:black;
}

/* FEEDBACK */
.correct{ background:var(--green)!important; color:black!important;}
.wrong{ background:var(--red)!important; color:white!important;}

/* NAV */
#nav{
  position:absolute;
  bottom:20px;
  width:90%;
  left:5%;
  display:flex;
  justify-content:space-between;
}

/* BREAK */
#break{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}
</style>
</head>

<body>

<div id="header">
  <div id="xpBar"><div id="xpFill"></div></div>
  <button onclick="toggleLang()">EN/ES</button>
</div>

<div id="core">⚡</div>
<div id="reason"></div>
<div id="message">CLICK TO START</div>

<div id="options"></div>

<div id="nav">
  <button onclick="back()">BACK</button>
  <button onclick="restart()">RESTART</button>
  <button onclick="next()">NEXT</button>
</div>

<div id="break">
  <h2>🧠 BREAK MODE</h2>
  <p>Respira. 30 segundos sin pantalla.</p>
</div>

<script>
let session_id=null;
let mission=null;
let lang="en";
let xp=0;

/* AUDIO */
const ctx=new (window.AudioContext||window.webkitAudioContext)();

function sound(type){
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination);

  if(type==="good"){o.frequency.value=900;}
  if(type==="bad"){o.frequency.value=150;}
  if(type==="click"){o.frequency.value=500;}

  g.gain.value=0.2;
  o.start();
  o.stop(ctx.currentTime+0.2);
}

/* START */
async function start(){
  if(ctx.state==="suspended") await ctx.resume();

  const r=await fetch("/start",{method:"POST"});
  const d=await r.json();

  session_id=d.session_id;
  mission=d.mission;

  render();
}

/* GET MISSION */
async function loadMission(){
  const r=await fetch("/get_mission",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({session_id})
  });

  const d=await r.json();
  mission=d.mission;

  /* 🔇 SILENCE */
  if(d.silence){
    showSilence(d.silence);
  }

  render();
}

/* RENDER */
function render(){
  if(!mission) return;

  const msg=document.getElementById("message");
  const opt=document.getElementById("options");

  opt.innerHTML="";
  document.getElementById("reason").innerText="";

  let textBlock=mission.blocks.find(b=>b.text);
  msg.innerText=textBlock?.text?.[lang] || "..."

  let tvid=mission.blocks.find(b=>b.type==="tvid");

  if(tvid){
    tvid.options.forEach(o=>{
      const btn=document.createElement("button");
      btn.innerText=o.text[lang];

      btn.onclick=()=>choose(btn,o);

      opt.appendChild(btn);
    });
  }
}

/* CHOOSE */
async function choose(btn,o){

  const r=await fetch("/judge",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      session_id,
      decision:o.code
    })
  });

  const d=await r.json();

  document.getElementById("reason").innerText=o.reason[lang];

  if(d.correct){
    btn.classList.add("correct");
    sound("good");
  }else{
    btn.classList.add("wrong");
    sound("bad");
  }

  xp=d.xp;
  document.getElementById("xpFill").style.width=(xp%100)+"%";

  if(d.break){
    showBreak();
  }

  setTimeout(()=>{
    mission=d.next_mission;
    render();
  },1500);
}

/* SILENCE MODE */
function showSilence(s){
  const msg=document.getElementById("message");

  msg.innerText=
    s.message+"\n\n🎯 "+s.objective+"\n💡 "+s.benefit;

  let t=5;
  document.getElementById("core").innerText=t;

  const i=setInterval(()=>{
    t--;
    document.getElementById("core").innerText=t;

    if(t<=0){
      clearInterval(i);
      loadMission();
    }
  },1000);
}

/* BREAK */
function showBreak(){
  const b=document.getElementById("break");
  b.style.display="flex";

  setTimeout(()=>{
    b.style.display="none";
  },30000);
}

/* NAV CONTROL (CASTIGO REAL) */
async function next(){
  sound("click");

  const r=await fetch("/force_next",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({session_id})
  });

  const d=await r.json();

  alert(d.message);

  xp=d.xp;
  mission=d.mission;
  render();
}

async function back(){
  sound("click");

  const r=await fetch("/force_back",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({session_id})
  });

  const d=await r.json();

  alert(d.message);

  xp=d.xp;
  mission=d.mission;
  render();
}

function restart(){
  location.reload();
}

/* LANG */
function toggleLang(){
  lang=lang==="en"?"es":"en";
  render();
}

/* INIT */
document.getElementById("message").onclick=start;
</script>

</body>
</html>
