<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaykaMi | Sistema</title>

<style>
body{
    margin:0;
    background:#0a0f14;
    color:#ffffff;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#app{
    width:90%;
    max-width:420px;
    background:#111a22;
    border-radius:15px;
    padding:25px;
    text-align:center;
}

h1{
    color:#00f2ff;
}

#text-content{
    margin:20px 0;
    font-size:18px;
}

button{
    padding:15px;
    margin-top:10px;
    width:100%;
    border:none;
    background:#00f2ff;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

.secondary{
    background:#333;
    color:#fff;
}

#breath-circle{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid #00f2ff;
    margin:20px auto;
    display:none;
    align-items:center;
    justify-content:center;
}

.breathing-anim{
    animation: breathe 4s infinite;
}

@keyframes breathe{
    0%{transform:scale(0.8);}
    50%{transform:scale(1.2);}
    100%{transform:scale(0.8);}
}
</style>
</head>

<body>

<div id="app">

<h1>MAYKAMI</h1>

<div id="streak-display">SYNC: 100%</div>
<div id="level-display">LEVEL 1</div>

<div id="text-content">INICIANDO...</div>

<div id="breath-circle">
<div id="timer-display">0</div>
</div>

<button id="main-btn">START</button>
<button onclick="location.reload()" class="secondary">RESET</button>

</div>

<script src="/static/scripts.js"></script>

</body>
</html>
