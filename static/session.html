<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMIZEN | LIFE SIMULATOR</title>
    <style>
        body { margin:0; font-family: 'Courier New', monospace; background:#000; color:#00f2ff; overflow:hidden; }
        #app { position:absolute; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        #stats { display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; width:90%; max-width:800px; margin-bottom:20px; }
        .box { border:1px solid #00f2ff; padding:10px; text-align:center; font-size: 12px; }
        .val { font-size: 18px; display: block; color: #fff; }
        #message { width:85%; max-width:800px; padding:25px; border:2px solid #00f2ff; background:rgba(0,15,30,0.9); text-align:center; font-size:20px; min-height:150px; display:flex; align-items:center; justify-content:center; margin-bottom: 20px; }
        #options { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; width:90%; }
        button { padding:15px 25px; border:2px solid #00f2ff; background:black; color:#00f2ff; cursor:pointer; font-weight:bold; transition: 0.3s; }
        button:hover { background:#00f2ff; color:black; }
        button:disabled { border-color: #004444; color: #004444; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="app">
    <div id="stats">
        <div class="box">MENTAL <span id="mental" class="val">100</span></div>
        <div class="box">SOCIAL <span id="social" class="val">50</span></div>
        <div class="box">KARMA <span id="karma" class="val">0</span></div>
        <div class="box">DISCIPLINE <span id="disc" class="val">50</span></div>
    </div>

    <div id="message">INICIALIZANDO CONEXIÓN...</div>
    <div id="options"></div>
</div>

<script>
let session_id = localStorage.getItem("session_id");
let locked = false;

async function start() {
    try {
        const res = await fetch("/start", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ profile: { age: 18 } })
        });
        const data = await res.json();
        session_id = data.session_id;
        localStorage.setItem("session_id", session_id);
        updateDisplay(data);
    } catch (e) {
        document.getElementById("message").innerText = "ERROR DE SERVIDOR";
    }
}

async function sendDecision(code) {
    if (locked) return;
    locked = true;
    toggleButtons(true);

    try {
        const res = await fetch("/judge", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ session_id, decision: code })
        });
        const data = await res.json();
        if (data.error) {
            localStorage.clear();
            location.reload();
        } else {
            updateDisplay(data);
        }
    } catch (e) {
        console.error(e);
    } finally {
        setTimeout(() => { 
            locked = false; 
            toggleButtons(false);
        }, 800);
    }
}

function updateDisplay(data) {
    const s = data.state;
    document.getElementById("mental").innerText = s.mental;
    document.getElementById("social").innerText = s.social;
    document.getElementById("karma").innerText = s.karma;
    document.getElementById("disc").innerText = s.discipline;
    
    const text = data.story.text;
    document.getElementById("message").innerText = text;
    speak(text);
}

function toggleButtons(status) {
    document.querySelectorAll("#options button").forEach(b => b.disabled = status);
}

function speak(text) {
    if (!window.speechSynthesis) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "es-ES";
    u.rate = 1.0;
    speechSynthesis.speak(u);
}

function renderInterface() {
    const container = document.getElementById("options");
    const actions = [
        ["TDB","EQUILIBRIO"], ["TDM","IMPULSO"], ["TDN","MENTE"],
        ["TDP","ORDEN"], ["TDG","CONTROL"], ["TDK","UNIÓN"]
    ];
    actions.forEach(([code, label]) => {
        const btn = document.createElement("button");
        btn.innerText = label;
        btn.onclick = () => sendDecision(code);
        container.appendChild(btn);
    });
}

window.onload = () => {
    renderInterface();
    start();
};
</script>
</body>
</html>
