<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO: MATRIX TRAINING</title>

<style>
:root {
    --neon-blue:#00f2ff;
    --neon-green:#00ff41;
    --neon-red:#ff003c;
    --neon-yellow:#ffff00;
    --matrix-bg:#00050a;
}

body{
    margin:0;
    background:var(--matrix-bg);
    color:#fff;
    font-family:'Courier New', monospace;
    overflow:hidden;
    user-select:none;
}

/* LANGUAGE BUTTON (SEPARADO FIX) */
#lang-btn{
    position:fixed;
    top:15px;
    right:15px;
    z-index:999;
    padding:10px 14px;
    border:2px solid var(--neon-blue);
    background:rgba(0,0,0,0.7);
    color:var(--neon-blue);
    font-weight:bold;
    cursor:pointer;
}

/* HUD */
#hud{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px;
    z-index:50;
    box-sizing: border-box;
}

#timer-box{font-size:2.5rem;color:var(--neon-blue);}
#score-container{text-align:right;}
#score-box{border:3px solid #fff;padding:5px 15px; font-size: 1.5rem;}
#mastery-lvl{color:var(--neon-green); font-size: 1.2rem;}

/* STATS */
#life-stats {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 15px;
    z-index: 50;
}

.stat-pill {
    border: 1px solid #444;
    padding: 5px 10px;
    font-size: 0.8rem;
    background: rgba(0,0,0,0.5);
}

/* FLOATING WORDS */
.floating {
    position: absolute;
    padding: 12px 24px;
    font-weight: 900;
    font-size: 1.4rem;
    border-radius: 8px;
    background: rgba(0,0,0,0.85);
    z-index: 10;
    animation: floatUp 6s linear forwards;
    transition: transform 0.1s;
    cursor: pointer;
}

.word-power { border: 3px solid var(--neon-green); color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
.word-risk { border: 3px solid var(--neon-red); color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red); }
.word-silence { border: 3px solid var(--neon-yellow); color: var(--neon-yellow); text-shadow: 0 0 10px var(--neon-yellow); }

@keyframes floatUp {
    from { transform: translateY(110vh); opacity: 1; }
    to { transform: translateY(-20vh); opacity: 0; }
}

.explode {
    animation: blast 0.4s ease-out forwards !important;
    pointer-events: none;
}

@keyframes blast {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(2.5); opacity: 0.5; filter: brightness(2); }
    100% { transform: scale(4); opacity: 0; }
}

/* OVERLAY */
#overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,5,10,0.95);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:500;
    text-align:center;
}

#circle{
    width:200px;
    height:200px;
    border:6px solid var(--neon-blue);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all 4s ease;
    margin: 20px 0;
}

#phase-title {
    color: var(--neon-blue);
    font-size: 3rem;
    margin: 0;
}
</style>
</head>

<body>

<!-- BOTÓN INDEPENDIENTE -->
<button id="lang-btn" onclick="toggleLang()">ES</button>

<div id="hud">
    <div id="timer-box">05:00</div>

    <div id="score-container">
        <div id="mastery-lvl">MASTERY x1</div>
        <div id="score-box">0</div>
    </div>
</div>

<div id="life-stats">
    <div class="stat-pill" id="st-respect">Respect: <span>50</span></div>
    <div class="stat-pill" id="st-peace">Peace: <span>50</span></div>
    <div class="stat-pill" id="st-lead">Leadership: <span>50</span></div>
</div>

<div id="overlay">
    <h1 id="phase-title">SITUATION</h1>
    <div id="circle"><span id="breath-label"></span></div>
    <p id="phase-desc"></p>
</div>

<audio id="hit" src="/static/sounds/glass.mp3"></audio>
<audio id="error" src="/static/sounds/trumpet.mp3"></audio>

<script>

/* LANGUAGE */
let lang="en";

function toggleLang(){
    lang = (lang==="en") ? "es" : "en";
    document.getElementById("lang-btn").innerText = (lang==="en") ? "ES" : "EN";
    updateHUD();
}

/* STATE */
let state = {
    score:0,
    mastery:1,
    combo:0,
    phase:-1,
    timer:0,
    playing:false,
    spawnRate:1200,
    stats:{respect:50,peace:50,lead:50}
};

const phases=[
    {name:"WORDS",duration:300,desc:{en:"Capture POWER, ignore NOISE.",es:"Captura PODER, ignora RUIDO."}},
    {name:"BREATH",duration:30,desc:{en:"Control rhythm.",es:"Controla el ritmo."}},
    {name:"SILENCE",duration:20,desc:{en:"Stay still.",es:"Quédate quieto."}},
    {name:"WORDS+",duration:600,desc:{en:"Break limits.",es:"Rompe límites."}}
];

const words={
    power:["WILL","FOCUS","DISCIPLINE","VISION"],
    risk:["EGO","NOISE","LAZY","FEAR"],
    silence:["CALM","WAIT","BREATHE","PEACE"]
};

function start(){ state.playing=true; nextPhase(); }

function nextPhase(){
    clearInterval(state.spawnInterval);
    clearInterval(state.timerInterval);

    state.phase=(state.phase+1)%phases.length;
    const p=phases[state.phase];
    state.timer=p.duration;

    if(p.name.includes("WORDS")) startWords();
    else if(p.name==="BREATH") startBreath(p);
    else if(p.name==="SILENCE") startSilence(p);

    updateHUD();
}

function loopTimer(){
    state.timerInterval=setInterval(()=>{
        state.timer--;
        updateHUD();
        if(state.timer<=0) nextPhase();
    },1000);
}

function startWords(){
    document.getElementById("overlay").style.display="none";
    state.spawnInterval=setInterval(spawnWord, state.spawnRate);
    loopTimer(); // FIX: reloj siempre activo
}

function spawnWord(){
    const cats=["power","risk","silence"];
    const c=cats[Math.floor(Math.random()*3)];
    const list=words[c];

    const div=document.createElement("div");
    div.className=`floating word-${c}`;
    div.innerText=list[Math.floor(Math.random()*list.length)];
    div.style.left=Math.random()*80+"vw";

    div.onclick=()=>{
        div.classList.add("explode");

        if(c==="risk"){
            state.score=Math.max(0,state.score-30);
            state.mastery=1;
        }else{
            state.score+=10*state.mastery;
            if(++state.combo%5===0) state.mastery++;
        }

        updateHUD();
        setTimeout(()=>div.remove(),400);
    };

    document.body.appendChild(div);
    setTimeout(()=>div.remove(),5000);
}

function startBreath(p){
    showOverlay("BREATH",p.desc[lang]);
    const circle=document.getElementById("circle");
    const label=document.getElementById("breath-label");
    let inha=true;

    const cycle=setInterval(()=>{
        label.innerText=inha?"IN":"OUT";
        circle.style.transform=inha?"scale(1.5)":"scale(0.8)";
        inha=!inha;
    },4000);

    loopTimer(); // FIX RELOJ

    setTimeout(()=>{clearInterval(cycle); state.mastery++; nextPhase();},state.timer*1000);
}

function startSilence(p){
    showOverlay("SILENCE",p.desc[lang]);
    let violated=false;

    window.onmousemove=()=>violated=true;
    window.onclick=()=>violated=true;

    loopTimer(); // FIX RELOJ

    setTimeout(()=>{
        if(!violated) state.score+=500*state.mastery;
        nextPhase();
    },state.timer*1000);
}

function showOverlay(t,d){
    document.getElementById("overlay").style.display="flex";
    document.getElementById("phase-title").innerText=t;
    document.getElementById("phase-desc").innerText=d;
}

function updateHUD(){
    document.getElementById("score-box").innerText=state.score;
    document.getElementById("mastery-lvl").innerText="MASTERY x"+state.mastery;

    document.getElementById("st-respect").innerHTML=`Respect: <span>${state.stats.respect}</span>`;
    document.getElementById("st-peace").innerHTML=`Peace: <span>${state.stats.peace}</span>`;
    document.getElementById("st-lead").innerHTML=`Leadership: <span>${state.stats.lead}</span>`;

    let m=Math.floor(state.timer/60).toString().padStart(2,"0");
    let s=(state.timer%60).toString().padStart(2,"0");
    document.getElementById("timer-box").innerText=`${m}:${s}`;
}

start();

</script>
</body>
</html>
