<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MAYKAMI NEUROGAME</title>
<style>
    :root { --primary: #00f2ff; --bg: #05070d; --font: 'Segoe UI', Roboto, sans-serif; }
    body { margin:0; background: var(--bg); color:#fff; font-family: var(--font); overflow:hidden; transition: background 0.5s; }
    
    #timer { position:absolute; top:20px; left:50%; transform:translateX(-50%); font-size:80px; color:var(--primary); font-weight:bold; z-index:1000; text-shadow: 0 0 20px rgba(0,242,255,0.5); }
    #centerText { position:absolute; top:35%; left:50%; transform:translate(-50%,-50%); font-size:26px; width:85%; text-align:center; z-index:50; line-height: 1.6; max-height: 50vh; overflow-y: auto; }
    
    /* Quiz Styles */
    #quizContainer { display:none; position:absolute; top:55%; left:50%; transform:translate(-50%,-20%); width:80%; z-index:100; flex-direction:column; gap:15px; }
    .option-btn { padding:15px; background: rgba(255,255,255,0.05); border: 2px solid var(--primary); color: white; border-radius: 10px; cursor: pointer; font-size: 18px; transition: 0.3s; text-align: left; }
    .option-btn.correct { background: #008000 !important; border-color: #0f0 !important; }
    .option-btn.wrong { background: #800000 !important; border-color: #f00 !important; }
    #quizFeedback { font-size: 18px; margin-top: 10px; font-style: italic; color: var(--primary); }

    .btn-panel { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 1000; }
    .btn-kam { padding:15px 40px; font-size:18px; background:var(--primary); color:#000; border:none; border-radius:50px; cursor:pointer; font-weight:bold; box-shadow: 0 0 20px var(--primary); }
    #btnNext { display: none; background: #0f0; }

    /* UI Components */
    #explanationBox { position:absolute; bottom:120px; left:30px; width:320px; padding:20px; background: rgba(0,242,255,0.1); border-left: 5px solid var(--primary); font-size:16px; opacity:0; transition: opacity 0.5s; z-index:60; }
    #indicators { position:absolute; right:30px; top:50%; transform:translateY(-50%); display:none; flex-direction:column; gap:10px; z-index:100; }
    .bar-container { display: flex; align-items: center; gap: 8px; }
    .bar { width:8px; height:50px; background:rgba(255,255,255,0.1); border-radius:4px; position:relative; }
    .fill { position:absolute; bottom:0; width:100%; height:0%; background:var(--primary); transition: height 0.5s; }

    /* Silence & Breath */
    #breathContainer { display:none; position:fixed; inset:0; flex-direction:column; justify-content:center; align-items:center; z-index:1500; background: var(--bg); }
    #breathCircle { width: 220px; height: 220px; border-radius: 50%; background: radial-gradient(circle, #00f2ff 0%, #0044ff 100%); box-shadow: 0 0 80px #00f2ff; display:flex; justify-content:center; align-items:center; font-weight:bold; font-size:24px; color:white; transition: all 4s ease-in-out; }
    #scienceText { position: absolute; bottom: 10%; width: 70%; text-align: center; color: #00f2ff; font-size: 18px; font-style: italic; }

    #finalModal { display:none; position:fixed; inset:0; background:var(--bg); z-index:2000; flex-direction:column; justify-content:center; align-items:center; padding:40px; text-align:center; }
    .word { position:absolute; font-size:24px; color:var(--primary); font-weight:bold; cursor:pointer; animation: float 6s linear forwards; white-space: nowrap; z-index: 80; }
    @keyframes float { 0%{transform:translateY(0); opacity:0;} 10%{opacity:1;} 90%{opacity:1;} 100%{transform:translateY(-450px); opacity:0;} }
</style>
</head>
<body>

<div id="timer">00:00</div>
<div id="centerText">Initializing MayKaMi...</div>

<div id="quizContainer"></div>

<div class="btn-panel">
    <button id="btnBack" class="btn-kam" onclick="Engine.repeatAudio()" style="display:none">BACK</button>
    <button id="btnStart" class="btn-kam" onclick="Engine.start()">START</button>
    <button id="btnNext" class="btn-kam" onclick="Engine.nextQuiz()">NEXT LEVEL</button>
</div>

<div id="explanationBox">
    <strong id="expTitle"></strong><br><span id="expBody"></span>
</div>

<div id="indicators"></div>

<div id="breathContainer">
    <div id="breathCircle">IDLE</div>
    <div id="scienceText"></div>
</div>

<div id="finalModal">
    <h1 style="color:var(--primary); font-size: 45px;">NEURO-DIAGNOSIS</h1>
    <div id="diagText" style="margin:30px 0; font-size:22px; max-width: 800px;"></div>
    <button class="btn-kam" onclick="location.reload()">RESTART</button>
</div>

<audio id="bgMusic" loop src="https://assets.mixkit.co/music/preview/mixkit-tech-house-vibes-130.mp3"></audio>
<audio id="sfxBreak" src="https://www.soundjay.com/misc/sounds/glass-break-01.mp3"></audio>

<script>
const Engine = (() => {
    let state = { 
        lang: 'en', phase: 'init', index: 1, 
        stats: {}, clicks: 0, data: null, 
        gameTime: 300, currentText: "", quizIndex: 0, 
        isRepeatingGame: false 
    };

    const pillars = {
        "PURPOSE": { cat: "Core", color: "#ff00ff", en: "Internal 'Why'.", es: "Tu 'Por qué' interno." },
        "DISCIPLINE": { cat: "Action", color: "#00ff88", en: "Consistency.", es: "Consistencia." },
        "RESILIENCE": { cat: "Spirit", color: "#ffa500", en: "Absorb chaos.", es: "Absorber el caos." },
        "WEALTH": { cat: "Value", color: "#ffd700", en: "Value provided.", es: "Valor aportado." },
        "STRATEGY": { cat: "Mind", color: "#4444ff", en: "Steps ahead.", es: "Pasos adelante." }
    };

    const start = async () => {
        document.getElementById("btnStart").style.display = "none";
        document.getElementById("btnBack").style.display = "block";
        const res = await fetch("/api/session/start");
        state.data = await res.json();
        state.index = state.data.index || 1;
        playStory();
    };

    const speak = (text, callback) => {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();
        // Buscar voz masculina pausada
        msg.voice = voices.find(v => v.name.includes("David") || v.name.includes("Male") || v.name.includes("Google US English")) || voices[0];
        msg.rate = 0.8; 
        msg.pitch = 1.0;
        msg.onend = callback;
        window.speechSynthesis.speak(msg);
    };

    const playStory = () => {
        state.phase = "story";
        state.currentText = state.data.story[state.lang];
        document.getElementById("centerText").innerText = state.currentText;
        speak(state.currentText, () => playMission());
    };

    const playMission = () => {
        state.phase = "mission";
        // Leer el JSON completo uniendo los bloques de texto si existen
        state.currentText = state.data.mission.b.map(block => block.tx[state.lang]).join(" ");
        document.getElementById("centerText").innerText = state.currentText;
        speak(state.currentText, () => showQuiz());
    };

    const showQuiz = () => {
        state.phase = "quiz";
        const qData = state.data.mission.b[0].q;
        if (!qData || state.quizIndex >= qData.length) {
            startFloatingWords();
            return;
        }
        
        const q = qData[state.quizIndex];
        const container = document.getElementById("quizContainer");
        container.style.display = "flex";
        document.getElementById("centerText").innerText = q.tx[state.lang];
        
        container.innerHTML = q.o.map((opt, i) => `
            <button class="option-btn" onclick="Engine.handleAnswer(${i}, ${q.v === i}, '${q.ex[state.lang].replace(/'/g, "\\'")}')">
                ${opt[state.lang]}
            </button>
        `).join("");
    };

    const handleAnswer = (idx, isCorrect, explanation) => {
        const btns = document.querySelectorAll(".option-btn");
        btns.forEach(b => b.disabled = true);
        
        const selected = btns[idx];
        const feedbackTxt = isCorrect ? (state.lang === 'en' ? "Correct" : "Correcto") : (state.lang === 'en' ? "Incorrect" : "Incorrecto");
        
        selected.classList.add(isCorrect ? "correct" : "wrong");
        document.getElementById("quizFeedback").remove?.();
        
        const fbDiv = document.createElement("div");
        fbDiv.id = "quizFeedback";
        fbDiv.innerText = explanation;
        document.getElementById("quizContainer").appendChild(fbDiv);
        
        speak(feedbackTxt + ". " + explanation, () => {
            document.getElementById("btnNext").style.display = "block";
        });
    };

    const nextQuiz = () => {
        state.quizIndex++;
        document.getElementById("btnNext").style.display = "none";
        document.getElementById("quizContainer").innerHTML = "";
        showQuiz();
    };

    const startFloatingWords = () => {
        document.getElementById("quizContainer").style.display = "none";
        document.getElementById("centerText").innerText = "";
        state.phase = "game";
        
        const music = document.getElementById("bgMusic");
        music.play();
        music.volume = 0.4;
        
        let timeLeft = state.gameTime;
        initIndicators();
        document.getElementById("indicators").style.display = "flex";

        const loop = setInterval(() => {
            timeLeft--;
            document.getElementById("timer").innerText = formatTime(timeLeft);
            spawnWord();
            
            music.playbackRate = 1 + (state.clicks / 150);

            if (timeLeft <= 0) {
                clearInterval(loop);
                if (!state.isRepeatingGame) {
                    state.isRepeatingGame = true;
                    state.gameTime = 300; // Repetir 5 min
                    startFloatingWords();
                } else {
                    runSilenceChallenge();
                }
            }
        }, 1000);
    };

    const spawnWord = () => {
        const keys = Object.keys(pillars);
        const key = keys[Math.floor(Math.random()*keys.length)];
        const p = pillars[key];
        const el = document.createElement("div");
        el.className = "word";
        el.innerText = key;
        el.style.left = Math.random()*85 + 5 + "%";
        el.style.top = "95%";
        el.style.color = p.color;

        el.onclick = () => {
            const sfx = document.getElementById("sfxBreak").cloneNode();
            sfx.volume = 0.6;
            sfx.play();
            
            state.clicks++;
            state.stats[p.cat] = (state.stats[p.cat] || 0) + 1;
            updateBars();

            document.getElementById("explanationBox").style.opacity = "1";
            document.getElementById("expTitle").innerText = key;
            document.getElementById("expBody").innerText = p[state.lang];
            el.remove();
        };
        document.body.appendChild(el);
    };

    const runSilenceChallenge = async () => {
        state.phase = 'silence';
        document.getElementById("bgMusic").pause();
        document.getElementById("indicators").style.display = "none";
        document.getElementById("breathContainer").style.display = "flex";

        let silenceSeconds = Math.min(30 + (state.index - 1) * 4.4, 180);
        let t = Math.round(silenceSeconds);

        document.getElementById("scienceText").innerText = "Silence resets the prefrontal cortex and lowers cortisol. Coherence achieved.";

        while (t > 0) {
            document.getElementById("timer").innerText = formatTime(t);
            await breathStep("INHALE", 1.8, 4000);
            await breathStep("HOLD", 1.8, 4000);
            await breathStep("EXHALE", 1.0, 4000);
            t -= 12;
            if(t < 0) t = 0;
        }
        showDiagnosis();
    };

    const breathStep = (txt, scale, time) => {
        return new Promise(r => {
            const c = document.getElementById("breathCircle");
            c.innerText = txt;
            c.style.transform = `scale(${scale})`;
            setTimeout(r, time);
        });
    };

    const showDiagnosis = () => {
        document.getElementById("breathContainer").style.display = "none";
        document.getElementById("finalModal").style.display = "flex";
        const top = Object.keys(state.stats).reduce((a, b) => state.stats[a] > state.stats[b] ? a : b, "Balance");
        document.getElementById("diagText").innerText = `Trajectory identified: ${top}. Neuro-plasticity levels increased. System stabilized.`;
    };

    const initIndicators = () => {
        const ind = document.getElementById("indicators");
        ind.innerHTML = "";
        Object.keys(pillars).forEach(k => {
            ind.innerHTML += `<div class="bar-container"><div class="bar"><div class="fill" id="bar-${pillars[k].cat}"></div></div></div>`;
        });
    };

    const updateBars = () => {
        Object.keys(state.stats).forEach(cat => {
            const el = document.getElementById(`bar-${cat}`);
            if(el) el.style.height = Math.min(state.stats[cat] * 10, 100) + "%";
        });
    };

    const formatTime = (s) => {
        const m = Math.floor(s/60);
        const sec = s%60;
        return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    };

    return {
        start, handleAnswer, nextQuiz,
        repeatAudio: () => speak(state.currentText, () => {}),
        toggleLang: () => {
            state.lang = state.lang === 'en' ? 'es' : 'en';
            alert("Language changed / Idioma cambiado");
        }
    };
})();
</script>
</body>
</html>
