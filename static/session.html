<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAMIZEN | CORE FOCUS SYSTEM</title>

<style>
:root{
  --neon:#00f2ff;
  --bg:#000;
  --panel:rgba(0,15,30,0.92);
  --good:#00ff88;
  --bad:#ff0044;
}

body{
  margin:0;
  background:var(--bg);
  font-family:Arial;
  color:var(--neon);
  overflow:hidden;
}

#app{
  width:100%;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  position:relative;
}

/* BREATH CORE */
#circle{
  width:80px;
  height:80px;
  border-radius:50%;
  background:rgba(0,242,255,0.2);
  box-shadow:0 0 25px var(--neon);
  transition:2.5s ease-in-out;
}

/* MESSAGE */
#message{
  position:absolute;
  bottom:170px;
  width:85%;
  max-width:720px;
  padding:15px;
  background:var(--panel);
  border:1px solid var(--neon);
  text-align:center;
  min-height:120px;
}

/* OPTIONS */
#options{
  position:absolute;
  bottom:60px;
  width:85%;
  max-width:720px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  padding:12px;
  background:transparent;
  border:1px solid var(--neon);
  color:var(--neon);
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:var(--neon);
  color:#000;
}

#controls{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 10px;
  font-size:12px;
}

/* SILENCE MODE */
#silence{
  position:absolute;
  top:50px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<div id="app">

  <div id="controls">
    <button onclick="restart()">RESTART</button>
    <button onclick="skip()">SKIP</button>
  </div>

  <div id="silence">SILENCE: <span id="silenceLevel">20</span>s</div>

  <div id="circle"></div>

  <div id="message" onclick="start()">TOUCH TO START</div>

  <div id="options"></div>

</div>

<script>

/* =========================
   CORE STATE (SIMPLIFIED)
========================= */
let session_id = null;
let lang = "es";
let loading = false;
let current = null;

/* INTERNAL (HIDDEN INTELLIGENCE) */
let metrics = {
  stress: 0,
  attention: 50,
  emotion: 50
};

/* =========================
   AUDIO ENGINE (LIGHT)
========================= */
const audio = new (window.AudioContext || window.webkitAudioContext)();

function sound(type){
  const o = audio.createOscillator();
  const g = audio.createGain();

  o.connect(g);
  g.connect(audio.destination);

  if(type==="ok") o.frequency.value = 520;
  if(type==="bad") o.frequency.value = 140;
  if(type==="click") o.frequency.value = 300;

  g.gain.value = 0.12;

  o.start();
  o.stop(audio.currentTime + 0.2);
}

/* =========================
   MUSIC LOOP (STABLE)
========================= */
let musicOsc;

function startMusic(){
  if(musicOsc) return;

  musicOsc = audio.createOscillator();
  const gain = audio.createGain();

  musicOsc.type = "sine";
  musicOsc.frequency.value = 220;

  gain.gain.value = 0.03;

  musicOsc.connect(gain);
  gain.connect(audio.destination);

  musicOsc.start();
}

/* =========================
   BREATH SYSTEM
========================= */
let breathInterval;

function breathe(){
  const c = document.getElementById("circle");

  clearInterval(breathInterval);

  let grow = true;

  breathInterval = setInterval(()=>{

    c.style.transform = grow ? "scale(1.8)" : "scale(1)";
    c.style.opacity = grow ? 0.85 : 0.4;

    grow = !grow;

  }, 2500);
}

function stopBreath(){
  clearInterval(breathInterval);
}

/* =========================
   START SESSION
========================= */
async function start(){

  if(loading) return;
  loading = true;

  if(audio.state==="suspended") await audio.resume();

  startMusic();

  const res = await fetch("/start",{method:"POST"});
  const data = await res.json();

  session_id = data.session_id;

  render(data);

  loading = false;
}

/* =========================
   SEND ACTION (LOCKED FLOW)
========================= */
async function send(code){

  if(loading) return;
  loading = true;

  sound("click");

  const res = await fetch("/judge",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      session_id,
      decision:code
    })
  });

  const data = await res.json();

  updateMetrics(data);

  render(data);

  loading = false;
}

/* =========================
   METRICS (INTERNAL ONLY)
========================= */
function updateMetrics(data){

  if(!data) return;

  if(data.correct){
    metrics.attention += 3;
    metrics.emotion += 2;
    metrics.stress -= 2;
  }else{
    metrics.attention -= 2;
    metrics.emotion -= 2;
    metrics.stress += 3;
  }

  metrics.attention = clamp(metrics.attention);
  metrics.emotion = clamp(metrics.emotion);
  metrics.stress = clamp(metrics.stress);
}

function clamp(v){
  return Math.max(0, Math.min(100, v));
}

/* =========================
   RENDER ENGINE (CLEAN FLOW)
========================= */
function render(data){

  if(!data || !data.story) return;

  current = data.story;

  const msg = document.getElementById("message");
  const opt = document.getElementById("options");

  msg.innerText =
    current.text?.es ||
    current.text?.en ||
    "..."

  opt.innerHTML = "";

  /* BREATH CONTROL */
  if(current.type === "breathing"){
    breathe();
  }else{
    stopBreath();
  }

  /* SILENCE */
  if(current.type === "silence_challenge"){
    document.getElementById("silenceLevel").innerText =
      current.duration_sec || 20;
  }

  /* OPTIONS */
  let options = current.options || [];

  if(options.length === 0 && current.type !== "silence_challenge"){
    options = [{
      code:"NEXT",
      text:{es:"CONTINUAR",en:"CONTINUE"}
    }];
  }

  options.forEach(o=>{
    const b = document.createElement("button");

    b.innerText = o.text?.[lang] || "OK";

    b.onclick = ()=> send(o.code);

    opt.appendChild(b);
  });

  sound("ok");
}

/* =========================
   CONTROLS
========================= */
function skip(){
  send("NEXT");
}

function restart(){
  location.reload();
}

/* =========================
   AUTO BACKGROUND STABILITY
========================= */
setInterval(()=>{
  const c = document.getElementById("circle");
  c.style.opacity = 0.4 + Math.random()*0.3;
}, 3000);

</script>

</body>
</html>
