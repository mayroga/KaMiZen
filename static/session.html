<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO: TOTAL LIFE TRAINING</title>

<style>
:root {
    --neon-blue:#00f2ff;
    --neon-green:#00ff41;
    --neon-red:#ff003c;
    --neon-yellow:#ffff00;
    --matrix-bg:#00050a;
    --neon-gold:#ffcc00;
}

body {
    margin:0;
    background:var(--matrix-bg);
    color:#fff;
    font-family:'Courier New', monospace;
    overflow:hidden;
    user-select:none;
}

#security-alert {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:8px;
    background:var(--neon-green);
    z-index:1000;
    box-shadow:0 0 15px var(--neon-green);
}

#lang-btn {
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:999;
    padding:10px 18px;
    border:2px solid var(--neon-blue);
    background:rgba(0,0,0,0.8);
    color:var(--neon-blue);
    cursor:pointer;
    font-weight:bold;
    border-radius:5px;
}

#hud {
    position:fixed;
    top:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px;
    z-index:50;
    box-sizing:border-box;
}

#timer-box {
    font-size:2.8rem;
    color:var(--neon-blue);
    text-shadow:0 0 20px var(--neon-blue);
}

#score-box {
    border:3px solid #fff;
    padding:8px 20px;
    font-size:1.8rem;
    background:rgba(255,255,255,0.1);
}

#mastery-lvl {
    color:var(--neon-green);
    font-size:1.2rem;
    font-weight:bold;
}

#life-stats {
    position:fixed;
    bottom:20px;
    left:20px;
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    z-index:50;
    max-width:95%;
}

.stat-pill {
    border:2px solid #333;
    padding:10px 15px;
    font-size:0.9rem;
    background:rgba(0,0,0,0.9);
    border-radius:6px;
    transition:0.3s;
}

.stat-pill span {
    font-weight:bold;
    color:var(--neon-blue);
}

#v-money { color:var(--neon-gold)!important; }
#v-safety { color:var(--neon-red)!important; }
#v-happy { color:#ff00ff!important; }

.floating {
    position:absolute;
    padding:15px 30px;
    font-weight:900;
    font-size:1.5rem;
    border-radius:10px;
    background:rgba(0,0,0,0.9);
    z-index:10;
    animation:floatUp 7s linear forwards;
    cursor:pointer;
}

.word-power {
    border:3px solid var(--neon-green);
    color:var(--neon-green);
}

.word-risk {
    border:3px solid var(--neon-red);
    color:var(--neon-red);
}

.word-silence {
    border:3px solid var(--neon-yellow);
    color:var(--neon-yellow);
}

@keyframes floatUp {
    from { transform:translateY(110vh); }
    to { transform:translateY(-25vh); }
}

.explode {
    animation:blast 0.5s ease-out forwards!important;
}

@keyframes blast {
    0% { transform:scale(1); opacity:1; }
    100% { transform:scale(4); opacity:0; }
}

#overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,5,10,0.95);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:500;
    text-align:center;
    padding:30px;
}

#decision-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:30px;
    width:100%;
    max-width:800px;
}

.choice-btn {
    padding:22px;
    border:3px solid var(--neon-blue);
    background:none;
    color:#fff;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="security-alert"></div>
<button id="lang-btn" onclick="toggleLang()">EN</button>

<div id="hud">
    <div id="timer-box">05:00</div>
    <div id="score-box">0</div>
    <div id="mastery-lvl">MASTERY x1</div>
</div>

<div id="life-stats">
    <div class="stat-pill">Respect: <span id="v-respect">50</span></div>
    <div class="stat-pill">Peace: <span id="v-peace">50</span></div>
    <div class="stat-pill">Leadership: <span id="v-lead">50</span></div>
    <div class="stat-pill">Money: $<span id="v-money">100</span></div>
    <div class="stat-pill">Safety: <span id="v-safety">100</span>%</div>
    <div class="stat-pill">Happiness: <span id="v-happy">50</span>%</div>
</div>

<div id="overlay">
    <h1 id="phase-title"></h1>
    <p id="phase-desc"></p>
    <div id="decision-grid"></div>
</div>

<script src="/static/engine.js"></script>

<script>

let lang = "en";
let gameMode = "idle";
let missionIndex = 1;

let state = {
    score: 0,
    mastery: 1,
    timer: 300,
    stats: {
        respect:50,
        peace:50,
        lead:50,
        money:100,
        happy:50,
        safety:100
    },
    spawnRate:1300
};

function updateHUD(){

    document.getElementById("score-box").innerText = state.score;

    document.getElementById("timer-box").innerText =
        String(Math.floor(state.timer/60)).padStart(2,"0") + ":" +
        String(state.timer%60).padStart(2,"0");

    const stats = [
        {id:"v-respect", value:state.stats.respect},
        {id:"v-peace", value:state.stats.peace},
        {id:"v-lead", value:state.stats.lead},
        {id:"v-money", value:state.stats.money},
        {id:"v-safety", value:state.stats.safety},
        {id:"v-happy", value:state.stats.happy}
    ];

    stats.forEach(s=>{
        const el = document.getElementById(s.id);
        if(!el) return;

        el.innerText = s.value;

        let scale = 1 + (s.value / 100);
        el.style.transform = "scale(" + scale + ")";
    });

}

function toggleLang(){
    lang = (lang==="en") ? "es" : "en";
    document.getElementById("lang-btn").innerText = lang.toUpperCase();
}

const words = {
    power:["LISTEN FIRST","STAY CALM","THINK BEFORE","CONTROL EMOTION","RESPECT OTHERS"],
    risk:["REACT ANGRY","BLAME OTHERS","LOSE CONTROL","FOLLOW CROWD"],
    silence:["OBSERVE PEOPLE","BREATHE DEEP","WAIT MOMENT","INNER CONTROL"]
};

function spawnWord(){
    if(gameMode!=="words") return;

    const cats=["power","risk","silence"];
    const styles=["word-power","word-risk","word-silence"];
    const c = cats[Math.floor(Math.random()*3)];

    const div=document.createElement("div");
    div.className="floating "+styles[Math.floor(Math.random()*3)];
    div.innerText = words[c][Math.floor(Math.random()*words[c].length)];
    div.style.left = Math.random()*80 + "vw";

    div.onclick=()=>{

        if(div.dataset.clicked) return;
        div.dataset.clicked=true;
        div.classList.add("explode");

        if(c==="power"){
            state.score+=20;
            state.stats.respect++;
            state.stats.lead++;
        }

        if(c==="risk"){
            state.score-=30;
            state.stats.safety--;
            state.stats.peace--;
        }

        if(c==="silence"){
            state.stats.peace++;
            state.stats.happy++;
        }

        updateHUD();
        setTimeout(()=>div.remove(),500);
    };

    document.body.appendChild(div);
    setTimeout(()=>div.remove(),7000);
}

async function loadMission(){

    const file =
        missionIndex <= 7 ? "/static/missions_01_07.json" :
        missionIndex <= 14 ? "/static/missions_08_14.json" :
        missionIndex <= 21 ? "/static/missions_15_21.json" :
        missionIndex <= 28 ? "/static/missions_22_28.json" :
        "/static/missions_29_35.json";

    const res = await fetch(file);
    const data = await res.json();

    return (data.missions || []).find(m => m.id === missionIndex);
}

async function triggerQuestion(){

    const mission = await loadMission();
    if(!mission) return;

    const overlay=document.getElementById("overlay");
    const grid=document.getElementById("decision-grid");
    const desc=document.getElementById("phase-desc");
    const title=document.getElementById("phase-title");

    overlay.style.display="flex";

    const story = mission.blocks.find(b=>b.type==="story");
    const decision = mission.blocks.find(b=>b.type==="decision");

    title.innerText = mission.theme;
    desc.innerText = story?.text?.[lang] || "";

    grid.innerHTML="";

    decision.options.forEach(opt=>{

        const btn=document.createElement("button");
        btn.className="choice-btn";
        btn.innerText = opt.text?.[lang] || opt.text?.en;

        btn.onclick=()=>{

            if(opt.correct){
                state.score += 30;
                state.stats.respect++;
                state.stats.happy++;
            } else {
                state.score -= 20;
                state.stats.safety--;
            }

            desc.innerText = opt.explanation?.[lang] || opt.explanation?.en;
            grid.innerHTML="";

            setTimeout(()=>{
                overlay.style.display="none";
                missionIndex++;
            },2000);

            updateHUD();
        };

        grid.appendChild(btn);
    });
}

setInterval(()=>{
    if(state.timer>0){
        state.timer--;
        updateHUD();
    }
},1000);

async function mainLoop(){

    while(true){

        gameMode="words";

        let end=Date.now()+45000;

        while(Date.now()<end){
            spawnWord();
            await new Promise(r=>setTimeout(r,state.spawnRate));
        }

        document.querySelectorAll(".floating").forEach(e=>e.remove());

        gameMode="question";
        await triggerQuestion();

        await new Promise(r=>setTimeout(r,3000));
    }
}

updateHUD();
mainLoop();

</script>

</body>
</html>
