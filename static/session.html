<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN SESSION</title>

<style>
:root{
    --neon:#00f2ff;
    --bg:#000;
    --panel:rgba(0,15,30,0.9);
    --green:#00ff6a;
    --red:#ff2a2a;
    --yellow:#ffd000;
}

body{
    margin:0;
    background:var(--bg);
    font-family:Arial;
    color:var(--neon);
    overflow:hidden;
}

/* ===== APP ===== */
#app{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    position:relative;
}

/* ===== SEMÁFORO ===== */
#signal{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    opacity:0;
    transition:opacity 0.4s ease;
    z-index:0;
}

.signal-green{ background:var(--green); }
.signal-red{ background:var(--red); }

/* ===== BREATH ===== */
#circle{
    width:80px;
    height:80px;
    border-radius:50%;
    background:rgba(0,242,255,0.2);
    box-shadow:0 0 25px var(--neon);
    z-index:2;
}

/* ===== MESSAGE ===== */
#message{
    position:absolute;
    bottom:180px;
    width:85%;
    max-width:700px;
    background:var(--panel);
    border:1px solid var(--neon);
    padding:15px;
    text-align:center;
    min-height:110px;
    z-index:2;
}

/* ===== OPTIONS ===== */
#options{
    position:absolute;
    bottom:70px;
    width:85%;
    max-width:700px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    z-index:2;
}

button{
    padding:12px;
    border:1px solid var(--neon);
    background:transparent;
    color:var(--neon);
    cursor:pointer;
}

button:hover{
    background:var(--neon);
    color:#000;
}

/* ===== SILENCE ===== */
#silence{
    position:absolute;
    top:50px;
    font-size:12px;
    opacity:0.7;
}
</style>
</head>

<body>

<div id="app">

<div id="signal"></div>

<div id="silence">SILENCE: <span id="silenceLevel">20</span>s</div>

<div id="circle"></div>

<div id="message" onclick="start()">TOUCH TO START</div>

<div id="options"></div>

</div>

<script>

let session_id=null;
let lang="en";
let loading=false;
let breathTimer=null;

/* ================= SAFE AUDIO (NO LOOP) ================= */
function sound(type){
    const ctx = new AudioContext();
    const o = ctx.createOscillator();
    const g = ctx.createGain();

    o.connect(g);
    g.connect(ctx.destination);

    o.type="sine";

    if(type==="ok") o.frequency.value=440;
    if(type==="fail") o.frequency.value=180;
    if(type==="click") o.frequency.value=300;

    g.gain.value=0.08;

    o.start();
    o.stop(ctx.currentTime+0.15);
}

/* ================= START ================= */
async function start(){

    if(loading) return;
    loading=true;

    const res = await fetch("/start",{method:"POST"});
    const data = await res.json();

    session_id = data.session_id;

    render(data);

    loading=false;
}

/* ================= SEND ================= */
async function send(decision){

    if(loading) return;
    loading=true;

    sound("click");

    const res = await fetch("/judge",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({session_id, decision})
    });

    const data = await res.json();

    render(data);

    loading=false;
}

/* ================= SEMÁFORO ================= */
function signal(color){
    const s = document.getElementById("signal");

    if(color==="green"){
        s.className="signal-green";
        s.style.opacity=0.6;
    }

    if(color==="red"){
        s.className="signal-red";
        s.style.opacity=0.6;
    }

    setTimeout(()=>s.style.opacity=0,800);
}

/* ================= BREATH ================= */
function breathe(){
    const c=document.getElementById("circle");
    let up=true;

    clearInterval(breathTimer);

    breathTimer=setInterval(()=>{
        c.style.transform = up?"scale(1.8)":"scale(1)";
        up=!up;
    },2500);
}

function stopBreath(){
    clearInterval(breathTimer);
}

/* ================= RENDER ================= */
function render(data){

    if(!data || !data.story) return;

    const s = data.story;

    /* TEXT SAFE */
    const text =
        (s.text && (s.text.en || s.text.es)) || s.text || "..."

    document.getElementById("message").innerText = text;

    document.getElementById("options").innerHTML="";

    /* BREATH */
    if(s.type==="breathing"){
        breathe();
    } else {
        stopBreath();
    }

    /* SILENCE */
    if(s.type==="silence_challenge"){
        document.getElementById("silenceLevel").innerText =
            s.duration_sec || 20;
    }

    /* OPTIONS */
    let opts = s.options || [];

    if(opts.length===0){
        opts=[{code:"NEXT", text:{en:"CONTINUE",es:"CONTINUAR"}}];
    }

    opts.forEach(o=>{
        const b=document.createElement("button");
        b.innerText=o.text?.[lang]||"OK";
        b.onclick=()=>send(o.code);
        document.getElementById("options").appendChild(b);
    });

    /* ================= SEMÁFORO LOGIC ================= */
    if(data.correct===true){
        signal("green");
        sound("ok");
    }

    if(data.correct===false){
        signal("red");
        sound("fail");
    }
}

</script>

</body>
</html>
