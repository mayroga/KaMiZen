<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AL CIELO - 10 MIN DIAGNOSTIC</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-gold: #f1c40f;
            --neon-green: #2ecc71;
            --neon-purple: #9b59b6;
            --neon-red: #ff3131;
            --bg-dark: #020205;
        }
        body { margin: 0; overflow: hidden; background: var(--bg-dark); color: white; font-family: 'Orbitron', sans-serif; cursor: none; }
        
        #hud {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: space-evenly;
            z-index: 100; pointer-events: none;
        }
        .data-box {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--neon-blue);
            padding: 10px 15px; text-align: center;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            min-width: 100px;
            border-radius: 5px;
        }
        .label { font-size: 9px; color: var(--neon-blue); letter-spacing: 2px; font-weight: 900; display: block; }
        .value { font-size: 20px; font-weight: 900; display: block; color: #fff; }

        #timer-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 80%; height: 10px; background: #111; border: 1px solid var(--neon-blue);
        }
        #timer-bar { width: 100%; height: 100%; background: var(--neon-blue); transition: width 1s linear; }

        canvas { display: block; }

        #overlay {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; text-align: center;
        }
        .start-btn {
            padding: 20px 50px; background: var(--neon-blue); color: black;
            border: none; font-family: 'Orbitron'; font-weight: 900;
            cursor: pointer; margin-top: 30px; letter-spacing: 3px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="hud">
    <div class="data-box" style="border-color: var(--neon-gold);">
        <span class="label">CAPITAL</span>
        <span id="val-money" class="value">0</span>
    </div>
    <div class="data-box" style="border-color: var(--neon-green);">
        <span class="label">STABILITY</span>
        <span id="val-health" class="value">100%</span>
    </div>
    <div class="data-box" style="border-color: var(--neon-purple);">
        <span class="label">LEVEL</span>
        <span id="val-level" class="value">1</span>
    </div>
</div>

<div id="timer-container"><div id="timer-bar"></div></div>

<div id="overlay">
    <h1 style="color: var(--neon-blue); letter-spacing: 15px;">AL CIELO</h1>
    <p>10 MINUTES NEURAL DIAGNOSTIC SESSION</p>
    <button class="start-btn" onclick="initSystem()">START SESSION</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let audioCtx;

// CONFIGURACIÓN DE TIEMPO Y DIFICULTAD
const TOTAL_TIME = 600; // 10 minutos en segundos
let timeLeft = TOTAL_TIME;
let level = 1;
let spawnRate = 1000; 

const rawData = [
    { text: "SAVINGS", emoji: "💰", type: "pos", stat: "money", impact: 150, color: "#f1c40f", freq: 523 },
    { text: "BUSINESS", emoji: "🤝", type: "pos", stat: "money", impact: 200, color: "#3498db", freq: 659 },
    { text: "FAMILY", emoji: "🏠", type: "pos", stat: "health", impact: 20, color: "#2ecc71", freq: 783 },
    { text: "THREAT", emoji: "⚠️", type: "neg", stat: "health", impact: -30, color: "#ff3131", freq: 110 },
    { text: "EDUCATION", emoji: "📚", type: "pos", stat: "money", impact: 100, color: "#9b59b6", freq: 987 }
];

let stats = { money: 0, health: 100 };
let active = false;
let objects = [];
let particles = [];
const user = { x: 0, y: 0, size: 60 };

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function playSound(freq, type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type === 'pos' ? 'sine' : 'sawtooth';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}

function createExplosion(x, y, color) {
    for (let i = 0; i < 12; i++) {
        particles.push({ x, y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 1.0, color });
    }
}

function update() {
    if(!active) return;

    // Dificultad Progresiva cada 60 segundos
    level = Math.floor((TOTAL_TIME - timeLeft) / 60) + 1;
    document.getElementById('val-level').innerText = level;

    objects.forEach((obj, i) => {
        obj.y += (2 + level); // Aumenta velocidad según nivel
        const dist = Math.sqrt((obj.x - user.x)**2 + (obj.y - user.y)**2);
        
        if (dist < user.size) {
            playSound(obj.freq, obj.type);
            createExplosion(obj.x, obj.y, obj.color);
            if(obj.stat === 'money') stats.money += obj.impact;
            if(obj.stat === 'health') stats.health = Math.max(0, Math.min(100, stats.health + obj.impact));
            
            document.getElementById('val-money').innerText = stats.money;
            document.getElementById('val-health').innerText = stats.health + "%";
            objects.splice(i, 1);
            if(navigator.vibrate) navigator.vibrate(obj.type === 'pos' ? 20 : 100);
        }
        if(obj.y > canvas.height + 100) objects.splice(i, 1);
    });

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if(p.life <= 0) particles.splice(i, 1);
    });

    if(stats.health <= 0) finalize("STABILITY LOSS");
}

function draw() {
    ctx.fillStyle = 'rgba(2, 2, 5, 0.2)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Scanner
    ctx.strokeStyle = "#00f2ff";
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(user.x, user.y, user.size-10, 0, Math.PI*2); ctx.stroke();

    // Data Objects
    objects.forEach(obj => {
        ctx.fillStyle = obj.color;
        ctx.font = "40px Arial";
        ctx.textAlign = "center";
        ctx.fillText(obj.emoji, obj.x, obj.y);
        ctx.font = "bold 12px Orbitron";
        ctx.fillText(obj.text, obj.x, obj.y + 20);
    });

    // Particles
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 3, 3);
    });
    ctx.globalAlpha = 1.0;
}

function initSystem() {
    document.getElementById('overlay').style.display = 'none';
    active = true;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Timer de 10 minutos
    const timerInterval = setInterval(() => {
        timeLeft--;
        const percentage = (timeLeft / TOTAL_TIME) * 100;
        document.getElementById('timer-bar').style.width = percentage + "%";
        if(timeLeft <= 0) {
            clearInterval(timerInterval);
            finalize("SESSION COMPLETE");
        }
    }, 1000);

    // Spawn Dinámico
    const spawner = () => {
        if(!active) return;
        const entry = rawData[Math.floor(Math.random() * rawData.length)];
        objects.push({ ...entry, x: Math.random()*(canvas.width-100)+50, y: -50 });
        setTimeout(spawner, Math.max(300, 1000 - (level * 80))); // Spawn más rápido por nivel
    };
    spawner();
    loop();
}

function finalize(reason) {
    active = false;
    alert(`${reason}\nFinal Capital: ${stats.money}\nDiagnostic Ready.`);
    location.reload();
}

function loop() { if(active) { update(); draw(); } requestAnimationFrame(loop); }

window.addEventListener('mousemove', e => { user.x = e.clientX; user.y = e.clientY; });
window.addEventListener('touchmove', e => { user.x = e.touches[0].clientX; user.y = e.touches[0].clientY; });
</script>
</body>
</html>
