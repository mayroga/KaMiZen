<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAYKAMI NEUROGAME | Session</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --accent: #00d2ff;
            --text-main: #e0e0e0;
            --card-bg: rgba(25, 25, 30, 0.95);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, var(--bg-dark) 100%);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .brand { font-weight: 700; letter-spacing: 2px; color: var(--accent); }

        #main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 25px;
        }

        #display-text {
            font-size: 1.4rem;
            text-align: center;
            max-width: 600px;
            line-height: 1.6;
            min-height: 100px;
            font-weight: 300;
        }

        #decision-area {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .btn-option {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: white;
            padding: 18px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .btn-option:active {
            transform: scale(0.98);
            border-color: var(--accent);
            background: rgba(0, 210, 255, 0.1);
        }

        .control-bar {
            padding: 25px;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid var(--border);
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 0.9rem;
            opacity: 0.6;
            cursor: pointer;
        }

        .icon-btn.danger { color: #ff4b2b; opacity: 1; }

        /* Loader */
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="brand">MAYKAMI NEUROGAME</div>
    </header>

    <main id="main-stage">
        <div id="loading-view" class="hidden">
            <div class="loader"></div>
        </div>

        <div id="session-content">
            <p id="display-text">Initializing session...</p>
        </div>

        <div id="decision-area" class="hidden">
            <!-- Buttons dynamically injected here -->
        </div>
    </main>

    <nav class="control-bar">
        <button class="icon-btn" onclick="toggleAudio()">Mute/Unmute</button>
        <button class="icon-btn danger" onclick="clearSession()">Reset</button>
    </nav>

    <script>
        const state = {
            currentStep: 0,
            missionData: null,
            audioEnabled: true,
            synth: window.speechSynthesis
        };

        const UI = {
            text: document.getElementById('display-text'),
            decisions: document.getElementById('decision-area'),
            loading: document.getElementById('loading-view'),
            content: document.getElementById('session-content')
        };

        // Initialization
        async function startSession() {
            showLoading(true);
            try {
                // Simulación de carga de misión - Reemplazar con fetch real si es necesario
                state.missionData = [
                    {
                        tx: "Bienvenido a su asesoría estratégica. ¿Desea comenzar la optimización de procesos?",
                        options: [
                            { text: "Iniciar", next: 1 },
                            { text: "Revisar Protocolo", next: 0 }
                        ]
                    },
                    {
                        tx: "El primer paso requiere su total atención. Las soluciones deben ser directas.",
                        options: [
                            { text: "Entendido", next: 2 }
                        ]
                    }
                ];
                renderStep(0);
            } catch (err) {
                UI.text.innerText = "Error loading session. Please try again.";
            } finally {
                showLoading(false);
            }
        }

        function renderStep(index) {
            const step = state.missionData[index];
            if (!step) return;

            UI.decisions.classList.add('hidden');
            UI.text.innerText = step.tx;
            
            speak(step.tx);

            // Inyectar botones
            UI.decisions.innerHTML = '';
            step.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.innerText = opt.text;
                btn.onclick = () => renderStep(opt.next);
                UI.decisions.appendChild(btn);
            });

            setTimeout(() => {
                UI.decisions.classList.remove('hidden');
            }, 500);
        }

        function speak(text) {
            if (!state.audioEnabled) return;
            state.synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; // O 'es-ES' según prefieras
            utterance.rate = 1;
            state.synth.speak(utterance);
        }

        function toggleAudio() {
            state.audioEnabled = !state.audioEnabled;
            if (!state.audioEnabled) state.synth.cancel();
        }

        function clearSession() {
            if (confirm("¿Desea borrar los datos actuales?")) {
                location.reload();
            }
        }

        function showLoading(show) {
            UI.loading.classList.toggle('hidden', !show);
            UI.content.classList.toggle('hidden', show);
        }

        window.onload = startSession;
    </script>
</body>
</html>
