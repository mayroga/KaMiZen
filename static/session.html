<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AL CIELO: MATRIX TRAINING</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #00ff41; /* Verde más intenso */
            --neon-red: #ff003c;   /* Rojo más intenso */
            --neon-yellow: #ffff00;
            --matrix-bg: #00050a;
        }

        body {
            margin: 0;
            background: var(--matrix-bg);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        /* SCANLINE EFFECT */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* HEADER UI */
        #hud {
            position: fixed;
            top: 0; width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            z-index: 50;
        }

        #timer-box { 
            font-size: 2.5rem; 
            color: var(--neon-blue); 
            font-weight: bold; 
            text-shadow: 0 0 10px var(--neon-blue);
        }

        #score-box { 
            font-size: 1.8rem; 
            padding: 5px 15px; 
            border: 3px solid #fff; 
            box-shadow: 0 0 15px #fff;
        }
        
        #mastery-lvl {
            font-size: 1.5rem;
            text-shadow: 0 0 10px var(--neon-green);
        }
        
        /* SOCIAL MISSION PANEL */
        #social-panel {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: rgba(0, 20, 40, 0.95);
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
            padding: 20px;
            display: none;
            z-index: 400;
            text-align: center;
        }

        /* FLOATING WORDS */
        .floating {
            position: absolute;
            padding: 12px 24px;
            font-weight: 900;
            font-size: 1.4rem;
            border-radius: 8px;
            background: rgba(0,0,0,0.85);
            z-index: 10;
            animation: floatUp 6s linear forwards;
            transition: transform 0.1s;
        }

        /* COLORES MÁS FUERTES */
        .word-power { border: 3px solid var(--neon-green); color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
        .word-risk { border: 3px solid var(--neon-red); color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red); }
        .word-silence { border: 3px solid var(--neon-yellow); color: var(--neon-yellow); text-shadow: 0 0 10px var(--neon-yellow); }

        @keyframes floatUp {
            from { transform: translateY(110vh); opacity: 1; }
            to { transform: translateY(-20vh); opacity: 0; }
        }

        /* EXPLOSION EFFECT */
        .explode {
            animation: blast 0.4s ease-out forwards !important;
            pointer-events: none;
        }

        @keyframes blast {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(2.5); opacity: 0.5; filter: brightness(2); }
            100% { transform: scale(4); opacity: 0; }
        }

        /* BREATH SYSTEM */
        #breath-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 500;
        }
        #breath-circle {
            width: 200px; height: 200px;
            border: 8px solid var(--neon-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px var(--neon-blue);
            transition: all 3.5s ease-in-out;
        }

        #breath-label {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--neon-blue);
        }

        .panel {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #000; padding: 40px;
            border: 4px solid var(--neon-blue);
            box-shadow: 0 0 30px var(--neon-blue);
            display: flex; flex-direction: column; gap: 20px; z-index: 600;
        }

        button { 
            background: transparent; 
            color: var(--neon-blue); 
            border: 2px solid var(--neon-blue); 
            padding: 15px; 
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer; 
            transition: 0.3s;
        }
        button:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px var(--neon-blue);
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="timer-box">00:00</div>
        <div id="mastery-lvl" style="color: var(--neon-green);">MASTERY: x1</div>
        <div id="score-box">POINTS: 0</div>
    </div>

    <div id="main-menu" class="panel">
        <h1 style="color: var(--neon-blue); text-align: center;">KAMIZEN: AL CIELO</h1>
        <button onclick="startGame('en')">START TRAINING (EN)</button>
        <button onclick="startGame('es')">INICIAR ENTRENAMIENTO (ES)</button>
    </div>

    <div id="social-panel">
        <p id="social-text" style="font-size: 1.5rem; margin-bottom: 20px;"></p>
        <div id="social-options" style="display: flex; gap: 20px; justify-content: center;"></div>
    </div>

    <div id="breath-overlay">
        <h2 id="breath-title" style="color: var(--neon-blue); font-size: 2.5rem; margin-bottom: 30px;">SILENCE CHALLENGE</h2>
        <div id="breath-circle"><span id="breath-label">...</span></div>
        <p id="breath-desc" style="margin-top: 30px; font-size: 1.5rem; max-width: 80%; text-align: center; color: var(--neon-blue);"></p>
    </div>

    <audio id="snd-hit" src="/static/sounds/glass.mp3"></audio> <audio id="snd-error" src="/static/sounds/trumpet.mp3"></audio> <audio id="snd-click" src="/static/sounds/keypress.mp3"></audio>

    <script>
        let state = {
            score: 0, mastery: 1, lang: 'en',
            timeLeft: 300, phase: 'menu',
            silenceDuration: 20, 
            blocksCompleted: 0
        };

        const content = {
            en: {
                inhale: "INHALE", exhale: "EXHALE",
                missions: [
                    { q: "A friend is being teased. What do you do?", a: "Support him", b: "Stay quiet", win: "SOCIAL RESPECT +50", fail: "INTEGRITY LOSS -20" },
                    { q: "You lost a game. Your reaction?", a: "Congratulate them", b: "Throw a fit", win: "EMOTIONAL POWER +50", fail: "EGO TRAP -20" }
                ],
                words: {
                    power: ["WILL","VISION","HONOR","COURAGE","BUILD","RISE","FAITH","DISCIPLINE","STRENGTH","VICTORY"],
                    risk: ["NOISE","EXCUSE","QUITTING","EGO","HATE","CHAOS","LAZY","FEAR","LIE","ANGER"],
                    silence: ["CALM","LISTEN","WAIT","PEACE","PRAY","INSIDE","BREATHE","STILL","SOUL","FOCUS"]
                }
            },
            es: {
                inhale: "INHALA", exhale: "EXHALA",
                missions: [
                    { q: "¿Se burlan de un amigo. Qué haces?", a: "Apoyarlo", b: "Callar", win: "RESPETO SOCIAL +50", fail: "PERDIDA DE INTEGRIDAD -20" },
                    { q: "¿Perdiste un juego. Tu reacción?", a: "Felicitar", b: "Enojarte", win: "PODER EMOCIONAL +50", fail: "TRAMPA DEL EGO -20" }
                ],
                words: {
                    power: ["VOLUNTAD","VISIÓN","HONOR","VALOR","CONSTRUIR","CRECER","FE","DISCIPLINA","FUERZA","VICTORIA"],
                    risk: ["RUIDO","EXCUSA","RENDIRSE","EGO","ODIO","CAOS","PEREZA","MIEDO","MENTIRA","IRA"],
                    silence: ["CALMA","ESCUCHA","ESPERA","PAZ","ORAR","INTERIOR","RESPIRA","QUIETO","ALMA","ENFOQUE"]
                }
            }
        };

        function startGame(l) {
            state.lang = l;
            document.getElementById('main-menu').style.display = 'none';
            state.interval = setInterval(updateTimer, 1000);
            state.spawnInterval = setInterval(spawnWord, 1000); // Ligeramente más rápido
            setTimeout(triggerSocialMission, 10000);
        }

        function updateTimer() {
            state.timeLeft--;
            let m = Math.floor(state.timeLeft / 60).toString().padStart(2, '0');
            let s = (state.timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer-box').innerText = `${m}:${s}`;

            if (state.timeLeft % 45 === 0 && state.timeLeft > 0) triggerSilenceChallenge();
            if (state.timeLeft <= 0) endGame();
        }

        function spawnWord() {
            const categories = ['power', 'risk', 'silence'];
            const cat = categories[Math.floor(Math.random() * categories.length)];
            const list = content[state.lang].words[cat];
            const text = list[Math.floor(Math.random() * list.length)];
            
            const div = document.createElement('div');
            div.className = `floating word-${cat}`;
            div.innerText = text;
            div.style.left = Math.random() * 75 + 10 + "vw";
            
            div.onclick = () => {
                // EFECTO EXPLOSIÓN
                div.classList.add('explode');
                
                if (cat === 'power' || cat === 'silence') {
                    state.score += (15 * state.mastery);
                    document.getElementById('snd-hit').play(); // Sonido Cristal Roto
                } else if (cat === 'risk') {
                    state.score -= 30;
                    state.mastery = 1;
                    document.getElementById('snd-error').play(); // Sonido Pito Fallo
                }
                
                updateHUD();
                setTimeout(() => div.remove(), 4000);
            };

            document.body.appendChild(div);
            setTimeout(() => { if(div) div.remove(); }, 6000);
        }

        function triggerSocialMission() {
            if(state.timeLeft <= 10) return;
            const mission = content[state.lang].missions[Math.floor(Math.random() * content[state.lang].missions.length)];
            const panel = document.getElementById('social-panel');
            const opts = document.getElementById('social-options');
            
            document.getElementById('social-text').innerText = mission.q;
            opts.innerHTML = `
                <button onclick="resolveSocial(true, '${mission.win}')">${mission.a}</button>
                <button onclick="resolveSocial(false, '${mission.fail}')">${mission.b}</button>
            `;
            panel.style.display = 'block';
        }

        function resolveSocial(correct, msg) {
            if (correct) {
                state.score += 100;
                state.mastery++;
                document.getElementById('snd-hit').play();
            } else {
                state.score -= 50;
                document.getElementById('snd-error').play();
            }
            alert(msg);
            document.getElementById('social-panel').style.display = 'none';
            updateHUD();
        }

        function triggerSilenceChallenge() {
            clearInterval(state.spawnInterval);
            const overlay = document.getElementById('breath-overlay');
            const circle = document.getElementById('breath-circle');
            const label = document.getElementById('breath-label');
            
            overlay.style.display = 'flex';
            state.blocksCompleted++;
            
            // Lógica de progresión pedida
            if(state.blocksCompleted < 7) state.silenceDuration = 20 + (state.blocksCompleted * 8);
            else state.silenceDuration = 180; 

            document.getElementById('breath-desc').innerText = `RETO DE SILENCIO: ${state.silenceDuration}s\n"TU ADN SE FORTALECE EN LA CALMA"`;

            let elapsed = 0;
            label.innerText = content[state.lang].inhale;
            circle.style.transform = "scale(1.4)";

            const cycle = setInterval(() => {
                elapsed += 4;
                if (elapsed >= state.silenceDuration) {
                    clearInterval(cycle);
                    overlay.style.display = 'none';
                    state.spawnInterval = setInterval(spawnWord, 1000);
                    setTimeout(triggerSocialMission, 5000);
                    return;
                }
                
                if (label.innerText === content[state.lang].inhale) {
                    label.innerText = content[state.lang].exhale;
                    circle.style.transform = "scale(0.8)";
                } else {
                    label.innerText = content[state.lang].inhale;
                    circle.style.transform = "scale(1.4)";
                }
            }, 4000);
        }

        function updateHUD() {
            document.getElementById('score-box').innerText = `POINTS: ${state.score}`;
            document.getElementById('mastery-lvl').innerText = `MASTERY: x${state.mastery}`;
            
            // Feedback visual rápido en el score
            const sb = document.getElementById('score-box');
            sb.style.transform = "scale(1.1)";
            setTimeout(() => sb.style.transform = "scale(1)", 100);
        }

        function endGame() {
            clearInterval(state.interval);
            clearInterval(state.spawnInterval);
            alert("TRAINING COMPLETE\nFINAL SCORE: " + state.score);
            location.reload();
        }
    </script>
</body>
</html>
