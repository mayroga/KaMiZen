<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>KAMIZEN | SESSION PRO CLEAN</title>

<style>
:root{
  --bg:#000;
  --neon:#00f2ff;
  --good:#00ff88;
  --bad:#ff3b3b;
  --warn:#ffd000;
  --text:#eaeaea;
}

*{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* TOP BAR */
#topBar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
  gap:30px;
  z-index:1000;
}

.stat{
  text-align:center;
  font-size:14px;
}

.stat b{
  display:block;
  font-size:18px;
  color:var(--neon);
}

/* TIMER */
#timerBox{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:18px;
  color:var(--warn);
}

/* MAIN */
#container{
  position:absolute;
  top:120px;
  bottom:120px;
  left:0;
  right:0;
  padding:20px;
  overflow:auto;
}

.card{
  border:1px solid var(--neon);
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

/* OPTIONS */
.option{
  border:1px solid #333;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.option:hover{
  border-color:var(--neon);
}

/* BOTTOM CONTROLS */
#controls{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
  padding:15px;
  background:#050505;
  border-top:1px solid #111;
}

button{
  background:#111;
  color:var(--text);
  border:1px solid var(--neon);
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#0a0a0a;
}

#langBtn{
  border-color:var(--warn);
}
</style>
</head>

<body>

<!-- TOP STATS -->
<div id="topBar">
  <div class="stat">POINTS<b id="points">0</b></div>
  <div class="stat">FOCUS<b id="focus">0</b></div>
  <div class="stat">ENERGY<b id="energy">0</b></div>
</div>

<!-- TIMER -->
<div id="timerBox">--:--</div>

<!-- MAIN CONTENT -->
<div id="container">
  <div class="card" id="missionBox">Press START to begin</div>
</div>

<!-- CONTROLS -->
<div id="controls">
  <button id="startBtn">START</button>
  <button id="backBtn">BACK</button>
  <button id="continueBtn">CONTINUE</button>
  <button id="restartBtn">RESTART</button>
  <button id="langBtn">EN</button>
</div>

<script src="engine.js"></script>

<script>
/* SAFE UI BRIDGE ONLY (NO GAME LOGIC HERE) */

function updateUI(state){
  if(!state) return;

  document.getElementById("points").innerText = state.points ?? 0;
  document.getElementById("focus").innerText = state.focus ?? 0;
  document.getElementById("energy").innerText = state.energy ?? 0;

  const box = document.getElementById("missionBox");
  if(state.html) box.innerHTML = state.html;

  if(state.timerText){
    document.getElementById("timerBox").innerText = state.timerText;
  }
}

/* BUTTON HOOKS -> ENGINE ONLY */
document.getElementById("startBtn").onclick = () => window.Engine?.start();
document.getElementById("backBtn").onclick = () => window.Engine?.back();
document.getElementById("continueBtn").onclick = () => window.Engine?.next();
document.getElementById("restartBtn").onclick = () => window.Engine?.restart();
document.getElementById("langBtn").onclick = () => window.Engine?.toggleLang();

/* ENGINE PUSHES STATE HERE */
window.updateSessionUI = updateUI;
</script>

</body>
</html>
