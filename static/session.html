<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KAMIZEN | NEURAL OVERDRIVE</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #020205;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }

        body {
            background: var(--bg-dark);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            perspective: 1000px;
        }

        /* --- NEURAL ENGINE CANVAS --- */
        #game-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* --- GAMIFIED UI --- */
        #hud {
            position: absolute;
            top: 20px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            z-index: 100;
            pointer-events: none;
        }

        .hud-item {
            background: var(--glass);
            padding: 10px 20px;
            border-left: 4px solid var(--neon-blue);
            backdrop-filter: blur(10px);
            font-size: 14px;
            letter-spacing: 2px;
        }

        /* --- BREATHING SINGULARITY --- */
        #breathing-portal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; height: 250px;
            border-radius: 50%;
            border: 1px solid var(--neon-blue);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 0 100px rgba(0, 242, 255, 0.1);
        }

        .inhale-glow {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, var(--neon-blue) 0%, transparent 70%);
            opacity: 0.2;
        }

        /* --- ADDICTIVE FLOATING NODES --- */
        .node {
            position: absolute;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            font-weight: 900;
            border-radius: 5px;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 0 15px var(--neon-blue);
            transition: transform 0.1s;
            text-transform: uppercase;
            z-index: 500;
        }

        .node:active { transform: scale(0.8); }

        /* --- SCREEN SHAKE EFFECT --- */
        .shake { animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* --- NARRATIVE BOX --- */
        #narrator-box {
            position: absolute;
            bottom: 15%;
            width: 80%;
            text-align: center;
            z-index: 100;
        }

        #text-display {
            font-size: 24px;
            text-shadow: 0 0 15px var(--neon-blue);
            margin-bottom: 20px;
        }

        .btn-kamizen {
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-kamizen:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        #choice-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body class="">

    <canvas id="game-canvas"></canvas>

    <div id="hud">
        <div class="hud-item" id="block-id">BLOCK: 01</div>
        <div class="hud-item" id="neural-score">NEURAL LOAD: 0%</div>
    </div>

    <div id="breathing-portal">
        <div class="inhale-glow" id="glow"></div>
        <h2 id="breath-label" style="z-index:10; letter-spacing: 4px;">INHALE</h2>
    </div>

    <div id="narrator-box">
        <div id="text-display">INITIATING KAMIZEN PROTOCOL...</div>
        <div id="choice-grid" style="display:none;"></div>
        <button id="btn-action" class="btn-kamizen" onclick="Core.next()">INITIALIZE SYSTEM</button>
    </div>

    <!-- AUDIO SYSTEM -->
    <audio id="bg-music" loop src="https://assets.mixkit.co/music/preview/mixkit-techno-vibe-147.mp3"></audio>
    <audio id="sfx-shatter" src="https://www.soundjay.com/misc/sounds/glass-break-1.mp3"></audio>
    <audio id="sfx-powerup" src="https://www.soundjay.com/button/sounds/button-09.mp3"></audio>

    <script>
        const Core = (() => {
            let state = {
                block: 1,
                data: null,
                score: 0,
                phase: 'boot',
                totalSilence: 180, // Total 3 min restates
                isExploding: false
            };

            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];

            // --- PARTICLE SYSTEM ---
            class Particle {
                constructor(x, y, color) {
                    this.x = x; this.y = y;
                    this.size = Math.random() * 4 + 2;
                    this.speedX = (Math.random() - 0.5) * 10;
                    this.speedY = (Math.random() - 0.5) * 10;
                    this.color = color;
                    this.alpha = 1;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    this.alpha -= 0.02;
                }
                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            const animateParticles = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles = particles.filter(p => p.alpha > 0);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animateParticles);
            };

            const resize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };

            // --- CORE LOGIC ---
            const init = async () => {
                resize();
                animateParticles();
                window.addEventListener('resize', resize);
                
                // Fetch Data
                const res = await fetch('/api/session/start');
                state.data = await res.json();
                state.block = state.data.index;
                document.getElementById('block-id').innerText = `BLOCK: ${state.block.toString().padStart(2, '0')}`;
                
                document.getElementById('bg-music').play();
                startIntro();
            };

            const speak = (txt, cb) => {
                const synth = window.speechSynthesis;
                const utterance = new SpeechSynthesisUtterance(txt);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                utterance.onend = cb;
                synth.speak(utterance);
            };

            const startIntro = () => {
                const intro = state.data.story.en;
                document.getElementById('text-display').innerText = intro;
                document.getElementById('btn-action').style.display = 'none';
                speak(intro, () => {
                    document.getElementById('btn-action').style.display = 'inline-block';
                    document.getElementById('btn-action').innerText = "ENTER NEURAL CYCLE";
                    state.phase = 'game-start';
                });
            };

            const spawnWord = () => {
                if(state.phase !== 'playing') return;
                
                const words = ["AWARENESS", "SAFETY", "TRUTH", "CALM", "ACTION", "FOCUS"];
                const word = words[Math.floor(Math.random()*words.length)];
                const node = document.createElement('div');
                node.className = 'node';
                node.innerText = word;
                node.style.left = Math.random() * 70 + 15 + "%";
                node.style.top = "100%";
                
                node.onclick = (e) => {
                    // Feedback Visual y Sonoro
                    document.body.classList.add('shake');
                    setTimeout(() => document.body.classList.remove('shake'), 200);
                    
                    document.getElementById('sfx-shatter').currentTime = 0;
                    document.getElementById('sfx-shatter').play();
                    
                    for(let i=0; i<20; i++) particles.push(new Particle(e.clientX, e.clientY, '#00f2ff'));
                    
                    state.score += 5;
                    document.getElementById('neural-score').innerText = `NEURAL LOAD: ${state.score}%`;
                    node.remove();
                };

                document.body.appendChild(node);
                
                let pos = 100;
                const move = setInterval(() => {
                    pos -= 0.5;
                    node.style.top = pos + "%";
                    if(pos < -10) { clearInterval(move); node.remove(); }
                }, 10);
            };

            const startCycle = () => {
                state.phase = 'playing';
                document.getElementById('btn-action').style.display = 'none';
                document.getElementById('text-display').innerText = "COLLECT NEURAL NODES";
                
                let gameTime = 30;
                const gameLoop = setInterval(() => {
                    gameTime--;
                    if(gameTime % 2 === 0) spawnWord();
                    if(gameTime <= 0) {
                        clearInterval(gameLoop);
                        startMission();
                    }
                }, 1000);
            };

            const startMission = () => {
                state.phase = 'mission';
                const mission = state.data.missions[0];
                let stepIdx = 0;

                const runStep = () => {
                    const step = mission.b[stepIdx];
                    if(!step) { startSilence(); return; }

                    if(step.t === 'v' || step.t === 'h' || step.story) {
                        const txt = step.tx ? step.tx.en : step.story.en;
                        document.getElementById('text-display').innerText = txt;
                        speak(txt, () => {
                            setTimeout(() => { stepIdx++; runStep(); }, 1500);
                        });
                    } else if(step.t === 'd') {
                        renderChoice(step, () => { stepIdx++; runStep(); });
                    } else {
                        stepIdx++; runStep();
                    }
                };
                runStep();
            };

            const renderChoice = (step, cb) => {
                const grid = document.getElementById('choice-grid');
                grid.style.display = 'grid';
                document.getElementById('text-display').innerText = step.q.en;
                speak(step.q.en);

                grid.innerHTML = '';
                step.op.forEach((opt, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-kamizen';
                    btn.innerText = opt.split(' / ')[0];
                    btn.onclick = () => {
                        grid.style.display = 'none';
                        const feedback = step.ex[i].split(' / ')[0];
                        document.getElementById('text-display').innerText = feedback;
                        speak(feedback, cb);
                    };
                    grid.appendChild(btn);
                });
            };

            const startSilence = () => {
                state.phase = 'silence';
                const portal = document.getElementById('breathing-portal');
                const label = document.getElementById('breath-label');
                const glow = document.getElementById('glow');
                
                portal.style.display = 'flex';
                document.getElementById('text-display').innerText = "SILENCE PROTOCOL: REPROGRAMMING NERVOUS SYSTEM";
                speak("Silence protocol initiated. Reprogramming nervous system for maximum stability.");

                let totalTime = state.block === 1 ? 60 : Math.floor(180/34)*2;
                
                const breathCycle = setInterval(() => {
                    // INHALE
                    label.innerText = "INHALE";
                    glow.style.transform = "scale(1.5)";
                    glow.style.transition = "transform 4s ease-in-out";
                    
                    setTimeout(() => {
                        label.innerText = "EXHALE";
                        glow.style.transform = "scale(0.8)";
                    }, 4000);

                    totalTime -= 8;
                    if(totalTime <= 0) {
                        clearInterval(breathCycle);
                        portal.style.display = 'none';
                        finalize();
                    }
                }, 8000);
            };

            const finalize = () => {
                document.getElementById('text-display').innerText = "SESSION COMPLETE. NEURAL SYNC ACHIEVED.";
                speak("Session complete. Neural synchronization achieved. System locking until next cycle.");
                document.getElementById('btn-action').style.display = 'inline-block';
                document.getElementById('btn-action').innerText = "LOCK & RESTART";
                document.getElementById('btn-action').onclick = () => location.reload();
            };

            return {
                next: () => {
                    if(state.phase === 'boot') init();
                    if(state.phase === 'game-start') startCycle();
                }
            };
        })();
    </script>
</body>
</html>
