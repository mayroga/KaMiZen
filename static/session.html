<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KAMIZEN | LIFE SIMULATOR</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-gold: #ffcc00;
            --neon-red: #ff3131;
            --bg-dark: #020205;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }

        body {
            background: var(--bg-dark);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ESCENARIO: EL CAMINO DE LA VIDA */
        #life-path {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #050a1a 0%, #000 100%);
            z-index: 0;
            perspective: 600px;
        }

        #road {
            position: absolute;
            bottom: 0; left: 50%;
            width: 200%; height: 80%;
            background: repeating-linear-gradient(0deg, rgba(0, 242, 255, 0.05) 0px, rgba(0, 242, 255, 0.05) 2px, transparent 2px, transparent 50px);
            transform: translateX(-50%) rotateX(60deg);
            z-index: 1;
        }

        /* AVATAR */
        #avatar-container {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
        }

        #avatar-sprite {
            width: 60px; height: 100px;
            background: var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
            border-radius: 5px;
            margin-bottom: 10px;
            animation: breathe-sprite 2s infinite ease-in-out;
        }

        #avatar-name {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue);
        }

        @keyframes breathe-sprite {
            0%, 100% { transform: scaleY(1); opacity: 0.8; }
            50% { transform: scaleY(1.05); opacity: 1; }
        }

        /* OBJETOS DE VIDA (LIFE NODES) */
        .life-node {
            position: absolute;
            padding: 10px 20px;
            border: 1px solid #fff;
            font-weight: 900;
            cursor: pointer;
            z-index: 5;
            text-transform: uppercase;
            transition: transform 0.1s;
        }

        .opportunity { border-color: var(--neon-blue); color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }
        .obstacle { border-color: var(--neon-red); color: var(--neon-red); box-shadow: 0 0 15px var(--neon-red); }
        .distraction { border-color: var(--neon-gold); color: var(--neon-gold); box-shadow: 0 0 15px var(--neon-gold); }

        /* UI OVERLAY */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background: rgba(0,0,0,0.8);
        }

        .input-kamizen {
            background: transparent;
            border: 2px solid var(--neon-blue);
            padding: 15px;
            color: #fff;
            font-size: 20px;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
        }

        .btn-action {
            background: var(--neon-blue);
            color: #000;
            padding: 15px 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        #stats {
            position: absolute;
            top: 20px; left: 20px;
            z-index: 200;
            display: none;
        }

        .stat-item { margin-bottom: 5px; font-size: 12px; color: var(--neon-blue); }

        @keyframes travel {
            from { transform: translate(-50%, -100%) scale(0.1); opacity: 0; }
            to { transform: translate(-50%, 400px) scale(2); opacity: 1; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="life-path">
        <div id="road"></div>
    </div>

    <!-- HUD -->
    <div id="stats">
        <div class="stat-item">BLOCK: <span id="stat-block">01</span></div>
        <div class="stat-item">FORTUNE: <span id="stat-money">0</span></div>
        <div class="stat-item">PRESSURE: <span id="stat-pressure">0</span></div>
    </div>

    <!-- AVATAR EN EL CAMINO -->
    <div id="avatar-container" style="display:none;">
        <div id="avatar-sprite"></div>
        <div id="avatar-name">PLAYER</div>
    </div>

    <!-- BOOT OVERLAY (REGISTRO DE NOMBRE) -->
    <div id="overlay">
        <h2 style="margin-bottom:20px; letter-spacing:5px;">IDENTITY SCAN</h2>
        <input type="text" id="user-name" class="input-kamizen" placeholder="ENTER YOUR NAME" maxlength="12">
        <button class="btn-action" onclick="Game.boot()">INITIALIZE AVATAR</button>
    </div>

    <!-- NARRATIVA Y RESPIRACIÓN (FLOTANTE) -->
    <div id="narrative-layer" style="position:fixed; top:20%; width:80%; text-align:center; z-index:300; pointer-events:none;">
        <h1 id="text-display" style="font-size:24px; text-shadow: 0 0 10px var(--neon-blue);"></h1>
    </div>

    <!-- AUDIOS -->
    <audio id="bg-music" loop src="https://assets.mixkit.co/music/preview/mixkit-techno-vibe-147.mp3"></audio>
    <audio id="sfx-hit" src="https://www.soundjay.com/button/sounds/button-09.mp3"></audio>

    <script>
        const Game = (() => {
            let state = {
                name: "",
                money: 0,
                pressure: 0,
                block: 1,
                phase: 'init',
                sessionData: null
            };

            const LIFE_ELEMENTS = [
                { t: "MONEY", c: "opportunity", m: 100, p: 0 },
                { t: "BUSINESS", c: "opportunity", m: 500, p: 10 },
                { t: "PRESSURE", c: "obstacle", m: 0, p: 20 },
                { t: "LIE", c: "obstacle", m: -200, p: 5 },
                { t: "PHONE", c: "distraction", m: 0, p: 5 },
                { t: "DIVERSION", c: "distraction", m: -50, p: -10 },
                { t: "STRENGTH", c: "opportunity", m: 0, p: -20 }
            ];

            const boot = async () => {
                const nameInput = document.getElementById('user-name').value;
                if(!nameInput) return alert("NAME REQUIRED");
               
                state.name = nameInput;
                document.getElementById('avatar-name').innerText = state.name;
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('avatar-container').style.display = 'block';
                document.getElementById('stats').style.display = 'block';
                document.getElementById('bg-music').play();

                // Cargar datos del servidor
                const res = await fetch('/api/session/start');
                state.sessionData = await res.json();
                state.block = state.sessionData.index;
                document.getElementById('stat-block').innerText = state.block.toString().padStart(2, '0');

                startJourney();
            };

            const speak = (txt, cb) => {
                const ut = new SpeechSynthesisUtterance(txt);
                ut.lang = 'en-US';
                ut.rate = 0.9;
                ut.onend = cb;
                window.speechSynthesis.speak(ut);
            };

            const startJourney = () => {
                const story = state.sessionData.story.en;
                document.getElementById('text-display').innerText = story;
                speak(story, () => {
                    setTimeout(startLifeCycle, 2000);
                });
            };

            const startLifeCycle = () => {
                document.getElementById('text-display').innerText = "THE PATH IS OPEN. CHOOSE WISELY.";
               
                let count = 0;
                const cycle = setInterval(() => {
                    spawnLifeNode();
                    count++;
                    if(count > 15) {
                        clearInterval(cycle);
                        setTimeout(startMission, 5000);
                    }
                }, 1500);
            };

            const spawnLifeNode = () => {
                const el = LIFE_ELEMENTS[Math.floor(Math.random()*LIFE_ELEMENTS.length)];
                const node = document.createElement('div');
                node.className = `life-node ${el.c}`;
                node.innerText = el.t;
                node.style.left = "50%";
                node.style.animation = "travel 3s linear forwards";
               
                node.onclick = () => {
                    state.money += el.m;
                    state.pressure += el.p;
                    updateHUD();
                    document.getElementById('sfx-hit').play();
                    node.remove();
                };

                document.getElementById('life-path').appendChild(node);
                setTimeout(() => node.remove(), 3000);
            };

            const updateHUD = () => {
                document.getElementById('stat-money').innerText = state.money;
                document.getElementById('stat-pressure').innerText = state.pressure;
            };

            const startMission = () => {
                // Aquí se integra la lógica de la misión (Mismo sistema de preguntas previo)
                // Al final de la misión, se dispara la respiración automática:
                document.getElementById('text-display').innerText = "CONSEQUENCE ANALYSIS COMPLETE. BREATHE.";
                triggerBreathing();
            };

            const triggerBreathing = () => {
                // Lógica de círculo de respiración ya definida anteriormente
                // ...
                // Al final, reload para el siguiente bloque
                setTimeout(() => location.reload(), 15000);
            };

            return { boot };
        })();
    </script>
</body>
</html>
