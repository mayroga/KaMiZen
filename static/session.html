<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAMIZEN | SESSION PRO</title>

<style>
:root{
    --neon:#00f2ff;
    --bg:#000;
    --panel:rgba(0,15,30,0.92);
}

body{
    margin:0;
    background:var(--bg);
    font-family:Arial;
    color:var(--neon);
    overflow:hidden;
}

#app{
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    position:relative;
}

/* ===== BREATH ===== */
#circle{
    width:70px;
    height:70px;
    border-radius:50%;
    background:rgba(0,242,255,0.25);
    box-shadow:0 0 30px var(--neon);
    transition:transform 2.5s ease-in-out, opacity 1s ease;
}

/* ===== TEXT ===== */
#message{
    position:absolute;
    bottom:180px;
    width:85%;
    max-width:700px;
    padding:15px;
    background:var(--panel);
    border:1px solid var(--neon);
    text-align:center;
    min-height:120px;
}

/* ===== OPTIONS ===== */
#options{
    position:absolute;
    bottom:70px;
    width:85%;
    max-width:700px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

button{
    padding:12px;
    background:transparent;
    border:1px solid var(--neon);
    color:var(--neon);
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:var(--neon);
    color:#000;
}

/* ===== TOP CONTROLS ===== */
#controls{
    position:absolute;
    top:10px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 10px;
}

.ctrl-btn{
    font-size:12px;
    padding:6px 10px;
}

/* SILENCE */
#silence{
    position:absolute;
    top:50px;
    font-size:12px;
    opacity:0.7;
}
</style>
</head>

<body>

<div id="app">

    <div id="controls">
        <button class="ctrl-btn" onclick="restart()">REINICIAR</button>
        <button class="ctrl-btn" onclick="back()">ATRÁS</button>
        <button class="ctrl-btn" onclick="skip()">SALTAR</button>
    </div>

    <div id="silence">SILENCIO: <span id="silenceLevel">20</span>s</div>

    <div id="circle"></div>

    <div id="message" onclick="start()">TOCA PARA INICIAR</div>

    <div id="options"></div>

</div>

<script>

/* ================= STATE ================= */
let session_id = null;
let history = [];
let lang = "es";
let loading = false;

/* ================= AUDIO ================= */
const audio = new (window.AudioContext || window.webkitAudioContext)();

/* MUSIC LOOP */
let musicOsc;

function startMusic(){
    musicOsc = audio.createOscillator();
    const gain = audio.createGain();

    musicOsc.type = "sine";
    musicOsc.frequency.value = 220;

    gain.gain.value = 0.03;

    musicOsc.connect(gain);
    gain.connect(audio.destination);

    musicOsc.start();
}

/* SOUND */
function sound(type){
    const o = audio.createOscillator();
    const g = audio.createGain();

    o.connect(g);
    g.connect(audio.destination);

    if(type==="ok") o.frequency.value=520;
    if(type==="fail") o.frequency.value=120;
    if(type==="click") o.frequency.value=300;

    o.type="sine";
    g.gain.value=0.15;

    o.start();
    o.stop(audio.currentTime+0.2);
}

/* ================= START ================= */
async function start(){

    if(audio.state==="suspended") await audio.resume();

    startMusic();

    const res = await fetch("/start",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({profile:{lang}})
    });

    const data = await res.json();

    session_id = data.session_id;
    history = [];

    render(data);
}

/* ================= SEND ================= */
async function send(code){

    if(loading) return;
    loading = true;

    sound("click");

    const res = await fetch("/judge",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            session_id,
            decision:code
        })
    });

    const data = await res.json();

    history.push(data);

    render(data);

    loading = false;
}

/* ================= RENDER ================= */
function render(data){

    if(!data || !data.story) return;

    const s = data.story;

    document.getElementById("message").innerText =
        s.text_es || s.text_en || "...";

    document.getElementById("options").innerHTML = "";

    /* BREATH FIX */
    if(s.type==="breathing"){
        breathe();
    } else {
        stopBreath();
    }

    /* SILENCE */
    if(s.type==="silence_challenge"){
        document.getElementById("silenceLevel").innerText =
            s.duration_sec || 20;
    }

    let opts = s.options || [];

    if(opts.length===0 && s.type!=="silence_challenge"){
        opts=[{code:"TDB",text:{es:"CONTINUAR",en:"CONTINUE"}}];
    }

    opts.forEach(o=>{
        const b=document.createElement("button");
        b.innerText=o.text?.[lang]||"OK";
        b.onclick=()=>send(o.code);
        document.getElementById("options").appendChild(b);
    });

    sound("ok");
}

/* ================= BREATH ================= */
let breathInterval;

function breathe(){
    const c=document.getElementById("circle");
    let grow=true;

    clearInterval(breathInterval);

    breathInterval=setInterval(()=>{
        c.style.transform = grow?"scale(2)":"scale(1)";
        c.style.opacity = grow?0.8:0.4;
        grow=!grow;
    },2500);
}

function stopBreath(){
    clearInterval(breathInterval);
}

/* ================= CONTROLS ================= */
function skip(){
    sound("click");
    send("TDB");
}

function back(){
    if(history.length<2) return;
    sound("click");
    const prev = history[history.length-2];
    render(prev);
    history.pop();
}

function restart(){
    sound("fail");
    location.reload();
}

/* SAFE LOOP */
setInterval(()=>{
    const c=document.getElementById("circle");
    c.style.opacity = 0.4 + Math.random()*0.4;
},3000);

</script>

</body>
</html>
