<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMIZEN | AL CIELO PRO</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #001a33, #000);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            overflow: hidden;
            cursor: crosshair;
            transition: background 0.5s;
        }
        #topbar {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px; /* 🔥 MÁS ESPACIO */
            z-index: 100;
            background: rgba(0,0,0,0.3);
        }
        #score-display {
            font-size: 1.4rem;
            font-weight: bold;
            color: #00f2ff;
            padding: 10px 20px;
            border-radius: 12px;
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 15px #00f2ff;
            letter-spacing: 1px;
            margin-right: 10px; /* 🔥 separación del borde */
        }
        #game {
            padding-top: 100px;
            position: relative;
            z-index: 10;
        }
        #top-ui {
            display: flex;
            justify-content: space-around;
            font-weight: bold;
            font-size: 1.2rem;
            color: #00f2ff;
        }
        button {
            padding: 15px 25px;
            margin: 10px;
            font-size: 18px;
            border: 2px solid #00f2ff;
            background: rgba(0, 242, 255, 0.1);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #00f2ff;
            color: #000;
            box-shadow: 0 0 20px #00f2ff;
        }
        .opt-btn {
            display: block;
            width: 80%;
            max-width: 500px;
            margin: 10px auto;
            text-align: left;
        }
        #breath {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, #00f2ff, #0066ff);
            margin: 20px auto;
            transition: transform 4s ease-in-out;
            box-shadow: 0 0 30px #00f2ff;
            display: none;
        }
        .floating {
            position: absolute;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            z-index: 50;
            animation: floatUp 5s linear forwards;
        }
        .word-good {
            color: #00ff00;
            border: 2px solid #00ff00;
            box-shadow: 0 0 15px #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }
        .word-bad {
            color: #ff0000;
            border: 2px solid #ff0000;
            box-shadow: 0 0 15px #ff0000;
            text-shadow: 0 0 10px #ff0000;
        }
        .word-neutral {
            color: #ffff00;
            border: 2px solid #ffff00;
            text-shadow: 0 0 10px #ffff00;
        }
        @keyframes floatUp {
            from { transform: translateY(110vh) rotate(0deg); }
            to { transform: translateY(-20vh) rotate(20deg); }
        }
        .blast {
            animation: burst 0.4s forwards;
            pointer-events: none;
        }
        @keyframes burst {
            to { transform: scale(4); opacity: 0; }
        }
        #explanation-box {
            background: rgba(0,0,0,0.8);
            border-left: 5px solid #00f2ff;
            padding: 20px;
            margin: 20px auto;
            width: 80%;
            display: none;
            font-size: 1.2rem;
            border-radius: 0 15px 15px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #story {
            font-size: 1.5rem;
            margin: 20px;
            font-weight: bold;
        }
        #analysis {
            color: #00f2ff;
            font-style: italic;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div id="topbar">
    <button onclick="toggleLang()">EN / ES</button>
    <div id="score-display">POINTS: 0</div>
</div>
<div id="game">
    <div id="top-ui">
        <div id="stat-focus">FOCUS: 100%</div>
        <div id="stat-life">ENERGY: ⚡⚡⚡</div>
    </div>
    <h2 id="hero-name"></h2>
    <div id="breath"></div>
    <div id="story"></div>
    <div id="analysis"></div>
    <div id="explanation-box"></div>
    <div id="options"></div>
</div>
<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="ok" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>
<script>
/* TODO TU JS EXACTO SIN CAMBIOS */
</script>
</body>
</html>
