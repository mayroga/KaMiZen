<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAMIZEN SESSION FINAL</title>

<style>
:root{
--neon-blue:#00f2ff;
--neon-red:#ff3131;
--neon-green:#2ecc71;
--neon-gold:#f1c40f;
--bg:#000;
}
body{margin:0;background:#000;color:white;font-family:Orbitron;overflow:hidden;}

.full{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:black;z-index:2000;text-align:center;}

.btn{padding:20px 40px;background:var(--neon-blue);border:none;font-weight:900;cursor:pointer;margin:10px;}

.opt{width:80%;max-width:500px;margin:5px;}
.correct{background:var(--neon-green);}
.wrong{background:var(--neon-red);}

#hud{position:absolute;top:10px;width:100%;display:flex;justify-content:space-around;z-index:100;}
.box{background:black;border:2px solid var(--neon-blue);padding:10px;}

#breath{width:250px;height:250px;border-radius:50%;border:8px solid var(--neon-blue);display:flex;justify-content:center;align-items:center;font-size:2rem;}

</style>
</head>

<body>

<div id="overlay" class="full">
<h1>KAMIZEN</h1>
<button class="btn" onclick="start()">START</button>
</div>

<div id="storyBox" class="full" style="display:none;">
<h2 id="storyText"></h2>
<button class="btn" onclick="nextStory()">CONTINUE</button>
</div>

<div id="missionBox" class="full" style="display:none;">
<h2 id="q"></h2>
<div id="opts"></div>
<div id="exp"></div>
<button class="btn" onclick="endMission()">CONTINUE</button>
</div>

<div id="breathBox" class="full" style="display:none;">
<div id="breath"><span id="btext">INHALA</span></div>
</div>

<div id="hud">
<div class="box">$<span id="money">0</span></div>
<div class="box"><span id="health">100</span>%</div>
<div class="box">LVL <span id="lvl">1</span></div>
</div>

<canvas id="c"></canvas>

<script>
const c=document.getElementById("c");
const x=c.getContext("2d");

let state="idle";
let data=null;

let stats={money:0,health:100,lvl:0};
let objects=[];
let active=false;

let user={x:0,y:0,size:50};

function resize(){c.width=innerWidth;c.height=innerHeight;}
resize();addEventListener("resize",resize);

function spawn(){
if(!active)return;
objects.push({
x:Math.random()*c.width,
y:-50,
speed:2+Math.random()*2+(stats.lvl*0.5),
text:Math.random()>0.5?"GOOD":"BAD",
type:Math.random()>0.5?"pos":"neg"
});
}

function update(){
if(!active)return;
objects.forEach((o,i)=>{
o.y+=o.speed;
let d=Math.hypot(o.x-user.x,o.y-user.y);
if(d<user.size){
if(o.type==="pos"){stats.money+=100;}
else{stats.health-=10;}
objects.splice(i,1);
}
});
updateHUD();
}

function draw(){
x.fillStyle="rgba(0,0,0,0.3)";
x.fillRect(0,0,c.width,c.height);

objects.forEach(o=>{
x.fillStyle=o.type==="pos"?"#2ecc71":"#ff3131";
x.fillText(o.text,o.x,o.y);
});
}

function loop(){
update();draw();
requestAnimationFrame(loop);
}

function updateHUD(){
money.innerText=stats.money;
health.innerText=stats.health;
lvl.innerText=stats.lvl+1;
}

async function fetchSession(){
let r=await fetch("/api/session/start");
data=await r.json();
}

async function runStory(){
state="story";
storyBox.style.display="flex";
let text=data.story.en;
storyText.innerText="";

let i=0;
let t=setInterval(()=>{
storyText.innerText+=text[i++];
if(i>=text.length)clearInterval(t);
},25);

speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

function nextStory(){
speechSynthesis.cancel();
storyBox.style.display="none";
runGame1();
}

function runGame1(){
state="game";
stats.lvl=0;
active=true;
setTimeout(()=>{
active=false;
objects=[];
runMission();
},300000); // 5 min real
}

function runMission(){
state="mission";
missionBox.style.display="flex";

let m=data.missions[0].b.find(b=>b.t==="d");

q.innerText=m.q.en;
opts.innerHTML="";
exp.innerText="";

m.op.forEach((o,i)=>{
let b=document.createElement("button");
b.className="btn opt";
b.innerText=o;
b.onclick=()=>{
let ok=i===m.c;
b.classList.add(ok?"correct":"wrong");

exp.innerText=m.expl?.en || (ok?"Correct decision":"Wrong decision");

if(ok){stats.money+=500;}
else{stats.health-=15;}
};
opts.appendChild(b);
});
}

function endMission(){
missionBox.style.display="none";
runGame2();
}

function runGame2(){
stats.lvl=2;
active=true;
setTimeout(()=>{
active=false;
runBreath();
},300000);
}

function runBreath(){
breathBox.style.display="flex";
let i=0;
let int=setInterval(()=>{
btext.innerText=i%2===0?"INHALA":"EXHALA";
breath.style.transform=i%2===0?"scale(1.5)":"scale(1)";
i++;
if(i>6){
clearInterval(int);
breathBox.style.display="none";
startLoop();
}
},2000);
}

async function startLoop(){
await fetchSession();
await runStory();
}

async function start(){
overlay.style.display="none";
loop();
setInterval(spawn,1200);
startLoop();
}

addEventListener("mousemove",e=>{user.x=e.clientX;user.y=e.clientY;});
</script>

</body>
</html>
