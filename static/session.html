<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AL CIELO - NEURAL SURVIVAL</title>
    <style>
        :root {
            --neon-blue: #00f2ff; --neon-gold: #f1c40f; --neon-green: #2ecc71;
            --neon-purple: #9b59b6; --neon-red: #ff3131; --bg-dark: #020205;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        
        /* HUD - Responsivo y Claro */
        #hud {
            position: absolute; top: env(safe-area-inset-top, 20px); width: 100%;
            display: flex; justify-content: space-evenly; z-index: 100; pointer-events: none;
        }
        .data-box {
            background: rgba(0, 0, 0, 0.8); border: 2px solid var(--neon-blue);
            padding: 8px 15px; text-align: center; min-width: 100px;
            border-radius: 12px; backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }
        .label { font-size: 8px; color: var(--neon-blue); letter-spacing: 1px; font-weight: 900; display: block; text-transform: uppercase; }
        .value { font-size: 20px; font-weight: 900; color: #fff; display: block; }

        #state-tag {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 5px 20px; border-radius: 20px; background: rgba(255,255,255,0.1);
            font-size: 12px; letter-spacing: 3px; color: var(--neon-gold); z-index: 90;
        }

        canvas { display: block; touch-action: none; }

        /* Pantalla de Inicio */
        #start-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #111 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; text-align: center; padding: 20px;
        }
        .start-btn {
            padding: 20px 50px; background: var(--neon-blue); color: black;
            border: none; font-family: 'Orbitron'; font-weight: 900;
            cursor: pointer; margin-top: 30px; border-radius: 50px;
            box-shadow: 0 0 40px var(--neon-blue); transition: 0.3s;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="hud">
    <div class="data-box" style="border-color: var(--neon-gold);">
        <span class="label">CREDIT SCORE</span><span id="val-money" class="value">0</span>
    </div>
    <div class="data-box" style="border-color: var(--neon-red);">
        <span class="label">SURVIVAL</span><span id="val-health" class="value">100%</span>
    </div>
    <div class="data-box" style="border-color: var(--neon-purple);">
        <span class="label">UNITS</span><span id="val-biz" class="value">0</span>
    </div>
</div>

<div id="state-tag">LOCATION: <span id="current-loc">HOME BASE</span></div>

<div id="start-screen">
    <h1 style="color: var(--neon-blue); letter-spacing: 10px; font-size: clamp(30px, 8vw, 60px);">AL CIELO</h1>
    <p style="color: #666; font-size: 12px; letter-spacing: 2px;">NEURAL INTERFACE - USA 50 STATES EDITION</p>
    <button class="start-btn" onclick="init()">START TRAINING</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let audioCtx, mainOsc, mainGain;

// --- MATRIZ DE ESCENARIOS (VIDA REAL USA) ---
const scenarios = [
    { name: "HOME BASE", color: "#0a0a1a", data: ["FAMILY VALUE", "SAVINGS", "HOUSE RULES", "CHORES"] },
    { name: "USA SCHOOL", color: "#1a0a0a", data: ["ACTIVE DRILL", "PEER PRESSURE", "GRADES", "BULLYING"] },
    { name: "URBAN STREETS", color: "#0a1a0a", data: ["SITUATIONAL AWARENESS", "STRANGER DANGER", "911 CALL", "EXIT SIGNS"] },
    { name: "FINANCIAL FUTURE", color: "#1a1a0a", data: ["INVESTMENT", "CREDIT CARD", "TAXES", "BUSINESS"] }
];

const rawData = [
    { text: "FAMILY", type: "pos", stat: "health", impact: 15, color: "#2ecc71", freq: 440 },
    { text: "SAVINGS", type: "pos", stat: "money", impact: 200, color: "#f1c40f", freq: 554 },
    { text: "STRANGER", type: "neg", impact: -40, color: "#ff3131", freq: 80 }, // Castigo auditivo
    { text: "911 CALL", type: "pos", stat: "health", impact: 25, color: "#00f2ff", freq: 880 },
    { text: "BAD LOAN", type: "neg", stat: "money", impact: -100, color: "#e67e22", freq: 60 },
    { text: "DRILL", type: "pos", stat: "health", impact: 30, color: "#9b59b6", freq: 1100 }
];

let stats = { money: 0, health: 100, biz: 0, sceneIdx: 0 };
let active = false;
let objects = [];
let particles = [];
let dpr = window.devicePixelRatio || 1;
const user = { x: 0, y: 0, size: 45 };

// --- MOTOR DE AUDIO "DENTRO DEL JUEGO" ---
function setupAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Ruido de fondo (Ambiente)
    mainOsc = audioCtx.createOscillator();
    mainGain = audioCtx.createGain();
    mainOsc.type = 'triangle';
    mainOsc.frequency.value = 60; 
    mainGain.gain.value = 0.02;
    mainOsc.connect(mainGain);
    mainGain.connect(audioCtx.destination);
    mainOsc.start();
}

function playTriggerSound(freq, type) {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type === 'pos' ? 'sine' : 'sawtooth';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(0.2, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.6);
    osc.connect(g);
    g.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.6);
    
    // Pitch shift del fondo según salud
    mainOsc.frequency.exponentialRampToValueAtTime(60 + (stats.health), audioCtx.currentTime + 0.2);
}

// --- RESPONSIVE & SHARP GRAPHICS ---
function resize() {
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.scale(dpr, dpr);
}
window.addEventListener('resize', resize);
resize();

function init() {
    document.getElementById('start-screen').style.display = 'none';
    setupAudio();
    active = true;
    user.x = window.innerWidth / 2;
    user.y = window.innerHeight * 0.8;
    setInterval(spawn, 800);
    setInterval(changeScenario, 15000); // Cambio de paisaje cada 15 seg
    loop();
}

function changeScenario() {
    stats.sceneIdx = (stats.sceneIdx + 1) % scenarios.length;
    document.getElementById('current-loc').innerText = scenarios[stats.sceneIdx].name;
}

function spawn() {
    if(!active) return;
    const entry = rawData[Math.floor(Math.random() * rawData.length)];
    objects.push({
        ...entry,
        x: Math.random() * (window.innerWidth - 100) + 50,
        y: -50,
        speed: 3 + (stats.money / 10000)
    });
}

function update() {
    if(!active) return;

    objects.forEach((obj, i) => {
        obj.y += obj.speed;
        const dist = Math.sqrt((obj.x - user.x)**2 + (obj.y - user.y)**2);
        
        if (dist < user.size) {
            playTriggerSound(obj.freq, obj.type);
            if(obj.type === 'neg') {
                stats.health -= 20;
                stats.money = Math.floor(stats.money * 0.5); // El castigo de USA: Pierdes la mitad
            } else {
                if(obj.stat === 'money') stats.money += obj.impact;
                if(obj.stat === 'health') stats.health = Math.min(100, stats.health + 10);
            }
            createExplosion(obj.x, obj.y, obj.color);
            updateHUD();
            objects.splice(i, 1);
        }
        if(obj.y > window.innerHeight + 100) objects.splice(i, 1);
    });

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.03;
        if(p.life <= 0) particles.splice(i, 1);
    });

    if(stats.health <= 0) {
        active = false;
        alert("GAME OVER: PROTECTION FAILED. Final Wealth: $" + stats.money);
        location.reload();
    }
}

function updateHUD() {
    document.getElementById('val-money').innerText = stats.money;
    document.getElementById('val-health').innerText = stats.health + "%";
}

function createExplosion(x, y, color) {
    for (let i = 0; i < 15; i++) {
        particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1.0, color });
    }
}

function draw() {
    // Fondo dinámico según escenario
    ctx.fillStyle = scenarios[stats.sceneIdx].color;
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    
    // Dibujar Avatar (The Guard)
    ctx.shadowBlur = 20;
    ctx.shadowColor = varColor('--neon-blue');
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(user.x, user.y, user.size - 10, 0, Math.PI*2);
    ctx.stroke();

    // Dibujar Objetos (Sharp Text)
    objects.forEach(obj => {
        ctx.shadowBlur = 15;
        ctx.shadowColor = obj.color;
        ctx.fillStyle = "white";
        ctx.font = "900 18px Orbitron";
        ctx.textAlign = "center";
        ctx.fillText(obj.text, obj.x, obj.y);
    });

    // Partículas
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 4, 4);
    });
    ctx.globalAlpha = 1.0;
}

function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

const handleInput = (e) => {
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    user.x = cx; user.y = cy;
};
window.addEventListener('mousemove', handleInput);
window.addEventListener('touchmove', (e) => { handleInput(e); e.preventDefault(); }, {passive: false});

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
