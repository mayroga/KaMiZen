<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO: TOTAL LIFE TRAINING</title>

<style>
:root {
    --neon-blue:#00f2ff;
    --neon-green:#00ff41;
    --neon-red:#ff003c;
    --neon-yellow:#ffff00;
    --matrix-bg:#00050a;
    --neon-gold:#ffcc00;
}

body {
    margin:0;
    background:var(--matrix-bg);
    color:#fff;
    font-family:'Courier New', monospace;
    overflow:hidden;
    user-select:none;
    transition:background 0.3s;
}

.correct-flash { background:#002a00 !important; }
.wrong-flash { background:#2a0000 !important; }

#security-alert {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:8px;
    background:var(--neon-green);
    z-index:1000;
    box-shadow:0 0 15px var(--neon-green);
}

#lang-btn {
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:999;
    padding:10px 18px;
    border:2px solid var(--neon-blue);
    background:rgba(0,0,0,0.8);
    color:var(--neon-blue);
    cursor:pointer;
    font-weight:bold;
    border-radius:5px;
}

#hud {
    position:fixed;
    top:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px;
    z-index:50;
    box-sizing:border-box;
}

#timer-box {
    font-size:2.8rem;
    color:var(--neon-blue);
    text-shadow:0 0 20px var(--neon-blue);
}

#score-box {
    border:3px solid #fff;
    padding:8px 20px;
    font-size:1.8rem;
    background:rgba(255,255,255,0.1);
}

#mastery-lvl {
    color:var(--neon-green);
    font-size:1.2rem;
    font-weight:bold;
}

#life-stats {
    position:fixed;
    bottom:20px;
    left:20px;
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    z-index:50;
    max-width:95%;
}

.stat-pill {
    border:2px solid #333;
    padding:10px 15px;
    font-size:0.9rem;
    background:rgba(0,0,0,0.9);
    border-radius:6px;
}

.stat-pill span { font-weight:bold; color:var(--neon-blue); }

#breath-circle{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:180px;
    height:180px;
    border-radius:50%;
    border:4px solid var(--neon-blue);
    display:none;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-weight:bold;
    color:var(--neon-blue);
    animation:pulse 4s infinite;
    z-index:9999;
    background:rgba(0,0,0,0.9);
}

@keyframes pulse{
    0%{transform:translate(-50%,-50%) scale(1);opacity:0.5;}
    50%{transform:translate(-50%,-50%) scale(1.4);opacity:1;}
    100%{transform:translate(-50%,-50%) scale(1);opacity:0.5;}
}

.floating{
    position:absolute;
    padding:15px 30px;
    font-weight:900;
    font-size:1.5rem;
    border-radius:10px;
    background:rgba(0,0,0,0.9);
    z-index:10;
    animation:floatUp 7s linear forwards;
}

@keyframes floatUp{
    from{transform:translateY(110vh);}to{transform:translateY(-25vh);}
}

.explode{animation:blast 0.5s ease-out forwards!important;}
@keyframes blast{
    0%{transform:scale(1);opacity:1;}
    100%{transform:scale(4);opacity:0;}
}

#overlay{
    position:fixed;
    width:100%;height:100%;
    background:rgba(0,5,10,0.95);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:500;
    text-align:center;
    padding:30px;
}

#decision-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:30px;
    width:100%;max-width:800px;
}

.choice-btn{
    padding:22px;
    border:3px solid var(--neon-blue);
    background:none;
    color:#fff;
    cursor:pointer;
}

#continue-btn{
    margin-top:20px;
    padding:15px 30px;
    border:2px solid #fff;
    background:none;
    color:#fff;
    display:none;
}
</style>
</head>

<body>

<div id="security-alert"></div>
<button id="lang-btn" onclick="toggleLang()">EN</button>

<div id="hud">
<div id="timer-box">05:00</div>
<div id="score-box">0</div>
<div id="mastery-lvl">MASTERY x1</div>
</div>

<div id="life-stats">
<div class="stat-pill">Respect: <span id="v-respect">50</span></div>
<div class="stat-pill">Peace: <span id="v-peace">50</span></div>
<div class="stat-pill">Leadership: <span id="v-lead">50</span></div>
<div class="stat-pill">Money: $<span id="v-money">100</span></div>
<div class="stat-pill">Safety: <span id="v-safety">100</span>%</div>
<div class="stat-pill">Happiness: <span id="v-happy">50</span>%</div>
</div>

<div id="breath-circle">INHALE</div>

<div id="overlay">
<h1 id="phase-title"></h1>
<p id="phase-desc"></p>
<div id="decision-grid"></div>
<button id="continue-btn">CONTINUE</button>
</div>

<script src="/static/engine.js"></script>

<script>

/* =========================
🧠 AUDIO ENGINE: DOPAMINE + ANTI STRESS BALANCE
========================= */

const AudioEngine={
ctx:null,
master:null,
noiseNode:null,

init(){
if(this.ctx) return;
this.ctx=new (window.AudioContext||window.webkitAudioContext)();

this.master=this.ctx.createGain();
this.master.gain.value=0.08;
this.master.connect(this.ctx.destination);

this.startAmbient();
this.startDopaminePulse();
},

startAmbient(){
const play=()=>{
if(!this.ctx) return;

let o=this.ctx.createOscillator();
let g=this.ctx.createGain();

o.type="sine";
o.frequency.value=40 + Math.random()*60;
g.gain.value=0.02;

o.connect(g);
g.connect(this.master);

o.start();
o.stop(this.ctx.currentTime+2);

setTimeout(play,2000);
};
play();
},

startDopaminePulse(){
const pulse=()=>{
if(!this.ctx) return;

let o=this.ctx.createOscillator();
let g=this.ctx.createGain();

o.type="triangle";
o.frequency.value=600 + Math.random()*300;

g.gain.setValueAtTime(0,this.ctx.currentTime);
g.gain.linearRampToValueAtTime(0.06,this.ctx.currentTime+0.05);
g.gain.linearRampToValueAtTime(0,this.ctx.currentTime+0.2);

o.connect(g);
g.connect(this.master);

o.start();
o.stop(this.ctx.currentTime+0.2);

setTimeout(pulse,900);
};
pulse();
},

click(){
this.beep(900,0.08);
},

explode(){
this.noise();
},

beep(freq,vol){
let o=this.ctx.createOscillator();
let g=this.ctx.createGain();

o.type="sine";
o.frequency.value=freq;
g.gain.value=vol;

o.connect(g);
g.connect(this.master);

o.start();
o.stop(this.ctx.currentTime+0.1);
},

noise(){
let buffer=this.ctx.createBuffer(1,this.ctx.sampleRate*0.1,this.ctx.sampleRate);
let data=buffer.getChannelData(0);
for(let i=0;i<data.length;i++) data[i]=Math.random()*2-1;

let n=this.ctx.createBufferSource();
n.buffer=buffer;
n.connect(this.master);
n.start();
}
};

document.addEventListener("click",()=>AudioEngine.init(),{once:true});

/* ========================= */
let lang="en";
let state={score:0,timer:300};

function updateHUD(){
document.getElementById("score-box").innerText=state.score;
}

</script>

</body>
</html>
