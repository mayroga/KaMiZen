<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AL CIELO - KAMIZEN BY MAY ROGA</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-gold: #f1c40f;
            --neon-red: #ff3131;
            --bg-dark: #050508;
            --neon-green: #2ecc71;
            --neon-orange: #ff8c00;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; overflow: hidden; background: var(--bg-dark); 
            color: white; font-family: 'Orbitron', sans-serif; touch-action: none; 
            height: 100vh; width: 100vw;
        }
        
        /* HUD & TIMERS */
        #hud {
            position: absolute; top: 10px; width: 100%;
            display: flex; justify-content: space-evenly;
            z-index: 1000; pointer-events: none; padding: 0 5px;
        }
        .data-box {
            background: rgba(0, 0, 0, 0.9); border: 1px solid var(--neon-blue);
            padding: 5px; text-align: center; flex: 1; margin: 0 3px; max-width: 110px;
        }
        .label { font-size: 8px; color: var(--neon-blue); letter-spacing: 1px; display: block; text-transform: uppercase; }
        .value { font-size: 14px; font-weight: 900; display: block; }
        
        #general-clock { position: absolute; bottom: 10px; right: 10px; color: var(--neon-gold); font-size: 12px; z-index: 1000; }
        #game-clock { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); color: var(--neon-red); font-size: 24px; font-weight: 900; z-index: 1000; display: none; }

        /* ESCENARIO PRINCIPAL */
        #stage {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 20px; z-index: 500; background: radial-gradient(circle, #111 0%, #000 100%);
        }

        #display-text { font-size: 1.5rem; font-weight: 900; color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); margin-bottom: 15px; width: 100%; }
        #sub-text { font-size: 1rem; color: #ccc; max-width: 600px; line-height: 1.4; margin-bottom: 20px; }

        /* BOTONES */
        .btn-core {
            padding: 15px 30px; background: var(--neon-blue); color: black; border: none;
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer;
            text-transform: uppercase; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            box-shadow: 0 0 20px var(--neon-blue);
        }
        #options-container { display: grid; gap: 10px; width: 100%; max-width: 400px; }
        .btn-opt {
            padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--neon-blue);
            color: white; font-family: 'Orbitron'; font-size: 0.8rem; cursor: pointer;
        }

        /* RESPIRACIÓN */
        #breath-wrap { display: none; margin-top: 20px; flex-direction: column; align-items: center; }
        #breath-circle {
            width: 140px; height: 140px; border: 5px solid var(--neon-blue);
            border-radius: 50%; transition: transform 2s ease-in-out;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        /* JUEGO */
        #gameCanvas { position: fixed; inset: 0; display: none; z-index: 100; }
        .skip-btn { position: absolute; bottom: 20px; left: 20px; font-size: 10px; z-index: 2000; padding: 10px; background: rgba(255,0,0,0.3); color: white; border: none; font-family: 'Orbitron'; }

        .hidden { display: none !important; }
        input { background: transparent; border: 2px solid var(--neon-blue); color: white; padding: 12px; font-family: 'Orbitron'; text-align: center; width: 80%; max-width: 300px; outline: none; margin-bottom: 20px; }

        @media (min-width: 768px) {
            #display-text { font-size: 2.8rem; }
            .data-box { max-width: 180px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="hud">
    <div class="data-box"><span class="label">NET WORTH</span><span id="stat-money" class="value">$0</span></div>
    <div class="data-box" style="border-color: var(--neon-gold);"><span class="label">STABILITY</span><span id="stat-health" class="value">100%</span></div>
</div>

<div id="stage">
    <h2 id="display-text">KAMIZEN SYSTEM</h2>
    <p id="sub-text">Prepare your mind for the mission.</p>
    
    <div id="input-area">
        <input type="text" id="user-name" placeholder="ENTER YOUR NAME">
    </div>

    <div id="options-container"></div>

    <div id="breath-wrap">
        <div id="breath-circle"><span id="breath-label" style="font-size: 1.2rem; font-weight: 900;">INHALE</span></div>
        <p id="breath-info" style="font-size: 0.8rem; color: var(--neon-gold); margin-top: 15px;"></p>
    </div>

    <button id="main-btn" class="btn-core">INITIALIZE</button>
</div>

<canvas id="gameCanvas"></canvas>
<div id="general-clock">MISSION TIME: 00:00</div>
<div id="game-clock">05:00</div>
<button id="skip-game" class="skip-btn hidden">SKIP PHASE</button>

<script>
    // --- CONFIGURACIÓN Y ESTADO ---
    let stats = { money: 0, health: 100, name: "", wrongHits: 0, totalTime: 0 };
    let isGameActive = false;
    let synth = window.speechSynthesis;
    let gameTimer = 300; 

    const ui = {
        text: document.getElementById('display-text'),
        sub: document.getElementById('sub-text'),
        btn: document.getElementById('main-btn'),
        input: document.getElementById('input-area'),
        opts: document.getElementById('options-container'),
        breath: document.getElementById('breath-wrap'),
        circle: document.getElementById('breath-circle'),
        label: document.getElementById('breath-label'),
        info: document.getElementById('breath-info'),
        canvas: document.getElementById('gameCanvas'),
        gClock: document.getElementById('general-clock'),
        gameClock: document.getElementById('game-clock'),
        skip: document.getElementById('skip-game')
    };

    const ctx = ui.canvas.getContext('2d');
    let objects = [];
    let gameLoopReq;

    // --- FUNCIONES DE VOZ ---
    function narrate(text) {
        synth.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.85; // Pausado
        utterance.pitch = 0.9; // Masculino
        utterance.lang = 'en-US';
        synth.speak(utterance);
    }

    // --- RELOJ GENERAL ---
    function startGeneralClock() {
        setInterval(() => {
            stats.totalTime++;
            const m = Math.floor(stats.totalTime / 60);
            const s = stats.totalTime % 60;
            ui.gClock.innerText = `MISSION TIME: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }, 1000);
    }

    // --- FLUJO PRINCIPAL ---
    ui.btn.onclick = async () => {
        const name = document.getElementById('user-name').value;
        if(!name) { alert("Please enter your name"); return; }
        stats.name = name;
        ui.input.classList.add('hidden');
        ui.btn.classList.add('hidden');
        startGeneralClock();
        await startCoreFlow();
    };

    async function startCoreFlow() {
        // 1. Stories (Cuerpo)
        await showStory("WELCOME AGENT " + stats.name, "In this world, your focus is your greatest weapon. You must protect your stability while building your future.");
        
        // 2. Primer Juego (Manos)
        await runWordGame();

        // 3. Misiones y Respiración (Cabeza)
        await runMissions();

        // 4. Segundo Juego (Manos)
        await runWordGame();

        // 5. Diagnóstico Final
        await showDiagnostic();
    }

    async function showStory(title, content) {
        ui.text.innerText = title;
        ui.sub.innerText = content;
        narrate(content);
        await new Promise(r => setTimeout(r, 4000));
        ui.btn.innerText = "CONTINUE";
        ui.btn.classList.remove('hidden');
        return new Promise(resolve => {
            ui.btn.onclick = () => { ui.btn.classList.add('hidden'); resolve(); };
        });
    }

    // --- JUEGO DE PALABRAS (5 MINUTOS) ---
    async function runWordGame() {
        ui.canvas.style.display = "block";
        ui.gameClock.style.display = "block";
        ui.skip.classList.remove('hidden');
        isGameActive = true;
        gameTimer = 300;
        objects = [];

        const timerInterval = setInterval(() => {
            if(!isGameActive) return;
            gameTimer--;
            const m = Math.floor(gameTimer/60);
            const s = gameTimer % 60;
            ui.gameClock.innerText = `${m}:${String(s).padStart(2,'0')}`;
            if(gameTimer <= 0) end();
        }, 1000);

        function spawn() {
            if(!isGameActive) return;
            const words = [
                {t: "TRUTH", p: true}, {t: "SAVINGS", p: true}, {t: "FOCUS", p: true},
                {t: "LIES", p: false}, {t: "CHAOS", p: false}, {t: "BULLY", p: false}
            ];
            const w = words[Math.floor(Math.random()*words.length)];
            objects.push({
                text: w.t, pos: w.p,
                x: Math.random() * (ui.canvas.width - 100) + 50,
                y: -50,
                s: 2 + Math.random() * 3
            });
            setTimeout(spawn, 1200);
        }

        spawn();
        gameAnimate();

        return new Promise(resolve => {
            ui.skip.onclick = () => end();
            function end() {
                clearInterval(timerInterval);
                isGameActive = false;
                ui.canvas.style.display = "none";
                ui.gameClock.style.display = "none";
                ui.skip.classList.add('hidden');
                cancelAnimationFrame(gameLoopReq);
                resolve();
            }
        });
    }

    function gameAnimate() {
        if(!isGameActive) return;
        ctx.fillStyle = 'rgba(5, 5, 8, 0.3)';
        ctx.fillRect(0,0,ui.canvas.width, ui.canvas.height);
        
        objects.forEach((obj, i) => {
            obj.y += obj.s;
            ctx.fillStyle = obj.pos ? 'var(--neon-blue)' : 'var(--neon-red)';
            ctx.font = "900 20px Orbitron";
            ctx.textAlign = "center";
            ctx.fillText(obj.text, obj.x, obj.y);

            // Efecto Laser
            ctx.strokeStyle = obj.pos ? 'rgba(0,242,255,0.1)' : 'rgba(255,0,0,0.1)';
            ctx.beginPath(); ctx.moveTo(obj.x, obj.y); ctx.lineTo(ui.canvas.width/2, ui.canvas.height); ctx.stroke();

            if(obj.y > ui.canvas.height) objects.splice(i, 1);
        });
        gameLoopReq = requestAnimationFrame(gameAnimate);
    }

    // Interacción Juego
    ui.canvas.onclick = (e) => {
        objects.forEach((obj, i) => {
            const d = Math.hypot(e.clientX - obj.x, e.clientY - obj.y);
            if(d < 50) {
                if(!obj.pos) {
                    stats.wrongHits++;
                    if(stats.wrongHits >= 3) triggerPenalty();
                } else {
                    stats.money += 100;
                    document.getElementById('stat-money').innerText = "$" + stats.money;
                }
                objects.splice(i, 1);
            }
        });
    };

    async function triggerPenalty() {
        isGameActive = false;
        stats.wrongHits = 0;
        const msg = "Focus lost. Negative choices block your success. Sign this commitment to rejoin.";
        ui.text.innerText = "WARNING: UNSTABLE";
        ui.sub.innerText = msg;
        narrate(msg);
        ui.opts.innerHTML = '<button class="btn-core">I COMMIT TO FOCUS</button>';
        ui.opts.firstChild.onclick = () => {
            ui.opts.innerHTML = "";
            isGameActive = true;
            gameAnimate();
        };
    }

    // --- MISIONES Y RESPIRACIÓN ---
    async function runMissions() {
        // Bloque de Respiración
        await startBreathing("CALM & OBSERVATION", "Deep breathing lowers your heart rate and clears the mind. Scientific studies show it reduces cortisol by 25%.");
        
        // Pregunta de Decisión
        await askMission("An emergency happens at school. What is the protocol?", 
            ["Run/Hide/Fight", "Call Parents", "Hide and Scream", "Do Nothing"], 
            0, "RUN if you can, HIDE if you can't, FIGHT only as a last resort.");
    }

    async function startBreathing(title, info) {
        ui.text.innerText = title;
        ui.sub.innerText = "";
        ui.breath.style.display = "flex";
        ui.info.innerText = info;
        narrate(info);

        for(let i=0; i<5; i++) {
            ui.label.innerText = "INHALE";
            ui.circle.style.transform = "scale(1.4)";
            await new Promise(r => setTimeout(r, 2000));
            ui.label.innerText = "EXHALE";
            ui.circle.style.transform = "scale(1)";
            await new Promise(r => setTimeout(r, 2000));
        }
        ui.breath.style.display = "none";
    }

    async function askMission(q, ops, correct, expl) {
        ui.text.innerText = "DECISION TIME";
        ui.sub.innerText = q;
        narrate(q);
        ui.opts.innerHTML = "";

        return new Promise(resolve => {
            ops.forEach((op, i) => {
                const b = document.createElement('button');
                b.className = 'btn-opt';
                b.innerText = op;
                b.onclick = () => {
                    const buttons = ui.opts.querySelectorAll('button');
                    buttons.forEach(btn => btn.disabled = true);
                    
                    if(i === correct) { b.style.background = 'var(--neon-green)'; stats.money += 500; }
                    else { b.style.background = 'var(--neon-red)'; stats.health -= 20; }
                    
                    document.getElementById('stat-health').innerText = stats.health + "%";
                    ui.sub.innerText = expl;
                    narrate(expl);
                    
                    ui.btn.innerText = "CONTINUE";
                    ui.btn.classList.remove('hidden');
                    ui.btn.onclick = () => {
                        ui.btn.classList.add('hidden');
                        ui.opts.innerHTML = "";
                        resolve();
                    };
                };
                ui.opts.appendChild(b);
            });
        });
    }

    async function showDiagnostic() {
        ui.text.innerText = "FINAL DIAGNOSTIC";
        const finalMsg = stats.health > 70 ? 
            "Excellent stability. You are ready for the world." : 
            "You need more practice in focus. Balance is key to survival.";
        
        ui.sub.innerText = `${stats.name}, your total assets are $${stats.money}. \n\nRemember: Box breathing (4-4-4-4) is used by professionals to maintain calm under pressure.`;
        narrate(ui.sub.innerText);
        
        ui.btn.innerText = "RESTART SYSTEM";
        ui.btn.classList.remove('hidden');
        ui.btn.onclick = () => location.reload();
    }

    // Responsive
    window.onresize = () => {
        ui.canvas.width = window.innerWidth;
        ui.canvas.height = window.innerHeight;
    };
    window.onresize();
</script>
</body>
</html>
