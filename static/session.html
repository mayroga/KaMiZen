<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN LOOP PRO</title>

<style>
body{
    margin:0;
    background:radial-gradient(circle,#001a33,#000);
    color:#fff;
    font-family:'Segoe UI',Arial;
    text-align:center;
    overflow:hidden;
    cursor:crosshair;
}

/* TOP */
#top-ui{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    padding:15px;
    color:#00f2ff;
    font-weight:bold;
}

#timer{ margin-top:70px; font-size:1.4rem; color:#00f2ff; }

/* BUTTONS */
#menu{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* FLOATING */
.floating{
    position:absolute;
    padding:8px 18px;
    border-radius:20px;
    font-weight:bold;
    animation:floatUp 5s linear forwards;
}
.word-good{color:#0f0;border:2px solid #0f0;}
.word-bad{color:#f00;border:2px solid #f00;}
.word-neutral{color:#ff0;border:2px solid #ff0;}

@keyframes floatUp{
    from{transform:translateY(110vh);}
    to{transform:translateY(-20vh);}
}

/* 💥 EXPLOSIÓN */
.blast{ 
    animation: burst 0.4s forwards; 
    pointer-events: none; 
}

@keyframes burst{ 
    to{ transform: scale(4); opacity: 0; } 
}

/* LEARNING */
#learning{display:none;margin-top:120px}
</style>
</head>

<body>

<div id="top-ui">
    <div>FOCUS: 100%</div>
    <div id="score">POINTS: 0</div>
    <div>ENERGY: ⚡⚡⚡</div>
</div>

<div id="timer">00:00</div>

<div id="menu">
    <button onclick="start()">START</button>
    <button onclick="start()">CONTINUE</button>
    <button onclick="reset()">BACK</button>
    <!-- 🌍 BOTÓN IDIOMA -->
    <button onclick="toggleLang()">ES / EN</button>
</div>

<div id="learning">
    <h2 id="lvl"></h2>
    <p id="mission"></p>
</div>

<!-- AUDIO -->
<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="win" src="/static/sounds/trumpet.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>
<audio id="ok" src="/static/sounds/explosion.mp3"></audio>
<audio id="key" src="/static/sounds/keypress.mp3"></audio>

<script>
// ================= STATE =================
let score=0;
let level=1;
let phase="menu";
let timer,spawn;
let allowInput=true;

// 🌍 idioma
let lang = "en";

// durations
const GAME_1=300;
const LEARN=360;

// ================= TEXTOS =================
const texts = {
    en: {
        start: "START",
        continue: "CONTINUE",
        back: "BACK",
        points: "POINTS",
        missions: [
            "Breathe without touching the screen.",
            "Control your impulse.",
            "Focus without distractions.",
            "Master your mind."
        ]
    },
    es: {
        start: "INICIAR",
        continue: "CONTINUAR",
        back: "ATRÁS",
        points: "PUNTOS",
        missions: [
            "Respira sin tocar la pantalla.",
            "Controla tu impulso.",
            "Concéntrate sin distracciones.",
            "Domina tu mente."
        ]
    }
};

// ================= WORDS =================
const words={
    good:["WILL","VISION","HONOR","COURAGE","BUILD","RISE",
            "FAITH","DISCIPLINE","STRENGTH","VICTORY"],

    bad:["NOISE","EXCUSE","QUITTING","EGO","HATE","CHAOS",
            "LAZY","FEAR","LIE","ANGER"],

    neutral:["CALM","LISTEN","WAIT","PEACE","PRAY","INSIDE",
            "BREATHE","STILL","SOUL","FOCUS"]
};

// ================= MEANINGS =================
const meanings = {
    WILL: "Decide to act even if it's hard.",
    VISION: "Think about your future before acting.",
    HONOR: "Do right even when unseen.",
    COURAGE: "Act despite fear.",
    BUILD: "Create something better.",
    RISE: "Stand up after failing.",
    FAITH: "Believe when it's difficult.",
    DISCIPLINE: "Do what must be done.",
    STRENGTH: "Control yourself.",
    VICTORY: "Win after resisting.",

    CALM: "Stay relaxed under pressure.",
    LISTEN: "Hear before reacting.",
    WAIT: "Don't act impulsively.",
    PEACE: "Inner control.",
    PRAY: "Reflect deeply.",
    INSIDE: "Think before acting.",
    BREATHE: "Control your body.",
    STILL: "Stay still to think.",
    SOUL: "Your deepest part.",
    FOCUS: "No distractions.",

    NOISE: "Weak distraction.",
    EXCUSE: "Lie to avoid growth.",
    QUITTING: "Stop too early.",
    EGO: "False self-importance.",
    HATE: "Destructive energy.",
    CHAOS: "No control.",
    LAZY: "Avoid effort.",
    FEAR: "Stops action.",
    LIE: "Damaging falsehood.",
    ANGER: "Uncontrolled reaction"
};

// ================= LANGUAGE =================
function toggleLang(){
    lang = lang === "en" ? "es" : "en";
    applyLang();
}

function applyLang(){
    document.querySelector("#menu button:nth-child(1)").innerText = texts[lang].start;
    document.querySelector("#menu button:nth-child(2)").innerText = texts[lang].continue;
    document.querySelector("#menu button:nth-child(3)").innerText = texts[lang].back;

    document.getElementById("score").innerText =
        `${texts[lang].points}: ${score}`;
}

// ================= INIT =================
function start(){
    document.getElementById("menu").style.display="none";
    playMusic(); 
    runPhase("game1", GAME_1);
}

// ================= PHASES =================
function runPhase(type,time){
    clearAll();
    phase=type;

    if(type.includes("game")){
        allowInput=true;
        spawnWords();
        hideLearning();
    }

    if(type==="learn"){
        allowInput=false;
        showLearning();
    }

    startTimer(time,()=>{
        if(type==="game1"){
            runPhase("learn",LEARN);
        }
        else if(type==="learn"){
            const next = score>50?600:180;
            runPhase("game2",next);
        }
        else{
            runPhase("learn",LEARN);
        }
    });
}

// ================= TIMER =================
function startTimer(t,cb){
    updateTimer(t);
    timer=setInterval(()=>{
        t--;
        updateTimer(t);
        if(t<=0){clearInterval(timer);cb();}
    },1000);
}

function updateTimer(t){
    let m=Math.floor(t/60).toString().padStart(2,"0");
    let s=(t%60).toString().padStart(2,"0");
    document.getElementById("timer").innerText=`${m}:${s}`;
}

// ================= FLOATING =================
function spawnWords(){
    spawn=setInterval(()=>{
        if(!allowInput)return;

        const type=randomType();
        const word=randomWord(type);

        const el=document.createElement("div");
        el.className=`floating word-${type}`;
        el.innerText=word;
        el.style.left=Math.random()*90+"vw";

        el.onmousedown = () => {
            el.classList.add("blast");

            if (type === "good") { 
                score += 5; 
                document.getElementById("ok").play(); 
            }

            if (type === "bad") { 
                score -= 10; 
                document.getElementById("bad").play(); 
            }

            document.getElementById("score").innerText =
                `${texts[lang].points}: ${score}`;

            setTimeout(()=>el.remove(),400);
        };

        document.body.appendChild(el);
        setTimeout(()=>el.remove(),5000);

    },1500);
}

function randomType(){
    let r=Math.random();
    if(r>0.7)return"bad";
    if(r>0.4)return"good";
    return"neutral";
}

function randomWord(t){
    return words[t][Math.floor(Math.random()*words[t].length)];
}

// ================= LEARNING =================
function showLearning(){
    document.getElementById("learning").style.display="block";

    level = Math.floor(score/50)+1;

    document.getElementById("lvl").innerText="LEVEL "+level;

    const missions = texts[lang].missions;

    document.getElementById("mission").innerText=
        missions[Math.floor(Math.random()*missions.length)];
}

function hideLearning(){
    document.getElementById("learning").style.display="none";
}

// ================= AUDIO =================
function playMusic(){
    let bg=document.getElementById("bg");
    bg.volume=.3;
    bg.playbackRate=1.1;
    bg.play().catch(()=>{});
}

// ================= CONTROL =================
function clearAll(){
    clearInterval(timer);
    clearInterval(spawn);
}

function reset(){
    location.reload();
}

// aplicar idioma inicial
applyLang();
</script>

</body>
</html>
