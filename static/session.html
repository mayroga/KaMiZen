<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>KaMiZen - Sesión de 10 Minutos</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}
#content-box {
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
    width: 90%;
    max-width: 600px;
}
button {
    padding: 10px 20px;
    margin-top: 20px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}
button:hover {
    background: #1d4ed8;
}
p { margin: 15px 0; font-size: 18px; }
</style>
</head>
<body>
<div id="content-box">
    <h1>KaMiZen</h1>
    <p id="block">Bienvenido a tu sesión de 10 minutos</p>
    <button id="start-btn">Iniciar Sesión</button>
</div>
<script src="scripts.js"></script>
</body>
</html>
