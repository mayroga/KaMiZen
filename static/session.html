<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO | AURA BY MAY ROGA</title>

<style>
:root {
    --neon: #00f2ff;
    --bg: #000;
    --accent: #ff00ff;
    --panel: rgba(0, 15, 30, 0.95);
    --danger: #ff4444;
    --success: #33ff33;
}

/* ===== BASE ===== */
body {
    margin: 0;
    background: var(--bg);
    font-family: Arial, sans-serif;
    color: var(--neon);
    overflow: hidden;
}

/* ===== APP ===== */
#app {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* ===== BREATHING CIRCLE ===== */
#breath-container {
    position: absolute;
    top: 45%;
    width: 200px;
    height: 200px;
    display: flex;
    justify-content: center;
    align-items: center;
}

#circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(0,242,255,0.3);
    box-shadow: 0 0 40px var(--neon);
    animation: breathe 6s infinite ease-in-out;
}

@keyframes breathe {
    0% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(2.2); opacity: 1; }
    100% { transform: scale(1); opacity: 0.4; }
}

/* ===== TEXT ===== */
#message {
    position: absolute;
    bottom: 220px;
    width: 85%;
    max-width: 700px;
    padding: 20px;
    border: 2px solid var(--neon);
    background: var(--panel);
    text-align: center;
    font-size: 18px;
    min-height: 120px;
}

/* ===== OPTIONS ===== */
#options {
    position: absolute;
    bottom: 80px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 85%;
    max-width: 700px;
}

button {
    padding: 15px;
    border: 1px solid var(--neon);
    background: transparent;
    color: var(--neon);
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: var(--neon);
    color: black;
}

/* ===== SILENCE MODE ===== */
#silence {
    position: absolute;
    top: 10px;
    font-size: 14px;
    opacity: 0.7;
}

/* ===== FLASH ===== */
.flash {
    animation: flash 0.4s;
}
@keyframes flash {
    0% { background: rgba(255,0,0,0.5); }
    100% { background: transparent; }
}
</style>
</head>

<body>

<div id="app">

    <div id="silence">🧘 SILENCE LEVEL: <span id="silenceLevel">20</span>s</div>

    <!-- CÍRCULO RESPIRACIÓN -->
    <div id="breath-container">
        <div id="circle"></div>
    </div>

    <!-- MENSAJE -->
    <div id="message" onclick="startApp()">
        TOCA PARA INICIAR
    </div>

    <!-- OPCIONES -->
    <div id="options"></div>

</div>

<script>

let session_id = null;
let silenceTime = 20; // inicia en 20s y sube por nivel
let lang = "es";
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

/* =========================
   SONIDO DOPAMINA / ALERTA
========================= */
function playSound(type){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if(type === "fail"){
        osc.type = "sawtooth";
        osc.frequency.value = 120;
    } else if(type === "success"){
        osc.type = "sine";
        osc.frequency.value = 520;
    } else {
        osc.type = "triangle";
        osc.frequency.value = 300;
    }

    gain.gain.value = 0.2;
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
}

/* =========================
   INICIO
========================= */
async function startApp(){
    if(audioCtx.state === "suspended") await audioCtx.resume();

    const res = await fetch("/start", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ lang })
    });

    const data = await res.json();
    session_id = data.session_id;
    loadStep(data);
}

/* =========================
   RESPUESTA
========================= */
async function sendChoice(code){
    playSound("click");

    const res = await fetch("/judge", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            session_id,
            decision: code,
            silence: silenceTime
        })
    });

    const data = await res.json();
    loadStep(data);
}

/* =========================
   UI UPDATE
========================= */
function loadStep(data){
    if(!data || !data.story) return;

    document.getElementById("message").innerText =
        lang === "es" ? data.story.text_es : data.story.text_en;

    // SILENCE PROGRESIVO
    silenceTime = Math.min(180, silenceTime + 10);
    document.getElementById("silenceLevel").innerText = silenceTime;

    const container = document.getElementById("options");
    container.innerHTML = "";

    (data.story.options || []).forEach(opt=>{
        const b = document.createElement("button");
        b.innerText = opt.text?.[lang] || "CONTINUAR";
        b.onclick = () => sendChoice(opt.code);
        container.appendChild(b);
    });

    if(data.story.type === "fail") playSound("fail");
    if(data.story.type === "success") playSound("success");
}

/* =========================
   SISTEMA DE RESPIRACIÓN
   (CIENTÍFICO: regula sistema nervioso)
========================= */
setInterval(()=>{
    const circle = document.getElementById("circle");
    circle.style.filter = "blur(0.5px) drop-shadow(0 0 10px #00f2ff)";
}, 2000);

</script>

</body>
</html>
