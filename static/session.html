<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AL CIELO | KAMIZEN SYSTEM</title>

<style>
:root{
  --bg:#000;
  --neon:#00f2ff;
  --green:#33ff88;
  --red:#ff3355;
  --panel:rgba(0,15,30,0.9);
}

body{
  margin:0;
  background:var(--bg);
  color:var(--neon);
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  overflow:hidden;
}

#app{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  position:relative;
  transition: background 1s ease;
}

/* UI HEADER */
#header{
  position:absolute;
  top:20px;
  width:90%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#xpBar{
  width:150px;
  height:10px;
  border:1px solid var(--neon);
}

#xpFill{
  height:100%;
  width:0%;
  background:var(--green);
  transition: width 0.5s ease;
}

#levelIndicator{ font-weight:bold; letter-spacing: 2px; }

/* VISUAL CORE */
#circle{
  width:100px;
  height:100px;
  border-radius:50%;
  background:rgba(0,242,255,0.1);
  box-shadow:0 0 40px var(--neon);
  transition: transform 2s ease-in-out;
  display: flex;
  align-items: center;
  justify-content: center;
}

#timerDisplay{
  font-size: 24px;
  font-weight: bold;
}

/* CONTENT PANELS */
#reason{
  position:absolute;
  bottom:350px;
  width:85%;
  text-align:center;
  font-size:16px;
  color: var(--green);
  min-height: 40px;
}

#message{
  position:absolute;
  bottom:160px;
  width:85%;
  padding:20px;
  background:var(--panel);
  border: 1px solid rgba(0,242,255,0.3);
  text-align:center;
  min-height:100px;
  cursor: pointer;
}

#options{
  position:absolute;
  bottom:40px;
  width:85%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

button{
  padding:15px;
  border:1px solid var(--neon);
  background:transparent;
  color:var(--neon);
  font-weight: bold;
  cursor:pointer;
  text-transform: uppercase;
}

button:hover{
  background:var(--neon);
  color:#000;
}

.hidden { display: none !important; }

/* SEMAPHORE LIGHT */
#light{
  width:15px;
  height:15px;
  border-radius:50%;
  background:gray;
  margin-right: 10px;
}
</style>
</head>

<body>

<div id="app">
  <div id="header">
    <div style="display:flex; align-items:center;">
      <div id="light"></div>
      <div id="xpBar"><div id="xpFill"></div></div>
    </div>
    <div id="levelIndicator">LVL: 1</div>
  </div>

  <div id="circle">
    <div id="timerDisplay"></div>
  </div>

  <div id="reason"></div>
  <div id="message" onclick="nextStep()">INICIAR ENTRENAMIENTO</div>
  <div id="options" class="hidden"></div>
</div>

<script>
let currentMission = null;
let currentBlockIndex = 0;
let xp = 0;
let lang = "es";
let timerInt = null;

const audio = new (window.AudioContext || window.webkitAudioContext)();

function sound(type){
  const o=audio.createOscillator();
  const g=audio.createGain();
  o.connect(g); g.connect(audio.destination);
  if(type==="ok") o.frequency.value=600;
  if(type==="fail") o.frequency.value=150;
  if(type==="reward") o.frequency.value=800;
  o.type="sine"; g.gain.value=0.1;
  o.start(); o.stop(audio.currentTime+0.2);
}

function speak(text){
  if(!text) return;
  speechSynthesis.cancel();
  let u=new SpeechSynthesisUtterance(text);
  u.lang = (lang === "es") ? "es-ES" : "en-US";
  speechSynthesis.speak(u);
}

async function fetchMissions() {
  // En producción, esto vendría de tu API/DB
  const response = await fetch('/static/missions.json'); 
  return await response.json();
}

// Inicia o avanza la misión
async function startSession() {
  if(audio.state==="suspended") await audio.resume();
  // Simulación de carga inicial nivel 1
  loadMission(1);
}

async function loadMission(id) {
  // Aquí llamarías a tu backend para obtener la misión actual del usuario
  const r = await fetch("/get_mission", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ mission_id: id })
  });
  const data = await r.json();
  currentMission = data.mission;
  currentBlockIndex = 0;
  document.getElementById("levelIndicator").innerText = `LVL: ${currentMission.id}`;
  processBlock();
}

function processBlock() {
  const block = currentMission.blocks[currentBlockIndex];
  const msgEl = document.getElementById("message");
  const optEl = document.getElementById("options");
  const reasonEl = document.getElementById("reason");
  
  optEl.classList.add("hidden");
  reasonEl.innerText = "";

  if (block.type === "story" || block.type === "analysis") {
    msgEl.innerText = block.text[lang];
    speak(block.text[lang]);
    msgEl.onclick = nextStep;
  } 
  else if (block.type === "tvid") {
    msgEl.innerText = (lang === "es") ? "ELIGE TU CAMINO:" : "CHOOSE YOUR PATH:";
    optEl.innerHTML = "";
    optEl.classList.remove("hidden");
    block.options.forEach(opt => {
      let b = document.createElement("button");
      b.innerText = opt.text[lang];
      b.onclick = () => handleDecision(opt);
      optEl.appendChild(b);
    });
    msgEl.onclick = null;
  }
  else if (block.type === "silence_challenge") {
    startSilenceChallenge(block);
  }
}

function nextStep() {
  currentBlockIndex++;
  if (currentBlockIndex < currentMission.blocks.length) {
    processBlock();
  } else {
    // Siguiente misión
    loadMission(currentMission.id + 1);
  }
}

function handleDecision(opt) {
  const reasonEl = document.getElementById("reason");
  const light = document.getElementById("light");
  
  reasonEl.innerText = opt.reason[lang];
  speak(opt.reason[lang]);

  if (opt.correct) {
    light.style.background = "#33ff88";
    sound("ok");
    xp += 5;
    updateXP();
    setTimeout(nextStep, 3000);
  } else {
    light.style.background = "#ff3355";
    sound("fail");
    // No avanza hasta que elija la correcta o reinicie bloque
  }
}

function startSilenceChallenge(block) {
  const msgEl = document.getElementById("message");
  msgEl.innerText = (lang === "es") ? "DESAFÍO DE SILENCIO: NO TOQUES EL TELÉFONO" : "SILENCE CHALLENGE: DON'T TOUCH THE PHONE";
  
  let timeLeft = block.duration_sec;
  document.getElementById("timerDisplay").innerText = timeLeft;
  
  timerInt = setInterval(() => {
    timeLeft--;
    document.getElementById("timerDisplay").innerText = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(timerInt);
      sound("reward");
      msgEl.innerText = block.reward[lang];
      speak(block.reward[lang]);
      document.getElementById("timerDisplay").innerText = "✓";
      xp += 10;
      updateXP();
      msgEl.onclick = nextStep;
    }
  }, 1000);
}

function updateXP() {
  document.getElementById("xpFill").style.width = (xp % 100) + "%";
}

// Visual breath logic
setInterval(() => {
  const c = document.getElementById("circle");
  const scale = 1 + (Math.random() * 0.5);
  c.style.transform = `scale(${scale})`;
}, 2500);

// Entrada inicial
function nextStepInitial() {
    if(!currentMission) startSession();
    else nextStep();
}
document.getElementById("message").onclick = nextStepInitial;

</script>
</body>
</html>
