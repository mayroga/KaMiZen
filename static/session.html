<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO: TOTAL LIFE TRAINING</title>
<style>
:root {
    --neon-blue:#00f2ff; --neon-green:#00ff41; --neon-red:#ff003c;
    --neon-yellow:#ffff00; --matrix-bg:#00050a; --neon-gold: #ffcc00;
}
body {
    margin:0; background:var(--matrix-bg); color:#fff;
    font-family:'Courier New', monospace; overflow:hidden; user-select:none;
}

/* ALERTA */
#security-alert {
    position: fixed; top: 0; left: 0; width: 100%; height: 8px;
    background: var(--neon-green); z-index: 1000; transition: 0.8s ease;
    box-shadow: 0 0 15px var(--neon-green);
}

#lang-btn {
    position:fixed; bottom:20px; right:20px; z-index:999;
    padding:10px 18px; border:2px solid var(--neon-blue);
    background:rgba(0,0,0,0.8); color:var(--neon-blue); cursor:pointer; 
    font-weight: bold; border-radius: 5px;
}

#hud {
    position:fixed; top:20px; width:100%; display:flex;
    justify-content:space-between; padding:20px; z-index:50; box-sizing: border-box;
}
#timer-box { font-size:2.8rem; color:var(--neon-blue); text-shadow:0 0 20px var(--neon-blue); }
#score-container { text-align:right; }
#mastery-lvl { color: var(--neon-green); font-size:1.2rem; font-weight:bold; }
#score-box { border:3px solid #fff; padding:8px 20px; font-size:1.8rem; margin-top:5px; background:rgba(255,255,255,0.1); }

#life-stats {
    position: fixed; bottom: 20px; left: 20px; display: flex; flex-wrap: wrap;
    gap: 12px; z-index: 50; max-width: 80%;
}
.stat-pill { border: 2px solid #333; padding: 10px 15px; font-size: 0.9rem; background: rgba(0,0,0,0.9); border-radius: 6px; }
.stat-pill span { font-weight: bold; color: var(--neon-blue); transition: 0.5s; }
#v-money { color: var(--neon-gold) !important; }
#v-safety { color: var(--neon-red) !important; }
#v-happy { color: #ff00ff !important; }

/* WORDS */
.floating {
    position: absolute; padding: 15px 30px; font-weight: 900; font-size: 1.5rem;
    border-radius: 10px; background: rgba(0,0,0,0.9); z-index: 10;
    animation: floatUp 5s linear forwards; cursor: pointer;
    transition: transform 0.1s;
}
.word-power { border: 3px solid var(--neon-green); color: var(--neon-green); }
.word-risk { border: 3px solid var(--neon-red); color: var(--neon-red); }
.word-silence { border: 3px solid var(--neon-yellow); color: var(--neon-yellow); }

@keyframes floatUp {
    from { transform: translateY(110vh) rotate(0deg); }
    to { transform: translateY(-25vh) rotate(10deg); }
}

.explode { animation: blast 0.5s ease-out forwards !important; }
@keyframes blast {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(4); opacity: 0; }
}

/* OVERLAY */
#overlay {
    position:fixed; width:100%; height:100%; background:rgba(0,5,10,0.95);
    display:none; align-items:center; justify-content:center;
    flex-direction:column; z-index:500; text-align:center; padding:30px;
}

#breath-circle {
    width:250px; height:250px; border:8px solid var(--neon-blue);
    border-radius:50%; margin:30px;
    display:none; align-items:center; justify-content:center;
    font-size:1.8rem; font-weight: bold;
    transition: transform 4s ease-in-out;
}
.inhale { transform: scale(1.4); box-shadow: 0 0 50px var(--neon-blue); }
.exhale { transform: scale(0.8); box-shadow: 0 0 10px var(--neon-blue); }

#decision-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:20px;
    margin-top:30px; width:100%; max-width:800px;
}
.choice-btn {
    padding:22px; border:3px solid var(--neon-blue);
    background:none; color:#fff; cursor:pointer; font-size: 1.1rem;
}
</style>
</head>
<body>

<div id="security-alert"></div>
<button id="lang-btn" onclick="toggleLang()">EN</button>

<div id="hud">
    <div id="timer-box">05:00</div>
    <div id="score-container">
        <div id="mastery-lvl">MASTERY x1</div>
        <div id="score-box">0</div>
    </div>
</div>

<div id="life-stats">
    <div class="stat-pill">Respect: <span id="v-respect">50</span></div>
    <div class="stat-pill">Peace: <span id="v-peace">50</span></div>
    <div class="stat-pill">Leadership: <span id="v-lead">50</span></div>
    <div class="stat-pill">Money: $<span id="v-money">100</span></div>
    <div class="stat-pill">Safety: <span id="v-safety">100</span>%</div>
    <div class="stat-pill">Happiness: <span id="v-happy">50</span>%</div>
</div>

<div id="overlay">
    <h1 id="phase-title"></h1>
    <div id="breath-circle">BREATH</div>
    <p id="phase-desc"></p>
    <div id="decision-grid"></div>
</div>

<script src="/static/engine.js"></script>

<script>
// ================= STATE =================
let lang = "en";
let gameMode = "idle";
let timeLeft = 300;

let state = {
    score: 0, 
    stats: { respect:50, peace:50, lead:50, money:100, happy:50, safety:100 },
    spawnRate: 1100 // Más rápido para mayor dificultad
};

const words = {
    power: ["WILL","VISION","HONOR","COURAGE","BUILD","RISE","FAITH","DISCIPLINE","STRENGTH","VICTORY"],
    risk: ["NOISE","EXCUSE","QUITTING","EGO","HATE","CHAOS","LAZY","FEAR","LIE","ANGER"],
    silence: ["CALM","LISTEN","WAIT","PEACE","PRAY","INSIDE","BREATHE","STILL","SOUL","FOCUS"]
};

// ================= RELOJ AUTOMÁTICO =================
setInterval(() => {
    if (timeLeft > 0) {
        timeLeft--;
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        document.getElementById("timer-box").innerText = 
            `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    }
}, 1000);

// ================= IDIOMA =================
function toggleLang() {
    lang = lang === "en" ? "es" : "en";
    document.getElementById("lang-btn").innerText = lang.toUpperCase();
    speak(lang === "en" ? "English active" : "Español activado");
}

function speak(text) {
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = lang === "en" ? "en-US" : "es-ES";
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

// ================= PALABRAS (DIFICULTAD+) =================
function spawnWord() {
    if (gameMode !== "words") return;

    const cats = ["power", "risk", "silence"];
    const c = cats[Math.floor(Math.random() * 3)];
    const div = document.createElement("div");
    div.className = `floating word-${c}`;
    div.innerText = words[c][Math.floor(Math.random() * words[c].length)];
    
    // Movimiento errático para dificultad
    div.style.left = Math.random() * 70 + 5 + "vw";
    div.style.animationDuration = (Math.random() * 2 + 3) + "s"; // Velocidad variable

    div.onclick = () => {
        div.classList.add("explode");
        if (c === "power") { state.score += 25; state.stats.lead += 1; }
        if (c === "risk") { state.score -= 50; state.stats.safety -= 2; }
        if (c === "silence") { state.score += 10; state.stats.peace += 1; }
        updateHUD();
        setTimeout(() => div.remove(), 500);
    };

    document.body.appendChild(div);
    setTimeout(() => { if(div) div.remove(); }, 5000);
}

// ================= RESPIRACIÓN ANIMADA =================
function breathing() {
    return new Promise(resolve => {
        gameMode = "breathing";
        const overlay = document.getElementById("overlay");
        const circle = document.getElementById("breath-circle");
        const desc = document.getElementById("phase-desc");

        overlay.style.display = "flex";
        circle.style.display = "flex";
        
        let t = 30;
        const cycle = setInterval(() => {
            const isInhale = t % 8 >= 4;
            circle.className = isInhale ? "inhale" : "exhale";
            circle.innerText = isInhale ? (lang==="en"?"INHALE":"INHALE") : (lang==="en"?"EXHALE":"EXHALE");
            desc.innerText = (lang==="en"?"Time: ":"Tiempo: ") + t;
            
            if (t <= 0) {
                clearInterval(cycle);
                circle.style.display = "none";
                overlay.style.display = "none";
                resolve();
            }
            t--;
        }, 1000);
    });
}

// ================= PREGUNTAS / MISIONES =================
async function triggerQuestion() {
    const res = await fetch(`/api/mission/next?lang=${lang}`);
    const data = await res.json();

    const overlay = document.getElementById("overlay");
    const grid = document.getElementById("decision-grid");
    const desc = document.getElementById("phase-desc");
    const title = document.getElementById("phase-title");

    title.innerText = data.theme;
    desc.innerText = data.story;
    speak(data.story);
    grid.innerHTML = "";

    data.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.innerText = opt.text;
        btn.onclick = () => {
            state.score += opt.score;
            state.stats.respect += (opt.score > 0 ? 5 : -5);
            state.stats.happy += (opt.score > 0 ? 2 : -10);
            desc.innerText = opt.explanation;
            speak(opt.explanation);
            updateHUD();
            setTimeout(() => {
                overlay.style.display = "none";
                if(window.onQuestionAnswered) window.onQuestionAnswered();
            }, 3500);
        };
        grid.appendChild(btn);
    });
    overlay.style.display = "flex";
}

// ================= HUD & STATS DYNAMIC =================
function updateHUD() {
    document.getElementById("score-box").innerText = state.score;
    document.getElementById("v-respect").innerText = state.stats.respect;
    document.getElementById("v-peace").innerText = state.stats.peace;
    document.getElementById("v-lead").innerText = state.stats.lead;
    document.getElementById("v-money").innerText = state.stats.money;
    document.getElementById("v-safety").innerText = state.stats.safety;
    document.getElementById("v-happy").innerText = state.stats.happy;
    
    // Mastery level basado en score
    let mastery = Math.floor(state.score / 500) + 1;
    document.getElementById("mastery-lvl").innerText = "MASTERY x" + (mastery > 0 ? mastery : 1);
}

// ================= LOOP PRINCIPAL =================
async function playWords(sec) {
    return new Promise(resolve => {
        gameMode = "words";
        let end = Date.now() + sec * 1000;
        function loop() {
            if (Date.now() > end) { gameMode = "idle"; return resolve(); }
            spawnWord();
            setTimeout(loop, state.spawnRate);
        }
        loop();
    });
}

function silence(sec) {
    return new Promise(resolve => {
        gameMode = "silence";
        const overlay = document.getElementById("overlay");
        document.getElementById("phase-desc").innerText = lang === "en" ? "PURE SILENCE" : "SILENCIO PURO";
        overlay.style.display = "flex";
        setTimeout(() => { overlay.style.display = "none"; resolve(); }, sec * 1000);
    });
}

async function mainLoop() {
    while (true) {
        await playWords(30); 
        await breathing();
        await new Promise(res => { 
            gameMode = "question"; 
            triggerQuestion(); 
            window.onQuestionAnswered = res; 
        });

        await playWords(45);
        await silence(15);
        await breathing();
    }
}

function start() {
    updateHUD();
    mainLoop();
    speak(lang === "en" ? "System online" : "Sistema en línea");
}

window.onload = start;
</script>
</body>
</html>
