<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AL CIELO - KAMIZEN BY MAY ROGA</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-gold: #f1c40f;
            --neon-red: #ff3131;
            --bg-dark: #050508;
            --neon-green: #2ecc71;
            --neon-orange: #ff8c00;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; overflow: hidden; background: var(--bg-dark); 
            color: white; font-family: 'Orbitron', sans-serif; touch-action: none; 
            height: 100vh; width: 100vw;
        }
        
        /* HUD & TIMERS */
        #hud {
            position: absolute; top: 10px; width: 100%;
            display: flex; justify-content: space-evenly;
            z-index: 1000; pointer-events: none; padding: 0 5px;
        }
        .data-box {
            background: rgba(0, 0, 0, 0.9); border: 1px solid var(--neon-blue);
            padding: 5px; text-align: center; flex: 1; margin: 0 3px; max-width: 110px;
        }
        .label { font-size: 8px; color: var(--neon-blue); letter-spacing: 1px; display: block; text-transform: uppercase; }
        .value { font-size: 14px; font-weight: 900; display: block; }
        #general-clock { position: absolute; bottom: 10px; right: 10px; color: var(--neon-gold); font-size: 12px; z-index: 1000; }
        #game-clock { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); color: var(--neon-red); font-size: 20px; font-weight: 900; z-index: 1000; }

        /* ESCENARIO PRINCIPAL */
        #stage {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 20px; z-index: 500; background: radial-gradient(circle, #111 0%, #000 100%);
        }

        #display-text { font-size: 1.5rem; font-weight: 900; color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); margin-bottom: 15px; width: 100%; }
        #sub-text { font-size: 1rem; color: #ccc; max-width: 600px; line-height: 1.4; overflow-y: auto; max-height: 30vh; }

        /* BOTONES INTERACTIVOS */
        .btn-core {
            padding: 15px 30px; background: var(--neon-blue); color: black; border: none;
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer; margin-top: 20px;
            text-transform: uppercase; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        #options-container { margin-top: 20px; display: grid; gap: 10px; width: 100%; max-width: 400px; }
        .btn-opt {
            padding: 12px; background: rgba(0,242,255,0.1); border: 1px solid var(--neon-blue);
            color: white; font-family: 'Orbitron'; font-size: 0.8rem; cursor: pointer; transition: 0.3s;
        }

        /* RESPIRACIÓN CIRCULAR */
        #breath-wrap { display: none; margin-top: 20px; position: relative; flex-direction: column; align-items: center; }
        #breath-circle {
            width: 140px; height: 140px; border: 5px solid var(--neon-blue);
            border-radius: 50%; transition: transform 2s ease-in-out;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px var(--neon-blue);
        }
        #breath-info { font-size: 0.75rem; color: var(--neon-gold); margin-top: 15px; max-width: 280px; font-style: italic; }

        /* JUEGO DE PALABRAS (GAMEPLAY) */
        #gameCanvas { position: fixed; inset: 0; display: none; z-index: 100; cursor: crosshair; }
        .skip-btn { position: absolute; bottom: 20px; left: 20px; font-size: 10px; opacity: 0.6; z-index: 2000; background: none; border: 1px solid white; color: white; padding: 5px; }

        /* INPUTS */
        input[type="text"] { background: transparent; border: 2px solid var(--neon-blue); color: white; padding: 10px; font-family: 'Orbitron'; text-align: center; outline: none; width: 80%; }
        .hidden { display: none !important; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="hud">
    <div class="data-box"><span class="label">NET WORTH</span><span id="stat-money" class="value">$0</span></div>
    <div class="data-box" style="border-color: var(--neon-gold);"><span class="label">SESSION</span><span id="stat-id" class="value">0</span></div>
    <div class="data-box" style="border-color: var(--neon-red);"><span class="label">STABILITY</span><span id="stat-health" class="value">100%</span></div>
</div>

<div id="stage">
    <div id="content-area">
        <h2 id="display-text">WELCOME TO AL CIELO</h2>
        <p id="sub-text">IDENTIFY YOURSELF TO INITIALIZE NEURO-TRAINING</p>
        <div id="input-wrap" style="margin-top: 20px;">
            <input type="text" id="client-name" placeholder="TYPE YOUR NAME">
        </div>
        <div id="options-container"></div>
        <button id="main-btn" class="btn-core">START TRAINING</button>
    </div>

    <div id="breath-wrap">
        <div id="breath-circle">
            <span id="breath-label" style="font-size: 0.9rem; font-weight: 900;">INHALE</span>
        </div>
        <div id="breath-info"></div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>
<div id="general-clock">MISSION TIME: 00:00</div>
<div id="game-clock" class="hidden">05:00</div>
<button class="skip-btn hidden" id="skip-btn">SKIP PHASE</button>

<script>
    // --- STATE ---
    let stats = { money: 0, health: 100, index: 0, name: "Explorer", wrongClicks: 0, totalGameTime: 0 };
    let sessionData = null;
    let totalSeconds = 0;
    let gameSeconds = 300;
    let isGameRunning = false;
    let synth = window.speechSynthesis;
    
    const ui = {
        text: document.getElementById('display-text'),
        sub: document.getElementById('sub-text'),
        mainBtn: document.getElementById('main-btn'),
        optCont: document.getElementById('options-container'),
        breath: document.getElementById('breath-wrap'),
        circle: document.getElementById('breath-circle'),
        label: document.getElementById('breath-label'),
        info: document.getElementById('breath-info'),
        canvas: document.getElementById('gameCanvas'),
        gClock: document.getElementById('general-clock'),
        gameClock: document.getElementById('game-clock'),
        skip: document.getElementById('skip-btn')
    };

    const ctx = ui.canvas.getContext('2d');
    let objects = [];

    // --- CORE UTILS ---
    const sleep = ms => new Promise(r => setTimeout(r, ms));
    
    function speak(text) {
        synth.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.rate = 0.8; // Voz pausada narrador
        msg.pitch = 0.9;
        msg.lang = 'en-US';
        synth.speak(msg);
    }

    function updateStats() {
        document.getElementById('stat-money').innerText = "$" + stats.money;
        document.getElementById('stat-health').innerText = stats.health + "%";
        document.getElementById('stat-id').innerText = stats.index;
    }

    // --- SYSTEM FLOW (PIES, CUERPO, MANOS, CABEZA) ---
    ui.mainBtn.onclick = async () => {
        const nameInput = document.getElementById('client-name').value;
        if(nameInput) stats.name = nameInput;
        document.getElementById('input-wrap').classList.add('hidden');
        ui.mainBtn.classList.add('hidden');
        startGeneralClock();
        await runFullFlow();
    };

    function startGeneralClock() {
        setInterval(() => {
            totalSeconds++;
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            ui.gClock.innerText = `MISSION TIME: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }, 1000);
    }

    async function runFullFlow() {
        // Fetch Inicial
        const res = await fetch('/api/session/start');
        sessionData = await res.json();
        stats.index = sessionData.index;
        updateStats();

        // 1. STORIES (Cuerpo - Narración)
        await playPhaseStory();
        
        // 2. JUEGO 1 (Manos - 5 min)
        await runWordGame(300);

        // 3. MISSIONS (Cabeza - Misiones, Decisiones, Respiración)
        await playPhaseMissions();

        // 4. JUEGO 2 (Manos - 5 min)
        await runWordGame(300);

        // 5. DIAGNÓSTICO (Cabeza - Final)
        await showFinalDiagnostic();
    }

    // --- PHASE: STORIES ---
    async function playPhaseStory() {
        ui.text.innerText = sessionData.story.t;
        ui.sub.innerText = sessionData.story.en;
        speak(sessionData.story.en);
        
        await sleep(5000); 
        ui.mainBtn.innerText = "CONTINUE";
        ui.mainBtn.classList.remove('hidden');
        return new Promise(resolve => {
            ui.mainBtn.onclick = () => {
                ui.mainBtn.classList.add('hidden');
                resolve();
            }
        });
    }

    // --- PHASE: MISSIONS (Logística de JSON) ---
    async function playPhaseMissions() {
        const blocks = sessionData.missions[0].b;
        for (const block of blocks) {
            await processMissionBlock(block);
        }
    }

    async function processMissionBlock(block) {
        ui.optCont.innerHTML = "";
        ui.breath.style.display = "none";
        ui.sub.innerText = "";

        if (block.t === 'v' || block.t === 'h') {
            ui.text.innerText = block.tx.en;
            speak(block.tx.en);
            await sleep(4000);
        } 
        else if (block.t === 'story') {
            ui.text.innerText = "KNOWLEDGE BLOCK";
            ui.sub.innerText = block.en || block.story.en;
            speak(ui.sub.innerText);
            await sleep(6000);
        }
        else if (block.t === 'd') { // Decisiones con 4 colores
            ui.text.innerText = block.q.en;
            speak(block.q.en);
            return new Promise(resolve => {
                block.op.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-opt';
                    btn.innerText = opt;
                    btn.onclick = () => {
                        const isCorrect = idx === block.c;
                        // Lógica de colores según precisión
                        if(isCorrect) { btn.style.backgroundColor = 'var(--neon-green)'; stats.money += 1000; }
                        else if(idx === 0) { btn.style.backgroundColor = 'var(--neon-red)'; stats.health -= 20; }
                        else if(idx === 1) { btn.style.backgroundColor = 'var(--neon-orange)'; stats.health -= 10; }
                        else { btn.style.backgroundColor = '#f1c40f'; stats.health -= 5; } // Amarillo
                        
                        ui.sub.innerText = block.ex[idx];
                        speak(block.ex[idx]);
                        updateStats();
                        
                        ui.mainBtn.innerText = "NEXT ACTION";
                        ui.mainBtn.classList.remove('hidden');
                        ui.mainBtn.onclick = () => { ui.mainBtn.classList.add('hidden'); resolve(); };
                    };
                    ui.optCont.appendChild(btn);
                });
            });
        }
        else if (block.t === 'br' || block.t === 'breath_auto' || block.t === 'sil') {
            ui.text.innerText = block.t === 'sil' ? "CALM & SILENCE" : "BREATHING SHIELD";
            ui.breath.style.display = "flex";
            
            // Explicaciones científicas variables para evitar dogmas
            const tips = [
                "Oxygenating the prefrontal cortex improves decision making.",
                "Slowing the breath signals safety to your nervous system.",
                "Deep exhales activate the Vagus nerve for instant calm.",
                "Focusing on air flow reduces cortisol levels by 20%."
            ];
            ui.info.innerText = tips[Math.floor(Math.random()*tips.length)];
            
            let d = Math.max(block.d || 19, 19); 
            for(let i=0; i < d/4; i++) {
                ui.label.innerText = "INHALE";
                ui.circle.style.transform = "scale(1.4)";
                await sleep(2000);
                ui.label.innerText = "EXHALE";
                ui.circle.style.transform = "scale(1.0)";
                await sleep(2000);
            }
        }
    }

    // --- PHASE: WORD GAME (Core de 5 min) ---
    async function runWordGame(duration) {
        ui.canvas.style.display = "block";
        ui.gameClock.classList.remove('hidden');
        ui.skip.classList.remove('hidden');
        isGameRunning = true;
        gameSeconds = duration;

        const loop = setInterval(() => {
            if(!isGameRunning) return;
            gameSeconds--;
            const m = Math.floor(gameSeconds/60);
            const s = gameSeconds % 60;
            ui.gameClock.innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if(gameSeconds <= 0) endGame();
        }, 1000);

        function spawn() {
            if(!isGameRunning) return;
            const words = [
                {t: "TRUTH", p: true}, {t: "FOCUS", p: true}, {t: "CALM", p: true},
                {t: "LIES", p: false}, {t: "CHAOS", p: false}, {t: "ANXIETY", p: false}
            ];
            const w = words[Math.floor(Math.random()*words.length)];
            objects.push({
                text: w.t, pos: w.p,
                x: Math.random()*ui.canvas.width, y: -50,
                s: 2 + Math.random()*3
            });
            setTimeout(spawn, 1000);
        }
        spawn();
        gameAnimate();

        return new Promise(resolve => {
            ui.skip.onclick = () => endGame();
            function endGame() {
                clearInterval(loop);
                isGameRunning = false;
                ui.canvas.style.display = "none";
                ui.gameClock.classList.add('hidden');
                ui.skip.classList.add('hidden');
                objects = [];
                resolve();
            }
        });
    }

    function gameAnimate() {
        if(!isGameRunning) return;
        ctx.fillStyle = 'rgba(5,5,8,0.3)';
        ctx.fillRect(0,0,ui.canvas.width, ui.canvas.height);

        objects.forEach((obj, i) => {
            obj.y += obj.s;
            ctx.fillStyle = obj.pos ? 'var(--neon-blue)' : 'var(--neon-red)';
            ctx.font = "900 18px Orbitron";
            ctx.fillText(obj.text, obj.x, obj.y);

            // Laser effect
            ctx.strokeStyle = 'rgba(0,242,255,0.1)';
            ctx.beginPath(); ctx.moveTo(obj.x, obj.y); ctx.lineTo(window.innerWidth/2, window.innerHeight); ctx.stroke();
        });
        requestAnimationFrame(gameAnimate);
    }

    // Interacción - Penalización 3 errores
    window.addEventListener('mousedown', (e) => {
        if(!isGameRunning) return;
        objects.forEach((obj, i) => {
            const d = Math.sqrt((e.clientX-obj.x)**2 + (e.clientY-obj.y)**2);
            if(d < 40) {
                if(!obj.pos) {
                    stats.wrongClicks++;
                    if(stats.wrongClicks >= 3) triggerStopPenalty();
                } else {
                    stats.money += 250;
                    updateStats();
                }
                objects.splice(i, 1);
            }
        });
    });

    async function triggerStopPenalty() {
        isGameRunning = false;
        stats.wrongClicks = 0;
        const currentMsg = "Distraction detected. Negativity affects your balance. Sign this commitment to reclaim your path.";
        ui.text.innerText = "STABILITY WARNING";
        ui.sub.innerText = currentMsg;
        speak(currentMsg);
        
        ui.optCont.innerHTML = '<button class="btn-core" id="sign-btn">I COMMIT AND WILL REJOIN</button>';
        document.getElementById('sign-btn').onclick = () => {
            ui.optCont.innerHTML = "";
            isGameRunning = true;
            gameAnimate();
        };
    }

    // --- FINAL DIAGNOSTIC ---
    async function showFinalDiagnostic() {
        ui.text.innerText = "NEURO-DIAGNOSTIC COMPLETE";
        let feedback = stats.health > 80 ? "HIGH STABILITY DETECTED. You are a natural protector." : "STABILITY MODERATE. You must strengthen your mental shield.";
        
        ui.sub.innerText = `${stats.name}, ${feedback} \n\nScientific Fact: Box Breathing (4-4-4-4) lowers heart rate in 60 seconds. This builds confidence and safety for children and seniors alike.`;
        speak(ui.sub.innerText);
        
        ui.mainBtn.innerText = "RESTART SYSTEM";
        ui.mainBtn.classList.remove('hidden');
        ui.mainBtn.onclick = () => {
            // Limpieza total antes de reiniciar
            sessionStorage.clear();
            location.reload();
        };
    }

    // --- RESPONSIVE ADJUSTMENTS ---
    window.onresize = () => {
        ui.canvas.width = window.innerWidth;
        ui.canvas.height = window.innerHeight;
    };
    window.onresize();
</script>
</body>
</html>
