<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KAMIZEN LIFE SYSTEM - CORE SESSION</title>

<style>

:root{
    --bg:#08111f;
    --card:rgba(15,23,42,0.88);
    --primary:#3b82f6;
    --success:#22c55e;
    --danger:#ef4444;
    --warning:#f59e0b;
    --yellow:#eab308;
    --text:#ffffff;
    --dim:#cbd5e1;
}

*{
    box-sizing:border-box;
}

html,
body{
    margin:0;
    padding:0;
    min-height:100vh;
    overflow-x:hidden;

    font-family:Segoe UI, Arial, sans-serif;
    color:var(--text);

    background:#000;
}

/* =========================
   LIGHTWEIGHT BACKGROUND
========================= */

body::before{
    content:"";
    position:fixed;
    inset:0;

    background-image:
        url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1600");

    background-size:cover;
    background-position:center;

    filter:brightness(0.45);

    z-index:-2;

    animation:bgMove 20s ease-in-out infinite alternate;
}

body::after{
    content:"";
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.35);

    z-index:-1;
}

@keyframes bgMove{
    0%{
        transform:scale(1);
    }
    100%{
        transform:scale(1.08);
    }
}

/* =========================
   APP
========================= */

#app{
    width:100%;
    max-width:720px;
    margin:auto;
    padding:18px;
}

/* =========================
   CARD SYSTEM
========================= */

.card{
    background:var(--card);

    padding:22px;

    border-radius:18px;

    margin:15px 0;

    border:1px solid rgba(255,255,255,0.06);

    box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

/* =========================
   TEXT
========================= */

h1,h2,h3{
    margin:10px 0;
    font-weight:800;
    line-height:1.3;
}

p{
    line-height:1.7;
    font-size:18px;
    color:#f8fafc;
    font-weight:600;
}

.small{
    font-size:13px;
    color:var(--dim);
}

.center{
    text-align:center;
}

/* =========================
   BUTTONS
========================= */

button{
    width:100%;

    padding:15px;

    border:none;

    border-radius:14px;

    background:var(--primary);

    color:white;

    font-weight:800;

    font-size:16px;

    cursor:pointer;

    margin-top:12px;

    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

/* =========================
   ANSWERS
========================= */

.answer{
    background:#1e293b;

    padding:16px;

    margin:10px 0;

    border-radius:12px;

    cursor:pointer;

    border-left:5px solid var(--primary);

    transition:.2s;

    font-weight:700;

    font-size:17px;
}

.answer:hover{
    transform:translateX(5px);

    background:#334155;
}

/* =========================
   BREATHING
========================= */

.breath-circle{
    width:160px;
    height:160px;

    border-radius:50%;

    margin:30px auto;

    border:4px solid var(--primary);

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:22px;

    font-weight:900;

    background:rgba(59,130,246,0.15);

    animation:breathe 6s infinite ease-in-out;
}

@keyframes breathe{

    0%{
        transform:scale(0.85);
        opacity:0.75;
    }

    50%{
        transform:scale(1.2);
        opacity:1;
        border-color:var(--success);
    }

    100%{
        transform:scale(0.85);
        opacity:0.75;
    }
}

/* =========================
   SILENCE
========================= */

.silence-timer{
    font-size:32px;
    font-weight:900;
    color:#facc15;
    margin-top:15px;
}

/* =========================
   RESULT COLORS
========================= */

.correct{
    color:var(--success);
}

.wrong{
    color:var(--danger);
}

.mid{
    color:var(--yellow);
}

.warning{
    color:var(--warning);
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<div id="app">

    <!-- STATIC HEADER -->

    <div class="card center">

        <h2 style="color:var(--primary);">
            KAMIZEN LIFE SYSTEM
        </h2>

        <p class="small">
            BODY • CALM • FOCUS • PRESENCE
        </p>

        <p class="small">
            Stories + Missions Active
        </p>

    </div>

    <!-- ENGINE RENDER -->

    <div id="screen" class="card">

        <h3>Loading system...</h3>

        <p class="small">
            Initializing stories & missions
        </p>

    </div>

    <!-- OPTIONAL BREATH VISUAL -->

    <div class="card center">

        <h3>Breathing Module</h3>

        <div class="breath-circle">

            <span>FOCUS</span>

        </div>

        <p class="small">
            Automatic regulation system
        </p>

    </div>

</div>

<!-- ENGINE -->

<script src="/static/js/engine.js"></script>

</body>
</html>
