<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAMIZEN LIFE SYSTEM</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #0b0f1a;
    color: #fff;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

#startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0b0f1a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    z-index: 10;
}

input {
    padding: 10px;
    font-size: 18px;
    border: none;
    outline: none;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
}

#timer {
    position: absolute;
    top: 10px;
    right: 10px;
}

#centerText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    text-align: center;
    font-size: 24px;
    width: 80%;
}

.word {
    position: absolute;
    color: #00f2ff;
    font-size: 18px;
    animation: float 5s linear forwards;
}

@keyframes float {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-200px); opacity: 0; }
}
</style>
</head>

<body>

<div id="startScreen">
    <h1>KAMIZEN LIFE SYSTEM</h1>
    <input id="nameInput" placeholder="Enter your name">
    <button onclick="startApp()">START</button>
</div>

<div id="timer"></div>
<div id="centerText"></div>

<script>

let missionIndex = parseInt(localStorage.getItem("mission_index") || "1");
let userName = localStorage.getItem("kamizen_name") || "";

if(userName){
    document.getElementById("nameInput").value = userName;
}

/* =========================
   START
========================= */
function startApp(){

    const name = document.getElementById("nameInput").value;

    if(!name) return;

    userName = name;
    localStorage.setItem("kamizen_name", userName);

    document.getElementById("startScreen").style.display = "none";

    bootEngine();
}

/* =========================
   ENGINE BOOT
========================= */
async function bootEngine(){

    try{
        await cycle();
    }catch(e){
        console.log("ENGINE ERROR:", e);
        setTimeout(bootEngine, 2000);
    }
}

/* =========================
   MAIN LOOP
========================= */
async function cycle(){

    missionIndex = parseInt(localStorage.getItem("mission_index") || "1");

    const data = await fetchData(missionIndex);

    if(!data){
        nextIndex();
        return cycle();
    }

    await showStory(data.story);
    await floatingGame(300);

    await showMission(data.mission);
    await floatingGame(300);

    await breathingPhase(missionIndex);

    nextIndex();

    return cycle();
}

/* =========================
   FETCH FROM FLASK
========================= */
async function fetchData(index){

    const res = await fetch(`/api/session/data/${index}`);

    if(!res.ok) return null;

    return await res.json();
}

/* =========================
   STORY
========================= */
function showStory(story){

    return new Promise(resolve => {

        document.getElementById("centerText").innerText =
            story?.story?.en || "..."

        setTimeout(()=>{
            document.getElementById("centerText").innerText = "";
            resolve();
        }, 5000);
    });
}

/* =========================
   MISSION
========================= */
function showMission(mission){

    return new Promise(resolve => {

        document.getElementById("centerText").innerText =
            mission?.b?.[0]?.tx?.en || "MISSION";

        setTimeout(()=>{
            document.getElementById("centerText").innerText = "";
            resolve();
        }, 5000);
    });
}

/* =========================
   FLOATING GAME
========================= */
function floatingGame(duration){

    return new Promise(resolve => {

        let t = duration;

        const loop = setInterval(()=>{

            t--;

            document.getElementById("timer").innerText = t;

            spawnWord();

            if(t <= 0){
                clearInterval(loop);
                resolve();
            }

        },1000);
    });
}

/* =========================
   WORDS
========================= */
function spawnWord(){

    const words = ["FOCUS","CALM","TRUTH","CONTROL","AWARENESS","DISCIPLINE"];

    const el = document.createElement("div");
    el.className = "word";
    el.innerText = words[Math.floor(Math.random()*words.length)];

    el.style.left = Math.random()*window.innerWidth + "px";
    el.style.top = Math.random()*window.innerHeight + "px";

    document.body.appendChild(el);

    setTimeout(()=>el.remove(), 5000);
}

/* =========================
   BREATH + SILENCE
========================= */
function breathingPhase(index){

    return new Promise(resolve => {

        let silence = Math.min(30 + (index * 5), 180);
        let t = 30;

        const b = setInterval(()=>{

            t--;

            document.getElementById("centerText").innerText =
                (t % 2 === 0) ? "INHALE" : "EXHALE";

            if(t <= 0){
                clearInterval(b);
                startSilence(silence, resolve);
            }

        },1000);
    });
}

/* =========================
   SILENCE
========================= */
function startSilence(seconds, resolve){

    let t = seconds;

    document.getElementById("centerText").innerText = "SILENCE";

    const s = setInterval(()=>{

        t--;
        document.getElementById("timer").innerText = t;

        if(t <= 0){
            clearInterval(s);
            resolve();
        }

    },1000);
}

/* =========================
   INDEX CONTROL
========================= */
function nextIndex(){

    let i = parseInt(localStorage.getItem("mission_index") || "1");

    i++;

    if(i > 35) i = 1;

    localStorage.setItem("mission_index", i);
}

</script>

</body>
</html>
