<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KAMIZEN LIFE SYSTEM - CORE SESSION</title>

<style>

/* =========================
   BACKGROUND SYSTEM (NEW)
========================= */

body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
}

#bg-container {
    position: fixed;
    inset: 0;
    z-index: -2;
}

.slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
    filter: brightness(0.6) contrast(1.1);
}

.slide.active {
    opacity: 1;
}

.vignette {
    position: fixed;
    inset: 0;
    z-index: -1;
    box-shadow: inset 0 0 180px rgba(0,0,0,0.75);
    pointer-events: none;
}

/* =========================
   ROOT
========================= */

:root{
    --bg:#0b1220;
    --card:#111a2e;
    --primary:#3b82f6;
    --success:#22c55e;
    --danger:#ef4444;
    --warning:#f59e0b;
    --mid:#fbbf24;
    --text:#ffffff;
    --dim:#94a3b8;
}

/* =========================
   GLOBAL
========================= */

*{
    box-sizing:border-box;
}

body{
    font-family:Segoe UI, Arial, sans-serif;
    color:var(--text);
}

/* =========================
   APP LAYOUT
========================= */

#app{
    position:relative;
    z-index:2;
    width:100%;
    max-width:720px;
    margin:auto;
    padding:20px;
}

/* =========================
   CARD SYSTEM (STRONG TEXT)
========================= */

.card{
    background:rgba(17,26,46,0.88);
    backdrop-filter: blur(8px);
    padding:22px;
    border-radius:18px;
    margin:15px 0;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1,h2,h3,p{
    font-weight:700;
    letter-spacing:0.3px;
}

/* =========================
   BUTTONS
========================= */

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:var(--primary);
    color:white;
    font-weight:800;
    cursor:pointer;
    transition:0.2s;
    margin-top:10px;
}

button:hover{
    transform:scale(1.02);
}

/* =========================
   ANSWERS (NEW COLOR SYSTEM)
========================= */

.answer{
    padding:14px;
    margin:10px 0;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
    font-weight:700;
    border-left:5px solid var(--primary);
    background:#1f2937;
}

.answer:hover{
    transform:translateX(6px);
}

/* engine puede cambiar color inline, pero fallback */

.answer.correct{ border-left-color: var(--success); }
.answer.wrong{ border-left-color: var(--danger); }
.answer.mid{ border-left-color: var(--mid); }
.answer.warning{ border-left-color: var(--warning); }

/* =========================
   BREATHING
========================= */

.breath-circle{
    width:150px;
    height:150px;
    border-radius:50%;
    margin:30px auto;
    border:4px solid var(--primary);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
}

/* =========================
   SMALL TEXT
========================= */

.small{
    font-size:13px;
    color:var(--dim);
}

/* =========================
   SILENCE MODE VISUAL
========================= */

.silence{
    text-align:center;
    font-size:18px;
    padding:20px;
    color:var(--warning);
    font-weight:800;
}

.timer{
    font-size:22px;
    font-weight:900;
    margin-top:10px;
}

/* =========================
   UTIL
========================= */

.center{
    text-align:center;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<!-- =========================
     BACKGROUND SYSTEM
========================= -->

<div id="bg-container">
    <div id="slide1" class="slide active"></div>
    <div id="slide2" class="slide"></div>
</div>

<div class="vignette"></div>

<!-- =========================
     APP
========================= -->

<div id="app">

    <!-- HEADER STATIC (NO TOCAR ENGINE) -->
    <div class="card center">
        <h2 style="color:var(--primary);">
            KAMIZEN LIFE SYSTEM
        </h2>

        <p class="small">
            BODY • CALM • FOCUS • PRESENCE
        </p>

        <p class="small">
            Stories + Missions Active
        </p>
    </div>

    <!-- START PLACEHOLDER (ENGINE REPLACES) -->
    <div class="card center">
        <h3>Initializing System...</h3>
        <p class="small">Waiting engine.js</p>
    </div>

</div>

<!-- =========================
     ENGINE
========================= -->

<script src="/static/js/engine.js"></script>

<!-- =========================
     BACKGROUND ROTATOR
========================= -->

<script>
const slide1 = document.getElementById("slide1");
const slide2 = document.getElementById("slide2");

let current = slide1;

const keywords = [
    "nature", "forest", "sky", "mountains",
    "galaxy", "ocean", "calm", "sunset"
];

function newImage(){
    const key = keywords[Math.floor(Math.random() * keywords.length)];
    return `https://source.unsplash.com/1920x1080/?${key}&sig=${Math.random()}`;
}

slide1.style.backgroundImage = `url('${newImage()}')`;
slide2.style.backgroundImage = `url('${newImage()}')`;

function changeBG(){

    const next = (current === slide1) ? slide2 : slide1;

    next.style.backgroundImage = `url('${newImage()}')`;

    setTimeout(() => {
        current.classList.remove("active");
        next.classList.add("active");
        current = next;
    }, 500);
}

setInterval(changeBG, 4000);
</script>

</body>
</html>
