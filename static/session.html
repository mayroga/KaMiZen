<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO: TOTAL LIFE TRAINING</title>

<style>
:root {
    --neon-blue:#00f2ff;
    --neon-green:#00ff41;
    --neon-red:#ff003c;
    --neon-yellow:#ffff00;
    --matrix-bg:#00050a;
    --neon-gold:#ffcc00;
}

body{margin:0;background:var(--matrix-bg);color:#fff;font-family:'Courier New',monospace;overflow:hidden;}

.correct-flash{background:#002a00!important;}
.wrong-flash{background:#2a0000!important;}

.opt-green{border:3px solid var(--neon-green)!important;color:var(--neon-green)!important;}
.opt-red{border:3px solid var(--neon-red)!important;color:var(--neon-red)!important;}

#lang-btn{
position:fixed;bottom:20px;right:20px;z-index:999;
padding:10px 18px;border:2px solid var(--neon-blue);
background:rgba(0,0,0,0.8);color:var(--neon-blue);cursor:pointer;
}

#hud{
position:fixed;top:20px;width:100%;
display:flex;justify-content:space-between;padding:20px;
}

#timer-box{font-size:2.5rem;color:var(--neon-blue);}
#score-box{border:3px solid #fff;padding:8px 20px;}

#life-stats{
position:fixed;bottom:20px;left:20px;
display:flex;flex-wrap:wrap;gap:12px;
}

.stat-pill{
border:2px solid #333;padding:10px 15px;
background:rgba(0,0,0,0.9);
}

#v-money{color:var(--neon-gold)!important;}
#v-safety{color:var(--neon-red)!important;}
#v-happy{color:#ff00ff!important;}

.floating{
position:absolute;padding:15px 30px;font-weight:900;
font-size:1.4rem;border-radius:10px;background:#000;
animation:floatUp 7s linear forwards;cursor:pointer;
}

.word-power{border:3px solid var(--neon-green);color:var(--neon-green);}
.word-risk{border:3px solid var(--neon-red);color:var(--neon-red);}
.word-silence{border:3px solid var(--neon-yellow);color:var(--neon-yellow);}
.word-money{border:3px solid var(--neon-gold);color:var(--neon-gold);}
.word-business{border:3px solid #00e5ff;color:#00e5ff;}
.word-growth{border:3px solid #00ff99;color:#00ff99;}

@keyframes floatUp{
from{transform:translateY(110vh);}
to{transform:translateY(-25vh);}
}

.explode{animation:blast 0.5s ease-out forwards!important;}
@keyframes blast{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(4);opacity:0;}
}

#overlay{
position:fixed;width:100%;height:100%;
background:rgba(0,5,10,0.95);
display:none;flex-direction:column;
align-items:center;justify-content:center;
text-align:center;padding:30px;
}

#decision-grid{
display:grid;grid-template-columns:1fr 1fr;
gap:20px;margin-top:30px;
}

.choice-btn{
padding:22px;border:3px solid var(--neon-blue);
background:none;color:#fff;cursor:pointer;
}

#continue-btn{
margin-top:20px;padding:15px 30px;
border:2px solid #fff;display:none;
}
</style>
</head>

<body>

<button id="lang-btn">EN</button>

<div id="hud">
<div id="timer-box">05:00</div>
<div id="score-box">0</div>
</div>

<div id="life-stats">
<div class="stat-pill">Respect: <span id="v-respect">50</span></div>
<div class="stat-pill">Peace: <span id="v-peace">50</span></div>
<div class="stat-pill">Leadership: <span id="v-lead">50</span></div>
<div class="stat-pill">Money: $<span id="v-money">100</span></div>
<div class="stat-pill">Safety: <span id="v-safety">100</span>%</div>
<div class="stat-pill">Happiness: <span id="v-happy">50</span>%</div>
</div>

<div id="overlay">
<h1 id="phase-title"></h1>
<p id="phase-desc"></p>
<div id="decision-grid"></div>
<button id="continue-btn">CONTINUE</button>
</div>

<script>

/* =========================
GLOBAL STATE
========================= */
let lang="en";
let gameMode="words";

let state={
score:0,
timer:300,
stats:{respect:50,peace:50,lead:50,money:100,happy:50,safety:100},
spawnRate:1200
};

/* =========================
LANG FULL SWITCH
========================= */
function applyLang(){
document.getElementById("lang-btn").innerText=lang.toUpperCase();

const labels={
en:["Respect","Peace","Leadership","Money","Safety","Happiness"],
es:["Respeto","Paz","Liderazgo","Dinero","Seguridad","Felicidad"]
};

document.querySelectorAll(".stat-pill").forEach((el,i)=>{
el.childNodes[0].nodeValue=labels[lang][i]+": ";
});
}

document.getElementById("lang-btn").onclick=()=>{
lang=(lang==="en")?"es":"en";
applyLang();
};

/* =========================
HUD
========================= */
function updateHUD(){
document.getElementById("score-box").innerText=state.score;
let m=Math.floor(state.timer/60);
let s=state.timer%60;
document.getElementById("timer-box").innerText=`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
for(let k in state.stats){
let el=document.getElementById("v-"+k);
if(el)el.innerText=state.stats[k];
}
}

/* =========================
WORDS FULL SYSTEM (EXPLODE + STATS + +21/-20)
========================= */
const words={
power:["LISTEN","CALM","CONTROL","RESPECT"],
risk:["ANGER","RUSH","IMPULSE"],
silence:["OBSERVE","WAIT","BREATHE"],
money:["INVEST","SAVE","VALUE"],
business:["BUILD","SELL","LEAD"],
growth:["LEARN","IMPROVE","FOCUS"]
};

function spawnWord(){

if(gameMode!=="words")return;

const cats=Object.keys(words);
const c=cats[Math.floor(Math.random()*cats.length)];

let div=document.createElement("div");
div.className="floating word-"+c;
div.innerText=words[c][Math.floor(Math.random()*words[c].length)];

let x=Math.random()*80,y=110,dx=(Math.random()*2-1)*0.4;

function move(){
x+=dx;
y-=0.6;
if(x<0||x>90)dx*=-1;
div.style.left=x+"vw";
div.style.top=y+"vh";
requestAnimationFrame(move);
}
move();

div.onclick=()=>{
if(div.dataset.done)return;
div.dataset.done=1;

div.classList.add("explode");

let positive=["power","silence","money","business","growth"].includes(c);

if(positive){
state.score+=21;
}else{
state.score-=20;
}

/* STATS MOVE */
if(c==="money")state.stats.money++;
if(c==="business")state.stats.lead++;
if(c==="growth")state.stats.happy++;
if(c==="power")state.stats.respect++;
if(c==="risk")state.stats.safety--;
if(c==="silence")state.stats.peace++;

updateHUD();
};

document.body.appendChild(div);
setTimeout(()=>div.remove(),7000);
}

/* =========================
JSON ENGINE REAL (USING YOUR STRUCTURE)
========================= */
async function triggerQuestion(){

const res=await fetch("/api/mission/next?lang="+lang);
const data=await res.json();
if(!data||!data.b)return;

let overlay=document.getElementById("overlay");
let grid=document.getElementById("decision-grid");
let title=document.getElementById("phase-title");
let desc=document.getElementById("phase-desc");
let cont=document.getElementById("continue-btn");

overlay.style.display="flex";
grid.innerHTML="";
cont.style.display="none";

let story="";
let decision=null;

/* PARSE BLOCKS EXACT */
data.b.forEach(x=>{
if(x.story)story=x.story[lang];
if(x.t==="d")decision=x;
});

/* TITLE */
title.innerText=data.cat||"MISSION";
desc.innerText=story;

/* OPTIONS */
let answered=false;

decision.op.forEach((op,i)=>{

let btn=document.createElement("button");
btn.className="choice-btn";

/* bilingual split */
let parts=op.split(" / ");
btn.innerText=(lang==="es"&&parts[1])?parts[1]:parts[0];

btn.onclick=()=>{

if(answered)return;
answered=true;

let correct=i===decision.c;

btn.classList.add(correct?"opt-green":"opt-red");

desc.innerText=decision.ex[i];

state.score+=correct?30:-20;

/* FLASH */
document.body.classList.add(correct?"correct-flash":"wrong-flash");
setTimeout(()=>document.body.classList.remove("correct-flash","wrong-flash"),400);

updateHUD();

cont.style.display="block";
};

grid.appendChild(btn);
});

cont.onclick=()=>overlay.style.display="none";
}

/* =========================
LOOP
========================= */
setInterval(()=>{
if(state.timer>0&&gameMode==="words"){
state.timer--;
updateHUD();
}
},1000);

async function mainLoop(){
while(true){

state.timer=300;
gameMode="words";

let end=Date.now()+45000;

while(Date.now()<end){
spawnWord();
await new Promise(r=>setTimeout(r,state.spawnRate));
}

document.querySelectorAll(".floating").forEach(e=>e.remove());

gameMode="question";
await triggerQuestion();

await new Promise(r=>setTimeout(r,3000));
}
}

/* INIT */
applyLang();
updateHUD();
mainLoop();

</script>

</body>
</html>
