<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KaMiZen</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Inter',sans-serif;
}

body{
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
transition:background 1s;
}

#app{
width:95%;
max-width:420px;
background:#111827;
border-radius:25px;
padding:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
display:flex;
flex-direction:column;
align-items:center;
overflow:hidden;
}

#logo{
font-size:28px;
font-weight:600;
margin-bottom:4px;
letter-spacing:2px;
background:linear-gradient(90deg,#60a5fa,#a78bfa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

#subtitle{
font-size:13px;
opacity:0.7;
margin-bottom:10px;
}

/* PANEL */

#mental-panel{
width:100%;
background:#020617;
padding:10px;
border-radius:12px;
margin-bottom:10px;
font-size:13px;
}

.stat{
margin:5px 0;
}

.bar{
height:6px;
background:#1e293b;
border-radius:10px;
margin-top:3px;
overflow:hidden;
}

.bar-fill{
height:6px;
background:#22c55e;
border-radius:10px;
width:30%;
max-width:100%;
}

/* BLOQUE */

#block{
font-size:18px;
line-height:1.5;
text-align:center;
margin:15px 0;
min-height:120px;
max-height:200px;
overflow:auto;
}

/* BOTONES */

button{
padding:12px;
margin:6px;
font-size:15px;
border:none;
border-radius:12px;
cursor:pointer;
background:#2563eb;
color:white;
width:100%;
max-width:260px;
}

button:hover{
background:#3b82f6;
}

.secondary{
background:#374151;
}

.breath-circle{
width:120px;
height:120px;
border-radius:50%;
background:radial-gradient(circle,#60a5fa,#2563eb);
margin:20px auto;
transition:transform 4s ease-in-out;
}

#footer{
margin-top:10px;
font-size:12px;
opacity:0.5;
}

</style>
</head>

<body>

<div id="app">

<div id="logo">KaMiZen</div>
<div id="subtitle">Entrenamiento mental estratégico</div>

<div id="mental-panel">

<div id="streak">Racha: 0</div>
<div id="level">Nivel: 1</div>

<div class="stat">Disciplina
<div class="bar"><div id="disciplina-bar" class="bar-fill"></div></div>
</div>

<div class="stat">Claridad
<div class="bar"><div id="claridad-bar" class="bar-fill"></div></div>
</div>

<div class="stat">Calma
<div class="bar"><div id="calma-bar" class="bar-fill"></div></div>
</div>

<div class="stat">Estrategia
<div class="bar"><div id="estrategia-bar" class="bar-fill"></div></div>
</div>

<div class="stat">Social
<div class="bar"><div id="social-bar" class="bar-fill"></div></div>
</div>

<div class="stat">Recursos
<div class="bar"><div id="recursos-bar" class="bar-fill"></div></div>
</div>

</div>

<div id="block">
Bienvenido a KaMiZen
</div>

<button id="start-btn">Iniciar sesión</button>
<button id="next-btn" style="display:none;">Siguiente</button>
<button id="restart-btn" class="secondary" style="display:none;">Reiniciar</button>

<div id="footer">Sesión diaria · Tvid + Estrategia</div>

</div>

<script src="/static/scripts.js"></script>

</body>
</html>
