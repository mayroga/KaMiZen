<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaMiZen: MATRIX TRAINING & LIFE SIM</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #00ff41;
            --neon-red: #ff003c;
            --neon-yellow: #ffff00;
            --matrix-bg: #00050a;
        }

        body {
            margin: 0;
            background: var(--matrix-bg);
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            user-select: none;
            height: 100vh;
        }

        /* --- HUD & STATS --- */
        #hud {
            position: fixed; top: 0; width: 100%;
            display: flex; justify-content: space-between;
            padding: 15px; z-index: 50;
            background: rgba(0,0,0,0.7);
            box-sizing: border-box;
            border-bottom: 1px solid #222;
        }

        .stat-pill { border: 1px solid #444; padding: 6px 12px; font-size: 0.8rem; border-radius: 4px; background: #000; }
        #timer-box { font-size: 1.5rem; color: var(--neon-blue); font-weight: bold; }

        #life-stats {
            position: fixed; bottom: 20px; left: 20px;
            display: flex; gap: 10px; z-index: 50; flex-wrap: wrap;
        }

        /* --- MECÁNICA DE PALABRAS --- */
        #game-container { width: 100%; height: 100vh; position: relative; }

        .floating {
            position: absolute; padding: 12px 24px; font-weight: 900; font-size: 1.2rem;
            border-radius: 8px; background: rgba(0,0,0,0.9); z-index: 10;
            cursor: pointer; transition: transform 0.1s;
            animation: floatUp 6s linear forwards;
            white-space: nowrap;
        }
        .word-power { border: 2px solid var(--neon-green); color: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }
        .word-risk { border: 2px solid var(--neon-red); color: var(--neon-red); box-shadow: 0 0 10px var(--neon-red); }
        .word-silence { border: 2px solid var(--neon-yellow); color: var(--neon-yellow); box-shadow: 0 0 10px var(--neon-yellow); }

        @keyframes floatUp { 
            from { transform: translateY(110vh); opacity: 1; } 
            to { transform: translateY(-20vh); opacity: 0; } 
        }

        /* --- MISSION OVERLAY (SOCIAL ENGINE) --- */
        #social-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,5,10,0.98); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px; text-align: center;
        }

        .scenario-card {
            max-width: 600px; border: 2px solid var(--neon-blue);
            padding: 40px; border-radius: 15px; background: #000;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        #scenario-desc { font-size: 1.2rem; line-height: 1.5; margin: 20px 0; color: #ccc; }

        .decision-grid {
            display: flex; flex-direction: column; gap: 12px; margin-top: 30px;
        }

        .btn-decision {
            padding: 15px; background: none; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); cursor: pointer; font-family: inherit;
            font-size: 1rem; transition: 0.3s; border-radius: 8px;
        }
        .btn-decision:hover { background: var(--neon-blue); color: #000; font-weight: bold; }

        #feedback-toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; display: none; border-radius: 8px; 
            font-weight: bold; z-index: 2000; text-align: center;
            max-width: 80%;
        }

        #explanation-text { font-size: 0.9rem; margin-top: 10px; font-weight: normal; }

        .blast { animation: blastOut 0.3s forwards; }
        @keyframes blastOut { to { transform: scale(2); opacity: 0; } }
    </style>
</head>
<body>

<div id="hud">
    <div id="timer-box">05:00</div>
    <div class="stat-pill" style="color:var(--neon-green)">MASTERY: <span id="mastery-lvl">x1</span></div>
    <div class="stat-pill">POINTS: <span id="score-box">0</span></div>
</div>

<div id="game-container"></div>

<div id="life-stats">
    <div class="stat-pill">Respect: <span id="stat-respect">50</span></div>
    <div class="stat-pill">Peace: <span id="stat-peace">50</span></div>
    <div class="stat-pill">Leadership: <span id="stat-lead">50</span></div>
</div>

<div id="feedback-toast">
    <div id="feedback-msg"></div>
    <div id="explanation-text"></div>
</div>

<div id="social-overlay">
    <div class="scenario-card">
        <h2 id="scenario-env" style="color:var(--neon-yellow); font-size:0.9rem; text-transform:uppercase; letter-spacing:2px;">SITUACIÓN</h2>
        <h1 id="scenario-title" style="color:var(--neon-blue);">TEMA DE MISIÓN</h1>
        <p id="scenario-desc">Descripción...</p>
        <div class="decision-grid" id="decision-container"></div>
    </div>
</div>

<audio id="hit" src="/static/sounds/glass.mp3"></audio>
<audio id="error" src="/static/sounds/trumpet.mp3"></audio>

<script src="/static/js/engine.js"></script>
</body>
</html>
