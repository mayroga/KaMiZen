<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KAMIZEN SESSION</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-gold: #f1c40f;
            --neon-red: #ff3131;
            --neon-green: #2ecc71;
            --bg-dark: #050508;
        }
        body { margin: 0; overflow: hidden; background: var(--bg-dark); color: white; font-family: 'Orbitron', sans-serif; cursor: none; touch-action: none; }
        
        #hud {
            position: absolute; top: 15px; width: 100%;
            display: flex; justify-content: space-evenly;
            z-index: 100; pointer-events: none;
        }
        .data-box {
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid var(--neon-blue);
            padding: 10px; text-align: center;
            min-width: 130px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }
        .label { font-size: 10px; color: var(--neon-blue); letter-spacing: 2px; font-weight: 900; display: block; }
        .value { font-size: 24px; font-weight: 900; display: block; }

        #timer-display {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: var(--neon-red); font-size: 35px; font-weight: 900; 
            text-shadow: 0 0 20px var(--neon-red); z-index: 100;
        }

        #overlay, #discipline-block, #story-box, #mission-box, #breathing-box {
            position: fixed; inset: 0; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; 
            text-align: center; padding: 20px;
        }

        #overlay { background: radial-gradient(circle, #111 0%, #000 100%); }
        #discipline-block { background: rgba(150, 0, 0, 0.98); display: none; z-index: 5000; }
        #story-box { background: black; display: none; z-index: 2000; }
        #mission-box { background: #000; display: none; z-index: 3000; }
        #breathing-box { background: black; display: none; z-index: 4000; }

        .btn-ui {
            padding: 20px 40px; background: var(--neon-blue); color: black;
            border: none; font-family: 'Orbitron'; font-weight: 900;
            cursor: pointer; letter-spacing: 3px; font-size: 1.1rem;
            box-shadow: 0 0 30px var(--neon-blue); margin: 15px;
            text-transform: uppercase;
        }

        #mission-options button {
            display: block; width: 80%; max-width: 500px;
            padding: 15px; margin: 10px auto; font-size: 1rem;
            background: transparent; border: 2px solid var(--neon-blue);
            color: white; font-family: 'Orbitron'; cursor: pointer;
        }

        #mission-explanation {
            margin-top: 20px; padding: 15px; font-size: 1.2rem;
            display: none; border-radius: 10px; font-weight: 900;
        }

        #breath-circle {
            width: 250px; height: 250px; border-radius: 50%;
            border: 8px solid var(--neon-blue);
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem; color: var(--neon-blue);
            transition: transform 2s ease-in-out;
            box-shadow: 0 0 50px var(--neon-blue);
        }
        
        #flash-alert { position: fixed; inset: 0; pointer-events: none; z-index: 50; opacity: 0; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="flash-alert"></div>
<div id="timer-display">TIME REMAINING: <span id="clock">27:00</span></div>

<div id="hud">
    <div class="data-box" style="border-color: var(--neon-gold);"><span class="label">NET WORTH</span><span id="val-money" class="value">$0</span></div>
    <div class="data-box" style="border-color: var(--neon-red);"><span class="label">STABILITY</span><span id="val-health" class="value">100%</span></div>
    <div class="data-box" style="border-color: var(--neon-blue);"><span class="label">LEVEL</span><span id="val-rank" class="value">1</span></div>
</div>

<div id="overlay">
    <h1 style="color: var(--neon-blue); letter-spacing: 15px; font-size: 60px; margin:0;">KAMIZEN</h1>
    <h2 style="color: var(--neon-gold); font-size: 18px; margin-bottom: 40px;">USA SURVIVAL SIMULATOR</h2>
    <button class="btn-ui" onclick="startGame()">INITIALIZE TRAINING</button>
</div>

<div id="story-box">
    <h2 id="story-text" style="font-size:28px; color:var(--neon-blue); max-width: 800px; line-height:1.5;"></h2>
    <button id="story-continue" class="btn-ui" style="display:none;">CONTINUE</button>
</div>

<div id="mission-box">
    <h2 id="mission-question"></h2>
    <div id="mission-options"></div>
    <div id="mission-explanation"></div>
    <button id="mission-next" class="btn-ui" style="display:none; background:white;">PROCEED</button>
</div>

<div id="breathing-box">
    <div id="breath-circle"><span id="breath-text">INHALA</span></div>
</div>

<div id="discipline-block">
    <h1 style="color: white; font-size: 50px;">HALTED</h1>
    <div id="dynamic-message" style="background: black; padding: 20px; border: 2px solid white; margin: 20px; font-weight: 900; color: var(--neon-gold);"></div>
    <button class="btn-ui" style="background:white;" onclick="resumeTraining()">I ACCEPT AND REJOIN</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let audioCtx, musicGain;

// CONFIGURACIÓN DE NIVELES (Velocidad reducida para aprendizaje)
const levels = [
    { name: "1", speedMult: 0.7, spawnRate: 1200, data: [
        { text: "TELLING TRUTH", type: "pos", impact: 300, color: "#2ecc71", freq: 523 },
        { text: "CLEAN ROOM", type: "pos", impact: 200, color: "#2ecc71", freq: 587 },
        { text: "SAYING SORRY", type: "pos", impact: 400, color: "#00f2ff", freq: 659 },
        { text: "SAVE MONEY", type: "pos", impact: 150, color: "#f1c40f", freq: 784 },
        { text: "LISTEN PARENTS", type: "pos", impact: 250, color: "#2ecc71", freq: 440 },
        { text: "HIDING TRUTH", type: "neg", impact: -100, color: "#ff3131", freq: 110 },
        { text: "MESSY ROOM", type: "neg", impact: -50, color: "#e67e22", freq: 90 },
        { text: "DISOBEDIENCE", type: "neg", impact: -150, color: "#ff3131", freq: 85 }
    ]},
    { name: "2", speedMult: 1.0, spawnRate: 1000, data: [
        { text: "TEAMWORK", type: "pos", impact: 600, color: "#2ecc71", freq: 783 },
        { text: "INVESTMENT", type: "pos", impact: 1000, color: "#f1c40f", freq: 880 },
        { text: "KNOW RIGHTS", type: "pos", impact: 800, color: "#f1c40f", freq: 750 },
        { text: "PEER PRESSURE", type: "neg", impact: -500, color: "#ff3131", freq: 120 },
        { text: "BULLYING", type: "neg", impact: -400, color: "#ff3131", freq: 70 },
        { text: "SOCIAL MEDIA TRAP", type: "neg", impact: -200, color: "#e67e22", freq: 150 }
    ]}
];

let stats = { money: 0, health: 100, currentLevelIdx: 0, totalSeconds: 27 * 60 };
let active = false;
let objects = [];
let particles = [];
let consecutiveErrors = 0;
const user = { x: 0, y: 0, size: 60 };

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

// SONIDOS Y MÚSICA (Dopamina alta)
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        musicGain = audioCtx.createGain();
        musicGain.gain.value = 0.4; // Música fuerte
        musicGain.connect(audioCtx.destination);
        playBackgroundBeat();
    }
}

function playBackgroundBeat() {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(50, audioCtx.currentTime);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.connect(g); g.connect(musicGain);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    setTimeout(playBackgroundBeat, 500);
}

function triggerSound(freq, type) {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type === 'pos' ? 'triangle' : 'sawtooth';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
}

// LOGICA DEL JUEGO BASE
function spawn() {
    if(!active) return;
    const lvl = levels[stats.currentLevelIdx] || levels[0];
    const data = lvl.data[Math.floor(Math.random() * lvl.data.length)];
    objects.push({
        ...data,
        x: Math.random() * (canvas.width - 300) + 150,
        y: -100,
        vx: (Math.random() - 0.5) * 3,
        speed: (2 + Math.random() * 2) * lvl.speedMult
    });
}

function update() {
    if(!active) return;
    stats.totalSeconds -= 1/60; 
    
    objects.forEach((obj, i) => {
        obj.y += obj.speed;
        obj.x += obj.vx + Math.sin(obj.y * 0.01) * 2;
        const d = Math.sqrt((obj.x - user.x)**2 + (obj.y - user.y)**2);
        if (d < user.size) {
            if (obj.type === 'neg') {
                stats.health -= 20;
                consecutiveErrors++;
                triggerSound(obj.freq, 'neg');
                if (consecutiveErrors >= 3) triggerDisciplineBlock();
            } else {
                stats.money += obj.impact;
                stats.health = Math.min(100, stats.health + 5);
                consecutiveErrors = 0;
                triggerSound(obj.freq, 'pos');
            }
            objects.splice(i, 1);
            updateHUD();
        }
        if(obj.y > canvas.height + 100) objects.splice(i, 1);
    });
}

function draw() {
    ctx.fillStyle = 'rgba(5, 5, 8, 0.4)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // User Glow
    ctx.shadowBlur = 20; ctx.shadowColor = "#00f2ff";
    ctx.strokeStyle = "#00f2ff"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(user.x, user.y, user.size - 20, 0, Math.PI * 2); ctx.stroke();

    objects.forEach(obj => {
        ctx.font = "900 22px Orbitron";
        ctx.fillStyle = obj.color;
        ctx.textAlign = "center";
        ctx.fillText(obj.text, obj.x, obj.y);
    });
}

function updateHUD() {
    document.getElementById('val-money').innerText = "$" + stats.money;
    document.getElementById('val-health').innerText = stats.health + "%";
    const m = Math.floor(Math.max(0, stats.totalSeconds) / 60);
    const s = Math.floor(Math.max(0, stats.totalSeconds) % 60);
    document.getElementById('clock').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
}

// =========================
// CONTROL DE SESIÓN (PHASES)
// =========================
let sessionData = null;
let currentMissionIdx = 0;

async function fetchSession(){
    try {
        const res = await fetch("/api/session/start");
        sessionData = await res.json();
    } catch(e) {
        // Fallback local para pruebas
        sessionData = {
            story: { en: "Welcome to Kamizen. Focus is your power." },
            missions: [{ b: [{ t:"d", q:{en:"Should you save money for your business?"}, op:["Yes","No"], c:0, exp:{en:"Saving builds your future stability."} }] }]
        };
    }
}

async function runStory(){
    return new Promise(resolve => {
        const box = document.getElementById("story-box");
        const text = document.getElementById("story-text");
        const btn = document.getElementById("story-continue");

        const story = sessionData.story.en;
        text.innerText = "";
        box.style.display = "flex";
        btn.style.display = "none";

        // TTS
        const msg = new SpeechSynthesisUtterance(story);
        msg.lang = "en-US";
        msg.onend = () => { btn.style.display = "block"; };
        
        // Efecto Typewriter
        let i = 0;
        const interval = setInterval(() => {
            text.innerText += story[i];
            i++;
            if(i >= story.length) clearInterval(interval);
        }, 40);

        window.speechSynthesis.speak(msg);

        btn.onclick = () => {
            box.style.display = "none";
            resolve();
        };
    });
}

async function runMission(){
    return new Promise(resolve => {
        const mission = sessionData.missions[currentMissionIdx % sessionData.missions.length];
        const decision = mission.b.find(x => x.t === "d");

        const box = document.getElementById("mission-box");
        const q = document.getElementById("mission-question");
        const ops = document.getElementById("mission-options");
        const exp = document.getElementById("mission-explanation");
        const next = document.getElementById("mission-next");

        q.innerText = decision.q.en;
        ops.innerHTML = "";
        exp.style.display = "none";
        next.style.display = "none";
        box.style.display = "flex";

        decision.op.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.innerText = opt;
            btn.onclick = () => {
                const isCorrect = (i === decision.c);
                btn.style.background = isCorrect ? "var(--neon-green)" : "var(--neon-red)";
                
                exp.innerText = decision.exp.en;
                exp.style.display = "block";
                exp.style.color = isCorrect ? "var(--neon-green)" : "var(--neon-red)";
                
                if(isCorrect) stats.money += 500;
                else stats.health -= 20;

                updateHUD();
                next.style.display = "block";
                Array.from(ops.children).forEach(b => b.disabled = true);
            };
            ops.appendChild(btn);
        });

        next.onclick = () => {
            currentMissionIdx++;
            box.style.display = "none";
            resolve();
        };
    });
}

async function runBreathing(){
    return new Promise(resolve => {
        const box = document.getElementById("breathing-box");
        const circle = document.getElementById("breath-circle");
        const txt = document.getElementById("breath-text");
        box.style.display = "flex";

        let cycles = 0;
        const totalCycles = 4; // 4 respiraciones (aprox 16 seg)

        const interval = setInterval(() => {
            if(cycles % 2 === 0) {
                circle.style.transform = "scale(1.5)";
                txt.innerText = "INHALA";
            } else {
                circle.style.transform = "scale(1)";
                txt.innerText = "EXHALA";
            }
            cycles++;
            if(cycles >= totalCycles * 2) {
                clearInterval(interval);
                box.style.display = "none";
                resolve();
            }
        }, 2000);
    });
}

async function runSessionLoop(){
    while(true){
        await fetchSession();
        await runStory();
        
        // Bloque de juego (5 min)
        active = true;
        await new Promise(r => setTimeout(r, 300000)); 
        active = false;

        await runMission();
        await runBreathing();
    }
}

function startGame() {
    initAudio();
    document.getElementById('overlay').style.display = 'none';
    
    setInterval(spawn, 1200);
    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    gameLoop();

    runSessionLoop();
}

// Input Control
const inputMove = e => { 
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    user.x = cx; user.y = cy; 
};
window.addEventListener('mousemove', inputMove);
window.addEventListener('touchmove', e => { inputMove(e); e.preventDefault(); }, {passive: false});

function triggerDisciplineBlock() {
    active = false;
    document.getElementById('dynamic-message').innerText = "STAY FOCUSED. DISCIPLINE IS FREEDOM.";
    document.getElementById('discipline-block').style.display = 'flex';
}

function resumeTraining() {
    consecutiveErrors = 0;
    document.getElementById('discipline-block').style.display = 'none';
    active = true;
}
</script>
</body>
</html>
