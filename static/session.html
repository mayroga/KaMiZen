<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>KaMiZen NeuroGame</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>KaMiZen NeuroGame</header>

<div class="container">
    <div class="left">
        <div class="box">
            <h2>Historia del Día</h2>
            <div id="historia">Cargando...</div>
        </div>

        <div class="box">
            <h2>Ejercicio del Día</h2>
            <div id="ejercicio">Cargando...</div>
        </div>

        <div class="box">
            <h2>Bienestar del Día</h2>
            <div id="bienestar">Cargando...</div>
        </div>

        <button class="primary" onclick="nextContent()">Siguiente Contenido</button>
    </div>

    <div class="right">
        <div class="box">
            <div class="status" id="status">Preparando sesión KaMiZen...</div>
            <div class="timer" id="time">10:00</div>
        </div>

        <div class="box chat-box" id="chatBox">
            <strong>AURA_BOT KaMiZen:</strong> ¡Bienvenido! Prepárate para tu sesión.
        </div>
    </div>
</div>

<script src="/static/scripts.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
