<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>KaMiZen - AURA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
       
        body {
            background: #020617;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-position: center;
            background-repeat: no-repeat;
            /* Suavidad extrema en la transición */
            transition: background-image 2.5s ease-in-out;
            background-size: 110%; /* Estado inicial del zoom */
        }

        /* Clase dinámica para el efecto de Zoom lento */
        .zoom-effect {
            animation: slowZoom 11s linear forwards;
        }

        @keyframes slowZoom {
            from { background-size: 110%; }
            to { background-size: 140%; }
        }

        #app {
            width: 90%;
            max-width: 420px;
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        #logo {
            font-size: 38px;
            font-weight: 600;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            letter-spacing: -1px;
        }

        #lang-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            padding: 6px 14px;
            border-radius: 10px;
            border: 1px solid #60a5fa;
            background: rgba(96, 165, 250, 0.1);
            color: #60a5fa;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        #mental-panel {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #block {
            font-size: 20px;
            font-weight: 300;
            line-height: 1.6;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        /* IDs añadidos para sincronización con script.js */
        #timer-display {
            font-size: 48px;
            font-weight: 600;
            color: #60a5fa;
            margin: 10px 0;
            font-family: monospace;
        }

        button {
            padding: 16px;
            margin: 8px 0;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            background: #2563eb;
            color: white;
            width: 100%;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(37,99,235,0.4);
        }

        .secondary { background: rgba(255, 255, 255, 0.1); color: white; }
       
        #controls-row { display: flex; gap: 15px; width: 100%; margin-top: 20px; }

        /* Modal de advertencia (59s) */
        #warning-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(127, 29, 29, 0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="warning-modal">
        <div style="text-align:center">
            <h2 style="font-size:30px; margin-bottom:15px">¿SIGUES AHÍ?</h2>
            <p style="margin-bottom:20px">Toca la pantalla para continuar tu ascenso.</p>
            <button onclick="resetInactivity()" style="background:white; color:black">ESTOY AQUÍ</button>
        </div>
    </div>

    <div id="app">
        <button id="lang-btn">ES</button>
        <div id="logo">AL CIELO</div>
       
        <div id="mental-panel">
            <div id="category-label" style="color:#60a5fa; font-weight:bold">AURA</div>
            <div id="level-display">Misión: 1</div>
        </div>

        <div id="block">
            <div id="text-display">Iniciando sesión...</div>
            <div id="visual-element"></div>
            <div id="timer-display" style="display:none">00:00</div>
        </div>
       
        <button id="action-btn">Comenzar</button>
       
        <div id="controls-row">
            <button id="back-btn" class="secondary">Back</button>
            <button id="forward-btn" class="secondary">Forward</button>
        </div>
    </div>

    <script>
        // Lógica de Fondo con 80 imágenes y Zoom Infinito
        const images = Array.from({length: 80}, (_, i) => 
            `https://images.unsplash.com/photo-${1500000000000 + (i * 123456)}?auto=format&fit=crop&w=1600&q=80&nature`
        );
        
        let currentImgIndex = 0;

        function changeBackground() {
            const body = document.body;
            // Quitamos la clase de zoom para resetearla
            body.classList.remove('zoom-effect');
            
            // Forzamos un pequeño reflow para que el navegador note el cambio
            void body.offsetWidth; 
            
            // Cambiamos la imagen
            body.style.backgroundImage = `url('https://source.unsplash.com/1600x900/?nature,water,forest&sig=${Math.random()}')`;
            
            // Añadimos la clase de zoom de nuevo
            body.classList.add('zoom-effect');
        }

        // Cambiar cada 10 segundos
        setInterval(changeBackground, 10000);
        window.onload = changeBackground;
    </script>
    <script src="/static/scripts.js"></script>
</body>
</html>
