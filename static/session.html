<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN PRO</title>

<style>
:root{
    --neon:#00f2ff;
    --bg:#000;
    --danger:#ff4444;
    --success:#33ff33;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--neon);
    font-family:Arial;
    overflow:hidden;
}

#app{
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* XP BAR */
#xpContainer{
    position:absolute;
    top:10px;
    width:80%;
    height:12px;
    background:#111;
}

#xpBar{
    height:100%;
    width:0%;
    background:var(--neon);
}

#level{
    position:absolute;
    top:25px;
    font-size:14px;
}

/* TIMER */
#timer{
    position:absolute;
    top:45px;
    font-size:18px;
    color:#fff;
}

/* MESSAGE */
#message{
    position:absolute;
    bottom:200px;
    width:85%;
    max-width:700px;
    padding:20px;
    font-size:22px;
    text-align:center;
    border:1px solid var(--neon);
}

/* OPTIONS */
#options{
    position:absolute;
    bottom:70px;
    width:85%;
    max-width:700px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

button{
    padding:15px;
    font-size:18px;
    background:transparent;
    border:1px solid var(--neon);
    color:var(--neon);
    cursor:pointer;
}

button:hover{
    background:var(--neon);
    color:#000;
}

/* CONTROLS */
#controls{
    position:absolute;
    top:70px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 10px;
}

.ctrl{
    font-size:12px;
    padding:5px 10px;
}

/* BREATH */
#circle{
    width:70px;
    height:70px;
    border-radius:50%;
    background:rgba(0,242,255,0.3);
    box-shadow:0 0 30px var(--neon);
}

/* EFFECT */
.flashRed{
    background:red !important;
}
</style>
</head>

<body>

<div id="app">

<div id="xpContainer"><div id="xpBar"></div></div>
<div id="level">LEVEL 1</div>
<div id="timer">5</div>

<div id="controls">
<button class="ctrl" onclick="restart()">RESTART</button>
<button class="ctrl" onclick="back()">BACK</button>
<button class="ctrl" onclick="skip()">SKIP</button>
<button class="ctrl" onclick="toggleLang()">ES/EN</button>
</div>

<div id="circle"></div>

<div id="message" onclick="start()">START GAME</div>

<div id="options"></div>

</div>

<script>

/* STATE */
let session_id=null;
let history=[];
let lang="en";
let xp=0;
let level=1;
let errors=0;
let timerInt;
let loading=false;

/* AUDIO */
const audio = new (window.AudioContext || window.webkitAudioContext)();

function sound(type){
    const o=audio.createOscillator();
    const g=audio.createGain();
    o.connect(g); g.connect(audio.destination);

    if(type==="ok") o.frequency.value=500;
    if(type==="fail") o.frequency.value=120;
    if(type==="click") o.frequency.value=300;

    g.gain.value=0.15;
    o.start();
    o.stop(audio.currentTime+0.2);
}

/* MUSIC */
let music;
function startMusic(freq=200){
    music = audio.createOscillator();
    const g = audio.createGain();
    music.connect(g);
    g.connect(audio.destination);
    music.frequency.value=freq;
    g.gain.value=0.03;
    music.start();
}

/* VOICE */
function speak(t){
    const msg=new SpeechSynthesisUtterance(t);
    msg.rate=0.9;
    speechSynthesis.speak(msg);
}

/* START */
async function start(){
    if(audio.state==="suspended") await audio.resume();

    startMusic();

    const res=await fetch("/start",{method:"POST"});
    const data=await res.json();

    session_id=data.session_id;
    render(data);
}

/* SEND */
async function send(code){
    if(loading) return;
    loading=true;

    sound("click");

    const res=await fetch("/judge",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({session_id,decision:code})
    });

    const data=await res.json();

    history.push(data);
    updateXP(data);
    render(data);

    loading=false;
}

/* XP */
function updateXP(data){
    if(data.correct){
        xp+=10;
        sound("ok");
    }else{
        xp-=5;
        errors++;
        sound("fail");
    }

    if(xp>=100){
        level++;
        xp=0;
    }

    document.getElementById("xpBar").style.width=xp+"%";
    document.getElementById("level").innerText="LEVEL "+level;

    if(errors>=3){
        failState();
    }
}

/* FAIL */
function failState(){
    document.body.classList.add("flashRed");
    speak("You lost control");

    setTimeout(()=>location.reload(),2000);
}

/* TIMER */
function startTimer(sec){
    let t=sec;
    document.getElementById("timer").innerText=t;

    clearInterval(timerInt);

    timerInt=setInterval(()=>{
        t--;
        document.getElementById("timer").innerText=t;

        if(t<=0){
            clearInterval(timerInt);
            send("TIME_FAIL");
        }
    },1000);
}

/* RENDER */
function render(data){

    if(!data.story) return;

    const s=data.story;

    const text=s.text_en || s.text_es;
    document.getElementById("message").innerText=text;

    speak(text);

    document.getElementById("options").innerHTML="";

    if(s.type==="quiz" || s.type==="tvid"){
        startTimer(5);
    }

    if(s.type==="breathing"){
        breathe();
    }

    let opts=s.options || [];

    if(opts.length===0){
        opts=[{code:"NEXT",text:{en:"CONTINUE"}}];
    }

    opts.forEach(o=>{
        const b=document.createElement("button");
        b.innerText=o.text?.[lang] || "GO";
        b.onclick=()=>send(o.code);
        document.getElementById("options").appendChild(b);
    });
}

/* BREATH */
let breathInt;
function breathe(){
    const c=document.getElementById("circle");
    let grow=true;

    clearInterval(breathInt);

    breathInt=setInterval(()=>{
        c.style.transform=grow?"scale(2)":"scale(1)";
        grow=!grow;
    },2500);
}

/* CONTROLS */
function skip(){ send("SKIP"); }
function back(){
    if(history.length<2) return;
    history.pop();
    render(history[history.length-1]);
}
function restart(){ location.reload(); }

function toggleLang(){
    lang = lang==="en" ? "es" : "en";
}

</script>

</body>
</html>
