<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KaMiZen Session Engine</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0b0b;
  color:white;
  text-align:center;
}

#container{
  padding:20px;
  max-width:800px;
  margin:auto;
}

.block{
  margin:20px 0;
  padding:15px;
  border-radius:10px;
  background:#1a1a1a;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.option{
  background:#333;
  color:white;
}

.option:hover{
  background:#444;
}

.correct{
  background:#1f8f3a !important;
  color:white;
}

.wrong{
  background:#b02a2a !important;
  color:white;
}

#breath{
  font-size:18px;
  opacity:0.9;
}

</style>
</head>

<body>

<div id="container">
  <h2 id="title">KaMiZen Session</h2>
  <div id="content"></div>
</div>

<script>
const missions = /* ===================== FULL DATA ===================== */ [
  {
"id":27,"level":27,"theme":"LEADERSHIP: GROUP PRESSURE (ADVANCED)",
"blocks":[
{"type":"story","text":{"en":"A group with strong influence pressures you to support an idea that feels wrong, but rewarding socially.","es":"Un grupo con influencia te presiona a apoyar una idea que parece incorrecta pero socialmente atractiva."}},
{"type":"analysis","text":{"en":"Leadership is resisting emotional contagion and thinking independently under pressure.","es":"El liderazgo es resistir la emoción colectiva y pensar de forma independiente bajo presión."}},
{"type":"breath_focus","duration_sec":30,"guide":{"es":"Inhala claridad. Exhala presión del grupo."}},
{"type":"tvid","options":[
{"code":"FOLLOW","text":{"es":"Seguir para ser aceptado"},"correct":false},
{"code":"QUESTION","text":{"es":"Cuestionar la intención"},"correct":true},
{"code":"LEAD","text":{"es":"Proponer alternativa"},"correct":true}
]}
]
  },

  {
"id":28,"level":28,"theme":"EMOTIONAL CONTROL: ANGER TRIGGER CONTROL",
"blocks":[
{"type":"story","text":{"es":"Alguien te provoca intencionalmente frente a otros."}},
{"type":"analysis","text":{"es":"El control emocional determina tu poder social."}},
{"type":"tvid","options":[
{"code":"EXPLODE","text":{"es":"Reaccionar agresivo"},"correct":false},
{"code":"CONTROL","text":{"es":"Mantener calma"},"correct":true},
{"code":"REDIRECT","text":{"es":"Redirigir atención"},"correct":true}
]}
]
  }
];

// UI STATE
let currentMission = 0;
let currentBlock = 0;

const content = document.getElementById("content");

function renderBlock(){
  const mission = missions[currentMission];
  const block = mission.blocks[currentBlock];

  content.innerHTML = "";

  if(!block){
    nextMission();
    return;
  }

  const div = document.createElement("div");
  div.className = "block";

  // STORY / ANALYSIS / BREATH
  if(block.type !== "tvid"){
    div.innerHTML = `
      <p>${block.text?.es || ""}</p>
      ${block.type === "breath_focus" ? `<p id="breath">🌬️ ${block.guide?.es}</p>` : ""}
    `;

    setTimeout(()=>{
      currentBlock++;
      renderBlock();
    }, 2500);

    content.appendChild(div);
    return;
  }

  // TVID QUESTION
  div.innerHTML = `<h3>${block.text?.es || "Elige una opción"}</h3>`;

  block.options.forEach(opt=>{
    const btn = document.createElement("button");
    btn.className = "option";
    btn.innerText = opt.text.es;

    btn.onclick = ()=>{
      // RESET COLORS
      document.querySelectorAll(".option").forEach(b=>{
        b.classList.remove("correct","wrong");
      });

      if(opt.correct){
        btn.classList.add("correct"); // 🟢 SOLO AQUÍ VERDE
      } else {
        btn.classList.add("wrong"); // 🔴 SOLO AQUÍ ROJO
      }

      setTimeout(()=>{
        currentBlock++;
        renderBlock();
      }, 900);
    };

    div.appendChild(btn);
  });

  content.appendChild(div);
}

function nextMission(){
  currentMission++;
  currentBlock = 0;

  if(currentMission >= missions.length){
    content.innerHTML = "<h2>Sesión completada</h2>";
    return;
  }

  renderBlock();
}

renderBlock();
</script>

</body>
</html>
