<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO - AURA BY MAY ROGA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --blue: #00d4ff; --gold: #ffd700; --green: #2ecc71; --red: #e74c3c; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* Login */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { padding: 15px; font-size: 1.5rem; border-radius: 10px; border: 2px solid var(--blue); background: #111; color: white; text-align: center; }
        
        /* Master UI */
        #master-clock { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 5rem; font-weight: 900; color: var(--blue); z-index: 1000; pointer-events: none; }
        
        /* Control Panel Buttons */
        #control-panel { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
        .icon-btn { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; transition: 0.3s; }
        .btn-translate { background: var(--gold); color: black; }
        .btn-speaker { background: var(--blue); color: black; }
        .btn-pdf { background: var(--green); color: white; }
        .btn-clear { background: var(--red); color: white; }

        /* World & Avatar */
        #game-world { position: fixed; inset: 0; background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d); display: none; }
        #avatar-container { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 100; text-align: center; }
        .stickman { stroke: white; stroke-width: 4; fill: none; }
        .meditating { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* Breathing Circle */
        #breath-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border: 10px solid white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 2.5rem; z-index: 500; transition: 4s linear; }

        /* Story Overlay */
        #story-box { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; padding: 40px; text-align: center; }
        
        /* Word Elements */
        .word { position: absolute; padding: 15px 30px; border: 2px solid white; border-radius: 30px; background: rgba(0,0,0,0.7); cursor: pointer; animation: fall 10s linear forwards; font-weight: bold; }
        @keyframes fall { from { top: -60px; } to { top: 110vh; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color: var(--blue);">AL CIELO</h1>
        <input type="text" id="user-name" placeholder="Enter Your Name">
        <button onclick="initApp()" style="margin-top:20px; padding:15px 40px; background:var(--blue); border:none; border-radius:10px; cursor:pointer; font-weight:bold;">START ADVISORY</button>
    </div>

    <div id="control-panel">
        <button class="icon-btn btn-translate" onclick="toggleLanguage()">ES/EN</button>
        <button class="icon-btn btn-speaker" id="speaker-toggle" onclick="toggleAudio()">ON</button>
        <button class="icon-btn btn-pdf" onclick="generatePDF()">PDF</button>
        <button class="icon-btn btn-clear" onclick="clearData()">CLEAR</button>
    </div>

    <div id="master-clock">15:00</div>
    
    <div id="game-world">
        <div id="avatar-container" class="meditating">
            <svg width="100" height="150" viewBox="0 0 100 150">
                <circle cx="50" cy="30" r="20" class="stickman"/>
                <path d="M50 50 L50 110 M50 70 L20 50 M50 70 L80 50 M50 110 L20 140 M50 110 L80 140" class="stickman"/>
            </svg>
            <div id="display-name" style="color:var(--gold); font-weight:bold; font-size:1.4rem; margin-top:10px;"></div>
        </div>
        <div id="breath-overlay">BREATHE</div>
    </div>

    <div id="story-box">
        <h1 id="story-title" style="color:var(--gold); font-size:3rem;"></h1>
        <p id="story-content" style="font-size:1.8rem; max-width:800px;"></p>
        <button onclick="closeStory()" style="padding:20px 60px; background:var(--green); color:white; border:none; border-radius:10px; font-size:1.5rem; cursor:pointer;">I UNDERSTAND</button>
    </div>

    <script src="/static/js/engine.js"></script>
</body>
</html>
