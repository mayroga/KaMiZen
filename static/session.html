<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAMIZEN SESSION CORE</title>

<style>
:root{
    --neon-blue:#00f2ff;
    --neon-green:#00ff41;
    --neon-red:#ff3131;
    --bg:#050508;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--neon-blue);
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

/* ================= START ================= */
#startScreen{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle,#111,#000);
    z-index:9999;
}

#nameInput{
    padding:12px;
    font-size:18px;
    text-align:center;
    margin-bottom:15px;
    width:220px;
}

#startBtn{
    padding:12px 25px;
    font-size:18px;
    background:var(--neon-blue);
    border:none;
    cursor:pointer;
    color:#000;
    font-weight:bold;
}

/* ================= CORE UI ================= */
#centerText{
    position:absolute;
    top:40%;
    width:100%;
    text-align:center;
    font-size:28px;
    font-weight:900;
    z-index:2;
}

#timer{
    position:absolute;
    top:10px;
    right:20px;
    font-size:18px;
    z-index:2;
}

/* ================= WORDS ================= */
.word{
    position:absolute;
    font-size:18px;
    color:var(--neon-green);
    cursor:pointer;
    z-index:1;
    user-select:none;
}

/* ================= EXPLANATION ================= */
#explanationBox{
    position:absolute;
    bottom:10px;
    right:10px;
    width:280px;
    background:#111;
    border:1px solid var(--neon-blue);
    padding:10px;
    opacity:0;
    transition:0.3s;
    z-index:5;
}

#expTitle{
    font-weight:bold;
    margin-bottom:5px;
}

#resetBtn{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 20px;
    background:var(--neon-red);
    color:white;
    border:none;
    cursor:pointer;
    display:none;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
    <h2>ENTER NAME</h2>
    <input id="nameInput" placeholder="Your name">
    <button id="startBtn">START TRAINING</button>
</div>

<!-- CORE -->
<div id="centerText"></div>
<div id="timer"></div>

<!-- EXPLANATION -->
<div id="explanationBox">
    <div id="expTitle"></div>
    <div id="expBody"></div>
</div>

<!-- RESET -->
<button id="resetBtn">RESTART</button>

<!-- AUDIO -->
<audio id="sfxGlass" src="https://assets.mixkit.co/sfx/preview/mixkit-glass-click-1110.mp3"></audio>

<!-- ENGINE -->
<script src="js/engine.js"></script>

<script>
let playerName = "Player";
let started = false;

/* ================= START ENGINE ================= */
document.getElementById("startBtn").onclick = () => {

    if(started) return;
    started = true;

    playerName = document.getElementById("nameInput").value.trim() || "Player";

    document.getElementById("startScreen").style.display = "none";

    Engine.init();
    Engine.start();

    safeSpeak("Welcome " + playerName);
    document.getElementById("centerText").innerText = "WELCOME " + playerName;
};

/* ================= SAFE SPEECH (NO FREEZE) ================= */
let speaking = false;

function safeSpeak(text){
    try{
        if(speaking) return;
        speaking = true;

        speechSynthesis.cancel();

        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = "en-US";
        msg.rate = 0.9;

        msg.onend = () => speaking = false;
        msg.onerror = () => speaking = false;

        speechSynthesis.speak(msg);

    }catch(e){
        speaking = false;
    }
}

/* ================= RESET ================= */
document.getElementById("resetBtn").onclick = () => {
    speechSynthesis.cancel();
    location.reload();
};

/* ================= VOICES FIX ================= */
window.speechSynthesis.onvoiceschanged = () => {
    speechSynthesis.getVoices();
};

/* ================= GLOBAL ANTI FREEZE ================= */
setInterval(() => {
    if(speechSynthesis.speaking && speechSynthesis.pending){
        speechSynthesis.cancel();
    }
}, 8000);

</script>

</body>
</html>
