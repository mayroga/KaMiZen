<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAMIZEN SESSION</title>

<style>
:root {
    --neon-blue: #00f2ff;
    --neon-gold: #f1c40f;
    --neon-red: #ff3131;
    --bg-dark: #050508;
}

body {
    margin: 0;
    overflow: hidden;
    background: var(--bg-dark);
    color: white;
    font-family: 'Orbitron', sans-serif;
    cursor: none;
    touch-action: none;
}

/* HUD */
#hud {
    position: absolute;
    top: 15px;
    width: 100%;
    display: flex;
    justify-content: space-evenly;
    z-index: 100;
    pointer-events: none;
}

.data-box {
    background: rgba(0, 0, 0, 0.95);
    border: 2px solid var(--neon-blue);
    padding: 10px;
    text-align: center;
    min-width: 130px;
}

.label {
    font-size: 10px;
    color: var(--neon-blue);
    font-weight: 900;
}

.value {
    font-size: 24px;
    font-weight: 900;
}

/* TIMER */
#timer-display {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    color: var(--neon-red);
    font-size: 35px;
    font-weight: 900;
    z-index: 100;
}

/* OVERLAY */
#overlay, #discipline-block {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, #111 0%, #000 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    text-align: center;
}

#discipline-block {
    background: rgba(150, 0, 0, 0.98);
    display: none;
    z-index: 5000;
}

.start-btn, .commit-btn {
    padding: 25px 50px;
    background: var(--neon-blue);
    color: black;
    border: none;
    font-weight: 900;
    cursor: pointer;
    font-size: 1.2rem;
    margin-top: 20px;
}

.commit-btn {
    background: white;
}

/* FLASH */
#flash-alert {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    opacity: 0;
}

/* ENGINE REQUIRED UI (AÑADIDO) */
#centerText {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    z-index: 2;
}

#explanationBox {
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 280px;
    background: #111;
    border: 1px solid var(--neon-blue);
    padding: 10px;
    opacity: 0;
    z-index: 10;
}

#expTitle { font-weight: bold; }
#expBody { font-size: 14px; }

#continueBtn, #resetBtn { display:none; }

.word {
    position: absolute;
    color: #00ff41;
    font-size: 18px;
    z-index: 1;
}
</style>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>

<body>

<div id="flash-alert"></div>

<div id="centerText"></div>
<div id="timer-display">TIME REMAINING: <span id="clock">27:00</span></div>

<div id="hud">
    <div class="data-box"><span class="label">NET WORTH</span><span id="val-money" class="value">$0</span></div>
    <div class="data-box"><span class="label">STABILITY</span><span id="val-health" class="value">100%</span></div>
    <div class="data-box"><span class="label">LEVEL</span><span id="val-rank" class="value">1</span></div>
</div>

<!-- ENGINE REQUIRED BOX -->
<div id="explanationBox">
    <div id="expTitle">INFO</div>
    <div id="expBody"></div>
</div>

<audio id="sfxGlass" src="https://assets.mixkit.co/sfx/preview/mixkit-glass-click-1110.mp3"></audio>

<!-- DISCIPLINE -->
<div id="discipline-block">
    <h1>HALTED</h1>
    <div>You triggered 3 negative concepts</div>
    <div id="dynamic-message"></div>
    <button class="commit-btn" onclick="resumeTraining()">I ACCEPT</button>
</div>

<!-- START -->
<div id="overlay">
    <h1>KAMIZEN SESSION</h1>
    <button class="start-btn" onclick="startGame()">INITIALIZE TRAINING</button>
</div>

<canvas id="gameCanvas"></canvas>

<script src="js/engine.js"></script>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let stats = { money: 0, health: 100, currentLevelIdx: 0, totalSeconds: 27 * 60 };
let active = false;
let objects = [];
let user = { x: 0, y: 0, size: 60 };
let consecutiveErrors = 0;

/* =========================
   ENGINE CONNECT (SAFE)
========================= */
window.addEventListener("load", () => {
    if (window.Engine) {
        Engine.init();
        // Engine.start() ❌ NO activado para evitar freeze
    }
});

/* =========================
   SAFE SPEECH (ANTI FREEZE)
========================= */
let speaking = false;
function safeSpeak(t){
    try{
        if(speaking) return;
        speaking = true;
        speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(t);
        msg.onend = () => speaking = false;
        speechSynthesis.speak(msg);
    }catch(e){ speaking = false; }
}

/* =========================
   START GAME
========================= */
function startGame(){
    document.getElementById("overlay").style.display = "none";
    active = true;

    safeSpeak("Training started");

    setInterval(spawn, 800);

    function loop(){
        update();
        draw();
        requestAnimationFrame(loop);
    }
    loop();
}

/* =========================
   SPAWN WORDS
========================= */
function spawn(){
    if(!active) return;

    const words = ["DISCIPLINE","FOCUS","ERROR","WIN","LOSS"];
    const text = words[Math.floor(Math.random()*words.length)];

    objects.push({
        text,
        x: Math.random()*canvas.width,
        y: -50,
        speed: 3 + Math.random()*3,
        type: Math.random()>0.7 ? "neg" : "pos"
    });
}

/* =========================
   UPDATE
========================= */
function update(){
    if(!active) return;

    objects.forEach((o,i)=>{
        o.y += o.speed;

        const d = Math.hypot(o.x-user.x, o.y-user.y);

        if(d < user.size){
            if(o.type==="neg"){
                stats.health -= 10;
                consecutiveErrors++;
                if(consecutiveErrors>=3){
                    document.getElementById("discipline-block").style.display="flex";
                }
            } else {
                stats.money += 100;
                consecutiveErrors = 0;
            }
            objects.splice(i,1);
        }
    });

    document.getElementById("val-money").innerText = "$"+stats.money;
    document.getElementById("val-health").innerText = stats.health+"%";
}

/* =========================
   DRAW
========================= */
function draw(){
    ctx.fillStyle="rgba(0,0,0,0.4)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    objects.forEach(o=>{
        ctx.fillStyle = o.type==="neg" ? "red" : "lime";
        ctx.font="20px Orbitron";
        ctx.fillText(o.text,o.x,o.y);
    });

    ctx.beginPath();
    ctx.arc(user.x,user.y,20,0,Math.PI*2);
    ctx.strokeStyle="#00f2ff";
    ctx.stroke();
}

/* =========================
   INPUT
========================= */
window.addEventListener("mousemove",(e)=>{
    user.x=e.clientX;
    user.y=e.clientY;
});

/* =========================
   RESUME
========================= */
function resumeTraining(){
    consecutiveErrors=0;
    document.getElementById("discipline-block").style.display="none";
    active=true;
}
</script>

</body>
</html>
