<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN EXPERIENCE FLOW</title>

<style>
body{
    margin:0;
    background:#000;
    color:#00f2ff;
    font-family:Arial;
    overflow:hidden;
}

#app{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:20px;
    padding:20px;
    box-sizing:border-box;
}

#message{
    max-width:800px;
    min-height:160px;
    padding:20px;
    border:1px solid #00f2ff;
    background:rgba(0,10,20,0.9);
    text-align:center;
    font-size:22px;
    line-height:1.4;
}

#circle{
    width:120px;
    height:120px;
    border-radius:50%;
    background:rgba(0,242,255,0.15);
    box-shadow:0 0 40px #00f2ff;
    display:none;
}

#options{
    display:none;
    flex-direction:column;
    gap:10px;
    width:100%;
    max-width:500px;
}

button{
    padding:16px;
    border:1px solid #00f2ff;
    background:transparent;
    color:#00f2ff;
    cursor:pointer;
    font-size:16px;
}

.correct{background:#00ff88;color:#000;}
.wrong{background:#ff3355;color:#fff;}

#timer{
    font-size:18px;
    opacity:0.7;
}

#top{
    position:absolute;
    top:10px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 10px;
}
</style>
</head>

<body>

<div id="app">

<div id="top">
<button onclick="toggleLang()">ES/EN</button>
<button onclick="restart()">RESTART</button>
</div>

<div id="message">TOUCH TO START</div>
<div id="circle"></div>
<div id="timer"></div>
<div id="options"></div>

</div>

<script>

/* =========================
   STATE ENGINE SAFE MODE
========================= */
let session_id = null;
let lang = "en";
let current = null;

let engineLocked = false;
let timerInterval = null;

/* =========================
   SAFE SPEECH ENGINE
========================= */
function speak(text){
    return new Promise(resolve=>{

        if(!text){
            resolve();
            return;
        }

        speechSynthesis.cancel();

        const u = new SpeechSynthesisUtterance(text);
        u.rate = 0.9;
        u.lang = lang === "es" ? "es-ES" : "en-US";

        u.onend = ()=> resolve();

        setTimeout(()=> resolve(), 6000);

        speechSynthesis.speak(u);
    });
}

/* =========================
   START SESSION
========================= */
async function start(){

    if(engineLocked) return;
    engineLocked = true;

    try{

        const res = await fetch("/start",{method:"POST"});
        const data = await res.json();

        session_id = data.session_id;
        await run(data.story);

    }finally{
        engineLocked = false;
    }
}

/* =========================
   MAIN ENGINE
========================= */
async function run(block){

    if(engineLocked) return;
    engineLocked = true;

    try{

        current = block;

        hideOptions();
        clearTimer();

        const text =
            block.text?.[lang] ||
            block.analysis?.[lang] ||
            block.question?.[lang] ||
            "";

        document.getElementById("message").innerText = text;

        await speak(text);

        /* TVID */
        if(block.type === "tvid"){
            showOptions(block);
        }

        /* BREATH */
        if(block.type === "breath_focus"){
            await breath(block.duration_sec);
            await next();
        }

        /* RISO */
        if(block.type === "riso_tvid"){
            await timer(block.duration_sec);
            await next();
        }

        /* SILENCE */
        if(block.type === "silence_challenge"){
            await timer(block.duration_sec);
            await next();
        }

        /* FINAL */
        if(block.type === "final_lesson"){
            await pause(1200);
            await next();
        }

    }catch(e){
        console.log("ENGINE ERROR:", e);

    }finally{
        engineLocked = false;
    }
}

/* =========================
   OPTIONS TVID
========================= */
function showOptions(block){

    const box = document.getElementById("options");
    box.style.display = "flex";
    box.innerHTML = "";

    block.options.forEach(o=>{

        const b = document.createElement("button");
        b.innerText = o.text?.[lang] || "";

        b.onclick = async ()=>{

            if(engineLocked) return;
            engineLocked = true;

            try{

                const res = await fetch("/judge",{
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({
                        session_id,
                        decision:o.code
                    })
                });

                const data = await res.json();

                if(data.feedback){
                    await show(data.feedback.reason?.[lang] || "");
                }

                b.classList.add(o.correct ? "correct" : "wrong");

                setTimeout(async ()=>{
                    await run(data.story);
                }, 700);

            }finally{
                engineLocked = false;
            }
        };

        box.appendChild(b);
    });
}

/* =========================
   NEXT ENGINE CALL
========================= */
async function next(){

    const res = await fetch("/judge",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            session_id,
            decision:"NEXT"
        })
    });

    const data = await res.json();
    await run(data.story);
}

/* =========================
   BREATH
========================= */
function breath(sec){
    return new Promise(res=>{

        const c = document.getElementById("circle");
        c.style.display = "block";

        let grow = true;

        const i = setInterval(()=>{
            c.style.transform = grow ? "scale(2)" : "scale(1)";
            grow = !grow;
        }, 2000);

        setTimeout(()=>{
            clearInterval(i);
            c.style.display = "none";
            res();
        }, sec*1000);
    });
}

/* =========================
   TIMER SAFE
========================= */
function timer(sec){
    return new Promise(res=>{

        const t = document.getElementById("timer");
        let s = sec;

        t.innerText = s + "s";

        timerInterval = setInterval(()=>{
            s--;
            t.innerText = s + "s";

            if(s <= 0){
                clearInterval(timerInterval);
                timerInterval = null;
                t.innerText = "";
                res();
            }
        },1000);
    });
}

function clearTimer(){
    if(timerInterval){
        clearInterval(timerInterval);
        timerInterval = null;
    }
    document.getElementById("timer").innerText = "";
}

/* =========================
   UI HELPERS
========================= */
function hideOptions(){
    document.getElementById("options").style.display = "none";
}

async function show(text){
    document.getElementById("message").innerText = text;
    await speak(text);
}

function pause(ms){
    return new Promise(r=>setTimeout(r,ms));
}

function restart(){
    location.reload();
}

function toggleLang(){
    lang = lang === "en" ? "es" : "en";
    if(current) run(current);
}

/* START */
document.getElementById("message").onclick = start;

</script>

</body>
</html>
