<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AL CIELO - SESSION</title>
    <style>
        :root {
            --neon-blue: #00f2ff; --neon-gold: #f1c40f; --neon-red: #ff3131;
            --bg-dark: #020205;
        }
        body { margin: 0; overflow: hidden; background: var(--bg-dark); color: white; font-family: 'Orbitron', sans-serif; cursor: crosshair; }
        
        /* HUD - VISIBILIDAD PRIORITARIA */
        #hud { 
            position: absolute; top: 0; width: 100%; display: flex; 
            justify-content: space-evenly; z-index: 100; 
            background: rgba(0,0,0,0.85); padding: 15px 0; 
            border-bottom: 2px solid var(--neon-blue);
            pointer-events: none;
        }
        .data-box { text-align: center; }
        .label { font-size: 10px; color: var(--neon-blue); font-weight: 900; display: block; }
        .value { font-size: 20px; font-weight: 900; color: #fff; }
        #timer-box { border: 1px solid var(--neon-red); padding: 2px 15px; border-radius: 5px; }
        #val-time { color: var(--neon-red); font-size: 24px; }

        /* OVERLAY SISTEMA - DEBE SER DINÁMICO */
        #overlay-system { 
            position: fixed; inset: 0; background: var(--bg-dark); 
            z-index: 2000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            padding: 20px; text-align: center; transition: opacity 0.5s ease;
        }
        #content-area { max-width: 600px; }
        .mission-text { font-size: 1.2rem; line-height: 1.5; margin: 20px 0; min-height: 50px; }
        
        /* CÍRCULO KAMIZEN */
        #breathing-node { 
            width: 200px; height: 200px; border: 10px solid var(--neon-blue); 
            border-radius: 50%; display: none; align-items: center; 
            justify-content: center; margin: 30px auto;
            box-shadow: 0 0 30px var(--neon-blue);
            transition: transform 3s ease-in-out;
        }
        #breathing-text { font-size: 20px; font-weight: 900; color: var(--neon-blue); }

        .btn-action { 
            padding: 15px 40px; background: var(--neon-blue); 
            color: #000; border: none; font-family: 'Orbitron'; 
            font-weight: 900; cursor: pointer; border-radius: 5px;
            box-shadow: 0 0 20px var(--neon-blue); text-transform: uppercase;
        }

        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 10; }
        #flash-effect { position: fixed; inset: 0; pointer-events: none; z-index: 500; opacity: 0; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="flash-effect"></div>

<div id="hud">
    <div id="timer-box" class="data-box"><span class="label">REMAINING</span><span id="val-time">05:00</span></div>
    <div class="data-box"><span class="label">CAPITAL</span><span id="val-money" class="value">0</span></div>
    <div class="data-box"><span class="label">STABILITY</span><span id="val-health" class="value">100%</span></div>
    <div class="data-box"><span class="label">LEGACY</span><span id="val-legacy" class="value">0</span></div>
</div>

<div id="overlay-system">
    <div id="content-area">
        <h2 id="display-title" style="color: var(--neon-gold);">AURA ADVISORY</h2>
        <div id="display-body" class="mission-text">Cargando protocolos de entrenamiento...</div>
        
        <div id="breathing-node"><span id="breathing-text">BREATHE</span></div>
        
        <div id="display-inf" style="font-size: 11px; color: #888; margin-bottom: 20px;"></div>
        <button id="action-btn" class="btn-action">CARGAR MISIÓN</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script src="static/js/engine.js"></script>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay-system');
const actionBtn = document.getElementById('action-btn');

let gameActive = false;
let objects = [];
let user = { x: window.innerWidth/2, y: window.innerHeight/2, size: 40 };

// Palabras clave de engine.js para las figuras
const types = [
    { word: "CBP", color: "#f1c40f", impact: "money", val: 50 },
    { word: "DOT", color: "#00f2ff", impact: "aware", val: 10 },
    { word: "IATA", color: "#2ecc71", impact: "health", val: 5 },
    { word: "DG", color: "#ff3131", impact: "health", val: -20 },
    { word: "SECURITY", color: "#9b59b6", impact: "legacy", val: 15 }
];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Control de Mouse y Touch
const handleInput = (e) => {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    user.x = x; user.y = y;
};
window.addEventListener('mousemove', handleInput);
window.addEventListener('touchmove', handleInput, {passive: false});

function spawn() {
    if(!gameActive) return;
    const t = types[Math.floor(Math.random()*types.length)];
    objects.push({
        ...t, x: Math.random()*canvas.width, y: -20, s: 2 + Math.random()*3
    });
}

function loop() {
    if(!gameActive) return;
    ctx.fillStyle = 'rgba(2, 2, 5, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Dibujar Usuario
    ctx.strokeStyle = '#00f2ff';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(user.x, user.y, user.size, 0, Math.PI*2);
    ctx.stroke();

    // Dibujar Objetos
    objects.forEach((o, i) => {
        o.y += o.s;
        ctx.fillStyle = o.color;
        ctx.font = "bold 12px Orbitron";
        ctx.textAlign = "center";
        ctx.fillText(o.word, o.x, o.y - 10);
        ctx.beginPath();
        ctx.arc(o.x, o.y, 8, 0, Math.PI*2);
        ctx.fill();

        // Colisión
        const d = Math.sqrt((o.x-user.x)**2 + (o.y-user.y)**2);
        if(d < user.size) {
            objects.splice(i, 1);
            updateStats(o);
        }
        if(o.y > canvas.height) objects.splice(i,1);
    });
    requestAnimationFrame(loop);
}

function updateStats(o) {
    if(o.impact === 'money') document.getElementById('val-money').innerText = parseInt(document.getElementById('val-money').innerText) + o.val;
    if(o.impact === 'health') {
        let h = parseInt(document.getElementById('val-health').innerText);
        document.getElementById('val-health').innerText = Math.max(0, h + o.val) + "%";
    }
    if(o.impact === 'legacy') document.getElementById('val-legacy').innerText = parseInt(document.getElementById('val-legacy').innerText) + o.val;
}

// CONEXIÓN CON EL MOTOR ENGINE.JS
window.GameVisuals = {
    toggleOverlay: (show) => {
        overlay.style.opacity = show ? "1" : "0";
        setTimeout(() => {
            overlay.style.display = show ? "flex" : "none";
            gameActive = !show;
            if(gameActive) {
                objects = [];
                loop();
                setInterval(spawn, 1000);
            }
        }, 500);
    },
    updateContent: (title, body, inf = "") => {
        document.getElementById('display-title').innerText = title;
        document.getElementById('display-body').innerText = body;
        document.getElementById('display-inf').innerText = inf;
        actionBtn.innerText = "CONTINUAR";
    },
    runBreathing: (sec, text) => {
        const node = document.getElementById('breathing-node');
        node.style.display = "flex";
        document.getElementById('breathing-text').innerText = text;
        node.style.transform = text.toLowerCase().includes("in") ? "scale(1.4)" : "scale(0.8)";
    },
    stopBreathing: () => {
        document.getElementById('breathing-node').style.display = "none";
    }
};

// Listener para el botón de acción vinculado al motor
actionBtn.addEventListener('click', () => {
    if(typeof Engine !== 'undefined') {
        Engine.start(); // Esto activa el audio y el cambio de estado en engine.js
    }
});

// Inicialización forzada
window.onload = () => {
    if(typeof Engine !== 'undefined') Engine.init();
};
</script>
</body>
</html>
