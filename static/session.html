<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AL CIELO: MATRIX TRAINING</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #00ff41;
            --neon-red: #ff003c;
            --matrix-bg: #00050a;
        }

        body {
            margin: 0;
            background: var(--matrix-bg);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        /* SCANLINE EFFECT */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* HEADER UI */
        #hud {
            position: fixed;
            top: 0; width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            z-index: 50;
        }

        #timer-box { font-size: 2rem; color: var(--neon-blue); font-weight: bold; }
        #score-box { font-size: 1.5rem; padding: 5px 15px; border: 2px solid #fff; }
        
        /* SOCIAL MISSION PANEL */
        #social-panel {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: rgba(0, 20, 40, 0.9);
            border: 2px solid var(--neon-blue);
            padding: 15px;
            display: none;
            z-index: 400;
            text-align: center;
        }

        /* FLOATING WORDS */
        .floating {
            position: absolute;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            background: rgba(0,0,0,0.8);
            z-index: 10;
            animation: floatUp 6s linear forwards;
        }
        .word-good { border: 2px solid var(--neon-green); color: var(--neon-green); }
        .word-bad { border: 2px solid var(--neon-red); color: var(--neon-red); }

        @keyframes floatUp {
            from { transform: translateY(110vh); opacity: 1; }
            to { transform: translateY(-20vh); opacity: 0; }
        }

        /* BREATH SYSTEM */
        #breath-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 500;
        }
        #breath-circle {
            width: 150px; height: 150px;
            border: 5px solid var(--neon-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 3s ease-in-out;
        }

        .panel {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #000; padding: 30px;
            border: 2px solid var(--neon-blue);
            display: flex; flex-direction: column; gap: 15px; z-index: 600;
        }
        button { background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue); padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="timer-box">00:00</div>
        <div id="mastery-lvl" style="color: var(--neon-green);">MASTERY: x1</div>
        <div id="score-box">POINTS: 0</div>
    </div>

    <div id="main-menu" class="panel">
        <h1>KAMIZEN: AL CIELO</h1>
        <button onclick="startGame('en')">START TRAINING (EN)</button>
        <button onclick="startGame('es')">INICIAR ENTRENAMIENTO (ES)</button>
    </div>

    <div id="social-panel">
        <p id="social-text"></p>
        <div id="social-options" style="display: flex; gap: 10px; justify-content: center;"></div>
    </div>

    <div id="breath-overlay">
        <h2 id="breath-title">SILENCE CHALLENGE</h2>
        <div id="breath-circle"><span id="breath-label">...</span></div>
        <p id="breath-desc" style="margin-top: 20px; max-width: 80%; text-align: center;"></p>
    </div>

    <audio id="snd-win" src="/static/sounds/trumpet.mp3"></audio>
    <audio id="snd-fail" src="/static/sounds/glass.mp3"></audio>

    <script>
        let state = {
            score: 0, mastery: 1, lang: 'en',
            timeLeft: 300, phase: 'menu',
            silenceDuration: 20, // Empieza en 20s
            blocksCompleted: 0
        };

        const content = {
            en: {
                inhale: "INHALE", exhale: "EXHALE",
                missions: [
                    { q: "A friend is being teased. What do you do?", a: "Support him", b: "Stay quiet", win: "SOCIAL RESPECT +50", fail: "INTEGRITY LOSS -20" },
                    { q: "You lost a game. Your reaction?", a: "Congratulate them", b: "Throw a fit", win: "EMOTIONAL POWER +50", fail: "EGO TRAP -20" }
                ],
                words: { good: ["HONOR", "TRUTH", "CALM", "WILL"], bad: ["LIE", "EGO", "LAZY", "HATE"] }
            },
            es: {
                inhale: "INHALA", exhale: "EXHALA",
                missions: [
                    { q: "¿Se burlan de un amigo. Qué haces?", a: "Apoyarlo", b: "Callar", win: "RESPETO SOCIAL +50", fail: "PERDIDA DE INTEGRIDAD -20" },
                    { q: "¿Perdiste un juego. Tu reacción?", a: "Felicitar", b: "Enojarte", win: "PODER EMOCIONAL +50", fail: "TRAMPA DEL EGO -20" }
                ],
                words: { good: ["HONOR", "VERDAD", "CALMA", "VOLUNTAD"], bad: ["MENTIRA", "EGO", "PEREZA", "ODIO"] }
            }
        };

        function startGame(l) {
            state.lang = l;
            document.getElementById('main-menu').style.display = 'none';
            state.interval = setInterval(updateTimer, 1000);
            state.spawnInterval = setInterval(spawnWord, 1200);
            // Lanzar primera misión social a los 10 segundos
            setTimeout(triggerSocialMission, 10000);
        }

        function updateTimer() {
            state.timeLeft--;
            let m = Math.floor(state.timeLeft / 60).toString().padStart(2, '0');
            let s = (state.timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer-box').innerText = `${m}:${s}`;

            if (state.timeLeft % 45 === 0) triggerSilenceChallenge();
        }

        function spawnWord() {
            const type = Math.random() > 0.4 ? 'good' : 'bad';
            const list = content[state.lang].words[type];
            const text = list[Math.floor(Math.random() * list.length)];
            const div = document.createElement('div');
            div.className = `floating word-${type}`;
            div.innerText = text;
            div.style.left = Math.random() * 80 + 10 + "vw";
            div.onclick = () => {
                if (type === 'good') {
                    state.score += (10 * state.mastery);
                    document.getElementById('snd-win').play();
                } else {
                    state.score -= 20;
                    state.mastery = 1;
                    document.getElementById('snd-fail').play();
                }
                updateHUD();
                div.remove();
            };
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 6000);
        }

        function triggerSocialMission() {
            const mission = content[state.lang].missions[Math.floor(Math.random() * content[state.lang].missions.length)];
            const panel = document.getElementById('social-panel');
            const opts = document.getElementById('social-options');
            
            document.getElementById('social-text').innerText = mission.q;
            opts.innerHTML = `
                <button onclick="resolveSocial(true, '${mission.win}')">${mission.a}</button>
                <button onclick="resolveSocial(false, '${mission.fail}')">${mission.b}</button>
            `;
            panel.style.display = 'block';
        }

        function resolveSocial(correct, msg) {
            if (correct) {
                state.score += 50;
                state.mastery++;
                document.getElementById('snd-win').play();
            } else {
                state.score -= 30;
                document.getElementById('snd-fail').play();
            }
            alert(msg);
            document.getElementById('social-panel').style.display = 'none';
            updateHUD();
        }

        function triggerSilenceChallenge() {
            clearInterval(state.spawnInterval);
            const overlay = document.getElementById('breath-overlay');
            const circle = document.getElementById('breath-circle');
            const label = document.getElementById('breath-label');
            
            overlay.style.display = 'flex';
            state.blocksCompleted++;
            
            // Lógica de progresión: Bloque 1-6 sube de 20 a 60s. Bloque 7+ sube a minutos.
            if(state.blocksCompleted < 7) state.silenceDuration = 20 + (state.blocksCompleted * 8);
            else state.silenceDuration = 180; 

            document.getElementById('breath-desc').innerText = `RETO DE SILENCIO: ${state.silenceDuration}s\n"La paz es tu escudo"`;

            let timer = 0;
            const cycle = setInterval(() => {
                timer += 4;
                if (timer >= state.silenceDuration) {
                    clearInterval(cycle);
                    overlay.style.display = 'none';
                    state.spawnInterval = setInterval(spawnWord, 1200);
                    setTimeout(triggerSocialMission, 5000); // Misión social tras el silencio
                }
                label.innerText = (label.innerText === content[state.lang].inhale) ? content[state.lang].exhale : content[state.lang].inhale;
                circle.style.transform = (circle.style.transform === "scale(1.3)") ? "scale(0.8)" : "scale(1.3)";
            }, 4000);
        }

        function updateHUD() {
            document.getElementById('score-box').innerText = `POINTS: ${state.score}`;
            document.getElementById('mastery-lvl').innerText = `MASTERY: x${state.mastery}`;
        }
    </script>
</body>
</html>
