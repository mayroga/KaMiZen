<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO | AURA BY MAY ROGA</title>
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #000;
            --accent: #ff00ff;
            --panel: rgba(0, 15, 30, 0.95);
            --danger: #ff4444;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--neon);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-transform: uppercase;
        }

        #app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #001a1a 0%, #000 80%);
        }

        /* HEADER & STATS */
        #header {
            position: absolute;
            top: 20px;
            width: 90%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #category-tag {
            font-size: 14px;
            letter-spacing: 5px;
            margin-bottom: 15px;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
            font-weight: bold;
        }

        #stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
        }

        .box {
            border: 1px solid var(--neon);
            background: rgba(0, 242, 255, 0.05);
            padding: 10px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.1);
        }

        .label {
            font-size: 9px;
            display: block;
            margin-bottom: 5px;
            opacity: 0.7;
        }

        .val {
            font-size: 22px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        /* TERMINAL */
        #message-container {
            width: 85%;
            max-width: 850px;
            margin: 40px 0;
            position: relative;
        }

        #message {
            min-height: 180px;
            padding: 30px;
            border: 2px solid var(--neon);
            background: var(--panel);
            font-size: 20px;
            line-height: 1.4;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
            z-index: 2;
        }

        /* ACTIONS */
        #options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 85%;
            max-width: 850px;
        }

        button {
            padding: 15px;
            border: 1px solid var(--neon);
            background: transparent;
            color: var(--neon);
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 1px;
        }

        button:hover:not(:disabled) {
            background: var(--neon);
            color: var(--bg);
            box-shadow: 0 0 15px var(--neon);
        }

        /* CONTROL PANEL (DELETE & TRANSLATE) */
        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .btn-ctrl {
            border-color: var(--accent);
            color: var(--accent);
            font-size: 10px;
            padding: 8px 15px;
        }

        .btn-delete {
            border-color: var(--danger);
            color: var(--danger);
        }

        #speaker-icon {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="header">
        <div id="category-tag">SYSTEM INITIALIZING...</div>
        <div id="stats">
            <div class="box"><span class="label">MENTAL</span><span id="mental" class="val">100</span></div>
            <div class="box"><span class="label">SOCIAL</span><span id="social" class="val">50</span></div>
            <div class="box"><span class="label">KARMA</span><span id="karma" class="val">0</span></div>
            <div class="box"><span class="label">DISCIPLINE</span><span id="disc" class="val">50</span></div>
        </div>
    </div>

    <div id="message-container">
        <div id="message">LOADING "AL CIELO" PROTOCOL...<br>CLICK TO START</div>
    </div>

    <div id="options">
        <button onclick="handleAction('TDB')">BALANCE</button>
        <button onclick="handleAction('TDM')">IMPULSE</button>
        <button onclick="handleAction('TDN')">CREATIVITY</button>
        <button onclick="handleAction('TDP')">STRUCTURE</button>
        <button onclick="handleAction('TDG')">CONTROL</button>
        <button onclick="handleAction('TDK')">CONNECTION</button>
    </div>

    <div id="speaker-icon" onclick="toggleVoice()">🔊</div>

    <div id="controls">
        <button class="btn-ctrl" onclick="toggleLanguage()">ES/EN</button>
        <button class="btn-ctrl btn-delete" onclick="resetApp()">DELETE DATA</button>
    </div>
</div>

<script>
    let session_id = localStorage.getItem("aura_sid");
    let is_busy = false;
    let current_lang = "en";
    let voice_enabled = true;
    let current_story_data = null;

    const audioManager = {
        currentTrack: null,
        moods: {
            ambient: "https://assets.mixkit.co/music/preview/mixkit-mysterious-bass-pulse-2298.mp3",
            suspense: "https://assets.mixkit.co/music/preview/mixkit-deep-urban-623.mp3",
            tension: "https://assets.mixkit.co/music/preview/mixkit-complex-tension-pulse-background-2495.mp3",
            discovery: "https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3",
            power: "https://assets.mixkit.co/music/preview/mixkit-driving-force-353.mp3",
            victory: "https://assets.mixkit.co/music/preview/mixkit-winning-an-extra-life-2550.mp3",
            focus: "https://assets.mixkit.co/music/preview/mixkit-ethereal-fairy-win-sound-2019.mp3",
            agitation: "https://assets.mixkit.co/sfx/preview/mixkit-heartbeat-slow-and-heavy-491.mp3"
        },
        play(mood) {
            const url = this.moods[mood] || this.moods.ambient;
            if (this.currentTrack && this.currentTrack.src === url) return;
            if (this.currentTrack) this.currentTrack.pause();
            
            this.currentTrack = new Audio(url);
            this.currentTrack.loop = (mood !== 'victory');
            this.currentTrack.volume = 0.4;
            this.currentTrack.play().catch(() => {});
        }
    };

    async function init() {
        const res = await fetch("/start", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ profile: { age: 18 } })
        });
        const data = await res.json();
        session_id = data.session_id;
        localStorage.setItem("aura_sid", session_id);
        updateUI(data);
    }

    async function handleAction(code) {
        if (is_busy) return;
        is_busy = true;
        try {
            const res = await fetch("/judge", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ session_id, decision: code })
            });
            const data = await res.json();
            if (data.status === "continue") updateUI(data);
        } catch (e) { console.error(e); }
        setTimeout(() => is_busy = false, 500);
    }

    function updateUI(data) {
        current_story_data = data;
        const s = data.state;
        document.getElementById("mental").innerText = s.mental;
        document.getElementById("social").innerText = s.social;
        document.getElementById("karma").innerText = s.karma;
        document.getElementById("disc").innerText = s.discipline;

        renderText();
        audioManager.play(data.story.mood);
    }

    function renderText() {
        if (!current_story_data) return;
        const story = current_story_data.story;
        const text = current_lang === "en" ? (story.text_en || story.text) : (story.text_es || story.text);
        document.getElementById("message").innerText = text;
        document.getElementById("category-tag").innerText = story.category || "AURA CORE";
        if(voice_enabled) speak(text);
    }

    function toggleLanguage() {
        current_lang = current_lang === "en" ? "es" : "en";
        renderText();
    }

    function toggleVoice() {
        voice_enabled = !voice_enabled;
        document.getElementById("speaker-icon").innerText = voice_enabled ? "🔊" : "🔇";
        if (!voice_enabled) window.speechSynthesis.cancel();
    }

    function resetApp() {
        localStorage.clear();
        location.reload();
    }

    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = current_lang === "en" ? "en-US" : "es-US";
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }

    window.onclick = () => { if (!session_id) init(); };
</script>
</body>
</html>
