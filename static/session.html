<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAMIZEN SYSTEM</title>

<style>
:root {
    --primary: #00f2ff;
    --secondary: #0044ff;
    --bg: #03050a;
    --surface: rgba(255, 255, 255, 0.05);
    --success: #28a745;
    --error: #dc3545;
    --warning: #ffc107;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: #fff;
    font-family: Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
}

/* CENTRO REAL */
#main-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 900px;
    text-align: center;
}

/* NARRADOR */
#text-narrator {
    font-size: 28px;
    margin-bottom: 30px;
    min-height: 80px;
}

/* DECISIONES CENTRADAS */
#decision-area {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

.option-card {
    width: 100%;
    max-width: 600px;
    padding: 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0,242,255,0.3);
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
    text-align: center;
}

.option-card:hover {
    transform: scale(1.05);
    border-color: var(--primary);
}

.option-card.correct {
    border-color: var(--success);
    background: rgba(40,167,69,0.2);
}

.option-card.incorrect {
    border-color: var(--error);
    background: rgba(220,53,69,0.2);
}

/* FEEDBACK */
#feedback-panel {
    margin-top: 15px;
    padding: 15px;
    display: none;
    border: 1px solid var(--primary);
    background: rgba(0,0,0,0.5);
}

/* TIMER */
#timer {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 80px;
    color: var(--primary);
    display: none;
}

/* PALABRAS FLOTANTES */
.word-node {
    position: absolute;
    padding: 10px 18px;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--primary);
    border-radius: 8px;
    color: var(--primary);
    font-weight: bold;
    cursor: pointer;
    animation: floatUp 8s linear forwards;
    left: 50%;
    transform: translateX(-50%);
}

@keyframes floatUp {
    0% { transform: translate(-50%, 100vh); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translate(-50%, -20vh); opacity: 0; }
}

/* EXPLOSIÓN */
.word-node.explode {
    animation: explodeFX 0.4s ease-out forwards;
}

@keyframes explodeFX {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.6); }
    100% { transform: scale(2.5); opacity: 0; }
}

/* RESPIRACIÓN */
#breath-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: none;
    z-index: 9999;
}

#breath-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: var(--primary);
    animation: breathe 6s infinite ease-in-out;
}

@keyframes breathe {
    0% { transform: scale(0.8); opacity: 0.6; }
    50% { transform: scale(1.4); opacity: 1; }
    100% { transform: scale(0.8); opacity: 0.6; }
}

/* BOTONES */
button {
    padding: 10px 20px;
    margin-top: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="timer">00:00</div>

<div id="breath-container">
    <div id="breath-circle">INHALE</div>
</div>

<div id="main-container">

    <div id="text-narrator">Loading system...</div>

    <div id="decision-area"></div>

    <div id="feedback-panel"></div>

    <button onclick="startCycle()">START</button>
</div>

<script>
/* ===================== STATE ===================== */
let state = {
    score: 0,
    timer: 300,
    spawnRate: 1200
};

/* ===================== WORDS ===================== */
const words = ["POWER","RISK","SILENCE","GROWTH","MONEY","FOCUS"];

/* ===================== SPAWN ===================== */
function spawnWord() {
    let div = document.createElement("div");
    div.className = "word-node";
    div.innerText = words[Math.floor(Math.random() * words.length)];

    div.style.left = (Math.random() * 70 + 15) + "%";

    div.onclick = () => {
        if (div.dataset.clicked) return;
        div.dataset.clicked = 1;

        div.classList.add("explode");

        setTimeout(() => div.remove(), 300);

        state.score += 10;
        console.log("Score:", state.score);
    };

    document.body.appendChild(div);
    setTimeout(() => div.remove(), 8000);
}

/* ===================== BREATH ===================== */
function breathing() {
    let c = document.getElementById("breath-container");
    let text = document.getElementById("breath-circle");

    c.style.display = "block";

    let steps = ["INHALE","EXHALE","INHALE","EXHALE"];
    let i = 0;

    let interval = setInterval(() => {
        text.innerText = steps[i];
        i++;
        if (i >= steps.length) {
            clearInterval(interval);
            c.style.display = "none";
        }
    }, 2000);
}

/* ===================== LOOP ===================== */
function startCycle() {

    let timer = setInterval(() => {
        state.timer--;

        if (Math.random() > 0.6) spawnWord();

        if (state.timer % 60 === 0) breathing();

        if (state.timer <= 0) {
            clearInterval(timer);
            alert("Cycle finished");
        }

    }, 1000);
}
</script>

</body>
</html>
