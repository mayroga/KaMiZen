<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAMIZEN SESSION - ADVANCED DEFENSE</title>

<style>
:root {
    --neon-blue: #00f2ff;
    --neon-gold: #f1c40f;
    --neon-red: #ff3131;
    --bg-dark: #050508;
}

body {
    margin: 0;
    overflow: hidden;
    background: var(--bg-dark);
    color: white;
    font-family: 'Orbitron', sans-serif;
    cursor: crosshair;
    touch-action: none;
}

/* HUD */
#hud {
    position: absolute;
    top: 15px;
    width: 100%;
    display: flex;
    justify-content: space-evenly;
    z-index: 100;
    pointer-events: none;
}

.data-box {
    background: rgba(0, 0, 0, 0.95);
    border: 2px solid var(--neon-blue);
    padding: 10px;
    text-align: center;
    min-width: 130px;
}

.label { font-size: 10px; color: var(--neon-blue); font-weight: 900; }
.value { font-size: 24px; font-weight: 900; }

#timer-display {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    color: var(--neon-red);
    font-size: 35px;
    font-weight: 900;
    z-index: 100;
}

#overlay, #discipline-block {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, #111 0%, #000 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    text-align: center;
}

#discipline-block { background: rgba(150, 0, 0, 0.98); display: none; z-index: 5000; }
.start-btn, .commit-btn {
    padding: 25px 50px;
    background: var(--neon-blue);
    color: black;
    border: none;
    font-weight: 900;
    cursor: pointer;
    font-size: 1.2rem;
    margin-top: 20px;
}
.commit-btn { background: white; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>

<body>

<div id="hud">
    <div class="data-box"><span class="label">NET WORTH</span><span id="val-money" class="value">$0</span></div>
    <div class="data-box"><span class="label">STABILITY</span><span id="val-health" class="value">100%</span></div>
    <div class="data-box"><span class="label">RECOVERY</span><span id="val-recovery" class="value">0/3</span></div>
</div>

<div id="timer-display">TIME REMAINING: <span id="clock">27:00</span></div>

<div id="discipline-block">
    <h1>HALTED</h1>
    <div>You triggered 3 negative concepts</div>
    <div id="dynamic-message">Discipline is freedom.</div>
    <button class="commit-btn" onclick="resumeTraining()">I ACCEPT</button>
</div>

<div id="overlay">
    <h1>KAMIZEN SESSION</h1>
    <p>CLICK/UP: LASER | HOLD: TRANSMUTATION BEAM</p>
    <button class="start-btn" onclick="startGame()">INITIALIZE TRAINING</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let stats = { money: 0, health: 100, recovery: 0 };
let active = false;
let objects = [];
let bullets = [];
let user = { x: 0, y: 0, size: 60, speedMult: 1, baseSize: 60 };
let consecutiveErrors = 0;
let isHoldingBeam = false;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

function startGame(){
    document.getElementById("overlay").style.display = "none";
    active = true;
    setInterval(spawn, 800);
    loop();
}

function spawn(){
    if(!active) return;
    const wordsPos = ["OPPORTUNITY","GROWTH","WEALTH","WISDOM","DINERO","FORTALEZA","DISCIPLINE","FOCUS","WIN"];
    const wordsNeg = ["ERROR","LOSS","DEBT","FEAR","PROCRASTINATION"];
    
    const isNeg = Math.random() > 0.6;
    const text = isNeg ? wordsNeg[Math.floor(Math.random()*wordsNeg.length)] : wordsPos[Math.floor(Math.random()*wordsPos.length)];

    objects.push({
        text,
        x: Math.random() * canvas.width,
        y: -50,
        speed: (2 + Math.random() * 3) * (isNeg ? 1.2 : 1),
        type: isNeg ? "neg" : "pos",
        hunting: isNeg && Math.random() > 0.4
    });
}

function fire(){
    if(!active) return;
    bullets.push({ x: user.x, y: user.y, speed: 12 * user.speedMult });
}

function update(){
    if(!active) return;

    // Balas normales
    bullets.forEach((b, i) => {
        b.y -= b.speed;
        if(b.y < 0) bullets.splice(i, 1);
    });

    objects.forEach((o, i) => {
        o.y += o.speed;
        if(o.hunting) o.x += (user.x - o.x) * 0.015;

        // Colisión con círculo azul
        const dist = Math.hypot(o.x - user.x, o.y - user.y);
        if(dist < user.size/2){
            if(o.type === "neg") {
                applyWeakness();
            } else {
                applyRecovery();
            }
            objects.splice(i, 1);
        }

        // Colisión con Balas
        bullets.forEach((b, bi) => {
            if(Math.hypot(o.x - b.x, o.y - b.y) < 30){
                stats.money += o.type === "pos" ? 100 : 20;
                objects.splice(i, 1);
                bullets.splice(bi, 1);
            }
        });

        // Laser de Transmutación (Mantenido)
        if(isHoldingBeam && Math.abs(o.x - user.x) < 40 && o.y < user.y){
            if(o.type === "neg"){
                o.type = "pos";
                o.text = "FORTALEZA";
                o.hunting = false;
                stats.money += 50;
            }
        }

        if(o.y > canvas.height) objects.splice(i, 1);
    });

    document.getElementById("val-money").innerText = "$"+stats.money;
    document.getElementById("val-health").innerText = stats.health+"%";
    document.getElementById("val-recovery").innerText = stats.recovery+"/3";
}

function applyWeakness(){
    stats.health -= 10;
    consecutiveErrors++;
    user.speedMult = 0.4;
    user.size = 35;
    stats.recovery = 0;
    if(consecutiveErrors >= 3){
        active = false;
        document.getElementById("discipline-block").style.display = "flex";
    }
}

function applyRecovery(){
    stats.money += 100;
    consecutiveErrors = 0;
    if(user.speedMult < 1){
        stats.recovery++;
        if(stats.recovery >= 3){
            user.speedMult = 1;
            user.size = user.baseSize;
            stats.recovery = 0;
        }
    }
}

function draw(){
    ctx.fillStyle = "rgba(5, 5, 8, 0.4)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Dibujar Balas
    bullets.forEach(b => {
        ctx.fillStyle = "white";
        ctx.fillRect(b.x-2, b.y, 4, 15);
    });

    // Dibujar Rayo de Transmutación
    if(isHoldingBeam){
        const grad = ctx.createLinearGradient(user.x, user.y, user.x, 0);
        grad.addColorStop(0, "rgba(0, 242, 255, 0.8)");
        grad.addColorStop(1, "transparent");
        ctx.fillStyle = grad;
        ctx.fillRect(user.x - 15, 0, 30, user.y);
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#00f2ff";
    }

    // Dibujar Palabras
    objects.forEach(o => {
        ctx.fillStyle = o.type === "neg" ? "#ff3131" : "#00ff41";
        ctx.font = "bold 18px Orbitron";
        ctx.textAlign = "center";
        ctx.fillText(o.text, o.x, o.y);
    });

    // Dibujar Usuario
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#00f2ff";
    ctx.beginPath();
    ctx.arc(user.x, user.y, user.size/2, 0, Math.PI*2);
    ctx.strokeStyle = "#00f2ff";
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.shadowBlur = 0;
}

function loop(){
    update();
    draw();
    if(active || !active) requestAnimationFrame(loop);
}

/* CONTROLES */
window.addEventListener("mousemove", (e) => { user.x = e.clientX; user.y = e.clientY; });
window.addEventListener("mousedown", () => { isHoldingBeam = true; fire(); });
window.addEventListener("mouseup", () => { isHoldingBeam = false; });
window.addEventListener("keydown", (e) => {
    if(e.key === "ArrowUp") fire();
    if(e.key === " ") isHoldingBeam = true;
});
window.addEventListener("keyup", (e) => {
    if(e.key === " ") isHoldingBeam = false;
});

function resumeTraining(){
    consecutiveErrors = 0;
    stats.health = 100;
    user.speedMult = 1;
    user.size = user.baseSize;
    document.getElementById("discipline-block").style.display = "none";
    active = true;
}
</script>
</body>
</html>
