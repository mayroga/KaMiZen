<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AL CIELO - NEURAL INTERFACE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
<style>
    :root {
        --neon-blue:#00f2ff; --neon-gold:#f1c40f; --neon-green:#2ecc71;
        --neon-purple:#9b59b6; --neon-red:#ff3131; --bg-dark:#020205;
    }
    body { margin:0; overflow:hidden; background:var(--bg-dark); color:white; font-family:'Orbitron', sans-serif; cursor: crosshair; }
    
    #hud {
        position:absolute; top:20px; width:100%; display:none;
        justify-content:space-evenly; z-index:100; pointer-events:none;
    }
    .data-box {
        background:rgba(0,0,0,0.85); border:2px solid var(--neon-blue);
        padding:10px 20px; text-align:center; box-shadow:0 0 20px rgba(0,242,255,0.3);
        min-width:120px; border-radius:5px;
    }
    .label { font-size:10px; color:var(--neon-blue); letter-spacing:2px; font-weight:900; display:block; }
    .value { font-size:24px; font-weight:900; display:block; color:#fff; }

    #terminal-overlay {
        position:fixed; inset:0; background:var(--bg-dark);
        display:flex; flex-direction:column; justify-content:center;
        align-items:center; z-index:2000; padding:40px; text-align:center;
    }
    .terminal-text {
        color: var(--neon-blue); font-size: 22px; margin: 15px;
        text-shadow: 0 0 15px var(--neon-blue); font-weight: 900;
    }
    .progress-bar {
        width: 80%; max-width: 500px; height: 6px; background: #111; 
        margin-top: 25px; border: 1px solid var(--neon-blue);
    }
    #progress-fill { width: 0%; height: 100%; background: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); transition: 0.4s; }
    
    .start-btn {
        padding:25px 60px; background:var(--neon-blue); color:black; border:none;
        font-family:'Orbitron'; font-weight:900; cursor:pointer;
        letter-spacing:5px; box-shadow:0 0 30px var(--neon-blue); font-size: 20px;
    }
    canvas { display:block; }
</style>
</head>
<body>

<div id="hud">
    <div class="data-box" style="border-color:var(--neon-gold);"><span class="label">CAPITAL</span><span id="val-money" class="value">0</span></div>
    <div class="data-box" style="border-color:var(--neon-green);"><span class="label">STABILITY</span><span id="val-health" class="value">100%</span></div>
    <div class="data-box" style="border-color:var(--neon-purple);"><span class="label">BIZ UNITS</span><span id="val-biz" class="value">0</span></div>
</div>

<div id="terminal-overlay">
    <div id="init-view">
        <h1 style="color:var(--neon-blue);letter-spacing:15px;font-size:60px;margin-bottom:0;">AL CIELO</h1>
        <p style="letter-spacing:8px;color:var(--neon-gold);margin-bottom:40px;">NEURAL EDUCATION INTERFACE</p>
        <button class="start-btn" onclick="startSequence()">INITIALIZE LEARNING</button>
    </div>
    <div id="process-view" style="display:none;">
        <div id="status-tag" style="font-size:14px; color:var(--neon-gold); margin-bottom:10px;">DECODING LIFE SECRETS...</div>
        <div id="main-log" class="terminal-text"></div>
        <div id="sub-log" style="font-size:16px; color:#aaa; max-width:600px;"></div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const hud = document.getElementById("hud");
const terminal = document.getElementById("terminal-overlay");
const mainLog = document.getElementById("main-log");
const subLog = document.getElementById("sub-log");
const progressFill = document.getElementById("progress-fill");

let stats = {money:0, health:100, biz:0};
let objects = [];
let particles = [];
let active = false;
let audioCtx;
const user = {x: innerWidth/2, y: innerHeight/2, size: 60};

// DATA DE TUS JSON
let STORIES = [];
let MISSIONS = [];

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

async function startSequence() {
    initAudio();
    document.getElementById("init-view").style.display = "none";
    document.getElementById("process-view").style.display = "block";
    
    try {
        const sRes = await fetch("stories.json");
        const sData = await sRes.json();
        STORIES = sData.stories || [];
        const mRes = await fetch("missions.json");
        const mData = await mRes.json();
        MISSIONS = mData.missions || [];
    } catch (e) {
        STORIES = [{title: "CONOCIMIENTO PROHIBIDO", text: "Cargando lecciones de libertad financiera..."}];
        MISSIONS = [{id: "LECCIÓN 1"}];
    }

    // PROCESO SECUENCIAL DE TUS JSON
    const totalSteps = STORIES.length + MISSIONS.length;
    let currentStep = 0;

    for(let s of STORIES) {
        currentStep++;
        mainLog.innerText = s.title;
        subLog.innerText = s.text || "Descifrando información...";
        progressFill.style.width = `${(currentStep/totalSteps)*100}%`;
        playBeep(440, "sine");
        await new Promise(r => setTimeout(r, 2500));
    }

    for(let m of MISSIONS) {
        currentStep++;
        mainLog.innerText = `MISIÓN: ${m.id}`;
        subLog.innerText = "Objetivo: Dominar el flujo de activos.";
        progressFill.style.width = `${(currentStep/totalSteps)*100}%`;
        playBeep(554, "square");
        await new Promise(r => setTimeout(r, 2500));
    }

    mainLog.innerText = "SISTEMA CARGADO";
    subLog.innerText = "Entrando en la zona de flujo...";
    await new Promise(r => setTimeout(r, 1500));
    
    terminal.style.display = "none";
    hud.style.display = "flex";
    launchGame();
}

/* ===================== SONIDOS Y EFECTOS ===================== */
function playBeep(freq, type) {
    if(!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.5);
}

function createExplosion(x, y, color) {
    for(let i=0; i<15; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random()-0.5)*10,
            vy: (Math.random()-0.5)*10,
            life: 1.0,
            color: color
        });
    }
}

/* ===================== MOTOR DE JUEGO ===================== */
const rawData = [
    {text:"AHORRO", emoji:"💰", color:"#f1c40f", stat:"money", impact:200, freq:523},
    {text:"NEGOCIO", emoji:"🤝", color:"#3498db", stat:"biz", impact:1, freq:659},
    {text:"FAMILIA", emoji:"🏠", color:"#2ecc71", stat:"health", impact:15, freq:783},
    {text:"VALOR", emoji:"🦁", color:"#ff8c00", stat:"biz", impact:2, freq:880},
    {text:"DEUDA", emoji:"⚠️", color:"#ff3131", stat:"health", impact:-25, freq:110}
];

function spawn() {
    if(!active) return;
    const d = rawData[Math.floor(Math.random()*rawData.length)];
    objects.push({
        ...d,
        x: Math.random()*(innerWidth-100)+50,
        y: -50,
        speed: 2.5 + Math.random()*2,
        rot: Math.random()*Math.PI
    });
}

function update() {
    if(!active) return;

    // Actualizar Objetos
    for(let i=objects.length-1; i>=0; i--) {
        let o = objects[i];
        o.y += o.speed;
        
        const dist = Math.hypot(o.x - user.x, (o.y) - user.y);
        
        if(dist < user.size + 20) {
            // EXPLOSIÓN Y SONIDO
            playBeep(o.freq, o.stat === "health" && o.impact < 0 ? "sawtooth" : "sine");
            createExplosion(o.x, o.y, o.color);
            
            // IMPACTO DE STATS
            if(o.stat === "money") stats.money += o.impact;
            if(o.stat === "biz") stats.biz += o.impact;
            if(o.stat === "health") stats.health = Math.max(0, Math.min(100, stats.health + o.impact));
            
            objects.splice(i, 1);
            updateHUD();
        } else if (o.y > innerHeight + 100) {
            objects.splice(i, 1);
        }
    }

    // Actualizar Partículas
    for(let i=particles.length-1; i>=0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if(p.life <= 0) particles.splice(i, 1);
    }
}

function updateHUD() {
    document.getElementById("val-money").innerText = stats.money;
    document.getElementById("val-health").innerText = stats.health + "%";
    document.getElementById("val-biz").innerText = stats.biz;
}

function draw() {
    ctx.fillStyle = "rgba(2, 2, 5, 0.2)"; // Efecto estela
    ctx.fillRect(0, 0, innerWidth, innerHeight);
    
    // Partículas de explosión
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
        ctx.fill();
    });
    ctx.globalAlpha = 1.0;

    // Usuario (Interface Cursor)
    ctx.strokeStyle = "#00f2ff";
    ctx.lineWidth = 3;
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#00f2ff";
    ctx.beginPath();
    ctx.arc(user.x, user.y, user.size, 0, Math.PI*2);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Palabras Flotantes, Avatares y Texto Nítido
    ctx.font = "900 20px Orbitron";
    ctx.textAlign = "center";
    objects.forEach(o => {
        // Sombra para nitidez
        ctx.shadowBlur = 10;
        ctx.shadowColor = o.color;
        ctx.fillStyle = o.color;
        
        // Avatar (Emoji) más grande
        ctx.font = "40px Arial";
        ctx.fillText(o.emoji, o.x, o.y);
        
        // Palabra debajo
        ctx.font = "900 18px Orbitron";
        ctx.fillText(o.text, o.x, o.y + 35);
        ctx.shadowBlur = 0;
    });
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

function launchGame() {
    active = true;
    resize();
    setInterval(spawn, 900);
    loop();
}

function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

window.addEventListener("resize", resize);
window.addEventListener("mousemove", e => {
    user.x = e.clientX;
    user.y = e.clientY;
});

// Soporte Touch para tablets
window.addEventListener("touchmove", e => {
    user.x = e.touches[0].clientX;
    user.y = e.touches[0].clientY;
    e.preventDefault();
}, {passive: false});

</script>
</body>
</html>
