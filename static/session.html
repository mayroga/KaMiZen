<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | SURVIVAL PRO SYSTEM</title>

<style>
/* =====================================================
   🌌 CORE VISUAL SYSTEM
===================================================== */

body {
    margin: 0;
    background: radial-gradient(circle, #001a33, #000);
    color: #fff;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow: hidden;
    cursor: crosshair;
    transition: background 0.5s;
}

/* ===================================================== */

#topbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 15px;
    z-index: 100;
    background: rgba(0,0,0,0.3);
}

#game {
    padding-top: 80px;
    position: relative;
    z-index: 10;
}

button {
    padding: 14px 22px;
    margin: 10px;
    font-size: 16px;
    border: 2px solid #00f2ff;
    background: rgba(0, 242, 255, 0.1);
    color: white;
    border-radius: 12px;
    cursor: pointer;
}

button:hover {
    background: #00f2ff;
    color: #000;
}

/* ===================================================== */

.opt-btn {
    display: block;
    width: 80%;
    max-width: 520px;
    margin: 10px auto;
    text-align: left;
}

/* =====================================================
   🧘 BREATH CORE
===================================================== */

#breath {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle, #00f2ff, #0044ff);
    margin: 20px auto;
    display: none;
    transition: transform 4s ease-in-out;
    box-shadow: 0 0 30px #00f2ff;
}

/* =====================================================
   🌌 FLOATING WORDS (COLOR = WARNING ONLY)
===================================================== */

.floating {
    position: absolute;
    padding: 10px 16px;
    border-radius: 18px;
    font-weight: bold;
    user-select: none;
    cursor: pointer;
    animation: floatUp 5s linear forwards;
}

/* COLOR DOES NOT MEAN VALUE — ONLY SIGNAL */

.good { border: 2px solid #00ff00; color:#00ff00; }
.bad { border: 2px solid #ff0000; color:#ff0000; }
.neutral { border: 2px solid #ffff00; color:#ffff00; }

@keyframes floatUp {
    from { transform: translateY(110vh); }
    to { transform: translateY(-20vh); }
}

.blast {
    animation: burst 0.3s forwards;
}

@keyframes burst {
    to { transform: scale(3); opacity: 0; }
}

/* ===================================================== */

#explanation-box {
    background: rgba(0,0,0,0.85);
    border-left: 5px solid #00f2ff;
    padding: 18px;
    margin: 20px auto;
    width: 80%;
    display: none;
}

/* ===================================================== */

#story { font-size: 1.4rem; margin: 20px; font-weight: bold; }
#analysis { color: #00f2ff; margin-bottom: 20px; }

</style>
</head>

<body>

<div id="topbar">
    <button onclick="toggleLang()">EN/ES</button>
    <div id="score-display">ENERGY: 0</div>
</div>

<div id="game">

    <div id="top-ui">
        <div id="stat-focus">FOCUS: 100%</div>
        <div id="stat-points">POINTS</div>
    </div>

    <h2 id="hero-name"></h2>

    <div id="breath"></div>

    <div id="story">Loading mission...</div>
    <div id="analysis"></div>

    <div id="explanation-box"></div>

    <div id="options"></div>
</div>

<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="ok" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

<script>

/* =====================================================
   🧠 STATE (ENGINE ALIGNED)
===================================================== */

let lang = "en";
let missionId = 1;
let score = 0;
let silenceSeconds = 20;
let currentMission = null;

/* ===================================================== */

const WORDS = [
    { w:"SURVIVAL", v:15, impact:"positive" },
    { w:"INSTINCT", v:12, impact:"positive" },
    { w:"ESCAPE", v:15, impact:"positive" },
    { w:"AWARENESS", v:12, impact:"positive" },
    { w:"ALERT", v:10, impact:"positive" },
    { w:"SHIELD", v:10, impact:"positive" },

    { w:"THREAT", v:-15, impact:"negative" },
    { w:"FREEZE", v:-12, impact:"negative" },
    { w:"VICTIM", v:-20, impact:"negative" },
    { w:"PANIC", v:-15, impact:"negative" },
    { w:"DANGER", v:-10, impact:"negative" }
];

/* =====================================================
   🎨 COLOR RULE (NO MEANING, ONLY SIGNAL)
===================================================== */

function color(word){
    if(word.v < 0) return "red";
    if(word.v > 10) return "green";
    return "yellow";
}

/* ===================================================== */

function speak(t){
    speechSynthesis.cancel();
    let u = new SpeechSynthesisUtterance(t);
    u.lang = "en-US";
    u.rate = 0.9;
    speechSynthesis.speak(u);
}

/* ===================================================== */

async function init(){
    document.getElementById("hero-name").innerText = "KAMIZEN USER";
    startFloating();
    loadMission();
}

/* ===================================================== */

async function loadMission(){
    try{
        let r = await fetch("/api/mission/" + missionId);
        currentMission = await r.json();
        render(currentMission);
    }catch(e){}
}

/* ===================================================== */

function render(m){

    let story = m.blocks.find(b=>b.type==="story").text.en;
    let analysis = m.blocks.find(b=>b.type==="analysis").text.en;

    document.getElementById("story").innerText = story;
    document.getElementById("analysis").innerText = "";

    speak(story);

    setTimeout(()=>{
        document.getElementById("analysis").innerText = analysis;
        speak(analysis);
    },2500);

    setTimeout(()=>showOptions(m.blocks.find(b=>b.type==="decision").options),5000);
}

/* ===================================================== */

function showOptions(opts){
    let c = document.getElementById("options");
    c.innerHTML="";

    opts.forEach(o=>{
        let b=document.createElement("button");
        b.className="opt-btn";
        b.innerText=o.text.en;
        b.onclick=()=>handle(o);
        c.appendChild(b);
    });
}

/* =====================================================
   🎮 DECISION SYSTEM (NO WRONG PROGRESSION)
===================================================== */

function handle(opt){

    let box = document.getElementById("explanation-box");
    box.style.display="block";

    if(!opt.correct){

        box.innerText="Incorrect. Retry required.";
        speak("Incorrect. Try again.");
        return; // ❌ NO ADVANCE
    }

    box.innerText="Correct decision validated.";
    score += 20;

    document.getElementById("score-display").innerText="ENERGY: "+score;

    speak("Correct");

    setTimeout(()=>{
        missionId++;
        startSilence();
    },2000);
}

/* =====================================================
   🌌 FLOATING WORDS (ENGINE MATCHED)
===================================================== */

function startFloating(){

    setInterval(()=>{

        let w = WORDS[Math.floor(Math.random()*WORDS.length)];

        let el=document.createElement("div");
        el.className="floating "+(w.v<0?"bad":w.v>10?"good":"neutral");
        el.innerText=w.w;
        el.style.left=Math.random()*90+"vw";

        el.onclick=()=>{

            score+=w.v;

            let msg = w.impact==="positive"
                ? `${w.w} improves survival awareness`
                : `${w.w} represents risk pattern`;

            document.getElementById("analysis").innerText=msg;
            speak(msg);

            el.remove();
        };

        document.body.appendChild(el);

        setTimeout(()=>el.remove(),5000);

    },1500);
}

/* =====================================================
   🧘 SILENCE SYSTEM (20–60 SEC PROGRESSIVE)
===================================================== */

function startSilence(){

    let t = Math.min(20 + missionId, 60);
    silenceSeconds = t;

    document.getElementById("story").innerText =
        "SILENCE CHALLENGE: " + t + " SECONDS";

    speak("Silence training started");

    let timer=setInterval(()=>{

        t--;

        if(t<=0){
            clearInterval(timer);
            missionId++;
            loadMission();
        }

    },1000);
}

/* ===================================================== */

window.onload=init;

</script>

</body>
</html>
