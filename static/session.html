<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAMIZEN - NEUROGAME</title>
<style>
    :root { --primary: #00f2ff; --bg: #05070d; --font: 'Segoe UI', Roboto, sans-serif; --success: #28a745; --error: #dc3545; }
    body { margin:0; background: var(--bg); color:#fff; font-family: var(--font); overflow:hidden; }
    
    /* Timer y UI Central */
    #timer { position:absolute; top:20px; left:50%; transform:translateX(-50%); font-size:80px; color:var(--primary); font-weight:bold; z-index:100; text-shadow: 0 0 20px rgba(0,242,255,0.5); display:none; }
    #mainDisplay { position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); width:85%; text-align:center; z-index:50; }
    #textNarrator { font-size:26px; line-height:1.5; margin-bottom: 30px; }
    
    /* Trivia System */
    #quizArea { display:none; flex-direction:column; gap:12px; max-width:600px; margin: 0 auto; }
    .opt-btn { padding:15px; background:rgba(255,255,255,0.05); border:1px solid var(--primary); color:#fff; cursor:pointer; border-radius:8px; font-size:18px; transition:0.3s; }
    .correct { background: var(--success) !important; border-color: #fff; }
    .wrong { background: var(--error) !important; border-color: #fff; }
    #explanation { margin-top:15px; font-size:18px; color:var(--primary); display:none; background:rgba(0,0,0,0.5); padding:10px; border-radius:5px; }

    /* Paneles de Control */
    .btn-panel { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 1000; }
    .btn-ka { padding:12px 30px; font-size:16px; background:var(--primary); color:#000; border:none; border-radius:50px; cursor:pointer; font-weight:bold; box-shadow: 0 0 15px var(--primary); }
    #btnContinue, #btnNextQuiz, #btnFinishMission { display:none; }
    
    /* Patrones / Indicators */
    #indicators { position:absolute; right:20px; top:50%; transform:translateY(-50%); display:none; flex-direction:column; gap:10px; z-index:100; }
    .bar-wrap { display: flex; align-items: center; gap: 8px; }
    .bar-lbl { font-size: 9px; width: 50px; text-align: right; color: var(--primary); }
    .bar-bg { width:8px; height:50px; background:rgba(255,255,255,0.1); border-radius:4px; position:relative; }
    .bar-fill { position:absolute; bottom:0; width:100%; height:0%; background:var(--primary); transition: height 0.4s; }

    /* Breath / Silence */
    #breathLayer { display:none; position:fixed; inset:0; flex-direction:column; justify-content:center; align-items:center; z-index:150; background: var(--bg); }
    #breathCircle { width: 220px; height: 220px; border-radius: 50%; background: radial-gradient(circle, #00f2ff 0%, #0044ff 100%); box-shadow: 0 0 80px #00f2ff; display:flex; justify-content:center; align-items:center; font-weight:bold; font-size:24px; transition: 4s ease-in-out; }
    #scienceInfo { margin-top: 50px; width: 70%; text-align: center; color: var(--primary); font-size: 19px; line-height:1.4; }

    /* Word Animation */
    .floating-word { position:absolute; font-size:22px; color:var(--primary); font-weight:bold; cursor:pointer; animation: floatUp 6s linear forwards; white-space: nowrap; z-index: 80; }
    @keyframes floatUp { 0%{transform:translateY(0); opacity:0;} 10%{opacity:1;} 90%{opacity:1;} 100%{transform:translateY(-500px); opacity:0;} }

    #explanationBox { position:absolute; bottom:120px; left:30px; width:280px; padding:15px; background: rgba(0,242,255,0.1); border-left: 4px solid var(--primary); font-size:14px; opacity:0; pointer-events:none; }
</style>
</head>
<body>

<div id="timer">00:00</div>

<div id="mainDisplay">
    <div id="textNarrator">Iniciando KaMiZen...</div>
    <div id="quizArea"></div>
    <div id="explanation"></div>
</div>

<div id="explanationBox">
    <strong id="expTitle"></strong><br><span id="expBody"></span>
</div>

<div id="indicators"></div>

<div id="breathLayer">
    <div id="breathCircle">IDLE</div>
    <div id="scienceInfo"></div>
</div>

<div class="btn-panel">
    <button id="btnBack" class="btn-ka" style="background:#444; color:#fff;" onclick="location.reload()">BACK</button>
    <button id="btnClear" class="btn-ka" style="background:#ff4444;" onclick="localStorage.clear(); location.reload();">LIMPIAR CACHE</button>
    <button id="btnStart" class="btn-ka" onclick="KaMiZen.start()">EMPEZAR</button>
    <button id="btnContinue" class="btn-ka" onclick="KaMiZen.nextStep()">CONTINUAR</button>
    <button id="btnNextQuiz" class="btn-ka" onclick="KaMiZen.processTrivia()">SIGUIENTE PREGUNTA</button>
    <button id="btnFinishMission" class="btn-ka" onclick="KaMiZen.cycle2()">CONTINUAR A CICLO 2</button>
</div>

<audio id="bgMusic" loop src="https://assets.mixkit.co/music/preview/mixkit-tech-house-vibes-130.mp3"></audio>
<audio id="sfxCorrect" src="https://www.myinstants.com/media/sounds/correct.mp3"></audio>
<audio id="sfxWrong" src="https://www.myinstants.com/media/sounds/wrong.mp3"></audio>

<script>
const KaMiZen = (() => {
    let state = {
        lang: 'es', phase: 'intro', data: null, 
        stats: {}, quizIdx: 0, timer: null
    };

    const pillars = {
        "PROPOSITO": { cat: "Core", en: "Your Why.", es: "Tu Porqué interno." },
        "DISCIPLINA": { cat: "Action", en: "Consistency.", es: "Consistencia pura." },
        "RESILIENCIA": { cat: "Spirit", en: "Absorb chaos.", es: "Absorber el caos." },
        "RIQUEZA": { cat: "Value", en: "Value provided.", es: "Valor aportado." }
    };

    const speak = (text, callback) => {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text.replace(/[\\/_.,()]/g, ' '));
        const voices = window.speechSynthesis.getVoices();
        msg.voice = voices.find(v => v.name.includes("David") || v.name.includes("Male")) || voices[0];
        msg.rate = 0.8; 
        msg.onend = callback;
        window.speechSynthesis.speak(msg);
    };

    const start = async () => {
        document.getElementById("btnStart").style.display = "none";
        const res = await fetch("/api/session/start");
        state.data = await res.json();
        playStories();
    };

    const playStories = () => {
        state.phase = 'stories';
        const txt = state.data.story[state.lang];
        document.getElementById("textNarrator").innerText = txt;
        speak(txt, () => {
            document.getElementById("btnContinue").style.display = "block";
        });
    };

    const nextStep = () => {
        document.getElementById("btnContinue").style.display = "none";
        if(state.phase === 'stories') playCycle(1);
        else if(state.phase === 'diag1') playMission();
        else if(state.phase === 'diag2') playSilence();
    };

    const playCycle = (num) => {
        state.phase = 'cycle' + num;
        document.getElementById("textNarrator").innerText = "";
        document.getElementById("timer").style.display = "block";
        document.getElementById("indicators").style.display = "flex";
        initBars();
        
        document.getElementById("bgMusic").play();
        let timeLeft = 300; 
        
        state.timer = setInterval(() => {
            timeLeft--;
            document.getElementById("timer").innerText = formatTime(timeLeft);
            spawnWord(timeLeft);
            if(timeLeft <= 0) {
                clearInterval(state.timer);
                showDiagnosis(num);
            }
        }, 1000);
    };

    const spawnWord = (timeLeft) => {
        const keys = Object.keys(pillars);
        const key = keys[Math.floor(Math.random()*keys.length)];
        const el = document.createElement("div");
        el.className = "floating-word";
        el.innerText = key;
        el.style.left = (Math.random()*70 + 10) + "%";
        el.style.top = "90%";
        
        el.onclick = () => {
            state.stats[pillars[key].cat] = (state.stats[pillars[key].cat] || 0) + 1;
            updateBars();
            if(300 - timeLeft <= 60) {
                const box = document.getElementById("explanationBox");
                box.style.opacity = "1";
                document.getElementById("expTitle").innerText = key;
                document.getElementById("expBody").innerText = pillars[key][state.lang];
            }
            el.remove();
        };
        document.body.appendChild(el);
    };

    const showDiagnosis = (num) => {
        state.phase = 'diag' + num;
        document.getElementById("bgMusic").pause();
        const top = Object.keys(state.stats).reduce((a,b) => state.stats[a] > state.stats[b] ? a : b, "Balance");
        const diag = `Diagnóstico Neural ${num}: Tu interacción muestra un enfoque predominante en ${top}. Coherencia estabilizada.`;
        document.getElementById("textNarrator").innerText = diag;
        document.getElementById("timer").style.display = "none";
        speak(diag, () => {
            document.getElementById("btnContinue").style.display = "block";
        });
    };

    const playMission = () => {
        state.phase = 'mission';
        const missionText = state.data.mission.b[0].tx[state.lang];
        document.getElementById("textNarrator").innerText = missionText;
        speak(missionText, () => {
            processTrivia();
        });
    };

    const processTrivia = () => {
        const q = state.data.mission.b[0].qs[state.quizIdx];
        if(!q) {
            document.getElementById("quizArea").style.display = "none";
            document.getElementById("btnNextQuiz").style.display = "none";
            document.getElementById("btnFinishMission").style.display = "block";
            return;
        }
        
        document.getElementById("btnNextQuiz").style.display = "none";
        document.getElementById("explanation").style.display = "none";
        const area = document.getElementById("quizArea");
        area.style.display = "flex";
        area.innerHTML = `<p>${q.q[state.lang]}</p>`;
        
        q.o[state.lang].forEach((opt, i) => {
            const b = document.createElement("button");
            b.className = "opt-btn";
            b.innerText = opt;
            b.onclick = () => {
                const isCorrect = (i === q.a);
                b.classList.add(isCorrect ? 'correct' : 'wrong');
                document.querySelectorAll(".opt-btn").forEach(btn => btn.onclick = null);
                
                const feedback = isCorrect ? "Correcto" : "Incorrecto";
                document.getElementById(isCorrect ? "sfxCorrect" : "sfxWrong").play();
                
                const expTxt = `${feedback}. ${q.e[state.lang]}`;
                document.getElementById("explanation").innerText = q.e[state.lang];
                document.getElementById("explanation").style.display = "block";
                
                speak(expTxt, () => {
                    state.quizIdx++;
                    document.getElementById("btnNextQuiz").style.display = "block";
                });
            };
            area.appendChild(b);
        });
        speak(q.q[state.lang]);
    };

    const playSilence = async () => {
        state.phase = 'silence';
        document.getElementById("indicators").style.display = "none";
        document.getElementById("breathLayer").style.display = "flex";
        document.getElementById("scienceInfo").innerText = "El silencio desactiva la Amígdala y sincroniza el corazón con el cerebro.";
        
        let t = 60; // Ejemplo 1 min
        document.getElementById("timer").style.display = "block";

        while(t > 0) {
            document.getElementById("timer").innerText = formatTime(t);
            await breathStep("INHALE", 1.8, 4000);
            await breathStep("HOLD", 1.8, 4000);
            await breathStep("EXHALE", 1.0, 4000);
            t -= 12;
        }
        alert("Sesión KaMiZen Completada.");
        location.reload();
    };

    const breathStep = (txt, scale, time) => {
        return new Promise(r => {
            const c = document.getElementById("breathCircle");
            c.innerText = txt;
            c.style.transform = `scale(${scale})`;
            setTimeout(r, time);
        });
    };

    const initBars = () => {
        const ind = document.getElementById("indicators");
        ind.innerHTML = "";
        Object.keys(pillars).forEach(k => {
            ind.innerHTML += `<div class="bar-wrap"><div class="bar-lbl">${k}</div><div class="bar-bg"><div class="bar-fill" id="bar-${pillars[k].cat}"></div></div></div>`;
        });
    };

    const updateBars = () => {
        Object.keys(state.stats).forEach(cat => {
            const el = document.getElementById(`bar-${cat}`);
            if(el) el.style.height = Math.min(state.stats[cat]*10, 100) + "%";
        });
    };

    const formatTime = (s) => {
        const m = Math.floor(s/60);
        const sec = s%60;
        return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    };

    return { start, nextStep, processTrivia, cycle2: () => playCycle(2) };
})();
</script>
</body>
</html>
