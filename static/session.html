<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAMIZEN SESSION - DEFENSE MODE</title>

<style>
:root {
    --neon-blue: #00f2ff;
    --neon-gold: #f1c40f;
    --neon-red: #ff3131;
    --bg-dark: #050508;
}

body {
    margin: 0;
    overflow: hidden;
    background: var(--bg-dark);
    color: white;
    font-family: 'Orbitron', sans-serif;
    cursor: crosshair;
    touch-action: none;
}

/* HUD */
#hud {
    position: absolute;
    top: 15px;
    width: 100%;
    display: flex;
    justify-content: space-evenly;
    z-index: 100;
    pointer-events: none;
}

.data-box {
    background: rgba(0, 0, 0, 0.95);
    border: 2px solid var(--neon-blue);
    padding: 10px;
    text-align: center;
    min-width: 130px;
}

.label {
    font-size: 10px;
    color: var(--neon-blue);
    font-weight: 900;
}

.value {
    font-size: 24px;
    font-weight: 900;
}

/* TIMER */
#timer-display {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    color: var(--neon-red);
    font-size: 35px;
    font-weight: 900;
    z-index: 100;
}

/* OVERLAY */
#overlay, #discipline-block {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, #111 0%, #000 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    text-align: center;
}

#discipline-block {
    background: rgba(150, 0, 0, 0.98);
    display: none;
    z-index: 5000;
}

.start-btn, .commit-btn {
    padding: 25px 50px;
    background: var(--neon-blue);
    color: black;
    border: none;
    font-weight: 900;
    cursor: pointer;
    font-size: 1.2rem;
    margin-top: 20px;
}

.commit-btn {
    background: white;
}

/* FLASH */
#flash-alert {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    opacity: 0;
}

#centerText {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    z-index: 2;
}

#explanationBox {
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 280px;
    background: #111;
    border: 1px solid var(--neon-blue);
    padding: 10px;
    opacity: 0;
    z-index: 10;
}

#expTitle { font-weight: bold; }
#expBody { font-size: 14px; }
</style>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>

<body>

<div id="flash-alert"></div>
<div id="centerText"></div>
<div id="timer-display">TIME REMAINING: <span id="clock">27:00</span></div>

<div id="hud">
    <div class="data-box"><span class="label">NET WORTH</span><span id="val-money" class="value">$0</span></div>
    <div class="data-box"><span class="label">STABILITY</span><span id="val-health" class="value">100%</span></div>
    <div class="data-box"><span class="label">LEVEL</span><span id="val-rank" class="value">1</span></div>
</div>

<div id="explanationBox">
    <div id="expTitle">INFO</div>
    <div id="expBody"></div>
</div>

<audio id="sfxGlass" src="https://assets.mixkit.co/sfx/preview/mixkit-glass-click-1110.mp3"></audio>

<div id="discipline-block">
    <h1>HALTED</h1>
    <div>3 Negative Concepts Triggered</div>
    <div id="dynamic-message">Discipline is the bridge between goals and accomplishment.</div>
    <button class="commit-btn" onclick="resumeTraining()">I ACCEPT</button>
</div>

<div id="overlay">
    <h1>KAMIZEN SESSION</h1>
    <p>USE CLICK OR UP ARROW TO FIRE LASERS</p>
    <button class="start-btn" onclick="startGame()">INITIALIZE TRAINING</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let stats = { money: 0, health: 100, currentLevelIdx: 0, totalSeconds: 27 * 60 };
let active = false;
let objects = [];
let bullets = [];
let user = { x: 0, y: 0, size: 40 };
let consecutiveErrors = 0;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function safeSpeak(t){
    try{
        speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(t);
        speechSynthesis.speak(msg);
    }catch(e){}
}

function startGame(){
    document.getElementById("overlay").style.display = "none";
    active = true;
    safeSpeak("Training and defense systems active.");
    setInterval(spawn, 900);
    loop();
}

function spawn(){
    if(!active) return;

    const posWords = ["OPPORTUNITY","GROWTH","WEALTH","WISDOM","MONEY","DISCIPLINE","FOCUS"];
    const negWords = ["LOSS","DEBT","PROCRASTINATION","FEAR","ERROR"];
    
    const isNeg = Math.random() > 0.7;
    const text = isNeg ? negWords[Math.floor(Math.random()*negWords.length)] : posWords[Math.floor(Math.random()*posWords.length)];

    objects.push({
        text,
        x: Math.random() * canvas.width,
        y: -50,
        speed: 2 + Math.random() * 3,
        type: isNeg ? "neg" : "pos",
        hunting: isNeg && Math.random() > 0.5 // Algunas palabras rojas persiguen al usuario
    });
}

function fire(){
    if(!active) return;
    bullets.push({ x: user.x, y: user.y, speed: 10 });
    const sfx = document.getElementById("sfxGlass");
    sfx.currentTime = 0;
    sfx.play();
}

function update(){
    if(!active) return;

    // Actualizar Proyectiles
    bullets.forEach((b, bi) => {
        b.y -= b.speed;
        if(b.y < 0) bullets.splice(bi, 1);
    });

    // Actualizar Objetos (Palabras)
    objects.forEach((o, i) => {
        o.y += o.speed;

        // Comportamiento de Persecución (Palabras Rojas)
        if(o.hunting){
            let dx = user.x - o.x;
            o.x += dx * 0.02;
        }

        const distToUser = Math.hypot(o.x - user.x, o.y - user.y);

        // Colisión con el Usuario (Círculo Azul)
        if(distToUser < user.size){
            handleCollision(o, i);
        }

        // Colisión con Balas (Láser)
        bullets.forEach((b, bi) => {
            const distToBullet = Math.hypot(o.x - b.x, o.y - b.y);
            if(distToBullet < 40){
                if(o.type === "pos"){
                    stats.money += 150; // Bonus por puntería en oportunidades
                } else {
                    stats.money += 20; // Recompensa por destruir amenazas
                }
                objects.splice(i, 1);
                bullets.splice(bi, 1);
            }
        });

        if(o.y > canvas.height) objects.splice(i, 1);
    });

    document.getElementById("val-money").innerText = "$"+stats.money;
    document.getElementById("val-health").innerText = stats.health+"%";
    
    if(stats.health <= 0) location.reload();
}

function handleCollision(obj, index){
    if(obj.type === "neg"){
        stats.health -= 15;
        consecutiveErrors++;
        if(consecutiveErrors >= 3){
            active = false;
            document.getElementById("discipline-block").style.display = "flex";
        }
    } else {
        stats.money += 100;
        consecutiveErrors = 0;
    }
    objects.splice(index, 1);
}

function draw(){
    ctx.fillStyle = "rgba(5, 5, 8, 0.3)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Dibujar Láseres
    bullets.forEach(b => {
        ctx.shadowBlur = 15;
        ctx.shadowColor = "cyan";
        ctx.strokeStyle = "white";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(b.x, b.y);
        ctx.lineTo(b.x, b.y - 20);
        ctx.stroke();
    });

    // Dibujar Palabras
    ctx.shadowBlur = 0;
    objects.forEach(o => {
        ctx.fillStyle = o.type === "neg" ? "red" : "#00ff41";
        ctx.font = "bold 20px Orbitron";
        ctx.textAlign = "center";
        ctx.fillText(o.text, o.x, o.y);
        
        if(o.hunting){
            ctx.strokeStyle = "red";
            ctx.strokeRect(o.x - 50, o.y - 25, 100, 30);
        }
    });

    // Dibujar Usuario (Círculo Azul)
    ctx.beginPath();
    ctx.arc(user.x, user.y, 25, 0, Math.PI * 2);
    ctx.strokeStyle = varProp("--neon-blue");
    ctx.lineWidth = 4;
    ctx.stroke();
    
    // Efecto de mira
    ctx.beginPath();
    ctx.moveTo(user.x - 35, user.y); ctx.lineTo(user.x + 35, user.y);
    ctx.moveTo(user.x, user.y - 35); ctx.lineTo(user.x, user.y + 35);
    ctx.stroke();
}

function varProp(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function loop(){
    update();
    draw();
    if(active || document.getElementById("discipline-block").style.display === "flex") {
        requestAnimationFrame(loop);
    }
}

/* INPUTS */
window.addEventListener("mousemove", (e) => {
    user.x = e.clientX;
    user.y = e.clientY;
});

window.addEventListener("mousedown", fire);
window.addEventListener("keydown", (e) => {
    if(e.key === "ArrowUp") fire();
});

function resumeTraining(){
    consecutiveErrors = 0;
    document.getElementById("discipline-block").style.display = "none";
    active = true;
    stats.health = Math.max(stats.health, 50); // Recuperación parcial de estabilidad
}
</script>

</body>
</html>
