<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AL CIELO | NEURO-SYSTEM</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-gold: #f1c40f;
            --neon-green: #2ecc71;
            --neon-red: #ff3131;
            --bg-dark: #020205;
        }
        body { 
            margin: 0; overflow: hidden; background: var(--bg-dark); 
            color: white; font-family: 'Orbitron', sans-serif; 
            cursor: crosshair; user-select: none; touch-action: none;
        }
        #hud { 
            position: absolute; top: 10px; width: 100%; 
            display: flex; justify-content: space-around; z-index: 100; 
        }
        .data-box { 
            background: rgba(0,0,0,0.85); border: 2px solid var(--neon-blue); 
            padding: 5px 15px; text-align: center; border-radius: 5px;
        }
        .label { font-size: 9px; color: var(--neon-blue); font-weight: 900; display: block; }
        .value { font-size: 20px; font-weight: 900; }
        
        #overlay { 
            position: fixed; inset: 0; background: var(--bg-dark); 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 1000; text-align: center; 
        }
        .start-btn { 
            padding: 25px 60px; background: var(--neon-blue); color: black; 
            border: none; font-family: 'Orbitron'; font-weight: 900; 
            cursor: pointer; font-size: 1.2rem; box-shadow: 0 0 40px var(--neon-blue); 
        }
        canvas { display: block; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="hud">
    <div class="data-box" style="border-color: var(--neon-gold);"><span class="label">CAPITAL</span><span id="val-money" class="value">0</span></div>
    <div class="data-box" style="border-color: var(--neon-green);"><span class="label">STABILITY</span><span id="val-health" class="value">100%</span></div>
    <div class="data-box" style="border-color: var(--neon-blue);"><span class="label">LEVEL</span><span id="val-rank" class="value">1</span></div>
</div>

<div id="overlay">
    <h1 style="color: var(--neon-blue); letter-spacing: 10px; font-size: 3.5rem; margin-bottom: 0;">AL CIELO</h1>
    <p style="color: var(--neon-gold); font-weight: 900; margin-bottom: 30px;">NEURO-DISCIPLINE INTERFACE</p>
    <button class="start-btn" onclick="startGame()">INITIALIZE</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let audioCtx, mainNode;

const levels = [
    { rank: "LEVEL 1", target: 5000, laserPower: 1, words: [
        { text: "TELLING TRUTH", type: "pos", impact: 500, color: "#2ecc71" },
        { text: "HIDING TRUTH", type: "neg", impact: -200, color: "#ff3131" },
        { text: "CLEAN ROOM", type: "pos", impact: 300, color: "#2ecc71" },
        { text: "MESSY ROOM", type: "neg", impact: -100, color: "#ff3131" },
        { text: "SAYING SORRY", type: "pos", impact: 400, color: "#00f2ff" },
        { text: "SHARING", type: "pos", impact: 300, color: "#2ecc71" }
    ]},
    { rank: "LEVEL 2", target: 20000, laserPower: 3, words: [
        { text: "TEAMWORK", type: "pos", impact: 800, color: "#2ecc71" },
        { text: "PEER PRESSURE", type: "neg", impact: -500, color: "#ff3131" },
        { text: "HELPING OTHERS", type: "pos", impact: 900, color: "#f1c40f" },
        { text: "BULLYING", type: "neg", impact: -600, color: "#ff3131" },
        { text: "STUDY TIME", type: "pos", impact: 700, color: "#00f2ff" },
        { text: "CHEATING", type: "neg", impact: -800, color: "#ff3131" }
    ]},
    { rank: "LEVEL 3", target: 100000, laserPower: 6, words: [
        { text: "EMERGENCY 911", type: "pos", impact: 2000, color: "#2ecc71" },
        { text: "STRANGE CAR", type: "neg", impact: -1500, color: "#ff3131" },
        { text: "SAFE ADULT", type: "pos", impact: 1500, color: "#00f2ff" },
        { text: "DARK ALLEY", type: "neg", impact: -2000, color: "#ff3131" },
        { text: "FIRE DRILL", type: "pos", impact: 1200, color: "#2ecc71" },
        { text: "DANGER DETECTED", type: "neg", impact: -2500, color: "#ff3131" }
    ]}
];

let stats = { money: 0, health: 100, levelIdx: 0 };
let active = false;
let objects = [];
let particles = [];
let user = { x: window.innerWidth/2, y: window.innerHeight/2, size: 60 };

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

// --- SISTEMA DE AUDIO CONSTANTE Y EFECTOS ---
function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Drone constante de fondo
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 60; 
    gain.gain.value = 0.05;
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start();
}

function playTone(freq, type, dur, vol) {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

function createExplosion(x, y, color) {
    for(let i=0; i<15; i++) {
        particles.push({
            x, y, 
            vx: (Math.random()-0.5)*10, 
            vy: (Math.random()-0.5)*10, 
            life: 1, color
        });
    }
}

function spawn() {
    if(!active) return;
    const level = levels[stats.levelIdx];
    const data = level.words[Math.floor(Math.random() * level.words.length)];
    objects.push({
        ...data,
        x: Math.random() * (canvas.width - 200) + 100,
        y: -50,
        speed: 2 + (stats.levelIdx * 1.5),
        sideMove: (Math.random() - 0.5) * 2,
        w: ctx.measureText(data.text).width + 40
    });
}

function update() {
    if(!active) return;

    objects.forEach((obj, i) => {
        obj.y += obj.speed;
        obj.x += Math.sin(obj.y * 0.02) * obj.sideMove; // Movimiento lateral errático

        const d = Math.sqrt((obj.x - user.x)**2 + (obj.y - user.y)**2);
        if (d < user.size) {
            createExplosion(obj.x, obj.y, obj.color);
            if(obj.type === 'neg') {
                stats.health -= 15;
                stats.money = Math.max(0, stats.money - 500);
                playTone(100, 'sawtooth', 0.6, 0.2); // Castigo
            } else {
                stats.money += obj.impact;
                stats.health = Math.min(100, stats.health + 2);
                playTone(880, 'sine', 0.2, 0.1); // Premio
            }
            objects.splice(i, 1);
            updateHUD();
        }
        if (obj.y > canvas.height + 100) objects.splice(i, 1);
    });

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if(p.life <= 0) particles.splice(i, 1);
    });

    if (stats.money >= levels[stats.levelIdx].target && stats.levelIdx < 2) {
        stats.levelIdx++;
        playTone(440, 'square', 1.5, 0.1);
        updateHUD();
    }
    
    if(stats.health <= 0) {
        alert("ESTABILIDAD PERDIDA. RE-SINCRONIZANDO.");
        stats.health = 100;
        updateHUD();
    }
}

function updateHUD() {
    document.getElementById('val-money').innerText = stats.money;
    document.getElementById('val-health').innerText = stats.health + "%";
    document.getElementById('val-rank').innerText = stats.levelIdx + 1;
}

function draw() {
    ctx.fillStyle = 'rgba(2, 2, 5, 0.2)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Dibujar Usuario
    ctx.lineWidth = 3;
    ctx.strokeStyle = varColor('--neon-blue');
    ctx.shadowBlur = 15; ctx.shadowColor = varColor('--neon-blue');
    ctx.beginPath(); ctx.arc(user.x, user.y, user.size - 20, 0, Math.PI*2); ctx.stroke();

    objects.forEach(obj => {
        // LÁSERES INTENSOS (Aumentan con nivel)
        const power = levels[stats.levelIdx].laserPower;
        if(obj.type === 'neg') {
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = obj.color;
            ctx.lineWidth = power;
            ctx.beginPath(); ctx.moveTo(obj.x, obj.y); ctx.lineTo(user.x, user.y); ctx.stroke();
            ctx.setLineDash([]);
        }

        // PALABRAS LEGIBLES (Fondo negro para contraste)
        ctx.font = "900 24px Orbitron";
        const textWidth = ctx.measureText(obj.text).width;
        
        ctx.fillStyle = "black";
        ctx.fillRect(obj.x - textWidth/2 - 10, obj.y - 15, textWidth + 20, 30);
        
        ctx.fillStyle = obj.color;
        ctx.textAlign = "center";
        ctx.shadowBlur = 5;
        ctx.fillText(obj.text, obj.x, obj.y + 8);
    });

    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 4, 4);
    });
    ctx.globalAlpha = 1;
}

function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

function handleInput(e) {
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    user.x = clientX; user.y = clientY;
}
window.addEventListener('mousemove', handleInput);
window.addEventListener('touchmove', (e) => { handleInput(e); e.preventDefault(); }, {passive:false});

function startGame() {
    document.getElementById('overlay').style.display = 'none';
    initAudio();
    active = true;
    setInterval(spawn, 800);
    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    gameLoop();
}
</script>
</body>
</html>
