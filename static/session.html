<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MAYKAMI NEUROGAME</title>
<style>
    :root { --primary: #00f2ff; --bg: #05070d; --font: 'Segoe UI', Roboto, sans-serif; }
    body { margin:0; background: var(--bg); color:#fff; font-family: var(--font); overflow:hidden; transition: background 0.5s; }
    
    /* UI Layout */
    #timer { position:absolute; top:20px; left:50%; transform:translateX(-50%); font-size:80px; color:var(--primary); font-weight:bold; z-index:100; text-shadow: 0 0 20px rgba(0,242,255,0.5); }
    #centerText { position:absolute; top:35%; left:50%; transform:translate(-50%,-50%); font-size:26px; width:85%; text-align:center; z-index:50; line-height: 1.4; transition: all 0.5s; }
    
    /* Quiz System */
    #quizContainer { display:none; position:absolute; top:55%; left:50%; transform:translate(-50%,-40%); width:80%; z-index:200; flex-direction:column; gap:15px; }
    .quiz-option { padding:15px; border:2px solid var(--primary); border-radius:10px; cursor:pointer; background:rgba(0,242,255,0.05); transition:0.3s; font-size:18px; }
    .quiz-option.correct { border-color: #00ff88; background: rgba(0,255,136,0.2); }
    .quiz-option.incorrect { border-color: #ff4444; background: rgba(255,68,68,0.2); }
    #quizExplanation { margin-top:15px; font-style:italic; color:var(--primary); text-align:center; min-height:40px; }

    /* Control Buttons */
    .btn-panel { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 1000; }
    .btn-kam { padding:15px 40px; font-size:18px; background:var(--primary); color:#000; border:none; border-radius:50px; cursor:pointer; font-weight:bold; box-shadow: 0 0 20px var(--primary); }
    #btnLang { background: #fff; box-shadow: 0 0 10px #fff; }
    #btnNext { display:none; background: #00ff88; }

    /* Corner Explanation & Indicators */
    #explanationBox { position:absolute; bottom:120px; left:30px; width:320px; padding:20px; background: rgba(0,242,255,0.1); border-left: 5px solid var(--primary); font-size:16px; opacity:0; transition: opacity 0.5s; z-index:60; pointer-events: none; }
    #indicators { position:absolute; right:30px; top:50%; transform:translateY(-50%); display:none; flex-direction:column; gap:10px; z-index:100; }
    .bar-container { display: flex; align-items: center; gap: 8px; }
    .bar-label { font-size: 9px; width: 65px; text-align: right; color: var(--primary); }
    .bar { width:8px; height:50px; background:rgba(255,255,255,0.1); border-radius:4px; position:relative; }
    .fill { position:absolute; bottom:0; width:100%; height:0%; background:var(--primary); transition: height 0.5s; }

    /* Breathing & Silence */
    #breathContainer { display:none; position:fixed; inset:0; flex-direction:column; align-items:center; z-index:150; background: var(--bg); padding-top: 150px; }
    #breathCircle { width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, #00f2ff 0%, #0044ff 100%); box-shadow: 0 0 80px #00f2ff; display:flex; justify-content:center; align-items:center; font-weight:bold; font-size:22px; color:white; transition: all 4s ease-in-out; margin-bottom: 40px; }
    #scienceText { width: 70%; text-align: center; color: #00f2ff; font-size: 18px; line-height: 1.6; font-style: italic; }

    /* Modal */
    #finalModal { display:none; position:fixed; inset:0; background:var(--bg); z-index:2000; flex-direction:column; justify-content:center; align-items:center; padding:40px; text-align:center; }
    
    .word { position:absolute; font-size:24px; color:var(--primary); font-weight:bold; cursor:pointer; animation: float 6s linear forwards; white-space: nowrap; z-index: 40; }
    @keyframes float { 0%{transform:translateY(0); opacity:0;} 10%{opacity:1;} 90%{opacity:1;} 100%{transform:translateY(-450px); opacity:0;} }
</style>
</head>
<body>

<div id="timer">00:00</div>
<div id="centerText">MAYKAMI NEURO-SYSTEM READY</div>

<div id="quizContainer">
    <div id="quizOptions"></div>
    <div id="quizExplanation"></div>
</div>

<div class="btn-panel">
    <button id="btnBack" class="btn-kam" style="display:none" onclick="Engine.repeatAudio()">BACK</button>
    <button id="btnStart" class="btn-kam" onclick="Engine.start()">START SESSION</button>
    <button id="btnNext" class="btn-kam" onclick="Engine.nextStep()">NEXT LEVEL</button>
    <button id="btnLang" class="btn-kam" onclick="Engine.toggleLang()">ESP</button>
</div>

<div id="explanationBox">
    <strong id="expTitle"></strong><br><span id="expBody"></span>
</div>

<div id="indicators"></div>

<div id="breathContainer">
    <div id="breathCircle">IDLE</div>
    <div id="scienceText"></div>
</div>

<div id="finalModal">
    <h1 id="diagTitle" style="color:var(--primary); font-size: 40px;">NEURO-DIAGNOSIS</h1>
    <div id="diagText" style="margin:30px 0; font-size:22px; line-height:1.6; max-width: 800px;"></div>
    <button class="btn-kam" onclick="location.reload()">RESTART PROGRAM</button>
</div>

<audio id="bgMusic" loop src="https://assets.mixkit.co/music/preview/mixkit-tech-house-vibes-130.mp3"></audio>
<audio id="sfxBreak" src="https://www.soundjay.com/misc/sounds/glass-break-01.mp3"></audio>

<script>
const Engine = (() => {
    let state = { 
        lang: 'en', phase: 'init', index: 1, 
        stats: {}, clicks: 0, data: null, 
        gameTime: 300, currentText: "", currentQuiz: 0 
    };

    const pillars = {
        "PURPOSE": { cat: "Core", color: "#ff00ff", en: "Your internal 'Why'.", es: "Tu 'Por qué' interno." },
        "DISCIPLINE": { cat: "Action", color: "#00ff88", en: "Consistency over intensity.", es: "Consistencia sobre intensidad." },
        "RESILIENCE": { cat: "Spirit", color: "#ffa500", en: "Ability to absorb chaos.", es: "Capacidad de absorber el caos." },
        "EMPATHY": { cat: "Social", color: "#00f2ff", en: "Emotional intelligence.", es: "Inteligencia emocional." },
        "WEALTH": { cat: "Value", color: "#ffd700", en: "Result of provided value.", es: "Resultado del valor aportado." },
        "HEALTH": { cat: "Body", color: "#ff4444", en: "Biological hardware.", es: "Hardware biológico." },
        "STRATEGY": { cat: "Mind", color: "#4444ff", en: "Managing resources.", es: "Gestionar recursos." },
        "LEGACY": { cat: "Time", color: "#ffffff", en: "What remains.", es: "Lo que trasciende." }
    };

    const start = async () => {
        document.getElementById("btnStart").style.display = "none";
        document.getElementById("btnBack").style.display = "block";
        const res = await fetch("/api/session/start");
        state.data = await res.json();
        state.index = state.data.index || 1;
        runPhase("story");
    };

    const runPhase = (type) => {
        state.phase = type;
        const rawText = type === "story" ? state.data.story[state.lang] : state.data.mission.b[0].tx[state.lang];
        state.currentText = rawText; // Mantenemos puntuación para visual
        document.getElementById("centerText").innerText = rawText;
        
        // El lector procesará el texto respetando pausas
        speak(rawText, () => {
            if(type === "story") {
                setTimeout(() => runPhase("mission"), 1000);
            } else {
                showQuiz();
            }
        });
    };

    const speak = (text, callback) => {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();
        // Buscar voz de narrador masculina
        msg.voice = voices.find(v => v.name.includes("Male") || v.name.includes("David") || v.name.includes("Google US English")) || voices[0];
        msg.rate = 0.85; // Pausada
        msg.pitch = 1.0;
        msg.onend = callback;
        window.speechSynthesis.speak(msg);
    };

    const showQuiz = () => {
        state.phase = "quiz";
        const qData = state.data.mission.b[0].qs[state.currentQuiz];
        document.getElementById("centerText").innerText = qData.q[state.lang];
        const optionsDiv = document.getElementById("quizOptions");
        optionsDiv.innerHTML = "";
        document.getElementById("quizContainer").style.display = "flex";
        document.getElementById("quizExplanation").innerText = "";

        qData.as.forEach((ans, i) => {
            const btn = document.createElement("div");
            btn.className = "quiz-option";
            btn.innerText = ans.tx[state.lang];
            btn.onclick = () => checkAnswer(i, ans.ok, ans.ex[state.lang]);
            optionsDiv.appendChild(btn);
        });
    };

    const checkAnswer = (idx, isOk, explanation) => {
        if(state.phase !== "quiz") return;
        const options = document.querySelectorAll(".quiz-option");
        const selected = options[idx];
        
        if(isOk) {
            selected.classList.add("correct");
            speak(state.lang === 'en' ? "Correct." : "Correcto.", () => {});
        } else {
            selected.classList.add("incorrect");
            speak(state.lang === 'en' ? "Incorrect." : "Incorrecto.", () => {});
        }
        
        document.getElementById("quizExplanation").innerText = explanation;
        speak(explanation, () => {
            document.getElementById("btnNext").style.display = "block";
        });
        state.phase = "quiz_answered";
    };

    const nextStep = () => {
        document.getElementById("btnNext").style.display = "none";
        state.currentQuiz++;
        if(state.currentQuiz < state.data.mission.b[0].qs.length) {
            showQuiz();
        } else {
            document.getElementById("quizContainer").style.display = "none";
            startGame();
        }
    };

    const startGame = () => {
        state.phase = 'game';
        document.getElementById("centerText").innerText = "";
        const music = document.getElementById("bgMusic");
        music.volume = 0.4;
        music.play();
        
        let timeLeft = state.gameTime;
        initIndicators();

        const loop = setInterval(() => {
            timeLeft--;
            document.getElementById("timer").innerText = formatTime(timeLeft);
            spawnWord();

            if (state.gameTime - timeLeft >= 60) {
                document.getElementById("explanationBox").style.opacity = "0";
                document.getElementById("indicators").style.display = "flex";
            }

            music.playbackRate = 1 + (state.clicks / 150);

            if (timeLeft <= 0) {
                clearInterval(loop);
                runSilenceChallenge();
            }
        }, 1000);
    };

    const spawnWord = () => {
        const keys = Object.keys(pillars);
        const key = keys[Math.floor(Math.random()*keys.length)];
        const p = pillars[key];
        const el = document.createElement("div");
        el.className = "word";
        el.innerText = key;
        el.style.left = Math.random()*80 + 10 + "%";
        el.style.top = "95%";
        el.style.color = p.color;

        el.onclick = () => {
            const glass = document.getElementById("sfxBreak").cloneNode();
            glass.volume = 0.6;
            glass.play();
            
            state.clicks++;
            state.stats[p.cat] = (state.stats[p.cat] || 0) + 1;
            updateBars();

            if (state.gameTime - parseInt(document.getElementById("timer").innerText.split(":")[1]) < 60) {
                document.getElementById("explanationBox").style.opacity = "1";
                document.getElementById("expTitle").innerText = key;
                document.getElementById("expBody").innerText = p[state.lang];
            }
            el.remove();
        };
        document.body.appendChild(el);
    };

    const runSilenceChallenge = async () => {
        state.phase = 'silence';
        document.getElementById("bgMusic").pause();
        document.getElementById("indicators").style.display = "none";
        document.getElementById("breathContainer").style.display = "flex";

        let silenceSeconds = Math.min(30 + (state.index - 1) * 4.4, 180);
        let t = Math.round(silenceSeconds);

        const scienceExp = {
            en: "Silence deactivates the Amygdala and synchronizes Heart-Brain coherence, rebuilding logic circuits.",
            es: "El silencio desactiva la Amígdala y sincroniza la coherencia Corazón-Cerebro, reconstruyendo circuitos lógicos."
        };
        document.getElementById("scienceText").innerText = scienceExp[state.lang];

        while (t > 0) {
            document.getElementById("timer").innerText = formatTime(t);
            await breathStep("INHALA / INHALE", 1.6, 4000);
            await breathStep("RETIENE / HOLD", 1.6, 4000);
            await breathStep("EXHALA / EXHALE", 1.0, 4000);
            t -= 12;
            if(t < 0) t = 0;
        }
        showDiagnosis();
    };

    const breathStep = (txt, scale, time) => {
        return new Promise(r => {
            const c = document.getElementById("breathCircle");
            c.innerText = txt;
            c.style.transform = `scale(${scale})`;
            setTimeout(r, time);
        });
    };

    const showDiagnosis = () => {
        document.getElementById("breathContainer").style.display = "none";
        document.getElementById("finalModal").style.display = "flex";
        const top = Object.keys(state.stats).reduce((a, b) => state.stats[a] > state.stats[b] ? a : b, "Balance");
        
        const diag = {
            en: `Trajectory: **${top}**. High-pressure decision making efficiency increased by 15%.`,
            es: `Trayectoria: **${top}**. Eficiencia en toma de decisiones bajo presión incrementada en 15%.`
        };
        document.getElementById("diagText").innerText = diag[state.lang];
    };

    const initIndicators = () => {
        const ind = document.getElementById("indicators");
        ind.innerHTML = "";
        Object.keys(pillars).forEach(k => {
            ind.innerHTML += `
                <div class="bar-container">
                    <div class="bar-label">${k}</div>
                    <div class="bar"><div class="fill" id="bar-${pillars[k].cat}"></div></div>
                </div>`;
        });
    };

    const updateBars = () => {
        Object.keys(state.stats).forEach(cat => {
            const el = document.getElementById(`bar-${cat}`);
            if(el) el.style.height = Math.min(state.stats[cat] * 10, 100) + "%";
        });
    };

    const formatTime = (s) => {
        const m = Math.floor(s/60);
        const sec = s%60;
        return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    };

    return {
        start, nextStep,
        repeatAudio: () => speak(state.currentText, () => {}),
        toggleLang: () => {
            state.lang = state.lang === 'en' ? 'es' : 'en';
            document.getElementById("btnLang").innerText = state.lang === 'en' ? 'ESP' : 'ENG';
        }
    };
})();
</script>
</body>
</html>
