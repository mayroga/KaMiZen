<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO - AURA BY MAY ROGA LLC</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        :root {
            --aura-gold: #d4af37;
            --aura-bg: #0a0a0a;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--aura-bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        /* Capa de Imágenes con Zoom (Ken Burns) */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            transition: transform 7s linear, opacity 2s ease-in-out;
        }
        /* Contenedor Principal con Transparencia Dinámica */
        #main-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            background: rgba(0, 0, 0, 0.4); /* Base inicial */
            transition: background 1s ease;
        }
        #content-display {
            text-align: center;
            max-width: 80%;
            padding: 20px;
        }
        .fade-in-text {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            animation: fadeIn 2s ease-in-out;
        }
        /* Controles Inferiores */
        #controls {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 20px;
            z-index: 10;
        }
        .aura-btn {
            background: transparent;
            border: 1px solid var(--aura-gold);
            color: var(--aura-gold);
            padding: 10px 25px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .aura-btn:hover {
            background: var(--aura-gold);
            color: black;
        }
        #lang-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        /* Advertencia de Inactividad */
        #warning-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>

    <div id="lang-toggle">
        <button class="aura-btn" id="btn-en">English</button>
        <button class="aura-btn" id="btn-es">Español</button>
    </div>

    <main id="main-container">
        <div id="content-display">
            <h1 class="fade-in-text">AL CIELO</h1>
            <p id="sub-title">AURA BY MAY ROGA LLC</p>
        </div>

        <div id="controls">
            <button class="aura-btn" id="start-btn">Iniciar Sesión</button>
            <button class="aura-btn" id="next-btn" style="display:none;">Continuar</button>
            <button class="aura-btn" id="pdf-btn" style="display:none;">Reporte PDF</button>
            <button class="aura-btn" id="clear-btn">Borrar Datos</button>
        </div>
    </main>

    <div id="warning-overlay">
        <div>
            <h1>¡ATENCIÓN!</h1>
            <p>Toca la pantalla para mantener la conexión con AURA.</p>
        </div>
    </div>

    <script src="/static/scripts.js"></script>
    <script>
        // Lógica simple para mostrar controles tras el inicio
        document.getElementById('start-btn').onclick = function() {
            this.style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
            document.getElementById('sub-title').style.display = 'none';
        };

        // Detector de inactividad para advertencia
        let timeout;
        function resetTimer() {
            document.getElementById('warning-overlay').style.display = 'none';
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                document.getElementById('warning-overlay').style.display = 'flex';
            }, 59000); // 59 segundos
        }
        window.onmousemove = resetTimer;
        window.onclick = resetTimer;
        window.onkeydown = resetTimer;
    </script>
</body>
</html>
