<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | SESSION BREATH CORE</title>

<style>
body{
    margin:0;
    background: radial-gradient(circle, #001a33, #000);
    color:#fff;
    font-family:Arial;
    overflow:hidden;
    text-align:center;
}

#topbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:12px 16px;
    background:rgba(0,0,0,0.35);
    z-index:10;
}

button{
    padding:10px 14px;
    border:1px solid #00f2ff;
    background:rgba(0,242,255,0.08);
    color:#fff;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#00f2ff;
    color:#000;
}

#game{
    padding-top:90px;
}

/* 🫁 BREATH CIRCLE */
#breath{
    width:140px;
    height:140px;
    border-radius:50%;
    margin:60px auto;
    background: radial-gradient(circle, #00f2ff, #0044ff);
    opacity:0.85;
    box-shadow:0 0 40px #00f2ff;
    transform:scale(1);
    transition: transform 2.5s ease-in-out, opacity 2.5s ease-in-out;
}

#points{
    font-size:18px;
    margin-top:20px;
    color:#00f2ff;
}

#controls{
    position:fixed;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:10px;
}
</style>
</head>

<body>

<div id="topbar">
    <button onclick="toggleLang()">EN/ES</button>
    <div id="points">POINTS: 0</div>
</div>

<div id="game">
    <div id="breath"></div>
</div>

<div id="controls">
    <button onclick="goBack()">BACK</button>
    <button onclick="goContinue()">CONTINUE</button>
</div>

<script>

let lang="en";
let points=0;
let scale=1;
let growing=true;

const breath=document.getElementById("breath");

/* 🫁 AUTO BREATH SYSTEM */
function breathLoop(){

    setInterval(()=>{

        if(growing){
            scale += 0.01;
            if(scale>=1.25) growing=false;
        } else {
            scale -= 0.01;
            if(scale<=0.95) growing=true;
        }

        breath.style.transform = `scale(${scale})`;
        breath.style.opacity = 0.6 + (scale-0.9);

    },30);
}

/* 🌍 LANGUAGE */
function toggleLang(){
    lang = lang === "en" ? "es" : "en";
}

/* ⬅️ BACK */
function goBack(){
    points = Math.max(0, points-5);
    document.getElementById("points").innerText="POINTS: "+points;
}

/* ➡️ CONTINUE */
function goContinue(){
    points += 10;
    document.getElementById("points").innerText="POINTS: "+points;

    // slight breath reaction
    scale = 1.3;
}

window.onload=()=>{
    breathLoop();
};

</script>

</body>
</html>
