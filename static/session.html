<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAMIZEN CONTROL SYSTEM</title>

<style>
body {
    margin:0;
    background:#05070d;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

/* START */
#startScreen{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:20px;
    background:#05070d;
}

input{
    padding:12px;
    font-size:18px;
    text-align:center;
}

button{
    padding:12px 20px;
    font-size:18px;
    cursor:pointer;
}

/* TIMER GRANDE */
#timer {
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:60px;
    color:#00f2ff;
    font-weight:bold;
}

/* CENTER TEXT */
#centerText{
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:30px;
    text-align:center;
    width:80%;
}

/* WORDS */
.word{
    position:absolute;
    font-size:20px;
    color:#00f2ff;
    cursor:pointer;
    animation: floatUp 5s linear forwards;
}

@keyframes floatUp{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(-250px) scale(0.5);opacity:0;}
}

.explode{
    animation: explode .3s ease-out forwards;
}

@keyframes explode{
    to{transform:scale(2);opacity:0;}
}
</style>
</head>

<body>

<div id="startScreen">
    <h1>KAMIZEN SYSTEM</h1>
    <input id="nameInput" placeholder="Enter name">
    <button onclick="start()">START</button>
</div>

<div id="timer">00:00</div>
<div id="centerText"></div>

<script>
/* =========================
STATE CONTROL UNICO
========================= */
let index = parseInt(localStorage.getItem("kamizen_index") || "1");
let running = false;
let voicesReady = false;

/* =========================
VOICE SYSTEM (FIX AUDIO)
========================= */
function speak(text){
    try{
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = "en-US";
        msg.rate = 1;
        speechSynthesis.speak(msg);
    }catch(e){}
}

/* =========================
START
========================= */
function start(){
    const name = document.getElementById("nameInput").value.trim();
    if(!name) return;

    localStorage.setItem("kamizen_name", name);

    document.getElementById("startScreen").style.display="none";

    if(!running){
        running = true;
        loop();
    }
}

/* =========================
MAIN LOOP (CONTROLLED)
========================= */
async function loop(){

    while(true){

        const data = await fetchData(index);

        if(!data){
            show("ERROR LOADING STORY");
            await wait(2000);
            continue;
        }

        /* 1 STORY */
        const storyText = data.story?.en || "NO STORY";
        show(storyText);
        speak(storyText);
        await wait(5000);

        /* 2 GAME */
        await game(300);

        /* 3 MISSION */
        const missionText = data.mission?.t?.en || "MISSION";
        show(missionText);
        speak(missionText);
        await wait(5000);

        /* 4 GAME */
        await game(300);

        /* 5 BREATH */
        await breathing(index);

        /* NEXT INDEX */
        index++;
        if(index > 35) index = 1;

        localStorage.setItem("kamizen_index", index);
    }
}

/* =========================
FETCH SAFE (MAIN PY ONLY SOURCE)
========================= */
async function fetchData(i){
    try{
        const r = await fetch("/api/session/start");
        return await r.json();
    }catch(e){
        return null;
    }
}

/* =========================
GAME (5 MIN SAFE TIMER)
========================= */
function game(seconds){

    return new Promise(resolve => {

        let t = seconds;

        const interval = setInterval(()=>{

            t--;

            updateTimer(t);

            spawnWord();

            if(t<=0){
                clearInterval(interval);
                resolve();
            }

        },1000);
    });
}

/* =========================
TIMER MM:SS
========================= */
function updateTimer(s){

    const m = Math.floor(s/60);
    const r = s%60;

    document.getElementById("timer").innerText =
        `${String(m).padStart(2,'0')}:${String(r).padStart(2,'0')}`;
}

/* =========================
WORDS + EXPLOSION FIX
========================= */
function spawnWord(){

    const words = ["FOCUS","CONTROL","TRUTH","AWARENESS","CALM"];
    const w = document.createElement("div");

    w.className = "word";
    w.innerText = words[Math.floor(Math.random()*words.length)];

    w.style.left = Math.random()*90 + "%";
    w.style.top = Math.random()*70 + "%";

    w.onclick = () => {

        w.classList.add("explode");

        setTimeout(()=>w.remove(),300);

        speak("good");
    };

    document.body.appendChild(w);

    setTimeout(()=>w.remove(),6000);
}

/* =========================
BREATH + SILENCE PROGRESSIVE
========================= */
function breathing(i){

    return new Promise(resolve=>{

        let t = Math.min(30 + i*3, 180);

        const b = setInterval(()=>{

            t--;

            document.getElementById("centerText").innerText =
                (t%2===0)?"INHALE":"EXHALE";

            if(t<=0){
                clearInterval(b);
                resolve();
            }

        },1000);
    });
}

/* =========================
UI
========================= */
function show(t){
    document.getElementById("centerText").innerText = t;
}

function wait(ms){
    return new Promise(r=>setTimeout(r,ms));
}
</script>

</body>
</html>
