<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | PRO V4</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;text-align:center;overflow:hidden}
#game{padding:20px}
button{padding:12px 20px;margin:10px;font-size:16px;border:none;border-radius:8px;cursor:pointer}
.correct{background:green}
.wrong{background:red}
#breath{width:120px;height:120px;border-radius:50%;background:#00f2ff;margin:20px auto;transition:4s}
.floating{position:absolute;color:#00f2ff;opacity:0.7;animation:float 4s linear}
@keyframes float{from{transform:translateY(100vh)}to{transform:translateY(-10vh)}}
#topbar{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;padding:10px}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:10}
#overlay p{max-width:600px}
</style>
</head>

<body>

<div id="topbar">
<button onclick="toggleLang()">LANG</button>
<button onclick="startSilence()">SILENCE</button>
</div>

<div id="game">
<h1>KAMIZEN</h1>
<h2 id="hero"></h2>
<div id="breath"></div>
<div id="story"></div>
<div id="analysis"></div>
<div id="options"></div>
</div>

<div id="overlay">
<h2 id="overlayTitle"></h2>
<p id="overlayText"></p>
<button onclick="closeOverlay()">CONTINUE</button>
</div>

<audio id="bg" loop src="static/sounds/bg.mp3"></audio>
<audio id="ok" src="static/sounds/success.mp3"></audio>
<audio id="bad" src="static/sounds/glass.mp3"></audio>

<script>
let lang="en";
let mission=1;
let score=0;
let floatingWords=[];
let currentMission=null;

let player={real:"",hero:""};

async function init(){
player.real=prompt("Enter your name");
player.hero=prompt("Hero name");
document.getElementById("hero").innerText=player.hero;

startMusic();
breathing();
await loadMission();
startFloatingSystem();
}

function startMusic(){
let bg=document.getElementById("bg");
bg.volume=0.3;
bg.play().catch(()=>{});
}

function speak(t){
let m=new SpeechSynthesisUtterance(t);
m.lang=lang==="en"?"en-US":"es-ES";
m.rate=0.85;
m.pitch=0.8;
speechSynthesis.speak(m);
}

function toggleLang(){
lang=lang==="en"?"es":"en";
loadMission();
}

async function loadMission(){
let res=await fetch(`/api/mission/${mission}`);
if(!res.ok)return;
let m=await res.json();

currentMission = m;

if(m.ui && m.ui.floating_words){
floatingWords = m.ui.floating_words;
}

render(m);
}

function render(m){
let story=m.blocks.find(b=>b.type==="story");
let analysis=m.blocks.find(b=>b.type==="analysis");
let decision=m.blocks.find(b=>b.type==="decision");

let st=story.text[lang];
let an=analysis.text[lang];

let sDiv=document.getElementById("story");
let aDiv=document.getElementById("analysis");
let oDiv=document.getElementById("options");

sDiv.innerText=st;
aDiv.innerText="";
oDiv.innerHTML="";

speak(st);

setTimeout(()=>{
aDiv.innerText=an;
speak(an);
},4000);

setTimeout(()=>{
createOptions(decision.options);
},8000);
}

function createOptions(options){
let oDiv=document.getElementById("options");
oDiv.innerHTML="";

options.forEach(opt=>{
let b=document.createElement("button");
b.innerText=opt.text[lang];

b.onclick=()=>handleAnswer(opt.correct);

oDiv.appendChild(b);
});
}

async function handleAnswer(correct){
let ok=document.getElementById("ok");
let bad=document.getElementById("bad");

if(correct){
ok.play();
score+=10;
speak("Correct");
}else{
bad.play();
score-=5;
speak("Wrong choice");
}

await wait(1500);
await runTVid(correct, currentMission);

mission++;
if(mission>35)mission=1;
loadMission();
}

// =========================
// TVid INTELLIGENT ENGINE
// =========================

async function runTVid(correct, m){
if(!m) return;

let theme = (m.theme || "").toUpperCase();

// DEFAULT
let type = "DEFAULT";

// INTELLIGENCE ROUTING
if(theme.includes("ANGER") || theme.includes("CONTROL")) type="ANGER";
if(theme.includes("FEAR") || theme.includes("COURAGE")) type="FEAR";
if(theme.includes("DIGITAL") || theme.includes("PHONE")) type="DIGITAL";
if(theme.includes("TRUTH")) type="TRUTH";
if(theme.includes("PRESSURE") || theme.includes("DECISION")) type="PRESSURE";

await showOverlay("TVID MODE", "Processing emotional response...");

switch(type){
case "ANGER":
await breathingCycle(3);
await speakFlow("Control your reaction. Return to calm state.");
break;

case "FEAR":
await breathingCycle(3);
await speakFlow("Fear is a signal, not a stop.");
break;

case "DIGITAL":
await breathingCycle(2);
await speakFlow("Recover your attention from devices.");
break;

case "TRUTH":
await breathingCycle(2);
await speakFlow("Truth builds your identity.");
break;

case "PRESSURE":
await breathingCycle(4);
await speakFlow("Pause creates intelligence.");
break;

default:
await breathingCycle(2);
await speakFlow("Return to awareness.");
}

await closeOverlay();
}

async function breathingCycle(n){
for(let i=0;i<n;i++){
speak("Inhale");
await wait(3000);
speak("Exhale");
await wait(3000);
}
}

async function speakFlow(text){
speak(text);
await wait(2500);
}

// =========================
// OVERLAY
// =========================

function showOverlay(title,text){
return new Promise(resolve=>{
let o=document.getElementById("overlay");
document.getElementById("overlayTitle").innerText=title;
document.getElementById("overlayText").innerText=text;
o.style.display="flex";
window._resolveOverlay=resolve;
});
}

function closeOverlay(){
document.getElementById("overlay").style.display="none";
if(window._resolveOverlay) window._resolveOverlay();
}

function wait(ms){return new Promise(r=>setTimeout(r,ms));}

function breathing(){
let b=document.getElementById("breath");
let grow=true;
setInterval(()=>{
b.style.transform=grow?"scale(1.5)":"scale(1)";
grow=!grow;
},4000);
}

function startFloatingSystem(){
setInterval(()=>{
if(floatingWords.length===0)return;
let w=document.createElement("div");
w.className="floating";
w.style.left=Math.random()*100+"vw";
w.innerText=floatingWords[Math.floor(Math.random()*floatingWords.length)];
document.body.appendChild(w);
setTimeout(()=>w.remove(),4000);
},1200);
}

async function startSilence(){
speak("Silence challenge started");
let t=60;
while(t>0){await wait(1000);t--;}
speak("Completed");
}

init();
</script>

</body>
</html>
