<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN</title>

<style>
:root{
--blue:#00f2ff;--green:#00ff41;--red:#ff003c;--yellow:#ffff00;--bg:#00050a;
}

body{margin:0;background:var(--bg);color:#fff;font-family:monospace;overflow:hidden}

/* HUD */
#hud{position:fixed;top:10px;width:100%;display:flex;justify-content:space-between;padding:10px}
#score-box{border:2px solid #fff;padding:5px 15px}
#timer{font-size:2rem;color:var(--blue)}

#lang-btn{position:fixed;bottom:15px;right:15px;padding:10px;border:2px solid var(--blue);background:#000;color:var(--blue);cursor:pointer}

/* stats */
#stats{position:fixed;bottom:15px;left:15px;display:flex;gap:10px;flex-wrap:wrap}
.stat{border:1px solid #333;padding:6px}

/* floating */
.floating{position:absolute;padding:10px 20px;font-weight:bold;border-radius:8px;cursor:pointer;animation:up 7s linear}
@keyframes up{from{transform:translateY(110vh)}to{transform:translateY(-20vh)}}

.good{border:2px solid var(--green);color:var(--green)}
.bad{border:2px solid var(--red);color:var(--red)}

/* overlay */
#overlay{position:fixed;width:100%;height:100%;background:#000d;display:none;flex-direction:column;justify-content:center;align-items:center}
.choice{margin:10px;padding:15px;border:2px solid var(--blue);cursor:pointer}
#continue{margin-top:20px;display:none;padding:10px 20px;border:2px solid #fff;cursor:pointer}

/* breath */
#breath{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);display:none}
</style>
</head>

<body>

<div id="hud">
<div id="timer">05:00</div>
<div id="score-box">0</div>
</div>

<button id="lang-btn">EN</button>

<div id="stats">
<div class="stat">R:<span id="v-respect">50</span></div>
<div class="stat">P:<span id="v-peace">50</span></div>
<div class="stat">L:<span id="v-lead">50</span></div>
<div class="stat">$:<span id="v-money">100</span></div>
<div class="stat">S:<span id="v-safety">100</span></div>
<div class="stat">H:<span id="v-happy">50</span></div>
</div>

<div id="overlay">
<h2 id="title"></h2>
<p id="desc"></p>
<div id="choices"></div>
<div id="continue">CONTINUE</div>
</div>

<div id="breath">BREATH...</div>

<script>

/* STATE */
let lang="en";
let state={
score:0,
timer:300,
stats:{respect:50,peace:50,lead:50,money:100,safety:100,happy:50}
};

/* UPDATE */
function updateHUD(){
document.getElementById("score-box").innerText=state.score;
for(let k in state.stats){
let el=document.getElementById("v-"+k);
if(el)el.innerText=state.stats[k];
}
}

/* LANGUAGE */
document.getElementById("lang-btn").onclick=()=>{
lang=(lang==="en")?"es":"en";
document.getElementById("lang-btn").innerText=lang.toUpperCase();
};

/* WORDS */
const goodWords=["FOCUS","CALM","PLAN","BUILD"];
const badWords=["ANGER","RUSH","BLAME","IMPULSE"];

function spawn(){
let div=document.createElement("div");
let good=Math.random()>0.4;

div.className="floating "+(good?"good":"bad");
div.innerText=(good?goodWords:badWords)[Math.floor(Math.random()*4)];

div.style.left=Math.random()*80+"vw";

div.onclick=()=>{
if(div.clicked)return;
div.clicked=true;

div.style.opacity=0;

if(good){
state.score+=21;
state.stats.respect++;
state.stats.happy++;
}else{
state.score-=20;
state.stats.safety--;
}

updateHUD();
};

document.body.appendChild(div);
setTimeout(()=>div.remove(),7000);
}

/* BREATH */
async function doBreath(d){
document.getElementById("breath").style.display="block";
await new Promise(r=>setTimeout(r,d*1000));
document.getElementById("breath").style.display="none";
}

/* LOAD JSON */
async function loadMission(){
let res=await fetch("/api/mission/next?lang="+lang);
return await res.json();
}

/* QUESTION */
async function runMission(){

let m=await loadMission();
if(!m)return;

let overlay=document.getElementById("overlay");
let title=document.getElementById("title");
let desc=document.getElementById("desc");
let choices=document.getElementById("choices");
let cont=document.getElementById("continue");

overlay.style.display="flex";
choices.innerHTML="";
cont.style.display="none";

/* PARSE BLOCK */
let blocks=m.b||[];

for(let b of blocks){

if(b.t==="v") title.innerText=b.tx[lang];

if(b.t==="h") desc.innerText=b.tx[lang];

if(b.story) desc.innerText=b.story[lang];

if(b.t==="br") await doBreath(b.d);

if(b.t==="sil") await doBreath(b.d);

if(b.t==="d"){
desc.innerText=b.q[lang];

b.op.forEach((opt,i)=>{
let btn=document.createElement("div");
btn.className="choice";
btn.innerText=opt.split("/")[lang==="en"?0:1];

btn.onclick=()=>{
let correct=(i===b.c);

desc.innerText=b.ex[i];

state.score+=correct?30:-20;

if(correct){
btn.style.borderColor="green";
}else{
btn.style.borderColor="red";
}

updateHUD();
cont.style.display="block";
};

choices.appendChild(btn);
});
}
}

/* continue */
cont.onclick=()=>{
overlay.style.display="none";
};

}

/* LOOP */
setInterval(()=>{
if(state.timer>0){
state.timer--;
let m=Math.floor(state.timer/60);
let s=state.timer%60;
document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}
},1000);

/* MAIN */
async function loop(){
while(true){

let end=Date.now()+30000;

while(Date.now()<end){
spawn();
await new Promise(r=>setTimeout(r,1200));
}

document.querySelectorAll(".floating").forEach(e=>e.remove());

await runMission();

await new Promise(r=>setTimeout(r,2000));
}
}

updateHUD();
loop();

</script>

</body>
</html>
