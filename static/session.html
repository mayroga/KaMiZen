<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaMiZen - NeuroGame</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { 
            background: #0f172a; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            transition: background 1.5s ease; 
            overflow: hidden;
        }
        #app { 
            width: 95%; 
            max-width: 420px; 
            background: #111827; 
            border-radius: 30px; 
            padding: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
            text-align: center; 
        }
        #logo { 
            font-size: 28px; 
            font-weight: 600; 
            background: linear-gradient(90deg, #60a5fa, #a78bfa); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            letter-spacing: 2px;
        }
        #mental-panel { 
            background: #020617; 
            padding: 15px; 
            border-radius: 15px; 
            margin: 15px 0; 
            font-size: 13px; 
            text-align: left;
        }
        .stat { margin: 8px 0; }
        .bar { height: 6px; background: #1e293b; border-radius: 10px; margin-top: 4px; overflow: hidden; }
        .bar-fill { height: 100%; background: #2563eb; transition: width 0.5s ease; }
        
        #block { min-height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 18px; line-height: 1.5; margin: 20px 0; }
        
        .breath-circle { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            background: radial-gradient(circle, #60a5fa, #2563eb); 
            margin-top: 20px; 
            box-shadow: 0 0 30px rgba(37, 99, 235, 0.6);
            transition: transform 4s ease-in-out; 
            transform: scale(1);
        }

        button { 
            padding: 16px; 
            width: 100%; 
            border-radius: 12px; 
            border: none; 
            background: #2563eb; 
            color: white; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover { background: #3b82f6; transform: translateY(-2px); }
        .secondary { background: #374151; }
    </style>
</head>
<body>
    <div id="app">
        <div id="logo">KaMiZen</div>
        <div id="mental-panel">
            <div id="streak">🔥 Racha: 0 días</div>
            <div id="level">Nivel: 1</div>
            <div class="stat">Disciplina <div class="bar"><div id="disciplina-bar" class="bar-fill"></div></div></div>
            <div class="stat">Claridad <div class="bar"><div id="claridad-bar" class="bar-fill"></div></div></div>
            <div class="stat">Calma <div class="bar"><div id="calma-bar" class="bar-fill"></div></div></div>
        </div>
        
        <div id="block">Cargando motor de entrenamiento...</div>

        <button id="start-btn">Iniciar Sesión</button>
        <button id="prev-btn" style="display:none;">Anterior</button>
        <button id="next-btn" style="display:none;">Siguiente</button>
        <button id="restart-btn" class="secondary" style="display:none;">Finalizar</button>
    </div>
    <script src="/static/scripts.js"></script>
</body>
</html>
