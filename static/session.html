<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KaMiZen – Asesoría de Éxito y Bienestar</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>✨ KaMiZen – Tu Asesoría Personalizada</header>

<div class="container">
    <div class="main-content">
        <div class="box">
            <div class="status">
                <div id="status">Preparando sesión...</div>
                <div class="timer">⏳ <span id="time">10:00</span></div>
            </div>
            <div class="progress-container">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="box">
            <div class="content-area" id="content">
                Iniciando tu sesión de éxito...
            </div>
        </div>

        <div class="box">
            <button class="primary" onclick="resetSession()">Borrar Sesión / Reiniciar</button>
        </div>
    </div>
</div>

<script src="/static/scripts.js"></script>
</body>
</html>
