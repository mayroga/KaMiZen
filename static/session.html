<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>KAMIZEN | SESSION PRO</title>

<style>
:root{
  --bg:#000;
  --fg:#fff;
  --neon:#00f2ff;
  --danger:#ff004c;
  --ok:#00ff88;
  --warn:#ffcc00;
  --glass:rgba(255,255,255,0.06);
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;}

body{
  background:var(--bg);
  color:var(--fg);
  overflow:hidden;
}

/* TOP HUD */
#hud{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:70px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 15px;
  background:rgba(0,0,0,0.8);
  border-bottom:1px solid var(--neon);
  z-index:1000;
}

/* CENTER SCORE */
#scoreCenter{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:20px;
  align-items:center;
  font-size:14px;
}

.stat{
  padding:6px 10px;
  border:1px solid var(--neon);
  border-radius:8px;
  background:var(--glass);
  min-width:90px;
  text-align:center;
}

#points{
  font-size:18px;
  font-weight:bold;
  color:var(--neon);
}

/* LEFT BUTTONS */
#leftControls, #rightControls{
  display:flex;
  gap:8px;
}

button{
  background:var(--glass);
  border:1px solid var(--neon);
  color:var(--fg);
  padding:8px 10px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
  font-size:12px;
}

button:hover{
  transform:scale(1.05);
  border-color:#fff;
}

/* MAIN AREA */
#main{
  position:absolute;
  top:70px;
  left:0;
  width:100%;
  height:calc(100% - 70px);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* CARD */
#card{
  width:90%;
  max-width:800px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--neon);
  border-radius:15px;
  padding:20px;
}

/* TEXT */
#story{
  font-size:18px;
  margin-bottom:15px;
  line-height:1.4;
}

#analysis{
  font-size:14px;
  color:#aaa;
  margin-bottom:20px;
}

/* OPTIONS */
.option{
  border:1px solid var(--neon);
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.option:hover{
  background:rgba(0,242,255,0.1);
}

/* TIMER */
#timer{
  position:fixed;
  bottom:15px;
  right:15px;
  padding:10px 15px;
  border:1px solid var(--warn);
  border-radius:10px;
  background:rgba(0,0,0,0.6);
  font-size:14px;
}

/* LANGUAGE */
#lang{
  position:fixed;
  bottom:15px;
  left:15px;
}
</style>
</head>

<body>

<!-- HUD -->
<div id="hud">

  <div id="leftControls">
    <button onclick="engine.startSession()">START</button>
    <button onclick="engine.back()">BACK</button>
    <button onclick="engine.restart()">RESTART</button>
  </div>

  <div id="scoreCenter">
    <div class="stat">FOCUS: <span id="focus">0</span></div>
    <div class="stat">ENERGY: <span id="energy">0</span></div>
    <div class="stat">POINTS: <span id="points">0</span></div>
  </div>

  <div id="rightControls">
    <button onclick="engine.continueSession()">CONTINUE</button>
    <button onclick="engine.setLang('en')">EN</button>
    <button onclick="engine.setLang('es')">ES</button>
  </div>

</div>

<!-- MAIN -->
<div id="main">

  <div id="card">

    <div id="story">Press START to begin session</div>
    <div id="analysis"></div>

    <div id="options"></div>

  </div>

</div>

<!-- TIMER -->
<div id="timer">00:00</div>

<!-- ENGINE LINK -->
<script src="engine.js"></script>

<script>
/* UI HOOKS ONLY — ENGINE CONTROLS ALL LOGIC */

window.ui = {
  setStory(text){
    document.getElementById("story").innerText = text;
  },
  setAnalysis(text){
    document.getElementById("analysis").innerText = text;
  },
  setOptions(options){
    const box = document.getElementById("options");
    box.innerHTML = "";
    options.forEach((opt,i)=>{
      const div = document.createElement("div");
      div.className = "option";
      div.innerText = opt;
      div.onclick = ()=>engine.selectOption(i);
      box.appendChild(div);
    });
  },
  setStats({focus,energy,points}){
    document.getElementById("focus").innerText = focus;
    document.getElementById("energy").innerText = energy;
    document.getElementById("points").innerText = points;
  },
  setTimer(text){
    document.getElementById("timer").innerText = text;
  }
};

/* AUTO-INIT SAFE MODE (prevents freeze) */
window.addEventListener("load", ()=>{
  if(engine && engine.init){
    engine.init();
  }
});
</script>

</body>
</html>
