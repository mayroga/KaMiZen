<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>KaMiZen - AL CIELO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
       
        body {
            background: #000;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 2s ease-in-out;
            background-size: 110%;
        }

        /* Efecto Zoom de 10 segundos */
        .zoom-active {
            animation: slowZoom 10.5s linear forwards;
        }

        @keyframes slowZoom {
            from { background-size: 110%; }
            to { background-size: 135%; }
        }

        #app {
            width: 92%;
            max-width: 450px;
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        #logo {
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #mental-panel {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #block {
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        #text-display {
            font-size: 20px;
            font-weight: 300;
            line-height: 1.6;
            color: #e2e8f0;
        }

        #timer-display {
            font-size: 64px;
            font-weight: 600;
            color: #60a5fa;
            font-family: monospace;
            margin-top: 15px;
        }

        button {
            padding: 18px;
            margin: 10px 0;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            background: #2563eb;
            color: white;
            width: 100%;
            font-weight: 600;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37,99,235,0.4);
            background: #3b82f6;
        }

        #warning-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="warning-modal">
        <div style="padding: 40px;">
            <h2 style="font-size: 40px; color: #ef4444; margin-bottom: 20px;">PRESENCIA REQUERIDA</h2>
            <p style="margin-bottom: 30px; font-size: 18px;">El sistema detecta inactividad. Toca para continuar.</p>
            <button onclick="resetInactivity()" style="background: white; color: black; width: 200px;">ESTOY AQUÍ</button>
        </div>
    </div>

    <div id="app">
        <div id="logo">AL CIELO</div>
       
        <div id="mental-panel">
            <div id="category-label" style="color:#60a5fa">Aura System</div>
            <div id="level-display">Misión</div>
        </div>

        <div id="block">
            <div id="text-display">Sincronizando con la red de Al Cielo...</div>
            <div id="visual-element" style="width: 100%; margin-top: 20px;"></div>
            <div id="timer-display" style="display:none">00:00</div>
        </div>
       
        <button id="action-btn" style="display:none;">Comenzar</button>
    </div>

    <script>
        // Lógica de Fondos de Naturaleza (80 variaciones)
        let imgCount = 0;
        function updateBg() {
            const body = document.body;
            body.classList.remove('zoom-active');
            void body.offsetWidth; // Reset de animación
            
            // Usamos una semilla basada en el tiempo para rotar entre miles de imágenes de naturaleza
            const seed = Math.floor(Math.random() * 80) + (imgCount % 80);
            body.style.backgroundImage = `url('https://source.unsplash.com/1600x900/?nature,landscape,zen&sig=${seed}')`;
            
            body.classList.add('zoom-active');
            imgCount++;
        }
        setInterval(updateBg, 10000);
        updateBg();
    </script>
    <script src="/static/scripts.js"></script>
</body>
</html>
