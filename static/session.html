<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KaMiZen Session</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0b0b;
  color:white;
  text-align:center;
}

#container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.block{
  background:#1a1a1a;
  padding:20px;
  border-radius:12px;
  margin:20px 0;
}

button{
  padding:12px 16px;
  margin:6px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.option{
  background:#333;
  color:white;
}

.option:hover{
  background:#444;
}

.correct{
  background:#1f8f3a !important;
}

.wrong{
  background:#b02a2a !important;
}

#timer{
  margin-top:10px;
  font-size:18px;
}

</style>
</head>

<body>

<div id="container">
  <h2>KaMiZen</h2>
  <div id="content"></div>
</div>

<script>

let missions = [];
let currentMission = 0;
let currentBlock = 0;

const content = document.getElementById("content");


// =========================
// LOAD DATA
// =========================
fetch("/api/missions")
.then(res => res.json())
.then(data=>{
  missions = data.missions || [];
  start();
})
.catch(err=>{
  content.innerHTML = "<h3>Error cargando datos</h3>";
  console.error(err);
});


// =========================
// START
// =========================
function start(){
  currentMission = 0;
  currentBlock = 0;
  render();
}


// =========================
// RENDER
// =========================
function render(){

  if(!missions.length){
    content.innerHTML = "<h3>No hay contenido</h3>";
    return;
  }

  const mission = missions[currentMission];

  if(!mission){
    content.innerHTML = "<h2>Sesión completada</h2>";
    return;
  }

  const block = mission.blocks[currentBlock];

  if(!block){
    nextMission();
    return;
  }

  content.innerHTML = "";

  const div = document.createElement("div");
  div.className = "block";

  // ========= TEXT =========
  if(
    block.type === "story" ||
    block.type === "analysis" ||
    block.type === "micro_explanation" ||
    block.type === "final_lesson"
  ){
    div.innerHTML = `<p>${block.text?.es || ""}</p>`;
    content.appendChild(div);

    setTimeout(()=>{
      currentBlock++;
      render();
    }, 3000);

    return;
  }

  // ========= BREATH / RISO =========
  if(block.type === "breath_focus" || block.type === "riso_tvid"){

    div.innerHTML = `
      <p>${block.guide?.es || ""}</p>
      <div id="timer"></div>
    `;

    content.appendChild(div);

    runTimer(block.duration_sec || 30, ()=>{
      currentBlock++;
      render();
    });

    return;
  }

  // ========= SILENCE =========
  if(block.type === "silence_challenge"){

    div.innerHTML = `
      <p>🤫 Mantente en silencio</p>
      <div id="timer"></div>
    `;

    content.appendChild(div);

    runTimer(block.duration_sec || 20, ()=>{
      alert(block.reward?.es || "Bien hecho");
      currentBlock++;
      render();
    });

    return;
  }

  // ========= TVID =========
  if(block.type === "tvid"){

    const options = block.options || [];

    div.innerHTML = `<h3>Elige una opción</h3>`;

    options.forEach(opt=>{
      const btn = document.createElement("button");
      btn.className = "option";
      btn.innerText = opt.text?.es || "";

      btn.onclick = ()=>{

        document.querySelectorAll(".option").forEach(b=>{
          b.classList.remove("correct","wrong");
        });

        // ✅ SOLO AQUÍ COLOR (como pediste)
        if(opt.correct){
          btn.classList.add("correct");
        } else {
          btn.classList.add("wrong");
        }

        setTimeout(()=>{
          currentBlock++;
          render();
        }, 800);
      };

      div.appendChild(btn);
    });

    content.appendChild(div);
    return;
  }

}


// =========================
// TIMER
// =========================
function runTimer(seconds, callback){

  const timer = document.getElementById("timer");
  let t = seconds;

  timer.innerText = "⏳ " + t;

  const interval = setInterval(()=>{
    t--;
    timer.innerText = "⏳ " + t;

    if(t <= 0){
      clearInterval(interval);
      callback();
    }
  },1000);
}


// =========================
// NEXT
// =========================
function nextMission(){
  currentMission++;
  currentBlock = 0;
  render();
}

</script>

</body>
</html>
