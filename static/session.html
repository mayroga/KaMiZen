<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAYKAMI | LIFE ENTRY SYSTEM</title>

<style>
body{
    margin:0;
    background:#000;
    color:#0ff;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#app{
    width:90%;
    max-width:400px;
    padding:20px;
    border:1px solid #0ff;
    background:#000;
}

input,select,button{
    width:100%;
    margin:8px 0;
    padding:10px;
    background:black;
    border:1px solid #0ff;
    color:#0ff;
}
</style>
</head>

<body>

<div id="app">
<h2>MAYKAMI</h2>

<input id="age" type="number" value="25">

<select id="emotion">
<option value="neutral">Neutral</option>
<option value="stress">Stress</option>
</select>

<select id="difficulty">
<option value="1">Normal</option>
<option value="2">Difícil</option>
<option value="3">Extremo</option>
</select>

<button onclick="startLife()">INICIAR</button>
</div>

<script>
async function startLife(){

    const profile = {
        age: parseInt(document.getElementById("age").value),
        emotion: document.getElementById("emotion").value,
        difficulty: parseInt(document.getElementById("difficulty").value)
    };

    try{
        const res = await fetch("/start",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({profile})
        });

        const data = await res.json();

        localStorage.setItem("profile", JSON.stringify(profile));
        localStorage.setItem("state", JSON.stringify(data.state));

        window.location.href = "/simulador";

    }catch(e){
        alert("ERROR CONECTANDO");
    }
}
</script>

</body>
</html>
