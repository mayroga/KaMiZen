<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AL CIELO: KAMIZEN LIFE SYSTEM</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #00ff41;
            --neon-red: #ff003c;
            --neon-yellow: #ffff00;
            --matrix-bg: #00050a;
        }

        body {
            margin: 0;
            background: var(--matrix-bg);
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            user-select: none;
        }

        /* Capa de Acción: Palabras Flotantes */
        .word-float {
            position: absolute;
            padding: 10px 20px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            background: rgba(0, 5, 10, 0.7);
            color: var(--neon-blue);
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            animation: float-up 6s linear forwards;
            z-index: 10;
            white-space: nowrap;
        }

        @keyframes float-up {
            from { transform: translateY(100vh); opacity: 1; }
            to { transform: translateY(-10vh); opacity: 0; }
        }

        /* HUD y Stats */
        #hud {
            position: fixed; top: 0; width: 100%;
            display: flex; justify-content: space-between;
            padding: 20px; z-index: 100; pointer-events: none;
        }

        #timer-box { font-size: 2rem; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        
        #life-stats {
            position: fixed; bottom: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 5px; z-index: 100;
        }

        .stat-bar {
            width: 150px; height: 10px; background: #222; border: 1px solid #444; overflow: hidden;
        }
        .stat-fill { height: 100%; background: var(--neon-blue); transition: width 0.5s; }

        /* Overlay Mission (Pausa/Decisión) */
        #overlay {
            position: fixed; inset: 0;
            background: rgba(0, 5, 15, 0.95);
            display: none; /* Se activa desde JS */
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; padding: 40px; text-align: center;
        }

        .choice-btn {
            width: 100%; max-width: 400px; padding: 15px; margin: 10px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--neon-blue);
            color: #fff; cursor: pointer; font-size: 1.1rem;
        }
        .choice-btn:hover { background: var(--neon-blue); color: #000; }

        /* Respiración */
        #breath-circle {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 250px; height: 250px; border: 4px solid var(--neon-blue);
            border-radius: 50%; display: none; z-index: 2000;
            align-items: center; justify-content: center; flex-direction: column;
            background: rgba(0,0,0,0.8); box-shadow: 0 0 50px var(--neon-blue);
        }
        .inhale { animation: pulse 4s infinite ease-in-out; }
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(0.8); }
            50% { transform: translate(-50%, -50%) scale(1.4); }
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="timer-box">05:00</div>
        <div id="score-box">LEVEL 1</div>
    </div>

    <div id="life-stats">
        <div>PEACE</div><div class="stat-bar"><div id="bar-peace" class="stat-fill" style="width: 50%"></div></div>
        <div>SAFETY</div><div class="stat-bar"><div id="bar-safety" class="stat-fill" style="width: 100%"></div></div>
    </div>

    <div id="breath-circle">
        <div id="breath-txt" style="font-size: 1.5rem;">RESPIRA</div>
        <div id="breath-timer" style="font-size: 2rem;">4s</div>
    </div>

    <div id="overlay">
        <h1 id="phase-title"></h1>
        <p id="phase-desc"></p>
        <div id="decision-grid"></div>
        <button id="continue-btn" style="display:none" onclick="runNextCycle()">CONTINUAR</button>
    </div>

    <script>
        let state = {
            lang: 'es',
            timeLeft: 300,
            mode: 'action', // action | decision | breath
            peace: 50,
            safety: 100
        };

        const VOCABULARY = {
            es: ["CALMA", "ENFOQUE", "RESPIRA", "CONTROL", "OBSERVA"],
            en: ["CALM", "FOCUS", "BREATHE", "CONTROL", "OBSERVE"]
        };

        // --- MOTOR DE VOZ (ASESOR MASCULINO) ---
        function speak(text) {
            speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            const voices = speechSynthesis.getVoices();
            // Intenta buscar una voz masculina profesional
            msg.voice = voices.find(v => v.name.includes('Male') || v.name.includes('Google español')) || voices[0];
            msg.rate = 0.85; // Voz pausada y autoritaria
            msg.pitch = 0.9;
            speechSynthesis.speak(msg);
        }

        // --- SISTEMA DE PALABRAS (ACCIÓN) ---
        function spawnWord() {
            if (state.mode !== 'action') return;
            
            const div = document.createElement('div');
            div.className = 'word-float';
            const list = VOCABULARY[state.lang];
            div.innerText = list[Math.floor(Math.random() * list.length)];
            div.style.left = Math.random() * 80 + 10 + "vw";
            
            div.onclick = () => {
                state.peace = Math.min(100, state.peace + 2);
                updateUI();
                div.remove();
            };
            
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 6000);
        }

        // --- CICLO DE MISIÓN (EL "MOTOR" DE PAUSA) ---
        async function triggerMission() {
            state.mode = 'mission';
            document.querySelectorAll('.word-float').forEach(w => w.remove());
            
            const res = await fetch(`/api/mission/next?lang=${state.lang}`);
            const data = await res.json();
            
            const overlay = document.getElementById('overlay');
            overlay.style.display = 'flex';
            
            // Procesar bloques b[] (simplificado para el ejemplo)
            document.getElementById('phase-title').innerText = data.mission.b[0].tx[state.lang];
            const storyText = data.mission.b[1][state.lang];
            document.getElementById('phase-desc').innerText = storyText;
            speak(storyText);

            // Si el bloque es decisión (t: 'd')
            const decision = data.mission.b.find(b => b.t === 'd');
            if (decision) {
                renderDecision(decision);
            }
        }

        function renderDecision(d) {
            const grid = document.getElementById('decision-grid');
            grid.innerHTML = '';
            d.op.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = opt.split(' / ')[state.lang === 'es' ? 1 : 0];
                btn.onclick = () => {
                    const exp = d.ex[i].split(' / ')[state.lang === 'es' ? 1 : 0];
                    document.getElementById('phase-desc').innerText = exp;
                    speak(exp);
                    grid.innerHTML = '';
                    setTimeout(runBreathing, 3000);
                };
                grid.appendChild(btn);
            });
        }

        async function runBreathing() {
            document.getElementById('overlay').style.display = 'none';
            const circle = document.getElementById('breath-circle');
            circle.style.display = 'flex';
            circle.classList.add('inhale');
            
            speak(state.lang === 'es' ? "Respira conmigo" : "Breathe with me");

            let count = 5;
            while (count > 0) {
                document.getElementById('breath-timer').innerText = count + "s";
                await new Promise(r => setTimeout(r, 1000));
                count--;
            }
            
            circle.style.display = 'none';
            state.mode = 'action';
            updateUI();
        }

        function updateUI() {
            document.getElementById('bar-peace').style.width = state.peace + "%";
            document.getElementById('bar-safety').style.width = state.safety + "%";
        }

        // Timer y Spawner
        setInterval(spawnWord, 1500);
        setInterval(() => {
            if (state.timeLeft > 0) {
                state.timeLeft--;
                const m = Math.floor(state.timeLeft / 60);
                const s = state.timeLeft % 60;
                document.getElementById('timer-box').innerText = `${m}:${s.toString().padStart(2,'0')}`;
            }
            // Trigger misión cada 45 segundos
            if (state.timeLeft % 45 === 0 && state.mode === 'action') triggerMission();
        }, 1000);

    </script>
</body>
</html>
