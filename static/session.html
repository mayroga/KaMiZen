<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO: TOTAL LIFE TRAINING</title>

<style>
:root {
    --neon-blue:#00f2ff;
    --neon-green:#00ff41;
    --neon-red:#ff003c;
    --neon-yellow:#ffff00;
    --matrix-bg:#00050a;
    --neon-gold:#ffcc00;
}

body {
    margin:0;
    background:var(--matrix-bg);
    color:#fff;
    font-family:'Courier New', monospace;
    overflow:hidden;
    user-select:none;
}

#security-alert {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:8px;
    background:var(--neon-green);
    z-index:1000;
    box-shadow:0 0 15px var(--neon-green);
}

#lang-btn {
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:999;
    padding:10px 18px;
    border:2px solid var(--neon-blue);
    background:rgba(0,0,0,0.8);
    color:var(--neon-blue);
    cursor:pointer;
    font-weight:bold;
    border-radius:5px;
}

#hud {
    position:fixed;
    top:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px;
    z-index:50;
    box-sizing:border-box;
}

#timer-box {
    font-size:2.8rem;
    color:var(--neon-blue);
    text-shadow:0 0 20px var(--neon-blue);
}

#score-box {
    border:3px solid #fff;
    padding:8px 20px;
    font-size:1.8rem;
    background:rgba(255,255,255,0.1);
}

#mastery-lvl {
    color:var(--neon-green);
    font-size:1.2rem;
    font-weight:bold;
}

#life-stats {
    position:fixed;
    bottom:20px;
    left:20px;
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    z-index:50;
    max-width:95%;
}

.stat-pill {
    border:2px solid #333;
    padding:10px 15px;
    font-size:0.9rem;
    background:rgba(0,0,0,0.9);
    border-radius:6px;
}

.stat-pill span {
    font-weight:bold;
    color:var(--neon-blue);
}

#v-money { color:var(--neon-gold)!important; }
#v-safety { color:var(--neon-red)!important; }
#v-happy { color:#ff00ff!important; }

/* FLOATING WORDS */
.floating {
    position:absolute;
    padding:15px 30px;
    font-weight:900;
    font-size:1.5rem;
    border-radius:10px;
    background:rgba(0,0,0,0.9);
    z-index:10;
    animation:floatUp 7s linear forwards;
    cursor:pointer;
}

@keyframes floatUp {
    from { transform:translateY(110vh); }
    to { transform:translateY(-25vh); }
}

.explode {
    animation:blast 0.5s ease-out forwards!important;
}

@keyframes blast {
    0% { transform:scale(1); opacity:1; }
    100% { transform:scale(4); opacity:0; }
}

/* BREATHING CIRCLE */
#breath-circle{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:320px;
    height:320px;
    border-radius:50%;
    border:6px solid var(--neon-blue);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    text-align:center;
    font-weight:bold;
    color:var(--neon-blue);
    font-size:2rem;
    animation:pulse 4s infinite;
    z-index:200;
    pointer-events:none;
    background:rgba(0,0,0,0.2);
    backdrop-filter:blur(2px);
}

@keyframes pulse{
    0%{transform:translate(-50%,-50%) scale(1);opacity:0.5;}
    50%{transform:translate(-50%,-50%) scale(1.4);opacity:1;}
    100%{transform:translate(-50%,-50%) scale(1);opacity:0.5;}
}
</style>
</head>

<body>

<div id="security-alert"></div>
<button id="lang-btn" onclick="toggleLang()">EN</button>

<div id="hud">
    <div id="timer-box">15:00</div>
    <div id="score-box">0</div>
    <div id="mastery-lvl">MASTERY x1</div>
</div>

<div id="life-stats">
    <div class="stat-pill">Respect: <span id="v-respect">50</span></div>
    <div class="stat-pill">Peace: <span id="v-peace">50</span></div>
    <div class="stat-pill">Leadership: <span id="v-lead">50</span></div>
    <div class="stat-pill">Money: $<span id="v-money">100</span></div>
    <div class="stat-pill">Safety: <span id="v-safety">100</span>%</div>
    <div class="stat-pill">Happiness: <span id="v-happy">50</span>%</div>
</div>

<div id="breath-circle">INHALE</div>

<script>

/* =========================
   AUDIO ENGINE
========================= */
const AudioEngine={
    ctx:null,
    init(){
        if(this.ctx) return;
        this.ctx=new (window.AudioContext||window.webkitAudioContext)();
        this.music();
    },
    music(){
        const notes=[220,261,293,329,392,440,523];

        const loop=()=>{
            if(!this.ctx) return;
            let o=this.ctx.createOscillator();
            let g=this.ctx.createGain();

            o.type="square";
            o.frequency.value=notes[Math.floor(Math.random()*notes.length)];

            g.gain.value=0.02;

            o.connect(g);
            g.connect(this.ctx.destination);

            o.start();
            o.stop(this.ctx.currentTime+0.2);

            setTimeout(loop,200);
        };
        loop();
    },
    playCoin(){
        if(!this.ctx) return;
        let o=this.ctx.createOscillator();
        let g=this.ctx.createGain();

        o.type="triangle";
        o.frequency.value=880;

        g.gain.value=0.1;

        o.connect(g);
        g.connect(this.ctx.destination);

        o.start();
        o.stop(this.ctx.currentTime+0.1);
    },
    playExplode(){
        if(!this.ctx) return;
        let buffer=this.ctx.createBuffer(1,this.ctx.sampleRate*0.1,this.ctx.sampleRate);
        let data=buffer.getChannelData(0);
        for(let i=0;i<data.length;i++) data[i]=Math.random()*2-1;

        let noise=this.ctx.createBufferSource();
        noise.buffer=buffer;

        let g=this.ctx.createGain();
        g.gain.value=0.2;

        noise.connect(g);
        g.connect(this.ctx.destination);

        noise.start();
    }
};

document.addEventListener("click",()=>AudioEngine.init(),{once:true});

/* =========================
   STATE
========================= */
let lang="en";
let sessionEnded=false;

let state={
    score:0,
    timer:900,
    stats:{
        respect:50,
        peace:50,
        lead:50,
        money:100,
        happy:50,
        safety:100
    }
};

/* =========================
   WORDS
========================= */
const words=[
    {t:"LISTEN FIRST", type:"good"},
    {t:"RESPECT FAMILY", type:"good"},
    {t:"LEARN FAST", type:"good"},
    {t:"BUILD FUTURE", type:"good"},
    {t:"FOCUS SCHOOL", type:"good"},

    {t:"REACT ANGRY", type:"bad"},
    {t:"IGNORE SCHOOL", type:"bad"},
    {t:"BAD FRIENDS", type:"bad"},
    {t:"LOSE CONTROL", type:"bad"},
    {t:"FIGHT BACK", type:"bad"}
];

/* =========================
   SPAWN WORDS
========================= */
function spawnWord(){
    if(sessionEnded) return;

    let w=words[Math.floor(Math.random()*words.length)];

    let div=document.createElement("div");
    div.className="floating";
    div.innerText=w.t;
    div.style.left=Math.random()*85+"vw";
    div.style.color=`hsl(${Math.random()*360},100%,60%)`;

    div.onclick=()=>{

        if(div.dataset.clicked) return;
        div.dataset.clicked=true;

        AudioEngine.playCoin();
        setTimeout(()=>AudioEngine.playExplode(),50);

        div.classList.add("explode");

        /* =========================
           CORE DECISION SYSTEM
           +20 correct / -10 wrong
        ========================= */

        if(w.type==="good"){
            state.score += 20;

            state.stats.respect++;
            state.stats.peace++;
            state.stats.happy++;

        } else {
            state.score -= 10;

            state.stats.safety--;
            state.stats.lead--;
        }

        updateHUD();
        setTimeout(()=>div.remove(),400);
    };

    document.body.appendChild(div);
    setTimeout(()=>div.remove(),7000);
}

/* =========================
   HUD
========================= */
function updateHUD(){
    document.getElementById("score-box").innerText=state.score;

    let m=Math.floor(state.timer/60);
    let s=state.timer%60;

    document.getElementById("timer-box").innerText=
        String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

    for(let k in state.stats){
        let el=document.getElementById("v-"+k);
        if(el) el.innerText=state.stats[k];
    }
}

/* =========================
   TIMER
========================= */
setInterval(()=>{
    if(state.timer>0){
        state.timer--;
        updateHUD();
    }else{
        sessionEnded=true;
        document.querySelectorAll(".floating").forEach(e=>e.remove());
    }
},1000);

/* =========================
   LOOP
========================= */
setInterval(()=>spawnWord(),1200);

updateHUD();

function toggleLang(){
    lang=(lang==="en")?"es":"en";
    document.getElementById("lang-btn").innerText=lang.toUpperCase();
}

</script>

</body>
</html>
