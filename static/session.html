<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAYKAMI | Inicio</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#app{
    width:90%;
    max-width:400px;
    padding:25px;
    background:rgba(0,0,0,0.8);
    border:1px solid #00f2ff;
    border-radius:15px;
    text-align:center;
}

h1{color:#00f2ff;}

input,select{
    width:100%;
    padding:12px;
    margin:10px 0;
    background:#111;
    border:1px solid #00f2ff;
    color:#fff;
}

button{
    width:100%;
    padding:14px;
    background:#00f2ff;
    border:none;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00c8d6;
}
</style>
</head>

<body>

<div id="app">
<h1>MAYKAMI</h1>

<input id="age" type="number" placeholder="Edad / Age">

<select id="state">
<option value="estres">Estrés</option>
<option value="soledad">Soledad</option>
<option value="perdida">Pérdida</option>
</select>

<button onclick="start()">INICIAR VIDA</button>
</div>

<script>
async function start(){

    const age = document.getElementById("age").value || 25;

    const res = await fetch("/start",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({age})
    });

    const data = await res.json();

    localStorage.setItem("profile", JSON.stringify(data.profile));
    localStorage.setItem("state", JSON.stringify(data.state));

    // 👉 pasa al simulador real
    window.location.href="/static/jet.html";
}
</script>

</body>
</html>
