<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KAMIZEN LIFE SYSTEM - CORE SESSION</title>

<style>
:root{
    --bg:#0b1220;
    --card:#111a2e;
    --primary:#3b82f6;
    --success:#22c55e;
    --danger:#ef4444;
    --text:#ffffff;
    --dim:#94a3b8;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

/* =========================
   BODY
========================= */
html,
body{
    width:100%;
    min-height:100%;
    overflow-x:hidden;
    background:#000;
    font-family:Segoe UI, Arial, sans-serif;
    color:var(--text);
}

/* =========================
   BACKGROUND SYSTEM
========================= */
.container{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:-10;
    overflow:hidden;
}

.slide{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    opacity:0;
    transition:opacity 2.5s ease-in-out; /* Transición más suave para 7s */
    transform:scale(1.04);
}

.slide.active{
    opacity:1;
}

.overlay{
    position:absolute;
    inset:0;
    background:
        radial-gradient(
            circle,
            rgba(0,0,0,0.10) 20%,
            rgba(0,0,0,0.78) 100%
        );
    pointer-events:none;
}

/* =========================
   APP
========================= */
#app{
    position:relative;
    z-index:5;
    width:100%;
    max-width:700px;
    margin:auto;
    padding:20px;
}

/* =========================
   CARD SYSTEM
========================= */
.card{
    background:rgba(17,26,46,0.82);
    backdrop-filter:blur(6px);
    padding:20px;
    border-radius:16px;
    margin:15px 0;
    box-shadow:0 10px 25px rgba(0,0,0,0.45);
    border:1px solid rgba(255,255,255,0.08);
}

/* =========================
   BUTTONS
========================= */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:var(--primary);
    color:white;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
    margin-top:10px;
}

button:hover{
    transform:translateY(-2px);
}

button:disabled{
    opacity:0.7;
    cursor:not-allowed;
}

/* =========================
   ANSWERS
========================= */
.answer{
    background:#1f2937;
    padding:14px;
    margin:10px 0;
    border-radius:12px;
    cursor:pointer;
    border-left:4px solid var(--primary);
    transition:0.2s;
    font-size:18px;
    font-weight:600;
}

.answer:hover{
    transform:translateX(5px);
    background:#374151;
}

/* =========================
   BREATHING VISUAL
========================= */
.breath-circle{
    width:160px;
    height:160px;
    border-radius:50%;
    margin:30px auto;
    border:4px solid var(--primary);
    display:flex;
    align-items:center;
    justify-content:center;
    animation:breathe 6s infinite ease-in-out;
    font-size:22px;
    font-weight:bold;
    box-shadow:
        0 0 35px rgba(59,130,246,0.4);
}

@keyframes breathe{
    0%{ transform:scale(0.85); opacity:0.7; }
    50%{ transform:scale(1.25); opacity:1; border-color:var(--success); }
    100%{ transform:scale(0.85); opacity:0.7; }
}

h1,h2,h3,p,span{
    margin:10px 0;
    text-shadow: 0 2px 8px rgba(0,0,0,0.95);
}

h1{ font-size:34px; font-weight:900; }
h2{ font-size:28px; font-weight:800; }
h3{ font-size:22px; font-weight:700; }
p{ font-size:18px; line-height:1.6; font-weight:500; }
.small{ font-size:13px; color:var(--dim); }
.center{ text-align:center; }
.hidden{ display:none; }

input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    background:#1f2937;
    color:white;
    font-size:18px;
    text-align:center;
    margin-bottom:10px;
}

input:focus{
    outline:none;
    box-shadow: 0 0 10px rgba(59,130,246,0.6);
}

@media(max-width:700px){
    #app{ padding:12px; }
    h1{ font-size:28px; }
    h2{ font-size:24px; }
    h3{ font-size:20px; }
    p{ font-size:17px; }
    .breath-circle{ width:140px; height:140px; }
}
</style>
</head>

<body>

<!-- BACKGROUND SYSTEM -->
<div class="container">
    <div id="img1" class="slide active"></div>
    <div id="img2" class="slide"></div>
    <div class="overlay"></div>
</div>

<!-- MAIN APP -->
<div id="app">
    <div class="card center">
        <h2 style="color:var(--primary);">KAMIZEN LIFE SYSTEM</h2>
        <p class="small">Neural Training • Awareness • Discipline • Control</p>
        <div style="margin-top:20px;">
            <input type="number" id="missionSelector" min="1" max="49" value="1" placeholder="1-49" />
            <button onclick="jumpToMission()">LOAD STORY & MISSION</button>
        </div>
    </div>

    <div id="screen" class="card">
        <h3>Loading system...</h3>
        <p class="small">Initializing stories & missions</p>
    </div>

    <div class="card center">
        <h3>Breathing Module</h3>
        <div class="breath-circle"><span>FOCUS</span></div>
        <p class="small">Automatic regulation system (controlled by engine.js)</p>
    </div>
</div>

<!-- BACKGROUND SCRIPT -->
<script>
const slides = [document.getElementById('img1'), document.getElementById('img2')];
let currentIdx = 0;
let lastTopic = 'nature';

const topics = ['nature', 'space', 'ocean', 'animals', 'landscape', 'galaxy', 'forest', 'mountains', 'waterfall', 'stars'];

// Función para obtener una palabra clave del contenido de la APP
function getContextTopic() {
    const screenText = document.getElementById('screen').innerText.toLowerCase();
    // Si el texto contiene palabras clave, priorizamos esa temática
    for (let t of topics) {
        if (screenText.includes(t)) return t;
    }
    // Si no encuentra coincidencia, elige una aleatoria
    return topics[Math.floor(Math.random() * topics.length)];
}

function fetchImageUrl() {
    const topic = getContextTopic();
    const randomID = Math.floor(Math.random() * 10000);
    // Cambiamos a un servicio robusto para evitar pantallas vacías
    return `https://picsum.photos/1920/1080?random=${randomID}&keyword=${topic}`;
}

// Carga Inicial
slides[0].style.backgroundImage = `url('${fetchImageUrl()}')`;
slides[1].style.backgroundImage = `url('${fetchImageUrl()}')`;

function rotateBackground() {
    const nextIdx = (currentIdx + 1) % 2;
    const imgUrl = fetchImageUrl();
    const img = new Image();

    img.src = imgUrl;
    img.onload = () => {
        slides[nextIdx].style.backgroundImage = `url('${imgUrl}')`;
        slides[currentIdx].classList.remove('active');
        slides[nextIdx].classList.add('active');
        currentIdx = nextIdx;
    };
}

// CAMBIO CADA 7 SEGUNDOS
setInterval(rotateBackground, 7000);

// EXTRA: Si el contenido de la pantalla cambia drásticamente, forzar un cambio de imagen
const targetNode = document.getElementById('screen');
const config = { childList: true, subtree: true };
const callback = function(mutationsList, observer) {
    // Cuando el sistema escribe algo nuevo, preparamos la rotación para que coincida
    rotateBackground();
};
const observer = new MutationObserver(callback);
observer.observe(targetNode, config);

</script>

<script src="/static/js/engine.js"></script>

</body>
</html>
