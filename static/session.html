<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAMIZEN SYSTEM</title>

<style>
body{
    margin:0;
    background:#05070d;
    color:#fff;
    font-family:Arial;
    overflow:hidden;
}

/* =========================
   START SCREEN
========================= */
#startScreen{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:20px;
    background:#05070d;
    z-index:10;
}

input{
    padding:12px;
    font-size:18px;
    text-align:center;
    border:none;
    border-radius:6px;
}

button{
    padding:12px 20px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:6px;
    background:#00f2ff;
    color:#000;
}

/* =========================
   TIMER (BIG CENTER TOP)
========================= */
#timer{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:60px;
    color:#00f2ff;
    font-weight:bold;
}

/* =========================
   CENTER TEXT
========================= */
#centerText{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:32px;
    width:80%;
    text-align:center;
}

/* =========================
   WORDS
========================= */
.word{
    position:absolute;
    font-size:18px;
    color:#00f2ff;
    cursor:pointer;
    animation: float 5s linear forwards;
}

@keyframes float{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(-250px);opacity:0;}
}

/* explosion */
.explode{
    transform:scale(2);
    opacity:0;
    transition:0.2s;
}

</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
    <h1>KAMIZEN SYSTEM</h1>
    <input id="nameInput" placeholder="Enter Name">
    <button onclick="startApp()">START</button>
</div>

<!-- UI -->
<div id="timer">00:00</div>
<div id="centerText"></div>

<!-- ENGINE -->
<script src="/static/js/engine.js"></script>

<script>

/* =========================
   START APP
========================= */
function startApp(){

    const name = document.getElementById("nameInput").value.trim();
    if(!name) return;

    localStorage.setItem("kamizen_name", name);

    document.getElementById("startScreen").style.display = "none";

    /* INIT ENGINE */
    Engine.init();
    Engine.start();
}

</script>

</body>
</html>
