<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>KAMIZEN LIFE SYSTEM - CORE SESSION</title>

    <style>
        :root {
            --bg: #0b1220;
            --card: #111a2e;
            --primary: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --text: #ffffff;
            --dim: #94a3b8;
            --btn-response: #2563eb; /* Azul brillante y profesional */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            min-height: 100%;
            overflow-x: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
        }

        /* =========================
           BACKGROUND SYSTEM (NINOS Y NATURALEZA)
        ========================= */
        .container {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: -10;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2.5s ease-in-out;
            transform: scale(1.05);
        }

        .slide.active { opacity: 1; transform: scale(1); }

        .overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 30%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* =========================
           UI LAYOUT
        ========================= */
        #app {
            position: relative;
            z-index: 5;
            width: 100%;
            max-width: 750px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: rgba(10, 20, 40, 0.85);
            backdrop-filter: blur(12px);
            padding: 25px;
            border-radius: 20px;
            margin: 20px 0;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* =========================
           BOTONES DE RESPUESTA AZULES
        ========================= */
        .response-button {
            display: block;
            width: 100%;
            background: var(--btn-response);
            color: white;
            padding: 22px;
            border-radius: 16px;
            margin: 12px 0;
            border: 3px solid rgba(255,255,255,0.25);
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }

        .response-button:hover {
            transform: translateY(-3px);
            background: #1d4ed8;
            border-color: white;
        }

        /* =========================
           BOTÓN SKIP (ROJO Y LIMPIEZA)
        ========================= */
        .skip-btn {
            background: var(--danger);
            color: white;
            padding: 14px 30px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
            border: none;
            margin: 15px auto;
            display: block;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
        }

        .skip-btn:hover {
            background: #ff1111;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
        }

        /* =========================
           INPUTS & UTILS
        ========================= */
        .main-btn {
            background: var(--primary);
            color: white;
            padding: 18px;
            border-radius: 15px;
            width: 100%;
            font-weight: 800;
            font-size: 18px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            border: 2px solid var(--primary);
            background: #0f172a;
            color: white;
            text-align: center;
            margin-bottom: 15px;
            font-size: 22px;
        }

        .breath-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin: 20px auto;
            border: 5px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: breathe 6s infinite ease-in-out;
            font-weight: 900;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(0.9); opacity: 0.8; }
            50% { transform: scale(1.15); opacity: 1; border-color: var(--success); }
        }

        .center { text-align: center; }
        .small { font-size: 14px; color: var(--dim); }
    </style>
</head>

<body>

<div class="container">
    <div id="img1" class="slide active"></div>
    <div id="img2" class="slide"></div>
    <div class="overlay"></div>
</div>

<div id="app">

    <div class="card center">
        <h2 style="color:var(--primary); font-size: 28px;">KAMIZEN LIFE SYSTEM</h2>
        <p class="small">Neural Experience • Family • Nature • Discipline</p>

        <div style="margin-top:25px;">
            <input type="number" id="missionSelector" min="1" max="50" value="1" />
            <button class="main-btn" onclick="jumpToMission()">ACTIVATE SESSION</button>
        </div>
    </div>

    <!-- AREA DE RESPUESTAS (BOTONES AZULES) -->
    <div id="screen" class="card">
        <div id="responseContainer">
            <button class="response-button">
                SISTEMA LISTO: SELECCIONE UNA MISIÓN
            </button>
        </div>
        
        <button class="skip-btn" onclick="clearScreen()">SKIP / RESET CACHE</button>
    </div>

    <div class="card center">
        <div class="breath-circle"><span>FOCUS</span></div>
        <p class="small">BREATHING SYNC ACTIVE</p>
    </div>

</div>

<script>
    /* LÓGICA DE FONDOS (TEMÁTICA SOLICITADA) */
    const slides = [document.getElementById('img1'), document.getElementById('img2')];
    let currentIdx = 0;
    
    // Palabras clave para el generador de imágenes
    const topics = [
        'kids-playing-nature', 'beach-sunset', 'mountain-climbing', 'ocean-waves', 
        'moon-night', 'blue-sky-sun', 'forest-trees', 'city-buildings-streets', 'happy-family'
    ];

    function fetchImage() {
        const topic = topics[Math.floor(Math.random() * topics.length)];
        const randomID = Math.floor(Math.random() * 14000);
        // Usamos una fuente de imágenes de alta calidad (Unsplash via Source o similar)
        return `https://source.unsplash.com/featured/1920x1080?${topic}&sig=${randomID}`;
    }

    // Inicializar
    slides[0].style.backgroundImage = `url('${fetchImage()}')`;
    slides[1].style.backgroundImage = `url('${fetchImage()}')`;

    function rotateBackground() {
        const nextIdx = (currentIdx + 1) % 2;
        const imgUrl = fetchImage();
        const img = new Image();
        img.src = imgUrl;
        img.onload = () => {
            slides[nextIdx].style.backgroundImage = `url('${imgUrl}')`;
            slides[currentIdx].classList.remove('active');
            slides[nextIdx].classList.add('active');
            currentIdx = nextIdx;
        };
    }
    setInterval(rotateBackground, 14000);

    /* LÓGICA DE MISIONES */
    function jumpToMission() {
        const val = document.getElementById('missionSelector').value;
        const container = document.getElementById('responseContainer');
        
        // Crear un nuevo botón azul para la respuesta
        const respBtn = document.createElement('button');
        respBtn.className = 'response-button';
        respBtn.innerHTML = `MISIÓN ${val} CARGADA: ¡A JUGAR Y APRENDER!`;
        respBtn.onclick = () => console.log(`Iniciando misión ${val}`);
        
        // Limpieza de rastro anterior
        container.innerHTML = ''; 
        container.appendChild(respBtn);

        if (typeof window.engineJump === 'function') window.engineJump(val);
    }

    /* FUNCIÓN SKIP: LIMPIA TODO RASTRO */
    function clearScreen() {
        const container = document.getElementById('responseContainer');
        
        // Eliminación total de elementos del DOM
        while (container.firstChild) {
            container.removeChild(container.firstChild);
        }
        
        // Bloque vacío neutral
        const placeholder = document.createElement('button');
        placeholder.className = 'response-button';
        placeholder.style.background = 'rgba(255,255,255,0.05)';
        placeholder.style.border = '1px dashed var(--dim)';
        placeholder.innerText = 'SISTEMA LIMPIO - ESPERANDO SEÑAL';
        container.appendChild(placeholder);
    }
</script>

<script src="/static/js/engine.js"></script>

</body>
</html>
