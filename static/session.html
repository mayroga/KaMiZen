<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAMIZEN SESSION SAFE RENDER</title>

<style>
body{
    margin:0;
    padding:0;
    background:#05070d;
    color:#fff;
    font-family:Arial;
    overflow:hidden;
}

/* START SCREEN */
#startScreen{
    position:fixed;
    inset:0;
    background:#05070d;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:16px;
    z-index:9999;
}

#nameInput{
    padding:12px;
    font-size:18px;
    text-align:center;
    width:220px;
}

button{
    padding:12px 20px;
    font-size:18px;
    cursor:pointer;
}

/* SAFE UI LAYERS */
#centerText{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:28px;
    text-align:center;
    width:85%;
    pointer-events:none;
    will-change: transform;
}

#timer{
    position:absolute;
    top:20px;
    right:20px;
    font-size:28px;
    color:#00f2ff;
    pointer-events:none;
}

/* FLOAT WORDS SAFE CONTAINER */
#wordLayer{
    position:absolute;
    inset:0;
    overflow:hidden;
    pointer-events:none;
}

.word{
    position:absolute;
    color:#00f2ff;
    font-size:18px;
    opacity:0.9;
    animation:float 4s linear forwards;
    will-change: transform;
}

@keyframes float{
    from{transform:translateY(0);opacity:1;}
    to{transform:translateY(-180px);opacity:0;}
}

.hidden{display:none;}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
    <h1>KAMIZEN LIFE SYSTEM</h1>
    <input id="nameInput" placeholder="Enter name">
    <button onclick="startApp()">START</button>
</div>

<!-- SAFE LAYERS -->
<div id="centerText"></div>
<div id="timer"></div>
<div id="wordLayer"></div>

<script src="/static/js/engine.js"></script>

<script>
function startApp(){
    const name = document.getElementById("nameInput").value.trim();
    if(!name) return;

    localStorage.setItem("kamizen_name", name);

    document.getElementById("startScreen").style.display = "none";

    if(window.Engine && Engine.start){
        Engine.start();
    }
}
</script>

</body>
</html>
