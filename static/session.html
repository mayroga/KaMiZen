<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO | LIFE ADVISORY SYSTEM</title>

    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #001a33, #000);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            overflow: hidden;
            cursor: crosshair;
            transition: background 0.5s;
        }

        #topbar {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 15px;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
        }

        #top-ui {
            display: flex;
            justify-content: space-around;
            font-weight: bold;
            font-size: 1.3rem;
            color: #00f2ff;
            gap: 25px;
            align-items: center;
            margin-right: 20px;
        }

        #game { 
            padding-top: 120px; 
            position: relative; 
            z-index: 10; 
            height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            border: 2px solid #00f2ff;
            background: rgba(0, 242, 255, 0.1);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #00f2ff;
            color: #000;
            box-shadow: 0 0 25px #00f2ff;
            transform: translateY(-2px);
        }

        .opt-btn {
            display: block;
            width: 85%;
            max-width: 650px;
            margin: 12px auto;
            text-align: left;
            border-left: 6px solid #00f2ff;
            animation: fadeIn 0.5s ease;
        }

        #breath {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, #00f2ff, #0066ff);
            margin: 20px auto;
            display: none;
            position: relative;
            z-index: 5;
            opacity: 0.8;
            box-shadow: 0 0 40px #00f2ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
            font-size: 1.1rem;
        }

        .floating {
            position: absolute;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 900;
            cursor: pointer;
            animation: floatUp 5.5s linear forwards;
            z-index: 20;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            white-space: nowrap;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s ease;
        }

        @keyframes floatUp {
            from { transform: translateY(110vh) rotate(-5deg); }
            to { transform: translateY(-25vh) rotate(5deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #explanation-box {
            background: rgba(0,0,0,0.92);
            border: 2px solid #00f2ff;
            border-radius: 15px;
            padding: 30px;
            margin: 20px auto;
            width: 85%;
            max-width: 750px;
            display: none;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.4);
            font-size: 1.3rem;
            line-height: 1.6;
            color: #fff;
            z-index: 50;
        }

        #story {
            font-size: 1.5rem;
            font-weight: bold;
            max-width: 800px;
            margin: 0 auto 15px;
            padding: 0 20px;
        }

        #analysis {
            color: #00f2ff;
            font-style: italic;
            font-size: 1.2rem;
            margin-bottom: 20px;
            min-height: 1.6em;
            max-width: 700px;
        }

        #points-display {
            text-shadow: 0 0 10px #00f2ff;
        }

        /* 🔥 CONTROL BUTTONS (NUEVO) */
        #controls {
            position: fixed;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 100;
        }

    </style>
</head>

<body>

    <div id="topbar">
        <button onclick="KamizenEngine.toggleLang()">LANG: EN/ES</button>

        <div id="top-ui">
            <div id="points-display">POINTS: 0</div>
        </div>
    </div>

    <div id="game">
        <h2 id="hero-name">AL CIELO: LIFE ADVISOR</h2>
        
        <div id="breath"></div>

        <div id="story">Initialising System...</div>
        <div id="analysis"></div>

        <div id="explanation-box"></div>
        <div id="options"></div>
    </div>

    <!-- 🔥 CONTROLES MANUALES (PENALIZADOS POR ENGINE) -->
    <div id="controls">
        <button onclick="KamizenEngine.back()">BACK</button>
        <button onclick="KamizenEngine.continue()">CONTINUE</button>
    </div>

    <audio id="bg_music" loop>
        <source src="/static/sounds/dopamine_bg.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="ok_sound">
        <source src="/static/sounds/success_lottery.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="bad_sound">
        <source src="/static/sounds/glass_break.mp3" type="audio/mpeg">
    </audio>

    <script src="/static/engine.js"></script>

    <script>
        window.onload = () => {

            if(typeof KamizenEngine !== 'undefined') {
                KamizenEngine.init();
            }

            // 🔓 AUDIO UNLOCK
            document.body.addEventListener('click', () => {
                const bg = document.getElementById('bg_music');
                if(bg && bg.paused) {
                    bg.play().catch(() => {});
                }
            }, { once: true });

            // 🛡️ FALLBACK WATCHDOG (SI ENGINE MUERE)
            setTimeout(() => {
                const story = document.getElementById("story").innerText;
                if(story.includes("Initialising") && typeof KamizenEngine !== 'undefined'){
                    console.warn("Engine fallback triggered");
                    KamizenEngine.init();
                }
            }, 4000);
        };
    </script>

</body>
</html>
