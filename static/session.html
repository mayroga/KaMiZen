<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO - Sesión en Curso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-black text-white font-sans overflow-hidden">
    <div id="app-container" class="h-screen flex flex-col p-6">
        <div class="flex justify-between items-center mb-8">
            <h2 id="category-label" class="text-blue-400 font-bold tracking-widest uppercase text-sm"></h2>
            <div id="inactivity-timer" class="text-red-500 text-xs font-mono"></div>
        </div>

        <div id="content-area" class="flex-1 flex flex-col justify-center items-center text-center space-y-8">
            <div id="visual-element" class="w-full max-w-2xl">
                </div>
            <div id="text-display" class="text-2xl md:text-4xl font-light leading-relaxed px-4"></div>
        </div>

        <div class="h-32 flex flex-col items-center justify-center space-y-4">
            <button id="action-btn" class="hidden bg-white text-black px-8 py-3 rounded-full font-bold hover:bg-blue-500 transition-all uppercase tracking-tighter">
                Continuar
            </button>
            <div id="timer-display" class="hidden text-5xl font-mono text-blue-500 tracking-tighter"></div>
        </div>
    </div>

    <div id="warning-modal" class="hidden fixed inset-0 bg-red-900/90 flex justify-center items-center z-50 p-10">
        <div class="text-center">
            <h1 class="text-4xl font-bold mb-4">¿SIGUES AHÍ?</h1>
            <p class="mb-6">Toca la pantalla para no perder la sesión.</p>
            <button onclick="resetInactivity()" class="bg-white text-black px-6 py-2 rounded-full font-bold">ESTOY AQUÍ</button>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
