<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | SESSION CORE</title>

<style>
/* =========================
   BASE VISUAL (NO LOGIC)
========================= */
body {
    margin: 0;
    background: radial-gradient(circle, #001a33, #000);
    color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
}

/* =========================
   TOP CONTROL BAR
========================= */
#topbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 12px;
    background: rgba(0,0,0,0.4);
    z-index: 1000;
    flex-wrap: wrap;
}

/* =========================
   BUTTON SYSTEM (HORIZONTAL)
========================= */
.ctrl-btn {
    padding: 10px 16px;
    font-size: 14px;
    border: 2px solid #00f2ff;
    background: rgba(0, 242, 255, 0.08);
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    min-width: 90px;
}

.ctrl-btn:hover {
    background: #00f2ff;
    color: #000;
}

/* =========================
   SAFE GAME AREA (NO UI CONTROL)
========================= */
#game {
    padding-top: 80px;
    text-align: center;
}

/* =========================
   SCORE DISPLAY ONLY (READ ONLY)
========================= */
#score-display {
    margin-top: 10px;
    font-weight: bold;
    color: #00f2ff;
}

/* =========================
   PREVENT UI OVERLAP FLOATERS
========================= */
#ui-block {
    pointer-events: none;
}
</style>
</head>

<body>

<!-- =========================
     TOP CONTROL SYSTEM
========================= -->
<div id="topbar">

    <!-- LANGUAGE -->
    <button class="ctrl-btn" onclick="KamizenEngine?.toggleLang?.()">EN / ES</button>

    <!-- GAME CONTROLS -->
    <button class="ctrl-btn" onclick="KamizenEngine?.back?.()">BACK</button>
    <button class="ctrl-btn" onclick="KamizenEngine?.start?.()">START</button>
    <button class="ctrl-btn" onclick="KamizenEngine?.continue?.()">CONTINUE</button>
    <button class="ctrl-btn" onclick="KamizenEngine?.pause?.()">PAUSE</button>
    <button class="ctrl-btn" onclick="KamizenEngine?.restart?.()">RESTART</button>

</div>

<!-- =========================
     GAME AREA (ENGINE OUTPUT ONLY)
========================= -->
<div id="game">

    <h2 id="hero-name"></h2>

    <div id="story">ENGINE CONTROL ACTIVE...</div>
    <div id="analysis"></div>

    <!-- ENGINE WILL RENDER OPTIONS HERE -->
    <div id="options"></div>

    <!-- READ ONLY SCORE -->
    <div id="score-display">PUNTOS: 0</div>

</div>

<!-- =========================
     AUDIO (USED BY ENGINE ONLY)
========================= -->
<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="ok" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

</body>
</html>
