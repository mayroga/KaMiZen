<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | NEURO ENGINE V4</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
overflow:hidden;
text-align:center;
}

#topbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:10px;
z-index:20;
}

#game{
padding:70px 20px;
}

#hero{
color:#00f2ff;
font-size:18px;
}

#story,#analysis{
margin:10px;
min-height:40px;
font-size:18px;
}

#options button{
padding:12px;
margin:6px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
background:#111;
color:white;
}

#breathCircle{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:120px;
height:120px;
border-radius:50%;
background:#00f2ff;
opacity:0.5;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
z-index:5;
transition:all 3s ease;
color:black;
pointer-events:none;
}

.floating{
position:absolute;
color:#00f2ff;
animation:float 6s linear;
opacity:0.7;
cursor:pointer;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

#overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:30;
padding:20px;
}

</style>
</head>

<body>

<div id="topbar">
<button onclick="toggleLang()">LANG</button>
<button onclick="startSilence()">SILENCE</button>
</div>

<div id="game">
<h1>KAMIZEN NEURO ENGINE</h1>
<h2 id="hero"></h2>

<div id="story"></div>
<div id="analysis"></div>
<div id="options"></div>
</div>

<div id="overlay">
<h2 id="overlayTitle"></h2>
<p id="overlayText"></p>
</div>

<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="ok" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>
<audio id="win" src="/static/sounds/win.mp3"></audio>

<script>

let lang="en";
let mission=1;

let floatingWords=[];
let currentMission=null;

let locked=false;
let stopFloating=false;

let player={real:"",hero:""};

// =========================
// INIT
// =========================

async function init(){

player.real=prompt("Player name");
player.hero=prompt("Hero name");

document.getElementById("hero").innerText=player.hero;

document.getElementById("bg").volume=0.3;
document.getElementById("bg").play().catch(()=>{});

initBreathCircle();
breathingLoop();

await loadMission();
startFloatingSystem();
}

// =========================
// SPEECH
// =========================

function speak(t){
let s=new SpeechSynthesisUtterance(t);
s.lang = lang==="en"?"en-US":"es-ES";
s.rate=0.85;
speechSynthesis.speak(s);
}

function toggleLang(){
lang = lang==="en"?"es":"en";
loadMission();
}

// =========================
// LOAD MISSION
// =========================

async function loadMission(){

let res = await fetch(`/api/mission/${mission}`);
if(!res.ok)return;

currentMission = await res.json();

floatingWords = currentMission.ui?.floating_words || [];

render(currentMission);
}

// =========================
// RENDER CORE
// =========================

function render(m){

locked=false;

let story=m.blocks.find(b=>b.type==="story");
let analysis=m.blocks.find(b=>b.type==="analysis");
let decision=m.blocks.find(b=>b.type==="decision");

document.getElementById("story").innerText = story.text[lang];
document.getElementById("analysis").innerText = "";

speak(story.text[lang]);

setTimeout(()=>{
document.getElementById("analysis").innerText = analysis.text[lang];
speak(analysis.text[lang]);
},3000);

setTimeout(()=>{
renderOptions(decision.options);
},6000);
}

// =========================
// OPTIONS (4 RANDOM POSITIONS)
// =========================

function shuffle(a){
return a.sort(()=>Math.random()-0.5);
}

function renderOptions(options){

let c=document.getElementById("options");
c.innerHTML="";

let shuffled = shuffle([...options]);

shuffled.forEach(opt=>{
let b=document.createElement("button");
b.innerText = opt.text[lang];

b.onclick = ()=>handleAnswer(opt);

c.appendChild(b);
});
}

// =========================
// ANSWER SYSTEM
// =========================

async function handleAnswer(opt){

if(locked)return;
locked=true;

if(opt.correct){
flash(true);
document.getElementById("win").play();
speak("Correct choice");
}else{
flash(false);
document.getElementById("bad").play();
speak("Wrong choice");
}

await wait(1200);

await runTVid(currentMission);

mission++;
if(mission>35)mission=1;

loadMission();
locked=false;
}

// =========================
// TVID NEURO ENGINE
// =========================

async function runTVid(m){

pauseAll();

let theme=(m.theme||"").toUpperCase();

let explanation="This exercise trains emotional control and awareness.";

if(theme.includes("ANGER")) explanation="This trains emotional regulation under stress.";
if(theme.includes("FEAR")) explanation="This trains courage under uncertainty.";
if(theme.includes("DIGITAL")) explanation="This trains attention control over devices.";
if(theme.includes("TRUTH")) explanation="This trains identity integrity.";
if(theme.includes("PRESSURE")) explanation="This trains decision clarity.";

await breathTVid(explanation);

resumeAll();
}

// =========================
// BREATH ENGINE (REAL)
// =========================

let breathCircle;

function initBreathCircle(){

breathCircle=document.createElement("div");
breathCircle.id="breathCircle";
breathCircle.innerText="READY";
document.body.appendChild(breathCircle);
}

async function breathTVid(expl){

speak(expl);
await wait(2500);

// INHALE
setBreath("INHALE",1.6);
speak("Inhale");
await wait(3000);

// HOLD
setBreath("HOLD",1.6);
speak("Hold");
await wait(2000);

// EXHALE
setBreath("EXHALE",1);
speak("Exhale");
await wait(3000);
}

function setBreath(text,scale){
breathCircle.innerText=text;
breathCircle.style.transform=`translate(-50%,-50%) scale(${scale})`;
}

// =========================
// FLOATING WORDS INTERACTIVE
// =========================

function startFloatingSystem(){

setInterval(()=>{

if(stopFloating || !floatingWords.length)return;

let d=document.createElement("div");
d.className="floating";
d.innerText = floatingWords[Math.floor(Math.random()*floatingWords.length)];
d.style.left=Math.random()*100+"vw";

d.onclick=()=>floatingClick(d.innerText,d);

document.body.appendChild(d);

setTimeout(()=>d.remove(),6000);

},900);
}

function floatingClick(word,el){

el.remove();

speak("You selected "+word);

if(Math.random()>0.5){
flash(true);
}else{
flash(false);
}
}

// =========================
// SILENCE SYSTEM V4
// =========================

async function startSilence(){

pauseAll();

speak("Silence training begins. This improves focus and emotional control.");

await wait(3000);

let time = mission*20 + 180;

for(let t=time;t>0;t--){

if(t%25===0){
await breathTVid("Silence strengthens attention and self control");
}

await wait(1000);
}

speak("Silence completed");

resumeAll();
}

// =========================
// BREATH LOOP (BACKGROUND)
// =========================

function breathingLoop(){

let grow=true;

setInterval(()=>{

if(!breathCircle)return;

breathCircle.style.opacity = grow?0.6:0.3;
grow=!grow;

},4000);
}

// =========================
// VISUAL FEEDBACK
// =========================

function flash(ok){

document.body.style.background = ok
? "rgba(0,255,0,0.4)"
: "rgba(255,0,0,0.3)";

setTimeout(()=>document.body.style.background="#000",900);
}

// =========================
// SYSTEM CONTROL
// =========================

function pauseAll(){
stopFloating=true;
locked=true;
}

function resumeAll(){
stopFloating=false;
locked=false;
}

// =========================
// UTILS
// =========================

function wait(ms){
return new Promise(r=>setTimeout(r,ms));
}

// =========================
// START
// =========================

init();

</script>

</body>
</html>
