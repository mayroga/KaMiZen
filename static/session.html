<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | SURVIVAL SYSTEM</title>

<style>
body{
    margin:0;
    background:radial-gradient(circle,#001a33,#000);
    color:#fff;
    font-family:Arial;
    text-align:center;
    overflow:hidden;
}

#topbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:rgba(0,0,0,0.4);
}

#breath{
    width:120px;
    height:120px;
    border-radius:50%;
    margin:20px auto;
    background:radial-gradient(circle,#00f2ff,#0044ff);
    display:none;
    box-shadow:0 0 30px #00f2ff;
    animation:breathe 4s infinite;
}

@keyframes breathe{
    0%{transform:scale(1);}
    50%{transform:scale(1.3);}
    100%{transform:scale(1);}
}

.floating-word{
    position:absolute;
    padding:10px 14px;
    border-radius:16px;
    cursor:pointer;
    animation:floatUp 5s linear;
}

@keyframes floatUp{
    from{transform:translateY(100vh);}
    to{transform:translateY(-20vh);}
}

.good{border:2px solid #0f0;color:#0f0;}
.bad{border:2px solid #f00;color:#f00;}

#explanation-box{
    display:none;
    background:rgba(0,0,0,0.8);
    padding:15px;
    margin:20px auto;
    width:80%;
    border-left:4px solid #00f2ff;
}

button{
    padding:12px;
    margin:8px;
    border:2px solid #00f2ff;
    background:transparent;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="topbar">
    <div id="score-display">ENERGY: 0</div>
    <button onclick="KamizenEngine.toggleLang()">EN/ES</button>
</div>

<div id="breath"></div>

<h2 id="story">Loading...</h2>
<div id="analysis"></div>

<div id="explanation-box"></div>
<div id="options"></div>

<audio id="ok" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

<script src="engine.js"></script>

</body>
</html>
