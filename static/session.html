<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN FLOW</title>

<style>
body{
    margin:0;
    background:#000;
    color:#00f2ff;
    font-family:Arial;
    overflow:hidden;
}

#app{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:20px;
    padding:20px;
}

#message{
    max-width:800px;
    padding:20px;
    border:1px solid #00f2ff;
    background:rgba(0,10,20,0.9);
    text-align:center;
    font-size:22px;
    min-height:160px;
}

#circle{
    width:100px;
    height:100px;
    border-radius:50%;
    background:rgba(0,242,255,0.2);
    box-shadow:0 0 30px #00f2ff;
    display:none;
}

#options{
    display:none;
    gap:10px;
}

button{
    padding:14px;
    border:1px solid #00f2ff;
    background:transparent;
    color:#00f2ff;
    cursor:pointer;
}

.correct{background:#00ff88;color:#000;}
.wrong{background:#ff3355;color:#fff;}

#timer{
    font-size:18px;
}
</style>
</head>

<body>

<div id="app">
<div id="message">TOUCH TO START</div>
<div id="circle"></div>
<div id="timer"></div>
<div id="options"></div>
</div>

<script>

let session_id=null;
let missionBlocks=[];
let index=0;

/* VOZ */
function speak(text){
    return new Promise(resolve=>{
        const u=new SpeechSynthesisUtterance(text);
        u.rate=0.9;
        u.onend=resolve;
        speechSynthesis.speak(u);
    });
}

/* START */
async function start(){

    const res = await fetch("/start",{method:"POST"});
    const data = await res.json();

    session_id=data.session_id;

    await loadFullMission();
    runFlow();
}

/* CARGAR TODA LA MISIÓN */
async function loadFullMission(){

    missionBlocks=[];

    let next = true;

    while(next){

        const res = await fetch("/judge",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({session_id,decision:"NEXT"})
        });

        const data = await res.json();

        if(data.story.type==="end"){
            next=false;
        }else{
            missionBlocks.push(data.story);
        }
    }

    index=0;
}

/* MOTOR */
async function runFlow(){

    const story = missionBlocks.filter(b=>b.type==="story");
    const analysis = missionBlocks.filter(b=>b.type==="analysis");
    const tvid = missionBlocks.find(b=>b.options);

    const breath = missionBlocks.find(b=>b.type==="breath_focus");
    const riso = missionBlocks.find(b=>b.type==="riso_tvid");
    const silence = missionBlocks.find(b=>b.type==="silence_challenge");

    /* 1 HISTORIA */
    await show(story[0]);

    /* 2 ANALISIS */
    await show(analysis[0]);

    /* 3 TVID */
    await runTVID(tvid);

    /* 4 PAUSA PROFUNDA */
    await deepPause();

    /* 5 RESPIRACIÓN */
    if(breath) await runBreath(breath);

    /* 6 RISOTERAPIA */
    if(riso) await runRiso(riso);

    /* 7 SILENCIO */
    if(silence) await runSilence(silence);

    /* FIN */
    await show({text:{en:"Session completed."}});
}

/* SHOW */
async function show(block){
    const text=block.text?.en || "...";
    document.getElementById("message").innerText=text;
    await speak(text);
}

/* TVID */
async function runTVID(block){

    const msg=block.question?.en || "Make your decision";
    await show({text:{en:msg}});

    const opts=document.getElementById("options");
    opts.innerHTML="";
    opts.style.display="flex";

    return new Promise(resolve=>{

        block.options.forEach(o=>{
            const b=document.createElement("button");
            b.innerText=o.text.en;

            b.onclick=async()=>{
                if(o.correct){
                    b.classList.add("correct");
                    await show({text:{en:o.reason.en}});
                    opts.style.display="none";
                    resolve();
                }else{
                    b.classList.add("wrong");
                    await show({text:{en:o.reason.en}});
                }
            };

            opts.appendChild(b);
        });

    });
}

/* PAUSA ANTI-ADICCIÓN */
async function deepPause(){

    const text="Now pause. Do nothing. Let your mind disconnect.";

    document.getElementById("message").innerText=text;

    await speak(text);

    await delay(5000);
}

/* RESPIRACIÓN */
async function runBreath(block){

    const text="Now we breathe. This creates control and clarity.";
    await show({text:{en:text}});

    const c=document.getElementById("circle");
    c.style.display="block";

    let grow=true;

    const i=setInterval(()=>{
        c.style.transform=grow?"scale(2)":"scale(1)";
        grow=!grow;
    },2000);

    await countdown(block.duration_sec);

    clearInterval(i);
    c.style.display="none";
}

/* RISOTERAPIA */
async function runRiso(block){

    const text="Now activate a gentle smile. This resets your emotional state.";
    await show({text:{en:text}});

    await countdown(block.duration_sec);
}

/* SILENCIO */
async function runSilence(block){

    const text="Silence challenge. Stay present. This builds mental strength.";
    await show({text:{en:text}});

    await countdown(block.duration_sec);
}

/* TIMER */
function countdown(sec){
    return new Promise(resolve=>{
        let s=sec;
        const t=document.getElementById("timer");
        t.innerText=s+"s";

        const i=setInterval(()=>{
            s--;
            t.innerText=s+"s";

            if(s<=0){
                clearInterval(i);
                resolve();
            }
        },1000);
    });
}

/* UTILS */
function delay(ms){
    return new Promise(r=>setTimeout(r,ms));
}

document.getElementById("message").onclick=start;

</script>

</body>
</html>
