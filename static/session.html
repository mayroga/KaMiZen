<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>KAMIZEN LIFE SYSTEM - CORE SESSION</title>

    <style>
        :root {
            --bg: #0b1220;
            --card: #111a2e;
            --primary: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --text: #ffffff;
            --dim: #94a3b8;
            --btn-response: #1d4ed8; /* Azul profundo para respuestas */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            overflow-x: hidden;
            background: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: var(--text);
        }

        /* =========================
           BACKGROUND SYSTEM
        ========================= */
        .container {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: -10;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            transform: scale(1.04);
        }

        .slide.active { opacity: 1; }

        .overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(0,0,0,0.10) 20%, rgba(0,0,0,0.85) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* =========================
           APP UI
        ========================= */
        #app {
            position: relative;
            z-index: 5;
            width: 100%;
            max-width: 700px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: rgba(17, 26, 46, 0.82);
            backdrop-filter: blur(8px);
            padding: 20px;
            border-radius: 16px;
            margin: 15px 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.45);
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
        }

        /* =========================
           RESPONSE BUTTONS (ENCAPSULACIÓN)
        ========================= */
        .response-block {
            display: block;
            width: 100%;
            background: var(--btn-response);
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin: 10px 0;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: left;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* =========================
           SKIP BUTTON (LIMPIEZA)
        ========================= */
        .skip-btn {
            background: var(--danger);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            margin-top: 15px;
            float: right;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .skip-btn:hover {
            background: #b91c1c;
            transform: scale(1.05);
        }

        /* =========================
           BREATHING & UTILS
        ========================= */
        .breath-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 20px auto;
            border: 4px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: breathe 6s infinite ease-in-out;
            font-weight: bold;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(0.85); opacity: 0.7; }
            50% { transform: scale(1.15); opacity: 1; border-color: var(--success); }
        }

        button.main-btn {
            background: var(--primary);
            color: white;
            padding: 14px;
            border-radius: 12px;
            border: none;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: #1f2937;
            color: white;
            text-align: center;
            margin-bottom: 10px;
        }

        .clearfix::after { content: ""; clear: both; display: table; }
    </style>
</head>

<body>

<div class="container">
    <div id="img1" class="slide active"></div>
    <div id="img2" class="slide"></div>
    <div class="overlay"></div>
</div>

<div id="app">

    <div class="card center">
        <h2 style="color:var(--primary);">KAMIZEN LIFE SYSTEM</h2>
        <p class="small">Neural Training • Awareness • Discipline</p>

        <div style="margin-top:20px;">
            <input type="number" id="missionSelector" min="1" max="49" value="1" />
            <button class="main-btn" onclick="jumpToMission()">LOAD STORY & MISSION</button>
        </div>
    </div>

    <!-- AREA DE RESPUESTAS DINÁMICAS -->
    <div id="screen" class="card clearfix">
        <div id="responseContainer">
            <div class="response-block">
                <h3>System Ready</h3>
                <p>Waiting for mission activation...</p>
            </div>
        </div>
        <button class="skip-btn" onclick="clearScreen()">Skip / Clear</button>
    </div>

    <div class="card center">
        <h3>Breathing Module</h3>
        <div class="breath-circle"><span>FOCUS</span></div>
    </div>

</div>

<script>
    /* LÓGICA DE FONDOS */
    const slides = [document.getElementById('img1'), document.getElementById('img2')];
    let currentIdx = 0;
    const topics = ['space', 'ocean', 'landscape', 'galaxy', 'forest', 'stars'];

    function fetchImage() {
        const randomID = Math.floor(Math.random() * 10000);
        return `https://picsum.photos/1920/1080?random=${randomID}&topic=${topics[Math.floor(Math.random()*topics.length)]}`;
    }

    slides[0].style.backgroundImage = `url('${fetchImage()}')`;
    slides[1].style.backgroundImage = `url('${fetchImage()}')`;

    function rotateBackground() {
        const nextIdx = (currentIdx + 1) % 2;
        const imgUrl = fetchImage();
        const img = new Image();
        img.src = imgUrl;
        img.onload = () => {
            slides[nextIdx].style.backgroundImage = `url('${imgUrl}')`;
            slides[currentIdx].classList.remove('active');
            slides[nextIdx].classList.add('active');
            currentIdx = nextIdx;
        };
    }
    setInterval(rotateBackground, 4000);

    /* LÓGICA DE INTERFAZ Y LIMPIEZA */
    function jumpToMission() {
        const val = document.getElementById('missionSelector').value;
        const container = document.getElementById('responseContainer');
        
        // Encapsulamos la nueva respuesta en el bloque azul
        const newBlock = document.createElement('div');
        newBlock.className = 'response-block';
        newBlock.innerHTML = `<h3>Mission ${val} Loaded</h3><p>Neural link established. Proceed with caution.</p>`;
        
        // Limpiamos lo anterior para no dejar rastro y ponemos lo nuevo
        container.innerHTML = ''; 
        container.appendChild(newBlock);

        if (typeof window.engineJump === 'function') window.engineJump(val);
    }

    function clearScreen() {
        const container = document.getElementById('responseContainer');
        // Eliminación total de nodos para no dejar caché visual ni rastro en el DOM
        while (container.firstChild) {
            container.removeChild(container.firstChild);
        }
        
        // Feedback de sistema limpio
        const placeholder = document.createElement('div');
        placeholder.className = 'response-block';
        placeholder.style.background = 'rgba(255,255,255,0.05)';
        placeholder.innerHTML = `<p style="color:var(--dim); text-align:center;">Cache cleared. System idle.</p>`;
        container.appendChild(placeholder);
    }
</script>

<script src="/static/js/engine.js"></script>

</body>
</html>
