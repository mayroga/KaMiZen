<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | ENTRY SYSTEM</title>

<style>
body{
    margin:0;
    background:black;
    color:#00f2ff;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#app{
    width:90%;
    max-width:450px;
    padding:25px;
    border:2px solid #00f2ff;
    border-radius:15px;
    background:rgba(0,0,0,0.9);
    text-align:center;
}

h1{
    margin:0;
    font-size:30px;
}

input,select{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:15px;
    background:#111;
    border:1px solid #00f2ff;
    color:white;
}

button{
    width:100%;
    padding:15px;
    background:#00f2ff;
    border:none;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}
</style>

</head>

<body>

<div id="app">

<h1>KAMIZEN</h1>
<p>Sistema de Entrenamiento Humano</p>

<label>EDAD</label>
<input id="age" type="number" value="18">

<label>EMOCIÓN</label>
<select id="emotion">
    <option value="neutral">Neutral</option>
    <option value="stress">Estrés</option>
    <option value="lonely">Soledad</option>
    <option value="motivated">Motivado</option>
</select>

<label>DIFICULTAD</label>
<select id="difficulty">
    <option value="1">Normal</option>
    <option value="2">Difícil</option>
    <option value="3">Extremo</option>
</select>

<label>MODO TVID</label>
<select id="mode">
    <option value="balanced">Equilibrio</option>
    <option value="survival">Supervivencia</option>
    <option value="creative">Creativo</option>
</select>

<button onclick="startLife()">INICIAR SIMULACIÓN</button>

</div>

<script>

async function startLife(){

    const profile = {
        age: parseInt(document.getElementById("age").value),
        emotion: document.getElementById("emotion").value,
        difficulty: document.getElementById("difficulty").value,
        tvideMode: document.getElementById("mode").value,
        stage: "user",
        created: Date.now()
    };

    const state = {
        mental: 100,
        social: 50,
        karma: 0,
        discipline: 50
    };

    const res = await fetch("/start", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ profile })
    });

    const data = await res.json();

    localStorage.setItem("session_id", data.session_id);
    localStorage.setItem("profile", JSON.stringify(profile));
    localStorage.setItem("state", JSON.stringify(data.state || state));

    window.location.href = "/static/jet.html";
}

</script>

</body>
</html>
