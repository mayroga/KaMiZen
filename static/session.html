<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAYKAMI | Al Cielo</title>
    <style>
        body {
            margin: 0; background: #000; color: #fff;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        #bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg-slide {
            position: absolute; width: 115%; height: 115%; top: -7.5%; left: -7.5%;
            background-size: cover; background-position: center; opacity: 0;
            transition: opacity 2s ease-in-out; animation: slowZoom 40s infinite alternate linear;
        }
        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.1); } }

        #app {
            position: relative; z-index: 10; width: 90%; max-width: 420px;
            background: rgba(15, 23, 32, 0.85); backdrop-filter: blur(15px);
            border-radius: 25px; padding: 30px; text-align: center;
            border: 1px solid rgba(0, 242, 255, 0.3); box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        #back-btn { 
            background: rgba(255,255,255,0.1); border: 1px solid #00f2ff; color: #00f2ff;
            padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; display: none;
        }

        #lang-toggle { 
            padding: 6px 12px; background: #00f2ff; color: #000; border: none; 
            border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 11px;
        }

        h1 { color: #00f2ff; letter-spacing: 3px; margin: 0; font-size: 24px; }
        #text-content { margin: 25px 0; font-size: 1.15em; line-height: 1.6; min-height: 90px; }

        input, select {
            width: 100%; padding: 14px; margin: 10px 0; box-sizing: border-box;
            background: rgba(255,255,255,0.1); border: 1px solid #00f2ff; color: #fff; border-radius: 10px;
        }

        button.action-btn {
            padding: 15px; width: 100%; margin: 8px 0; background: #00f2ff; color: #000;
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button.action-btn:hover { background: #00d4e0; transform: translateY(-2px); }

        #breath-circle {
            width: 160px; height: 160px; border-radius: 50%; border: 6px solid #00f2ff;
            margin: 20px auto; display: none; flex-direction: column; align-items: center;
            justify-content: center; background: rgba(0, 242, 255, 0.15); transition: transform 4s linear;
        }
        #timer { font-size: 32px; font-weight: bold; }
        #breath-instruction { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        .inhale { transform: scale(1.35); }
        .exhale { transform: scale(0.85); }
    </style>
</head>
<body>
    <div id="bg-container"></div>
    <div id="app">
        <div class="nav-header">
            <button id="back-btn" onclick="resetApp()">← BACK</button>
            <button id="lang-toggle" onclick="toggleLanguage()">ESPAÑOL</button>
        </div>
        
        <h1 id="main-title">MAYKAMI</h1>

        <div id="setup">
            <input id="age" type="number" placeholder="Age / Edad">
            <select id="state">
                <option value="estres">Stress / Estrés</option>
                <option value="soledad">Loneliness / Soledad</option>
                <option value="perdida">Loss / Pérdida</option>
                <option value="confusion">Confusion / Confusión</option>
            </select>
            <button class="action-btn" onclick="start()" id="btn-start">START SESSION</button>
        </div>

        <div id="game" style="display:none;">
            <div id="text-content"></div>
            <div id="breath-circle">
                <div id="breath-instruction"></div>
                <div id="timer">4</div>
            </div>
            <div id="options"></div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" type="audio/mpeg">
    </audio>

    <script src="/static/scripts.js"></script>
</body>
</html>
