<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MAYKAMI | TOTAL CONTROL</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-gold: #f1c40f;
            --neon-green: #2ecc71;
            --neon-red: #ff3131;
            --bg-dark: #020205;
        }
        body { margin: 0; overflow: hidden; background: var(--bg-dark); color: white; font-family: 'Orbitron', sans-serif; cursor: none; }
        
        #hud {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: space-around;
            z-index: 100; pointer-events: none;
        }
        .data-box {
            background: rgba(0, 242, 255, 0.1);
            border: 2px solid var(--neon-blue);
            padding: 10px 20px; text-align: center;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
        .label { font-size: 10px; color: var(--neon-blue); letter-spacing: 2px; font-weight: bold; }
        .value { font-size: 20px; font-weight: 900; display: block; }

        canvas { display: block; }

        #system-overlay {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="hud">
    <div class="data-box" style="border-color: var(--neon-gold);">
        <span class="label">CAPITAL</span>
        <span id="val-money" class="value">0</span>
    </div>
    <div class="data-box" style="border-color: var(--neon-green);">
        <span class="label">ESTABILIDAD</span>
        <span id="val-health" class="value">100%</span>
    </div>
</div>

<div id="system-overlay">
    <p style="letter-spacing: 5px; color: var(--neon-blue);">INITIALIZING MAYKAMI INTERFACE...</p>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Ajuste dinámico de pantalla
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// DATOS PROYECTADOS DESDE JSON
const rawData = [
    { "text": "CAPITAL", "emoji": "💰", "stat": "money", "impact": 100, "color": "#f1c40f" },
    { "text": "NEGOCIO", "emoji": "🤝", "stat": "money", "impact": 250, "color": "#00f2ff" },
    { "text": "PAZ", "emoji": "🧘", "stat": "health", "impact": 15, "color": "#2ecc71" },
    { "text": "RIESGO", "emoji": "⚠️", "stat": "health", "impact": -20, "color": "#ff3131" },
    { "text": "PÉRDIDA", "emoji": "🛑", "stat": "money", "impact": -150, "color": "#ff3131" }
];

let score = 0;
let health = 100;
let active = false;
const objects = [];

// AVATAR CON MOVIMIENTO TOTAL (X, Y)
const user = { x: canvas.width / 2, y: canvas.height / 2, size: 40 };

function processCycle() {
    if(!active) return;
    const entry = rawData[Math.floor(Math.random() * rawData.length)];
    objects.push({
        ...entry,
        x: Math.random() * (canvas.width - 100) + 50,
        y: -100,
        speed: 3 + (score / 2000),
        pulse: 0
    });
}

function handleInput(e) {
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    user.x = clientX;
    user.y = clientY;
}

window.addEventListener('mousemove', handleInput);
window.addEventListener('touchstart', handleInput);
window.addEventListener('touchmove', handleInput);
window.addEventListener('mousedown', handleInput);

function update() {
    if(!active) return;

    objects.forEach((obj, i) => {
        obj.y += obj.speed;
        obj.pulse += 0.1;

        // COLISIÓN MEJORADA (DISTANCIA EUCLIDIANA)
        const dx = obj.x - user.x;
        const dy = obj.y - user.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < user.size) {
            if(obj.stat === 'money') score += obj.impact;
            if(obj.stat === 'health') health = Math.max(0, Math.min(100, health + obj.impact));
            
            updateHUD();
            objects.splice(i, 1);
        }

        if(obj.y > canvas.height + 100) objects.splice(i, 1);
    });

    if(health <= 0) {
        active = false;
        alert("SISTEMA EN REVISIÓN: EQUILIBRIO PERDIDO.");
        location.reload();
    }
}

function updateHUD() {
    document.getElementById('val-money').innerText = score;
    document.getElementById('val-health').innerText = health + "%";
}

function draw() {
    // Fondo con estela de alta fidelidad
    ctx.fillStyle = 'rgba(2, 2, 5, 0.15)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // DIBUJAR AVATAR (PUNTERO DE SELECCIÓN)
    ctx.shadowBlur = 20;
    ctx.shadowColor = varColor('--neon-blue');
    ctx.strokeStyle = varColor('--neon-blue');
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(user.x, user.y, 25, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = "rgba(0, 242, 255, 0.2)";
    ctx.fill();

    // DIBUJAR ICONOS Y TEXTO DEL JSON (MÁXIMA CLARIDAD)
    objects.forEach(obj => {
        const bounce = Math.sin(obj.pulse) * 5;
        
        ctx.shadowBlur = 15;
        ctx.shadowColor = obj.color;
        
        // Icono Grande y Claro
        ctx.font = "45px Arial";
        ctx.textAlign = "center";
        ctx.fillText(obj.emoji, obj.x, obj.y + bounce);
        
        // Etiqueta de Texto con Peso
        ctx.fillStyle = "white";
        ctx.font = "bold 14px Orbitron";
        ctx.fillText(obj.text, obj.x, obj.y + 35 + bounce);
    });
}

function varColor(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

setTimeout(() => {
    document.getElementById('system-overlay').style.display = 'none';
    active = true;
    setInterval(processCycle, 1000);
    loop();
}, 1500);

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
