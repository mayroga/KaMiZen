<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN CORE</title>

<style>
:root{
  --bg:#000;
  --neon:#00f2ff;
  --green:#00ff88;
  --red:#ff0044;
  --yellow:#ffcc00;
  --panel:rgba(0,20,40,0.95);
}

body{
  margin:0;
  background:var(--bg);
  color:var(--neon);
  font-family:Arial;
  overflow:hidden;
}

/* BREATHING CORE */
#breath{
  position:absolute;
  top:28%;
  left:50%;
  transform:translate(-50%,-50%) scale(1);
  width:160px;
  height:160px;
  border-radius:50%;
  background:rgba(0,200,255,0.18);
  border:2px solid var(--neon);
  transition:4s ease-in-out;
}

/* HEADER */
#header{
  position:absolute;
  top:10px;
  width:95%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#xpBar{
  width:180px;
  height:10px;
  border:1px solid var(--neon);
}

#xpFill{
  height:100%;
  width:0%;
  background:var(--green);
  transition:0.5s;
}

/* CORE TEXT */
#core{
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:26px;
  text-align:center;
}

/* MESSAGE */
#message{
  position:absolute;
  bottom:240px;
  width:90%;
  left:5%;
  padding:15px;
  border:1px solid var(--neon);
  background:var(--panel);
  text-align:center;
  min-height:70px;
}

/* REASON */
#reason{
  position:absolute;
  bottom:320px;
  width:90%;
  left:5%;
  text-align:center;
  color:#ffffff;
  min-height:30px;
}

/* OPTIONS */
#options{
  position:absolute;
  bottom:110px;
  width:90%;
  left:5%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  padding:15px;
  border:1px solid var(--neon);
  background:black;
  color:var(--neon);
  cursor:pointer;
  transition:0.2s;
  min-height:55px;
}

button:hover{
  background:var(--neon);
  color:black;
}

.correct{ background:var(--green)!important; color:black!important;}
.wrong{ background:var(--red)!important; color:white!important;}

/* NAV */
#nav{
  position:absolute;
  bottom:20px;
  width:90%;
  left:5%;
  display:flex;
  justify-content:space-between;
}

/* BREAK SCREEN */
#break{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}

/* SILENCE MODE */
#silence{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:#00f2ff;
  text-align:center;
}
</style>
</head>

<body>

<div id="header">
  <div id="xpBar"><div id="xpFill"></div></div>
  <button onclick="toggleLang()">EN/ES</button>
</div>

<div id="breath"></div>

<div id="core"></div>

<div id="reason"></div>
<div id="message">CLICK TO START</div>

<div id="options"></div>

<div id="nav">
  <button onclick="back()">BACK</button>
  <button onclick="restart()">RESTART</button>
  <button onclick="next()">NEXT</button>
</div>

<div id="break">
  <h2>🧠 BREAK MODE</h2>
  <p>Respira 30 segundos sin pantalla</p>
</div>

<div id="silence">
  <h2>🤫 SILENCE MODE</h2>
  <p id="silenceText"></p>
  <div id="silenceTimer"></div>
</div>

<script>

let session_id=null;
let mission=null;
let lang="en";
let xp=0;
let voiceQueue=[];
let speaking=false;

/* AUDIO */
const ctx=new (window.AudioContext||window.webkitAudioContext)();

function sound(type){
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination);

  if(type==="good") o.frequency.value=900;
  if(type==="bad") o.frequency.value=140;
  if(type==="click") o.frequency.value=500;

  g.gain.value=0.25;
  o.start();
  o.stop(ctx.currentTime+0.25);
}

/* =========================
   VOICE QUEUE (EVITA CORTES)
========================= */
function speak(text){
  voiceQueue.push(text);
  processVoice();
}

function processVoice(){
  if(speaking || voiceQueue.length===0) return;

  speaking=true;
  const text=voiceQueue.shift();

  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang==="en"?"en-US":"es-ES";
  u.rate=0.9;

  u.onend=()=>{
    speaking=false;
    setTimeout(processVoice,300);
  };

  speechSynthesis.speak(u);
}

/* =========================
   BREATHING SYSTEM (SINCRONIZADO)
========================= */
function startBreathing(){
  const b=document.getElementById("breath");

  setInterval(()=>{
    b.style.transform="translate(-50%,-50%) scale(1.4)";
    speak(lang==="en"?"Inhale slowly":"Inhala lentamente");

    setTimeout(()=>{
      b.style.transform="translate(-50%,-50%) scale(1)";
      speak(lang==="en"?"Exhale slowly":"Exhala lentamente");
    },4000);

  },8000);
}

/* =========================
   START
========================= */
async function start(){
  if(ctx.state==="suspended") await ctx.resume();

  const r=await fetch("/start",{method:"POST"});
  const d=await r.json();

  session_id=d.session_id;
  mission=d.mission;

  startBreathing();
  render();
}

/* =========================
   SHUFFLE (ANTI PREDICT)
========================= */
function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

/* =========================
   RENDER (SLOW + CONTROLLED)
========================= */
function render(){
  if(!mission) return;

  const msg=document.getElementById("message");
  const opt=document.getElementById("options");
  const reason=document.getElementById("reason");

  opt.innerHTML="";
  reason.innerText="";

  const textBlock=mission.blocks.find(b=>b.text);
  const text=textBlock?.text?.[lang] || "";

  msg.innerText=text;
  speak(text);

  const tvid=mission.blocks.find(b=>b.type==="tvid");

  if(tvid){
    const options=shuffle([...tvid.options]);

    options.forEach((o,i)=>{
      const btn=document.createElement("button");
      btn.innerText=o.text[lang];

      // delay natural (NO RAPIDO)
      setTimeout(()=>{
        opt.appendChild(btn);
      }, i*400);

      btn.onclick=()=>choose(btn,o);
    });
  }

  // TVID EXERCISES
  const exercise=mission.blocks.find(b=>b.type==="tvid_exercise");
  if(exercise){
    runExercise(exercise);
  }

  const silence=mission.blocks.find(b=>b.type==="silence");
  if(silence){
    runSilence(silence);
  }
}

/* =========================
   EXERCISE TVID
========================= */
function runExercise(ex){
  speak(ex.instruction?.[lang] || "Exercise time");

  setTimeout(()=>{
    speak(ex.step1?.[lang] || "Relaja tu cuerpo");
  },2000);

  setTimeout(()=>{
    speak(ex.step2?.[lang] || "Respira profundo");
  },6000);
}

/* =========================
   SILENCE MODE
========================= */
function runSilence(s){
  document.getElementById("silence").style.display="flex";

  document.getElementById("silenceText").innerText=
    s.message?.[lang] || "Silence mode";

  let t=10;

  const i=setInterval(()=>{
    document.getElementById("silenceTimer").innerText=t;
    t--;

    if(t<=0){
      clearInterval(i);
      document.getElementById("silence").style.display="none";
      next();
    }
  },1000);
}

/* =========================
   CHOOSE (SLOW FEEDBACK)
========================= */
async function choose(btn,o){

  const r=await fetch("/judge",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({session_id,decision:o.code})
  });

  const d=await r.json();

  document.getElementById("reason").innerText=o.reason?.[lang] || "";

  if(d.correct){
    btn.classList.add("correct");
    sound("good");
    speak("Correcto. Buen control.");
  }else{
    btn.classList.add("wrong");
    sound("bad");
    speak("Error. Aprende y reajusta.");
  }

  xp=d.xp;
  document.getElementById("xpFill").style.width=(xp%100)+"%";

  if(d.break){
    document.getElementById("break").style.display="flex";
    setTimeout(()=>document.getElementById("break").style.display="none",30000);
  }

  // DELAY NEXT (NO FAST SKIP)
  setTimeout(()=>{
    mission=d.next_mission;
    render();
  },3500);
}

/* =========================
   NAV CONTROL
========================= */
async function next(){
  const r=await fetch("/force_next",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({session_id})});
  const d=await r.json();
  mission=d.mission;
  xp=d.xp;
  render();
}

async function back(){
  const r=await fetch("/force_back",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({session_id})});
  const d=await r.json();
  mission=d.mission;
  xp=d.xp;
  render();
}

function restart(){
  location.reload();
}

function toggleLang(){
  lang=lang==="en"?"es":"en";
  render();
}

/* INIT */
document.getElementById("message").onclick=start;

</script>

</body>
</html>
