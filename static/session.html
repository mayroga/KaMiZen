<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAMIZEN | AL CIELO PRO</title>

<style>
body {
    margin:0;
    background: radial-gradient(circle,#001a33,#000);
    color:white;
    font-family:Arial;
    overflow:hidden;
}

#score-display { color:#00f2ff; }

button {
    padding:12px;
    margin:5px;
    border:2px solid #00f2ff;
    background:transparent;
    color:white;
    cursor:pointer;
}

.opt-btn {
    display:block;
    width:80%;
    margin:10px auto;
}

#breath {
    width:100px;height:100px;
    border-radius:50%;
    background:#00f2ff;
    display:none;
    margin:auto;
}

.floating {
    position:absolute;
    animation: floatUp 5s linear;
}

@keyframes floatUp {
    from { transform:translateY(100vh); }
    to { transform:translateY(-20vh); }
}
</style>
</head>

<body>

<div id="score-display">PUNTOS: 0</div>

<h2 id="story"></h2>
<div id="analysis"></div>

<div id="breath"></div>
<div id="options"></div>

<div id="explanation-box"></div>

<audio id="bg" src="/static/sounds/bg.mp3" loop></audio>
<audio id="ok" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

<script src="/static/engine.js"></script>

</body>
</html>
