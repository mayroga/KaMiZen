<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>KaMiZen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body {
            background: #020617;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background 1s ease;
        }
        #app {
            width: 95%;
            max-width: 420px;
            background: #111827;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
        }
        #logo {
            font-size: 34px;
            font-weight: 600;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        #lang-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 5px 12px;
            border-radius: 8px;
            border: 1px solid #60a5fa;
            background: transparent;
            color: #60a5fa;
            cursor: pointer;
            font-weight: 600;
        }
        #mental-panel {
            background: #0f172a;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        #block {
            font-size: 20px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        button {
            padding: 15px;
            margin: 5px 0;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: #2563eb;
            color: white;
            width: 100%;
            font-weight: 600;
            transition: 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37,99,235,0.4); }
        .secondary { background: #374151; }
    </style>
</head>
<body>
    <div id="app">
        <button id="lang-btn">ES</button>
        <div id="logo">KaMiZen</div>
        <div id="mental-panel">
            <div id="streak">🔥 Streak: 0</div>
            <div id="level">Level: 1</div>
        </div>
        <div id="block">Ready for your session?</div>
        <button id="start-btn">Start Session</button>
        <button id="next-btn" style="display:none;">Next</button>
        <div style="display: flex; gap: 10px; width: 100%;">
            <button id="back-btn" class="secondary">Back</button>
            <button id="forward-btn" class="secondary">Forward</button>
        </div>
        <button id="restart-btn" class="secondary" style="display:none; margin-top: 10px;">Restart</button>
    </div>
    <script src="/static/scripts.js"></script>
</body>
</html>
