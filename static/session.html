<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAMIZEN LIFE SYSTEM</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle, #0b0f1a, #05070d);
    color: #ffffff;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* START SCREEN */
#startScreen {
    position: fixed;
    inset: 0;
    background: #0b0f1a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 18px;
    z-index: 10;
}

#nameInput {
    padding: 12px;
    font-size: 18px;
    width: 240px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 12px 22px;
    font-size: 18px;
    border-radius: 6px;
    border: none;
    background: #00f2ff;
    cursor: pointer;
}

/* UI */
#centerText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    font-size: 26px;
    text-align: center;
    width: 80%;
}

#timer {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 18px;
    color: #00f2ff;
}

/* FLOAT WORDS */
.word {
    position: absolute;
    font-size: 16px;
    color: #00f2ff;
    opacity: 0.9;
    animation: floatUp 5s linear forwards;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-250px); opacity: 0; }
}

.hidden { display:none; }

</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
    <h1>KAMIZEN LIFE SYSTEM</h1>
    <input id="nameInput" placeholder="Enter your name">
    <button onclick="startApp()">START</button>
</div>

<!-- UI -->
<div id="centerText"></div>
<div id="timer"></div>

<script>

let user = localStorage.getItem("kamizen_name") || "";
let running = false;

if(user){
    document.getElementById("nameInput").value = user;
}

/* =========================
   START APP
========================= */
function startApp(){

    const name = document.getElementById("nameInput").value.trim();
    if(!name) return;

    user = name;
    localStorage.setItem("kamizen_name", user);

    document.getElementById("startScreen").classList.add("hidden");

    if(!running){
        running = true;
        engineLoop();
    }
}

/* =========================
   MAIN ENGINE LOOP
========================= */
async function engineLoop(){

    while(true){

        let data = await safeFetch("/api/session/start");

        if(!data || !data.story){
            show("ERROR LOADING STORY");
            await wait(2000);
            continue;
        }

        const index = data.index || 1;

        const story = safeText(data.story, "en", "NO STORY");
        const mission = safeMission(data.mission);

        // 1. STORY
        show(story);
        await wait(5000);

        // 2. GAME
        await floatingGame(300);

        // 3. MISSION
        show(mission);
        await wait(5000);

        // 4. GAME
        await floatingGame(300);

        // 5. BREATH + SILENCE
        await breathingSystem(index);

        // LOOP CONTINUA SOLO
    }
}

/* =========================
   SAFE FETCH
========================= */
async function safeFetch(url){
    try{
        const res = await fetch(url);
        return await res.json();
    } catch(e){
        console.error(e);
        return null;
    }
}

/* =========================
   SAFE TEXT HANDLING
========================= */
function safeText(obj, lang, fallback){

    try{
        return obj?.[lang] ||
               obj?.en ||
               obj?.text ||
               fallback;
    }catch(e){
        return fallback;
    }
}

function safeMission(m){

    if(!m) return "MISSION";

    return m?.t?.en ||
           m?.en ||
           m?.title ||
           m?.b?.[0]?.tx?.en ||
           "MISSION";
}

/* =========================
   UI
========================= */
function show(text){
    document.getElementById("centerText").innerText = text || "";
}

function wait(ms){
    return new Promise(r => setTimeout(r, ms));
}

/* =========================
   FLOATING GAME
========================= */
function floatingGame(duration){

    return new Promise(resolve => {

        let t = duration;

        const loop = setInterval(() => {

            t--;
            document.getElementById("timer").innerText = t;

            spawnWord();

            if(t <= 0){
                clearInterval(loop);
                resolve();
            }

        }, 1000);
    });
}

function spawnWord(){

    const words = [
        "FOCUS","CALM","DISCIPLINE",
        "AWARENESS","CONTROL","TRUTH"
    ];

    const el = document.createElement("div");
    el.className = "word";
    el.innerText = words[Math.floor(Math.random()*words.length)];

    el.style.left = Math.random() * window.innerWidth + "px";
    el.style.top = (window.innerHeight - 50) + "px";

    document.body.appendChild(el);

    setTimeout(() => el.remove(), 5000);
}

/* =========================
   BREATHING SYSTEM
========================= */
function breathingSystem(index){

    return new Promise(resolve => {

        let silenceTime = Math.min(30 + index * 5, 180);
        let t = 30;

        const breath = setInterval(() => {

            t--;

            document.getElementById("centerText").innerText =
                (t % 2 === 0) ? "INHALE" : "EXHALE";

            if(t <= 0){
                clearInterval(breath);
                silencePhase(silenceTime, resolve);
            }

        }, 1000);
    });
}

/* =========================
   SILENCE PHASE
========================= */
function silencePhase(seconds, resolve){

    let t = seconds;

    document.getElementById("centerText").innerText = "SILENCE";

    const s = setInterval(() => {

        t--;
        document.getElementById("timer").innerText = t;

        if(t <= 0){
            clearInterval(s);
            resolve();
        }

    }, 1000);
}

</script>

</body>
</html>
