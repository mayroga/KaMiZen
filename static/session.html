<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO | AURA BY MAY ROGA</title>

<style>
:root {
    --neon: #00f2ff;
    --bg: #000;
    --accent: #ff00ff;
    --panel: rgba(0, 15, 30, 0.95);
    --danger: #ff4444;
    --success: #33ff33;
}

body {
    margin: 0;
    background: var(--bg);
    font-family: Arial, sans-serif;
    color: var(--neon);
    overflow: hidden;
}

#app {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* ===== BREATHING CIRCLE ===== */
#breath-container {
    position: absolute;
    top: 40%;
    width: 200px;
    height: 200px;
    display: flex;
    justify-content: center;
    align-items: center;
}

#circle {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: rgba(0,242,255,0.25);
    box-shadow: 0 0 40px var(--neon);
    transform: scale(1);
    transition: transform 3s ease-in-out, opacity 3s ease-in-out;
}

/* ===== TEXT ===== */
#message {
    position: absolute;
    bottom: 220px;
    width: 85%;
    max-width: 700px;
    padding: 20px;
    border: 2px solid var(--neon);
    background: var(--panel);
    text-align: center;
    font-size: 18px;
    min-height: 120px;
}

/* ===== OPTIONS ===== */
#options {
    position: absolute;
    bottom: 80px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 85%;
    max-width: 700px;
}

button {
    padding: 15px;
    border: 1px solid var(--neon);
    background: transparent;
    color: var(--neon);
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: var(--neon);
    color: black;
}

/* SILENCE */
#silence {
    position: absolute;
    top: 10px;
    font-size: 14px;
    opacity: 0.7;
}

.flash {
    animation: flash 0.4s;
}

@keyframes flash {
    0% { background: rgba(255,0,0,0.5); }
    100% { background: transparent; }
}
</style>
</head>

<body>

<div id="app">

    <div id="silence">🧘 SILENCE: <span id="silenceLevel">20</span>s</div>

    <div id="breath-container">
        <div id="circle"></div>
    </div>

    <div id="message" onclick="startApp()">TOCA PARA INICIAR</div>

    <div id="options"></div>

</div>

<script>

let session_id = null;
let lang = "es";
let silenceTime = 20;
let isLoading = false;

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

/* ================= SOUND ================= */
function playSound(type){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if(type === "fail"){
        osc.type = "sawtooth";
        osc.frequency.value = 120;
    } else if(type === "success"){
        osc.type = "sine";
        osc.frequency.value = 520;
    } else {
        osc.type = "triangle";
        osc.frequency.value = 300;
    }

    gain.gain.value = 0.2;
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
}

/* ================= START ================= */
async function startApp(){

    if(audioCtx.state === "suspended") {
        await audioCtx.resume();
    }

    const res = await fetch("/start", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ profile: { lang } })
    });

    const data = await res.json();
    session_id = data.session_id;

    loadStep(data);
}

/* ================= SEND ================= */
async function sendChoice(code){

    if(isLoading) return;
    isLoading = true;

    const res = await fetch("/judge", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            session_id,
            decision: code
        })
    });

    const data = await res.json();
    loadStep(data);

    isLoading = false;
}

/* ================= LOAD STEP ================= */
function loadStep(data){

    if(!data || !data.story) return;

    const story = data.story;

    document.getElementById("message").innerText =
        story.text_es || story.text_en || "";

    document.getElementById("options").innerHTML = "";

    /* ================= BREATHING CONTROL ================= */
    if(story.type === "breathing") {
        animateBreathing(3000);
    }

    if(story.type === "silence_challenge"){
        silenceTime = story.duration_sec || silenceTime;
    } else {
        silenceTime = Math.min(180, silenceTime + 10);
    }

    document.getElementById("silenceLevel").innerText = silenceTime;

    /* ================= OPTIONS ================= */
    const opts = story.options || [];

    if(opts.length === 0 && story.type !== "breathing" && story.type !== "silence_challenge"){
        opts.push({
            code: "TDB",
            text: { es: "CONTINUAR", en: "CONTINUE" }
        });
    }

    opts.forEach(opt=>{
        const b = document.createElement("button");
        b.innerText = opt.text?.[lang] || "CONTINUAR";
        b.onclick = () => sendChoice(opt.code);
        document.getElementById("options").appendChild(b);
    });

    if(data.story.type === "fail") playSound("fail");
    if(data.story.type === "success") playSound("success");
}

/* ================= BREATHING ANIMATION ================= */
function animateBreathing(duration){
    const circle = document.getElementById("circle");

    circle.style.transition = `transform ${duration/1000}s ease-in-out`;

    circle.style.transform = "scale(2.2)";

    setTimeout(()=>{
        circle.style.transform = "scale(1)";
    }, duration/2);
}

/* ================= AUTO LOOP BREATH ================= */
setInterval(()=>{
    const circle = document.getElementById("circle");
    circle.style.opacity = 0.4 + Math.random()*0.6;
}, 3000);

</script>

</body>
</html>
