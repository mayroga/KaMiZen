<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAMIZEN CORE TRAINING</title>
<style>
body { margin:0; background:#000; color:#fff; font-family:Arial; overflow:hidden; }
#ui { position:absolute; top:0; width:100%; display:flex; justify-content:space-around; padding:10px; }
.box { background:#111; padding:10px 20px; border:1px solid #444; }
#scene { position:absolute; top:30%; width:100%; text-align:center; }
.word { font-size:40px; margin:20px; }
.btn { padding:10px 20px; margin:10px; cursor:pointer; }
</style>
</head>
<body>

<div id="ui">
  <div class="box">WELL-BEING: <span id="score">0</span></div>
  <div class="box">DAY: <span id="day">1</span></div>
  <div class="box">AGE MODE: <span id="mode">YOUTH</span></div>
</div>

<div id="scene">
  <div id="situation" class="word">START</div>
  <div id="options"></div>
</div>

<script>

let score = 0;
let day = 1;
let modeIndex = 0;

const modes = ["YOUTH", "ADULT", "ELDER"];

const data = [
  {
    situation: "SOMEONE IS MOCKING YOU",
    options: [
      { t:"IGNORE", v:+10 },
      { t:"FIGHT BACK", v:-10 },
      { t:"TALK", v:+20 }
    ]
  },
  {
    situation: "YOU FEEL LONELY",
    options: [
      { t:"ISOLATE", v:-10 },
      { t:"CALL FAMILY", v:+20 },
      { t:"SCROLL PHONE", v:-5 }
    ]
  },
  {
    situation: "SOMEONE LIES TO YOU",
    options: [
      { t:"CONFRONT", v:+10 },
      { t:"ACCEPT", v:-10 },
      { t:"DISTANCE", v:+5 }
    ]
  },
  {
    situation: "PRESSURE FROM FRIENDS",
    options: [
      { t:"SAY NO", v:+20 },
      { t:"FOLLOW", v:-20 },
      { t:"WAIT", v:+5 }
    ]
  }
];

function load(){
  let d = data[Math.floor(Math.random()*data.length)];
  document.getElementById("situation").innerText = d.situation;

  let opt = document.getElementById("options");
  opt.innerHTML = "";

  d.options.forEach(o=>{
    let b = document.createElement("button");
    b.className = "btn";
    b.innerText = o.t;
    b.onclick = ()=>choose(o.v);
    opt.appendChild(b);
  });
}

function choose(v){
  score += v;

  if(score > 100){
    day++;
    score = 0;
    modeIndex = (modeIndex+1)%modes.length;
  }

  document.getElementById("score").innerText = score;
  document.getElementById("day").innerText = day;
  document.getElementById("mode").innerText = modes[modeIndex];

  load();
}

load();

</script>
</body>
</html>
