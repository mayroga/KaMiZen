<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>KAMIZEN LIFE SYSTEM</title>

<style>

:root{
    --bg:#07111f;
    --card:#101b31;
    --card2:#15233f;

    --blue:#3b82f6;
    --green:#22c55e;
    --red:#ef4444;

    --text:#ffffff;
    --soft:#9fb0d1;

    --shadow:0 12px 35px rgba(0,0,0,.45);
}

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    min-height:100%;
    background:
        radial-gradient(circle at top,
        #132344 0%,
        #07111f 55%);

    color:var(--text);

    font-family:
        "Segoe UI",
        Arial,
        sans-serif;

    overflow-x:hidden;
}

/* =========================
   MAIN APP
========================= */

#app{
    width:100%;
    max-width:760px;
    margin:auto;
    padding:22px 16px 40px;
}

/* =========================
   CARDS
========================= */

.card{
    background:
        linear-gradient(
            180deg,
            var(--card2),
            var(--card)
        );

    border-radius:22px;

    padding:22px;

    margin-bottom:18px;

    box-shadow:var(--shadow);

    border:
        1px solid
        rgba(255,255,255,.05);

    animation:fade .35s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(8px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* =========================
   TEXT
========================= */

h1{
    font-size:2rem;
    line-height:1.2;
    margin-bottom:12px;
}

h2{
    font-size:1.55rem;
    line-height:1.3;
    margin-bottom:10px;
}

h3{
    font-size:1.15rem;
    line-height:1.45;
    margin-bottom:10px;
}

p{
    line-height:1.7;
    color:#edf2ff;
}

.dim{
    color:var(--soft);
    font-size:.95rem;
}

.center{
    text-align:center;
}

/* =========================
   BUTTONS
========================= */

button{
    width:100%;

    border:none;

    border-radius:18px;

    padding:18px;

    margin-bottom:16px;

    background:
        linear-gradient(
            180deg,
            #4d93ff,
            #2563eb
        );

    color:white;

    font-size:1rem;
    font-weight:700;

    cursor:pointer;

    transition:.2s;

    box-shadow:
        0 8px 22px
        rgba(37,99,235,.35);
}

button:hover{
    transform:translateY(-2px);
}

button:disabled{
    opacity:.6;
    cursor:not-allowed;
    transform:none;
}

/* =========================
   ANSWERS
========================= */

.answer{
    background:#1a2946;

    border-left:
        5px solid var(--blue);

    border-radius:16px;

    padding:15px;

    margin-top:12px;

    cursor:pointer;

    transition:.18s;
}

.answer:hover{
    transform:translateX(5px);
    background:#21365d;
}

.answer.correct{
    border-left-color:var(--green);
    background:
        rgba(34,197,94,.15);
}

.answer.wrong{
    border-left-color:var(--red);
    background:
        rgba(239,68,68,.14);
}

/* =========================
   BREATHING SYSTEM
========================= */

.breath-wrap{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:12px 0 6px;
}

.breath-circle{
    width:190px;
    height:190px;

    border-radius:50%;

    position:relative;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
        radial-gradient(
            circle at center,
            rgba(59,130,246,.28),
            rgba(59,130,246,.05)
        );

    border:
        4px solid rgba(59,130,246,.65);

    box-shadow:
        0 0 45px rgba(59,130,246,.22);

    transition:
        transform 4s ease-in-out,
        border-color 1s ease,
        box-shadow 1s ease;
}

.breath-circle::before{
    content:"";

    position:absolute;

    inset:-10px;

    border-radius:50%;

    border:
        1px solid rgba(255,255,255,.08);
}

#breathLabel{
    font-size:1.3rem;
    font-weight:800;
    letter-spacing:2px;

    text-align:center;
}

/* =========================
   XP
========================= */

.xp{
    color:#facc15;
    font-weight:700;
}

/* =========================
   MOBILE
========================= */

@media(max-width:640px){

    #app{
        padding:16px 12px 35px;
    }

    .card{
        padding:18px;
        border-radius:18px;
    }

    h1{
        font-size:1.7rem;
    }

    h2{
        font-size:1.35rem;
    }

    .breath-circle{
        width:165px;
        height:165px;
    }
}

</style>
</head>

<body>

<!-- =========================
     ENGINE RENDER ROOT
========================= -->

<div id="app">

    <div class="card center">

        <h1>KAMIZEN LIFE SYSTEM</h1>

        <p class="dim">
            Initializing neural training system...
        </p>

    </div>

</div>

<!-- =========================
     ENGINE
========================= -->

<script src="/static/js/engine.js"></script>

</body>
</html>
