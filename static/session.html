<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MAYKAMI NEUROGAME</title>
<style>
    :root { --primary: #00f2ff; --bg: #05070d; --font: 'Segoe UI', Roboto, sans-serif; --correct: #00ff88; --incorrect: #ff4444; }
    body { margin:0; background: var(--bg); color:#fff; font-family: var(--font); overflow:hidden; transition: background 0.5s; }
    
    /* UI Layout */
    #timer { position:absolute; top:20px; left:50%; transform:translateX(-50%); font-size:100px; color:var(--primary); font-weight:bold; z-index:200; text-shadow: 0 0 30px rgba(0,242,255,0.6); pointer-events: none; }
    #centerText { position:absolute; top:35%; left:50%; transform:translate(-50%,-50%); font-size:30px; width:80%; text-align:center; z-index:50; line-height: 1.6; }
    
    /* Quiz UI */
    #quizContainer { display:none; position:absolute; top:55%; left:50%; transform:translate(-50%,-50%); width:80%; flex-direction:column; gap:15px; z-index:100; }
    .option-btn { padding:20px; font-size:20px; background: rgba(255,255,255,0.05); border: 2px solid var(--primary); color: #fff; border-radius: 15px; cursor: pointer; transition: 0.3s; text-align: left; }
    .explanation { display:none; margin-top: 10px; font-size: 18px; color: #aaa; font-style: italic; }

    /* Control Buttons */
    .btn-panel { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 1000; }
    .btn-kam { padding:15px 40px; font-size:18px; background:var(--primary); color:#000; border:none; border-radius:50px; cursor:pointer; font-weight:bold; box-shadow: 0 0 20px var(--primary); }
    #btnNext { display:none; background: var(--correct); box-shadow: 0 0 20px var(--correct); }

    /* Corner Explanation */
    #explanationBox { position:absolute; bottom:120px; left:30px; width:320px; padding:20px; background: rgba(0,242,255,0.1); border-left: 5px solid var(--primary); font-size:16px; opacity:0; transition: opacity 0.5s; z-index:60; pointer-events: none; }

    /* Metrics */
    #indicators { position:absolute; right:30px; top:50%; transform:translateY(-50%); display:none; flex-direction:column; gap:15px; z-index:100; }
    .bar-container { display: flex; align-items: center; gap: 10px; }
    .bar-label { font-size: 10px; width: 60px; text-align: right; color: var(--primary); }
    .bar { width:10px; height:60px; background:rgba(255,255,255,0.1); border-radius:5px; position:relative; }
    .fill { position:absolute; bottom:0; width:100%; height:0%; background:var(--primary); transition: height 0.5s; }

    /* Breathing & Silence */
    #breathContainer { display:none; position:fixed; inset:0; flex-direction:column; justify-content:flex-start; align-items:center; z-index:150; background: var(--bg); padding-top: 150px; }
    #breathCircle { width: 250px; height: 250px; border-radius: 50%; background: radial-gradient(circle, #00f2ff 0%, #0044ff 100%); box-shadow: 0 0 80px #00f2ff; display:flex; justify-content:center; align-items:center; font-weight:bold; font-size:28px; color:white; transition: all 4s ease-in-out; }
    #scienceText { margin-top: 80px; width: 70%; text-align: center; color: #00f2ff; font-size: 20px; line-height: 1.6; font-style: italic; }

    /* Word Floating */
    .word { position:absolute; font-size:28px; color:var(--primary); font-weight:bold; cursor:pointer; animation: float 6s linear forwards; white-space: nowrap; text-shadow: 0 0 10px rgba(0,242,255,0.8); }
    @keyframes float { 0%{transform:translateY(0); opacity:0;} 10%{opacity:1;} 90%{opacity:1;} 100%{transform:translateY(-500px); opacity:0;} }
</style>
</head>
<body>

<div id="timer">00:00</div>
<div id="centerText">Initializing MayKaMi Neuro-System...</div>

<div id="quizContainer"></div>

<div class="btn-panel">
    <button id="btnBack" class="btn-kam" onclick="Engine.repeatAudio()">BACK</button>
    <button id="btnStart" class="btn-kam" onclick="Engine.start()">START SESSION</button>
    <button id="btnNext" class="btn-kam" onclick="Engine.nextQuizStep()">NEXT LEVEL</button>
    <button id="btnLang" class="btn-kam" onclick="Engine.toggleLang()">ESP</button>
</div>

<div id="explanationBox">
    <strong id="expTitle"></strong><br><span id="expBody"></span>
</div>

<div id="indicators"></div>

<div id="breathContainer">
    <div id="breathCircle">IDLE</div>
    <div id="scienceText"></div>
</div>

<div id="finalModal" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:2000; flex-direction:column; justify-content:center; align-items:center; padding:40px; text-align:center;">
    <h1 id="diagTitle" style="color:var(--primary); font-size: 50px; text-shadow: 0 0 20px var(--primary);">NEURO-DIAGNOSIS</h1>
    <div id="diagText" style="margin:30px 0; font-size:24px; line-height:1.6; max-width: 900px; color: #eee;"></div>
    <button class="btn-kam" onclick="location.reload()">RESTART PROGRAM</button>
</div>

<audio id="bgMusic" loop src="https://assets.mixkit.co/music/preview/mixkit-tech-house-vibes-130.mp3"></audio>
<audio id="sfxBreak" src="https://www.soundjay.com/misc/sounds/glass-break-01.mp3"></audio>
<audio id="sfxCorrect" src="https://www.myinstants.com/media/sounds/ding-sound-effect_2.mp3"></audio>
<audio id="sfxWrong" src="https://www.myinstants.com/media/sounds/wrong-answer-sound-effect.mp3"></audio>

<script>
const Engine = (() => {
    let state = { 
        lang: 'en', phase: 'init', index: 1, 
        stats: {}, clicks: 0, data: null, 
        gameTime: 300, currentText: "", quizIndex: 0 
    };

    const pillars = {
        "PURPOSE": { cat: "Core", color: "#ff00ff", en: "Your internal 'Why'. The compass of every successful life.", es: "Tu 'Por qué' interno. La brújula de toda vida exitosa." },
        "DISCIPLINE": { cat: "Action", color: "#00ff88", en: "Consistency over intensity. Building neural pathways for success.", es: "Consistencia sobre intensidad. Construyendo rutas neuronales." },
        "RESILIENCE": { cat: "Spirit", color: "#ffa500", en: "The ability to absorb chaos and transform it into order.", es: "Capacidad de absorber el caos y transformarlo en orden." },
        "EMPATHY": { cat: "Social", color: "#00f2ff", en: "Emotional intelligence: Understanding the human frequency.", es: "Inteligencia emocional: Entender la frecuencia humana." },
        "WEALTH": { cat: "Value", color: "#ffd700", en: "The result of the value you provide to the world.", es: "El resultado del valor que aportas al mundo." },
        "HEALTH": { cat: "Body", color: "#ff4444", en: "Your biological hardware. The foundation of high performance.", es: "Tu hardware biológico. La base del alto rendimiento." },
        "STRATEGY": { cat: "Mind", color: "#4444ff", en: "Thinking steps ahead. Managing resources with wisdom.", es: "Pensar pasos adelante. Gestionar recursos con sabiduría." },
        "LEGACY": { cat: "Time", color: "#ffffff", en: "What remains. Living for something bigger than yourself.", es: "Lo que queda. Vivir por algo más grande que tú mismo." }
    };

    const start = async () => {
        document.getElementById("btnStart").style.display = "none";
        document.getElementById("btnBack").style.display = "block";
        const res = await fetch("/api/session/start");
        state.data = await res.json();
        state.index = state.data.index || 1;
        playPhase("story");
    };

    const playPhase = (type) => {
        state.phase = type;
        let rawText = "";
        
        if(type === "story") {
            rawText = state.data.story[state.lang];
        } else if(type === "mission") {
            // Unir todo el contenido de la misión para que no se corte
            rawText = state.data.mission.b.map(block => block.tx[state.lang]).join(" ");
        }

        document.getElementById("centerText").innerText = rawText;
        state.currentText = rawText;
        
        // Narración limpia
        speak(rawText, () => {
            if(type === "story") setTimeout(() => playPhase("mission"), 1500);
            else showQuiz();
        });
    };

    const speak = (text, callback) => {
        window.speechSynthesis.cancel();
        // Limpieza profunda para el narrador: quitar caracteres técnicos, guiones bajos y barras
        const cleanText = text.replace(/[\\/_*#]/g, ' ').replace(/([.,!?;])(?=\S)/g, '$1 ');
        
        const msg = new SpeechSynthesisUtterance(cleanText);
        const voices = window.speechSynthesis.getVoices();
        // Buscar voz masculina premium
        msg.voice = voices.find(v => (v.name.includes("Male") || v.name.includes("David") || v.name.includes("Google US English")) && v.lang.startsWith("en")) || voices[0];
        msg.rate = 0.88; // Pausada
        msg.pitch = 0.95; // Audible y clara
        msg.onend = callback;
        window.speechSynthesis.speak(msg);
    };

    const showQuiz = () => {
        state.phase = 'quiz';
        document.getElementById("centerText").innerText = state.lang === 'en' ? "CHOOSE THE CORRECT PATH" : "ELIGE EL CAMINO CORRECTO";
        const container = document.getElementById("quizContainer");
        container.style.display = "flex";
        container.innerHTML = "";

        const questions = state.data.mission.b[0].q;
        const q = questions[state.quizIndex];

        // Leer la pregunta
        speak(q.tx[state.lang], () => {});

        q.o.forEach((opt, idx) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerHTML = `${opt.tx[state.lang]} <div class="explanation" id="exp-${idx}">${opt.ex[state.lang]}</div>`;
            btn.onclick = () => checkAnswer(idx, q.v, btn);
            container.appendChild(btn);
        });
    };

    const checkAnswer = (idx, correctIdx, btn) => {
        const isCorrect = idx === correctIdx;
        const allBtns = document.querySelectorAll(".option-btn");
        const explanations = document.querySelectorAll(".explanation");

        allBtns.forEach(b => b.style.pointerEvents = "none");
        explanations.forEach(e => e.style.display = "block");

        if(isCorrect) {
            btn.style.borderColor = "var(--correct)";
            btn.style.background = "rgba(0, 255, 136, 0.1)";
            document.getElementById("sfxCorrect").play();
            speak(state.lang === 'en' ? "Correct." : "Correcto.", () => {});
        } else {
            btn.style.borderColor = "var(--incorrect)";
            btn.style.background = "rgba(255, 68, 68, 0.1)";
            allBtns[correctIdx].style.borderColor = "var(--correct)";
            document.getElementById("sfxWrong").play();
            speak(state.lang === 'en' ? "Incorrect." : "Incorrecto.", () => {});
        }

        document.getElementById("btnNext").style.display = "block";
    };

    const nextQuizStep = () => {
        state.quizIndex++;
        const questions = state.data.mission.b[0].q;
        document.getElementById("btnNext").style.display = "none";
        
        if(state.quizIndex < questions.length) {
            showQuiz();
        } else {
            document.getElementById("quizContainer").style.display = "none";
            startGame(1); // Primer juego de 5 min
        }
    };

    const startGame = (cycle) => {
        state.phase = 'game';
        document.getElementById("centerText").innerText = "";
        const music = document.getElementById("bgMusic");
        music.play();
        music.volume = 0.4;
        
        let timeLeft = state.gameTime;
        if(cycle === 1) initIndicators();

        const loop = setInterval(() => {
            timeLeft--;
            document.getElementById("timer").innerText = formatTime(timeLeft);
            spawnWord();

            if (state.gameTime - timeLeft >= 60) {
                document.getElementById("explanationBox").style.opacity = "0";
                document.getElementById("indicators").style.display = "flex";
            }

            if (timeLeft <= 0) {
                clearInterval(loop);
                if(cycle === 1) {
                    // Después del primer juego, repetimos el ciclo de palabras o pasamos a silencio
                    startGame(2); 
                } else {
                    runSilenceChallenge();
                }
            }
        }, 1000);
    };

    const spawnWord = () => {
        const keys = Object.keys(pillars);
        const key = keys[Math.floor(Math.random()*keys.length)];
        const p = pillars[key];
        const el = document.createElement("div");
        el.className = "word";
        el.innerText = key;
        el.style.left = Math.random()*80 + 10 + "%";
        el.style.top = "95%";
        el.style.color = p.color;

        el.onclick = () => {
            const glass = document.getElementById("sfxBreak").cloneNode();
            glass.volume = 0.6;
            glass.play();
            
            state.clicks++;
            state.stats[p.cat] = (state.stats[p.cat] || 0) + 1;
            updateBars();

            if (state.gameTime - parseInt(document.getElementById("timer").innerText.split(":")[1]) < 60) {
                document.getElementById("explanationBox").style.opacity = "1";
                document.getElementById("expTitle").innerText = key;
                document.getElementById("expBody").innerText = p[state.lang];
            }
            el.remove();
        };
        document.body.appendChild(el);
    };

    const runSilenceChallenge = async () => {
        state.phase = 'silence';
        document.getElementById("bgMusic").pause();
        document.getElementById("indicators").style.display = "none";
        document.getElementById("centerText").innerText = "";
        document.getElementById("breathContainer").style.display = "flex";

        let silenceSeconds = Math.min(30 + (state.index - 1) * 4.4, 180);
        let t = Math.round(silenceSeconds);

        const scienceExp = {
            en: "Silence deactivates the Amygdala and synchronizes the Heart-Brain coherence, rebuilding logic circuits.",
            es: "El silencio desactiva la Amígdala y sincroniza la coherencia Corazón-Cerebro, reconstruyendo circuitos de lógica."
        };
        document.getElementById("scienceText").innerText = scienceExp[state.lang];

        while (t > 0) {
            document.getElementById("timer").innerText = formatTime(t);
            await breathStep("INHALA / INHALE", 2.0, 4000);
            await breathStep("RETIENE / HOLD", 2.0, 4000);
            await breathStep("EXHALA / EXHALE", 1.0, 4000);
            t -= 12;
            if(t < 0) t = 0;
        }
        showDiagnosis();
    };

    const breathStep = (txt, scale, time) => {
        return new Promise(r => {
            const c = document.getElementById("breathCircle");
            c.innerText = txt;
            c.style.transform = `scale(${scale})`;
            setTimeout(r, time);
        });
    };

    const showDiagnosis = () => {
        document.getElementById("breathContainer").style.display = "none";
        document.getElementById("finalModal").style.display = "flex";
        const top = Object.keys(state.stats).reduce((a, b) => state.stats[a] > state.stats[b] ? a : b, "Balance");
        
        const diag = {
            en: `NEURO-PROFILE: ${top}. Your interaction shows a high capacity for logic and resource management. Your neural coherence has increased by 22% during this session.`,
            es: `PERFIL NEURAL: ${top}. Tu interacción muestra una alta capacidad de lógica y gestión de recursos. Tu coherencia neural ha aumentado un 22% durante esta sesión.`
        };
        document.getElementById("diagText").innerText = diag[state.lang];
    };

    const initIndicators = () => {
        const ind = document.getElementById("indicators");
        ind.innerHTML = "";
        Object.keys(pillars).forEach(k => {
            ind.innerHTML += `
                <div class="bar-container">
                    <div class="bar-label">${k}</div>
                    <div class="bar"><div class="fill" id="bar-${pillars[k].cat}"></div></div>
                </div>`;
        });
    };

    const updateBars = () => {
        Object.keys(state.stats).forEach(cat => {
            const el = document.getElementById(`bar-${cat}`);
            if(el) el.style.height = Math.min(state.stats[cat] * 7, 100) + "%";
        });
    };

    const formatTime = (s) => {
        const m = Math.floor(s/60);
        const sec = s%60;
        return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    };

    return {
        start,
        repeatAudio: () => speak(state.currentText, () => {}),
        nextQuizStep,
        toggleLang: () => {
            state.lang = state.lang === 'en' ? 'es' : 'en';
            document.getElementById("btnLang").innerText = state.lang === 'en' ? 'ESP' : 'ENG';
        }
    };
})();
</script>
</body>
</html>
