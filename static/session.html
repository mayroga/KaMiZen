<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | LIFE ENGINE</title>

<style>
body {
    margin:0;
    font-family: Arial Black, sans-serif;
    background:#000;
    color:#00f2ff;
    overflow:hidden;
}

#app {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* STORY */
#message {
    width:80%;
    max-width:800px;
    padding:25px;
    border:2px solid #00f2ff;
    background:rgba(0,0,0,0.92);
    text-align:center;
    font-size:20px;
    line-height:1.6;
    min-height:120px;
}

/* STATS */
#stats {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:10px;
    width:80%;
    max-width:800px;
    margin-bottom:20px;
}

.box {
    border:1px solid #00f2ff;
    padding:10px;
    text-align:center;
}

/* BUTTONS */
#options {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    width:80%;
}

button {
    padding:12px;
    border:2px solid #00f2ff;
    background:black;
    color:#00f2ff;
    cursor:pointer;
    min-width:120px;
}

button:hover {
    background:#00f2ff;
    color:black;
}
</style>
</head>

<body>

<div id="app">

    <div id="stats">
        <div class="box">MENTAL <div id="mental">100</div></div>
        <div class="box">SOCIAL <div id="social">50</div></div>
        <div class="box">KARMA <div id="karma">0</div></div>
        <div class="box">DISCIPLINE <div id="disc">50</div></div>
    </div>

    <div id="message">Inicializando sistema...</div>
    <div id="options"></div>

</div>

<script>

// ===============================
// STATE
// ===============================
let session_id = localStorage.getItem("session_id");
let state = JSON.parse(localStorage.getItem("state") || "{}");

let locked = false;
let lastNarrative = "";

// ===============================
// INIT
// ===============================
window.onload = async function () {

    show("Verificando sistema...");

    if (!session_id) {
        await startSession();
    } else {
        show("Reconectando sistema...");
        await next("TDM");
    }

    renderButtons();
};

// ===============================
// START
// ===============================
async function startSession() {

    const res = await fetch("/start", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            profile: { age: 18, emotion: "neutral" }
        })
    });

    const data = await res.json();

    session_id = data.session_id;
    state = data.state;

    localStorage.setItem("session_id", session_id);
    localStorage.setItem("state", JSON.stringify(state));

    show(data.narrative);
    speak(data.narrative);
    updateUI();
}

// ===============================
// NEXT STEP (ONLY BACKEND CONTROL)
// ===============================
async function next(decision) {

    if (locked) return;
    locked = true;

    try {

        const res = await fetch("/judge", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                session_id,
                decision,
                context: "flow"
            })
        });

        const data = await res.json();

        if (data.error) {
            show("ERROR DE SESIÓN - REINICIANDO");
            localStorage.removeItem("session_id");
            session_id = null;
            await startSession();
            locked = false;
            return;
        }

        state = data.state;
        localStorage.setItem("state", JSON.stringify(state));
        updateUI();

        // =========================
        // 🔴 END FIX (NO FAKE END)
        // =========================
        if (data.status === "end") {
            const endMsg = "FIN DEL CICLO HUMANO. TU IDENTIDAD HA SIDO REGISTRADA.";
            show(endMsg);
            speak(endMsg);
            locked = false;
            return;
        }

        const narrative = data.narrative || "Procesando decisión...";
        lastNarrative = narrative;

        show(narrative);
        speak(narrative);

        const delay = Math.max(6000, narrative.length * 60);

        clearTimeout(window.auto);
        window.auto = setTimeout(() => {
            next("TDM");
        }, delay);

    } catch (e) {
        console.error(e);
        show("ERROR DE CONEXIÓN");
    }

    setTimeout(() => locked = false, 800);
}

// ===============================
// UI
// ===============================
function show(t) {
    document.getElementById("message").innerText = t;
}

function updateUI() {
    document.getElementById("mental").innerText = state.mental ?? 100;
    document.getElementById("social").innerText = state.social ?? 50;
    document.getElementById("karma").innerText = state.karma ?? 0;
    document.getElementById("disc").innerText = state.discipline ?? 50;
}

// ===============================
// VOICE (ANTI CUT PERFECT SYNC)
// ===============================
function speak(text) {

    if (!window.speechSynthesis) return;

    speechSynthesis.cancel();

    const u = new SpeechSynthesisUtterance(text);
    u.lang = "es-ES";
    u.rate = 0.95;
    u.pitch = 1;

    speechSynthesis.speak(u);
}

// ===============================
// BUTTONS
// ===============================
function renderButtons() {

    const c = document.getElementById("options");
    c.innerHTML = "";

    const list = [
        ["TDB","Equilibrio"],
        ["TDM","Impulso"],
        ["TDN","Creatividad"],
        ["TDP","Estructura"],
        ["TDG","Control"],
        ["TDK","Conexión"]
    ];

    for (let [k,label] of list) {
        const b = document.createElement("button");
        b.innerText = label;
        b.onclick = () => next(k);
        c.appendChild(b);
    }
}

</script>

</body>
</html>
