<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AL CIELO | USA 50 STATES SURVIVAL</title>
    <style>
        :root {
            --neon-blue: #00f2ff; --neon-gold: #f1c40f; --neon-red: #ff3131;
            --bg-dark: #020205;
        }
        body { margin: 0; overflow: hidden; background: var(--bg-dark); color: white; font-family: 'Orbitron', sans-serif; cursor: none; }
        
        #hud {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: space-evenly; z-index: 100; pointer-events: none;
        }
        .data-box {
            background: rgba(0, 0, 0, 0.9); border: 2px solid var(--neon-blue);
            padding: 10px 15px; text-align: center; min-width: 140px;
        }
        .label { font-size: 9px; color: var(--neon-blue); letter-spacing: 1px; font-weight: 900; display: block; }
        .value { font-size: 22px; font-weight: 900; display: block; }

        #state-indicator {
            position: absolute; bottom: 20px; left: 20px;
            font-size: 14px; color: var(--neon-gold); border-left: 3px solid var(--neon-gold); padding-left: 10px;
        }

        #overlay {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
        .start-btn {
            padding: 20px 40px; background: var(--neon-blue); color: black;
            border: none; font-weight: 900; cursor: pointer; letter-spacing: 3px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="hud">
    <div class="data-box" style="border-color: var(--neon-gold);"><span class="label">CREDIT SCORE / WEALTH</span><span id="val-money" class="value">$0</span></div>
    <div class="data-box" style="border-color: var(--neon-red);"><span class="label">STABILITY</span><span id="val-health" class="value">100%</span></div>
    <div class="data-box" style="border-color: #fff;"><span class="label">STATE LAW</span><span id="val-state" class="value">NEW YORK</span></div>
</div>

<div id="state-indicator">CURRENT ZONE: <span id="zone-name">URBAN DEFENSE</span></div>

<div id="overlay">
    <h1 style="color: var(--neon-blue); letter-spacing: 10px;">AL CIELO</h1>
    <p style="color: #666; font-size: 11px;">50 STATES SIMULATOR: SURVIVAL, LAW & DISCIPLINE</p>
    <button class="start-btn" onclick="startGame()">INITIALIZE MATRIX</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let audioCtx;

// --- DYNAMIC USA MATRIX (50+ SITUATIONS) ---
const usaSituations = [
    { text: "ACTIVE SHOOTER DRILL", type: "pos", impact: 1000, color: "#2ecc71", freq: 1200, state: "ALL" },
    { text: "UNLOCKED FIREARM", type: "neg", impact: -100, color: "#ff3131", freq: 80, state: "TX/FL" },
    { text: "CREDIT CARD DEBT", type: "neg", impact: -50, color: "#e67e22", freq: 110, state: "ALL" },
    { text: "SITUATIONAL AWARENESS", type: "pos", impact: 500, color: "#00f2ff", freq: 900, state: "URBAN" },
    { text: "PEER DRUG PRESSURE", type: "neg", impact: -80, color: "#ff3131", freq: 70, state: "CA/WA" },
    { text: "911 EMERGENCY PROTOCOL", type: "pos", impact: 600, color: "#2ecc71", freq: 1000, state: "ALL" },
    { text: "CYBER BULLYING", type: "neg", impact: -30, color: "#9b59b6", freq: 140, state: "ALL" },
    { text: "KNOW YOUR RIGHTS", type: "pos", impact: 800, color: "#f1c40f", freq: 750, state: "ALL" },
    { text: "EXIT STRATEGY", type: "pos", impact: 400, color: "#2ecc71", freq: 950, state: "PUBLIC PLACES" }
];

const states = ["TEXAS", "CALIFORNIA", "FLORIDA", "NEW YORK", "ILLINOIS", "GEORGIA", "ARIZONA"];
let currentStats = { money: 0, health: 100, state: states[0] };
let active = false;
let objects = [];
const user = { x: canvas.width / 2, y: canvas.height / 2, size: 50 };

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

function triggerSound(freq, type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type === 'pos' ? 'sine' : 'sawtooth';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.7);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.7);
}

function spawn() {
    if(!active) return;
    const entry = usaSituations[Math.floor(Math.random() * usaSituations.length)];
    // Multiplicador de velocidad por estado (NY/CA más rápido/caótico)
    const stateSpeed = (currentStats.state === "NEW YORK" || currentStats.state === "CALIFORNIA") ? 1.5 : 1.0;
    
    objects.push({
        ...entry,
        x: Math.random() * (canvas.width - 200) + 100,
        y: -100,
        speed: (4 + (currentStats.money / 10000)) * stateSpeed
    });

    // Cambio dinámico de estado cada 15 segundos
    if(Math.random() < 0.01) {
        currentStats.state = states[Math.floor(Math.random() * states.length)];
        document.getElementById('val-state').innerText = currentStats.state;
    }
}

function update() {
    if(!active) return;

    objects.forEach((obj, i) => {
        obj.y += obj.speed;
        const dist = Math.sqrt((obj.x - user.x)**2 + (obj.y - user.y)**2);

        if (dist < user.size) {
            if (obj.type === 'neg') {
                currentStats.health -= 25;
                // En USA un error legal o de seguridad te quita el futuro
                currentStats.money = Math.floor(currentStats.money * 0.1); 
                triggerSound(obj.freq, 'neg');
            } else {
                currentStats.money += obj.impact;
                currentStats.health = Math.min(100, currentStats.health + 5);
                triggerSound(obj.freq, 'pos');
            }
            updateHUD();
            objects.splice(i, 1);
        }
        if(obj.y > canvas.height + 100) objects.splice(i, 1);
    });

    if(currentStats.health <= 0) endGame("SYSTEM COLLAPSE: FAILURE TO ADAPT TO STATE LAWS.");
}

function updateHUD() {
    document.getElementById('val-money').innerText = "$" + currentStats.money;
    document.getElementById('val-health').innerText = currentStats.health + "%";
}

function draw() {
    ctx.fillStyle = 'rgba(2, 2, 5, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // USER SCANNER
    ctx.strokeStyle = varColor('--neon-blue');
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(user.x, user.y, user.size - 10, 0, Math.PI * 2); ctx.stroke();

    objects.forEach(obj => {
        ctx.fillStyle = obj.color;
        ctx.shadowBlur = 15; ctx.shadowColor = obj.color;
        ctx.font = "900 16px Orbitron";
        ctx.textAlign = "center";
        ctx.fillText(obj.text, obj.x, obj.y);
    });
}

function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

window.addEventListener('mousemove', e => { user.x = e.clientX; user.y = e.clientY; });
window.addEventListener('touchmove', e => { user.x = e.touches[0].clientX; user.y = e.touches[0].clientY; e.preventDefault(); }, {passive: false});

function startGame() {
    document.getElementById('overlay').style.display = 'none';
    active = true;
    setInterval(spawn, 900);
    loop();
}

function endGame(msg) {
    active = false;
    alert(msg + "\nFINAL WEALTH: $" + currentStats.money);
    location.reload();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
</script>
</body>
</html>
