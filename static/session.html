<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>KaMiZen - Sesión de 10 Minutos</title>
<style>
body { font-family: Arial; text-align:center; margin:0; padding:0; height:100vh; display:flex; justify-content:center; align-items:center; transition:background 1s; color:white; }
#content-box { width:90%; max-width:600px; padding:20px; border-radius:15px; background:#1e293b; }
button { padding:10px 20px; margin:5px; font-size:18px; cursor:pointer; border:none; border-radius:8px; }
</style>
</head>
<body>
<div id="content-box">
    <h1>KaMiZen</h1>
    <p id="block">Bienvenido a tu sesión de 10 minutos</p>
    <button id="start-btn">Iniciar Sesión</button>
    <button id="next-btn" style="display:none;">Siguiente</button>
    <button id="restart-btn" style="display:none;">Reiniciar Sesión</button>
</div>
<script src="scripts.js"></script>
</body>
</html>
