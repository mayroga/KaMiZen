<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | SURVIVAL PRO SYSTEM</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #001a33, #000);
    color: #fff;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow: hidden;
    cursor: crosshair;
}

/* TOP */
#topbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 15px;
    z-index: 100;
    background: rgba(0,0,0,0.3);
}

#game {
    padding-top: 80px;
    position: relative;
    z-index: 10;
}

button {
    padding: 14px 22px;
    margin: 10px;
    font-size: 16px;
    border: 2px solid #00f2ff;
    background: rgba(0, 242, 255, 0.1);
    color: white;
    border-radius: 12px;
    cursor: pointer;
}

button:hover {
    background: #00f2ff;
    color: #000;
}

.opt-btn {
    display: block;
    width: 80%;
    max-width: 520px;
    margin: 10px auto;
    text-align: left;
}

/* BREATH (NO BLOCK INPUTS) */
#breath {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle, #00f2ff, #0044ff);
    margin: 20px auto;
    display: none;
    transition: transform 4s ease-in-out;
    box-shadow: 0 0 30px #00f2ff;
    opacity: 0.35;
    pointer-events: none;
    position: relative;
    z-index: 1;
}

/* FLOATING WORDS */
.floating-word {
    position: absolute;
    padding: 10px 16px;
    border-radius: 18px;
    font-weight: bold;
    user-select: none;
    cursor: pointer;
    animation: floatUp 5s linear forwards;
    z-index: 50;
}

@keyframes floatUp {
    from { transform: translateY(110vh); }
    to { transform: translateY(-20vh); }
}

.blast {
    animation: burst 0.35s forwards;
}

@keyframes burst {
    to { transform: scale(3.5); opacity: 0; }
}

/* COLORS ONLY SIGNAL */
.good { border: 2px solid #00ff00; color:#00ff00; }
.bad { border: 2px solid #ff0000; color:#ff0000; }
.neutral { border: 2px solid #ffff00; color:#ffff00; }

/* TEXT */
#explanation-box {
    background: rgba(0,0,0,0.85);
    border-left: 5px solid #00f2ff;
    padding: 18px;
    margin: 20px auto;
    width: 80%;
    display: none;
}

#story { font-size: 1.4rem; margin: 20px; font-weight: bold; }
#analysis { color: #00f2ff; margin-bottom: 20px; }
</style>
</head>

<body>

<div id="topbar">
    <button onclick="toggleLang()">EN/ES</button>
    <div id="score-display">ENERGY: 0</div>
</div>

<div id="game">

    <h2 id="hero-name"></h2>

    <div id="breath"></div>

    <div id="story">Loading mission...</div>
    <div id="analysis"></div>

    <div id="explanation-box"></div>

    <div id="options"></div>
</div>

<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="ok" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

<script>

/* =====================================================
   🧠 ENGINE STATE
===================================================== */

let lang = "en";
let missionId = 1;
let score = 0;
let currentMission = null;
let busy = false;

/* =====================================================
   WORD SYSTEM (EXPANDED LOGIC)
===================================================== */

const WORDS = [
    { w:"SURVIVAL", v:15, impact:"positive" },
    { w:"INSTINCT", v:12, impact:"positive" },
    { w:"ESCAPE", v:15, impact:"positive" },
    { w:"AWARENESS", v:12, impact:"positive" },
    { w:"ALERT", v:10, impact:"positive" },
    { w:"SHIELD", v:10, impact:"positive" },

    { w:"PERCEPTION", v:14, impact:"positive" },
    { w:"VIGILANCE", v:13, impact:"positive" },
    { w:"LEADERSHIP", v:14, impact:"positive" },
    { w:"RESILIENCE", v:15, impact:"positive" },
    { w:"FOCUS-FIRE", v:14, impact:"positive" },

    { w:"THREAT", v:-15, impact:"negative" },
    { w:"FREEZE", v:-12, impact:"negative" },
    { w:"VICTIM", v:-20, impact:"negative" },
    { w:"PANIC", v:-15, impact:"negative" },
    { w:"DANGER", v:-10, impact:"negative" }
];

/* =====================================================
   COLOR (ONLY SIGNAL)
===================================================== */

function color(w){
    if(w.v < 0) return "red";
    if(w.v > 12) return "green";
    return "yellow";
}

/* =====================================================
   SPEECH (QUEUE SAFE)
===================================================== */

function speak(t){
    if(!t) return;
    let u = new SpeechSynthesisUtterance(t);
    u.lang = "en-US";
    u.rate = 0.9;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
}

/* =====================================================
   INIT
===================================================== */

function init(){
    document.getElementById("hero-name").innerText = "KAMIZEN USER";
    startFloating();
    loadMission();
}

/* =====================================================
   MISSION
===================================================== */

async function loadMission(){
    try{
        let r = await fetch("/api/mission/" + missionId);
        currentMission = await r.json();
        render(currentMission);
    }catch(e){}
}

function render(m){

    let story = m.blocks.find(b=>b.type==="story").text.en;
    let analysis = m.blocks.find(b=>b.type==="analysis").text.en;

    document.getElementById("story").innerText = story;
    document.getElementById("analysis").innerText = "";

    speak(story);

    setTimeout(()=>{
        document.getElementById("analysis").innerText = analysis;
        speak(analysis);
    },2000);

    setTimeout(()=>{
        showOptions(m.blocks.find(b=>b.type==="decision").options);
    },4000);
}

/* =====================================================
   OPTIONS
===================================================== */

function showOptions(opts){
    let c = document.getElementById("options");
    c.innerHTML="";

    opts.forEach(o=>{
        let b=document.createElement("button");
        b.className="opt-btn";
        b.innerText=o.text.en;
        b.onclick=()=>handle(o);
        c.appendChild(b);
    });
}

/* =====================================================
   DECISION (LOCK SAFE)
===================================================== */

function handle(opt){

    if(busy) return;
    busy = true;

    let box = document.getElementById("explanation-box");
    box.style.display="block";

    if(!opt.correct){
        box.innerText="Incorrect. Analyze and retry.";
        speak("Incorrect");
        busy = false;
        return;
    }

    box.innerText="Correct decision validated.";
    score += 20;

    document.getElementById("score-display").innerText="ENERGY: "+score;

    speak("Correct");

    setTimeout(()=>{
        missionId++;
        startSilence();
        busy = false;
    },1500);
}

/* =====================================================
   FLOATING WORDS (EXPLOSION + REAL VALUE IMPACT)
===================================================== */

function startFloating(){

    setInterval(()=>{

        let w = WORDS[Math.floor(Math.random()*WORDS.length)];

        let el=document.createElement("div");
        el.className="floating-word "+(w.v<0?"bad":w.v>12?"good":"neutral");
        el.innerText=w.w;
        el.style.left=Math.random()*90+"vw";

        el.onclick=()=>{

            if(busy) return;

            score += w.v;

            el.classList.add("blast");

            let msg = w.impact==="positive"
                ? `${w.w} improves real-life decision power.`
                : `${w.w} represents a risk pattern in life behavior.`;

            document.getElementById("analysis").innerText=msg;
            speak(msg);

            document.getElementById("score-display").innerText="ENERGY: "+score;

            setTimeout(()=>el.remove(),300);
        };

        document.body.appendChild(el);
        setTimeout(()=>el.remove(),5000);

    },900);
}

/* =====================================================
   SILENCE (QUEUE SAFE - NO INTERRUPTION)
===================================================== */

function startSilence(){

    if(busy) return;

    let t = Math.min(20 + missionId, 60);

    document.getElementById("story").innerText =
        "SILENCE CHALLENGE: " + t + " SECONDS";

    speak("Silence training started");

    let timer=setInterval(()=>{

        t--;

        if(t<=0){
            clearInterval(timer);
            missionId++;
            loadMission();
        }

    },1000);
}

/* ===================================================== */

window.onload=init;

</script>

</body>
</html>
