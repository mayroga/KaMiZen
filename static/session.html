<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | CORE SESSION</title>

<style>
:root{
  --bg:#000;
  --neon:#00f2ff;
  --good:#00ff88;
  --bad:#ff0044;
  --warn:#ffcc00;
  --panel:rgba(0,20,40,0.9);
}

body{
  margin:0;
  background:var(--bg);
  color:var(--neon);
  font-family:Arial;
  overflow:hidden;
}

/* ================= HEADER ================= */
#top{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 10px;
  font-size:12px;
}

/* ================= SEMAPHORE ================= */
#semaphore{
  display:flex;
  gap:6px;
}

.light{
  width:12px;
  height:12px;
  border-radius:50%;
  background:#333;
}

.good{ background:var(--good); }
.warn{ background:var(--warn); }
.bad{ background:var(--bad); }

/* ================= CORE ================= */
#core{
  position:absolute;
  top:35%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:18px;
  text-align:center;
  width:80%;
}

/* ================= MESSAGE ================= */
#message{
  position:absolute;
  bottom:180px;
  left:50%;
  transform:translateX(-50%);
  width:85%;
  min-height:100px;
  background:var(--panel);
  border:1px solid var(--neon);
  padding:15px;
  text-align:center;
}

/* ================= OPTIONS ================= */
#options{
  position:absolute;
  bottom:70px;
  width:85%;
  left:50%;
  transform:translateX(-50%);
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  padding:12px;
  background:transparent;
  border:1px solid var(--neon);
  color:var(--neon);
  cursor:pointer;
}

button:hover{
  background:var(--neon);
  color:#000;
}

/* ================= STATUS ================= */
#status{
  position:absolute;
  top:50px;
  width:100%;
  text-align:center;
  font-size:12px;
  opacity:0.8;
}

/* ================= BREATH VISUAL ================= */
#breath{
  position:absolute;
  top:20%;
  left:50%;
  transform:translate(-50%,-50%);
  width:60px;
  height:60px;
  border-radius:50%;
  background:rgba(0,242,255,0.15);
  transition:1.5s ease;
}
</style>
</head>

<body>

<div id="top">
  <div id="semaphore">
    <div class="light" id="green"></div>
    <div class="light" id="yellow"></div>
    <div class="light" id="red"></div>
  </div>

  <div>
    <button onclick="restart()">RESET</button>
  </div>
</div>

<div id="status">READY</div>

<div id="breath"></div>

<div id="core"></div>

<div id="message" onclick="start()">TOUCH TO START</div>

<div id="options"></div>

<script>

let session_id = null;
let lang = "en";
let loading = false;

/* ================= AUDIO (EVENT ONLY) ================= */
const audio = new (window.AudioContext || window.webkitAudioContext)();

function sound(type){
  const o = audio.createOscillator();
  const g = audio.createGain();

  o.connect(g);
  g.connect(audio.destination);

  if(type==="ok") o.frequency.value=520;
  if(type==="fail") o.frequency.value=140;
  if(type==="click") o.frequency.value=300;

  g.gain.value = 0.15;
  o.start();
  o.stop(audio.currentTime + 0.2);
}

/* ================= SEMAPHORE ================= */
function setLight(state){
  document.getElementById("green").classList.remove("good");
  document.getElementById("yellow").classList.remove("warn");
  document.getElementById("red").classList.remove("bad");

  if(state==="good") document.getElementById("green").classList.add("good");
  if(state==="warn") document.getElementById("yellow").classList.add("warn");
  if(state==="bad") document.getElementById("red").classList.add("bad");
}

/* ================= START ================= */
async function start(){

  if(audio.state==="suspended") await audio.resume();

  sound("click");

  const r = await fetch("/start",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({})
  });

  const d = await r.json();

  session_id = d.session_id;

  render(d);
}

/* ================= SEND ================= */
async function send(code){

  if(loading) return;
  loading = true;

  sound("click");

  const r = await fetch("/judge",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      session_id,
      decision:code
    })
  });

  const d = await r.json();

  render(d);

  loading = false;
}

/* ================= SAFE TEXT ================= */
function getText(obj){
  if(!obj) return "...";
  return obj.en || obj.es || "...";
}

/* ================= RENDER ================= */
function render(data){

  if(!data) return;

  const story = data.story;

  if(!story){
    document.getElementById("message").innerText = "LOADING...";
    return;
  }

  document.getElementById("message").innerText =
    getText(story.text);

  document.getElementById("options").innerHTML = "";

  /* ================= SEMAPHORE LOGIC ================= */
  setLight("good");

  if(data.metrics){
    if(data.metrics.stress > 70) setLight("bad");
    else if(data.metrics.attention < 40) setLight("warn");
    else setLight("good");
  }

  /* ================= BREATH ================= */
  if(story.type === "breathing"){
    breathe();
  } else {
    stopBreath();
  }

  /* ================= OPTIONS ================= */
  let opts = story.options || [];

  if(opts.length === 0){
    opts = [{
      code:"CONTINUE",
      text:{en:"CONTINUE",es:"CONTINUAR"}
    }];
  }

  opts.forEach(o=>{
    const b = document.createElement("button");
    b.innerText = getText(o.text);
    b.onclick = ()=>send(o.code);
    document.getElementById("options").appendChild(b);
  });

  /* ================= STATUS ================= */
  document.getElementById("status").innerText =
    data.coach || "ACTIVE";

  sound("ok");
}

/* ================= BREATH CONTROL ================= */
let breathInterval;

function breathe(){
  const b = document.getElementById("breath");

  clearInterval(breathInterval);

  let grow = true;

  breathInterval = setInterval(()=>{
    b.style.transform = grow
      ? "translate(-50%,-50%) scale(2)"
      : "translate(-50%,-50%) scale(1)";

    b.style.opacity = grow ? 0.7 : 0.3;
    grow = !grow;

  },1500);
}

function stopBreath(){
  clearInterval(breathInterval);
}

/* ================= RESET ================= */
function restart(){
  sound("fail");
  location.reload();
}

/* ================= AUTO SAFE LOOP ================= */
setInterval(()=>{
  const b = document.getElementById("breath");
  b.style.opacity = 0.3 + Math.random()*0.3;
},3000);

</script>

</body>
</html>
