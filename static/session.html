<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO - KAMIZEN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #00d4ff; --gold: #ffd700; --success: #2ecc71; }
        
        body { 
            margin: 0; 
            background: #000; /* Fondo Negro por defecto */
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
            transition: background 3s ease;
        }

        /* Paisajes que no tapan las letras */
        .landscape-forest { background: linear-gradient(to bottom, #000000, #1a2a6c, #000000); }
        .landscape-city { background: linear-gradient(to bottom, #000000, #203a43, #000000); }
        .landscape-zen { background: linear-gradient(to bottom, #000000, #134e5e, #000000); }

        #master-clock { 
            position: absolute; top: 10px; width: 100%; text-align: center; 
            font-size: 5rem; font-weight: 900; color: var(--primary); 
            z-index: 100; text-shadow: 0 0 20px rgba(0,212,255,0.5);
        }

        #hud-vertical { position: absolute; bottom: 40px; left: 30px; display: flex; gap: 15px; z-index: 100; }
        .bar-v-container { width: 15px; height: 150px; background: rgba(255,255,255,0.1); border: 1px solid white; border-radius: 10px; position: relative; overflow: hidden; }
        .fill-v { position: absolute; bottom: 0; width: 100%; transition: height 0.5s; }

        #center-stage { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; }
        
        /* Palabras Flotantes */
        .word-box { 
            position: absolute; padding: 12px 25px; border: 2px solid white; border-radius: 30px;
            background: rgba(0,0,0,0.9); font-weight: bold; cursor: pointer; z-index: 50;
            animation: fallDown 8s linear forwards; font-size: 1.1rem; color: white;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        @keyframes fallDown {
            from { top: -50px; transform: scale(1); }
            to { top: 110vh; transform: scale(1.1); }
        }

        .explode { 
            transform: scale(4) !important; 
            opacity: 0 !important; 
            transition: 0.3s ease-out;
            pointer-events: none;
        }

        #story-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 1000; padding: 40px; text-align: center; 
        }

        #login-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        input { padding: 15px; background: #111; border: 2px solid var(--primary); color: white; font-size: 1.5rem; text-align: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color:var(--primary)">AL CIELO</h1>
        <input type="text" id="user-name" placeholder="Tu Nombre">
        <button onclick="initApp()" style="margin-top:20px; padding:15px 40px; background:var(--primary); border:none; cursor:pointer; font-weight:bold;">ENTRAR</button>
    </div>

    <div id="master-clock">15:00</div>

    <div id="hud-vertical">
        <div class="bar-v-container"><div id="bar-stability" class="fill-v" style="height:50%; background:var(--primary);"></div></div>
        <div class="bar-v-container"><div id="bar-energy" class="fill-v" style="height:70%; background:var(--success);"></div></div>
    </div>

    <div id="center-stage">
        <div id="avatar-name" style="color:var(--gold); font-weight:900; margin-bottom:10px;">RECRUIT</div>
        <svg width="80" height="120" viewBox="0 0 100 150">
            <circle cx="50" cy="30" r="20" stroke="white" stroke-width="4" fill="none"/>
            <path d="M50 50 L50 110 M50 70 L20 50 M50 70 L80 50 M50 110 L25 145 M50 110 L75 145" stroke="white" stroke-width="4"/>
        </svg>
    </div>

    <div id="story-overlay">
        <h1 id="story-title" style="color:var(--gold)"></h1>
        <p id="story-text" style="font-size:1.5rem; max-width:800px;"></p>
        <button onclick="closeStory()" style="padding:15px 40px; background:var(--success); color:white; border:none; cursor:pointer; font-weight:bold;">ENTENDIDO</button>
    </div>

    <script src="/static/js/engine.js"></script>
</body>
</html>
