<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KaMiZen - Sesión de Bienestar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Inter', sans-serif;
    background-color: #f3f4f6;
    margin: 0;
    padding: 0;
}
.container {
    max-width: 700px;
    margin: 30px auto;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
h1 {
    text-align: center;
    color: #1e1b4b;
}
textarea {
    width: 100%;
    height: 100px;
    margin-top: 10px;
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    resize: none;
}
button {
    padding: 12px 22px;
    margin: 10px 5px 0 0;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s ease;
}
#btnSiguiente {
    background-color: #3b82f6;
    color: white;
}
#btnSiguiente:hover {
    background-color: #2563eb;
}
#btnRegresar {
    background-color: #f59e0b;
    color: white;
}
#btnRegresar:hover {
    background-color: #d97706;
}
#btnBorrar {
    background-color: #ef4444;
    color: white;
}
#btnBorrar:hover {
    background-color: #b91c1c;
}
.session-text {
    margin-bottom: 15px;
    font-size: 18px;
    line-height: 1.5;
}
</style>
</head>
<body>
<div class="container">
    <h1>KaMiZen</h1>
    <div id="sessionContent">
        <!-- Contenido dinámico -->
    </div>

    <textarea id="userInput" placeholder="Escribe aquí si deseas..." ></textarea>

    <div>
        <button id="btnRegresar">Regresar</button>
        <button id="btnBorrar">Borrar</button>
        <button id="btnSiguiente">Siguiente</button>
    </div>
</div>

<script src="scripts.js"></script>
</body>
</html>
