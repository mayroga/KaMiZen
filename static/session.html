<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAMIZEN SESSION CORE</title>

<style>
body{
margin:0;
background:#050508;
color:white;
font-family:Orbitron, sans-serif;
overflow:hidden;
}

.hidden{display:none !important;}

.full{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:radial-gradient(circle,#111,#000);
z-index:10;
padding:20px;
}

button{
padding:18px 40px;
margin-top:20px;
border:none;
background:#00e5ff;
font-weight:900;
cursor:pointer;
}

#hud{
position:fixed;
top:10px;
width:100%;
display:flex;
justify-content:space-around;
z-index:20;
pointer-events:none;
}

.box{
background:black;
border:1px solid #00e5ff;
padding:10px;
min-width:100px;
text-align:center;
}

#breath-circle{
width:220px;
height:220px;
border-radius:50%;
border:6px solid #00e5ff;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:900;
transition:transform 2s ease;
}
</style>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>

<body>

<!-- HUD -->
<div id="hud">
<div class="box">XP <div id="hud-xp">0</div></div>
<div class="box">MISSION <div id="hud-mission">0/35</div></div>
<div class="box">STATE <div id="hud-state">READY</div></div>
</div>

<!-- LOADING -->
<div id="loading-screen" class="full">
<h1>LOADING SYSTEM</h1>
<p>Preparing neural missions...</p>
</div>

<!-- START -->
<div id="start-screen" class="full hidden">
<h1>KAMIZEN SYSTEM</h1>
<p>TRAINING CORE ACTIVE</p>
<button id="start-btn">START TRAINING</button>
</div>

<!-- STORY -->
<div id="story-screen" class="full hidden">
<h2 id="story-id"></h2>
<p id="story-text"></p>
<button id="story-btn" class="hidden">CONTINUE</button>
</div>

<!-- MISSION -->
<div id="mission-screen" class="full hidden">
<h2 id="mission-category"></h2>
<p id="mission-main"></p>

<div id="answers"></div>

<p id="mission-info"></p>

<button id="continue-btn" class="hidden">CONTINUE</button>
</div>

<!-- BREATHING (CORREGIDO Y SIMPLE) -->
<div id="breathing-screen" class="full hidden">
<div id="breath-circle">FOCUS</div>
<p id="breath-text">INHALE</p>
<p id="breath-info"></p>
</div>

<!-- GAME -->
<div id="game-screen" class="full hidden">
<canvas id="gameCanvas"></canvas>
</div>

<script src="/static/js/engine.js"></script>

</body>
</html>
