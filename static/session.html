<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KaMiZen</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}

body{
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
transition:background 1s;
}

#app{
width:95%;
max-width:420px;
background:#111827;
border-radius:25px;
padding:25px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
display:flex;
flex-direction:column;
align-items:center;
position:relative;
z-index:2;
}

#logo{
font-size:32px;
font-weight:600;
margin-bottom:4px;
background:linear-gradient(90deg,#60a5fa,#a78bfa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

#lang-btn{
position:absolute;
top:15px;
right:15px;
padding:6px 10px;
border-radius:8px;
border:1px solid #60a5fa;
background:transparent;
color:white;
cursor:pointer;
font-size:12px;
}

#mental-panel{
width:100%;
background:#020617;
padding:12px;
border-radius:12px;
margin-bottom:15px;
font-size:14px;
}

.bar{height:8px;background:#1e293b;border-radius:10px;}
.bar-fill{height:8px;background:#22c55e;border-radius:10px;width:40%;}

#block{
font-size:22px;
text-align:center;
margin:20px 0;
min-height:180px;
}

button{
padding:14px;
margin:6px;
border:none;
border-radius:14px;
cursor:pointer;
background:#2563eb;
color:white;
width:100%;
}

button:hover{transform:scale(1.03);}
.secondary{background:#374151;}

/* 🔵 RESTORED BREATH CIRCLE */
.breath-circle{
width:100px;
height:100px;
border-radius:50%;
background:radial-gradient(circle,#60a5fa,#2563eb);
margin:20px auto;
transition:transform 2s ease-in-out;
box-shadow:0 0 40px #2563eb;
}

#bg-layer{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:0;
pointer-events:none;
opacity:0.35;
}
</style>
</head>

<body>

<div id="bg-layer"></div>

<div id="app">

<button id="lang-btn">ES</button>

<div id="logo">KaMiZen</div>

<div id="mental-panel">
<div id="streak">🔥 Streak: 0</div>
<div id="level">Level: 1</div>
</div>

<div id="block">Welcome to KaMiZen</div>

<button id="start-btn">Start Session</button>
<button id="next-btn" style="display:none;">Next</button>
<button id="back-btn">Back</button>
<button id="forward-btn">Forward</button>
<button id="restart-btn" class="secondary" style="display:none;">Restart</button>

</div>

<script src="/static/scripts.js"></script>

</body>
</html>
