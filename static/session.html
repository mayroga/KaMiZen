<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAMIZEN | AL CIELO PRO</title>

<style>
:root {
    --blue:#00f2ff;
    --green:#39ff14;
    --red:#ff3131;
    --gold:#ffdf00;
}

body{
    margin:0;
    background:radial-gradient(circle,#001a33,#000);
    color:#fff;
    font-family:Segoe UI,Arial;
    overflow:hidden;
    user-select:none;
}

/* ================= TOPBAR ================= */
#topbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:rgba(0,0,0,.7);
    border-bottom:2px solid var(--blue);
    z-index:1000;
}

#score-display{
    font-size:1.8rem;
    color:var(--blue);
    font-weight:900;
}

#timer{
    font-size:2.5rem; /* BIG IMPORTANT */
    font-weight:900;
    color:#fff;
}

/* ================= GAME ================= */
#game{
    position:absolute;
    top:70px;
    bottom:120px;
    width:100%;
    overflow:hidden;
}

/* FLOATING WORDS */
.floating{
    position:absolute;
    padding:10px 20px;
    border-radius:40px;
    font-weight:900;
    cursor:pointer;
    animation:floatUp 5s linear forwards;
}

.word-good{border:2px solid var(--green);color:var(--green);}
.word-bad{border:2px solid var(--red);color:var(--red);}
.word-neutral{border:2px solid var(--gold);color:var(--gold);}

@keyframes floatUp{
    from{transform:translateY(110vh);}
    to{transform:translateY(-20vh);}
}

/* ================= LEARNING ================= */
#learning{
    display:none;
    position:absolute;
    top:80px;
    width:100%;
    text-align:center;
}

#story,#analysis{
    font-size:1.5rem;
    margin:10px auto;
    max-width:800px;
}

/* BREATH CIRCLE AUTO */
#breath{
    width:140px;
    height:140px;
    margin:20px auto;
    border-radius:50%;
    background:radial-gradient(circle,#00f2ff,#0033ff);
    animation:breathe 6s infinite;
}

@keyframes breathe{
    0%,100%{transform:scale(.8);}
    50%{transform:scale(1.3);}
}

/* ================= CONTROLS ================= */
#controls{
    position:fixed;
    bottom:15px;
    width:100%;
    text-align:center;
}

button{
    padding:12px 18px;
    margin:5px;
    border:2px solid var(--blue);
    background:rgba(0,242,255,.1);
    color:#fff;
    border-radius:10px;
}

/* ================= EXPLANATION ================= */
#explain{
    position:absolute;
    bottom:140px;
    width:100%;
    text-align:center;
    font-size:1.3rem;
    color:var(--gold);
}
</style>
</head>

<body>

<div id="topbar">
    <div id="score-display">POINTS: 0</div>
    <div id="timer">00:00</div>
</div>

<div id="game"></div>

<div id="learning">
    <div id="story"></div>
    <div id="analysis"></div>
    <div id="breath"></div>
</div>

<div id="explain"></div>

<div id="controls">
    <button onclick="startGame()">START</button>
    <button onclick="toggleLang()">ESP/ENG</button>
    <button onclick="location.reload()">RESET</button>
</div>

<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="win" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

<script>

let score=0;
let timer=0;
let interval;
let wordInterval;
let lang="en";

/* ================= WORD ENGINE (WITH DECEPTION) ================= */
const words={
    good:["FOCUS","POWER","TRUTH","CONTROL","DISCIPLINE"],
    bad:["FEAR","LIE","LAZY","ANGER","CHAOS"],
    neutral:["CITY","WALK","WAIT","WATCH"]
};

function startGame(){
    runPhase(300);
}

/* ================= PHASE ================= */
function runPhase(time){
    spawnWords();
    runTimer(time,()=>{
        stopWords();
        startLearning();
    });
}

/* ================= WORD SPAWN (DECEPTION SYSTEM) ================= */
function spawnWords(){
    wordInterval=setInterval(()=>{

        const type=Math.random()>0.65?"bad":(Math.random()>0.4?"good":"neutral");
        const word=words[type][Math.floor(Math.random()*words[type].length)];

        const el=document.createElement("div");
        el.className="floating word-"+type;
        el.innerText=word;
        el.style.left=Math.random()*90+"vw";

        /* 🎭 DECEPTION SYSTEM */
        const fakeColor=Math.random()>0.7;

        if(fakeColor){
            el.style.borderColor=
                type==="good"?"red":
                type==="bad"?"green":"yellow";
        }

        el.onclick=()=>{

            if(type==="good"){ score+=10; play("win"); }
            if(type==="bad"){ score-=15; play("bad"); }
            if(type==="neutral"){ score+=5; }

            explain(word,type);
            updateScore();
            el.remove();
        };

        document.getElementById("game").appendChild(el);
        setTimeout(()=>el.remove(),5000);

    },900);
}

/* ================= LEARNING PHASE ================= */
function startLearning(){
    document.getElementById("learning").style.display="block";

    speak("Learning phase started. Observe carefully.");

    document.getElementById("story").innerText =
    lang==="en"
    ?"You must learn that not everything you see is true."
    :"No todo lo que ves es verdad.";

    document.getElementById("analysis").innerText =
    lang==="en"
    ?"Colors can lie. Meaning is deeper."
    :"Los colores pueden mentir. El significado es más profundo.";

    autoBreath();
}

/* ================= BREATH AUTO ================= */
function autoBreath(){
    let breath=document.getElementById("breath");
    let t=360;

    let i=setInterval(()=>{
        t--;
        if(t<=0){clearInterval(i);runPhase(600);}
    },1000);
}

/* ================= TIMER ================= */
function runTimer(s,cb){
    timer=s;
    updateTimer();

    interval=setInterval(()=>{
        timer--;
        updateTimer();
        if(timer<=0){
            clearInterval(interval);
            cb();
        }
    },1000);
}

function updateTimer(){
    let m=Math.floor(timer/60).toString().padStart(2,'0');
    let s=(timer%60).toString().padStart(2,'0');
    document.getElementById("timer").innerText=m+":"+s;
}

/* ================= UI ================= */
function updateScore(){
    document.getElementById("score-display").innerText="POINTS: "+score;
}

/* ================= AUDIO ================= */
function play(id){
    let a=document.getElementById(id);
    if(a){a.currentTime=0;a.play();}
}

/* ================= SPEECH ================= */
function speak(text){
    let u=new SpeechSynthesisUtterance(text);
    u.lang=lang==="en"?"en-US":"es-ES";
    u.rate=0.9;
    speechSynthesis.speak(u);
}

/* ================= EXPLANATION ================= */
function explain(word,type){
    document.getElementById("explain").innerText =
    lang==="en"
    ? `${word} = ${type.toUpperCase()} → learn the pattern, not the color`
    : `${word} = ${type.toUpperCase()} → aprende el patrón, no el color`;
}

/* ================= STOP ================= */
function stopWords(){
    clearInterval(wordInterval);
    document.querySelectorAll(".floating").forEach(e=>e.remove());
}

/* ================= LANG ================= */
function toggleLang(){
    lang=lang==="en"?"es":"en";
}

window.onload=()=>{
    document.getElementById("bg").play().catch(()=>{});
};

</script>

</body>
</html>
