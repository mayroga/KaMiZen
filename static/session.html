<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN LOOP PRO</title>

<style>
body{
    margin:0;
    background:radial-gradient(circle,#001a33,#000);
    color:#fff;
    font-family:'Segoe UI',Arial;
    text-align:center;
    overflow:hidden;
    cursor:crosshair;
}

/* TOP */
#top-ui{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    padding:15px;
    color:#00f2ff;
    font-weight:bold;
}

#timer{ margin-top:70px; font-size:1.4rem; color:#00f2ff; }

/* BUTTONS */
#menu{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* FLOATING */
.floating{
    position:absolute;
    padding:8px 18px;
    border-radius:20px;
    font-weight:bold;
    animation:floatUp 5s linear forwards;
}
.word-good{color:#0f0;border:2px solid #0f0;}
.word-bad{color:#f00;border:2px solid #f00;}
.word-neutral{color:#ff0;border:2px solid #ff0;}

@keyframes floatUp{
    from{transform:translateY(110vh);}
    to{transform:translateY(-20vh);}
}

/* 💥 EXPLOSIÓN */
.blast{ 
    animation: burst 0.4s forwards; 
    pointer-events: none; 
}

@keyframes burst{ 
    to{ transform: scale(4); opacity: 0; } 
}

/* LEARNING */
#learning{display:none;margin-top:120px}
</style>
</head>

<body>

<div id="top-ui">
    <div>FOCUS: 100%</div>
    <div id="score">PUNTOS: 0</div>
    <div>ENERGY: ⚡⚡⚡</div>
</div>

<div id="timer">00:00</div>

<div id="menu">
    <button onclick="start()">START</button>
    <button onclick="start()">CONTINUE</button>
    <button onclick="reset()">BACK</button>
</div>

<div id="learning">
    <h2 id="lvl"></h2>
    <p id="mission"></p>
</div>

<!-- 🔊 AUDIO COMPLETO ACTUALIZADO -->
<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="win" src="/static/sounds/trumpet.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

<!-- NUEVOS (SIN QUITAR NADA) -->
<audio id="ok" src="/static/sounds/explosion.mp3"></audio>
<audio id="key" src="/static/sounds/keypress.mp3"></audio>

<script>
// ================= STATE =================
let score=0;
let level=1;
let phase="menu";
let timer,spawn;
let allowInput=true;

// durations
const GAME_1=300;
const LEARN=360;

// ================= WORDS =================
const words={
    good:["WILL","VISION","HONOR","COURAGE","BUILD","RISE",
            "FAITH","DISCIPLINE","STRENGTH","VICTORY"],

    bad:["NOISE","EXCUSE","QUITTING","EGO","HATE","CHAOS",
            "LAZY","FEAR","LIE","ANGER"],

    neutral:["CALM","LISTEN","WAIT","PEACE","PRAY","INSIDE",
            "BREATHE","STILL","SOUL","FOCUS"]
};

// ================= 🧠 MEANINGS (AGREGADO EXACTO) =================
const meanings = {
    WILL: "Decidir hacer algo aunque sea difícil.",
    VISION: "Pensar en tu futuro antes de actuar.",
    HONOR: "Hacer lo correcto incluso cuando nadie mira.",
    COURAGE: "Actuar aunque tengas miedo.",
    BUILD: "Crear algo mejor con esfuerzo.",
    RISE: "Levantarte después de fallar.",
    FAITH: "Creer en ti cuando todo parece difícil.",
    DISCIPLINE: "Hacer lo que debes sin excusas.",
    STRENGTH: "Controlarte a ti mismo.",
    VICTORY: "Ganar después de resistir.",

    CALM: "Mantenerte tranquilo en presión.",
    LISTEN: "Escuchar antes de reaccionar.",
    WAIT: "No actuar impulsivamente.",
    PEACE: "Tener control interno.",
    PRAY: "Reflexionar y conectar contigo.",
    INSIDE: "Pensar antes de actuar.",
    BREATHE: "Controlar tu cuerpo.",
    STILL: "Quedarte quieto para pensar.",
    SOUL: "Tu parte más profunda.",
    FOCUS: "Concentrarte sin distracciones",

    NOISE: "Distracción que te debilita.",
    EXCUSE: "Mentira para no crecer.",
    QUITTING: "Rendirse antes de lograrlo.",
    EGO: "Creerte más sin demostrarlo.",
    HATE: "Energía que destruye.",
    CHAOS: "Falta de control.",
    LAZY: "Evitar el esfuerzo.",
    FEAR: "Miedo que te detiene.",
    LIE: "Falsedad que te daña.",
    ANGER: "Reacción sin control"
};

// ================= INIT =================
function start(){
    document.getElementById("menu").style.display="none";
    playMusic(); 
    runPhase("game1", GAME_1);
}

// ================= PHASES =================
function runPhase(type,time){
    clearAll();
    phase=type;

    if(type.includes("game")){
        allowInput=true;
        spawnWords();
        hideLearning();
    }

    if(type==="learn"){
        allowInput=false;
        showLearning();
    }

    startTimer(time,()=>{
        if(type==="game1"){
            runPhase("learn",LEARN);
        }
        else if(type==="learn"){
            const next = score>50?600:180;
            runPhase("game2",next);
        }
        else{
            runPhase("learn",LEARN);
        }
    });
}

// ================= TIMER =================
function startTimer(t,cb){
    updateTimer(t);
    timer=setInterval(()=>{
        t--;
        updateTimer(t);
        if(t<=0){clearInterval(timer);cb();}
    },1000);
}

function updateTimer(t){
    let m=Math.floor(t/60).toString().padStart(2,"0");
    let s=(t%60).toString().padStart(2,"0");
    document.getElementById("timer").innerText=`${m}:${s}`;
}

// ================= FLOATING =================
function spawnWords(){
    spawn=setInterval(()=>{
        if(!allowInput)return;

        const type=randomType();
        const word=randomWord(type);

        const el=document.createElement("div");
        el.className=`floating word-${type}`;
        el.innerText=word;
        el.style.left=Math.random()*90+"vw";

        el.onmousedown = () => {
            el.classList.add("blast");

            if (type === "good") { 
                score += 5; 
                document.getElementById("ok").play(); 
            }

            if (type === "bad") { 
                score -= 10; 
                document.getElementById("bad").play(); 
            }

            if (type === "neutral") { }

            document.getElementById("score").innerText = `PUNTOS: ${score}`;

            setTimeout(() => el.remove(), 400);
        };

        document.body.appendChild(el);
        setTimeout(()=>el.remove(),5000);

    },1500);
}

function randomType(){
    let r=Math.random();
    if(r>0.7)return"bad";
    if(r>0.4)return"good";
    return"neutral";
}

function randomWord(t){
    return words[t][Math.floor(Math.random()*words[t].length)];
}

// ================= LEARNING =================
function showLearning(){
    document.getElementById("learning").style.display="block";

    level = Math.floor(score/50)+1;

    document.getElementById("lvl").innerText="LEVEL "+level;

    const missions=[
        "Respira sin tocar la pantalla.",
        "Controla tu impulso.",
        "Concéntrate sin distracciones.",
        "Domina tu mente."
    ];

    document.getElementById("mission").innerText=
        missions[Math.floor(Math.random()*missions.length)];

    document.body.onclick=()=>{
        if(!allowInput){
            score-=20;
            play("bad");
            updateScore();
        }
    };
}

function hideLearning(){
    document.getElementById("learning").style.display="none";
}

// ================= SCORE =================
function updateScore(){
    document.getElementById("score").innerText="PUNTOS: "+score;
}

function saveScore(){
    let history=JSON.parse(localStorage.getItem("scores")||"[]");
    history.push(score);
    if(history.length>3)history.shift();
    localStorage.setItem("scores",JSON.stringify(history));
}

// ================= AUDIO =================
function playMusic(){
    let bg=document.getElementById("bg");
    bg.volume=.3;
    bg.playbackRate=1.1;
    bg.play().catch(()=>{});
}

function play(id){
    document.getElementById(id).play();
}

// ================= CONTROL =================
function clearAll(){
    clearInterval(timer);
    clearInterval(spawn);
}

function reset(){
    saveScore();
    location.reload();
}
</script>

</body>
</html>
