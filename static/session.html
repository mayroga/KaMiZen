<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AL CIELO - KaMiZen Elite</title>
    <style>
        :root { --neon-green: #10b981; --dark-bg: #020617; --accent-blue: #2563eb; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--dark-bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: 1s; }
        
        #banner { width: 100%; background: #111; padding: 8px 0; border-bottom: 2px solid var(--neon-green); }
        .track { display: inline-block; animation: scroll 25s linear infinite; font-weight: 900; font-size: 10px; color: var(--neon-green); text-transform: uppercase; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        #app { flex: 1; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 450px; margin: 0 auto; padding: 15px; }
        #main-card { width: 100%; background: #000; border-radius: 30px; padding: 25px; border: 1px solid #1e293b; box-shadow: 0 0 30px rgba(16, 185, 129, 0.2); flex: 1; display: flex; flex-direction: column; }

        #logo { font-size: 32px; font-weight: 900; text-align: center; background: linear-gradient(90deg, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        
        /* Panel de Disciplina */
        #mental-panel { background: #0a0a0a; padding: 15px; border-radius: 20px; margin: 20px 0; border: 1px solid #222; }
        .stat-row { margin-bottom: 12px; }
        .label-group { display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .bar { height: 8px; background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        .bar-fill { height: 100%; width: 0%; transition: width 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 10px var(--neon-green); }

        #block { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #block h3 { color: var(--neon-green); font-size: 26px; margin-bottom: 15px; text-transform: uppercase; }
        #block p { font-size: 18px; line-height: 1.4; color: #cbd5e1; }

        .option-btn { width: 100%; background: #111; color: white; border: 1px solid #333; padding: 16px; border-radius: 12px; margin-bottom: 10px; text-align: left; font-size: 15px; cursor: pointer; transition: 0.3s; }
        .option-btn:hover { border-color: var(--neon-green); background: #052e16; }

        button#next-btn { background: var(--neon-green); color: black; font-weight: 900; display: none; width: 100%; padding: 18px; border-radius: 15px; border: none; font-size: 16px; cursor: pointer; }
        button#start-btn { background: var(--accent-blue); color: white; width: 100%; padding: 18px; border-radius: 15px; border: none; font-size: 16px; font-weight: 800; cursor: pointer; }
        #skip-btn { margin-top: 10px; background: transparent; color: #ef4444; border: none; font-size: 12px; cursor: pointer; display: none; }
        
        .feedback-correct { color: #10b981 !important; font-weight: bold; }
        .feedback-wrong { color: #ef4444 !important; font-weight: bold; }
    </style>
</head>
<body>
    <div id="banner"><div class="track"><span> • DISCIPLINA • CALIDAD • CALMA • AL CIELO • AURA BY MAY ROGA • </span><span> • DISCIPLINA • CALIDAD • CALMA • AL CIELO • AURA BY MAY ROGA • </span></div></div>
    <div id="app">
        <div id="main-card">
            <div id="logo" title="Doble clic para Admin">KaMiZen</div>
            
            <div id="mental-panel">
                <div class="stat-row">
                    <div class="label-group"><span>Disciplina</span><span id="val-disp">0%</span></div>
                    <div class="bar"><div id="disciplina-bar" class="bar-fill" style="background: #10b981;"></div></div>
                </div>
                <div class="stat-row">
                    <div class="label-group"><span>Calidad</span><span id="val-clar">0%</span></div>
                    <div class="bar"><div id="claridad-bar" class="bar-fill" style="background: #3b82f6;"></div></div>
                </div>
                <div class="stat-row">
                    <div class="label-group"><span>Calma</span><span id="val-calm">0%</span></div>
                    <div class="bar"><div id="calma-bar" class="bar-fill" style="background: #a78bfa;"></div></div>
                </div>
            </div>

            <div id="block"><p>Presiona INICIAR para tu asesoría de alto peso.</p></div>

            <div style="margin-top: auto;">
                <button id="start-btn">INICIAR SESIÓN</button>
                <button id="next-btn">CONTINUAR</button>
                <center><button id="skip-btn">SALTAR BLOQUE (-30 DISCIPLINA)</button></center>
            </div>
        </div>
        <div style="font-size: 9px; opacity: 0.5; margin-top: 10px;">AURA BY MAY ROGA LLC</div>
    </div>
    <script src="/static/scripts.js"></script>
</body>
</html>
