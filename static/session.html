<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO: TOTAL LIFE TRAINING</title>

<style>
:root {
    --neon-blue:#00f2ff; --neon-green:#00ff41; --neon-red:#ff003c;
    --neon-yellow:#ffff00; --matrix-bg:#00050a; --neon-gold:#ffcc00;
}
body {
    margin:0; background:var(--matrix-bg); color:#fff;
    font-family:'Courier New', monospace; overflow:hidden;
    user-select:none; transition:0.3s;
}

/* HUD */
#security-alert {
    position:fixed; top:0; left:0; width:100%; height:8px;
    background:var(--neon-green); z-index:1000;
}

#lang-btn {
    position:fixed; bottom:20px; right:20px; top:auto;
    z-index:999; padding:10px 18px;
    border:2px solid var(--neon-blue);
    background:rgba(0,0,0,0.8);
    color:var(--neon-blue);
    cursor:pointer;
    border-radius:6px;
}

#hud {
    position:fixed; top:20px; width:100%;
    display:flex; justify-content:space-between;
    padding:20px; z-index:50;
}

#timer-box {
    font-size:2.5rem;
    color:var(--neon-blue);
}

/* STATS */
#life-stats {
    position:fixed; bottom:20px; left:20px;
    display:flex; flex-wrap:wrap; gap:10px;
}

.stat-pill {
    background:rgba(0,0,0,0.8);
    padding:10px 14px;
    border:1px solid #333;
    border-radius:6px;
}

/* WORDS */
.floating {
    position:absolute;
    padding:12px 24px;
    border-radius:10px;
    font-weight:bold;
    animation:floatUp linear forwards;
}

.word-power { border:2px solid var(--neon-green); color:var(--neon-green); }
.word-risk { border:2px solid var(--neon-red); color:var(--neon-red); }
.word-silence { border:2px solid var(--neon-yellow); color:var(--neon-yellow); }

@keyframes floatUp {
    from { transform:translateY(110vh); }
    to { transform:translateY(-20vh); }
}

/* OVERLAY */
#overlay {
    position:fixed;
    width:100%; height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,0.95);
    z-index:500;
}

/* BREATH */
#breath-circle {
    width:220px;
    height:220px;
    border-radius:50%;
    border:6px solid var(--neon-blue);
    display:none;
    justify-content:center;
    align-items:center;
    transition:2s;
}

.inhale { transform:scale(1.3); }
.exhale { transform:scale(0.8); }

/* QUESTION */
#decision-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:20px;
    width:80%;
}

.choice-btn {
    padding:18px;
    border:2px solid var(--neon-blue);
    background:none;
    color:#fff;
    cursor:pointer;
}

/* FEEDBACK FLASH */
.flash-green { background:rgba(0,255,65,0.4) !important; }
.flash-red { background:rgba(255,0,60,0.4) !important; }
.flash-yellow { background:rgba(255,255,0,0.3) !important; }
.flash-orange { background:rgba(255,140,0,0.3) !important; }

</style>
</head>

<body>

<div id="security-alert"></div>
<button id="lang-btn" onclick="toggleLang()">EN</button>

<div id="hud">
    <div id="timer-box">05:00</div>
</div>

<div id="life-stats">
    <div class="stat-pill">Respect: <span id="v-respect">50</span></div>
    <div class="stat-pill">Peace: <span id="v-peace">50</span></div>
    <div class="stat-pill">Lead: <span id="v-lead">50</span></div>
    <div class="stat-pill">Money: <span id="v-money">100</span></div>
    <div class="stat-pill">Safety: <span id="v-safety">100</span></div>
    <div class="stat-pill">Happy: <span id="v-happy">50</span></div>
</div>

<div id="overlay">
    <h1 id="phase-title"></h1>
    <div id="breath-circle">BREATH</div>
    <p id="phase-desc"></p>
    <div id="decision-grid"></div>
</div>

<script src="/static/engine.js"></script>

<script>

// ================= WORDS =================
const words = {
    power:["WILL","VISION","HONOR","COURAGE","BUILD","RISE","FAITH","DISCIPLINE","STRENGTH","VICTORY"],
    risk:["NOISE","EXCUSE","QUITTING","EGO","HATE","CHAOS","LAZY","FEAR","LIE","ANGER"],
    silence:["CALM","LISTEN","WAIT","PEACE","PRAY","INSIDE","BREATHE","STILL","SOUL","FOCUS"]
};

// ================= STATE =================
let lang="en";
let gameMode="idle";

let state={
    timer:300,
    score:0,
    spawnRate:1200,
    stats:{respect:50,peace:50,lead:50,money:100,safety:100,happy:50}
};

// ================= TIMER REAL =================
setInterval(()=>{
    if(state.timer>0){
        state.timer--;
        updateHUD();
    }
},1000);

// ================= LANGUAGE =================
function toggleLang(){
    lang = lang==="en"?"es":"en";
    speak(lang==="en"?"English mode":"Modo español");
}

// ================= SPEAK =================
function speak(t){
    let s=new SpeechSynthesisUtterance(t);
    s.lang=lang==="en"?"en-US":"es-ES";
    speechSynthesis.cancel();
    speechSynthesis.speak(s);
}

// ================= WORDS =================
function spawnWord(){
    if(gameMode!=="words") return;

    const type=["power","risk","silence"][Math.floor(Math.random()*3)];
    const div=document.createElement("div");

    div.className="floating word-"+type;
    div.innerText=words[type][Math.floor(Math.random()*words[type].length)];
    div.style.left=Math.random()*80+"vw";

    div.onclick=()=>{
        div.remove();

        if(type==="power"){state.score+=20;}
        if(type==="risk"){state.score-=30;}
        if(type==="silence"){state.stats.peace++;}

        updateHUD();
    };

    document.body.appendChild(div);
    setTimeout(()=>div.remove(),6000);
}

// ================= BACKEND =================
async function fetchMission(){
    let r=await fetch("/api/mission/next?lang="+lang);
    return await r.json();
}

// ================= QUESTION =================
async function question(){
    let data=await fetchMission();

    let overlay=document.getElementById("overlay");
    let grid=document.getElementById("decision-grid");

    document.getElementById("phase-title").innerText=data.theme;
    document.getElementById("phase-desc").innerText=data.story;

    speak(data.story);

    grid.innerHTML="";

    data.options.forEach(opt=>{
        let b=document.createElement("button");
        b.className="choice-btn";
        b.innerText=opt.text;

        b.onclick=()=>{
            flash(opt.score);

            state.score+=opt.score;
            updateHUD();

            setTimeout(()=>overlay.style.display="none",1200);
        };

        grid.appendChild(b);
    });

    overlay.style.display="flex";
}

// ================= FLASH AAA =================
function flash(score){
    let body=document.body;

    if(score>=10) body.className="flash-green";
    else if(score>0) body.className="flash-yellow";
    else if(score===0) body.className="flash-orange";
    else body.className="flash-red";

    setTimeout(()=>body.className="",800);
}

// ================= PHASES =================
function playWords(sec){
    return new Promise(res=>{
        gameMode="words";
        let end=Date.now()+sec*1000;

        function loop(){
            if(Date.now()>end){gameMode="idle";return res();}
            spawnWord();
            setTimeout(loop,state.spawnRate);
        }
        loop();
    });
}

function breath(){
    return new Promise(res=>{
        gameMode="breath";

        let c=document.getElementById("breath-circle");
        let o=document.getElementById("overlay");

        o.style.display="flex";
        c.style.display="flex";

        speak("Breathing training active");

        let t=30;

        let i=setInterval(()=>{
            c.className = t%2===0?"inhale":"exhale";

            if(--t<0){
                clearInterval(i);
                o.style.display="none";
                res();
            }
        },1000);
    });
}

function silence(){
    return new Promise(res=>{
        gameMode="silence";

        let o=document.getElementById("overlay");
        o.style.display="flex";

        speak("Silence training");

        let t=60;

        let i=setInterval(()=>{
            document.getElementById("phase-desc").innerText="Silence "+t;

            if(--t<0){
                clearInterval(i);
                o.style.display="none";
                res();
            }
        },1000);
    });
}

// ================= HUD =================
function updateHUD(){
    document.getElementById("timer-box").innerText=
        String(Math.floor(state.timer/60)).padStart(2,"0")+":"+
        String(state.timer%60).padStart(2,"0");

    document.getElementById("v-respect").innerText=state.stats.respect;
    document.getElementById("v-peace").innerText=state.stats.peace;
    document.getElementById("v-lead").innerText=state.stats.lead;
    document.getElementById("v-money").innerText=state.stats.money;
    document.getElementById("v-safety").innerText=state.stats.safety;
    document.getElementById("v-happy").innerText=state.stats.happy;
}

// ================= LOOP =================
async function loop(){
    while(true){
        await playWords(300);
        await breath();
        await question();

        await playWords(600);
        await silence();
        await breath();
        await question();
    }
}

// ================= START =================
function start(){
    speak("System online");
    loop();
}

start();

</script>

</body>
</html>
