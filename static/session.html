<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO: TOTAL LIFE TRAINING</title>
<style>
:root {
    --neon-blue:#00f2ff; --neon-green:#00ff41; --neon-red:#ff003c;
    --neon-yellow:#ffff00; --matrix-bg:#00050a; --neon-gold: #ffcc00;
}
body {
    margin:0; background:var(--matrix-bg); color:#fff;
    font-family:'Courier New', monospace; overflow:hidden; user-select:none;
    transition: background 0.3s ease;
}

/* ALERTA */
#security-alert {
    position: fixed; top: 0; left: 0; width: 100%; height: 8px;
    background: var(--neon-green); z-index: 1000; transition: 0.8s ease;
    box-shadow: 0 0 15px var(--neon-green);
}

#lang-btn {
    position:fixed; bottom:20px; right:20px; z-index:999;
    padding:10px 18px; border:2px solid var(--neon-blue);
    background:rgba(0,0,0,0.8); color:var(--neon-blue); cursor:pointer; 
    font-weight: bold; border-radius: 5px;
}

#hud {
    position:fixed; top:20px; width:100%; display:flex;
    justify-content:space-between; padding:20px; z-index:50; box-sizing: border-box;
}
#timer-box { font-size:2.8rem; color:var(--neon-blue); text-shadow:0 0 20px var(--neon-blue); }
#score-container { text-align:right; }
#mastery-lvl { color: var(--neon-green); font-size:1.2rem; font-weight:bold; }
#score-box { border:3px solid #fff; padding:8px 20px; font-size:1.8rem; margin-top:5px; background:rgba(255,255,255,0.1); }

#life-stats {
    position: fixed; bottom: 20px; left: 20px; display: flex; flex-wrap: wrap;
    gap: 12px; z-index: 50; max-width: 95%;
}
.stat-pill { border: 2px solid #333; padding: 10px 15px; font-size: 0.9rem; background: rgba(0,0,0,0.9); border-radius: 6px; }
.stat-pill span { font-weight: bold; color: var(--neon-blue); }
#v-money { color: var(--neon-gold) !important; }
#v-safety { color: var(--neon-red) !important; }
#v-happy { color: #ff00ff !important; }

/* WORDS */
.floating {
    position: absolute; padding: 15px 30px; font-weight: 900; font-size: 1.5rem;
    border-radius: 10px; background: rgba(0,0,0,0.9); z-index: 10;
    animation: floatUp 7s linear forwards; cursor: pointer;
}
.word-power { border: 3px solid var(--neon-green); color: var(--neon-green); }
.word-risk { border: 3px solid var(--neon-red); color: var(--neon-red); }
.word-silence { border: 3px solid var(--neon-yellow); color: var(--neon-yellow); }

@keyframes floatUp {
    from { transform: translateY(110vh); }
    to { transform: translateY(-25vh); }
}

.explode { animation: blast 0.5s ease-out forwards !important; }
@keyframes blast {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(4); opacity: 0; }
}

/* OVERLAY */
#overlay {
    position:fixed; width:100%; height:100%; background:rgba(0,5,10,0.95);
    display:none; align-items:center; justify-content:center;
    flex-direction:column; z-index:500; text-align:center; padding:30px;
}

#breath-circle {
    width:250px; height:250px; border:8px solid var(--neon-blue);
    border-radius:50%; margin:30px;
    display:flex; align-items:center; justify-content:center;
    font-size:1.5rem;
}
.inhale { transform:scale(1.3); }
.exhale { transform:scale(0.8); }

#decision-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:20px;
    margin-top:30px; width:100%; max-width:800px;
}
.choice-btn {
    padding:22px; border:3px solid var(--neon-blue);
    background:none; color:#fff; cursor:pointer;
}
</style>
</head>
<body>

<div id="security-alert"></div>
<button id="lang-btn" onclick="toggleLang()">EN</button>

<div id="hud">
    <div id="timer-box">05:00</div>
    <div id="score-container">
        <div id="mastery-lvl">MASTERY x1</div>
        <div id="score-box">0</div>
    </div>
</div>

<div id="life-stats">
    <div class="stat-pill">Respect: <span id="v-respect">50</span></div>
    <div class="stat-pill">Peace: <span id="v-peace">50</span></div>
    <div class="stat-pill">Leadership: <span id="v-lead">50</span></div>
    <div class="stat-pill">Money: $<span id="v-money">100</span></div>
    <div class="stat-pill">Safety: <span id="v-safety">100</span>%</div>
    <div class="stat-pill">Happiness: <span id="v-happy">50</span>%</div>
</div>

<div id="overlay">
    <h1 id="phase-title"></h1>
    <div id="breath-circle" style="display:none;"></div>
    <p id="phase-desc"></p>
    <div id="decision-grid"></div>
</div>

<script src="/static/engine.js"></script>

<script>

// ==========================================
// 🔊 SFX SYSTEM
// ==========================================
const sfx = {
    click: new Audio('https://actions.google.com/sounds/v1/cartoon/pop.ogg'),
    power: new Audio('https://actions.google.com/sounds/v1/cartoon/clank_with_rattle.ogg'),
    risk: new Audio('https://actions.google.com/sounds/v1/cartoon/boing.ogg'),
    success: new Audio('https://actions.google.com/sounds/v1/cartoon/upward_glissando.ogg'),
    fail: new Audio('https://actions.google.com/sounds/v1/cartoon/concussive_hit_guitar_accent.ogg')
};

// ==========================================
// 🌌 WORD SYSTEM (LIFE TRAINING REAL)
// ==========================================
const words = {
    power: ["LISTEN FIRST","STAY CALM","THINK BEFORE","CONTROL EMOTION","RESPECT OTHERS","ASK WHY","FOCUS NOW","BE HONEST","KEEP LEARNING","SOLVE PROBLEM","HELP TEAM","WAIT YOUR TURN","PLAN AHEAD","ADAPT FAST","SPEAK CLEAR","OBSERVE SILENTLY"],
    risk: ["REACT ANGRY","BLAME OTHERS","LIE TO WIN","LOSE CONTROL","FOLLOW CROWD","ACT WITHOUT THINK","IGNORE CONSEQUENCE","EGO FIRST","QUIT EARLY","ESCAPE RESPONSIBILITY","SEEK APPROVAL","WASTE TIME","DISTRACT EASY","OVERREACT","TALK TOO MUCH","NO PLAN"],
    silence: ["OBSERVE PEOPLE","READ SITUATION","WAIT RIGHT MOMENT","CONTROL IMPULSE","THINK LONG TERM","SEE INTENTION","UNDERSTAND ENERGY","BREATHE DEEP","FEEL BEFORE ACT","CHOOSE WISE","LISTEN MORE","ANALYZE QUIET","SEE CONSEQUENCES","KEEP BALANCE","INNER CONTROL","MENTAL CLARITY"]
};

// ==========================================
// 🧠 LIFE EXPLANATION ENGINE
// ==========================================
const explanations = [
"Staying calm gives you control. Losing control gives power to others.",
"Reacting slow makes you stronger than reacting fast.",
"Anger is fast, intelligence is slow. Choose slow.",
"Respect earns trust. Trust opens doors.",
"Listening first makes people reveal everything.",
"People show who they are if you stay silent.",
"Thinking before acting avoids future problems.",
"Every decision builds your future identity.",
"Small smart choices beat big emotional mistakes.",
"School teaches knowledge, life teaches decisions.",
"Most problems are social, not academic.",
"Understanding people is more valuable than memorizing.",
"Money follows discipline, not luck.",
"Spending fast creates stress later.",
"Saving small today creates freedom tomorrow.",
"Avoiding danger is smarter than facing it.",
"Reading situations keeps you safe.",
"Not reacting is sometimes the strongest move.",
"Leaders stay calm when others panic.",
"Blaming weakens you. Responsibility builds power.",
"Helping others increases your influence.",
"Silence sharpens awareness.",
"Breathing controls your nervous system.",
"Calm mind = better decisions.",
"Your habits today create your life tomorrow.",
"Discipline beats motivation every time.",
"Focus creates results.",
"Distraction destroys potential.",
"Energy flows where attention goes.",
"You become what you repeat.",
"Strong mind = strong life.",
"Control yourself before controlling anything else.",
"Winning inside creates winning outside.",
"Awareness is your real power.",
"Patience avoids mistakes.",
"Speed without thinking creates problems.",
"Clarity beats confusion.",
"Observation beats reaction.",
"Thinking long term changes everything.",
"Your future depends on daily decisions.",
"Emotional control is a superpower",
"Most people lose because they react, not think",
"Silence lets you see what others miss",
"Confidence comes from control, not noise",
"Learning never stops in real life",
"Smart people adapt, not complain",
"Understanding beats arguing",
"Control your words, control your life",
"Your reaction defines your result",
"Every situation is training",
"Life rewards awareness",
"Thinking is your strongest weapon"
];

// ================= ORIGINAL STATE =================
let lang = "en";
let gameMode = "idle";

let state = {
    score: 0, mastery: 1, combo: 0, timer:300,
    stats: { respect:50, peace:50, lead:50, money:100, happy:50, safety:100 },
    spawnRate:1300
};

// ================= TIMER =================
setInterval(()=>{
    if(state.timer>0){
        state.timer--;
        updateHUD();
    }
},1000);

// ================= LANGUAGE =================
function toggleLang(){
    lang = (lang==="en") ? "es" : "en";
    document.getElementById("lang-btn").innerText = lang.toUpperCase();
}

// ================= VOICE =================
function speak(text){
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = (lang==="en")?"en-US":"es-ES";
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

// ================= HUD =================
function updateHUD(){
    document.getElementById("score-box").innerText=state.score;
    document.getElementById("timer-box").innerText =
    String(Math.floor(state.timer/60)).padStart(2,"0")+":"+
    String(state.timer%60).padStart(2,"0");

    document.getElementById("v-respect").innerText=state.stats.respect;
    document.getElementById("v-peace").innerText=state.stats.peace;
    document.getElementById("v-lead").innerText=state.stats.lead;
    document.getElementById("v-money").innerText=state.stats.money;
    document.getElementById("v-safety").innerText=state.stats.safety;
    document.getElementById("v-happy").innerText=state.stats.happy;
}

// ================= WORD SYSTEM (UPDATED) =================
function spawnWord(){
    if(gameMode!=="words") return;

    const cats=["power","risk","silence"];
    const c=cats[Math.floor(Math.random()*3)];

    const div=document.createElement("div");
    div.className=`floating word-${c}`;
    div.innerText = words[c][Math.floor(Math.random()*words[c].length)];
    div.style.left=Math.random()*80+"vw";

    div.onclick=()=>{
        if(div.dataset.clicked) return;
        div.dataset.clicked="true";

        div.classList.add("explode");

        if(c==="power"){
            sfx.power.play();
            state.score+=20;
            state.stats.respect++;
            state.stats.lead++;
        }
        if(c==="risk"){
            sfx.risk.play();
            state.score-=30;
            state.stats.safety-=2;
        }
        if(c==="silence"){
            sfx.click.play();
            state.stats.peace++;
        }

        updateHUD();
        setTimeout(()=>div.remove(),500);
    };

    document.body.appendChild(div);
    setTimeout(()=>div.remove(),7000);
}

// ================= QUESTIONS (UPDATED) =================
async function triggerQuestion(){
    const res = await fetch("/api/mission/next?lang="+lang);
    const data = await res.json();

    const overlay=document.getElementById("overlay");
    const grid=document.getElementById("decision-grid");
    const desc=document.getElementById("phase-desc");

    overlay.style.display="flex";
    desc.innerText=data.story;

    grid.innerHTML="";

    data.options.forEach(opt=>{
        const btn=document.createElement("button");
        btn.className="choice-btn";
        btn.innerText=opt.text;

        btn.onclick=()=>{

            let color="#ffaa00";

            if(opt.score>=8){
                color="#00ff41";
                sfx.success.play();
            } else if(opt.score>=4){
                color="#ffff00";
                sfx.click.play();
            } else if(opt.score>=0){
                color="#ff8800";
                sfx.click.play();
            } else {
                color="#ff003c";
                sfx.fail.play();
            }

            document.body.style.background=color;

            state.score+=opt.score;

            if(opt.score>0){
                state.stats.respect++;
                state.stats.lead++;
            } else {
                state.stats.safety--;
                state.stats.peace--;
            }

            updateHUD();

            grid.innerHTML="";

            const exp = opt.explanation || explanations[Math.floor(Math.random()*explanations.length)];
            desc.innerText = exp;
            speak(exp);

            setTimeout(()=>{
                document.body.style.background="#00050a";
                overlay.style.display="none";
            },3500);
        };

        grid.appendChild(btn);
    });
}

// ================= LOOP (UPDATED) =================
async function mainLoop(){
    while(true){
        gameMode="words";

        let end=Date.now()+45000;

        while(Date.now()<end){
            spawnWord();
            await new Promise(r=>setTimeout(r,state.spawnRate));
        }

        document.querySelectorAll('.floating').forEach(el => el.remove());

        gameMode="question";
        await triggerQuestion();

        await new Promise(r=>setTimeout(r,4000));
    }
}

// ================= START =================
updateHUD();
mainLoop();

</script>
</body>
</html>
