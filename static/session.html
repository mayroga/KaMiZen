<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | LIFE SIMULATOR</title>

<style>
body {
    margin:0;
    font-family: Arial Black, sans-serif;
    background:#000;
    color:#00f2ff;
    overflow:hidden;
}

#app {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* ===============================
   📖 STORY DISPLAY (LOCKED FLOW)
=============================== */
#message {
    width:80%;
    max-width:800px;
    padding:25px;
    border:2px solid #00f2ff;
    background:rgba(0,0,0,0.92);
    text-align:center;
    font-size:20px;
    line-height:1.6;
    min-height:120px;
    transition: all 0.4s ease;
}

/* ===============================
   📊 STATS
=============================== */
#stats {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:10px;
    width:80%;
    max-width:800px;
    margin-bottom:20px;
}

.box {
    border:1px solid #00f2ff;
    padding:10px;
    text-align:center;
}

/* ===============================
   🎮 BUTTONS
=============================== */
#options {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    width:80%;
}

button {
    padding:12px;
    border:2px solid #00f2ff;
    background:black;
    color:#00f2ff;
    cursor:pointer;
    min-width:120px;
}

button:hover {
    background:#00f2ff;
    color:black;
}
</style>
</head>

<body>

<div id="app">

    <div id="stats">
        <div class="box">MENTAL <div id="mental">100</div></div>
        <div class="box">SOCIAL <div id="social">50</div></div>
        <div class="box">KARMA <div id="karma">0</div></div>
        <div class="box">DISCIPLINE <div id="disc">50</div></div>
    </div>

    <div id="message">Inicializando sistema...</div>

    <div id="options"></div>

</div>

<script>

// ===============================
// STATE CORE
// ===============================
let session_id = localStorage.getItem("session_id");
let state = JSON.parse(localStorage.getItem("state") || "{}");

let locked = false;
let currentStory = null;

// ===============================
// INIT FLOW
// ===============================
window.onload = async function () {

    show("Verificando sistema...");

    if (!session_id) {
        await startSession();
    } else {
        show("Reconectando flujo de vida...");
        await requestNext("TDM");
    }

    renderButtons();
};

// ===============================
// START SESSION
// ===============================
async function startSession() {

    const res = await fetch("/start", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            profile: { age: 18, emotion: "neutral" }
        })
    });

    const data = await res.json();

    session_id = data.session_id;
    state = data.state;

    localStorage.setItem("session_id", session_id);
    localStorage.setItem("state", JSON.stringify(state));

    if (data.story) {
        playStory(data.story);
    }
}

// ===============================
// NEXT STORY (ONLY BACKEND CONTROL)
// ===============================
async function requestNext(decision) {

    if (locked) return;
    locked = true;

    try {

        const res = await fetch("/judge", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                session_id,
                decision
            })
        });

        const data = await res.json();

        if (data.error) {
            show("ERROR DE SESIÓN - REINICIANDO");
            localStorage.removeItem("session_id");
            session_id = null;
            await startSession();
            locked = false;
            return;
        }

        state = data.state;
        localStorage.setItem("state", JSON.stringify(state));
        updateUI();

        if (data.end || !data.story) {
            playStory({
                blocks: [
                    { text: "FIN DEL CICLO HUMANO. TU IDENTIDAD HA SIDO REGISTRADA." }
                ]
            });
            locked = false;
            return;
        }

        playStory(data.story);

    } catch (e) {
        console.error(e);
        show("ERROR DE CONEXIÓN");
    }

    locked = false;
}

// ===============================
// STORY PLAYER (NO CUTTING)
// ===============================
function playStory(story) {

    if (!story) return;

    const text = extractText(story);

    currentStory = story;

    show(text);
    speak(text);
    updateUI();

    // 🔥 CRITICAL FIX: WAIT FULL READING BEFORE NEXT ACTION
    const duration = Math.max(7000, text.length * 75);

    clearTimeout(window.auto);
    window.auto = setTimeout(() => {
        requestNext("TDM");
    }, duration);
}

// ===============================
// EXTRACT TEXT (SAFE MULTI FORMAT)
// ===============================
function extractText(story) {

    if (!story.blocks) return "Historia sin contenido";

    let out = "";

    for (let b of story.blocks) {
        if (typeof b.text === "string") {
            out += b.text + " ";
        } else if (b.text?.es) {
            out += b.text.es + " ";
        }
    }

    return out.trim();
}

// ===============================
// UI
// ===============================
function show(t) {
    document.getElementById("message").innerText = t;
}

function updateUI() {
    document.getElementById("mental").innerText = state.mental ?? 100;
    document.getElementById("social").innerText = state.social ?? 50;
    document.getElementById("karma").innerText = state.karma ?? 0;
    document.getElementById("disc").innerText = state.discipline ?? 50;
}

// ===============================
// VOICE SYSTEM (ANTI-CUT)
// ===============================
function speak(text) {

    if (!window.speechSynthesis) return;

    speechSynthesis.cancel();

    const u = new SpeechSynthesisUtterance(text);
    u.lang = "es-ES";
    u.rate = 0.95;
    u.pitch = 1;

    speechSynthesis.speak(u);
}

// ===============================
// BUTTONS (SOFT OVERRIDE ONLY)
// ===============================
function renderButtons() {

    const c = document.getElementById("options");
    c.innerHTML = "";

    const list = [
        ["TDB","Equilibrio"],
        ["TDM","Impulso"],
        ["TDN","Creatividad"],
        ["TDP","Estructura"],
        ["TDG","Control"],
        ["TDK","Conexión"]
    ];

    for (let [k,label] of list) {

        const b = document.createElement("button");
        b.innerText = label;

        b.onclick = () => {
            if (!locked) requestNext(k);
        };

        c.appendChild(b);
    }
}

</script>

</body>
</html>
