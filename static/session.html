<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO: TOTAL LIFE TRAINING</title>

<style>
:root {
    --neon-blue:#00f2ff;
    --neon-green:#00ff41;
    --neon-red:#ff003c;
    --neon-yellow:#ffff00;
    --matrix-bg:#00050a;
    --neon-gold:#ffcc00;
}

body {
    margin:0;
    background:var(--matrix-bg);
    color:#fff;
    font-family:'Courier New', monospace;
    overflow:hidden;
    user-select:none;
}

/* RESPONSIVE FIX */
@media (max-width:768px){
    #timer-box{font-size:1.8rem;}
    #score-box{font-size:1.2rem;}
    .floating{font-size:1rem;padding:10px 16px;}
    #decision-grid{grid-template-columns:1fr;}
}

/* HUD */
#security-alert {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:8px;
    background:var(--neon-green);
    z-index:1000;
    box-shadow:0 0 15px var(--neon-green);
}

#lang-btn {
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:999;
    padding:10px 18px;
    border:2px solid var(--neon-blue);
    background:rgba(0,0,0,0.8);
    color:var(--neon-blue);
    cursor:pointer;
    font-weight:bold;
    border-radius:5px;
}

#hud {
    position:fixed;
    top:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px;
    z-index:50;
    box-sizing:border-box;
}

#timer-box {
    font-size:2.8rem;
    color:var(--neon-blue);
    text-shadow:0 0 20px var(--neon-blue);
}

#score-box {
    border:3px solid #fff;
    padding:8px 20px;
    font-size:1.8rem;
    background:rgba(255,255,255,0.1);
}

#mastery-lvl {
    color:var(--neon-green);
    font-size:1.2rem;
    font-weight:bold;
}

/* STATS */
#life-stats {
    position:fixed;
    bottom:20px;
    left:20px;
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    z-index:50;
    max-width:95%;
}

.stat-pill {
    border:2px solid #333;
    padding:10px 15px;
    font-size:0.9rem;
    background:rgba(0,0,0,0.9);
    border-radius:6px;
}

/* FLOATING WORDS (UNCHANGED CORE) */
.floating {
    position:absolute;
    padding:15px 30px;
    font-weight:900;
    font-size:1.5rem;
    border-radius:10px;
    background:rgba(0,0,0,0.9);
    z-index:10;
    animation:floatUp 7s linear forwards;
    cursor:pointer;
}

.word-power { border:3px solid var(--neon-green); color:var(--neon-green); }
.word-risk { border:3px solid var(--neon-red); color:var(--neon-red); }
.word-silence { border:3px solid var(--neon-yellow); color:var(--neon-yellow); }
.word-money { border:3px solid var(--neon-gold); color:var(--neon-gold); }
.word-business { border:3px solid #00e5ff; color:#00e5ff; }
.word-growth { border:3px solid #00ff99; color:#00ff99; }

@keyframes floatUp {
    from { transform:translateY(110vh); }
    to { transform:translateY(-25vh); }
}

.explode {
    animation:blast 0.5s ease-out forwards!important;
}

@keyframes blast {
    0% { transform:scale(1); opacity:1; }
    100% { transform:scale(4); opacity:0; }
}

/* OVERLAY */
#overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,5,10,0.95);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:500;
    text-align:center;
    padding:30px;
}

#decision-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:30px;
    width:100%;
    max-width:800px;
}

.choice-btn {
    padding:22px;
    border:3px solid var(--neon-blue);
    background:none;
    color:#fff;
    cursor:pointer;
}

/* FEEDBACK */
.correct { background:rgba(0,255,0,0.2)!important; border-color:var(--neon-green)!important; }
.wrong { background:rgba(255,0,0,0.2)!important; border-color:var(--neon-red)!important; }
.mid1 { background:rgba(255,255,0,0.15)!important; }
.mid2 { background:rgba(255,165,0,0.15)!important; }

/* BREATH */
#breath-circle{
    width:140px;
    height:140px;
    border-radius:50%;
    border:4px solid var(--neon-blue);
    margin:10px auto;
    display:none;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-weight:bold;
    color:var(--neon-blue);
    animation:pulse 4s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);opacity:0.5;}
    50%{transform:scale(1.4);opacity:1;}
    100%{transform:scale(1);opacity:0.5;}
}

/* SILENCE TIMER */
#silence-timer{
    font-size:2rem;
    color:var(--neon-yellow);
    margin-top:10px;
}

/* CONTINUE BUTTON */
#continue-btn{
    margin-top:20px;
    padding:15px 25px;
    border:2px solid var(--neon-green);
    background:none;
    color:var(--neon-green);
    font-weight:bold;
    display:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="security-alert"></div>
<button id="lang-btn" onclick="toggleLang()">EN</button>

<div id="hud">
    <div id="timer-box">05:00</div>
    <div id="score-box">0</div>
    <div id="mastery-lvl">MASTERY x1</div>
</div>

<div id="life-stats">
    <div class="stat-pill">Respect: <span id="v-respect">50</span></div>
    <div class="stat-pill">Peace: <span id="v-peace">50</span></div>
    <div class="stat-pill">Leadership: <span id="v-lead">50</span></div>
    <div class="stat-pill">Money: $<span id="v-money">100</span></div>
    <div class="stat-pill">Safety: <span id="v-safety">100</span>%</div>
    <div class="stat-pill">Happiness: <span id="v-happy">50</span>%</div>
</div>

<div id="breath-circle">INHALE</div>

<div id="overlay">
    <h1 id="phase-title"></h1>
    <p id="phase-desc"></p>

    <div id="silence-timer"></div>
    <div id="decision-grid"></div>

    <button id="continue-btn" onclick="closeOverlay()">CONTINUE</button>
</div>

<script src="/static/engine.js"></script>

<script>

let lang="en";
let gameMode="idle";

let state={
 score:0,
 timer:300,
 stats:{respect:50,peace:50,lead:50,money:100,happy:50,safety:100},
 spawnRate:1300
};

function speak(t){
 if(!t)return;
 let u=new SpeechSynthesisUtterance(t);
 u.lang=(lang==="es")?"es-ES":"en-US";
 speechSynthesis.cancel();
 speechSynthesis.speak(u);
}

function updateHUD(){
 document.getElementById("score-box").innerText=state.score;
 let m=Math.floor(state.timer/60),s=state.timer%60;
 document.getElementById("timer-box").innerText=
 String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

 for(let k in state.stats){
  let el=document.getElementById("v-"+k);
  if(el)el.innerText=state.stats[k];
 }
}

function breathCycle(t,s){
 let c=document.getElementById("breath-circle");
 c.style.display="flex";
 c.innerText=t.toUpperCase();
 speak(t);
 setTimeout(()=>c.style.display="none",s*1000);
}

/* WORDS (UNCHANGED CORE) */
const words={
 power:["LISTEN FIRST","STAY CALM","THINK BEFORE","CONTROL EMOTION","RESPECT OTHERS"],
 risk:["REACT ANGRY","BLAME OTHERS","LOSE CONTROL","FOLLOW CROWD"],
 silence:["OBSERVE PEOPLE","BREATHE DEEP","WAIT MOMENT","INNER CONTROL"],
 money:["INVEST SMART","BUILD VALUE","CASHFLOW","SAVE MONEY","THINK SCALE"],
 business:["BUILD SYSTEM","SELL VALUE","LEAD MARKET","BRAND POWER","EXPAND NETWORK"],
 growth:["LEARN FAST","IMPROVE DAILY","BUILD SKILL","LONG TERM THINK"]
};

function spawnWord(){
 if(gameMode!=="words")return;

 const c=["power","risk","silence","money","business","growth"][Math.floor(Math.random()*6)];

 let d=document.createElement("div");
 d.className="floating word-"+c;
 d.innerText=words[c][Math.floor(Math.random()*words[c].length)];
 d.style.left=Math.random()*80+"vw";

 d.onclick=()=>{
  d.classList.add("explode");
  state.score++;
  updateHUD();
  setTimeout(()=>d.remove(),500);
 };

 document.body.appendChild(d);
 setTimeout(()=>d.remove(),7000);
}

/* SILENCE */
let silenceInterval;

function runSilence(seconds){
 let t=seconds;
 document.getElementById("silence-timer").innerText=t;
 document.getElementById("continue-btn").style.display="none";

 silenceInterval=setInterval(()=>{
  t--;
  document.getElementById("silence-timer").innerText=t;

  breathCycle(["inhale","hold","exhale"][Math.floor(Math.random()*3)],2);

  if(t<=0){
   clearInterval(silenceInterval);
   document.getElementById("continue-btn").style.display="block";
  }
 },1000);
}

function closeOverlay(){
 document.getElementById("overlay").style.display="none";
}

/* MISSION */
async function triggerQuestion(){
 const res=await fetch("/api/mission/next?lang="+lang);
 const data=await res.json();

 if(!data.options)return;

 let o=document.getElementById("overlay");
 let g=document.getElementById("decision-grid");
 let d=document.getElementById("phase-desc");
 let t=document.getElementById("phase-title");

 o.style.display="flex";
 t.innerText=data.theme;
 d.innerText=(data.analysis||"")+" "+(data.story||"");
 g.innerHTML="";

 if((data.analysis+data.story).includes("silencio")){
  runSilence(10);
 }

 data.options.forEach((opt,i)=>{
  let b=document.createElement("button");
  b.className="choice-btn";
  b.innerText=(lang==="es")?opt.text.es:opt.text.en;

  b.onclick=()=>{
   if(opt.correct)b.classList.add("correct");
   else b.classList.add("wrong");

   state.score+=opt.correct?30:-20;
   updateHUD();

   speak((lang==="es")?opt.explanation.es:opt.explanation.en);
   d.innerText=(lang==="es")?opt.explanation.es:opt.explanation.en;

   document.getElementById("continue-btn").style.display="block";
  };

  g.appendChild(b);
 });
}

setInterval(()=>{if(state.timer>0){state.timer--;updateHUD();}},1000);

async function loop(){
 while(true){
  gameMode="words";
  let end=Date.now()+30000;

  while(Date.now()<end){
   spawnWord();
   await new Promise(r=>setTimeout(r,state.spawnRate));
  }

  document.querySelectorAll(".floating").forEach(e=>e.remove());

  gameMode="question";
  await triggerQuestion();

  await new Promise(r=>setTimeout(r,2000));
 }
}

function toggleLang(){
 lang=(lang==="en")?"es":"en";
 document.getElementById("lang-btn").innerText=lang.toUpperCase();
}

updateHUD();
loop();

</script>

</body>
</html>
