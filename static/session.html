<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>KAMIZEN LIFE SAFETY - AURA BY MAY ROGA</title>

    <style>
        :root {
            --bg-deep: #0b1220;
            --card-bg: #111a2e;
            --primary: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #facc15;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            text-align: center;
        }

        /* CARD DESIGN */
        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: left;
        }

        /* INPUTS & BUTTONS */
        input[type="text"] {
            width: 100%;
            background: #1f2937;
            border: 2px solid #374151;
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .primary {
            background: var(--primary);
            color: white;
        }

        .primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        /* MISSION ANSWERS */
        .answer {
            background: #1f2937;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            border-left: 5px solid var(--primary);
        }

        .answer:hover {
            background: #374151;
            transform: translateX(5px);
        }

        /* BREATHING MODULE */
        .circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            margin: 40px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            border: 5px solid var(--primary);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
            animation: breatheAnimation 8s infinite ease-in-out;
        }

        @keyframes breatheAnimation {
            0%, 100% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.25); opacity: 1; border-color: var(--success); }
        }

        /* UTILS */
        .small {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 20px;
        }

        h1, h2, h3 { margin-bottom: 10px; }

        #feedback {
            font-size: 15px;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- El contenido se genera dinámicamente mediante engine.js -->
        <div style="margin-top: 100px;">
            <h2 style="color: var(--primary);">System Initializing...</h2>
            <p>Loading KaMiZen Knowledge Base</p>
        </div>
    </div>

    <!-- Carga del motor lógico -->
    <script src="/static/js/engine.js"></script>

</body>
</html>
