<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEURO PRO | KAMIZEN SYSTEM</title>

<style>
:root{
  --bg:#000;
  --neon:#00f2ff;
  --green:#33ff88;
  --red:#ff3355;
  --panel:rgba(0,15,30,0.9);
}

body{
  margin:0;
  background:var(--bg);
  color:var(--neon);
  font-family:Arial;
  overflow:hidden;
}

/* ================= UI LAYOUT ================= */
#app{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  position:relative;
}

/* ================= XP BAR ================= */
#xpBar{
  position:absolute;
  top:10px;
  left:10px;
  width:200px;
  height:12px;
  border:1px solid var(--neon);
}

#xpFill{
  height:100%;
  width:0%;
  background:var(--green);
}

/* ================= TIMER ================= */
#timer{
  position:absolute;
  top:10px;
  right:10px;
  font-size:14px;
}

/* ================= SEMAPHORE ================= */
#light{
  position:absolute;
  top:50px;
  width:20px;
  height:20px;
  border-radius:50%;
  background:gray;
}

/* ================= CIRCLE BREATH ================= */
#circle{
  width:80px;
  height:80px;
  border-radius:50%;
  background:rgba(0,242,255,0.2);
  box-shadow:0 0 30px var(--neon);
  transition:all 2.5s ease;
}

/* ================= TEXT ================= */
#message{
  position:absolute;
  bottom:200px;
  width:85%;
  padding:15px;
  background:var(--panel);
  text-align:center;
  min-height:120px;
}

/* ================= OPTIONS ================= */
#options{
  position:absolute;
  bottom:70px;
  width:85%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  padding:12px;
  border:1px solid var(--neon);
  background:transparent;
  color:var(--neon);
  cursor:pointer;
}

button:hover{
  background:var(--neon);
  color:#000;
}

/* ================= REASON BOX ================= */
#reason{
  position:absolute;
  bottom:320px;
  width:85%;
  text-align:center;
  font-size:14px;
  opacity:0.8;
}
</style>
</head>

<body>

<div id="app">

  <div id="xpBar"><div id="xpFill"></div></div>
  <div id="timer">⏱ 0</div>
  <div id="light"></div>

  <div id="circle"></div>

  <div id="reason"></div>
  <div id="message" onclick="start()">TOCA PARA INICIAR</div>

  <div id="options"></div>

</div>

<script>

let session_id=null;
let lang="es";
let xp=0;
let timerInt=null;

/* ================= AUDIO ================= */
const audio = new (window.AudioContext || window.webkitAudioContext)();

function sound(type){
  const o=audio.createOscillator();
  const g=audio.createGain();

  o.connect(g);
  g.connect(audio.destination);

  if(type==="ok") o.frequency.value=700;
  if(type==="fail") o.frequency.value=120;
  if(type==="magic") o.frequency.value=520;

  o.type="sine";
  g.gain.value=0.2;

  o.start();
  o.stop(audio.currentTime+0.25);
}

/* ================= VOICE ================= */
function speak(text){
  if(!text) return;
  let u=new SpeechSynthesisUtterance(text);
  u.lang="es-ES";
  speechSynthesis.speak(u);
}

/* ================= START ================= */
async function start(){

  if(audio.state==="suspended") await audio.resume();

  const r=await fetch("/start",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({profile:{lang}})
  });

  const d=await r.json();
  session_id=d.session_id;

  render(d.story);
}

/* ================= SEND ================= */
async function send(code){

  const r=await fetch("/judge",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({session_id,decision:code})
  });

  const d=await r.json();

  xp=d.xp;
  updateXP(xp);

  setSemaphore(d.semaphore);

  document.getElementById("reason").innerText =
    d.reason ? d.reason.es : "";

  speak(d.reason ? d.reason.es : "");

  sound(d.correct ? "magic" : "fail");

  render(d.story);

  startTimer(d.story?.timer || 15);
}

/* ================= RENDER ================= */
function render(s){

  if(!s) return;

  document.getElementById("message").innerText =
    s.text_es || s.text_en;

  document.getElementById("options").innerHTML="";

  if(s.options){
    s.options.forEach(o=>{
      let b=document.createElement("button");
      b.innerText=o.text.es;
      b.onclick=()=>send(o.code);
      document.getElementById("options").appendChild(b);
    });
  }

  startBreath();
}

/* ================= XP BAR ================= */
function updateXP(v){
  let p=Math.min(100,v);
  document.getElementById("xpFill").style.width=p+"%";
}

/* ================= SEMAPHORE ================= */
function setSemaphore(c){
  let l=document.getElementById("light");

  if(c==="green"){
    l.style.background="#33ff88";
  }else{
    l.style.background="#ff3355";
  }
}

/* ================= BREATH ================= */
function startBreath(){
  let c=document.getElementById("circle");

  setInterval(()=>{
    c.style.transform="scale("+(1+Math.random()*1.2)+")";
  },2000);
}

/* ================= TIMER ================= */
function startTimer(t){
  clearInterval(timerInt);

  let time=t;
  document.getElementById("timer").innerText="⏱ "+time;

  timerInt=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText="⏱ "+time;

    if(time<=0){
      clearInterval(timerInt);
      speak("Tiempo terminado");
    }

  },1000);
}

</script>

</body>
</html>
