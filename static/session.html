<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAMIZEN LIFE SYSTEM</title>

<style>
:root {
  --blue:#00f2ff;
  --red:#ff3131;
  --green:#2ecc71;
  --gold:#f1c40f;
  --dark:#020205;
}

body {
  margin:0;
  background:var(--dark);
  color:white;
  font-family:Orbitron;
  overflow:hidden;
}

/* HUD */
#hud {
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-around;
  z-index:10;
}

.box {
  padding:6px 10px;
  border:1px solid var(--blue);
  font-size:12px;
}

/* OVERLAY */
#overlay {
  position:fixed;
  inset:0;
  background:var(--dark);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:999;
  text-align:center;
  padding:20px;
}

.title {
  color:var(--blue);
  font-size:22px;
  letter-spacing:4px;
}

.btn {
  margin-top:20px;
  padding:15px 40px;
  border:none;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
  background:var(--blue);
}

/* CONTINUE BUTTON */
#continueBtn {
  display:none;
  margin-top:20px;
  padding:12px 35px;
  border-radius:25px;
  border:none;
  font-weight:bold;
  cursor:pointer;
  background:var(--gold);
}

/* OPTIONS */
.option {
  padding:12px;
  margin:6px;
  border:1px solid var(--blue);
  cursor:pointer;
  transition:0.2s;
}

.option.correct {
  background:var(--green);
  border-color:var(--green);
}

.option.wrong {
  background:var(--red);
  border-color:var(--red);
}

/* TIMER */
#timer {
  position:absolute;
  top:60px;
  width:100%;
  text-align:center;
  font-size:18px;
  color:var(--red);
}

canvas { position:absolute; top:0; left:0; }
</style>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>

<body>

<div id="hud">
  <div class="box">MONEY <span id="money">0</span></div>
  <div class="box">HEALTH <span id="health">100</span></div>
  <div class="box">LEGACY <span id="legacy">0</span></div>
</div>

<div id="timer">10:00</div>

<canvas id="game"></canvas>

<!-- OVERLAY -->
<div id="overlay">
  <div class="title" id="title">KAMIZEN</div>
  <div id="content"></div>

  <button class="btn" id="startBtn">START</button>
  <button id="continueBtn">CONTINUE</button>
</div>

<script>
const overlay = document.getElementById("overlay");
const content = document.getElementById("content");
const startBtn = document.getElementById("startBtn");
const continueBtn = document.getElementById("continueBtn");
const title = document.getElementById("title");

let phase = "story";
let game1Time = 300;
let game2Time = 300;

let selected = false;

/* =========================
   FLOW CONTROL
========================= */

startBtn.onclick = async () => {
  startBtn.style.display="none";
  await loadStory();
};

continueBtn.onclick = async () => {
  continueBtn.style.display="none";

  if(phase === "story"){
    await startGame1();
  }

  else if(phase === "game1"){
    await loadMission();
  }

  else if(phase === "mission"){
    await startGame2();
  }

  else if(phase === "game2"){
    endSession();
  }
};

/* =========================
   STORY
========================= */

async function loadStory(){
  phase="story";

  content.innerHTML = `
    <h3>STORY MODE</h3>
    <p>Loading story from system...</p>
  `;

  setTimeout(() => {
    content.innerHTML = `
      <h3>STORY</h3>
      <p>Your roots define your future.</p>
    `;

    continueBtn.style.display="block";
  },1500);
}

/* =========================
   GAME 1
========================= */

async function startGame1(){
  phase="game1";
  content.innerHTML="<h3>GAME PHASE 1</h3><p>Training...</p>";

  let t = game1Time;

  let interval = setInterval(()=>{
    t--;
    document.getElementById("timer").innerText = format(t);

    if(t<=0){
      clearInterval(interval);
      continueBtn.style.display="block";
      content.innerHTML="<h3>PHASE COMPLETE</h3><p>Review your behavior</p>";
    }
  },1000);
}

/* =========================
   MISSION (Q/A SYSTEM)
========================= */

async function loadMission(){
  phase="mission";

  content.innerHTML = `
    <h3>MISSION</h3>
    <p>Choose correctly</p>
  `;

  const question = {
    q:"What is the safest action?",
    options:[
      {t:"Fight", ok:false},
      {t:"Run away blindly", ok:false},
      {t:"Stay calm & analyze", ok:true},
      {t:"Ignore", ok:false}
    ]
  };

  const box = document.createElement("div");

  question.options.forEach((o)=>{
    const div = document.createElement("div");
    div.className="option";
    div.innerText=o.t;

    div.onclick = ()=>{
      if(selected) return;
      selected=true;

      if(o.ok){
        div.classList.add("correct");
      } else {
        div.classList.add("wrong");
      }

      // reveal correct
      document.querySelectorAll(".option").forEach(el=>{
        el.style.pointerEvents="none";
      });

      continueBtn.style.display="block";
    };

    box.appendChild(div);
  });

  content.appendChild(document.createElement("hr"));
  content.appendChild(document.createTextNode(question.q));
  content.appendChild(box);
}

/* =========================
   GAME 2
========================= */

async function startGame2(){
  phase="game2";

  content.innerHTML="<h3>GAME PHASE 2</h3><p>Applied learning...</p>";

  let t = game2Time;

  let interval = setInterval(()=>{
    t--;
    document.getElementById("timer").innerText = format(t);

    if(t<=0){
      clearInterval(interval);
      continueBtn.style.display="block";
      content.innerHTML="<h3>FINAL PHASE COMPLETE</h3>";
    }
  },1000);
}

/* =========================
   END
========================= */

function endSession(){
  overlay.innerHTML=`
    <h2>SESSION COMPLETE</h2>
    <p>System analysis finished</p>
    <button class="btn" onclick="location.reload()">RESTART</button>
  `;
}

/* =========================
   UTILS
========================= */

function format(s){
  let m=Math.floor(s/60);
  let sec=s%60;
  return `${m}:${sec<10?"0":""}${sec}`;
}

</script>

</body>
</html>
