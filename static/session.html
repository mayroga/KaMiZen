<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAMIZEN | AL CIELO PRO</title>

<style>
:root {
    --neon-blue:#00f2ff;
    --neon-green:#39ff14;
    --neon-red:#ff3131;
    --neon-gold:#ffdf00;
}

body{
    margin:0;
    background:radial-gradient(circle,#001a33,#000); /* NO CAMBIADO */
    color:#fff;
    font-family:Segoe UI,Arial;
    overflow:hidden;
    user-select:none;
}

/* ================= TOPBAR ================= */
#topbar{
    position:fixed;
    top:0;
    width:100%;
    padding:15px;
    display:flex;
    justify-content:space-between;
    background:rgba(0,0,0,0.6);
    border-bottom:2px solid var(--neon-blue);
    z-index:999;
}

/* SCORE GRANDE (VISIBLE) */
#score-display{
    font-size:2rem;
    font-weight:900;
    color:var(--neon-blue);
    text-shadow:0 0 15px var(--neon-blue);
}

/* TIMER GRANDE (IMPORTANTE UX) */
#timer{
    font-size:3rem;
    font-weight:900;
    color:#fff;
}

/* ================= GAME ================= */
#game{
    position:absolute;
    top:70px;
    bottom:140px;
    width:100%;
    overflow:hidden;
}

/* FLOATING WORDS */
.floating{
    position:absolute;
    padding:10px 22px;
    border-radius:40px;
    font-weight:900;
    cursor:pointer;
    animation:floatUp 5s linear forwards;
}

/* COLORES NEON (NO BLANCO) */
.word-good{border:2px solid var(--neon-green);color:var(--neon-green);}
.word-bad{border:2px solid var(--neon-red);color:var(--neon-red);}
.word-neutral{border:2px solid var(--neon-gold);color:var(--neon-gold);}

@keyframes floatUp{
    from{transform:translateY(110vh);}
    to{transform:translateY(-20vh);}
}

/* ================= LEARNING ================= */
#learning{
    display:none;
    position:absolute;
    top:80px;
    width:100%;
    text-align:center;
}

#story,#analysis{
    font-size:1.6rem;
    margin:10px auto;
    max-width:850px;
    color:#f0f0f0;
}

/* ================= BREATH ================= */
#breath{
    width:140px;
    height:140px;
    margin:20px auto;
    border-radius:50%;
    background:radial-gradient(circle,var(--neon-blue),#0033ff);
    animation:breathe 6s infinite;
    display:none;
}

@keyframes breathe{
    0%,100%{transform:scale(.8);}
    50%{transform:scale(1.3);}
}

/* ================= EXPLANATION ================= */
#explain{
    position:absolute;
    bottom:120px;
    width:100%;
    text-align:center;
    font-size:1.3rem;
    color:var(--neon-gold);
    text-shadow:0 0 10px #000;
}

/* ================= CONTROLS ================= */
#controls{
    position:fixed;
    bottom:15px;
    width:100%;
    text-align:center;
}

button{
    padding:12px 18px;
    margin:5px;
    border:2px solid var(--neon-blue);
    background:rgba(0,242,255,0.08);
    color:#fff;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    box-shadow:0 0 15px var(--neon-blue);
}
</style>
</head>

<body>

<!-- ================= TOP ================= -->
<div id="topbar">
    <div id="score-display">POINTS: 0</div>
    <div id="timer">00:00</div>
</div>

<!-- ================= GAME ================= -->
<div id="game"></div>

<!-- ================= LEARNING ================= -->
<div id="learning">
    <div id="story"></div>
    <div id="analysis"></div>
    <div id="breath"></div>
</div>

<!-- EXPLANATION FEEDBACK -->
<div id="explain"></div>

<!-- ================= CONTROLS ================= -->
<div id="controls">
    <button onclick="KamizenEngine.init()">START</button>
    <button onclick="KamizenEngine.changeLang()">ESP / ENG</button>
    <button onclick="KamizenEngine.reset()">RESET</button>
</div>

<!-- ================= AUDIO ================= -->
<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="win" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

<script src="/static/engine.js"></script>

</body>
</html>
