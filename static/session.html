<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AL CIELO | KAMIZEN SYSTEM</title>
<style>
:root {
    --bg: #000;
    --neon: #00f2ff;
    --green: #33ff88;
    --red: #ff3355;
    --panel: rgba(0, 15, 30, 0.95);
}

body {
    margin: 0; background: var(--bg); color: var(--neon);
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden; height: 100vh;
}

#app {
    height: 100vh; display: flex; align-items: center;
    justify-content: center; flex-direction: column; position: relative;
}

/* UI HEADER */
#header {
    position: absolute; top: 20px; width: 90%;
    display: flex; justify-content: space-between; align-items: center; z-index: 10;
}

.status-group { display: flex; align-items: center; gap: 15px; }
#light { width: 22px; height: 22px; border-radius: 50%; background: #333; transition: 0.3s; }

/* CENTRAL CORE */
#circle {
    width: 130px; height: 130px; border-radius: 50%;
    border: 3px solid var(--neon); display: flex; align-items: center;
    justify-content: center; box-shadow: 0 0 20px rgba(0,242,255,0.3);
    margin-bottom: 40px; transition: 0.5s;
}

#timerDisplay { font-size: 35px; font-weight: bold; }

/* TEXT PANELS */
#reason {
    position: absolute; bottom: 390px; width: 85%;
    text-align: center; font-size: 15px; min-height: 50px; color: #fff;
}

#message {
    position: absolute; bottom: 200px; width: 85%;
    padding: 25px; background: var(--panel); border: 1px solid var(--neon);
    text-align: center; min-height: 90px; font-size: 18px;
}

/* OPTIONS & CONTROLS */
#options {
    position: absolute; bottom: 100px; width: 85%;
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}

#navControls {
    position: absolute; bottom: 30px; width: 90%;
    display: flex; justify-content: space-around;
}

.btn {
    padding: 12px; border: 1px solid var(--neon);
    background: transparent; color: var(--neon);
    cursor: pointer; font-weight: bold; font-family: inherit; font-size: 12px;
}

.opt-btn { padding: 20px; font-size: 14px; border: 1px solid var(--neon); background: rgba(0,242,255,0.1); color: var(--neon); cursor: pointer; }

/* STATES */
.correct { background: var(--green) !important; box-shadow: 0 0 20px var(--green); }
.incorrect { background: var(--red) !important; box-shadow: 0 0 20px var(--red); }
.hidden { display: none !important; }
</style>
</head>
<body>

<div id="app">
    <div id="header">
        <div class="status-group">
            <div id="light"></div>
            <div id="xpBar" style="width:100px; height:8px; border:1px solid var(--neon);"><div id="xpFill" style="height:100%; width:0%; background:var(--green); transition:0.5s;"></div></div>
        </div>
        <button class="btn" onclick="toggleLang()">EN/ES</button>
    </div>

    <div id="circle"><div id="timerDisplay">READY</div></div>

    <div id="reason"></div>
    <div id="message">TOCA PARA INICIAR NEURO-PROGRAMA</div>
    <div id="options" class="hidden"></div>

    <div id="navControls" class="hidden">
        <button class="btn" onclick="prevBlock()">BACK</button>
        <button class="btn" onclick="restartMission()">RESTART</button>
        <button class="btn" onclick="nextBlock()">CONTINUE</button>
    </div>
</div>

<script>
let sid = null;
let currentMission = null;
let blockIdx = 0;
let lang = "en"; 
let xp = 0;
let autoTimer = null;

// AUDIO ENGINE
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let dopamineMusic = null;

function playSound(freq, type, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = freq; osc.type = type;
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}

function startDopamineMusic() {
    if (dopamineMusic) return;
    const gain = audioCtx.createGain();
    gain.gain.value = 0.05;
    gain.connect(audioCtx.destination);
    
    // Generador de ritmo binario relajante
    const playBeat = () => {
        const osc = audioCtx.createOscillator();
        osc.connect(gain);
        osc.frequency.setValueAtTime(110, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(55, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    };
    dopamineMusic = setInterval(playBeat, 2000);
}

// LOGICA DE JUEGO
async function init() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    startDopamineMusic();
    const r = await fetch("/start", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({profile: {lang}})
    });
    const d = await r.json();
    sid = d.session_id;
    currentMission = d.mission;
    document.getElementById("navControls").classList.remove("hidden");
    renderBlock();
}

function renderBlock() {
    const block = currentMission.blocks[blockIdx];
    const msg = document.getElementById("message");
    const opt = document.getElementById("options");
    const reason = document.getElementById("reason");
    const light = document.getElementById("light");
    
    clearTimeout(autoTimer);
    opt.classList.add("hidden");
    reason.innerText = "";
    light.style.background = "#333";
    
    if (block.type === "story" || block.type === "analysis") {
        msg.innerText = block.text[lang];
        speak(block.text[lang]);
        // AUTOMÁTICO: Avanza solo tras 7 segundos
        autoTimer = setTimeout(nextBlock, 7000);
    } 
    else if (block.type === "tvid") {
        msg.innerText = (lang === "en") ? "DECIDE:" : "DECIDE:";
        opt.innerHTML = "";
        opt.classList.remove("hidden");
        block.options.forEach(o => {
            let b = document.createElement("button");
            b.className = "opt-btn";
            b.innerText = o.text[lang];
            b.onclick = () => checkDecision(o, b);
            opt.appendChild(b);
        });
    }
    else if (block.type === "silence_challenge") {
        runChallenge(block);
    }
}

async function checkDecision(o, btn) {
    const r = await fetch("/judge", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({session_id: sid, decision: o.code})
    });
    const d = await r.json();
    
    document.getElementById("reason").innerText = o.reason[lang];
    speak(o.reason[lang]);

    if (o.correct) {
        playSound(880, "sine", 0.5); // Premio
        document.getElementById("light").style.background = "var(--green)";
        btn.style.borderColor = "var(--green)";
        xp = d.xp;
        document.getElementById("xpFill").style.width = (xp % 100) + "%";
        setTimeout(loadNextMission, 4000);
    } else {
        playSound(150, "sawtooth", 0.3); // Penalización
        document.getElementById("light").style.background = "var(--red)";
        btn.style.borderColor = "var(--red)";
    }
}

function runChallenge(block) {
    let t = block.duration_sec;
    const disp = document.getElementById("timerDisplay");
    let intv = setInterval(() => {
        t--;
        disp.innerText = t;
        if (t <= 0) {
            clearInterval(intv);
            disp.innerText = "✓";
            playSound(1200, "sine", 0.8);
            setTimeout(nextBlock, 2000);
        }
    }, 1000);
}

// NAVEGACIÓN
function nextBlock() {
    blockIdx++;
    if (blockIdx < currentMission.blocks.length) renderBlock();
    else loadNextMission();
}

function prevBlock() {
    if (blockIdx > 0) {
        blockIdx--;
        renderBlock();
    }
}

function restartMission() {
    blockIdx = 0;
    renderBlock();
}

async function loadNextMission() {
    const r = await fetch("/get_mission", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({session_id: sid})
    });
    const d = await r.json();
    currentMission = d.mission;
    blockIdx = 0;
    renderBlock();
}

function toggleLang() {
    lang = (lang === "en") ? "es" : "en";
    renderBlock();
}

function speak(t) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(t);
    u.lang = (lang === "en") ? "en-US" : "es-ES";
    u.rate = 0.9;
    window.speechSynthesis.speak(u);
}

document.getElementById("message").onclick = () => { if(!sid) init(); };
</script>
</body>
</html>
