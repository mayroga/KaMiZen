<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN CONNECTED</title>

<style>
body{
margin:0;
background:#00050a;
color:#fff;
font-family:monospace;
overflow:hidden;
}

/* HUD */
#hud{
position:fixed;
top:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:20px;
z-index:50;
}

/* FLOATING WORDS */
.floating{
position:absolute;
padding:12px 25px;
border-radius:8px;
background:rgba(0,0,0,0.85);
cursor:pointer;
animation:floatUp 10s linear forwards;
z-index:10;
}

@keyframes floatUp{
from{transform:translateY(110vh);}
to{transform:translateY(-20vh);}
}

.explode{
animation:blast 0.4s ease-out forwards!important;
}

@keyframes blast{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(3);opacity:0;}
}

/* COLORS */
.word-power{border:2px solid #00ff41;color:#00ff41;}
.word-risk{border:2px solid #ff003c;color:#ff003c;}
.word-silence{border:2px solid #ffff00;color:#ffff00;}
.word-money{border:2px solid #ffcc00;color:#ffcc00;}
.word-business{border:2px solid #00e5ff;color:#00e5ff;}
.word-growth{border:2px solid #00ff99;color:#00ff99;}

/* OVERLAY */
#overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:200;
}

.choice-btn{
padding:15px;
margin:10px;
border:2px solid #00f2ff;
background:none;
color:#fff;
cursor:pointer;
}

#continue-btn{
margin-top:20px;
padding:15px 30px;
display:block;
}
</style>
</head>

<body>

<div id="hud">
<div id="score">0</div>
<div id="timer">05:00</div>
</div>

<div id="overlay">
<h1 id="phase-title"></h1>
<p id="phase-desc"></p>
<div id="decision-grid"></div>
<button id="continue-btn">CONTINUE</button>
</div>

<script>

/* =========================
   AUDIO (NO TOCAR)
========================= */
const AudioEngine={
ctx:null,
init(){
if(this.ctx)return;
this.ctx=new(window.AudioContext||window.webkitAudioContext)();
this.music();
},
music(){
const loop=()=>{
let o=this.ctx.createOscillator();
let g=this.ctx.createGain();
o.frequency.value=220+Math.random()*300;
g.gain.value=0.03;
o.connect(g);g.connect(this.ctx.destination);
o.start();o.stop(this.ctx.currentTime+0.3);
setTimeout(loop,300);
};
loop();
},
click(){
let o=this.ctx.createOscillator();
let g=this.ctx.createGain();
o.frequency.value=700;
g.gain.value=0.1;
o.connect(g);g.connect(this.ctx.destination);
o.start();o.stop(this.ctx.currentTime+0.1);
}
};

document.addEventListener("click",()=>AudioEngine.init(),{once:true});

/* =========================
   STATE
========================= */
let state={
score:0
};

function updateHUD(){
document.getElementById("score").innerText=state.score;
}

/* =========================
   JSON SYSTEM
========================= */

let missionIndex=1;
let currentMission=null;

function getFileByIndex(i){
if(i<=7) return "missions_01_07.json";
if(i<=14) return "missions_08_14.json";
if(i<=21) return "missions_15_21.json";
if(i<=28) return "missions_22_28.json";
return "missions_29_35.json";
}

async function loadMission(){
const file=getFileByIndex(missionIndex);
const res=await fetch("/"+file);
const data=await res.json();

const mission=data.missions.find(m=>m.id===missionIndex);

missionIndex++;
if(missionIndex>35) missionIndex=1;

return mission;
}

/* =========================
   PARSER JSON
========================= */

function parseMission(m){

let title="",story="",options=[];

m.b.forEach(b=>{

if(b.t==="v") title=b.tx.en;

if(b.t==="h") story+=b.tx.en+" ";

if(b.t==="d"){
options=b.op.map((op,i)=>({
text:op,
correct:i===b.c,
explanation:b.ex?.[i]||""
}));
}

});

return{title,story,options};
}

/* =========================
   TRIGGER QUESTION (FIXED)
========================= */

async function triggerQuestion(){

const raw=await loadMission();
const mission=parseMission(raw);

let overlay=document.getElementById("overlay");
let grid=document.getElementById("decision-grid");
let desc=document.getElementById("phase-desc");
let title=document.getElementById("phase-title");
let cont=document.getElementById("continue-btn");

overlay.style.display="flex";
grid.innerHTML="";
cont.style.display="none";

title.innerText=mission.title;
desc.innerText=mission.story;

let answered=false;

mission.options.forEach(opt=>{

let btn=document.createElement("button");
btn.className="choice-btn";
btn.innerText=opt.text;

btn.onclick=()=>{

AudioEngine.click();
desc.innerText=opt.explanation;

if(!answered){
answered=true;

btn.style.borderColor=opt.correct?"#00ff41":"#ff003c";

state.score+=opt.correct?20:-15;

updateHUD();

document.querySelectorAll(".choice-btn")
.forEach(b=>b.disabled=true);

cont.style.display="block";
}
};

grid.appendChild(btn);
});

cont.onclick=()=>{
overlay.style.display="none";
AudioEngine.click();
};

}

/* =========================
   FLOATING WORDS CORE (INTACTO)
========================= */

const words={
power:["LISTEN FIRST","STAY CALM"],
risk:["REACT ANGRY","LOSE CONTROL"],
silence:["OBSERVE","BREATHE"],
money:["INVEST SMART","SAVE MONEY"],
business:["BUILD SYSTEM","LEAD MARKET"],
growth:["LEARN FAST","IMPROVE DAILY"]
};

function spawnWord(){

const cats=Object.keys(words);
const c=cats[Math.floor(Math.random()*cats.length)];

let div=document.createElement("div");
div.className="floating word-"+c;
div.innerText=words[c][Math.floor(Math.random()*words[c].length)];

let x=Math.random()*80;
let y=110;
let dx=(Math.random()*2-1)*0.2;
let dy=-0.25;

function move(){
x+=dx;y+=dy;
div.style.left=x+"vw";
div.style.top=y+"vh";
requestAnimationFrame(move);
}
move();

div.onclick=()=>{

if(div.dataset.clicked)return;
div.dataset.clicked=true;

div.classList.add("explode");
AudioEngine.click();

/* REGLA PUNTOS UNIFICADA */
let positive=["power","silence","money","business","growth"].includes(c);

state.score+=positive?20:-15;

updateHUD();
};

document.body.appendChild(div);
setTimeout(()=>div.remove(),10000);
}

/* =========================
   LOOP PRINCIPAL
========================= */

setInterval(spawnWord,1200);

async function mainLoop(){

while(true){

let end=Date.now()+45000;

while(Date.now()<end){
spawnWord();
await new Promise(r=>setTimeout(r,1200));
}

document.querySelectorAll(".floating").forEach(e=>e.remove());

await triggerQuestion();

await new Promise(r=>setTimeout(r,3000));

}

}

updateHUD();
mainLoop();

</script>

</body>
</html>
