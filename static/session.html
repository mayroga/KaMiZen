<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AL CIELO - KAMIZEN BY MAY ROGA</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-gold: #f1c40f;
            --neon-red: #ff3131;
            --bg-dark: #050508;
            --neon-green: #2ecc71;
            --neon-orange: #ff8c00;
            --neon-yellow: #ffff00;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; overflow: hidden; background: var(--bg-dark); 
            color: white; font-family: 'Orbitron', sans-serif; touch-action: none; 
            height: 100vh; width: 100vw;
        }
        
        /* HUD & TIMERS */
        #hud {
            position: absolute; top: 10px; width: 100%;
            display: flex; justify-content: space-evenly;
            z-index: 2000; pointer-events: none; padding: 0 5px;
        }
        .data-box {
            background: rgba(0, 0, 0, 0.9); border: 1px solid var(--neon-blue);
            padding: 5px; text-align: center; flex: 1; margin: 0 3px; max-width: 110px;
        }
        .label { font-size: 8px; color: var(--neon-blue); letter-spacing: 1px; display: block; text-transform: uppercase; }
        .value { font-size: 14px; font-weight: 900; display: block; }
        
        #general-clock { position: absolute; bottom: 10px; right: 10px; color: var(--neon-gold); font-size: 12px; z-index: 2000; font-weight: 900; }
        #game-clock { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); color: var(--neon-red); font-size: 24px; font-weight: 900; z-index: 2000; text-shadow: 0 0 10px var(--neon-red); }

        /* ESCENARIO PRINCIPAL */
        #stage {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 20px; z-index: 500; background: radial-gradient(circle, #111 0%, #000 100%);
        }

        #display-text { font-size: 1.5rem; font-weight: 900; color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); margin-bottom: 15px; width: 100%; }
        #sub-text { font-size: 1rem; color: #ccc; max-width: 600px; line-height: 1.4; font-weight: 400; min-height: 1.5em; }

        .btn-core {
            padding: 15px 30px; background: var(--neon-blue); color: black; border: none;
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer; margin-top: 20px;
            text-transform: uppercase; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            box-shadow: 0 0 20px var(--neon-blue); z-index: 1000;
        }
        #options-container { margin-top: 20px; display: grid; gap: 10px; width: 100%; max-width: 400px; z-index: 1000; }
        .btn-opt {
            padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--neon-blue);
            color: white; font-family: 'Orbitron'; font-size: 0.8rem; cursor: pointer; transition: 0.3s;
        }

        /* RESPIRACIÓN */
        #breath-wrap { display: none; margin-top: 20px; flex-direction: column; align-items: center; }
        #breath-circle {
            width: 140px; height: 140px; border: 6px solid var(--neon-blue);
            border-radius: 50%; transition: transform 2s ease-in-out;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        /* JUEGO (CANVAS) */
        #gameCanvas { position: fixed; inset: 0; display: none; z-index: 800; cursor: crosshair; background: transparent; }
        .skip-btn { position: absolute; bottom: 20px; left: 20px; font-size: 10px; opacity: 0.7; z-index: 2000; background: #333; color: white; padding: 5px 10px; border: 1px solid #555; }

        .hidden { display: none !important; }
        input[type="text"] { background: transparent; border: 2px solid var(--neon-blue); color: white; padding: 12px; font-family: 'Orbitron'; text-align: center; outline: none; width: 250px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="hud">
    <div class="data-box"><span class="label">ASSETS</span><span id="stat-money" class="value">$0</span></div>
    <div class="data-box" style="border-color: var(--neon-gold);"><span class="label">STATUS</span><span id="stat-status" class="value">INIT</span></div>
    <div class="data-box" style="border-color: var(--neon-red);"><span class="label">LEVEL</span><span id="stat-level" class="value">1</span></div>
</div>

<div id="stage">
    <div id="content-area">
        <h2 id="display-text">KAMIZEN SYSTEM</h2>
        <p id="sub-text">IDENTIFY YOURSELF TO PROCEED WITH TRAINING.</p>
        <div id="input-wrap" style="margin-top: 20px;">
            <input type="text" id="client-name" placeholder="ENTER NAME">
        </div>
        <div id="options-container"></div>
        <button id="main-btn" class="btn-core">INITIALIZE</button>
    </div>

    <div id="breath-wrap">
        <div id="breath-circle"><span id="breath-label" style="font-size: 1.2rem; font-weight: 900;">INHALE</span></div>
        <div id="breath-info" style="font-size: 0.8rem; color: var(--neon-gold); margin-top: 20px; max-width: 280px; font-weight: 900;"></div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>
<div id="general-clock">MISSION TIME: 00:00</div>
<div id="game-clock" class="hidden">05:00</div>
<button class="skip-btn hidden" id="skip-btn">SKIP PHASE</button>

<script>
    // --- AUDIO SYSTEM ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, dur) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + dur);
    }

    // --- STATE ---
    let stats = { money: 0, health: 100, name: "Explorer", wrongClicks: 0, totalTime: 0, level: 1 };
    let sessionData = null;
    let isGameRunning = false;
    let gameTimer = 300;
    const synth = window.speechSynthesis;
    
    const ui = {
        text: document.getElementById('display-text'),
        sub: document.getElementById('sub-text'),
        mainBtn: document.getElementById('main-btn'),
        optCont: document.getElementById('options-container'),
        breath: document.getElementById('breath-wrap'),
        circle: document.getElementById('breath-circle'),
        label: document.getElementById('breath-label'),
        info: document.getElementById('breath-info'),
        canvas: document.getElementById('gameCanvas'),
        gClock: document.getElementById('general-clock'),
        gameClock: document.getElementById('game-clock'),
        skip: document.getElementById('skip-btn'),
        input: document.getElementById('input-wrap')
    };

    const ctx = ui.canvas.getContext('2d');
    let objects = [];
    let lasers = [];

    // --- CORE FUNCTIONS ---
    function speak(text, callback) {
        synth.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.rate = 0.9;
        msg.lang = 'en-US';
        msg.onend = callback;
        synth.speak(msg);
    }

    const sleep = ms => new Promise(r => setTimeout(r, ms));

    function updateHUD() {
        document.getElementById('stat-money').innerText = "$" + stats.money;
        document.getElementById('stat-level').innerText = stats.level;
    }

    // --- FLOW ---
    ui.mainBtn.onclick = async () => {
        const nameVal = document.getElementById('client-name').value;
        if(nameVal) stats.name = nameVal;
        ui.input.classList.add('hidden');
        ui.mainBtn.classList.add('hidden');
        
        startGeneralClock();
        
        // SALUDO PERSONALIZADO
        ui.text.innerText = `WELCOME, ${stats.name.toUpperCase()}`;
        const welcomeMsg = `Initializing Kamizen Protocol. I am your neural advisor. We will align your focus through narrative, action, and breathing.`;
        ui.sub.innerText = welcomeMsg;
        speak(welcomeMsg, async () => {
            await sleep(1000);
            await startProcess();
        });
    };

    function startGeneralClock() {
        setInterval(() => {
            stats.totalTime++;
            const m = Math.floor(stats.totalTime / 60);
            const s = stats.totalTime % 60;
            ui.gClock.innerText = `MISSION TIME: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }, 1000);
    }

    async function startProcess() {
        // Simulación de carga de JSON completo (Misiones y Story)
        const response = await fetch('/api/session/start');
        sessionData = await response.json();

        // 1. STORIES
        ui.text.innerText = "STORY PHASE";
        ui.sub.innerText = sessionData.story.en;
        speak(sessionData.story.en);
        ui.mainBtn.innerText = "CONTINUE TO ACTION";
        ui.mainBtn.classList.remove('hidden');

        ui.mainBtn.onclick = async () => {
            ui.mainBtn.classList.add('hidden');
            // 2. JUEGO 1
            await runWordGame(300);
            // 3. MISSIONS (JSON COMPLETO)
            await playMissions();
            // 4. JUEGO 2 (DIFICULTAD AUMENTADA)
            stats.level = 2;
            await runWordGame(300);
            // 5. DIAGNÓSTICO
            showFinalDiagnostic();
        };
    }

    async function playMissions() {
        const blocks = sessionData.missions[0].b;
        for (const block of blocks) {
            ui.optCont.innerHTML = "";
            ui.breath.style.display = "none";
            ui.sub.innerText = "";

            if (block.t === 'd') {
                ui.text.innerText = block.q.en;
                speak(block.q.en);
                await new Promise(resolve => {
                    block.op.forEach((opt, idx) => {
                        const btn = document.createElement('button');
                        btn.className = 'btn-opt';
                        btn.innerText = opt;
                        btn.onclick = () => {
                            if(idx === block.c) { btn.style.backgroundColor = 'var(--neon-green)'; stats.money += 1000; playTone(600, 'sine', 0.2); }
                            else { btn.style.backgroundColor = 'var(--neon-red)'; playTone(200, 'sawtooth', 0.3); }
                            
                            ui.sub.innerText = block.ex[idx];
                            speak(block.ex[idx]);
                            updateHUD();
                            ui.mainBtn.classList.remove('hidden');
                            ui.mainBtn.innerText = "NEXT TASK";
                            ui.mainBtn.onclick = () => { ui.mainBtn.classList.add('hidden'); resolve(); };
                        };
                        ui.optCont.appendChild(btn);
                    });
                });
            } 
            else if (block.t.includes('breath') || block.t === 'sil') {
                ui.text.innerText = "NEURAL RE-CALIBRATION";
                ui.breath.style.display = "flex";
                ui.info.innerText = block.inf?.en || "Stabilizing pulse...";
                speak(ui.info.innerText);
                let duration = block.d || 15;
                for(let i=0; i < Math.floor(duration/4); i++) {
                    ui.label.innerText = "INHALE"; ui.circle.style.transform = "scale(1.5)"; await sleep(2000);
                    ui.label.innerText = "EXHALE"; ui.circle.style.transform = "scale(1.0)"; await sleep(2000);
                }
            }
        }
    }

    // --- WORD GAME ENGINE ---
    async function runWordGame(seconds) {
        ui.text.innerText = "ACTION: PURIFY YOUR FOCUS";
        ui.sub.innerText = "Destroy negative thoughts. Protect positive assets.";
        speak(ui.sub.innerText);
        
        await sleep(2000);
        ui.canvas.style.display = "block";
        ui.gameClock.classList.remove('hidden');
        ui.skip.classList.remove('hidden');
        
        isGameRunning = true;
        gameTimer = seconds;
        objects = [];
        lasers = [];

        const timerInterval = setInterval(() => {
            if(!isGameRunning) return;
            gameTimer--;
            const m = Math.floor(gameTimer/60);
            const s = gameTimer % 60;
            ui.gameClock.innerText = `${m}:${String(s).padStart(2,'0')}`;
            if(gameTimer <= 0) { clearInterval(timerInterval); isGameRunning = false; }
        }, 1000);

        ui.skip.onclick = () => { gameTimer = 0; isGameRunning = false; };

        gameLoop();
        spawnLogic();

        return new Promise(resolve => {
            const check = setInterval(() => {
                if(!isGameRunning) {
                    clearInterval(check);
                    ui.canvas.style.display = "none";
                    ui.gameClock.classList.add('hidden');
                    ui.skip.classList.add('hidden');
                    resolve();
                }
            }, 100);
        });
    }

    function spawnLogic() {
        if(!isGameRunning) return;
        const words = [
            {t: "STABILITY", p: true}, {t: "WEALTH", p: true}, {t: "JOY", p: true},
            {t: "FEAR", p: false}, {t: "DEBT", p: false}, {t: "ANXIETY", p: false}
        ];
        const w = words[Math.floor(Math.random()*words.length)];
        objects.push({
            text: w.t, pos: w.p,
            x: 50 + Math.random() * (ui.canvas.width - 100),
            y: -20,
            s: (1.5 + Math.random() * 2) * stats.level
        });
        setTimeout(spawnLogic, 1000 / stats.level);
    }

    function gameLoop() {
        if(!isGameRunning) return;
        ctx.clearRect(0, 0, ui.canvas.width, ui.canvas.height);

        // Draw Lasers
        lasers.forEach((l, i) => {
            ctx.strokeStyle = l.color;
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2); ctx.stroke();
            l.life--;
            if(l.life <= 0) lasers.splice(i, 1);
        });

        // Draw Objects
        objects.forEach((obj, i) => {
            obj.y += obj.s;
            ctx.fillStyle = obj.pos ? 'var(--neon-blue)' : 'var(--neon-red)';
            ctx.font = "900 20px Orbitron";
            ctx.textAlign = "center";
            ctx.fillText(obj.text, obj.x, obj.y);

            if(obj.y > ui.canvas.height) {
                if(obj.pos) stats.money -= 100; // Penalización por dejar pasar lo bueno
                objects.splice(i, 1);
                updateHUD();
            }
        });

        requestAnimationFrame(gameLoop);
    }

    ui.canvas.onmousedown = (e) => {
        if(!isGameRunning) return;
        const rect = ui.canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        objects.forEach((obj, i) => {
            const dist = Math.sqrt((mx - obj.x)**2 + (my - obj.y)**2);
            if(dist < 50) {
                lasers.push({ x1: mx, y1: my, x2: obj.x, y2: obj.y, color: obj.pos ? '#00f2ff' : '#ff3131', life: 10 });
                
                if(!obj.pos) { // Destruir lo malo es bueno
                    stats.money += 500;
                    playTone(800, 'square', 0.1);
                } else { // Destruir lo bueno es malo
                    stats.wrongClicks++;
                    stats.money -= 1000;
                    playTone(150, 'sawtooth', 0.4);
                    if(stats.wrongClicks >= 3) triggerPenalty();
                }
                objects.splice(i, 1);
                updateHUD();
            }
        });
    };

    function triggerPenalty() {
        isGameRunning = false;
        stats.wrongClicks = 0;
        const pMsg = "Involuntary patterns detected. Stop. Commit to your growth to continue.";
        ui.text.innerText = "COGNITIVE LOCK";
        ui.sub.innerText = pMsg;
        speak(pMsg);
        ui.optCont.innerHTML = '<button class="btn-core" style="background:var(--neon-red)">I COMMIT TO MY MISSION</button>';
        ui.optCont.firstChild.onclick = () => {
            ui.optCont.innerHTML = "";
            runWordGame(gameTimer); // Reanuda el tiempo restante
        };
    }

    function showFinalDiagnostic() {
        ui.text.innerText = "DIAGNOSTIC COMPLETE";
        const msg = `Mission finished, ${stats.name}. Final Assets: $${stats.money}. Your neural stability is within optimal parameters. See you at the next level.`;
        ui.sub.innerText = msg;
        speak(msg);
        ui.mainBtn.innerText = "REBOOT SYSTEM";
        ui.mainBtn.classList.remove('hidden');
        ui.mainBtn.onclick = () => location.reload();
    }

    window.onresize = () => {
        ui.canvas.width = window.innerWidth;
        ui.canvas.height = window.innerHeight;
    };
    window.onresize();
</script>
</body>
</html>
