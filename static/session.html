<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAMIZEN SESSION RENDER</title>

<style>
body{
    margin:0;
    padding:0;
    background:#05070d;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

/* START SCREEN */
#startScreen{
    position:fixed;
    inset:0;
    background:#05070d;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:15px;
    z-index:999;
}

#nameInput{
    padding:12px;
    font-size:18px;
    text-align:center;
}

button{
    padding:12px 20px;
    font-size:18px;
    cursor:pointer;
}

/* CENTER TEXT */
#centerText{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:32px;
    text-align:center;
    width:80%;
}

/* BIG TIMER */
#timer{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:70px;
    font-weight:bold;
    color:#00f2ff;
    z-index:50;
}

/* FLOAT WORDS */
.word{
    position:absolute;
    color:#00f2ff;
    font-size:20px;
    animation:floatUp 5s linear forwards;
}

@keyframes floatUp{
    from{transform:translateY(0);opacity:1;}
    to{transform:translateY(-200px);opacity:0;}
}

/* HIDE */
.hidden{display:none;}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
    <h1>KAMIZEN LIFE SYSTEM</h1>
    <input id="nameInput" placeholder="Enter name">
    <button onclick="startSession()">START</button>
</div>

<!-- UI -->
<div id="centerText"></div>
<div id="timer"></div>

<!-- ENGINE SCRIPT (ONLY BRIDGE) -->
<script src="/static/js/engine.js"></script>

<script>
function startSession(){
    const name = document.getElementById("nameInput").value.trim();
    if(!name) return;

    localStorage.setItem("kamizen_name", name);

    document.getElementById("startScreen").classList.add("hidden");

    if(window.Engine && Engine.start){
        Engine.start();
    }
}
</script>

</body>
</html>
