<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KaMiZen</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Inter,sans-serif;
}

body{
background:#020617;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
overflow-y:auto;
}

#app{
width:100%;
max-width:420px;
min-height:100vh;
background:#111827;
padding:15px;
display:flex;
flex-direction:column;
}

#logo{
font-size:24px;
font-weight:600;
background:linear-gradient(90deg,#60a5fa,#a78bfa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

#subtitle{
font-size:12px;
opacity:0.6;
margin-bottom:10px;
}

#mental-panel{
background:#020617;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.bar{
height:6px;
background:#1e293b;
border-radius:10px;
overflow:hidden;
margin-top:4px;
}

.bar-fill{
height:100%;
background:#3b82f6;
width:0%;
}

#block{
font-size:18px;
text-align:center;
margin:15px 0;
min-height:120px;
}

textarea{
width:100%;
height:120px;
margin-top:10px;
background:#020617;
color:white;
border:1px solid #334155;
border-radius:8px;
padding:10px;
resize:none;
}

button{
padding:14px;
margin:6px 0;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
background:#2563eb;
color:white;
width:100%;
}

#skip-btn{
background:#334155;
}

#back-btn{
background:#334155;
}

#clear-btn{
background:#7c2d12;
}

.breath-circle{
width:100px;
height:100px;
border-radius:50%;
background:radial-gradient(circle,#60a5fa,#1d4ed8);
margin:15px auto;
}

</style>
</head>

<body>

<div id="app">

<div id="logo">KaMiZen</div>
<div id="subtitle">Entrenamiento mental</div>

<div id="mental-panel">

<div id="streak">Racha 0</div>

Disciplina
<div class="bar">
<div id="disciplina-bar" class="bar-fill"></div>
</div>

Claridad
<div class="bar">
<div id="claridad-bar" class="bar-fill"></div>
</div>

Calma
<div class="bar">
<div id="calma-bar" class="bar-fill"></div>
</div>

</div>

<div id="block">

Listo para iniciar

</div>

<button id="start-btn">Iniciar sesión</button>

<button id="next-btn" style="display:none">Siguiente</button>

<button id="back-btn" style="display:none">Atrás</button>

<button id="skip-btn" style="display:none">Continuar</button>

<button id="clear-btn" style="display:none">Borrar lo escrito</button>

<button id="restart-btn" style="display:none">Finalizar sesión</button>

</div>

<script src="/static/scripts.js"></script>

</body>
</html>
