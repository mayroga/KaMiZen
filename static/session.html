<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO: TOTAL LIFE TRAINING</title>

<style>
:root {
    --neon-blue:#00f2ff;
    --neon-green:#00ff41;
    --neon-red:#ff003c;
    --neon-yellow:#ffff00;
    --matrix-bg:#00050a;
    --neon-gold:#ffcc00;
}

body {
    margin:0;
    background:var(--matrix-bg);
    color:#fff;
    font-family:'Courier New', monospace;
    overflow:hidden;
    user-select:none;
}

/* HUD */
#hud {
    position:fixed;
    top:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px;
    z-index:50;
    box-sizing:border-box;
}

#timer-box {
    font-size:2.8rem;
    color:var(--neon-blue);
}

#score-box {
    border:3px solid #fff;
    padding:8px 20px;
}

/* STATS */
#life-stats {
    position:fixed;
    bottom:20px;
    left:20px;
    display:flex;
    gap:12px;
}

/* FLOATING WORDS (engine controls content) */
.floating {
    position:absolute;
    padding:15px 30px;
    font-size:1.5rem;
    background:rgba(0,0,0,0.9);
    cursor:pointer;
    animation:floatUp 7s linear forwards;
}

.word-power { border:3px solid var(--neon-green); color:var(--neon-green); }
.word-risk { border:3px solid var(--neon-red); color:var(--neon-red); }
.word-silence { border:3px solid var(--neon-yellow); color:var(--neon-yellow); }
.word-money { border:3px solid var(--neon-gold); color:var(--neon-gold); }
.word-business { border:3px solid #00e5ff; color:#00e5ff; }
.word-growth { border:3px solid #00ff99; color:#00ff99; }

@keyframes floatUp {
    from { transform:translateY(110vh); }
    to { transform:translateY(-25vh); }
}

.explode {
    animation:blast 0.5s ease-out forwards!important;
}

@keyframes blast {
    0% { transform:scale(1); opacity:1; }
    100% { transform:scale(4); opacity:0; }
}

/* OVERLAY */
#overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:100;
}

.choice-btn {
    margin:10px;
    padding:20px;
    border:2px solid var(--neon-blue);
    background:none;
    color:#fff;
}

#breath-circle{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid var(--neon-blue);
    display:none;
    align-items:center;
    justify-content:center;
}

</style>
</head>

<body>

<div id="hud">
    <div id="timer-box">00:00</div>
    <div id="score-box">0</div>
</div>

<div id="life-stats">
    <div>Respect: <span id="v-respect">50</span></div>
    <div>Peace: <span id="v-peace">50</span></div>
    <div>Lead: <span id="v-lead">50</span></div>
    <div>Money: <span id="v-money">100</span></div>
    <div>Safety: <span id="v-safety">100</span></div>
</div>

<div id="breath-circle"></div>

<div id="overlay">
    <h1 id="phase-title"></h1>
    <p id="phase-desc"></p>
    <div id="decision-grid"></div>
    <button onclick="document.getElementById('overlay').style.display='none'">
        CONTINUE
    </button>
</div>

<script src="/static/engine.js"></script>

<script>

/* =========================
   UI ONLY BRIDGE (NO LOGIC)
========================= */

function updateHUD(){
    if(!window.KamizenEngine) return;

    const s = KamizenEngine.state;

    document.getElementById("score-box").innerText = s.score;

    let m = Math.floor((s.floatTimer || s.timer || 0)/60);
    let sec = (s.floatTimer || s.timer || 0)%60;

    document.getElementById("timer-box").innerText =
        String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");

    let stats = s.stats;
    for(let k in stats){
        let el = document.getElementById("v-"+k);
        if(el) el.innerText = stats[k];
    }
}

/* BREATH ONLY VISUAL */
function breathCycle(type){
    let c = document.getElementById("breath-circle");
    c.style.display="flex";
    c.innerText = type.toUpperCase();
}

/* WORDS ONLY VISUAL (ENGINE DECIDES LOGIC) */
function spawnWord(){
    if(!window.KamizenEngine) return;
    if(KamizenEngine.state.lockInput) return;

    const types=["power","risk","silence","money","business","growth"];
    const c=types[Math.floor(Math.random()*types.length)];

    let d=document.createElement("div");
    d.className="floating word-"+c;
    d.innerText=c.toUpperCase();

    d.style.left=Math.random()*80+"vw";

    d.onclick=()=>{
        KamizenEngine.applyWord(c);
        d.classList.add("explode");
        setTimeout(()=>d.remove(),400);
        updateHUD();
    };

    document.body.appendChild(d);
    setTimeout(()=>d.remove(),7000);
}

/* SYNC LOOP ONLY */
setInterval(()=>{
    if(!window.KamizenEngine) return;

    updateHUD();

    if(KamizenEngine.state.phase==="SILENCE"){
        breathCycle("inhale");
    }

},500);

updateHUD();

</script>

</body>
</html>
