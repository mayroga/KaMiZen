<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaMiZen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
        body{background:#020617;color:white;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;transition:background 1s;}
        #app{width:95%;max-width:420px;background:#111827;border-radius:25px;padding:25px;box-shadow:0 20px 40px rgba(0,0,0,0.6);display:flex;flex-direction:column;align-items:center;}
        #logo{font-size:28px;font-weight:600;background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px;}
        #subtitle{font-size:12px;opacity:0.6;margin-bottom:15px;}
        #mental-panel{width:100%;background:#020617;padding:15px;border-radius:15px;margin-bottom:20px;}
        .stat{font-size:13px;margin-bottom:8px;}
        .bar{height:6px;background:#1e293b;border-radius:10px;margin-top:4px;overflow:hidden;}
        .bar-fill{height:100%;background:#3b82f6;width:0%;transition:width 0.5s;}
        #block{font-size:19px;line-height:1.5;text-align:center;margin:20px 0;min-height:140px;display:flex;flex-direction:column;justify-content:center;align-items:center;}
        button{padding:15px;margin:10px 0;font-size:16px;border:none;border-radius:12px;cursor:pointer;background:#2563eb;color:white;width:100%;transition:0.3s;}
        button:hover{background:#3b82f6;transform:translateY(-2px);}
        .option-btn{background:#374151;margin:5px 0;}
        #skip-btn{background:transparent; color:#64748b; font-size:12px; padding:5px; border:1px solid #334155; margin-top:5px; width:auto; min-width:100px;}
        .breath-circle{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,#60a5fa,#1d4ed8);margin:20px auto;transition:transform 4s ease-in-out;}
        #footer{font-size:11px;opacity:0.4;margin-top:10px;text-align:center;}
    </style>
</head>
<body>
    <div id="app">
        <div id="logo">KaMiZen</div>
        <div id="subtitle">Asesoría Mental de Alto Peso</div>
        <div id="mental-panel">
            <div id="streak" class="stat">🔥 Racha: 0 días</div>
            <div id="level" class="stat">Nivel: 1</div>
            <div class="stat">Disciplina <div class="bar"><div id="disciplina-bar" class="bar-fill"></div></div></div>
            <div class="stat">Claridad <div class="bar"><div id="claridad-bar" class="bar-fill"></div></div></div>
            <div class="stat">Calma <div class="bar"><div id="calma-bar" class="bar-fill"></div></div></div>
        </div>
        <div id="block">Bienvenido al Entrenamiento</div>
        <button id="start-btn">Iniciar Sesión Diaria</button>
        <button id="next-btn" style="display:none;">Continuar</button>
        <button id="skip-btn" style="display:none;">Saltar bloque</button>
        <button id="restart-btn" style="display:none;background:#475569;">Finalizar Sesión</button>
        <div id="footer">Sistema KaMiZen · Conexión Segura</div>
    </div>
    <script src="/static/scripts.js"></script>
</body>
</html>
