<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>KaMiZen | Al Cielo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Estilos Globales */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: #000;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-position: center;
            background-repeat: no-repeat;
            background-size: 110%;
            /* Transición fluida para el imageBank */
            transition: background-image 3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Efecto de Zoom Infinito */
        .zoom-active {
            animation: infiniteZoom 25s ease-in-out infinite alternate;
        }

        @keyframes infiniteZoom {
            from { background-size: 110%; }
            to { background-size: 155%; }
        }

        /* Contenedor Principal (Glassmorphism) */
        #app {
            width: 92%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 35px;
            padding: 35px 25px;
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 75vh;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #logo {
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1.5px;
            margin-bottom: 5px;
        }

        #mental-panel {
            display: flex; 
            justify-content: space-around;
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            color: rgba(255,255,255,0.5); 
            margin-bottom: 25px;
        }

        #block-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        #text-content {
            font-size: 20px; 
            font-weight: 300; 
            line-height: 1.5;
            text-shadow: 0 2px 15px rgba(0,0,0,0.6);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Dinámica de Respiración */
        #breath-circle {
            width: 140px; 
            height: 140px;
            border-radius: 50%;
            border: 1px solid rgba(96, 165, 250, 0.4);
            background: rgba(96, 165, 250, 0.05);
            display: none; 
            justify-content: center; 
            align-items: center;
            position: relative;
            margin: 10px auto;
        }

        .breathing-anim {
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(0.9); background: rgba(96, 165, 250, 0.05); }
            50% { transform: scale(1.2); background: rgba(96, 165, 250, 0.2); box-shadow: 0 0 50px rgba(96,165,250,0.3); }
        }

        #timer-display {
            font-size: 42px; 
            font-weight: 600; 
            color: #60a5fa;
            position: absolute;
            z-index: 5;
        }

        #breathe-text {
            position: absolute;
            bottom: 25px;
            font-size: 9px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Botones y Acciones */
        #action-area {
            margin-top: 30px;
        }

        button {
            padding: 18px; 
            border: none; 
            border-radius: 22px;
            cursor: pointer; 
            background: #2563eb; 
            color: white;
            font-weight: 600; 
            font-size: 16px; 
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        button:active { transform: scale(0.98); }

        button:disabled { 
            background: rgba(255,255,255,0.05); 
            color: rgba(255,255,255,0.2);
            box-shadow: none;
            cursor: not-allowed;
        }

        .secondary { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            margin-top: 10px;
            box-shadow: none;
        }

        #lang-btn {
            width: auto; 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            padding: 6px 14px; 
            font-size: 11px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            z-index: 20;
        }

        /* Modal de Inactividad */
        #warning-modal {
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            z-index: 1000; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }

        .modal-content {
            text-align: center;
            max-width: 300px;
        }

        /* Animación para Quizzes */
        #quiz-options button {
            animation: fadeIn 0.5s ease forwards;
            margin-top: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ajustes Mobile */
        @media (max-height: 700px) {
            #app { padding: 25px 20px; min-height: 90vh; }
            #logo { font-size: 26px; }
            #text-content { font-size: 17px; }
            #breath-circle { width: 110px; height: 110px; }
            #timer-display { font-size: 32px; }
        }
    </style>
</head>
<body class="zoom-active">
    <audio id="bg-music" loop preload="auto"></audio>
    
    <div id="warning-modal">
        <div class="modal-content">
            <h2 style="color:#ef4444; margin-bottom:10px; letter-spacing: 2px;">INACTIVIDAD</h2>
            <p style="margin-bottom: 25px; font-weight: 300; color: rgba(255,255,255,0.7);">Toca la pantalla para continuar la sesión.</p>
            <button onclick="resetInactivity()">ESTOY AQUÍ</button>
        </div>
    </div>

    <div id="app">
        <button id="lang-btn">EN</button>
        
        <div id="header-meta">
            <div id="logo">KaMiZen</div>
            <div id="mental-panel">
                <span id="streak">Racha: 0</span>
                <span id="level-display">Lv. 1</span>
            </div>
        </div>

        <div id="block-container">
            <div id="text-content">Cargando sabiduría...</div>
            
            <div id="breath-circle">
                <div id="timer-display" style="display:none;">0</div>
                <span id="breathe-text">Respira</span>
            </div>
        </div>
        
        <div id="action-area">
            <button id="main-btn">EMPEZAR</button>
            <div style="display: flex; gap: 10px; margin-top: 12px;">
                <button id="back-btn" class="secondary" style="font-size: 11px; letter-spacing: 1px;">ATRÁS</button>
                <button id="fwd-btn" class="secondary" style="font-size: 11px; letter-spacing: 1px;">SALTAR</button>
            </div>
        </div>
    </div>

    <script src="/static/scripts.js"></script>
</body>
</html>
