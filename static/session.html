<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AL CIELO - NEURAL INTERFACE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
<style>
    :root {
        --neon-blue:#00f2ff; --neon-gold:#f1c40f; --neon-green:#2ecc71;
        --neon-purple:#9b59b6; --neon-red:#ff3131; --bg-dark:#020205;
    }
    body { margin:0; overflow:hidden; background:var(--bg-dark); color:white; font-family:'Orbitron', sans-serif; cursor: crosshair; }
    
    #hud {
        position:absolute; top:20px; width:100%; display:none;
        justify-content:space-evenly; z-index:100; pointer-events:none;
    }
    .data-box {
        background:rgba(0,0,0,0.9); border:2px solid var(--neon-blue);
        padding:10px 20px; text-align:center; box-shadow:0 0 25px rgba(0,242,255,0.4);
        min-width:140px; border-radius:5px;
    }
    .label { font-size:11px; color:var(--neon-blue); letter-spacing:2px; font-weight:900; display:block; }
    .value { font-size:26px; font-weight:900; display:block; color:#fff; }

    /* TERMINAL DE CARGA JSON */
    #terminal-overlay {
        position:fixed; inset:0; background:var(--bg-dark);
        display:flex; flex-direction:column; justify-content:center;
        align-items:center; z-index:2000; padding:40px; text-align:center;
    }
    .terminal-text {
        color: var(--neon-blue); font-size: 24px; margin: 15px;
        text-shadow: 0 0 20px var(--neon-blue); font-weight: 900;
        text-transform: uppercase;
    }
    .progress-bar {
        width: 80%; max-width: 600px; height: 8px; background: #111; 
        margin-top: 30px; border: 1px solid var(--neon-blue); position: relative;
    }
    #progress-fill { 
        width: 0%; height: 100%; background: var(--neon-blue); 
        box-shadow: 0 0 20px var(--neon-blue); transition: 0.4s linear; 
    }
    
    .start-btn {
        padding:25px 70px; background:var(--neon-blue); color:black; border:none;
        font-family:'Orbitron'; font-weight:900; cursor:pointer;
        letter-spacing:6px; box-shadow:0 0 40px var(--neon-blue); font-size: 22px;
        transition: 0.3s;
    }
    .start-btn:hover { transform: scale(1.05); background: #fff; }
    canvas { display:block; image-rendering: pixelated; }
</style>
</head>
<body>

<div id="hud">
    <div class="data-box" style="border-color:var(--neon-gold);"><span class="label">CAPITAL</span><span id="val-money" class="value">0</span></div>
    <div class="data-box" style="border-color:var(--neon-green);"><span class="label">STABILITY</span><span id="val-health" class="value">100%</span></div>
    <div class="data-box" style="border-color:var(--neon-purple);"><span class="label">BIZ UNITS</span><span id="val-biz" class="value">0</span></div>
</div>

<div id="terminal-overlay">
    <div id="init-view">
        <h1 style="color:var(--neon-blue);letter-spacing:18px;font-size:70px;margin:0;">AL CIELO</h1>
        <p style="letter-spacing:10px;color:var(--neon-gold);margin-bottom:50px;">AURA BY MAY ROGA LLC</p>
        <button class="start-btn" onclick="startSequence()">INITIALIZE NEURAL TRANSFER</button>
    </div>
    <div id="process-view" style="display:none;">
        <div id="status-tag" style="font-size:16px; color:var(--neon-gold); margin-bottom:15px; letter-spacing:4px;">ACCESSING JSON DATABASE...</div>
        <div id="main-log" class="terminal-text"></div>
        <div id="sub-log" style="font-size:18px; color:#ccc; max-width:700px; line-height:1.5;"></div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const hud = document.getElementById("hud");
const terminal = document.getElementById("terminal-overlay");
const mainLog = document.getElementById("main-log");
const subLog = document.getElementById("sub-log");
const progressFill = document.getElementById("progress-fill");

let stats = {money:0, health:100, biz:0};
let objects = [];
let particles = [];
let active = false;
let audioCtx;
const user = {x: innerWidth/2, y: innerHeight/2, size: 65};

// RECURSOS
let STORIES = [];
let MISSIONS = [];

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

async function startSequence() {
    initAudio();
    document.getElementById("init-view").style.display = "none";
    document.getElementById("process-view").style.display = "flex";
    
    try {
        // CARGA REAL DE ARCHIVOS
        const [sRes, mRes] = await Promise.all([
            fetch("stories.json").then(r => r.json()),
            fetch("missions.json").then(r => r.json())
        ]);
        
        STORIES = sRes.stories || [];
        MISSIONS = mRes.missions || [];
        
        mainLog.innerText = "DATA DETECTED";
    } catch (e) {
        console.error("Fallo de lectura:", e);
        mainLog.innerText = "LOCAL DATA OVERRIDE";
        STORIES = [{title: "CONOCIMIENTO VITAL", text: "Si el mundo no te enseña a invertir, tú debes aprender a hackear el sistema."}];
        MISSIONS = [{id: "LECCIÓN 01: EL FLUJO"}];
    }

    const total = STORIES.length + MISSIONS.length;
    let step = 0;

    // TRANSFERENCIA DE HISTORIAS
    for(let s of STORIES) {
        step++;
        mainLog.innerText = s.title;
        subLog.innerText = s.text || "...";
        progressFill.style.width = `${(step/total)*100}%`;
        playBeep(440 + (step * 20), "sine");
        await new Promise(r => setTimeout(r, 2800));
    }

    // TRANSFERENCIA DE MISIONES
    for(let m of MISSIONS) {
        step++;
        mainLog.innerText = `MISSION PROTOCOL: ${m.id}`;
        subLog.innerText = "Analizando objetivos de seguridad y activos...";
        progressFill.style.width = `${(step/total)*100}%`;
        playBeep(600, "square");
        await new Promise(r => setTimeout(r, 2800));
    }

    mainLog.innerText = "TRANSFER COMPLETE";
    subLog.innerText = "Neural Interface Ready. Optimize your future.";
    await new Promise(r => setTimeout(r, 2000));
    
    terminal.style.display = "none";
    hud.style.display = "flex";
    launchGame();
}

/* ===================== EFECTOS SENSORIALES ===================== */
function playBeep(freq, type) {
    if(!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.15, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.6);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.6);
}

function createExplosion(x, y, color) {
    for(let i=0; i<20; i++) {
        particles.push({
            x, y,
            vx: (Math.random()-0.5)*12,
            vy: (Math.random()-0.5)*12,
            life: 1.0,
            color: color,
            size: Math.random()*4 + 2
        });
    }
}

/* ===================== SIMULACIÓN DINÁMICA ===================== */
const rawData = [
    {text:"AHORRO", emoji:"💰", color:"#f1c40f", stat:"money", impact:500, freq:523},
    {text:"NEGOCIO", emoji:"🤝", color:"#3498db", stat:"biz", impact:1, freq:659},
    {text:"FAMILIA", emoji:"🏠", color:"#2ecc71", stat:"health", impact:20, freq:783},
    {text:"HAPPINESS", emoji:"😊", color:"#9b59b6", stat:"health", impact:15, freq:880},
    {text:"THREAT", emoji:"⚠️", color:"#ff3131", stat:"health", impact:-30, freq:110}
];

function spawn() {
    if(!active) return;
    const d = rawData[Math.floor(Math.random()*rawData.length)];
    objects.push({
        ...d,
        x: Math.random()*(innerWidth-150)+75,
        y: -60,
        speed: 3 + Math.random()*2.5
    });
}

function update() {
    if(!active) return;

    for(let i=objects.length-1; i>=0; i--) {
        let o = objects[i];
        o.y += o.speed;
        
        const dist = Math.hypot(o.x - user.x, o.y - user.y);
        
        if(dist < user.size + 15) {
            playBeep(o.freq, o.impact < 0 ? "sawtooth" : "sine");
            createExplosion(o.x, o.y, o.color);
            
            if(o.stat === "money") stats.money += o.impact;
            if(o.stat === "biz") stats.biz += o.impact;
            if(o.stat === "health") stats.health = Math.max(0, Math.min(100, stats.health + o.impact));
            
            objects.splice(i, 1);
            updateHUD();
        } else if (o.y > innerHeight + 100) {
            objects.splice(i, 1);
        }
    }

    particles.forEach((p, index) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.025;
        if(p.life <= 0) particles.splice(index, 1);
    });
}

function updateHUD() {
    document.getElementById("val-money").innerText = stats.money;
    document.getElementById("val-health").innerText = stats.health + "%";
    document.getElementById("val-biz").innerText = stats.biz;
}

function draw() {
    ctx.fillStyle = "rgba(2, 2, 5, 0.25)";
    ctx.fillRect(0, 0, innerWidth, innerHeight);
    
    // Partículas
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1.0;

    // Interface Cursor
    ctx.strokeStyle = "#00f2ff";
    ctx.lineWidth = 4;
    ctx.shadowBlur = 20;
    ctx.shadowColor = "#00f2ff";
    ctx.beginPath(); ctx.arc(user.x, user.y, user.size, 0, Math.PI*2); ctx.stroke();
    ctx.shadowBlur = 0;

    // Elementos Flotantes (Alta Visibilidad)
    objects.forEach(o => {
        ctx.shadowBlur = 15;
        ctx.shadowColor = o.color;
        
        // Avatar grande
        ctx.font = "50px Arial";
        ctx.textAlign = "center";
        ctx.fillText(o.emoji, o.x, o.y);
        
        // Texto Nítido
        ctx.fillStyle = o.color;
        ctx.font = "900 20px Orbitron";
        ctx.fillText(o.text, o.x, o.y + 45);
        ctx.shadowBlur = 0;
    });
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

function launchGame() {
    active = true;
    resize();
    setInterval(spawn, 850);
    loop();
}

function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }

window.addEventListener("resize", resize);
window.addEventListener("mousemove", e => { user.x = e.clientX; user.y = e.clientY; });
window.addEventListener("touchmove", e => {
    user.x = e.touches[0].clientX;
    user.y = e.touches[0].clientY;
    e.preventDefault();
}, {passive: false});

</script>
</body>
</html>
