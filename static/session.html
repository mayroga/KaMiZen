<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO: MATRIX TRAINING</title>

<style>
:root {
    --neon-blue:#00f2ff;
    --neon-green:#00ff41;
    --neon-red:#ff003c;
    --neon-yellow:#ffff00;
    --matrix-bg:#00050a;
}

body{
    margin:0;
    background:var(--matrix-bg);
    color:#fff;
    font-family:'Courier New', Courier, monospace;
    overflow:hidden;
    touch-action:manipulation;
    user-select:none;
}

body::before{
    content:" ";
    position:absolute;
    top:0;left:0;bottom:0;right:0;
    background:linear-gradient(rgba(18,16,16,0)50%,rgba(0,0,0,0.25)50%),
               linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06));
    background-size:100% 2px,3px 100%;
    pointer-events:none;
    z-index:100;
}

#hud{
    position:fixed;
    top:0;width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px;
    box-sizing:border-box;
    z-index:50;
}

#timer-box{
    font-size:2.5rem;
    color:var(--neon-blue);
    font-weight:bold;
}

#score-box{
    font-size:1.8rem;
    padding:5px 15px;
    border:3px solid #fff;
}

#mastery-lvl{
    font-size:1.5rem;
}

#social-panel{
    position:fixed;
    bottom:20px;left:50%;
    transform:translateX(-50%);
    width:90%;
    background:rgba(0,20,40,0.95);
    border:3px solid var(--neon-blue);
    padding:20px;
    display:none;
    z-index:400;
    text-align:center;
}

.floating{
    position:absolute;
    padding:12px 24px;
    font-weight:900;
    font-size:1.4rem;
    border-radius:8px;
    background:rgba(0,0,0,0.85);
    animation:floatUp 6s linear forwards;
}

.word-power{border:3px solid var(--neon-green);color:var(--neon-green);}
.word-risk{border:3px solid var(--neon-red);color:var(--neon-red);}
.word-silence{border:3px solid var(--neon-yellow);color:var(--neon-yellow);}

@keyframes floatUp{
    from{transform:translateY(110vh);}
    to{transform:translateY(-20vh);}
}

.explode{
    animation:blast .4s ease-out forwards !important;
}

@keyframes blast{
    to{transform:scale(4);opacity:0;}
}

.panel{
    position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%);
    background:#000;padding:40px;
    border:4px solid var(--neon-blue);
    display:flex;flex-direction:column;gap:20px;
}

button{
    background:transparent;
    color:var(--neon-blue);
    border:2px solid var(--neon-blue);
    padding:15px;
    font-size:1.2rem;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="hud">
    <div id="timer-box">05:00</div>
    <div id="mastery-lvl">MASTERY: x1</div>
    <div id="score-box">POINTS: 0</div>
</div>

<div id="main-menu" class="panel">
    <h1>KAMIZEN: AL CIELO</h1>
    <button onclick="startGame('en')">START TRAINING (EN)</button>
    <button onclick="startGame('es')">INICIAR ENTRENAMIENTO (ES)</button>
</div>

<div id="social-panel">
    <p id="social-text"></p>
    <div id="social-options"></div>
</div>

<audio id="snd-hit" src="/static/sounds/glass.mp3"></audio>
<audio id="snd-error" src="/static/sounds/trumpet.mp3"></audio>
<audio id="snd-click" src="/static/sounds/keypress.mp3"></audio>

<script>
let state={
    score:0,
    mastery:1,
    lang:'en',
    timeLeft:300,
};

const content={
en:{
missions:[
{q:"Friend ignored in group?",a:"Include them",b:"Ignore",win:"+RESPECT",fail:"-EMPATHY"},
{q:"You are insulted?",a:"Stay calm",b:"React angry",win:"+CONTROL",fail:"-CONTROL"},
{q:"Team fails?",a:"Encourage",b:"Blame",win:"+LEADERSHIP",fail:"-TEAM"},
{q:"Someone lies?",a:"Stay honest",b:"Lie back",win:"+INTEGRITY",fail:"-VALUES"},
{q:"You feel fear?",a:"Act anyway",b:"Avoid",win:"+COURAGE",fail:"-GROWTH"},
{q:"Friend succeeds?",a:"Celebrate",b:"Jealous",win:"+ABUNDANCE",fail:"-MINDSET"},
{q:"You lose money?",a:"Learn",b:"Blame",win:"+INTELLIGENCE",fail:"-EGO"},
{q:"Pressure rises?",a:"Breathe",b:"Panic",win:"+FOCUS",fail:"-CONTROL"},
{q:"You fail test?",a:"Retry",b:"Quit",win:"+DISCIPLINE",fail:"-WILL"},
{q:"Criticism?",a:"Listen",b:"Attack",win:"+GROWTH",fail:"-EGO"},
{q:"Late to meeting?",a:"Apologize",b:"Excuse",win:"+HONOR",fail:"-TRUST"},
{q:"Conflict?",a:"Resolve",b:"Escalate",win:"+SOCIAL SKILL",fail:"-CHAOS"},
{q:"Opportunity?",a:"Take it",b:"Wait",win:"+ACTION",fail:"-FEAR"},
{q:"Tired?",a:"Continue",b:"Stop",win:"+STRENGTH",fail:"-WEAKNESS"},
{q:"Criticized publicly?",a:"Stay calm",b:"Fight back",win:"+RESPECT",fail:"-IMAGE"},
{q:"Team wins?",a:"Share credit",b:"Take credit",win:"+LEADER",fail:"-EGO"},
{q:"See injustice?",a:"Act",b:"Ignore",win:"+COURAGE",fail:"-PASSIVE"},
{q:"Opportunity risky?",a:"Evaluate",b:"Avoid",win:"+GROWTH",fail:"-FEAR"},
{q:"Distraction?",a:"Refocus",b:"Follow it",win:"+DISCIPLINE",fail:"-LOSS"},
{q:"You doubt yourself?",a:"Trust process",b:"Quit",win:"+FAITH",fail:"-CONFIDENCE"},
{q:"Someone cries?",a:"Support",b:"Ignore",win:"+EMPATHY",fail:"-COLD"},
{q:"Argument?",a:"Listen",b:"Interrupt",win:"+RESPECT",fail:"-EGO"},
{q:"Hard choice?",a:"Think",b:"React",win:"+INTELLIGENCE",fail:"-IMPULSE"},
{q:"Anger?",a:"Control",b:"Explode",win:"+POWER",fail:"-LOSS"},
{q:"Alone time?",a:"Reflect",b:"Escape",win:"+WISDOM",fail:"-DISTRACTION"}
],
words:{
power:["WILL","VISION","HONOR","COURAGE","BUILD","RISE","FAITH","DISCIPLINE","STRENGTH","VICTORY"],
risk:["NOISE","EXCUSE","QUITTING","EGO","HATE","CHAOS","LAZY","FEAR","LIE","ANGER"],
silence:["CALM","LISTEN","WAIT","PEACE","PRAY","INSIDE","BREATHE","STILL","SOUL","FOCUS"]
}
},
es:{
missions:[...Array(25).keys()].map(i=>({q:"Situación social",a:"Correcto",b:"Incorrecto",win:"+BIEN",fail:"-MAL"})),
words:{
power:["VOLUNTAD","VISIÓN","HONOR","VALOR","CONSTRUIR","CRECER","FE","DISCIPLINA","FUERZA","VICTORIA"],
risk:["RUIDO","EXCUSA","RENDIRSE","EGO","ODIO","CAOS","PEREZA","MIEDO","MENTIRA","IRA"],
silence:["CALMA","ESCUCHA","ESPERA","PAZ","ORAR","INTERIOR","RESPIRA","QUIETO","ALMA","ENFOQUE"]
}
}
};

function startGame(l){
    state.lang=l;
    document.getElementById('main-menu').style.display='none';
    state.interval=setInterval(updateTimer,1000);
    state.spawnInterval=setInterval(spawnWord,1000);
    setTimeout(triggerSocialMission,10000);
}

function updateTimer(){
    state.timeLeft--;
    let m=Math.floor(state.timeLeft/60).toString().padStart(2,'0');
    let s=(state.timeLeft%60).toString().padStart(2,'0');
    document.getElementById('timer-box').innerText=`${m}:${s}`;
    if(state.timeLeft<=0)endGame();
}

function spawnWord(){
    const types=['power','risk','silence'];
    const cat=types[Math.floor(Math.random()*types.length)];

    const wordList=content[state.lang].words[cat];
    const text=wordList[Math.floor(Math.random()*wordList.length)];

    const div=document.createElement('div');
    div.className=`floating word-${cat}`;
    div.innerText=text;

    div.style.left=Math.random()*80+"vw";

    div.onclick=()=>{
        div.classList.add('explode');
        document.getElementById('snd-click').play();

        if(cat==='risk'){
            state.score-=30;
            document.getElementById('snd-error').play();
        }else{
            state.score+=15;
            document.getElementById('snd-hit').play();
        }

        document.getElementById('score-box').innerText=`POINTS: ${state.score}`;
        setTimeout(()=>div.remove(),300);
    };

    document.body.appendChild(div);
    setTimeout(()=>div.remove(),6000);
}

function triggerSocialMission(){
    const m=content[state.lang].missions[Math.floor(Math.random()*content[state.lang].missions.length)];
    document.getElementById('social-text').innerText=m.q;
    document.getElementById('social-options').innerHTML=`
    <button onclick="resolve(true,'${m.win}')">${m.a}</button>
    <button onclick="resolve(false,'${m.fail}')">${m.b}</button>`;
    document.getElementById('social-panel').style.display='block';
}

function resolve(c,msg){
    if(c){state.score+=100;}
    else{state.score-=50;}
    alert(msg);
    document.getElementById('social-panel').style.display='none';
}

function endGame(){
    alert("FINAL SCORE: "+state.score);
    location.reload();
}
</script>

</body>
</html>
