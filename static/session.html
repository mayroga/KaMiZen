<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | ENGINE V5</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
overflow:hidden;
text-align:center;
}

/* TOP BAR */
#topbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:10px;
z-index:5;
}

/* GAME AREA */
#game{
padding-top:60px;
}

/* BREATH */
#breath{
width:120px;
height:120px;
border-radius:50%;
margin:20px auto;
background:#00f2ff;
transition:3s;
}

/* FLOATING WORDS */
.floating{
position:absolute;
color:#00f2ff;
animation:float 4s linear;
opacity:0.8;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* OPTIONS */
button{
padding:12px 18px;
margin:8px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

/* FULL SCREEN FEEDBACK */
#feedback{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:28px;
font-weight:bold;
z-index:999;
color:#fff;
}

#feedback.good{background:rgba(0,255,0,0.85);}
#feedback.bad{background:rgba(255,0,0,0.75);}

/* POWER BAR */
#powers{
position:fixed;
bottom:10px;
width:100%;
display:flex;
justify-content:center;
gap:20px;
font-size:14px;
}

.power{
padding:6px 10px;
background:#111;
border:1px solid #333;
border-radius:6px;
}
</style>
</head>

<body>

<div id="topbar">
<button onclick="toggleLang()">LANG</button>
<button onclick="startSilence()">SILENCE</button>
</div>

<div id="game">

<h1>KAMIZEN ENGINE</h1>
<h2 id="hero"></h2>

<div id="breath"></div>

<div id="story"></div>
<div id="analysis"></div>

<div id="options"></div>

</div>

<!-- FEEDBACK SCREEN -->
<div id="feedback"></div>

<!-- POWER SYSTEM -->
<div id="powers">
<div class="power">FOCUS: <span id="p_focus">0</span></div>
<div class="power">DISCIPLINE: <span id="p_discipline">0</span></div>
<div class="power">WISDOM: <span id="p_wisdom">0</span></div>
</div>

<!-- AUDIO -->
<audio id="bg" loop src="static/sounds/bg.mp3"></audio>
<audio id="ok" src="static/sounds/success.mp3"></audio>
<audio id="bad" src="static/sounds/glass.mp3"></audio>

<script src="engine.js"></script>

<script>
let missionId = 1;
let usedMissions = new Set();
let currentMission = null;
let lang = "en";

// POWER SYSTEM
let power = {
focus:0,
discipline:0,
wisdom:0
};

// =====================
// INIT
// =====================
async function init(){

let name = prompt("Enter name");
let hero = prompt("Hero name");

document.getElementById("hero").innerText = hero;

KamizenEngine.AudioManager.init();
KamizenEngine.FloatingSystem.start();

loadMission();
}

// =====================
// LOAD MISSION (NO REPEAT)
// =====================
async function loadMission(){

// anti-repeat system
if(usedMissions.has(missionId)){
missionId++;
if(missionId > 35) missionId = 1;
}

usedMissions.add(missionId);

const m = await KamizenEngine.MissionSystem.loadMission(missionId);
currentMission = m;

if(!m) return;

KamizenEngine.setState({ currentMission: m });

// floating words sync
if(m.ui?.floating_words){
KamizenEngine.setState({ floatingWords: m.ui.floating_words });
}

// render
render(m);
}

// =====================
// RENDER
// =====================
function render(m){

let story = m.blocks.find(b=>b.type==="story");
let analysis = m.blocks.find(b=>b.type==="analysis");
let decision = m.blocks.find(b=>b.type==="decision");

document.getElementById("story").innerText = story.text[lang];

setTimeout(()=>{
document.getElementById("analysis").innerText = analysis.text[lang];
},2500);

setTimeout(()=>{
renderOptions(decision.options);
},4500);
}

// =====================
// OPTIONS (4 RANDOMIZED)
// =====================
function renderOptions(options){

let o = document.getElementById("options");
o.innerHTML = "";

// shuffle + ensure correct included
let shuffled = [...options].sort(()=>Math.random()-0.5);

// force 4 options max
shuffled = shuffled.slice(0,4);

shuffled.forEach(opt=>{
let btn = document.createElement("button");
btn.innerText = opt.text[lang];

btn.onclick = ()=>handleAnswer(opt.correct, opt);

o.appendChild(btn);
});
}

// =====================
// ANSWER SYSTEM
// =====================
async function handleAnswer(correct, opt){

KamizenEngine.LockSystem.lock();

if(correct){
KamizenEngine.AudioManager.play("ok");
showFeedback(true);

power.focus += 10;
power.wisdom += 5;

KamizenEngine.Speech.speak("Correct choice");
}else{
KamizenEngine.AudioManager.play("bad");
showFeedback(false);

power.discipline += 5;

KamizenEngine.Speech.speak("Wrong choice");
}

updatePower();

// TVid SYSTEM
await KamizenEngine.TVidEngine.run(currentMission, correct);

// NEXT MISSION
missionId++;
loadMission();

KamizenEngine.LockSystem.unlock();
}

// =====================
// FEEDBACK CINEMATIC
// =====================
function showFeedback(good){

let f = document.getElementById("feedback");

f.className = good ? "good" : "bad";
f.style.display = "flex";

f.innerText = good ? "GOOD CHOICE" : "WRONG CHOICE";

setTimeout(()=>{
f.style.display = "none";
},1200);
}

// =====================
// POWER UPDATE
// =====================
function updatePower(){
document.getElementById("p_focus").innerText = power.focus;
document.getElementById("p_discipline").innerText = power.discipline;
document.getElementById("p_wisdom").innerText = power.wisdom;
}

// =====================
// LANGUAGE
// =====================
function toggleLang(){
lang = lang==="en"?"es":"en";
loadMission();
}

// =====================
// SILENCE MODE
// =====================
async function startSilence(){

await KamizenEngine.SilenceSystem.start(10);
}

// =====================
// BREATH VISUAL SYNC
// =====================
setInterval(()=>{
let b = document.getElementById("breath");

if(!b) return;

b.style.transform = b.style.transform === "scale(1.5)" ? "scale(1)" : "scale(1.5)";
},3000);

// =====================
init();
</script>

</body>
</html>
