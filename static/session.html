<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO: TOTAL LIFE TRAINING</title>

<style>
:root {
    --neon-blue:#00f2ff; --neon-green:#00ff41; --neon-red:#ff003c;
    --neon-yellow:#ffff00; --matrix-bg:#00050a; --neon-gold:#ffcc00;
}

body {
    margin:0;
    background:var(--matrix-bg);
    color:#fff;
    font-family:'Courier New', monospace;
    overflow:hidden;
    user-select:none;
    transition: background 0.25s ease;
}

/* ALERT */
#security-alert {
    position: fixed; top:0; left:0; width:100%; height:8px;
    background:var(--neon-green);
    z-index:1000;
}

/* LANG */
#lang-btn {
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:999;
    padding:10px 18px;
    border:2px solid var(--neon-blue);
    background:rgba(0,0,0,0.8);
    color:var(--neon-blue);
    cursor:pointer;
    font-weight:bold;
}

/* HUD */
#hud {
    position:fixed;
    top:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px;
    z-index:50;
    box-sizing:border-box;
}

#timer-box {
    font-size:2.5rem;
    color:var(--neon-blue);
    text-shadow:0 0 20px var(--neon-blue);
}

#score-box {
    border:3px solid #fff;
    padding:8px 20px;
    font-size:1.6rem;
}

/* STATS */
#life-stats {
    position:fixed;
    bottom:70px;
    left:20px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.stat-pill {
    border:1px solid #333;
    padding:8px 12px;
}

/* WORDS */
.floating {
    position:absolute;
    padding:15px 25px;
    font-weight:bold;
    font-size:1.2rem;
    border-radius:10px;
    background:rgba(0,0,0,0.85);
    cursor:pointer;
    animation:floatUp 6s linear forwards;
}

@keyframes floatUp {
    from { transform:translateY(110vh); }
    to { transform:translateY(-20vh); }
}

.word-power { border:2px solid var(--neon-green); color:var(--neon-green); }
.word-risk { border:2px solid var(--neon-red); color:var(--neon-red); }
.word-silence { border:2px solid var(--neon-yellow); color:var(--neon-yellow); }

.explode {
    animation:blast 0.4s ease-out forwards;
}

@keyframes blast {
    0% { transform:scale(1); opacity:1; }
    100% { transform:scale(4); opacity:0; }
}

/* OVERLAY */
#overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,5,10,0.95);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:500;
    text-align:center;
    padding:20px;
}

#decision-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:20px;
    width:100%;
    max-width:700px;
}

.choice-btn {
    padding:18px;
    border:2px solid var(--neon-blue);
    background:none;
    color:#fff;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="security-alert"></div>
<button id="lang-btn" onclick="toggleLang()">EN</button>

<div id="hud">
    <div id="timer-box">05:00</div>
    <div id="score-box">0</div>
</div>

<div id="life-stats">
    <div class="stat-pill">Respect <span id="v-respect">50</span></div>
    <div class="stat-pill">Peace <span id="v-peace">50</span></div>
    <div class="stat-pill">Leadership <span id="v-lead">50</span></div>
    <div class="stat-pill">Money <span id="v-money">100</span></div>
    <div class="stat-pill">Safety <span id="v-safety">100</span></div>
    <div class="stat-pill">Happiness <span id="v-happy">50</span></div>
</div>

<div id="overlay">
    <h1 id="phase-title"></h1>
    <p id="phase-desc"></p>

    <div id="decision-grid"></div>

    <!-- CONTINUAR BOTÓN -->
    <button id="continue-btn" style="display:none;margin-top:20px;padding:12px 20px;border:2px solid #fff;background:none;color:#fff;">
        CONTINUE
    </button>
</div>

<script>
/* ================= WORD SYSTEM ================= */
const words = {
power:["LISTEN FIRST","STAY CALM","THINK BEFORE","CONTROL EMOTION","RESPECT OTHERS","ASK WHY","FOCUS NOW","BE HONEST"],
risk:["REACT ANGRY","BLAME OTHERS","LIE TO WIN","LOSE CONTROL","FOLLOW CROWD","ACT WITHOUT THINK"],
silence:["OBSERVE PEOPLE","READ SITUATION","WAIT RIGHT MOMENT","CONTROL IMPULSE","THINK LONG TERM"]
};

/* ================= EXPLANATIONS ================= */
const explanations = [
"Calm control improves decisions.",
"Reaction creates mistakes.",
"Observation gives advantage.",
"Respect builds trust.",
"Thinking prevents loss.",
"Silence increases awareness."
];

/* ================= STATE ================= */
let lang="en";
let gameMode="idle";

let state={
score:0,
timer:300,
stats:{respect:50,peace:50,lead:50,money:100,happy:50,safety:100},
spawnRate:1200
};

/* ================= TIMER (FIX REAL) ================= */
setInterval(()=>{
if(state.timer>0){
state.timer--;
updateHUD();
}
},1000);

/* ================= LANGUAGE ================= */
function toggleLang(){
lang = (lang==="en")?"es":"en";
document.getElementById("lang-btn").innerText=lang.toUpperCase();
}

/* ================= SPEAK ================= */
function speak(t){
let msg=new SpeechSynthesisUtterance(t);
msg.lang=lang==="en"?"en-US":"es-ES";
speechSynthesis.cancel();
speechSynthesis.speak(msg);
}

/* ================= HUD ================= */
function updateHUD(){
document.getElementById("score-box").innerText=state.score;

document.getElementById("timer-box").innerText=
String(Math.floor(state.timer/60)).padStart(2,"0")+":"+
String(state.timer%60).padStart(2,"0");

document.getElementById("v-respect").innerText=state.stats.respect;
document.getElementById("v-peace").innerText=state.stats.peace;
document.getElementById("v-lead").innerText=state.stats.lead;
document.getElementById("v-money").innerText=state.stats.money;
document.getElementById("v-safety").innerText=state.stats.safety;
document.getElementById("v-happy").innerText=state.stats.happy;
}

/* ================= WORDS ================= */
function spawnWord(){
if(gameMode!=="words")return;

let c=["power","risk","silence"][Math.floor(Math.random()*3)];

let div=document.createElement("div");
div.className="floating word-"+c;
div.innerText=words[c][Math.floor(Math.random()*words[c].length)];
div.style.left=Math.random()*80+"vw";

div.onclick=()=>{
div.classList.add("explode");

if(c==="power"){
state.score+=20;
state.stats.respect++;
state.stats.lead++;
}
if(c==="risk"){
state.score-=30;
state.stats.safety--;
}
if(c==="silence"){
state.stats.peace++;
}

updateHUD();
setTimeout(()=>div.remove(),400);
};

document.body.appendChild(div);
setTimeout(()=>div.remove(),5000);
}

/* ================= QUESTION (FIX FULL FLOW) ================= */
function triggerQuestion(){

document.getElementById("overlay").style.display="flex";

let grid=document.getElementById("decision-grid");
let desc=document.getElementById("phase-desc");
let btnContinue=document.getElementById("continue-btn");

grid.innerHTML="";
btnContinue.style.display="none";

let options=[
{t:"BEST",s:10,c:"#00ff41"},
{t:"GOOD",s:5,c:"#ffcc00"},
{t:"WEAK",s:0,c:"#ff8800"},
{t:"BAD",s:-10,c:"#ff003c"}
];

options.forEach(o=>{
let btn=document.createElement("button");
btn.className="choice-btn";
btn.innerText=o.t;

btn.onclick=()=>{

document.body.style.background=o.c;

state.score+=o.s;

/* STATS LIVE */
if(o.s>0){state.stats.respect++;state.stats.lead++;}
else{state.stats.safety--;state.stats.peace--;}

updateHUD();

/* EXPLANATION */
let exp=explanations[Math.floor(Math.random()*explanations.length)];
desc.innerText=exp;
speak(exp);

/* STOP AUTO SKIP */
btnContinue.style.display="block";

btnContinue.onclick=()=>{
document.body.style.background="#00050a";
document.getElementById("overlay").style.display="none";
};

};

grid.appendChild(btn);
});

}

/* ================= LOOP FIX ================= */
async function loop(){

while(true){

gameMode="words";
let end=Date.now()+300000;

while(Date.now()<end){
spawnWord();
await new Promise(r=>setTimeout(r,state.spawnRate));
}

/* STOP BEFORE QUESTION */
await new Promise(r=>setTimeout(r,1000));
triggerQuestion();

/* WAIT USER */
await new Promise(r=>{
window.waitResolve=r;
document.getElementById("continue-btn").onclick=()=>{
if(window.waitResolve)window.waitResolve();
};
});

}

}

/* START */
updateHUD();
loop();

</script>

</body>
</html>
