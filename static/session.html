<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN SESSION</title>

<style>
body {
    margin: 0;
    background: #000;
    color: #00f2ff;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

#container {
    max-width: 700px;
    text-align: center;
}

button {
    margin: 10px;
    padding: 10px 20px;
    background: #00f2ff;
    border: none;
    color: #000;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #00c0cc;
}
</style>
</head>

<body>

<div id="container">
    <h1 id="theme"></h1>
    <p id="text"></p>
    <div id="options"></div>
</div>

<script>
let currentMission = 1
let currentBlock = 0
let blocks = []

// =========================
// LOAD MISSION (RAW)
// =========================
async function loadMission(id) {
    try {
        const res = await fetch(`/api/mission/${id}`)
        const data = await res.json()

        if (data.error) {
            document.getElementById("text").innerText = data.error
            return
        }

        blocks = data.blocks || []
        currentBlock = 0

        document.getElementById("theme").innerText = data.theme || ""

        renderBlock()

    } catch (e) {
        document.getElementById("text").innerText = "Error cargando misión"
    }
}

// =========================
// RENDER BLOCK (GENÉRICO)
// =========================
function renderBlock() {
    const block = blocks[currentBlock]
    if (!block) return

    const textEl = document.getElementById("text")
    const optionsEl = document.getElementById("options")

    optionsEl.innerHTML = ""

    // TEXTO (EN / ES automático)
    if (block.text) {
        textEl.innerText = block.text.es || block.text.en || ""
    }

    // DECISION
    if (block.type === "decision") {
        block.options.forEach(opt => {
            const btn = document.createElement("button")
            btn.innerText = opt.text.es || opt.text.en

            btn.onclick = () => {
                nextBlock()
            }

            optionsEl.appendChild(btn)
        })
    } else {
        // AUTO NEXT
        setTimeout(nextBlock, 2000)
    }
}

// =========================
// NEXT BLOCK
// =========================
function nextBlock() {
    currentBlock++

    if (currentBlock >= blocks.length) {
        nextMission()
    } else {
        renderBlock()
    }
}

// =========================
// NEXT MISSION
// =========================
async function nextMission() {
    try {
        const res = await fetch(`/api/next/${currentMission}`)
        const data = await res.json()

        currentMission = data.next

        loadMission(currentMission)

    } catch (e) {
        document.getElementById("text").innerText = "Error avanzando"
    }
}

// =========================
// START
// =========================
loadMission(currentMission)

</script>

</body>
</html>
