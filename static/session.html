<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO - KaMiZen System</title>
    <style>
        :root { --primary: #00d4ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; transition: background 0.5s; }
        
        /* Efectos de Feedback */
        .correct-flash { background: #002200 !important; }
        .wrong-flash { background: #220000 !important; }

        /* UI de Stats */
        #ui-layer { position: absolute; top: 20px; left: 20px; z-index: 10; width: 250px; }
        .stat-bar { background: #222; height: 10px; border-radius: 5px; margin-bottom: 10px; overflow: hidden; }
        .fill { height: 100%; transition: width 0.5s; }
        #bar-peace { background: var(--primary); }
        #bar-safety { background: #ffaa00; }
        #timer-box { font-size: 2rem; font-weight: bold; color: var(--primary); }

        /* Pantalla de Misión (Overlay) */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px;
        }
        #phase-title { color: var(--primary); font-size: 1.5rem; margin-bottom: 10px; text-transform: uppercase; }
        #phase-desc { font-size: 1.2rem; max-width: 600px; margin-bottom: 30px; line-height: 1.5; }
        
        #decision-grid { display: grid; gap: 15px; width: 100%; max-width: 500px; }
        .choice-btn { 
            background: transparent; border: 2px solid var(--primary); color: white; 
            padding: 15px; font-size: 1rem; cursor: pointer; border-radius: 8px; transition: 0.3s;
        }
        .choice-btn:hover { background: var(--primary); color: black; }

        /* Palabras Flotantes */
        .word-float { 
            position: absolute; color: rgba(255,255,255,0.3); font-weight: bold; 
            cursor: pointer; user-select: none; animation: floatUp 6s linear forwards; 
        }
        @keyframes floatUp { from { transform: translateY(100vh); } to { transform: translateY(-10vh); } }

        /* Respiración */
        #breath-circle {
            display: none; width: 200px; height: 200px; border-radius: 50%;
            border: 5px solid var(--primary); align-items: center; justify-content: center;
            position: relative; margin-top: 20px;
        }
        .inhale-anim { animation: pulse 4s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.5); } }
        #breath-timer { font-size: 2rem; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="timer-box">05:00</div>
        <div>PAZ INTERIOR</div>
        <div class="stat-bar"><div id="bar-peace" class="fill" style="width: 50%;"></div></div>
        <div>SEGURIDAD</div>
        <div class="stat-bar"><div id="bar-safety" class="fill" style="width: 100%;"></div></div>
    </div>

    <!-- Capa de Misión -->
    <div id="overlay">
        <div id="phase-title">SISTEMA INICIADO</div>
        <div id="phase-desc">Haz clic en cualquier lugar para comenzar el entrenamiento "AL CIELO"...</div>
        <div id="decision-grid"></div>

        <div id="breath-circle">
            <div id="breath-txt" style="position: absolute; top: -40px;">RESPIRA</div>
            <div id="breath-timer">4s</div>
        </div>
    </div>

    <!-- IMPORTANTE: Aquí llamamos al archivo que tú tienes -->
    <script src="/static/js/engine.js"></script>
</body>
</html>
