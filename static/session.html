<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | LIFE SIMULATOR</title>

<style>
body {
    margin:0;
    font-family: Arial Black, sans-serif;
    background:#000;
    color:#00f2ff;
    overflow:hidden;
}

#app {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#message {
    width:80%;
    max-width:800px;
    padding:25px;
    border:2px solid #00f2ff;
    background:rgba(0,0,0,0.9);
    text-align:center;
    font-size:20px;
    margin-bottom:20px;
    min-height:120px;
}

/* ===============================
   🫁 RESPIRATION CIRCLE
=============================== */
#breath {
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid #00f2ff;
    margin-bottom:20px;
    animation: breathe 6s infinite ease-in-out;
    opacity:0.6;
}

@keyframes breathe {
    0%   { transform: scale(0.8); opacity:0.3; }
    50%  { transform: scale(1.3); opacity:1; }
    100% { transform: scale(0.8); opacity:0.3; }
}

#stats {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:10px;
    width:80%;
    max-width:800px;
    margin-bottom:20px;
}

.box {
    border:1px solid #00f2ff;
    padding:10px;
    text-align:center;
}

#options {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    width:80%;
}

button {
    padding:12px;
    border:2px solid #00f2ff;
    background:black;
    color:#00f2ff;
    cursor:pointer;
    min-width:120px;
}
button:hover {
    background:#00f2ff;
    color:black;
}
</style>
</head>

<body>

<div id="app">

    <div id="stats">
        <div class="box">MENTAL <div id="mental">100</div></div>
        <div class="box">SOCIAL <div id="social">50</div></div>
        <div class="box">KARMA <div id="karma">0</div></div>
        <div class="box">DISCIPLINE <div id="disc">50</div></div>
    </div>

    <!-- 🫁 RESPIRACIÓN TVID -->
    <div id="breath"></div>

    <div id="message">Inicializando sistema...</div>

    <div id="options"></div>

</div>

<script>

// ===============================
// STATE
// ===============================
let session_id = localStorage.getItem("session_id");
let state = JSON.parse(localStorage.getItem("state") || "{}");

let currentEvent = null;
let locked = false;
let paused = false;

// ===============================
// INIT
// ===============================
window.onload = async function () {

    showMessage("Verificando sistema...");

    if (!session_id) {
        await startSession();
    } else {
        showMessage("Reconectando con tu vida...");
    }

    updateUI();
    renderButtons();

    setTimeout(() => {
        processEvent("start");
    }, 1200);
};

// ===============================
// START SESSION
// ===============================
async function startSession() {

    try {

        const profile = {
            age: 18,
            difficulty: 1,
            emotion: "neutral"
        };

        const res = await fetch("/start", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ profile })
        });

        const data = await res.json();

        session_id = data.session_id;
        localStorage.setItem("session_id", session_id);

        state = data.state || {};
        localStorage.setItem("state", JSON.stringify(state));

        // 🔊 VOZ INICIAL
        speak("Sistema Kamizen activado. Tu vida ha comenzado.");

        showMessage(data.narrative || "Sistema iniciado");

    } catch (e) {
        console.error(e);
        showMessage("ERROR: servidor no responde");
    }
}

// ===============================
// UI
// ===============================
function showMessage(t) {
    document.getElementById("message").innerText = t;

    speak(t); // 🔊 VOZ AUTOMÁTICA
}

function updateUI() {
    document.getElementById("mental").innerText = state.mental ?? 100;
    document.getElementById("social").innerText = state.social ?? 50;
    document.getElementById("karma").innerText = state.karma ?? 0;
    document.getElementById("disc").innerText = state.discipline ?? 50;
}

// ===============================
// 🔊 VOZ SYSTEM
// ===============================
function speak(text) {

    if (!window.speechSynthesis) return;

    let msg = new SpeechSynthesisUtterance(text);
    msg.lang = "es-ES";
    msg.rate = 1;
    msg.pitch = 1;

    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

// ===============================
// 🎬 EVENT ENGINE (CINEMÁTICO)
// ===============================
function processEvent(event) {

    if (paused) return;

    currentEvent = event;

    let msg = "";

    switch(event) {

        case "start":
            msg = "Todo parece normal… pero algo dentro de ti ya cambió.";
            break;

        case "tentacion":
            msg = "Una decisión pequeña puede cambiar todo tu sistema.";
            break;

        case "crisis":
            msg = "La presión se vuelve real. No puedes ignorarlo.";
            break;

        case "dinero":
            msg = "Oportunidad detectada… pero tiene consecuencias ocultas.";
            break;

        case "amor":
            msg = "Conexión emocional activa. Riesgo de apego detectado.";
            break;

        default:
            msg = "Estás dentro de un momento que define tu identidad.";
    }

    showMessage(msg);

    clearTimeout(window.auto);

    window.auto = setTimeout(() => {
        if (!locked) sendDecision("TDM");
    }, 9000);
}

// ===============================
// DECISION ENGINE
// ===============================
async function sendDecision(decision) {

    if (locked) return;
    locked = true;

    if (!session_id) {
        await startSession();
    }

    try {

        const res = await fetch("/judge", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                session_id,
                decision,
                context: currentEvent || "neutral"
            })
        });

        const data = await res.json();

        if (data.error) {
            showMessage("Reiniciando sistema...");
            localStorage.removeItem("session_id");
            session_id = null;
            await startSession();
            locked = false;
            return;
        }

        if (data.state) {
            state = data.state;
            localStorage.setItem("state", JSON.stringify(state));
        }

        updateUI();

        if (data.status === "end") {
            showMessage("FIN DEL CICLO HUMANO");
            speak("Sistema finalizado");
            return;
        }

        showMessage(data.narrative || "Tu decisión ha cambiado tu camino.");

        setTimeout(() => {
            processEvent("scene");
        }, 1500);

    } catch (err) {
        console.error(err);
        showMessage("ERROR DE CONEXIÓN");
    }

    setTimeout(() => locked = false, 700);
}

// ===============================
// BUTTONS
// ===============================
function renderButtons() {

    const c = document.getElementById("options");
    c.innerHTML = "";

    const map = [
        ["TDB","Equilibrio"],
        ["TDM","Impulso"],
        ["TDN","Creatividad"],
        ["TDP","Estructura"],
        ["TDG","Control"],
        ["TDK","Conexión"]
    ];

    map.forEach(([k,label]) => {
        const b = document.createElement("button");
        b.innerText = label;
        b.onclick = () => sendDecision(k);
        c.appendChild(b);
    });
}

</script>

</body>
</html>
