<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO | AURA BY MAY ROGA</title>
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #000;
            --accent: #ff00ff;
            --panel: rgba(0, 15, 30, 0.95);
            --danger: #ff4444;
            --success: #33ff33;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--neon);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-transform: uppercase;
        }

        #app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #001a1a 0%, #000 80%);
            position: relative;
        }

        /* HEADER & STATS */
        #header {
            position: absolute;
            top: 20px;
            width: 90%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #category-tag {
            font-size: 14px;
            letter-spacing: 5px;
            margin-bottom: 15px;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
            font-weight: bold;
            text-align: center;
        }

        #stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
        }

        .box {
            border: 1px solid var(--neon);
            background: rgba(0, 242, 255, 0.05);
            padding: 10px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.1);
        }

        .label { font-size: 9px; display: block; margin-bottom: 5px; opacity: 0.7; }
        .val { font-size: 22px; font-weight: bold; font-family: 'Courier New', monospace; }

        /* CIRCULO RESPIRATORIO */
        #breathing-circle {
            width: 150px;
            height: 150px;
            border: 4px solid var(--neon);
            border-radius: 50%;
            margin: 20px auto;
            display: none;
            box-shadow: 0 0 20px var(--neon);
            transition: transform 4s ease-in-out;
        }

        .inhale { transform: scale(1.8); background: rgba(0, 242, 255, 0.2); }
        .exhale { transform: scale(0.8); background: transparent; }

        /* TERMINAL AREA */
        #message-container {
            width: 85%;
            max-width: 850px;
            margin: 20px 0;
            text-align: center;
        }

        #timer {
            font-size: 40px;
            color: var(--accent);
            margin-bottom: 10px;
            display: none;
            font-family: 'Courier New', monospace;
        }

        #message {
            min-height: 180px;
            padding: 25px;
            border: 2px solid var(--neon);
            background: var(--panel);
            font-size: 18px;
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
            margin-bottom: 20px;
        }

        /* ACTIONS GRID */
        #options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 85%;
            max-width: 850px;
        }

        .opt-btn {
            padding: 18px;
            border: 1px solid var(--neon);
            background: transparent;
            color: var(--neon);
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .opt-btn:hover { background: var(--neon); color: var(--bg); box-shadow: 0 0 15px var(--neon); }

        /* CONTROLS */
        #controls { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; }
        .btn-ctrl { border: 1px solid var(--accent); color: var(--accent); font-size: 10px; padding: 8px 15px; background: transparent; cursor: pointer; }
        #speaker-icon { position: absolute; bottom: 20px; left: 20px; font-size: 24px; cursor: pointer; opacity: 0.6; }

        @media (max-width: 600px) {
            #stats { grid-template-columns: repeat(2, 1fr); }
            #options-container { grid-template-columns: 1fr; }
            #message { font-size: 15px; }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="header">
        <div id="category-tag">AL CIELO | AURA PROTOCOL</div>
        <div id="stats">
            <div class="box"><span class="label">MENTAL</span><span id="mental" class="val">100</span></div>
            <div class="box"><span class="label">SOCIAL</span><span id="social" class="val">80</span></div>
            <div class="box"><span class="label">KARMA</span><span id="karma" class="val">10</span></div>
            <div class="box"><span class="label">DISCIPLINE</span><span id="disc" class="val">50</span></div>
        </div>
    </div>

    <div id="message-container">
        <div id="timer">00:00</div>
        <div id="breathing-circle"></div>
        <div id="message">
            SYSTEM STANDBY...<br>
            [ CLICK TO CONNECT ]
        </div>
    </div>

    <div id="options-container">
        </div>

    <div id="speaker-icon" onclick="toggleVoice()">🔊</div>

    <div id="controls">
        <button class="btn-ctrl" onclick="toggleLanguage()">ES/EN</button>
        <button class="btn-ctrl" onclick="resetApp()" style="border-color: var(--danger); color: var(--danger);">RESET</button>
    </div>
</div>

<script>
    let session_id = localStorage.getItem("aura_sid");
    let current_lang = "en";
    let voice_enabled = true;
    let timer_interval = null;

    async function initSession() {
        const res = await fetch("/start", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ profile: {} })
        });
        const data = await res.json();
        session_id = data.session_id;
        localStorage.setItem("aura_sid", session_id);
        updateUI(data);
    }

    async function handleChoice(code) {
        const res = await fetch("/judge", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ session_id, decision: code })
        });
        const data = await res.json();
        updateUI(data);
    }

    function updateUI(data) {
        if (!data.state) return;
        
        // Actualizar Stats
        document.getElementById("mental").innerText = data.state.mental;
        document.getElementById("social").innerText = data.state.social;
        document.getElementById("karma").innerText = data.state.karma;
        document.getElementById("disc").innerText = data.state.discipline;

        const story = data.story;
        const text = current_lang === "en" ? story.text_en : story.text_es;
        document.getElementById("message").innerText = text;
        document.getElementById("category-tag").innerText = story.category;

        if (voice_enabled) speak(text);
        
        // Limpiar interfaz
        resetVisuals();

        // Lógica según tipo de bloque
        if (story.type === "breathing") {
            startBreathing(story.duration_sec);
        } else if (story.type === "silence_challenge") {
            startSilence(story.duration_sec);
        } else if (story.type === "tvid" || story.type === "quiz") {
            renderOptions(story.options);
        } else {
            // Botón "CONTINUE" para historias simples
            renderOptions([{ code: "TDB", text: { en: "CONTINUE", es: "CONTINUAR" } }]);
        }
    }

    function renderOptions(options) {
        const container = document.getElementById("options-container");
        container.innerHTML = "";
        options.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "opt-btn";
            btn.innerText = current_lang === "en" ? opt.text.en : opt.text.es;
            btn.onclick = () => handleChoice(opt.code);
            container.appendChild(btn);
        });
    }

    function startBreathing(seconds) {
        const circle = document.getElementById("breathing-circle");
        circle.style.display = "block";
        let elapsed = 0;
        const interval = setInterval(() => {
            circle.classList.toggle("inhale");
            elapsed += 4;
            if (elapsed >= seconds) {
                clearInterval(interval);
                handleChoice("TDB");
            }
        }, 4000);
    }

    function startSilence(seconds) {
        const timerDiv = document.getElementById("timer");
        timerDiv.style.display = "block";
        let remaining = seconds;
        
        timer_interval = setInterval(() => {
            let mins = Math.floor(remaining / 60);
            let secs = remaining % 60;
            timerDiv.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            remaining--;
            if (remaining < 0) {
                clearInterval(timer_interval);
                handleChoice("TDB");
            }
        }, 1000);
    }

    function resetVisuals() {
        document.getElementById("breathing-circle").style.display = "none";
        document.getElementById("timer").style.display = "none";
        document.getElementById("options-container").innerHTML = "";
        if (timer_interval) clearInterval(timer_interval);
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const ut = new SpeechSynthesisUtterance(text);
        ut.lang = current_lang === "en" ? "en-US" : "es-US";
        window.speechSynthesis.speak(ut);
    }

    function toggleLanguage() {
        current_lang = current_lang === "en" ? "es" : "en";
        initSession(); // Reinicia para actualizar textos
    }

    function toggleVoice() {
        voice_enabled = !voice_enabled;
        document.getElementById("speaker-icon").innerText = voice_enabled ? "🔊" : "🔇";
    }

    function resetApp() {
        localStorage.clear();
        location.reload();
    }

    document.getElementById("message").onclick = () => {
        if (!session_id) initSession();
    };
</script>
</body>
</html>
