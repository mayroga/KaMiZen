<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KaMiZen</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Inter',sans-serif;
}

body{
background:#0b1020;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#app{
width:95%;
max-width:420px;
background:#111827;
padding:20px;
border-radius:20px;
}

#block{
text-align:center;
font-size:1.4em;
min-height:120px;
margin:20px 0;
}

button{
width:100%;
padding:14px;
margin:6px 0;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

.secondary{
background:#374151;
}

.bar{
height:8px;
background:#222;
border-radius:10px;
}

.bar-fill{
height:8px;
background:#22c55e;
width:40%;
border-radius:10px;
}

#lang-btn{
background:#9333ea;
}

</style>

</head>

<body>

<div id="app">

<h2>KaMiZen</h2>

<button id="lang-btn">EN/ES</button>

<div id="streak"></div>
<div id="level"></div>

<div>Discipline<div class="bar"><div id="disciplina-bar" class="bar-fill"></div></div></div>
<div>Clarity<div class="bar"><div id="claridad-bar" class="bar-fill"></div></div></div>
<div>Calm<div class="bar"><div id="calma-bar" class="bar-fill"></div></div></div>

<div id="block">Loading...</div>

<button id="start-btn">Start</button>
<button id="next-btn" style="display:none;">Next</button>
<button id="back-btn">Back</button>
<button id="forward-btn">Forward</button>
<button id="restart-btn" class="secondary" style="display:none;">Restart</button>

</div>

<script src="/static/scripts.js"></script>

</body>
</html>
