<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | LIFE SIMULATOR</title>

<style>
body {
    margin:0;
    font-family: Arial Black, sans-serif;
    background:#000;
    color:#00f2ff;
    overflow:hidden;
}

#app {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#message {
    width:80%;
    max-width:800px;
    padding:20px;
    border:2px solid #00f2ff;
    background:rgba(0,0,0,0.85);
    text-align:center;
    font-size:18px;
    margin-bottom:20px;
}

#stats {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:10px;
    width:80%;
    max-width:800px;
    margin-bottom:20px;
}

.box {
    border:1px solid #00f2ff;
    padding:10px;
    text-align:center;
}

#options {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    width:80%;
}

button {
    padding:12px;
    border:2px solid #00f2ff;
    background:black;
    color:#00f2ff;
    cursor:pointer;
}
button:hover {
    background:#00f2ff;
    color:black;
}
</style>
</head>

<body>

<div id="app">

    <div id="stats">
        <div class="box">MENTAL <div id="mental">100</div></div>
        <div class="box">SOCIAL <div id="social">50</div></div>
        <div class="box">KARMA <div id="karma">0</div></div>
        <div class="box">DISCIPLINE <div id="disc">50</div></div>
    </div>

    <div id="message">Inicializando sistema...</div>

    <div id="options"></div>

</div>

<audio id="audio" loop></audio>

<script>

// ===============================
// STATE SAFE SYSTEM (AUTO RECOVERY)
// ===============================
let session_id = localStorage.getItem("session_id");
let state = JSON.parse(localStorage.getItem("state") || "{}");

let currentEvent = null;
let locked = false;
let paused = false;

// ===============================
// AUTO START (CRITICAL FIX)
// ===============================
window.onload = async function init() {

    showMessage("Verificando sesión...");

    if (!session_id) {
        await startSession();   // 🔥 CREA SESIÓN SI NO EXISTE
    } else {
        showMessage("Sesión encontrada. Cargando mundo...");
    }

    updateUI();
    renderButtons();

    setTimeout(() => {
        processEvent("start");
    }, 800);
};

// ===============================
// START SESSION (FIXED CALL)
// ===============================
async function startSession() {

    try {

        const profile = {
            age: 18,
            difficulty: 1,
            emotion: "neutral"
        };

        const res = await fetch("/start", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ profile })
        });

        const data = await res.json();

        if (!data.session_id) {
            showMessage("ERROR: no se pudo iniciar sesión");
            return;
        }

        session_id = data.session_id;
        localStorage.setItem("session_id", session_id);

        state = data.state || {};
        localStorage.setItem("state", JSON.stringify(state));

        showMessage(data.narrative || "Sistema iniciado");

    } catch (e) {
        console.error(e);
        showMessage("ERROR CONECTANDO CON SERVIDOR");
    }
}

// ===============================
// UI
// ===============================
function showMessage(t) {
    document.getElementById("message").innerText = t;
}

function updateUI() {
    document.getElementById("mental").innerText = state.mental ?? 100;
    document.getElementById("social").innerText = state.social ?? 50;
    document.getElementById("karma").innerText = state.karma ?? 0;
    document.getElementById("disc").innerText = state.discipline ?? 50;
}

// ===============================
// EVENT ENGINE
// ===============================
function processEvent(event) {

    if (paused) return;

    currentEvent = event;

    let msg = "Decisión en progreso...";

    switch(event) {
        case "tentacion":
            msg = "Algo intenta desviarte del camino.";
            break;
        case "crisis":
            msg = "Presión inmediata en tu entorno.";
            break;
        case "dinero":
            msg = "Oportunidad financiera detectada.";
            break;
        case "amor":
            msg = "Conexión emocional activa.";
            break;
        default:
            msg = "Tu vida responde a tus decisiones.";
    }

    showMessage(msg);

    clearTimeout(window.auto);

    window.auto = setTimeout(() => {
        if (!locked) sendDecision("TDM");
    }, 8000);
}

// ===============================
// DECISION ENGINE (FIXED + SAFE)
// ===============================
async function sendDecision(decision) {

    if (locked) return;
    locked = true;

    // 🔴 AUTO FIX: SI NO HAY SESIÓN → RECREAR
    if (!session_id) {
        await startSession();
    }

    try {

        const res = await fetch("/judge", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                session_id,
                decision,
                context: currentEvent || "neutral"
            })
        });

        const data = await res.json();

        if (data.error) {
            showMessage("ERROR: reiniciando sesión...");
            localStorage.removeItem("session_id");
            session_id = null;
            await startSession();
            locked = false;
            return;
        }

        if (data.state) {
            state = data.state;
            localStorage.setItem("state", JSON.stringify(state));
        }

        updateUI();

        if (data.status === "end") {
            showMessage("SISTEMA TERMINADO");
            return;
        }

        showMessage(data.narrative);

        processEvent(data.next_event || "scene");

    } catch (err) {
        console.error(err);
        showMessage("ERROR DE CONEXIÓN");
    }

    setTimeout(() => locked = false, 600);
}

// ===============================
// BUTTONS TVID
// ===============================
function renderButtons() {

    const c = document.getElementById("options");
    c.innerHTML = "";

    const map = [
        ["TDB","Equilibrio"],
        ["TDM","Impulso"],
        ["TDN","Creatividad"],
        ["TDP","Estructura"],
        ["TDG","Control"],
        ["TDK","Conexión"]
    ];

    map.forEach(([k,label]) => {
        const b = document.createElement("button");
        b.innerText = label;
        b.onclick = () => sendDecision(k);
        c.appendChild(b);
    });
}

</script>

</body>
</html>
