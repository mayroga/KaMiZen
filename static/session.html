<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEURO PRO 2.0 | KAMIZEN</title>

<style>
:root{
  --bg:#000;
  --neon:#00f2ff;
  --green:#33ff88;
  --red:#ff5566;
  --yellow:#ffcc33;
  --panel:rgba(0,15,30,0.95);
}

body{
  margin:0;
  background:var(--bg);
  color:var(--neon);
  font-family:Arial;
  overflow:hidden;
}

/* HEADER */
#header{
  position:absolute;
  top:10px;
  width:95%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#xpBar{
  width:150px;
  height:10px;
  border:1px solid var(--neon);
}
#xpFill{
  height:100%;
  width:0%;
  background:var(--green);
  transition:0.4s;
}

/* AVATAR */
#avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#222;
  border:2px solid var(--neon);
  background-size:cover;
}

/* CORE */
#core{
  position:absolute;
  top:35%;
  left:50%;
  transform:translate(-50%,-50%);
  width:130px;
  height:130px;
  border-radius:50%;
  border:2px solid var(--neon);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
}

/* TEXT */
#message{
  position:absolute;
  bottom:220px;
  width:90%;
  padding:18px;
  background:var(--panel);
  border:1px solid var(--neon);
  text-align:center;
  font-size:18px;
}

#reason{
  position:absolute;
  bottom:300px;
  width:90%;
  text-align:center;
  color:#fff;
  font-size:14px;
}

/* OPTIONS */
#options{
  position:absolute;
  bottom:110px;
  width:90%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  padding:14px;
  border:1px solid var(--neon);
  background:transparent;
  color:var(--neon);
  cursor:pointer;
}

button:hover{
  background:var(--neon);
  color:#000;
}

/* NAV */
#nav{
  position:absolute;
  bottom:20px;
  width:90%;
  display:flex;
  justify-content:space-between;
}

/* ANTI ADDICTION WARNING */
#breakScreen{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  font-size:20px;
}
</style>
</head>

<body>

<div id="header">
  <div style="display:flex;gap:10px;align-items:center;">
    <div id="avatar"></div>
    <div id="xpBar"><div id="xpFill"></div></div>
  </div>
  <button onclick="toggleLang()">EN/ES</button>
</div>

<div id="core">0</div>

<div id="reason"></div>
<div id="message">CLICK TO START NEURO PRO 2.0</div>

<div id="options"></div>

<div id="nav">
  <button onclick="back()">BACK</button>
  <button onclick="restart()">RESTART</button>
  <button onclick="next()">NEXT</button>
</div>

<div id="breakScreen">
  <h2>🧠 BREAK MODE</h2>
  <p>Respira 30 segundos. No pantalla.</p>
</div>

<script>

let session_id=null;
let mission=null;
let index=0;
let lang="en";
let xp=0;
let errors=0;
let eventHistory=[];
let avatarIndex=Math.floor(Math.random()*5);

/* AVATAR SYSTEM */
const avatars=[
  "https://i.imgur.com/1.png",
  "https://i.imgur.com/2.png",
  "https://i.imgur.com/3.png",
  "https://i.imgur.com/4.png",
  "https://i.imgur.com/5.png"
];

document.getElementById("avatar").style.backgroundImage=`url(${avatars[avatarIndex]})`;

/* AUDIO */
const ctx=new (window.AudioContext||window.webkitAudioContext)();

function sound(type){
  const o=ctx.createOscillator();
  const g=ctx.createGain();

  o.connect(g); g.connect(ctx.destination);

  if(type==="good"){ o.frequency.value=880; o.type="sine"; }
  if(type==="bad"){ o.frequency.value=120; o.type="sawtooth"; }
  if(type==="event"){ o.frequency.value=600; o.type="triangle"; }

  g.gain.value=0.2;
  o.start();
  o.stop(ctx.currentTime+0.3);
}

/* START */
async function start(){
  if(ctx.state==="suspended") await ctx.resume();

  const r=await fetch("/start",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({profile:{lang}})
  });

  const d=await r.json();
  session_id=d.session_id;
  mission=d.mission;
  render();
}

/* IA ADAPTATIVA */
function adaptDifficulty(){
  if(errors>=3){
    mission.blocks.push({
      type:"analysis",
      text:{
        en:"System slowdown: you need focus recovery.",
        es:"Sistema lento: necesitas recuperación de enfoque."
      }
    });
    errors=0;
  }
}

/* RANDOM EVENT SYSTEM */
function randomEvent(){
  const events=[
    "⚡ Unexpected challenge appears",
    "🎁 Bonus focus moment",
    "⚠ Social pressure spike",
    "🧠 Memory boost activated"
  ];

  if(Math.random()<0.25 && !eventHistory.includes(index)){
    eventHistory.push(index);
    document.getElementById("message").innerText=
      events[Math.floor(Math.random()*events.length)];
    sound("event");
  }
}

/* RENDER */
function render(){
  const b=mission.blocks[index];

  document.getElementById("options").innerHTML="";
  document.getElementById("reason").innerText="";

  randomEvent();
  adaptDifficulty();

  if(b.type==="story"||b.type==="analysis"){
    document.getElementById("message").innerText=b.text[lang];
    speak(b.text[lang]);
  }

  if(b.type==="tvid"){
    document.getElementById("message").innerText="DECIDE";

    b.options.forEach(o=>{
      const btn=document.createElement("button");
      btn.innerText=o.text[lang];

      btn.onclick=()=>choose(o);

      document.getElementById("options").appendChild(btn);
    });
  }

  if(b.type==="silence_challenge"){
    runSilence(b.duration_sec);
  }
}

/* CHOICE */
function choose(o){

  document.getElementById("reason").innerText=o.reason[lang];

  if(o.correct){
    sound("good");
    xp+=10;
  }else{
    sound("bad");
    xp-=5;
    errors++;
    if(xp<0)xp=0;
  }

  document.getElementById("xpFill").style.width=(xp%100)+"%";

  checkAntiAddiction();

  setTimeout(next,2000);
}

/* ANTI ADDICTION SYSTEM */
function checkAntiAddiction(){
  if(xp>=120){
    document.getElementById("breakScreen").style.display="flex";
    setTimeout(()=>{
      document.getElementById("breakScreen").style.display="none";
      xp=80;
    },30000);
  }
}

/* SILENCE */
function runSilence(t){
  const core=document.getElementById("core");
  let i=t;

  core.innerText=i;

  const int=setInterval(()=>{
    i--;
    core.innerText=i;

    if(i<=0){
      clearInterval(int);
      core.innerText="✓";
      sound("good");
      setTimeout(next,2000);
    }
  },1000);
}

/* NAV */
function next(){
  index++;
  if(index>=mission.blocks.length) return restart();
  render();
}

function back(){
  if(index>0) index--;
  render();
}

function restart(){
  index=0;
  errors=0;
  render();
}

/* LANG */
function toggleLang(){
  lang=lang==="en"?"es":"en";
  render();
}

/* VOZ */
function speak(t){
  const u=new SpeechSynthesisUtterance(t);
  u.lang=lang==="en"?"en-US":"es-ES";
  u.rate=0.95;
  speechSynthesis.speak(u);
}

/* INIT */
document.getElementById("message").onclick=start;

</script>

</body>
</html>
