<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AL CIELO - KAMIZEN</title>
    <style>
        :root {
            --neon-blue: #00f2ff; --neon-gold: #f1c40f; --neon-red: #ff3131;
            --bg-dark: #050508; --neon-green: #2ecc71;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { 
            background: var(--bg-dark); color: white; font-family: 'Orbitron', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
        }
        
        /* CAPA DE JUEGO (SIEMPRE ARRIBA CUANDO SE ACTIVA) */
        #gameCanvas { 
            position: fixed; inset: 0; z-index: 10; display: none; background: #000;
        }

        /* INTERFAZ UI */
        #ui-layer {
            position: relative; z-index: 20; height: 100%; width: 100%;
            display: flex; flex-direction: column; pointer-events: none;
        }
        
        #hud {
            display: flex; justify-content: space-around; padding: 10px;
            background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--neon-blue);
        }
        .data-box { text-align: center; border: 1px solid var(--neon-blue); padding: 5px; flex: 1; margin: 0 5px; }
        .label { font-size: 9px; color: var(--neon-blue); display: block; }
        .value { font-size: 16px; font-weight: 900; }

        #stage {
            flex: 1; display: flex; flex-direction: column; justify-content: center;
            align-items: center; padding: 30px; text-align: center; pointer-events: auto;
        }

        #display-text { font-size: 2rem; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); margin-bottom: 20px; }
        #sub-text { font-size: 1.1rem; color: #ccc; max-width: 80% }

        .btn-core {
            margin-top: 30px; padding: 15px 40px; background: var(--neon-blue); color: #000;
            border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer;
            pointer-events: auto;
        }
        
        #options-container { margin-top: 20px; display: grid; gap: 10px; width: 100%; max-width: 400px; pointer-events: auto; }
        .btn-opt { padding: 15px; background: #111; border: 1px solid var(--neon-blue); color: white; cursor: pointer; }

        /* RELOJES */
        #general-clock { position: absolute; bottom: 10px; right: 10px; color: var(--neon-gold); font-size: 14px; }
        #game-clock { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: var(--neon-red); font-size: 30px; font-weight: 900; display: none; z-index: 100; }

        .hidden { display: none !important; }
        input { background: transparent; border: 2px solid var(--neon-blue); color: white; padding: 15px; font-family: 'Orbitron'; text-align: center; font-size: 1.2rem; pointer-events: auto; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="game-clock">05:00</div>

<div id="ui-layer">
    <div id="hud">
        <div class="data-box"><span class="label">MONEY</span><span id="v-money">$0</span></div>
        <div class="data-box"><span class="label">LEVEL</span><span id="v-level">1</span></div>
        <div class="data-box"><span class="label">STABILITY</span><span id="v-health">100%</span></div>
    </div>

    <div id="stage">
        <h2 id="display-text">KAMIZEN</h2>
        <p id="sub-text">SISTEMA DE ENTRENAMIENTO NEURAL</p>
        
        <div id="init-input">
            <input type="text" id="user-name" placeholder="INGRESA TU NOMBRE">
            <br>
            <button class="btn-core" onclick="startApp()">INICIAR</button>
        </div>

        <div id="options-container"></div>
        <button id="next-btn" class="btn-core hidden">CONTINUAR</button>
    </div>

    <div id="general-clock">TIME: 00:00</div>
</div>

<script>
    let stats = { money: 0, health: 100, name: "", level: 1, wrong: 0, time: 0 };
    let isPlaying = false;
    let gameSecs = 300;
    const synth = window.speechSynthesis;
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let words = [];

    function speak(txt) {
        synth.cancel();
        let m = new SpeechSynthesisUtterance(txt);
        m.lang = 'es-ES'; m.rate = 0.9;
        synth.speak(m);
    }

    function startApp() {
        stats.name = document.getElementById('user-name').value || "Explorador";
        document.getElementById('init-input').classList.add('hidden');
        
        // SALUDO INICIAL CON NOMBRE Y EXPLICACIÓN
        const saludo = `Hola ${stats.name}. Bienvenido a Kamizen. Vamos a entrenar tu enfoque y tus decisiones. Escucha con atención y sigue las instrucciones.`;
        document.getElementById('display-text').innerText = "BIENVENIDO";
        document.getElementById('sub-text').innerText = saludo;
        speak(saludo);

        setInterval(() => {
            stats.time++;
            let m = Math.floor(stats.time/60), s = stats.time%60;
            document.getElementById('general-clock').innerText = `TIME: ${m}:${s<10?'0':''}${s}`;
        }, 1000);

        setTimeout(loadStories, 6000);
    }

    async function loadStories() {
        // NARRATIVA
        document.getElementById('display-text').innerText = "HISTORIA";
        const historia = "Imagina que estás en el centro de tu propia galaxia mental. Cada palabra que atrapas es una estrella que iluminas.";
        document.getElementById('sub-text').innerText = historia;
        speak(historia);
        
        let btn = document.getElementById('next-btn');
        btn.classList.remove('hidden');
        btn.onclick = () => {
            btn.classList.add('hidden');
            startGame();
        };
    }

    function startGame() {
        canvas.style.display = "block";
        document.getElementById('game-clock').style.display = "block";
        isPlaying = true;
        gameSecs = 300;
        words = [];
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let timer = setInterval(() => {
            gameSecs--;
            let m = Math.floor(gameSecs/60), s = gameSecs%60;
            document.getElementById('game-clock').innerText = `${m}:${s<10?'0':''}${s}`;
            if(gameSecs <= 0 || !isPlaying) {
                clearInterval(timer);
                endGame();
            }
        }, 1000);

        requestAnimationFrame(gameLoop);
        spawnWords();
    }

    function spawnWords() {
        if(!isPlaying) return;
        const list = [
            {t: "ENFOQUE", p: true}, {t: "PAZ", p: true}, {t: "FUERZA", p: true},
            {t: "MIEDO", p: false}, {t: "CAOS", p: false}, {t: "DUDA", p: false}
        ];
        let w = list[Math.floor(Math.random()*list.length)];
        words.push({
            text: w.t, pos: w.p,
            x: Math.random() * (canvas.width - 100) + 50,
            y: -50,
            s: stats.level + 1
        });
        setTimeout(spawnWords, stats.level === 1 ? 1500 : 800);
    }

    function gameLoop() {
        if(!isPlaying) return;
        ctx.fillStyle = "rgba(0,0,0,0.2)";
        ctx.fillRect(0,0,canvas.width, canvas.height);

        words.forEach((w, i) => {
            w.y += w.s;
            ctx.fillStyle = w.pos ? "#00f2ff" : "#ff3131";
            ctx.font = "900 20px Orbitron";
            ctx.textAlign = "center";
            ctx.fillText(w.text, w.x, w.y);

            // LASER
            ctx.strokeStyle = w.pos ? "rgba(0,242,255,0.1)" : "rgba(255,49,49,0.1)";
            ctx.beginPath(); ctx.moveTo(w.x, w.y); ctx.lineTo(canvas.width/2, canvas.height-50); ctx.stroke();

            if(w.y > canvas.height) words.splice(i, 1);
        });
        requestAnimationFrame(gameLoop);
    }

    canvas.onclick = (e) => {
        words.forEach((w, i) => {
            let dist = Math.sqrt((e.clientX-w.x)**2 + (e.clientY-w.y)**2);
            if(dist < 50) {
                if(w.pos) {
                    stats.money += 100;
                } else {
                    stats.wrong++;
                    if(stats.wrong >= 3) {
                        isPlaying = false;
                        alert("DEMASIADOS ERRORES. RESPIRA Y COMPROMÉTETE.");
                        stats.wrong = 0;
                        isPlaying = true;
                        gameLoop();
                        spawnWords();
                    }
                }
                words.splice(i, 1);
                document.getElementById('v-money').innerText = `$${stats.money}`;
            }
        });
    };

    function endGame() {
        isPlaying = false;
        canvas.style.display = "none";
        document.getElementById('game-clock').style.display = "none";
        loadMissions();
    }

    function loadMissions() {
        document.getElementById('display-text').innerText = "MISIONES";
        document.getElementById('sub-text').innerText = "Responde con sabiduría.";
        speak("Es hora de tomar decisiones importantes.");
        
        const opts = ["Opción A (Calma)", "Opción B (Acción)", "Opción C (Duda)", "Opción D (Miedo)"];
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        
        opts.forEach((o, i) => {
            let b = document.createElement('button');
            b.className = "btn-opt";
            b.innerText = o;
            b.onclick = () => {
                speak("Buena elección. Tu estabilidad ha cambiado.");
                stats.level = 2;
                document.getElementById('v-level').innerText = "2";
                container.innerHTML = "";
                startGame(); // Segunda ronda
            };
            container.appendChild(b);
        });
    }

</script>
</body>
</html>
