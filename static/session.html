<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO | AURA PRO</title>
    <style>
        :root { --neon-blue: #00f2ff; --neon-green: #00ff00; --neon-red: #ff0000; }
        body { 
            margin: 0; background: radial-gradient(circle, #001a33, #000); 
            color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; 
            overflow: hidden; height: 100vh;
        }
        /* HUD Superior */
        .top-hud { 
            position: fixed; top: 0; width: 100%; display: flex; 
            justify-content: space-between; align-items: center;
            padding: 10px 20px; z-index: 100; background: rgba(0,0,0,0.6);
            box-sizing: border-box;
        }
        #score-display { font-size: 1.5rem; color: var(--neon-blue); font-weight: bold; }

        /* Contenedor Principal */
        #game-container { padding-top: 80px; height: 100%; position: relative; }
        #hero-name { color: var(--neon-blue); font-size: 1.2rem; margin: 5px; }

        /* Pantalla de Inicio / Bloqueo */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,10,0.9); z-index: 200;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Área de Misión */
        #story { font-size: 1.6rem; margin: 20px; font-weight: bold; min-height: 60px; }
        #analysis { color: var(--neon-blue); font-style: italic; margin-bottom: 20px; min-height: 30px; }
        
        /* Grid de Opciones */
        #options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 600px; margin: 0 auto; padding: 20px; }
        button { 
            padding: 15px; font-size: 16px; border: 2px solid var(--neon-blue); 
            background: rgba(0, 242, 255, 0.1); color: white; border-radius: 12px; 
            cursor: pointer; transition: 0.3s;
        }
        button:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }
        button.danger { border-color: var(--neon-red); color: var(--neon-red); }

        /* Respiración */
        #breath { 
            width: 150px; height: 150px; border-radius: 50%; 
            background: radial-gradient(circle, var(--neon-blue), #0066ff); 
            margin: 20px auto; display: none; box-shadow: 0 0 30px var(--neon-blue);
            align-items: center; justify-content: center; font-weight: bold;
        }

        /* Explicación */
        #explanation-box { 
            background: rgba(0,0,0,0.9); border: 2px solid var(--neon-blue);
            padding: 20px; margin: 20px auto; width: 80%; display: none; border-radius: 15px;
        }

        /* Palabras Flotantes */
        #floating-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .floating { 
            position: absolute; padding: 10px; border-radius: 20px; pointer-events: auto;
            font-weight: bold; animation: floatUp 5s linear forwards; 
        }
        .word-good { color: var(--neon-green); border: 1px solid var(--neon-green); }
        .word-bad { color: var(--neon-red); border: 1px solid var(--neon-red); }
        @keyframes floatUp { from { transform: translateY(110vh); } to { transform: translateY(-20vh); } }

        /* Señal Visual */
        #feedback-signal { position: fixed; bottom: 80px; right: 20px; width: 40px; height: 40px; border-radius: 50%; opacity: 0; transition: 0.3s; }
        .sig-green { opacity: 1; background: var(--neon-green); box-shadow: 0 0 20px var(--neon-green); }
        .sig-red { opacity: 1; background: var(--neon-red); box-shadow: 0 0 20px var(--neon-red); }

        .control-footer { position: fixed; bottom: 0; width: 100%; padding: 15px; display: flex; justify-content: center; gap: 10px; background: rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="start-overlay">
    <h1 style="color:var(--neon-blue)">AL CIELO PRO</h1>
    <button onclick="AuraEngine.init()">INICIAR SISTEMA / START SYSTEM</button>
</div>

<div id="game-container">
    <div class="top-hud">
        <div id="score-display">SCORE: 0000</div>
        <button onclick="AuraEngine.toggleLang()">EN/ES</button>
    </div>

    <div id="hero-name">SISTEMA AURA ACTIVO</div>
    <div id="floating-layer"></div>

    <div id="story">Cargando Misión...</div>
    <div id="analysis"></div>
    <div id="breath">INHALE</div>

    <div id="explanation-box"></div>
    <div id="options"></div>

    <div id="feedback-signal"></div>

    <div class="control-footer">
        <button id="btn-pause" onclick="AuraEngine.gamePause()">PAUSE</button>
        <button id="btn-resume" onclick="AuraEngine.gameResume()" style="display:none;">CONTINUE</button>
        <button onclick="location.reload()" class="danger">DELETE/RESET</button>
    </div>
</div>

<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="ok" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

<script src="/static/engine.js"></script>
</body>
</html>
