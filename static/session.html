<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AL CIELO - AURA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body {
            background: #020617;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-position: center;
            background-repeat: no-repeat;
            background-size: 110%;
            transition: background-image 2s ease-in-out;
        }

        /* Efecto de Zoom Continuo */
        .zoom-active {
            animation: infiniteZoom 20s linear infinite alternate;
        }

        @keyframes infiniteZoom {
            from { background-size: 110%; }
            to { background-size: 150%; }
        }

        #app {
            width: 90%;
            max-width: 420px;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        #logo {
            font-size: 38px;
            font-weight: 600;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            letter-spacing: -1px;
        }

        #lang-btn {
            position: absolute; top: 25px; right: 25px;
            padding: 6px 14px; border-radius: 10px;
            border: 1px solid #60a5fa; background: rgba(96, 165, 250, 0.1);
            color: #60a5fa; cursor: pointer; font-weight: 600;
        }

        #mental-panel {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px; border-radius: 15px; margin-bottom: 25px;
            display: flex; justify-content: space-between; font-size: 14px;
        }

        #block-container {
            min-height: 240px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        #text-content {
            font-size: 20px;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        #timer-display {
            font-size: 48px;
            font-weight: 600;
            color: #60a5fa;
            text-shadow: 0 0 20px rgba(96, 165, 250, 0.5);
        }

        button {
            padding: 18px; margin: 8px 0; border: none; border-radius: 16px;
            cursor: pointer; background: #2563eb; color: white;
            width: 100%; font-weight: 600; font-size: 16px;
            transition: all 0.3s ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37,99,235,0.4);
        }

        button:disabled {
            background: #1e293b;
            color: #64748b;
            cursor: not-allowed;
        }

        .secondary { background: rgba(255, 255, 255, 0.1); }

        #warning-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.95); z-index: 1000;
            justify-content: center; align-items: center; text-align: center;
        }
    </style>
</head>
<body class="zoom-active">
    <div id="warning-modal">
        <div style="padding:40px;">
            <h2 style="color:#ef4444; font-size: 32px; margin-bottom:20px;">INACTIVITY</h2>
            <p style="font-size: 18px; margin-bottom:30px;">Tap to maintain your focus.</p>
            <button onclick="resetInactivity()" style="width: auto; padding: 15px 40px;">CONTINUE</button>
        </div>
    </div>

    <div id="app">
        <button id="lang-btn">ES</button>
        <div id="logo">AURA</div>
        
        <div id="mental-panel">
            <div id="streak">Streak: 0</div>
            <div id="level">Level: 1</div>
        </div>

        <div id="block-container">
            <div id="text-content">Welcome to AL CIELO. Ready to begin?</div>
            <div id="timer-display" style="display:none;">00:00</div>
        </div>
        
        <button id="main-btn">Start Session</button>
        
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button id="back-btn" class="secondary" style="font-size: 12px; padding: 10px;">Back</button>
            <button id="fwd-btn" class="secondary" style="font-size: 12px; padding: 10px;">Forward</button>
        </div>
    </div>

    <script src="/static/scripts.js"></script>
</body>
</html>
