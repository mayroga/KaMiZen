<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN SESSION</title>

<style>
body{
    margin:0;
    padding:0;
    background:#05070d;
    color:#ffffff;
    font-family:Arial;
    overflow:hidden;
}

/* ===== START SCREEN (ONLY LAYER) ===== */
#startScreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#05070d;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:15px;
    z-index:10;
}

#nameInput{
    padding:12px;
    font-size:18px;
    text-align:center;
    width:220px;
    border:1px solid #00f2ff;
    background:#0b0f1a;
    color:white;
}

button{
    padding:12px 20px;
    font-size:18px;
    cursor:pointer;
    background:#00f2ff;
    border:none;
    color:#000;
}

/* ===== GAME LAYERS (NO OVERLAP LOGIC) ===== */
#centerText{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:28px;
    width:80%;
    text-align:center;
    z-index:2;
    pointer-events:none;
}

#timer{
    position:absolute;
    top:20px;
    right:20px;
    font-size:28px;
    color:#00f2ff;
    z-index:2;
    pointer-events:none;
}

/* FLOAT WORDS SAFE LAYER */
#wordLayer{
    position:absolute;
    inset:0;
    z-index:1;
    overflow:hidden;
    pointer-events:none;
}

.word{
    position:absolute;
    font-size:18px;
    color:#00f2ff;
    animation:floatUp 4s linear forwards;
}

@keyframes floatUp{
    from{transform:translateY(0);opacity:1;}
    to{transform:translateY(-150px);opacity:0;}
}
</style>
</head>

<body>

<!-- START ONLY -->
<div id="startScreen">
    <h1>KAMIZEN</h1>
    <input id="nameInput" placeholder="Enter name">
    <button onclick="startSession()">START</button>
</div>

<!-- RENDER LAYERS -->
<div id="centerText"></div>
<div id="timer"></div>
<div id="wordLayer"></div>

<!-- ENGINE -->
<script src="/static/js/engine.js"></script>

<script>
function startSession(){

    const name = document.getElementById("nameInput").value.trim();

    if(!name){
        alert("Enter name");
        return;
    }

    localStorage.setItem("kamizen_name", name);

    const screen = document.getElementById("startScreen");

    /* SAFE REMOVE (NO OVERLAP ISSUE) */
    screen.style.display = "none";

    /* ENGINE SAFE START */
    if(window.Engine && typeof Engine.start === "function"){
        Engine.start();
    }else{
        console.error("Engine not loaded");
    }
}
</script>

</body>
</html>
