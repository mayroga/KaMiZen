<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | ULTRA SESSION</title>

<style>
:root{
    --bg:#05060a;
    --neon:#00f2ff;
    --good:#33ff88;
    --bad:#ff5577;
    --panel:rgba(0,0,0,0.6);
}

/* ================= BASE ================= */
body{
    margin:0;
    background:var(--bg);
    font-family:Arial;
    color:var(--neon);
    overflow:hidden;
}

/* ================= APP ================= */
#app{
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
}

/* ================= XP BAR ================= */
#xpBarContainer{
    position:absolute;
    top:10px;
    width:80%;
    height:12px;
    background:#111;
    border:1px solid var(--neon);
}

#xpBar{
    height:100%;
    width:0%;
    background:var(--neon);
    transition:0.5s;
}

/* ================= TIMER ================= */
#timerCircle{
    position:absolute;
    top:50px;
    width:80px;
    height:80px;
    border-radius:50%;
    border:3px solid var(--neon);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
}

/* ================= BREATH ================= */
#circle{
    width:90px;
    height:90px;
    border-radius:50%;
    background:rgba(0,242,255,0.2);
    box-shadow:0 0 30px var(--neon);
    transition:transform 2.5s ease;
}

/* ================= MESSAGE ================= */
#message{
    position:absolute;
    bottom:180px;
    width:85%;
    max-width:700px;
    padding:15px;
    background:var(--panel);
    border:1px solid var(--neon);
    text-align:center;
    min-height:120px;
    font-size:18px;
}

/* ================= OPTIONS ================= */
#options{
    position:absolute;
    bottom:70px;
    width:85%;
    max-width:700px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

button{
    padding:12px;
    background:transparent;
    border:1px solid var(--neon);
    color:var(--neon);
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:var(--neon);
    color:black;
}

/* ================= FEEDBACK ================= */
.flash-good{
    animation:good 0.5s;
}
.flash-bad{
    animation:bad 0.5s;
}

@keyframes good{
    0%{background:rgba(0,255,100,0.2);}
    100%{background:transparent;}
}

@keyframes bad{
    0%{background:rgba(255,80,80,0.15);}
    100%{background:transparent;}
}

/* ================= RANKING ================= */
#ranking{
    position:absolute;
    right:10px;
    top:120px;
    width:180px;
    background:rgba(0,0,0,0.4);
    border:1px solid var(--neon);
    padding:10px;
    font-size:12px;
}

/* ================= SILENCE ================= */
#silence{
    position:absolute;
    top:140px;
    font-size:12px;
}
</style>
</head>

<body>

<div id="app">

    <!-- XP -->
    <div id="xpBarContainer">
        <div id="xpBar"></div>
    </div>

    <!-- TIMER -->
    <div id="timerCircle">20</div>

    <!-- BREATH -->
    <div id="circle"></div>

    <!-- MESSAGE -->
    <div id="message" onclick="start()">TOCA PARA INICIAR</div>

    <!-- OPTIONS -->
    <div id="options"></div>

    <!-- SILENCE -->
    <div id="silence">SILENCE MODE</div>

    <!-- RANKING -->
    <div id="ranking">LOADING RANK...</div>

</div>

<script>

/* ================= STATE ================= */
let session_id=null;
let lang="en";
let xp=0;
let timer=20;
let interval=null;
let breathInterval=null;

/* ================= AUDIO ================= */
const audio=new (window.AudioContext||window.webkitAudioContext)();

function sound(type){

    const o=audio.createOscillator();
    const g=audio.createGain();

    o.connect(g);
    g.connect(audio.destination);

    if(type==="good"){
        o.frequency.value=520;
        g.gain.value=0.15;
    }

    if(type==="bad"){
        o.frequency.value=120;
        g.gain.value=0.1;
    }

    if(type==="magic"){
        o.frequency.value=700;
        g.gain.value=0.2;
    }

    o.start();
    o.stop(audio.currentTime+0.2);
}

/* ================= START ================= */
async function start(){

    if(audio.state==="suspended") await audio.resume();

    const res=await fetch("/start",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({profile:{lang}})
    });

    const data=await res.json();
    session_id=data.session_id;

    load(data);
    loadRanking();
}

/* ================= SEND ================= */
async function send(code){

    const res=await fetch("/judge",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            session_id,
            decision:code
        })
    });

    const data=await res.json();

    if(data.result==="success"){
        xp+=10;
        sound("good");
        flash("good");
    }else{
        xp-=3;
        sound("bad");
        flash("bad");
    }

    updateXPBar();
    load(data);
}

/* ================= LOAD ================= */
function load(data){

    if(!data.story) return;

    document.getElementById("message").innerText=
        data.story.text_es||data.story.text_en;

    document.getElementById("options").innerHTML="";

    (data.story.options||[]).forEach(o=>{
        const b=document.createElement("button");
        b.innerText=o.text?.[lang]||"OK";
        b.onclick=()=>send(o.code);
        document.getElementById("options").appendChild(b);
    });

    startTimer(data.story.timer||20);
    startBreathing();
}

/* ================= XP BAR ================= */
function updateXPBar(){
    let percent=Math.min(100,xp);
    document.getElementById("xpBar").style.width=percent+"%";
}

/* ================= TIMER ================= */
function startTimer(t){

    timer=t;
    document.getElementById("timerCircle").innerText=t;

    clearInterval(interval);

    interval=setInterval(()=>{
        timer--;
        document.getElementById("timerCircle").innerText=timer;

        if(timer<=0){
            clearInterval(interval);
            send("TIME_OUT");
        }
    },1000);
}

/* ================= BREATH ================= */
function startBreathing(){

    const c=document.getElementById("circle");

    clearInterval(breathInterval);

    let grow=true;

    breathInterval=setInterval(()=>{
        c.style.transform=grow?"scale(2)":"scale(1)";
        c.style.opacity=grow?0.8:0.4;
        grow=!grow;
    },2500);
}

/* ================= FLASH ================= */
function flash(type){

    const m=document.getElementById("message");

    if(type==="good"){
        m.classList.add("flash-good");
    }else{
        m.classList.add("flash-bad");
    }

    setTimeout(()=>{
        m.classList.remove("flash-good","flash-bad");
    },500);
}

/* ================= RANKING ================= */
async function loadRanking(){

    const res=await fetch("/ranking");
    const data=await res.json();

    let html="🏆 RANKING<br><br>";

    data.ranking.forEach((r,i)=>{
        html+=`${i+1}. Player ${r.player.slice(0,4)} - ${r.xp}<br>`;
    });

    document.getElementById("ranking").innerHTML=html;
}

setInterval(loadRanking,5000);

</script>

</body>
</html>
