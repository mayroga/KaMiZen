<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN ENGINE v3</title>

<style>
body{
    margin:0;
    background:#000;
    color:#00f2ff;
    font-family:Arial;
    overflow:hidden;
}

#app{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:18px;
    padding:20px;
    box-sizing:border-box;
}

/* MAIN TEXT PANEL */
#message{
    max-width:850px;
    min-height:160px;
    padding:20px;
    border:1px solid #00f2ff;
    background:rgba(0,10,20,0.9);
    text-align:center;
    font-size:22px;
    line-height:1.5;
    transition:all 0.3s ease;
}

/* BREATH VISUAL */
#circle{
    width:120px;
    height:120px;
    border-radius:50%;
    background:rgba(0,242,255,0.15);
    box-shadow:0 0 40px #00f2ff;
    display:none;
}

/* OPTIONS PANEL */
#options{
    display:none;
    flex-direction:column;
    gap:10px;
    width:100%;
    max-width:520px;
}

button{
    padding:14px;
    border:1px solid #00f2ff;
    background:transparent;
    color:#00f2ff;
    cursor:pointer;
    font-size:16px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.02);
}

.correct{background:#00ff88;color:#000;}
.wrong{background:#ff3355;color:#fff;}

/* TIMER */
#timer{
    font-size:18px;
    opacity:0.7;
}

/* TOP BAR */
#top{
    position:absolute;
    top:10px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 10px;
}

#state{
    position:absolute;
    bottom:10px;
    font-size:12px;
    opacity:0.5;
}
</style>
</head>

<body>

<div id="app">

<div id="top">
<button onclick="toggleLang()">ES/EN</button>
<button onclick="restart()">RESTART</button>
</div>

<div id="message">CLICK TO START</div>
<div id="circle"></div>
<div id="timer"></div>
<div id="options"></div>

<div id="state"></div>

</div>

<script>

/* =========================
   ENGINE STATE v3
========================= */
let session_id = null;
let lang = "en";

let locked = false;
let current_block = null;

let timerRef = null;
let state = "idle"; 
// idle | story | breath | choice | wait | end

/* =========================
   SAFE SPEECH ENGINE
========================= */
function speak(text){
    return new Promise(resolve=>{
        if(!text) return resolve();

        speechSynthesis.cancel();

        const u = new SpeechSynthesisUtterance(text);
        u.rate = 0.9;
        u.lang = lang === "es" ? "es-ES" : "en-US";

        u.onend = ()=> resolve();
        setTimeout(()=> resolve(), 6000);

        speechSynthesis.speak(u);
    });
}

/* =========================
   START SESSION
========================= */
async function start(){

    if(locked) return;
    locked = true;

    try{

        const res = await fetch("/start",{method:"POST"});
        const data = await res.json();

        session_id = data.session_id;

        await render(data.story);

    }finally{
        locked = false;
    }
}

/* =========================
   MAIN RENDER ENGINE
========================= */
async function render(block){

    if(!block || locked) return;
    locked = true;

    try{

        current_block = block;

        hideOptions();
        clearTimer();

        setState("story");

        const text =
            block.text?.[lang] ||
            block.analysis?.[lang] ||
            "";

        setMessage(text);
        await speak(text);

        /* =========================
           FLOW ROUTING SYSTEM
        ========================= */

        if(block.type === "tvid"){
            setState("choice");
            showOptions(block);
            return;
        }

        if(block.type === "breath_focus"){
            setState("breath");
            await breath(block.duration_sec || 30);
        }

        if(block.type === "riso_tvid" || block.type === "silence_challenge"){
            setState("wait");
            await timer(block.duration_sec || 20);
        }

        await next();

    }catch(e){
        console.log("ENGINE ERROR:", e);
    }finally{
        locked = false;
    }
}

/* =========================
   OPTIONS SYSTEM (TVID)
========================= */
function showOptions(block){

    const box = document.getElementById("options");
    box.style.display = "flex";
    box.innerHTML = "";

    block.options.forEach(opt=>{

        const b = document.createElement("button");
        b.innerText = opt.text?.[lang] || "";

        b.onclick = async ()=>{

            if(locked) return;
            locked = true;

            try{

                disableOptions();

                const res = await fetch("/judge",{
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({
                        session_id,
                        decision:opt.code
                    })
                });

                const data = await res.json();

                if(data.feedback){
                    await setMessage(data.feedback.reason?.[lang] || "");
                }

                b.classList.add(opt.correct ? "correct" : "wrong");

                setTimeout(()=> render(data.story), 600);

            }finally{
                locked = false;
            }
        };

        box.appendChild(b);
    });
}

/* =========================
   NEXT FLOW
========================= */
async function next(){

    setState("wait");

    const res = await fetch("/judge",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            session_id,
            decision:"NEXT"
        })
    });

    const data = await res.json();

    await render(data.story);
}

/* =========================
   BREATH SYSTEM
========================= */
function breath(sec){

    return new Promise(res=>{

        const c = document.getElementById("circle");
        c.style.display = "block";

        let grow = true;

        const i = setInterval(()=>{
            c.style.transform = grow ? "scale(2)" : "scale(1)";
            grow = !grow;
        }, 1800);

        setTimeout(()=>{
            clearInterval(i);
            c.style.display = "none";
            res();
        }, sec * 1000);
    });
}

/* =========================
   TIMER SYSTEM
========================= */
function timer(sec){

    return new Promise(res=>{

        const t = document.getElementById("timer");
        let s = sec;

        t.innerText = s;

        timerRef = setInterval(()=>{

            s--;
            t.innerText = s;

            if(s <= 0){
                clearInterval(timerRef);
                timerRef = null;
                t.innerText = "";
                res();
            }

        },1000);
    });
}

function clearTimer(){
    if(timerRef){
        clearInterval(timerRef);
        timerRef = null;
    }
    document.getElementById("timer").innerText = "";
}

/* =========================
   UI CORE
========================= */
function setMessage(text){
    document.getElementById("message").innerText = text;
}

function hideOptions(){
    document.getElementById("options").style.display = "none";
}

function disableOptions(){
    const btns = document.querySelectorAll("#options button");
    btns.forEach(b=>b.disabled = true);
}

/* =========================
   STATE VISUAL DEBUG
========================= */
function setState(s){
    state = s;
    document.getElementById("state").innerText = "STATE: " + s;
}

/* =========================
   CONTROLS
========================= */
function restart(){
    location.reload();
}

function toggleLang(){
    lang = lang === "en" ? "es" : "en";
    if(current_block) render(current_block);
}

/* =========================
   INIT
========================= */
document.getElementById("message").onclick = start;

</script>

</body>
</html>
