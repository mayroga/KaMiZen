<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>KAMIZEN LIFE SYSTEM - CORE SESSION</title>

    <style>
        :root {
            --bg: #0b1220;
            --card: #111a2e;
            --primary: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --text: #ffffff;
            --dim: #94a3b8;
            --btn-response: #1d4ed8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            overflow-x: hidden;
            background: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: var(--text);
        }

        /* FONDO DINÁMICO */
        .container {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: -10;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            transform: scale(1.04);
        }

        .slide.active { opacity: 1; }

        .overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(0,0,0,0.10) 20%, rgba(0,0,0,0.85) 100%);
            pointer-events: none;
            z-index: 1;
        }

        #app {
            position: relative;
            z-index: 5;
            width: 100%;
            max-width: 700px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: rgba(17, 26, 46, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            margin: 15px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        /* RESPUESTAS COMO BOTONES AZULES */
        .response-btn {
            display: block;
            width: 100%;
            background: var(--btn-response);
            color: white;
            padding: 18px;
            border-radius: 12px;
            margin: 12px 0;
            border: 1px solid rgba(255,255,255,0.3);
            text-align: left;
            font-size: 17px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .response-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59,130,246,0.4);
        }

        .response-btn:active {
            transform: scale(0.98);
        }

        /* BOTÓN SKIP */
        .skip-btn {
            background: var(--danger);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
            border: none;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .skip-btn:hover {
            background: #b91c1c;
            filter: brightness(1.2);
        }

        /* UTILIDADES */
        .main-btn {
            background: var(--primary);
            color: white;
            padding: 16px;
            border-radius: 12px;
            border: none;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: #1f2937;
            color: white;
            text-align: center;
            margin-bottom: 12px;
            font-size: 18px;
        }

        .breath-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 20px auto;
            border: 4px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: breathe 6s infinite ease-in-out;
            font-weight: bold;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(0.9); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; border-color: var(--success); }
        }

        .center { text-align: center; }
    </style>
</head>

<body>

<div class="container">
    <div id="img1" class="slide active"></div>
    <div id="img2" class="slide"></div>
    <div class="overlay"></div>
</div>

<div id="app">

    <div class="card center">
        <h2 style="color:var(--primary);">KAMIZEN LIFE SYSTEM</h2>
        <p style="font-size: 12px; color: var(--dim);">Neural Architecture • Session Control</p>

        <div style="margin-top:20px;">
            <input type="number" id="missionSelector" min="1" max="49" value="1" />
            <button class="main-btn" onclick="jumpToMission()">LOAD MISSION</button>
        </div>
    </div>

    <!-- CONTENEDOR DE RESPUESTAS DINÁMICAS -->
    <div id="screen" class="card">
        <div id="responseContainer">
            <button class="response-btn">
                <strong>SYSTEM STATUS:</strong> ONLINE<br>
                <small>Select a mission to begin training.</small>
            </button>
        </div>
        
        <!-- BOTÓN SKIP REAL -->
        <button class="skip-btn" onclick="clearAllData()">SKIP SESSION / CLEAR</button>
    </div>

    <div class="card center">
        <div class="breath-circle"><span>FOCUS</span></div>
    </div>

</div>

<script>
    /* LÓGICA DE FONDOS */
    const slides = [document.getElementById('img1'), document.getElementById('img2')];
    let currentIdx = 0;
    const topics = ['space', 'ocean', 'landscape', 'galaxy', 'nature', 'stars'];

    function fetchImage() {
        const randomID = Math.floor(Math.random() * 10000);
        return `https://picsum.photos/1920/1080?random=${randomID}&topic=${topics[Math.floor(Math.random()*topics.length)]}`;
    }

    slides[0].style.backgroundImage = `url('${fetchImage()}')`;
    slides[1].style.backgroundImage = `url('${fetchImage()}')`;

    setInterval(() => {
        const nextIdx = (currentIdx + 1) % 2;
        const imgUrl = fetchImage();
        const img = new Image();
        img.src = imgUrl;
        img.onload = () => {
            slides[nextIdx].style.backgroundImage = `url('${imgUrl}')`;
            slides[currentIdx].classList.remove('active');
            slides[nextIdx].classList.add('active');
            currentIdx = nextIdx;
        };
    }, 14000);

    /* LÓGICA DE INTERFAZ */
    function jumpToMission() {
        const val = document.getElementById('missionSelector').value;
        const container = document.getElementById('responseContainer');
        
        // Crear respuesta como un botón azul
        const btn = document.createElement('button');
        btn.className = 'response-btn';
        btn.innerHTML = `<strong>MISSION ${val} ACTIVE:</strong><br>Neural synchronization in progress. Click to acknowledge.`;
        btn.onclick = () => console.log(`Acknowledged mission ${val}`);
        
        // Limpiar y añadir
        container.innerHTML = ''; 
        container.appendChild(btn);

        if (typeof window.engineJump === 'function') window.engineJump(val);
    }

    function clearAllData() {
        const container = document.getElementById('responseContainer');
        
        // Borrado absoluto de nodos (limpieza de rastro)
        while (container.firstChild) {
            container.removeChild(container.firstChild);
        }
        
        // Estado neutro
        const placeholder = document.createElement('button');
        placeholder.className = 'response-btn';
        placeholder.style.background = 'rgba(255,255,255,0.05)';
        placeholder.style.border = '1px dashed var(--dim)';
        placeholder.innerHTML = `<center style="color:var(--dim)">SYSTEM SKIPPED. CACHE PURGED.</center>`;
        container.appendChild(placeholder);
        
        console.log("Session skipped and cache cleared.");
    }
</script>

<script src="/static/js/engine.js"></script>

</body>
</html>
