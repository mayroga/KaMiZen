<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO: TOTAL LIFE TRAINING</title>
<style>
:root {
    --neon-blue:#00f2ff; --neon-green:#00ff41; --neon-red:#ff003c;
    --neon-yellow:#ffff00; --matrix-bg:#00050a; --neon-gold: #ffcc00;
}
body {
    margin:0; background:var(--matrix-bg); color:#fff;
    font-family:'Courier New', monospace; overflow:hidden; user-select:none;
}

/* ALERTA DE SEGURIDAD VISUAL SUPERIOR */
#security-alert {
    position: fixed; top: 0; left: 0; width: 100%; height: 8px;
    background: var(--neon-green); z-index: 1000; transition: 0.8s ease;
    box-shadow: 0 0 15px var(--neon-green);
}

#lang-btn {
    position:fixed; top:20px; right:20px; z-index:999;
    padding:10px 18px; border:2px solid var(--neon-blue);
    background:rgba(0,0,0,0.8); color:var(--neon-blue); cursor:pointer; 
    font-weight: bold; border-radius: 5px;
}

#hud {
    position:fixed; top:20px; width:100%; display:flex;
    justify-content:space-between; padding:20px; z-index:50; box-sizing: border-box;
}
#timer-box { 
    font-size:2.8rem; color:var(--neon-blue); 
    text-shadow: 0 0 20px var(--neon-blue); 
}
#score-container { text-align: right; }
#mastery-lvl { color: var(--neon-green); font-size: 1.2rem; font-weight: bold; }
#score-box { 
    border:3px solid #fff; padding:8px 20px; font-size: 1.8rem; 
    margin-top: 5px; background: rgba(255,255,255,0.1);
}

/* PANEL DE ESTADÍSTICAS INFERIOR */
#life-stats {
    position: fixed; bottom: 20px; left: 20px; display: flex; 
    flex-wrap: wrap; gap: 12px; z-index: 50; max-width: 95%;
}
.stat-pill { 
    border: 2px solid #333; padding: 10px 15px; font-size: 0.9rem; 
    background: rgba(0,0,0,0.9); border-radius: 6px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}
.stat-pill span { font-weight: bold; color: var(--neon-blue); }
#v-money { color: var(--neon-gold) !important; }
#v-safety { color: var(--neon-red) !important; }
#v-happy { color: #ff00ff !important; }

/* MECÁNICA DE PALABRAS Y EXPLOSIONES */
.floating {
    position: absolute; padding: 15px 30px; font-weight: 900; font-size: 1.5rem;
    border-radius: 10px; background: rgba(0,0,0,0.9); z-index: 10;
    animation: floatUp 7s linear forwards; cursor: pointer;
    transition: transform 0.1s;
}
.word-power { 
    border: 3px solid var(--neon-green); color: var(--neon-green); 
    box-shadow: 0 0 20px var(--neon-green); 
}
.word-risk { 
    border: 3px solid var(--neon-red); color: var(--neon-red); 
    box-shadow: 0 0 15px var(--neon-red);
}
.word-silence { 
    border: 3px solid var(--neon-yellow); color: var(--neon-yellow); 
    box-shadow: 0 0 15px var(--neon-yellow);
}

@keyframes floatUp { 
    from { transform: translateY(110vh) rotate(0deg); } 
    to { transform: translateY(-25vh) rotate(5deg); } 
}

.explode { 
    animation: blast 0.5s ease-out forwards !important; 
    pointer-events: none; 
}
@keyframes blast { 
    0% { transform: scale(1); opacity: 1; } 
    50% { transform: scale(2.5); opacity: 0.8; filter: brightness(2); }
    100% { transform: scale(4); opacity: 0; } 
}

/* OVERLAYS Y CIRCULO RESPIRATORIO */
#overlay {
    position:fixed; width:100%; height:100%; background:rgba(0,5,10,0.95);
    display:none; align-items:center; justify-content:center;
    flex-direction:column; z-index:500; text-align:center; padding: 30px;
}

/* EL CÍRCULO TVID */
#breath-circle {
    width: 250px; height: 250px; border: 8px solid var(--neon-blue);
    border-radius: 50%; margin: 30px; transition: 4s ease-in-out;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; font-weight: bold; text-transform: uppercase;
    box-shadow: 0 0 30px var(--neon-blue);
}
.inhale { transform: scale(1.4); background: rgba(0, 242, 255, 0.2); }
.exhale { transform: scale(0.9); background: rgba(0, 0, 0, 0.5); }

#phase-title { 
    color:var(--neon-blue); text-transform: uppercase; 
    letter-spacing: 4px; font-size: 2.5rem; margin-bottom: 10px;
}
#phase-desc { 
    font-size: 1.6rem; margin: 25px 0; max-width: 850px; 
    line-height: 1.5; color: #eee; 
}
#decision-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px; 
    margin-top: 30px; width: 100%; max-width: 800px;
}
.choice-btn {
    padding: 22px; border: 3px solid var(--neon-blue); background: none;
    color: #fff; cursor: pointer; font-family: inherit; font-size: 1.1rem; 
    transition: 0.3s; font-weight: bold;
}
.choice-btn:hover { 
    background: var(--neon-blue); color: #000; 
    box-shadow: 0 0 30px var(--neon-blue); 
}

@media (max-width: 600px) {
    #decision-grid { grid-template-columns: 1fr; }
    #phase-title { font-size: 1.8rem; }
    #timer-box { font-size: 2rem; }
}
</style>
</head>
<body>

<div id="security-alert"></div>
<button id="lang-btn" onclick="toggleLang()">ES</button>

<div id="hud">
    <div id="timer-box">05:00</div>
    <div id="score-container">
        <div id="mastery-lvl">MASTERY x1</div>
        <div id="score-box">0</div>
    </div>
</div>

<div id="life-stats">
    <div class="stat-pill">Respect: <span id="v-respect">50</span></div>
    <div class="stat-pill">Peace: <span id="v-peace">50</span></div>
    <div class="stat-pill">Leadership: <span id="v-lead">50</span></div>
    <div class="stat-pill">Money: $<span id="v-money">100</span></div>
    <div class="stat-pill">Safety: <span id="v-safety">100</span>%</div>
    <div class="stat-pill">Happiness: <span id="v-happy">50</span>%</div>
</div>

<div id="overlay">
    <h1 id="phase-title"></h1>
    <div id="breath-circle" style="display: none;"></div>
    <p id="phase-desc"></p>
    <div id="decision-grid"></div>
</div>

<script>
let lang = "en";
let state = {
    score: 0, mastery: 1, combo: 0, timer: 300,
    stats: { respect: 50, peace: 50, lead: 50, money: 100, happy: 50, safety: 100 },
    playing: false,
    spawnRate: 1300
};

const words = {
    power: ["WILL", "FOCUS", "TRUTH", "WORK", "STUDY", "HONOR", "DISCIPLINE", "VALOR", "STRENGTH"],
    risk: ["LIES", "RAGE", "LAZY", "DEBT", "DARK", "SHOUT", "EGO", "GREED", "CHAOS"],
    silence: ["CALM", "LISTEN", "PLAN", "SAVE", "HOME", "WAIT", "REST", "ZEN", "PAUSE"]
};

const situations = [
    {
        type: "decision",
        title: {en: "THE ACCUSATION", es: "LA ACUSACIÓN"},
        desc: {en: "A peer accuses you of a mistake you didn't commit in front of the group.", es: "Un compañero te acusa de un error que no cometiste frente al grupo."},
        choices: [
            { text: {en: "Calmly present facts", es: "Presentar hechos con calma"}, effect: {respect: 15, peace: 10, lead: 10} },
            { text: {en: "Ask for a private meeting", es: "Pedir reunión privada"}, effect: {respect: 10, peace: 15, lead: 20} },
            { text: {en: "Explode in anger", es: "Explotar de ira"}, effect: {respect: -20, peace: -25, happy: -15} },
            { text: {en: "Stay silent", es: "Quedarse en silencio"}, effect: {respect: -5, peace: 10, lead: 0} }
        ]
    }
];

function toggleLang() {
    lang = (lang === "en") ? "es" : "en";
    document.getElementById("lang-btn").innerText = lang.toUpperCase();
    updateHUD();
}

function start() {
    state.playing = true;
    updateHUD();
    
    // Timer principal ININTERRUMPIDO de 5 minutos
    const gameTimer = setInterval(() => {
        if(state.timer > 0) {
            state.timer--;
            updateHUD();
            // Aumento de dificultad por tiempo transcurrido
            if(state.timer % 60 === 0 && state.spawnRate > 500) {
                state.spawnRate -= 150;
            }
        } else {
            clearInterval(gameTimer);
            state.playing = false;
            alert(lang === "en" ? "Session Completed" : "Sesión Completada");
        }
    }, 1000);

    // Loop de palabras flotantes (Independiente del timer)
    const wordLoop = () => {
        if(state.timer > 0) {
            spawnWord();
            setTimeout(wordLoop, state.spawnRate);
        }
    };
    wordLoop();

    // Loop de Retos (30s Respiración/Silencio + Pregunta) cada 50 segundos
    setInterval(triggerSpecialCycle, 50000); 
}

function isOverlayOpen() {
    return document.getElementById("overlay").style.display === "flex";
}

function spawnWord() {
    const cats = ["power", "risk", "silence"];
    const c = cats[Math.floor(Math.random() * 3)];
    const div = document.createElement("div");
    div.className = `floating word-${c}`;
    
    const wordList = words[c];
    div.innerText = wordList[Math.floor(Math.random() * wordList.length)];
    div.style.left = Math.random() * 75 + "vw";
    
    // La velocidad aumenta con la maestría
    const speed = Math.max(2.5, 7 - (state.mastery * 0.4));
    div.style.animationDuration = speed + "s";
    
    div.onclick = () => {
        div.classList.add("explode");
        if(c === "risk") {
            state.score = Math.max(0, state.score - 60);
            state.stats.safety -= 8; state.stats.peace -= 5;
            state.stats.respect -= 2; state.stats.lead -= 2;
            state.combo = 0; state.mastery = 1; 
        } else if(c === "power") {
            state.score += 20 * state.mastery;
            state.stats.money += 3; state.stats.lead += 2; state.stats.respect += 1;
            state.combo++; if(state.combo % 5 === 0) state.mastery++;
        } else {
            state.stats.peace += 4; state.stats.respect += 2; state.stats.happy += 3;
            state.combo++; if(state.combo % 5 === 0) state.mastery++;
        }
        updateHUD();
        setTimeout(() => { if(div.parentNode) div.remove(); }, 500);
    };
    document.body.appendChild(div);
    setTimeout(() => { if(div.parentNode) div.remove(); }, speed * 1000);
}

function triggerSpecialCycle() {
    if(state.timer <= 10) return; // No iniciar ciclos si queda poco tiempo
    const chance = Math.random();
    if(chance > 0.5) {
        startBreathing(() => triggerQuestion());
    } else {
        startSilenceChallenge(() => triggerQuestion());
    }
}

function startBreathing(callback) {
    const overlay = document.getElementById("overlay");
    const circle = document.getElementById("breath-circle");
    const desc = document.getElementById("phase-desc");
    const grid = document.getElementById("decision-grid");

    document.getElementById("phase-title").innerText = lang === "en" ? "TVID BREATHING" : "RESPIRACIÓN TVID";
    grid.innerHTML = "";
    circle.style.display = "flex";
    overlay.style.display = "flex";

    let elapsed = 0;
    const breathe = () => {
        if(elapsed >= 30 || state.timer <= 0) {
            circle.style.display = "none";
            applyEffect({peace: 20, respect: 10});
            callback();
            return;
        }
        desc.innerText = (lang === "en" ? "Focus on your pulse... " : "Enfócate en tu pulso... ") + (30 - elapsed) + "s";
        circle.innerText = lang === "en" ? "INHALE" : "INHALA";
        circle.className = "inhale";
        setTimeout(() => {
            circle.innerText = lang === "en" ? "EXHALE" : "EXHALA";
            circle.className = "exhale";
            setTimeout(() => {
                elapsed += 8;
                breathe();
            }, 4000);
        }, 4000);
    };
    breathe();
}

function startSilenceChallenge(callback) {
    const overlay = document.getElementById("overlay");
    const desc = document.getElementById("phase-desc");
    const circle = document.getElementById("breath-circle");
    const grid = document.getElementById("decision-grid");

    document.getElementById("phase-title").innerText = lang === "en" ? "SILENCE CHALLENGE" : "RETO DE SILENCIO";
    circle.style.display = "none";
    grid.innerHTML = "";
    overlay.style.display = "flex";

    let timeLeft = 30;
    const interval = setInterval(() => {
        desc.innerText = (lang === "en" ? "A leader masters silence... " : "Un líder domina el silencio... ") + timeLeft + "s";
        timeLeft--;
        if(timeLeft < 0 || state.timer <= 0) {
            clearInterval(interval);
            applyEffect({lead: 25, peace: 15});
            callback();
        }
    }, 1000);
}

function triggerQuestion() {
    if(state.timer <= 0) {
        document.getElementById("overlay").style.display = "none";
        return;
    }
    const sit = situations[Math.floor(Math.random() * situations.length)];
    const overlay = document.getElementById("overlay");
    const grid = document.getElementById("decision-grid");
    const desc = document.getElementById("phase-desc");
    
    document.getElementById("phase-title").innerText = sit.title[lang];
    desc.innerText = sit.desc[lang];
    grid.innerHTML = "";

    sit.choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.innerText = choice.text[lang];
        btn.onclick = () => { 
            applyEffect(choice.effect); 
            overlay.style.display = "none"; 
        };
        grid.appendChild(btn);
    });
}

function applyEffect(eff) {
    Object.keys(eff).forEach(k => { state.stats[k] += eff[k]; });
    state.stats.happy = Math.min(100, Math.max(0, state.stats.happy));
    state.stats.safety = Math.min(100, Math.max(0, state.stats.safety));
    state.stats.peace = Math.max(0, state.stats.peace);
    state.stats.respect = Math.max(0, state.stats.respect);
    state.stats.lead = Math.max(0, state.stats.lead);
    updateHUD();
}

function updateHUD() {
    document.getElementById("score-box").innerText = state.score;
    document.getElementById("mastery-lvl").innerText = `MASTERY x${state.mastery}`;
    document.getElementById("v-respect").innerText = state.stats.respect;
    document.getElementById("v-peace").innerText = state.stats.peace;
    document.getElementById("v-lead").innerText = state.stats.lead;
    document.getElementById("v-money").innerText = state.stats.money;
    document.getElementById("v-safety").innerText = state.stats.safety;
    document.getElementById("v-happy").innerText = state.stats.happy;
    
    const sBar = document.getElementById("security-alert");
    if(state.stats.safety < 40) {
        sBar.style.background = "var(--neon-red)";
        sBar.style.boxShadow = "0 0 20px var(--neon-red)";
    } else if(state.stats.safety < 75) {
        sBar.style.background = "var(--neon-yellow)";
        sBar.style.boxShadow = "0 0 20px var(--neon-yellow)";
    } else {
        sBar.style.background = "var(--neon-green)";
        sBar.style.boxShadow = "0 0 20px var(--neon-green)";
    }

    let m = Math.floor(state.timer / 60).toString().padStart(2, "0");
    let s = (state.timer % 60).toString().padStart(2, "0");
    document.getElementById("timer-box").innerText = `${m}:${s}`;
}

start();
</script>
</body>
</html>
