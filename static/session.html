<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | AL CIELO PRO</title>

<style>
body{
    margin:0;
    background:radial-gradient(circle,#001a33,#000);
    color:#fff;
    font-family:Segoe UI,Arial;
    text-align:center;
    overflow:hidden;
    cursor:crosshair;
    transition:background 0.5s;
}

#topbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:rgba(0,0,0,0.3);
    z-index:100;
}

#game{ padding-top:90px; }

button{
    padding:15px 25px;
    margin:10px;
    font-size:18px;
    border:2px solid #00f2ff;
    background:rgba(0,242,255,0.1);
    color:#fff;
    border-radius:12px;
    cursor:pointer;
}

button:hover{
    background:#00f2ff;
    color:#000;
}

.opt-btn{
    display:block;
    width:80%;
    max-width:600px;
    margin:10px auto;
    text-align:left;
}

#breath{
    width:110px;
    height:110px;
    border-radius:50%;
    margin:20px auto;
    background:radial-gradient(circle,#00f2ff,#0066ff);
    display:none;
    box-shadow:0 0 30px #00f2ff;
    transition:transform 4s ease-in-out;
}

#explanation-box{
    background:rgba(0,0,0,0.85);
    border-left:5px solid #00f2ff;
    padding:20px;
    width:85%;
    margin:20px auto;
    display:none;
    border-radius:12px;
}

#story{font-size:1.6rem;margin:20px;font-weight:bold;}
#analysis{color:#00f2ff;}
</style>
</head>

<body>

<div id="topbar">
    <button onclick="KamizenEngine.toggleLang()">EN/ES</button>
    <div id="score-display">PUNTOS: 0</div>
</div>

<div id="game">
    <div id="breath"></div>
    <div id="story">Cargando...</div>
    <div id="analysis"></div>
    <div id="explanation-box"></div>
    <div id="options"></div>
</div>

<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="ok" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

<script src="engine.js"></script>

</body>
</html>
