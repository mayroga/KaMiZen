<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO - AURA BY MAY ROGA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --blue: #00d4ff; --gold: #ffd700; --green: #2ecc71; --red: #e74c3c; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* Pantalla de Inicio */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { padding: 15px; font-size: 1.5rem; border-radius: 10px; border: 2px solid var(--blue); background: #111; color: white; text-align: center; margin-bottom: 20px; }
        
        /* Reloj Maestro */
        #master-clock { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 5rem; font-weight: 900; color: var(--blue); z-index: 1000; text-shadow: 0 0 20px rgba(0,212,255,0.5); pointer-events: none; }
        
        /* Panel de Control Lateral */
        #control-panel { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 2000; }
        .icon-btn { width: 55px; height: 55px; border-radius: 12px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .icon-btn:hover { transform: scale(1.1); }
        .btn-translate { background: var(--gold); color: black; }
        .btn-speaker { background: var(--blue); color: black; }
        .btn-pdf { background: var(--green); color: white; }
        .btn-clear { background: var(--red); color: white; }

        /* Mundo de Juego */
        #game-world { position: fixed; inset: 0; background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364); display: none; }
        
        /* Avatar Estático (Sin Levitación) */
        #avatar-container { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); z-index: 100; text-align: center; }
        .stickman { stroke: white; stroke-width: 4; fill: none; }

        /* Superposición de Respiración */
        #breath-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; height: 320px; border: 12px solid white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; z-index: 500; transition: transform 4s linear; }

        /* Cuadro de Historias */
        #story-box { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; padding: 40px; text-align: center; }
        #story-title { color: var(--gold); font-size: 3.5rem; margin-bottom: 20px; }
        #story-content { font-size: 1.8rem; line-height: 1.6; max-width: 850px; color: #f0f0f0; margin-bottom: 40px; }

        /* Elementos que Caen */
        .word { position: absolute; padding: 18px 35px; border: 2px solid white; border-radius: 40px; background: rgba(0,0,0,0.8); cursor: pointer; animation: fall 10s linear forwards; font-weight: bold; font-size: 1.2rem; white-space: nowrap; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        @keyframes fall { from { top: -80px; } to { top: 110vh; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color: var(--blue); font-size: 3.5rem; letter-spacing: 5px;">AL CIELO</h1>
        <input type="text" id="user-name" placeholder="Enter Student Name">
        <button onclick="initApp()" style="padding: 18px 50px; background: var(--blue); border: none; border-radius: 10px; font-weight: bold; font-size: 1.2rem; cursor: pointer; color: black;">START ADVISORY</button>
    </div>

    <div id="control-panel">
        <button class="icon-btn btn-translate" onclick="toggleLanguage()">ES/EN</button>
        <button class="icon-btn btn-speaker" id="speaker-toggle" onclick="toggleAudio()">ON</button>
        <button class="icon-btn btn-pdf" onclick="generatePDF()">PDF</button>
        <button class="icon-btn btn-clear" onclick="location.reload()">CLEAR</button>
    </div>

    <div id="master-clock">15:00</div>
    
    <div id="game-world">
        <!-- Avatar ahora está fijo, sin animaciones de levitación -->
        <div id="avatar-container">
            <svg width="120" height="170" viewBox="0 0 100 150">
                <circle cx="50" cy="30" r="22" class="stickman"/>
                <path d="M50 52 L50 110 M50 75 L15 50 M50 75 L85 50 M50 110 L20 145 M50 110 L80 145" class="stickman"/>
            </svg>
            <div id="display-name" style="margin-top:15px; font-size: 1.6rem; font-weight:900; color: var(--gold); text-transform: uppercase;"></div>
        </div>
        <div id="breath-overlay">INHALE</div>
    </div>

    <div id="story-box">
        <h1 id="story-title"></h1>
        <p id="story-content"></p>
        <button onclick="closeStory()" style="padding: 20px 60px; background: var(--green); color: white; border: none; border-radius: 12px; font-size: 1.6rem; font-weight: bold; cursor: pointer;">I UNDERSTAND</button>
    </div>

    <script src="/static/js/engine.js"></script>
</body>
</html>
