<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAMIZEN | SESSION PRO</title>

<style>
:root{
    --neon:#00f2ff;
    --bg:#000;
    --panel:rgba(0,15,30,0.92);
    --good:rgba(0,255,100,0.25);
    --bad:rgba(255,0,0,0.25);
}

/* ================= BASE ================= */
body{
    margin:0;
    background:var(--bg);
    font-family:Arial;
    color:var(--neon);
    overflow:hidden;
}

/* ================= APP LAYOUT ================= */
#app{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    gap:20px;
}

/* ================= BREATH CIRCLE ================= */
#circle{
    width:100px;
    height:100px;
    border-radius:50%;
    background:rgba(0,242,255,0.2);
    box-shadow:0 0 40px var(--neon);
    transition:transform 2s ease, opacity 1s ease;
}

/* ================= MESSAGE ================= */
#message{
    width:85%;
    max-width:800px;
    padding:18px;
    background:var(--panel);
    border:1px solid var(--neon);
    text-align:center;
    min-height:120px;
    font-size:18px;
}

/* ================= OPTIONS (3 BUTTONS FIXED) ================= */
#options{
    width:85%;
    max-width:800px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
}

button{
    padding:14px;
    background:transparent;
    border:1px solid var(--neon);
    color:var(--neon);
    font-weight:bold;
    cursor:pointer;
    font-size:14px;
    transition:0.2s;
}

button:hover{
    background:var(--neon);
    color:#000;
}

/* ================= TOP BAR ================= */
#topbar{
    position:absolute;
    top:10px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 20px;
    box-sizing:border-box;
}

/* SEPARATED GROUPS (IMPORTANT FIX) */
#controls{
    display:flex;
    gap:10px;
}

#lang{
    display:flex;
}

/* ================= SILENCE ================= */
#silence{
    position:absolute;
    top:55px;
    font-size:13px;
    opacity:0.8;
}

/* ================= FEEDBACK OVERLAY ================= */
#overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    opacity:0;
    pointer-events:none;
    transition:0.4s;
    z-index:10;
}

#overlay.good{ background:var(--good); }
#overlay.bad{ background:var(--bad); }

</style>
</head>

<body>

<div id="app">

    <!-- FEEDBACK OVERLAY (ONLY RESPONSES) -->
    <div id="overlay"></div>

    <!-- TOP BAR -->
    <div id="topbar">

        <!-- CONTROLS (LEFT) -->
        <div id="controls">
            <button onclick="back()">BACK</button>
            <button onclick="skip()">SKIP</button>
            <button onclick="restart()">RESET</button>
        </div>

        <!-- LANGUAGE (RIGHT - SEPARATED) -->
        <div id="lang">
            <button onclick="toggleLang()">EN / ES</button>
        </div>

    </div>

    <!-- SILENCE INFO -->
    <div id="silence">SILENCE: <span id="silenceLevel">0</span>s</div>

    <!-- BREATH -->
    <div id="circle"></div>

    <!-- MAIN TEXT -->
    <div id="message" onclick="start()">TOUCH TO START</div>

    <!-- OPTIONS -->
    <div id="options"></div>

</div>

<script>

/* ================= STATE ================= */
let session_id = null;
let history = [];
let lang = "en";
let loading = false;

/* ================= AUDIO ================= */
const audio = new (window.AudioContext || window.webkitAudioContext)();

function sound(type){
    const o = audio.createOscillator();
    const g = audio.createGain();

    o.connect(g);
    g.connect(audio.destination);
    o.type="sine";

    if(type==="ok"){ o.frequency.value=520; g.gain.value=0.2; }
    if(type==="fail"){ o.frequency.value=120; g.gain.value=0.3; }
    if(type==="click"){ o.frequency.value=300; g.gain.value=0.1; }
    if(type==="win"){ o.frequency.value=880; g.gain.value=0.25; }

    o.start();
    o.stop(audio.currentTime+0.25);
}

/* ================= START ================= */
async function start(){

    if(audio.state==="suspended") await audio.resume();

    const res = await fetch("/start",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({profile:{lang}})
    });

    const data = await res.json();

    session_id = data.session_id;
    history = [];

    render(data);
}

/* ================= SEND ANSWER ================= */
async function send(code){

    if(loading) return;
    loading = true;

    const res = await fetch("/judge",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ session_id, decision:code })
    });

    const data = await res.json();

    showFeedback(data.feedback);

    render(data);

    loading = false;
}

/* ================= FEEDBACK (ONLY FOR ANSWERS) ================= */
function showFeedback(fb){

    const overlay = document.getElementById("overlay");

    if(!fb) return;

    if(fb.correct){
        overlay.className = "good";
        sound("win");
    }else{
        overlay.className = "bad";
        sound("fail");
    }

    overlay.style.opacity = 1;

    setTimeout(()=>{
        overlay.style.opacity = 0;
    },800);
}

/* ================= RENDER ================= */
function render(data){

    if(!data || !data.story) return;

    const s = data.story;

    document.getElementById("message").innerText =
        (s.text && (s.text[lang] || s.text.en)) ||
        s.question ||
        "";

    document.getElementById("options").innerHTML = "";

    /* BREATH CONTROL */
    if(s.type==="breathing"){
        breathe();
    } else {
        stopBreath();
    }

    /* SILENCE */
    document.getElementById("silenceLevel").innerText =
        s.duration_sec || 0;

    /* OPTIONS FIXED 3 */
    let opts = s.options || [];

    while(opts.length < 3){
        opts.push({
            code:"TDB",
            text:{en:"CONTINUE",es:"CONTINUAR"}
        });
    }

    opts.slice(0,3).forEach(o=>{
        const b=document.createElement("button");
        b.innerText = o.text?.[lang] || "OK";
        b.onclick = ()=>send(o.code);
        document.getElementById("options").appendChild(b);
    });

}

/* ================= BREATH ================= */
let breathInterval;

function breathe(){

    const c=document.getElementById("circle");
    let t=0;

    clearInterval(breathInterval);

    breathInterval=setInterval(()=>{

        const scale = 1 + Math.sin(t)*0.6;

        c.style.transform = `scale(${scale})`;
        c.style.opacity = 0.4 + (Math.sin(t)+1)/4;

        t+=0.4;

    },200);
}

function stopBreath(){
    clearInterval(breathInterval);
    document.getElementById("circle").style.transform="scale(1)";
}

/* ================= CONTROLS ================= */
function skip(){ sound("click"); send("TDB"); }

function back(){
    if(history.length<2) return;
    sound("click");
    const prev = history[history.length-2];
    render(prev);
    history.pop();
}

function restart(){
    sound("fail");
    location.reload();
}

function toggleLang(){
    lang = (lang==="en") ? "es" : "en";
}

</script>

</body>
</html>
