<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAMIZEN | AL CIELO PRO</title>

<style>
:root {
    --blue:#00f2ff;
    --green:#39ff14;
    --red:#ff3131;
    --gold:#ffdf00;
}

body {
    margin: 0;
    background: radial-gradient(circle, #001a33, #000);
    color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    user-select: none;
}

/* ================= TOP BAR ================= */
#topbar {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 12px 20px;
    background: rgba(0,0,0,0.75);
    border-bottom: 2px solid var(--blue);
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
}

/* SCORE BIG */
#score-display {
    font-size: 2rem;
    font-weight: 900;
    color: var(--blue);
    text-shadow: 0 0 15px var(--blue);
}

/* TIMER VERY BIG (IMPORTANT UX FOCUS) */
#timer {
    font-size: 3rem;
    font-weight: 900;
    color: white;
    text-shadow: 0 0 10px #fff;
}

/* ================= GAME AREA ================= */
#game {
    position: absolute;
    top: 80px;
    bottom: 120px;
    width: 100%;
    overflow: hidden;
    background: radial-gradient(circle, #001a33, #000);
}

/* FLOATING WORDS */
.floating {
    position: absolute;
    padding: 12px 22px;
    border-radius: 40px;
    font-weight: 900;
    cursor: pointer;
    animation: floatUp 5s linear forwards;
    user-select: none;
}

.word-good {
    border: 2px solid var(--green);
    color: var(--green);
}

.word-bad {
    border: 2px solid var(--red);
    color: var(--red);
}

.word-neutral {
    border: 2px solid var(--gold);
    color: var(--gold);
}

@keyframes floatUp {
    from { transform: translateY(110vh); }
    to { transform: translateY(-20vh); }
}

/* ================= LEARNING ZONE ================= */
#learning {
    display: none;
    position: absolute;
    top: 90px;
    width: 100%;
    text-align: center;
}

#story {
    font-size: 1.6rem;
    margin: 10px auto;
    max-width: 850px;
}

#analysis {
    font-size: 1.3rem;
    margin: 10px auto;
    max-width: 850px;
    opacity: 0.9;
}

/* BREATH SYSTEM */
#breath {
    width: 160px;
    height: 160px;
    margin: 20px auto;
    border-radius: 50%;
    background: radial-gradient(circle, #00f2ff, #0033ff);
    animation: breathe 6s infinite ease-in-out;
    display: none;
}

@keyframes breathe {
    0%,100%{transform:scale(0.8);}
    50%{transform:scale(1.3);}
}

/* EXPLANATION FEEDBACK */
#explain {
    position: absolute;
    bottom: 140px;
    width: 100%;
    text-align: center;
    font-size: 1.3rem;
    color: var(--gold);
}

/* ================= CONTROLS ================= */
#controls {
    position: fixed;
    bottom: 15px;
    width: 100%;
    text-align: center;
}

button {
    padding: 12px 18px;
    margin: 6px;
    border-radius: 12px;
    border: 2px solid var(--blue);
    background: rgba(0,242,255,0.1);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: var(--blue);
    color: black;
}
</style>
</head>

<body>

<!-- ================= HUD ================= -->
<div id="topbar">
    <div id="score-display">POINTS: 0</div>
    <div id="timer">00:00</div>
</div>

<!-- ================= GAME ================= -->
<div id="game"></div>

<!-- ================= LEARNING ================= -->
<div id="learning">
    <div id="story"></div>
    <div id="analysis"></div>
    <div id="breath"></div>
</div>

<!-- ================= FEEDBACK ================= -->
<div id="explain"></div>

<!-- ================= CONTROLS ================= -->
<div id="controls">
    <button onclick="KamizenEngine.init()">START</button>
    <button onclick="KamizenEngine.changeLang()">ESP / ENG</button>
    <button onclick="KamizenEngine.reset()">RESET</button>
</div>

<!-- ================= AUDIO ================= -->
<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="win" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

<script src="/static/engine.js"></script>

</body>
</html>
