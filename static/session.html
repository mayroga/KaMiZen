<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN LOOP PRO</title>

<style>
body{
    margin:0;
    background:radial-gradient(circle,#001a33,#000);
    color:#fff;
    font-family:'Segoe UI',Arial;
    text-align:center;
    overflow:hidden;
    cursor:crosshair;
}

/* TOP */
#top-ui{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    padding:15px;
    color:#00f2ff;
    font-weight:bold;
}

/* TIMER */
#timer{
    margin-top:70px;
    font-size:1.4rem;
    color:#00f2ff;
}

/* MENU */
#menu{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* FLOATING */
.floating{
    position:absolute;
    padding:8px 18px;
    border-radius:20px;
    font-weight:bold;
    animation:floatUp 5s linear forwards;
}

.word-good{color:#0f0;border:2px solid #0f0;}
.word-bad{color:#f00;border:2px solid #f00;}
.word-neutral{color:#ff0;border:2px solid #ff0;}

@keyframes floatUp{
    from{transform:translateY(110vh);}
    to{transform:translateY(-20vh);}
}

/* EXPLOSION */
.blast{
    animation:burst 0.4s forwards;
    pointer-events:none;
}

@keyframes burst{
    to{transform:scale(4);opacity:0;}
}

/* LEARNING */
#learning{
    display:none;
    margin-top:120px;
}

/* BREATH UI (CIRCULO RESPIRACIÓN) */
#breathCircle{
    position:fixed;
    top:55%;
    left:50%;
    transform:translate(-50%,-50%);
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid #00f2ff;
    display:none;
    animation:breatheAnim 4s infinite ease-in-out;
    box-shadow:0 0 20px #00f2ff;
}

@keyframes breatheAnim{
    0%{transform:translate(-50%,-50%) scale(0.8); opacity:0.5;}
    50%{transform:translate(-50%,-50%) scale(1.3); opacity:1;}
    100%{transform:translate(-50%,-50%) scale(0.8); opacity:0.5;}
}
</style>
</head>

<body>

<div id="top-ui">
    <div>FOCUS: 100%</div>
    <div id="score">POINTS: 0</div>
    <div>ENERGY: ⚡⚡⚡</div>
</div>

<div id="timer">00:00</div>

<!-- MENU -->
<div id="menu">
    <button onclick="start()">START</button>
    <button onclick="start()">CONTINUE</button>
    <button onclick="reset()">BACK</button>
    <button onclick="toggleLang()">ES / EN</button>
</div>

<!-- LEARNING -->
<div id="learning">
    <h2 id="lvl"></h2>
    <p id="mission"></p>
    <div id="explain"></div>
</div>

<!-- BREATH CIRCLE -->
<div id="breathCircle"></div>

<!-- AUDIO -->
<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="win" src="/static/sounds/trumpet.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>
<audio id="ok" src="/static/sounds/explosion.mp3"></audio>
<audio id="key" src="/static/sounds/keypress.mp3"></audio>

<script>

// ================= STATE =================
let score = 0;
let level = 1;
let phase = "menu";
let timer, spawn;
let allowInput = true;

// ================= LANGUAGE =================
let lang = "en";

const texts = {
    en: {
        start: "START",
        continue: "CONTINUE",
        back: "BACK",
        points: "POINTS",
        missions: [
            "Breathe without touching the screen.",
            "Control your impulse.",
            "Focus without distractions.",
            "Master your mind."
        ]
    },
    es: {
        start: "INICIAR",
        continue: "CONTINUAR",
        back: "ATRÁS",
        points: "PUNTOS",
        missions: [
            "Respira sin tocar la pantalla.",
            "Controla tu impulso.",
            "Concéntrate sin distracciones.",
            "Domina tu mente."
        ]
    }
};

// ================= WORDS =================
const words = {
    good:["WILL","VISION","HONOR","COURAGE","BUILD","RISE","FAITH","DISCIPLINE","STRENGTH","VICTORY"],
    bad:["NOISE","EXCUSE","QUITTING","EGO","HATE","CHAOS","LAZY","FEAR","LIE","ANGER"],
    neutral:["CALM","LISTEN","WAIT","PEACE","PRAY","INSIDE","BREATHE","STILL","SOUL","FOCUS"]
};

// ================= INIT =================
function start(){
    document.getElementById("menu").style.display="none";
    playMusic();
    runPhase("game1",300);
}

// ================= LANGUAGE =================
function toggleLang(){
    lang = lang === "en" ? "es" : "en";
    applyLang();
}

function applyLang(){
    document.querySelector("#menu button:nth-child(1)").innerText = texts[lang].start;
    document.querySelector("#menu button:nth-child(2)").innerText = texts[lang].continue;
    document.querySelector("#menu button:nth-child(3)").innerText = texts[lang].back;

    document.getElementById("score").innerText =
        `${texts[lang].points}: ${score}`;
}

// ================= PHASES =================
function runPhase(type,time){
    clearAll();

    if(type.includes("game")){
        allowInput=true;
        spawnWords();
        hideLearning();
    }

    if(type==="learn"){
        allowInput=false;
        showLearning();
    }

    startTimer(time,()=>{
        runPhase("learn",360);
    });
}

// ================= TIMER =================
function startTimer(t,cb){
    timer=setInterval(()=>{
        t--;
        updateTimer(t);
        if(t<=0){clearInterval(timer);cb();}
    },1000);
}

function updateTimer(t){
    let m=Math.floor(t/60).toString().padStart(2,"0");
    let s=(t%60).toString().padStart(2,"0");
    document.getElementById("timer").innerText=`${m}:${s}`;
}

// ================= FLOATING =================
function spawnWords(){
    spawn=setInterval(()=>{

        const type = randomType();
        const word = randomWord(type);

        const el=document.createElement("div");
        el.className=`floating word-${type}`;
        el.innerText=word;
        el.style.left=Math.random()*90+"vw";

        el.onmousedown=()=>{

            el.classList.add("blast");

            if(type==="good"){
                score+=5;
                document.getElementById("win").play();
            }

            if(type==="bad"){
                score-=10;
                document.getElementById("bad").play();
            }

            updateScore();
            showExplanation(word);
            setTimeout(()=>el.remove(),300);
        };

        document.body.appendChild(el);
        setTimeout(()=>el.remove(),5000);

    },1200);
}

function randomType(){
    let r=Math.random();
    if(r>0.7)return"bad";
    if(r>0.4)return"good";
    return"neutral";
}

function randomWord(t){
    return words[t][Math.floor(Math.random()*words[t].length)];
}

// ================= LEARNING =================
function showLearning(){

    document.getElementById("learning").style.display="block";

    level = Math.floor(score/50)+1;

    document.getElementById("lvl").innerText="LEVEL "+level;

    const missions = texts[lang].missions;

    document.getElementById("mission").innerText =
        missions[Math.floor(Math.random()*missions.length)];

    // BREATH SYSTEM ACTIVATION
    startBreathing();
}

// ================= BREATH SYSTEM =================
function startBreathing(){
    const circle = document.getElementById("breathCircle");
    circle.style.display="block";

    let cycles = 5;
    let i = setInterval(()=>{

        cycles--;

        if(cycles<=0){
            clearInterval(i);
            circle.style.display="none";
        }

    },4000);
}

// ================= EXPLANATION =================
function showExplanation(word){
    const msg = word + " → meaning loaded";
    document.getElementById("explain").innerText = msg;
}

// ================= SCORE =================
function updateScore(){
    document.getElementById("score").innerText =
        `${texts[lang].points}: ${score}`;
}

// ================= AUDIO =================
function playMusic(){
    let bg=document.getElementById("bg");
    bg.volume=.3;
    bg.play().catch(()=>{});
}

// ================= CONTROL =================
function clearAll(){
    clearInterval(timer);
    clearInterval(spawn);
}

function hideLearning(){
    document.getElementById("learning").style.display="none";
}

function reset(){
    location.reload();
}

window.onload=applyLang;

</script>

</body>
</html>
