<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KAMIZEN</title>

<style>
:root{
  --bg:#000;
  --neon:#00f2ff;
  --green:#00ff88;
  --red:#ff0044;
  --panel:rgba(0,20,40,0.92);
}

body{
  margin:0;
  background:var(--bg);
  color:var(--neon);
  font-family:Arial;
  overflow:hidden;
}

#breath{
  position:absolute;
  top:22%;
  left:50%;
  transform:translate(-50%,-50%);
  width:160px;
  height:160px;
  border-radius:50%;
  border:2px solid var(--neon);
  background:rgba(0,255,255,0.08);
  transition:4s ease-in-out;
}

#top{
  position:absolute;
  top:10px;
  width:95%;
  display:flex;
  justify-content:space-between;
  font-size:12px;
}

#xpBar{
  width:200px;
  height:10px;
  border:1px solid var(--neon);
}
#xpFill{
  width:0%;
  height:100%;
  background:var(--green);
}

#content{
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  text-align:center;
}

#title{font-size:20px;margin-bottom:10px;}
#text{font-size:16px;min-height:80px;}
#reason{font-size:13px;color:white;margin-top:10px;}

#options{
  position:absolute;
  bottom:120px;
  width:90%;
  left:5%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  padding:14px;
  background:black;
  border:1px solid var(--neon);
  color:var(--neon);
}

.correct{background:var(--green)!important;color:black;}
.wrong{background:var(--red)!important;color:white;}

#coachBox{
  position:absolute;
  right:10px;
  top:120px;
  width:200px;
  height:160px;
  border:1px solid var(--neon);
  background:rgba(0,0,0,0.6);
  padding:10px;
  font-size:12px;
}

#metrics{
  position:absolute;
  left:10px;
  top:120px;
  font-size:11px;
  color:white;
}

#breakScreen,#silenceScreen{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

</style>
</head>

<body>

<div id="top">
  <div id="xpBar"><div id="xpFill"></div></div>
  <div id="langBtn" onclick="toggleLang()">EN/ES</div>
</div>

<div id="breath"></div>

<div id="metrics">
  <div>Stress: <span id="stress">0</span></div>
  <div>Focus: <span id="focus">0</span></div>
  <div>Emotion: <span id="emotion">Stable</span></div>
</div>

<div id="coachBox">
  <b>KaMiZen Coach</b>
  <div id="coachText">Ready...</div>
</div>

<div id="content">
  <div id="title"></div>
  <div id="text"></div>
  <div id="reason"></div>
</div>

<div id="options"></div>

<div id="breakScreen">
  <h2>BREAK MODE</h2>
  <button onclick="continueSession()">Continue</button>
</div>

<div id="silenceScreen">
  <h2>SILENCE MODE</h2>
  <h1 id="timer"></h1>
</div>

<script>

/* =========================
SESSION CORE
========================= */
let session_id=null;
let mission=null;
let lang="en";
let xp=0;

/* =========================
USER PROFILE (ADAPTIVE SYSTEM)
========================= */
let profile={
  ageGroup:"adult", // child | adult | senior | veteran | gov
  stress:0,
  focus:0,
  emotion:"neutral"
};

/* =========================
AUDIO ENGINE (VOICE)
========================= */
let q=[];
let speaking=false;

function speak(t){
  q.push(t);
  process();
}

function process(){
  if(speaking||q.length===0) return;
  speaking=true;
  let t=q.shift();

  let u=new SpeechSynthesisUtterance(t);
  u.lang=lang==="en"?"en-US":"es-ES";
  u.rate=0.9;

  u.onend=()=>{speaking=false;setTimeout(process,200);};
  speechSynthesis.speak(u);
}

/* =========================
AMBIENT MUSIC ENGINE (INTELLIGENT)
========================= */
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
let ambientOsc=null;

function startMusic(){
  ambientOsc=audioCtx.createOscillator();
  let gain=audioCtx.createGain();

  ambientOsc.type="sine";
  ambientOsc.frequency.value=40;

  gain.gain.value=0.03;

  ambientOsc.connect(gain);
  gain.connect(audioCtx.destination);

  ambientOsc.start();

  setInterval(()=>{
    let base=40;

    if(profile.stress>60) base=60;
    if(profile.focus>70) base=30;

    ambientOsc.frequency.setValueAtTime(base,audioCtx.currentTime);
  },2000);
}

/* =========================
METRICS ENGINE
========================= */
function updateMetrics(correct){

  if(correct){
    profile.focus+=5;
    profile.stress=Math.max(0,profile.stress-3);
  }else{
    profile.stress+=6;
    profile.focus=Math.max(0,profile.focus-2);
  }

  if(profile.stress>70) profile.emotion="anxious";
  else if(profile.focus>70) profile.emotion="focused";
  else profile.emotion="neutral";

  document.getElementById("stress").innerText=profile.stress;
  document.getElementById("focus").innerText=profile.focus;
  document.getElementById("emotion").innerText=profile.emotion;
}

/* =========================
COACH (CONVERSATIONAL SIMULATION)
========================= */
function coach(msg){
  let c=document.getElementById("coachText");

  let style="";

  if(profile.ageGroup==="child") style="simple focus calm";
  if(profile.ageGroup==="senior") style="slow clear repetition";
  if(profile.ageGroup==="veteran") style="discipline control strength";
  if(profile.ageGroup==="gov") style="strategic analytical";
  if(profile.ageGroup==="adult") style="balanced reasoning";

  c.innerText = msg + " ["+style+"]";
}

/* =========================
START
========================= */
async function start(){
  const r=await fetch("/start",{method:"POST"});
  const d=await r.json();

  session_id=d.session_id;
  mission=d.mission;

  startMusic();
  runMission();
}

/* =========================
MISSION ENGINE
========================= */
async function runMission(){

  const blocks=mission.blocks;

  for(let b of blocks){
    await runBlock(b);
  }

  showBreak();
}

/* =========================
BLOCK ENGINE
========================= */
function wait(ms){return new Promise(r=>setTimeout(r,ms));}

async function runBlock(b){

  let t=document.getElementById("title");
  let x=document.getElementById("text");
  let r=document.getElementById("reason");
  let o=document.getElementById("options");

  o.innerHTML="";

  if(b.type==="story"){
    t.innerText="Story";
    x.innerText=b.text[lang];
    speak(b.text[lang]);
    coach("Observe carefully");
    await wait(4000);
  }

  if(b.type==="analysis"){
    t.innerText="Analysis";
    x.innerText=b.text[lang];
    speak(b.text[lang]);
    coach("Understand situation");
    await wait(4000);
  }

  if(b.type==="breath_focus"){
    t.innerText="Breathing";
    speak(b.guide[lang]);
    await wait((b.duration_sec||20)*1000);
  }

  if(b.type==="tvid"){

    return new Promise(resolve=>{

      b.options.forEach(opt=>{

        let btn=document.createElement("button");
        btn.innerText=opt.text[lang];

        btn.onclick=async()=>{

          const res=await fetch("/judge",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({session_id,decision:opt.code})
          });

          const d=await res.json();

          updateMetrics(d.correct);

          if(d.correct){
            btn.className="correct";
            coach("Good decision");
          }else{
            btn.className="wrong";
            coach("Learn and adjust");
          }

          r.innerText=opt.reason[lang];

          await wait(1500);
          resolve();
        };

        o.appendChild(btn);
      });
    });
  }

  if(b.type==="riso_tvid"){
    speak(b.guide[lang]);
    coach("Smile activation");
    await wait(4000);
  }

  if(b.type==="silence_challenge"){
    return runSilence(b);
  }

  if(b.type==="final_lesson"){
    t.innerText="Lesson";
    x.innerText=b.text[lang];
    speak(b.text[lang]);
    coach("Integration complete");
    await wait(4000);
  }
}

/* =========================
SILENCE MODE
========================= */
function runSilence(b){

  return new Promise(resolve=>{

    let s=document.getElementById("silenceScreen");
    let t=document.getElementById("timer");

    s.style.display="flex";

    let time=b.duration_sec||20;

    let i=setInterval(()=>{

      t.innerText=time;
      time--;

      if(time<=0){
        clearInterval(i);
        s.style.display="none";
        resolve();
      }

    },1000);
  });
}

/* =========================
BREAK
========================= */
function showBreak(){
  document.getElementById("breakScreen").style.display="flex";
}

function continueSession(){
  document.getElementById("breakScreen").style.display="none";
  forceNext();
}

/* =========================
NAV
========================= */
async function forceNext(){
  const r=await fetch("/force_next",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({session_id})});
  const d=await r.json();
  mission=d.mission;
  runMission();
}

/* =========================
LANG
========================= */
function toggleLang(){
  lang=lang==="en"?"es":"en";
}

/* =========================
INIT
========================= */
document.body.onclick=start;

</script>

</body>
</html>
