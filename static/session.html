<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>KAMIZEN LIFE SYSTEM - CORE SESSION</title>
    <style>
        :root{
            --bg:#0b1220;
            --card:#111a2e;
            --primary:#3b82f6;
            --success:#22c55e;
            --danger:#ef4444;
            --text:#ffffff;
            --dim:#94a3b8;
        }
        *{ box-sizing:border-box; }
        body{
            margin:0;
            font-family:'Segoe UI', Arial, sans-serif;
            background:var(--bg);
            color:var(--text);
            display:flex;
            flex-direction: column;
            align-items:center;
            min-height:100vh;
        }
        #main-container{
            width:100%;
            max-width:700px;
            padding:20px;
        }
        .card{
            background:var(--card);
            padding:20px;
            border-radius:16px;
            margin:15px 0;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
            border:1px solid rgba(255,255,255,0.05);
        }
        button{
            width:100%;
            padding:18px;
            border:none;
            border-radius:12px;
            background:var(--primary);
            color:white;
            font-weight:bold;
            font-size: 16px;
            cursor:pointer;
            transition:0.2s;
            margin-bottom: 5px;
        }
        button:hover{ transform:translateY(-2px); }
        button:disabled{ background: #334155; cursor: not-allowed; transform: none; }
        
        .answer{
            background:#1f2937;
            padding:12px;
            margin:8px 0;
            border-radius:10px;
            cursor:pointer;
            border-left:4px solid var(--primary);
            transition:0.2s;
        }
        .answer:hover{ transform:translateX(5px); background:#374151; }

        .breath-circle{
            width:160px;
            height:160px;
            border-radius:50%;
            margin:30px auto;
            border:6px solid var(--primary);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size: 24px;
            font-weight: bold;
            transition: transform 4s ease-in-out; 
        }

        h1,h2,h3{ margin:10px 0; }
        .small{ font-size:12px; color:var(--dim); }
        .center{ text-align:center; }

        #admin-controls {
            display: none; 
            margin-top: 20px;
            opacity: 0.3;
        }

        #admin-controls:hover { 
            opacity: 1; 
        }

        /* PARENT VALIDATION STYLES */
        .validation-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid var(--success);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
        }
        .metric-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }
        .metric-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
        }
        .print-btn {
            background: var(--success);
            margin-top: 15px;
        }

        @media print {
            body { background: white; color: black; }
            .card { border: 1px solid #ccc; box-shadow: none; }
            button, #admin-controls { display: none; }
        }
    </style>
</head>
<body>

<div id="main-container">
    <div class="card center">
        <h2 style="color:var(--primary);">KAMIZEN LIFE SYSTEM</h2>
        <p class="small">Neural Training • Awareness • Discipline • Control</p>
    </div>

    <div id="app">
        <div class="card center">
            <h3>INITIALIZING SYSTEM...</h3>
            <p>Syncing missions 1-63. Please wait.</p>
        </div>
    </div>

    <div id="admin-controls" class="card">
        <input id="missionInput" type="number" min="1" max="63" placeholder="Mission ID (1-63)" 
               style="width:100%;padding:12px;border-radius:8px;border:none;margin-bottom:10px; background:#1f2937; color:white;">
        
        <button onclick="jumpToMissionManual()" style="background:#4b5563;">
            DEBUG: JUMP TO MISSION
        </button>
    </div>
</div>

<script src="/static/js/engine.js"></script>

<script>
// =========================================================
// VALIDATION & REPORT FOR PARENTS (ALL PRO DAD MODEL)
// =========================================================
function renderValidationScreen(missionId, stats) {
    const app = document.getElementById('app');
    
    app.innerHTML = `
        <div class="card validation-card">
            <h2 style="color:var(--success);">MISSION COMPLETED</h2>
            <p class="small">NEURAL TRAINING VALIDATION REPORT</p>
            
            <div class="metric-grid">
                <div class="metric-item"><strong>Mission:</strong> #${missionId}</div>
                <div class="metric-item"><strong>Status:</strong> Verified</div>
                <div class="metric-item"><strong>Focus:</strong> 100%</div>
                <div class="metric-item"><strong>Session ID:</strong> ${Math.floor(Math.random()*90000) + 10000}</div>
            </div>

            <div style="background:#1f2937; padding:15px; border-radius:10px; text-align:left; font-size:14px;">
                <p><strong>Parent Mentor Guide:</strong></p>
                <p>Today the student worked on <em>Impulse Control and Focus</em>. During the next 4 hours, please observe:</p>
                <ul style="padding-left:20px;">
                    <li>Does the student respond calmly to instructions?</li>
                    <li>Does the student maintain eye contact when speaking?</li>
                </ul>
                <p style="font-size:11px; color:var(--dim); margin-top:10px;">
                    This report certifies the completion of a high-performance mental conditioning cycle.
                </p>
            </div>

            <button class="print-btn" onclick="window.print()">
                GENERATE COMPLIANCE PDF
            </button>
            
            <button onclick="location.reload()" style="background:transparent; border:1px solid var(--dim); margin-top:10px;">
                FINISH SESSION
            </button>
        </div>
    `;
    console.log("Mission finished and ready for tutor validation.");
}

// =========================================================
// KEEP SCREEN / SESSION ACTIVE ON MOBILE
// =========================================================
let wakeLock = null;

async function requestWakeLock() {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
        }
    } catch (err) {
        console.log(`Wake Lock error: ${err.name}`);
    }
}

document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible') {
        await requestWakeLock();
    }
});

window.addEventListener('load', async () => {
    await requestWakeLock();
});

// =========================================================
// PREVENT FREEZE ON IOS / ANDROID
// =========================================================
setInterval(() => {
    document.body.dataset.keepalive = Date.now();
}, 15000);

setInterval(() => {
    if (window.speechSynthesis && speechSynthesis.paused) {
        speechSynthesis.resume();
    }
}, 2000);

// =========================================================
// MANUAL LINK WITH ENGINE.JS (Updated 1-63)
// =========================================================
function jumpToMissionManual() {
    const input = document.getElementById("missionInput");
    const id = Number(input.value);
    
    if (id > 0 && typeof state !== "undefined") {
        const idx = state.missions.findIndex(m => m.id === id);

        if (idx !== -1) {
            window.speechSynthesis.cancel();

            if(state.timer) {
                clearInterval(state.timer);
            }

            state.currentIndex = idx;
            state.currentBlock = 0;
            state.phase = "story";

            render();
        } else {
            alert("Mission ID not found in current mission files.");
        }
    }
}

function showAdmin() {
    document.getElementById('admin-controls').style.display = 'block';
}
</script>

</body>
</html>
