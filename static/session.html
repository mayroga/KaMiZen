<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>KAMIZEN | SESSION PRO CLEAN</title>

<style>
:root{
  --bg:#000;
  --neon:#00f2ff;
  --text:#eaeaea;
}

*{box-sizing:border-box;font-family:Arial;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* TOP */
#topBar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:40px;
  padding:10px;
}

.stat{font-size:14px;text-align:center;}
.stat b{display:block;color:var(--neon);font-size:18px;}

/* TIMER */
#timerBox{
  position:fixed;
  top:60px;
  width:100%;
  text-align:center;
  color:yellow;
}

/* MAIN */
#container{
  position:absolute;
  top:120px;
  bottom:120px;
  left:0;
  right:0;
  padding:20px;
  overflow:auto;
}

#missionBox{
  border:1px solid var(--neon);
  padding:15px;
  border-radius:10px;
}

.option{
  margin:10px 0;
  padding:12px;
  border:1px solid #333;
  cursor:pointer;
}

.option:hover{border-color:var(--neon);}

/* CONTROLS */
#controls{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
}

button{
  background:#111;
  border:1px solid var(--neon);
  color:white;
  padding:10px;
}
</style>
</head>

<body>

<div id="topBar">
  <div class="stat">POINTS<b id="points">0</b></div>
  <div class="stat">FOCUS<b id="focus">0</b></div>
  <div class="stat">ENERGY<b id="energy">0</b></div>
</div>

<div id="timerBox">--:--</div>

<div id="container">
  <div id="missionBox">START</div>
</div>

<div id="controls">
  <button onclick="Engine.start()">START</button>
  <button onclick="Engine.back()">BACK</button>
  <button onclick="Engine.next()">NEXT</button>
  <button onclick="Engine.restart()">RESTART</button>
  <button onclick="Engine.toggleLang()">EN/ES</button>
</div>

<div id="breath" style="width:80px;height:80px;border-radius:50%;background:#00f2ff;margin:auto;display:none;"></div>

<script src="engine.js"></script>

<script>
window.updateSessionUI = function(s){
  document.getElementById("points").innerText = s.points;
  document.getElementById("focus").innerText = s.focus;
  document.getElementById("energy").innerText = s.energy;
  document.getElementById("timerBox").innerText = s.timerText || "";
};
</script>

</body>
</html>
