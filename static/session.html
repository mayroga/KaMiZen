<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | CONTROL SURFACE</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #001a33, #000);
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* =========================
   TOP BAR
========================= */
#topbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 12px;
    background: rgba(0,0,0,0.4);
    z-index: 999;
    flex-wrap: wrap;
}

/* =========================
   BUTTONS (PASSIVE ONLY)
========================= */
button {
    padding: 10px 14px;
    border: 2px solid #00f2ff;
    background: rgba(0,242,255,0.08);
    color: white;
    border-radius: 10px;
    cursor: pointer;
    min-width: 90px;
}

button:hover {
    background: #00f2ff;
    color: black;
}

/* =========================
   DISPLAY AREA (READ ONLY)
========================= */
#game {
    padding-top: 80px;
    text-align: center;
}

#score-display {
    margin-top: 10px;
    color: #00f2ff;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- =========================
     CONTROL SURFACE (NO LOGIC)
========================= -->
<div id="topbar">

    <!-- NO onclick ENGINE CALLS -->
    <button data-action="lang">EN / ES</button>

    <button data-action="back">BACK</button>
    <button data-action="start">START</button>
    <button data-action="continue">CONTINUE</button>
    <button data-action="pause">PAUSE</button>
    <button data-action="restart">RESTART</button>

</div>

<!-- =========================
     GAME OUTPUT ONLY
========================= -->
<div id="game">

    <h2 id="hero-name"></h2>

    <div id="story">WAITING ENGINE...</div>
    <div id="analysis"></div>

    <div id="options"></div>

    <div id="score-display">PUNTOS: 0</div>

</div>

<!-- AUDIO ONLY -->
<audio id="bg" loop src="/static/sounds/bg.mp3"></audio>
<audio id="ok" src="/static/sounds/success.mp3"></audio>
<audio id="bad" src="/static/sounds/glass.mp3"></audio>

</body>
</html>
