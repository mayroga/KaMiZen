<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AL CIELO | NEURO-SYSTEM</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-gold: #f1c40f;
            --neon-green: #2ecc71;
            --neon-red: #ff3131;
            --bg-dark: #020205;
        }
        body { margin: 0; overflow: hidden; background: var(--bg-dark); color: white; font-family: 'Orbitron', sans-serif; cursor: none; }
        
        #hud {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: space-evenly;
            z-index: 100; pointer-events: none;
        }
        .data-box {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--neon-blue);
            padding: 10px 20px; text-align: center;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            min-width: 130px;
        }
        .label { font-size: 10px; color: var(--neon-blue); letter-spacing: 2px; font-weight: 900; display: block; }
        .value { font-size: 24px; font-weight: 900; display: block; }

        canvas { display: block; }

        #overlay {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; text-align: center;
        }
        .start-btn {
            padding: 20px 50px; background: var(--neon-blue); color: black;
            border: none; font-family: 'Orbitron'; font-weight: 900;
            cursor: pointer; margin-top: 30px; letter-spacing: 3px;
            box-shadow: 0 0 30px var(--neon-blue);
        }
        #alert-flash {
            position: fixed; inset: 0; pointer-events: none;
            z-index: 50; opacity: 0; transition: opacity 0.1s;
        }
        #timer-box {
            position: absolute; bottom: 20px; right: 20px;
            color: var(--neon-red); font-weight: 900; font-size: 18px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="alert-flash"></div>

<div id="hud">
    <div class="data-box" style="border-color: var(--neon-gold);">
        <span class="label">CURRENT CAPITAL</span>
        <span id="val-money" class="value">0</span>
    </div>
    <div class="data-box" style="border-color: var(--neon-green);">
        <span class="label">STABILITY</span>
        <span id="val-health" class="value">100%</span>
    </div>
    <div class="data-box" style="border-color: var(--neon-blue);">
        <span class="label">SYSTEM LEVEL</span>
        <span id="val-rank" class="value">LEVEL 1</span>
    </div>
</div>

<div id="timer-box">SESSION TIME: <span id="time-left">27:00</span></div>

<div id="overlay">
    <h1 style="color: var(--neon-blue); letter-spacing: 15px; font-size: 40px;">AL CIELO</h1>
    <h2 style="color: var(--neon-gold); font-size: 14px;">SURVIVAL & DISCIPLINE INTERFACE</h2>
    <p id="desc" style="color: #666; max-width: 400px; font-size: 12px; margin-top: 20px;">
        WARNING: Threats reduce capital significantly. <br>Stability at 0% resets the current level.
    </p>
    <button id="main-btn" class="start-btn" onclick="startGame()">INITIALIZE INTERFACE</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let audioCtx;

const levels = [
    {
        name: "NEURO-SURVIVAL",
        rank: "LEVEL 1",
        data: [
            { text: "LOOK AROUND", type: "pos", impact: 200, color: "#2ecc71", freq: 880 },
            { text: "UNKNOWN", type: "neg", impact: -40, color: "#ff3131", freq: 110 },
            { text: "SAVINGS", type: "pos", impact: 150, color: "#f1c40f", freq: 659 },
            { text: "BULLYING", type: "neg", impact: -30, color: "#ff3131", freq: 90 },
            { text: "DISCIPLINE", type: "pos", impact: 300, color: "#00f2ff", freq: 1046 },
            { text: "DISTRACTION", type: "neg", impact: -25, color: "#e67e22", freq: 130 }
        ],
        target: 5000,
        hasLasers: false
    },
    {
        name: "USA TOTAL SURVIVAL",
        rank: "LEVEL 2",
        data: [
            { text: "EXIT SIGNS", type: "pos", impact: 500, color: "#2ecc71", freq: 900 },
            { text: "STRANGER DANGER", type: "neg", impact: -40, color: "#ff3131", freq: 80 },
            { text: "INVESTMENT", type: "pos", impact: 1000, color: "#f1c40f", freq: 600 },
            { text: "PEER PRESSURE", type: "neg", impact: -20, color: "#ff3131", freq: 120 },
            { text: "CYBER SECURITY", type: "pos", impact: 300, color: "#00f2ff", freq: 1100 }
        ],
        target: 25000,
        hasLasers: true
    },
    {
        name: "50 STATES MATRIX",
        rank: "LEVEL 3",
        data: [
            { text: "ACTIVE SHOOTER DRILL", type: "pos", impact: 1000, color: "#2ecc71", freq: 1200 },
            { text: "UNLOCKED FIREARM", type: "neg", impact: -100, color: "#ff3131", freq: 80 },
            { text: "CREDIT CARD DEBT", type: "neg", impact: -50, color: "#e67e22", freq: 110 },
            { text: "SITUATIONAL AWARENESS", type: "pos", impact: 500, color: "#00f2ff", freq: 900 },
            { text: "KNOW YOUR RIGHTS", type: "pos", impact: 800, color: "#f1c40f", freq: 750 }
        ],
        target: 100000,
        hasLasers: true
    }
];

let stats = { money: 0, health: 100, currentLevel: 0 };
let active = false;
let objects = [];
let particles = [];
let difficulty = 1.0;
let sessionEndTime = null;
const user = { x: canvas.width / 2, y: canvas.height / 2, size: 55 };

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function checkLockout() {
    const lastRun = localStorage.getItem('alCieloLastEnd');
    if (lastRun) {
        const hoursPassed = (Date.now() - parseInt(lastRun)) / (1000 * 60 * 60);
        if (hoursPassed < 8) {
            const remaining = (8 - hoursPassed).toFixed(1);
            document.getElementById('desc').innerText = `SYSTEM LOCKED. ACCESS GRANTED IN ${remaining} HOURS.`;
            document.getElementById('main-btn').style.display = 'none';
            return true;
        }
    }
    return false;
}

function triggerSound(freq, type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type === 'pos' ? 'sine' : 'sawtooth';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.6);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.6);
}

function flashScreen(color) {
    const f = document.getElementById('alert-flash');
    f.style.backgroundColor = color;
    f.style.opacity = "0.4";
    setTimeout(() => f.style.opacity = "0", 150);
}

function spawn() {
    if(!active) return;
    const levelData = levels[stats.currentLevel].data;
    const entry = levelData[Math.floor(Math.random() * levelData.length)];
    objects.push({
        ...entry,
        x: Math.random() * (canvas.width - 200) + 100,
        y: -150,
        speed: (3 + (stats.money / 20000)) * difficulty
    });
}

function update() {
    if(!active) return;

    const diff = sessionEndTime - Date.now();
    if (diff <= 0) {
        endGame("SESSION COMPLETE. SYSTEM DISCONNECTING.");
        return;
    }
    const mins = Math.floor(diff / 60000);
    const secs = Math.floor((diff % 60000) / 1000);
    document.getElementById('time-left').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;

    objects.forEach((obj, i) => {
        obj.y += obj.speed;
        const dist = Math.sqrt((obj.x - user.x)**2 + (obj.y - user.y)**2);
        
        if (dist < user.size) {
            if (obj.type === 'neg') {
                stats.health -= 25;
                let penalty = stats.currentLevel === 0 ? 0.5 : 0.1; 
                stats.money = Math.floor(stats.money * penalty);
                triggerSound(obj.freq, 'neg');
                flashScreen('red');
            } else {
                stats.money += obj.impact;
                stats.health = Math.min(100, stats.health + 5);
                triggerSound(obj.freq, 'pos');
                flashScreen('gold');
                difficulty += 0.02;
            }
            updateHUD();
            createExplosion(obj.x, obj.y, obj.color);
            objects.splice(i, 1);
        }
        if(obj.y > canvas.height + 200) objects.splice(i, 1);
    });

    if (stats.money >= levels[stats.currentLevel].target && stats.currentLevel < 2) {
        stats.currentLevel++;
        updateHUD();
    }

    if(stats.health <= 0) {
        stats.health = 100;
        stats.money = 0;
        objects = [];
        updateHUD();
    }
}

function updateHUD() {
    document.getElementById('val-money').innerText = (stats.currentLevel === 0 ? "" : "$") + stats.money;
    document.getElementById('val-health').innerText = stats.health + "%";
    document.getElementById('val-rank').innerText = levels[stats.currentLevel].rank;
}

function createExplosion(x, y, color) {
    for (let i = 0; i < 15; i++) {
        particles.push({
            x, y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, life: 1.0, color
        });
    }
}

function draw() {
    ctx.fillStyle = 'rgba(2, 2, 5, 0.2)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // USER CORE
    ctx.shadowBlur = 25;
    ctx.shadowColor = "#00f2ff";
    ctx.strokeStyle = "#00f2ff";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(user.x, user.y, user.size - 10, 0, Math.PI * 2);
    ctx.stroke();

    objects.forEach(obj => {
        ctx.shadowBlur = 15;
        ctx.shadowColor = obj.color;
        
        // TELARAÑA / LÁSER (Solo niveles 2 y 3 para objetos NEGATIVOS)
        if(levels[stats.currentLevel].hasLasers && obj.type === 'neg') {
            ctx.strokeStyle = obj.color;
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]); // Efecto punteado
            ctx.beginPath();
            ctx.moveTo(obj.x, obj.y);
            ctx.lineTo(user.x, user.y);
            ctx.stroke();
            ctx.setLineDash([]); // Reset
        }

        ctx.fillStyle = "white";
        ctx.font = "900 18px Orbitron";
        ctx.textAlign = "center";
        ctx.fillText(obj.text, obj.x, obj.y);
    });

    particles.forEach((p, i) => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 3, 3);
        p.x += p.vx; p.y += p.vy; p.life -= 0.03;
        if(p.life <= 0) particles.splice(i, 1);
    });
    ctx.globalAlpha = 1;
}

window.addEventListener('mousemove', e => { user.x = e.clientX; user.y = e.clientY; });
window.addEventListener('touchmove', e => { user.x = e.touches[0].clientX; user.y = e.touches[0].clientY; e.preventDefault(); }, {passive: false});

function startGame() {
    if(checkLockout()) return;
    document.getElementById('overlay').style.display = 'none';
    active = true;
    sessionEndTime = Date.now() + (27 * 60 * 1000);
    setInterval(spawn, 800);
    loop();
}

function endGame(msg) {
    active = false;
    localStorage.setItem('alCieloLastEnd', Date.now().toString());
    alert(msg);
    location.reload();
}

function loop() {
    update();
    draw();
    if(active) requestAnimationFrame(loop);
}

checkLockout();
</script>
</body>
</html>
