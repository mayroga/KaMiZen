<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN EXPERIENCE FLOW</title>

<style>
body{
    margin:0;
    background:#000;
    color:#00f2ff;
    font-family:Arial;
    overflow:hidden;
}

#app{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:20px;
    padding:20px;
    box-sizing:border-box;
}

#message{
    max-width:800px;
    min-height:160px;
    padding:20px;
    border:1px solid #00f2ff;
    background:rgba(0,10,20,0.9);
    text-align:center;
    font-size:22px;
    line-height:1.4;
    transition:all 0.5s ease;
}

#circle{
    width:100px;
    height:100px;
    border-radius:50%;
    background:rgba(0,242,255,0.2);
    box-shadow:0 0 30px #00f2ff;
    display:none;
}

#options{
    display:none;
    flex-direction:column;
    gap:10px;
}

button{
    padding:14px;
    border:1px solid #00f2ff;
    background:transparent;
    color:#00f2ff;
    cursor:pointer;
}

.correct{background:#00ff88;color:#000;}
.wrong{background:#ff3355;color:#fff;}

#timer{
    font-size:18px;
    opacity:0.7;
}

#top{
    position:absolute;
    top:10px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 10px;
}
</style>
</head>

<body>

<div id="app">

<div id="top">
<button onclick="toggleLang()">ES/EN</button>
<button onclick="restart()">RESTART</button>
</div>

<div id="message">TOUCH TO START</div>
<div id="circle"></div>
<div id="timer"></div>
<div id="options"></div>

</div>

<script>

let session_id=null;
let lang="en";
let current=null;
let locked=true;

/* VOZ */
function speak(text){
    return new Promise(res=>{
        if(!text){res();return;}
        const u=new SpeechSynthesisUtterance(text);
        u.rate=0.9;
        u.lang=lang==="es"?"es-ES":"en-US";
        u.onend=res;
        speechSynthesis.speak(u);
    });
}

/* START */
async function start(){
    const res=await fetch("/start",{method:"POST"});
    const data=await res.json();

    session_id=data.session_id;
    run(data.story);
}

/* ENGINE PRINCIPAL */
async function run(block){

    locked=true;
    hideOptions();

    current=block;

    const text=
        block.text?.[lang]||
        block.analysis?.[lang]||
        block.question?.[lang]||
        "...";

    await show(text);

    /* =========================
       1. STORY / ANALYSIS
    ========================= */
    if(block.type==="story" || block.type==="analysis"){
        await pause(1200);
        next();
        return;
    }

    /* =========================
       2. QUESTION (TVID)
    ========================= */
    if(block.type==="tvid"){
        showOptions(block);
        return;
    }

    /* =========================
       3. FEEDBACK FLOW
    ========================= */
    if(block.type==="micro_explanation"){
        await pause(1200);
        next();
        return;
    }

    /* =========================
       4. BREATH (DESPUÉS DE RESPONDER)
    ========================= */
    if(block.type==="breath_focus"){
        await speak("Now we breathe. This resets your mind.");
        await breath(block.duration_sec);
        next();
        return;
    }

    /* =========================
       5. RISOTERAPIA
    ========================= */
    if(block.type==="riso_tvid"){
        await speak("Now we activate light smile. This shifts emotional state.");
        await timer(block.duration_sec);
        next();
        return;
    }

    /* =========================
       6. SILENCIO
    ========================= */
    if(block.type==="silence_challenge"){
        await speak("Now silence challenge. No reaction. Full awareness.");
        await timer(block.duration_sec);
        next();
        return;
    }

    /* FINAL */
    if(block.type==="final_lesson"){
        await pause(1500);
        next();
    }
}

/* SHOW TEXT */
async function show(t){
    document.getElementById("message").innerText=t;
    await speak(t);
}

/* OPTIONS TVID */
function showOptions(block){

    const box=document.getElementById("options");
    box.style.display="flex";
    box.innerHTML="";

    locked=false;

    block.options.forEach(o=>{
        const b=document.createElement("button");
        b.innerText=o.text.en;

        b.onclick=async ()=>{

            if(locked) return;

            if(o.correct){
                b.classList.add("correct");
                locked=true;

                await show(o.reason.en);

                setTimeout(()=>{
                    hideOptions();
                    next();
                },1200);

            }else{
                b.classList.add("wrong");
                await show(o.reason.en);
            }
        };

        box.appendChild(b);
    });
}

function hideOptions(){
    document.getElementById("options").style.display="none";
}

/* BREATH */
function breath(sec){
    return new Promise(res=>{
        const c=document.getElementById("circle");
        c.style.display="block";

        let grow=true;

        const i=setInterval(()=>{
            c.style.transform=grow?"scale(2)":"scale(1)";
            grow=!grow;
        },2000);

        setTimeout(()=>{
            clearInterval(i);
            c.style.display="none";
            res();
        },sec*1000);
    });
}

/* TIMER */
function timer(sec){
    return new Promise(res=>{
        const t=document.getElementById("timer");

        let s=sec;
        t.innerText=s+"s";

        const i=setInterval(()=>{
            s--;
            t.innerText=s+"s";

            if(s<=0){
                clearInterval(i);
                res();
            }
        },1000);
    });
}

/* NEXT */
async function next(){

    const res=await fetch("/judge",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({session_id,decision:"NEXT"})
    });

    const data=await res.json();
    run(data.story);
}

/* CONTROL */
function restart(){location.reload();}
function toggleLang(){lang=lang==="en"?"es":"en";if(current)run(current);}
function pause(ms){return new Promise(r=>setTimeout(r,ms));}

document.getElementById("message").onclick=start;

</script>

</body>
</html>
