<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN TRAINING</title>

<style>
body {
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#000;
    color:#00f2ff;
    overflow:hidden;
}

/* CENTER TEXT */
#centerText {
    position:absolute;
    top:40%;
    width:100%;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

/* TIMER */
#timer {
    position:absolute;
    top:10px;
    right:20px;
    font-size:18px;
}

/* START SCREEN */
#startScreen {
    position:absolute;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#nameInput {
    padding:10px;
    font-size:18px;
    margin-bottom:15px;
    border:none;
    outline:none;
}

#startBtn {
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}

/* CHOICES */
#choices {
    position:absolute;
    bottom:120px;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
}

.choiceBtn {
    width:80%;
    padding:12px;
    font-size:16px;
    cursor:pointer;
    border:none;
    background:#111;
    color:#fff;
}

/* EXPLANATION BOX */
#explanationBox {
    position:absolute;
    bottom:10px;
    right:10px;
    width:300px;
    background:#111;
    padding:10px;
    opacity:0;
    transition:0.3s;
}

#expTitle {
    font-weight:bold;
    margin-bottom:5px;
}

#expBody {
    font-size:14px;
}

/* CONTINUE BUTTON */
#continueBtn {
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    padding:10px 20px;
    display:none;
    cursor:pointer;
}

/* RESET */
#resetBtn {
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    padding:10px 20px;
    display:none;
}

/* WORDS GAME */
.word {
    position:absolute;
    color:#00ff41;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

/* NEON EFFECT */
.choiceBtn:hover {
    background:#00f2ff;
    color:#000;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
    <h2>Enter your name</h2>
    <input id="nameInput" placeholder="Your name">
    <button id="startBtn">Start</button>
</div>

<!-- MAIN UI -->
<div id="centerText"></div>
<div id="timer"></div>

<!-- CHOICES -->
<div id="choices"></div>

<!-- CONTINUE -->
<button id="continueBtn">Continue</button>

<!-- RESET -->
<button id="resetBtn">Restart</button>

<!-- EXPLANATION -->
<div id="explanationBox">
    <div id="expTitle">Info</div>
    <div id="expBody"></div>
</div>

<!-- AUDIO -->
<audio id="sfxGlass" src="https://assets.mixkit.co/sfx/preview/mixkit-glass-click-1110.mp3"></audio>

<!-- ENGINE -->
<script src="js/engine.js"></script>

<script>
let playerName = "Player";

/* START APP */
document.getElementById("startBtn").onclick = () => {
    playerName = document.getElementById("nameInput").value || "Player";
    document.getElementById("startScreen").style.display = "none";

    Engine.init();

    document.getElementById("centerText").innerText = "Welcome " + playerName;

    speak("Welcome " + playerName);

    setTimeout(() => {
        Engine.start();
    }, 2000);
};

/* VOICE */
function speak(text){
    try{
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = "en-US";

        const voices = speechSynthesis.getVoices();
        const male = voices.find(v => v.name.toLowerCase().includes("male"));

        if(male) msg.voice = male;

        speechSynthesis.speak(msg);
    }catch(e){}
}

/* RESET */
document.getElementById("resetBtn").onclick = () => {
    location.reload();
};
</script>

</body>
</html>
