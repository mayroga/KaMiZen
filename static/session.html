<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AL CIELO - LIFE STRATEGY</title>
    <style>
        :root {
            --neon-blue: #00f2ff; --neon-gold: #f1c40f; --neon-green: #2ecc71;
            --neon-purple: #9b59b6; --neon-red: #ff3131; --bg-dark: #020205;
        }
        body { margin: 0; overflow: hidden; background: var(--bg-dark); color: white; font-family: 'Orbitron', sans-serif; cursor: none; }
        #hud { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-evenly; z-index: 100; pointer-events: none; flex-wrap: wrap; }
        .data-box { background: rgba(0, 0, 0, 0.9); border: 2px solid var(--neon-blue); padding: 5px 10px; text-align: center; min-width: 85px; border-radius: 5px; margin: 2px; }
        .label { font-size: 8px; color: var(--neon-blue); font-weight: 900; display: block; }
        .value { font-size: 16px; font-weight: 900; color: #fff; }
        #timer-box { color: var(--neon-red); border-color: var(--neon-red); }

        #overlay-system { position: fixed; inset: 0; background: var(--bg-dark); z-index: 1000; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; text-align: center; }
        .tutorial-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 700px; margin: 20px 0; }
        .item-info { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; border-left: 4px solid var(--neon-blue); font-size: 11px; text-align: left; }
        .btn-start { padding: 18px 50px; background: var(--neon-blue); border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; border-radius: 50px; box-shadow: 0 0 25px var(--neon-blue); margin-top: 15px; }
        
        #flash-effect { position: fixed; inset: 0; pointer-events: none; z-index: 99; opacity: 0; transition: opacity 0.1s; }
        canvas { display: block; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="flash-effect"></div>

<div id="hud">
    <div id="timer-box" class="data-box"><span class="label">SESSION TIME</span><span id="val-time" class="value">10:00</span></div>
    <div class="data-box" style="border-color: var(--neon-gold);"><span class="label">CAPITAL</span><span id="val-money" class="value">0</span></div>
    <div class="data-box" style="border-color: var(--neon-green);"><span class="label">STABILITY</span><span id="val-health" class="value">100%</span></div>
    <div class="data-box" style="border-color: #e67e22;"><span class="label">LEGACY</span><span id="val-legacy" class="value">0</span></div>
</div>

<div id="overlay-system">
    <h1 style="color: var(--neon-blue); letter-spacing: 8px;">AL CIELO</h1>
    <p id="sub-title" style="color: var(--neon-gold); font-size: 13px;"></p>
    <div id="dynamic-tutorial" class="tutorial-grid"></div>
    <button id="action-btn" class="btn-start" onclick="beginSession()">INITIALIZE WITH AUDIO</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const flash = document.getElementById('flash-effect');
let audioCtx, gameTimer, sessionSeconds = 600;
let musicOsc, musicGain, currentBaseFreq = 220; // La base de la música de dopamina

const variants = {
    safety: [
        { t: "WATCH OUT", e: "👀", s: "aware", i: 15, c: "#00f2ff", f: 523 },
        { t: "STAY ALERT", e: "🔍", s: "aware", i: 20, c: "#00f2ff", f: 587 },
        { t: "BE VIGILANT", e: "🛡️", s: "health", i: 10, c: "#2ecc71", f: 659 }
    ],
    danger: [
        { t: "STRANGER", e: "👤", s: "health", i: -45, c: "#ff3131", f: 110 },
        { t: "BAD CALL", e: "👿", s: "health", i: -30, c: "#ff3131", f: 130 },
        { t: "THREAT", e: "🏎️", s: "health", i: -50, c: "#ff3131", f: 90 }
    ],
    finance: [
        { t: "SAVE CASH", e: "💰", s: "money", i: 150, c: "#f1c40f", f: 783 },
        { t: "NEW BUSINESS", e: "💡", s: "money", i: 300, c: "#f1c40f", f: 1046 },
        { t: "WORK HARD", e: "🔨", s: "money", i: 100, c: "#f1c40f", f: 880 }
    ],
    values: [
        { t: "BE KIND", e: "🙏", s: "legacy", i: 25, c: "#9b59b6", f: 440 },
        { t: "RESPECT", e: "🫡", s: "legacy", i: 30, c: "#2ecc71", f: 493 },
        { t: "STUDY TIME", e: "📚", s: "legacy", i: 40, c: "#3498db", f: 987 }
    ]
};

const explanations = [
    "Every touch defines your future. Avoid the red, embrace the growth.",
    "Survival is about choice. Learn to filter the street from the noise.",
    "Your legacy is built on daily habits. Start your 10-minute training."
];

let stats = { money: 0, health: 100, legacy: 0, aware: 0 };
let active = false, objects = [];
const user = { x: 0, y: 0, size: 60 };

// --- SISTEMA DE AUDIO ---
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Música de fondo (Dopamina Binaural)
    musicOsc = audioCtx.createOscillator();
    musicGain = audioCtx.createGain();
    musicOsc.type = 'triangle';
    musicOsc.frequency.setValueAtTime(currentBaseFreq, audioCtx.currentTime);
    musicGain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    
    musicOsc.connect(musicGain);
    musicGain.connect(audioCtx.destination);
    musicOsc.start();
}

function playEffect(freq, type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type === 'pos' ? 'sine' : 'sawtooth';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
    osc.connect(g);
    g.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
}

function modulateMusic() {
    if (!active) return;
    // Cambia el tono cada minuto (sube o baja aleatoriamente para relajar/estimular)
    const tones = [164.81, 196.00, 220.00, 261.63, 329.63];
    currentBaseFreq = tones[Math.floor(Math.random() * tones.length)];
    musicOsc.frequency.exponentialRampToValueAtTime(currentBaseFreq, audioCtx.currentTime + 2);
}

// --- LÓGICA DEL JUEGO ---
function generateSessionContent() {
    const grid = document.getElementById('dynamic-tutorial');
    const sub = document.getElementById('sub-title');
    grid.innerHTML = '';
    sub.innerText = explanations[Math.floor(Math.random() * explanations.length)];
    const pool = [...variants.safety, ...variants.danger, ...variants.finance, ...variants.values];
    const shuffled = pool.sort(() => 0.5 - Math.random()).slice(0, 8);
    shuffled.forEach(item => {
        const div = document.createElement('div');
        div.className = 'item-info';
        div.innerHTML = `<b>${item.e} ${item.t}:</b> Impact on ${item.s.toUpperCase()}.`;
        grid.appendChild(div);
    });
}

function updateTimer() {
    if(!active) return;
    sessionSeconds--;
    if (sessionSeconds % 60 === 0) modulateMusic(); // Modular cada minuto

    let mins = Math.floor(sessionSeconds / 60);
    let secs = sessionSeconds % 60;
    document.getElementById('val-time').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    if(sessionSeconds <= 0) endGame("SESSION COMPLETE: Legacy Registered.");
}

function spawn() {
    if(!active) return;
    const cat = Object.keys(variants)[Math.floor(Math.random()*4)];
    const item = variants[cat][Math.floor(Math.random()*3)];
    objects.push({ ...item, x: Math.random()*(canvas.width-200)+100, y: -100, speed: 2.5 + Math.random()*2, drift: (Math.random()-0.5)*2 });
}

function update() {
    if(!active) return;
    objects.forEach((obj, i) => {
        obj.y += obj.speed;
        obj.x += obj.drift;
        const dist = Math.sqrt((obj.x - user.x)**2 + (obj.y - user.y)**2);
        if (dist < user.size) {
            playEffect(obj.f, obj.i > 0 ? 'pos' : 'neg');
            if(obj.s === 'money') stats.money += obj.i;
            if(obj.s === 'health') stats.health = Math.max(0, Math.min(100, stats.health + obj.i));
            if(obj.s === 'legacy') stats.legacy += obj.i;
            if(obj.s === 'aware') stats.aware += obj.i;
            triggerFlash(obj.i > 0 ? 'var(--neon-green)' : 'var(--neon-red)');
            updateHUD();
            objects.splice(i, 1);
        }
        if(obj.y > canvas.height + 100) objects.splice(i, 1);
    });
    if(stats.health <= 0) endGame("SYSTEM COLLAPSE: Stability Lost.");
}

function updateHUD() {
    document.getElementById('val-money').innerText = stats.money;
    document.getElementById('val-health').innerText = stats.health + "%";
    document.getElementById('val-legacy').innerText = stats.legacy;
}

function endGame(msg) {
    active = false;
    musicGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
    clearInterval(gameTimer);
    alert(msg);
    location.reload();
}

function draw() {
    ctx.fillStyle = 'rgba(2, 2, 5, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#00f2ff"; ctx.lineWidth = 3; ctx.beginPath();
    ctx.arc(user.x, user.y, user.size - 10, 0, Math.PI * 2); ctx.stroke();
    objects.forEach(obj => {
        ctx.fillStyle = obj.c; ctx.textAlign = "center";
        ctx.font = "bold 12px Orbitron"; ctx.fillText(obj.t, obj.x, obj.y - 40);
        ctx.font = "50px Arial"; ctx.fillText(obj.e, obj.x, obj.y);
    });
}

function triggerFlash(color) {
    flash.style.backgroundColor = color; flash.style.opacity = "0.3";
    setTimeout(() => flash.style.opacity = "0", 100);
}

function beginSession() {
    initAudio();
    document.getElementById('overlay-system').style.display = 'none';
    active = true;
    gameTimer = setInterval(updateTimer, 1000);
    setInterval(spawn, 800);
    loop();
}

function loop() { if(active) { update(); draw(); requestAnimationFrame(loop); } }
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
window.addEventListener('mousemove', e => { user.x = e.clientX; user.y = e.clientY; });
window.addEventListener('touchmove', e => { user.x = e.touches[0].clientX; user.y = e.touches[0].clientY; }, {passive: false});

generateSessionContent();
</script>
</body>
</html>
