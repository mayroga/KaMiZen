<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>MaykaMi | Neural Architect</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'JetBrains Mono', monospace; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: #000;
            color: #00f2ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            transition: background-image 2s ease-in-out;
        }

        /* Efecto de escaneo de terminal */
        body::before {
            content: " ";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes infiniteZoom {
            from { background-size: 100%; filter: brightness(0.4) grayscale(0.5); }
            to { background-size: 115%; filter: brightness(0.6) grayscale(0); }
        }

        .zoom-active { animation: infiniteZoom 40s linear infinite alternate; }

        #app {
            width: 90%;
            max-width: 400px;
            background: rgba(0, 15, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid #00f2ff55;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            z-index: 10;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        #logo {
            font-size: 24px;
            font-weight: 700;
            color: #00f2ff;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00f2ff;
        }

        #mental-panel {
            display: flex; justify-content: space-around;
            font-size: 10px; color: #00f2ffaa; margin-top: 10px;
        }

        #block-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }

        #text-content {
            font-size: 18px; line-height: 1.4; color: #fff;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
            min-height: 120px;
        }

        /* Respiración "Cibernética" */
        #breath-circle {
            width: 130px; height: 130px; border-radius: 50%;
            border: 2px solid #00f2ff;
            box-shadow: 0 0 15px #00f2ff;
            display: none; justify-content: center; align-items: center;
            margin: 20px auto; position: relative;
        }

        .breathing-anim { animation: cyberBreathe 4s ease-in-out infinite; }

        @keyframes cyberBreathe {
            0%, 100% { transform: scale(0.85); opacity: 0.5; box-shadow: 0 0 5px #00f2ff; }
            50% { transform: scale(1.15); opacity: 1; box-shadow: 0 0 30px #00f2ff; }
        }

        #timer-display { font-size: 38px; font-weight: 700; color: #00f2ff; }

        /* Botones estilo UI de juego */
        button {
            padding: 16px; border: 1px solid #00f2ff; border-radius: 4px;
            background: transparent; color: #00f2ff; font-weight: 700;
            text-transform: uppercase; cursor: pointer; transition: all 0.2s;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }

        button:active { background: #00f2ff; color: #000; }
        button:disabled { border-color: #333; color: #333; }

        .secondary { font-size: 10px; border-color: #00f2ff55; color: #00f2ffaa; }

        /* Efecto Glitch para errores */
        .glitch-effect { animation: glitch 0.2s infinite; }
        @keyframes glitch {
            0% { transform: translate(2px, 0); }
            50% { transform: translate(-2px, -2px); filter: hue-rotate(90deg); }
            100% { transform: translate(0, 2px); }
        }
    </style>
</head>
<body class="zoom-active">
    <audio id="bg-music" loop preload="auto"></audio>
    
    <div id="app">
        <header>
            <div id="logo">MaykaMi v3.0</div>
            <div id="mental-panel">
                <span id="streak-display">SYNC: 0%</span>
                <span id="level-display">NODE: 01</span>
            </div>
        </header>

        <div id="block-container">
            <div id="text-content">INITIALIZING NEURAL LINK...</div>
            <div id="breath-circle">
                <div id="timer-display">0</div>
            </div>
        </div>

        <div id="action-area">
            <button id="main-btn">ESTABLISH LINK</button>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button id="lang-btn" class="secondary">EN/ES</button>
                <button id="back-btn" class="secondary">REBOOT</button>
            </div>
        </div>
    </div>

    <script src="/static/scripts.js"></script>
</body>
</html>
