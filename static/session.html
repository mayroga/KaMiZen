```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KAMIZEN LIFE SYSTEM</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050508;
            --card: rgba(0,0,0,0.85);
            --blue: #00f2ff;
            --gold: #f1c40f;
            --green: #2ecc71;
            --red: #ff3131;
            --text: #ffffff;
            --soft: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #10131d 0%, #050508 100%);
            color: var(--text);
            font-family: 'Orbitron', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #screen {
            width: 100%;
            max-width: 900px;
            margin: auto;
            padding: 25px 15px 120px;
        }

        .card {
            background: var(--card);
            border: 2px solid rgba(0,242,255,0.2);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 0 35px rgba(0,242,255,0.08);
            backdrop-filter: blur(8px);
        }

        .center {
            text-align: center;
        }

        .title {
            font-size: 2rem;
            color: var(--blue);
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(0,242,255,0.4);
        }

        .subtitle {
            text-align: center;
            color: var(--soft);
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .story-title {
            color: var(--gold);
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .story-text {
            color: #e5e7eb;
            line-height: 1.8;
            font-size: 1.05rem;
        }

        .question {
            font-size: 1.2rem;
            line-height: 1.7;
            margin-bottom: 20px;
            color: var(--gold);
        }

        .answer {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            margin-bottom: 15px;
            border: 2px solid rgba(0,242,255,0.2);
            background: rgba(255,255,255,0.04);
            color: white;
            cursor: pointer;
            transition: 0.25s;
            font-family: inherit;
            font-size: 1rem;
            text-align: left;
        }

        .answer:hover {
            transform: translateY(-3px);
            border-color: var(--blue);
            background: rgba(0,242,255,0.08);
        }

        .correct {
            border-color: var(--green) !important;
            background: rgba(46,204,113,0.2) !important;
        }

        .wrong {
            border-color: var(--red) !important;
            background: rgba(255,49,49,0.2) !important;
        }

        .btn-core {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            background: var(--blue);
            color: black;
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: 2px;
            font-family: inherit;
            transition: 0.25s;
            margin-top: 20px;
            box-shadow: 0 0 30px rgba(0,242,255,0.25);
        }

        .btn-core:hover {
            transform: scale(1.02);
        }

        .feedback {
            margin-top: 20px;
            padding: 18px;
            border-radius: 18px;
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .feedback.good {
            background: rgba(46,204,113,0.15);
            border: 1px solid rgba(46,204,113,0.35);
        }

        .feedback.bad {
            background: rgba(255,49,49,0.15);
            border: 1px solid rgba(255,49,49,0.35);
        }

        .breath-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }

        .breath-circle {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            border: 8px solid var(--blue);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 900;
            transition: transform 2s ease-in-out;
            text-shadow: 0 0 10px var(--blue);
            box-shadow: 0 0 50px rgba(0,242,255,0.35);
            margin-bottom: 25px;
        }

        .breath-info {
            color: var(--soft);
            text-align: center;
            line-height: 1.7;
            max-width: 650px;
        }

        .xp {
            color: var(--green);
            font-size: 1.2rem;
            font-weight: 900;
            text-align: center;
        }

        .loading-box {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .loader {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.08);
            border-top-color: var(--blue);
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .mini-game {
            text-align: center;
        }

        .mini-game canvas {
            width: 100%;
            max-width: 650px;
            height: 260px;
            background: black;
            border-radius: 20px;
            border: 2px solid rgba(0,242,255,0.2);
            margin-top: 20px;
        }

        @media(max-width: 700px) {
            .breath-circle {
                width: 190px;
                height: 190px;
                font-size: 1.5rem;
            }

            .title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

<div id="screen">
    <div class="loading-box">
        <div class="loader"></div>
        <h1 class="title">KAMIZEN LIFE SYSTEM</h1>
        <p class="subtitle">Loading neural awareness system...</p>
    </div>
</div>

</body>
</html>
