<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MAYKAMI | NEURO-LIFE DIAGNOSIS</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-gold: #f1c40f;
            --neon-green: #2ecc71;
            --neon-purple: #9b59b6;
            --neon-red: #ff3131;
            --bg-dark: #020205;
        }
        body { margin: 0; overflow: hidden; background: var(--bg-dark); color: white; font-family: 'Orbitron', sans-serif; cursor: none; }
        
        /* HUD - VISIBILIDAD MÁXIMA */
        #hud {
            position: absolute; top: 25px; width: 100%;
            display: flex; justify-content: space-evenly;
            z-index: 100; pointer-events: none;
        }
        .data-box {
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid var(--neon-blue);
            padding: 15px 30px; text-align: center;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            min-width: 160px;
        }
        .label { font-size: 12px; color: var(--neon-blue); letter-spacing: 3px; font-weight: 900; display: block; margin-bottom: 5px;}
        .value { font-size: 28px; font-weight: 900; display: block; color: #fff; }

        canvas { display: block; }

        #overlay {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="hud">
    <div class="data-box" style="border-color: var(--neon-gold);">
        <span class="label">CAPITAL</span>
        <span id="val-money" class="value">0</span>
    </div>
    <div class="data-box" style="border-color: var(--neon-green);">
        <span class="label">STABILITY</span>
        <span id="val-health" class="value">100%</span>
    </div>
    <div class="data-box" style="border-color: var(--neon-purple);">
        <span class="label">BIZ-UNITS</span>
        <span id="val-biz" class="value">0</span>
    </div>
</div>

<div id="overlay">
    <h1 style="color: var(--neon-blue); letter-spacing: 10px;">MAYKAMI</h1>
    <p style="letter-spacing: 3px;">NEURAL INTERFACE: ON</p>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- JSON DATA: PALABRAS RESTAURADAS Y VISIBLES ---
const rawData = [
    { "text": "SAVINGS", "emoji": "💰", "stat": "money", "impact": 100, "color": "#f1c40f" },
    { "text": "BUSINESS", "emoji": "🤝", "stat": "biz", "impact": 1, "color": "#3498db" },
    { "text": "FAMILY", "emoji": "🏠", "stat": "health", "impact": 15, "color": "#2ecc71" },
    { "text": "HAPPINESS", "emoji": "😊", "stat": "health", "impact": 10, "color": "#9b59b6" },
    { "text": "THREAT", "emoji": "⚠️", "stat": "health", "impact": -20, "color": "#ff3131" },
    { "text": "PROBLEM", "emoji": "🛑", "stat": "health", "impact": -15, "color": "#95a5a6" },
    { "text": "INVESTMENT", "emoji": "📈", "stat": "money", "impact": 200, "color": "#f1c40f" },
    { "text": "EDUCATION", "emoji": "📚", "stat": "biz", "impact": 1, "color": "#00f2ff" }
];

let stats = { money: 0, health: 100, biz: 0 };
let active = false;
const objects = [];
const user = { x: canvas.width / 2, y: canvas.height / 2, size: 50 };

function spawn() {
    if(!active) return;
    const entry = rawData[Math.floor(Math.random() * rawData.length)];
    objects.push({
        ...entry,
        x: Math.random() * (canvas.width - 150) + 75,
        y: -100,
        speed: 3 + (stats.money / 2000),
        pulse: 0
    });
}

function handleInput(e) {
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    user.x = clientX;
    user.y = clientY;
}

window.addEventListener('mousemove', handleInput);
window.addEventListener('touchmove', handleInput);
window.addEventListener('mousedown', handleInput);

function update() {
    if(!active) return;

    objects.forEach((obj, i) => {
        obj.y += obj.speed;
        obj.pulse += 0.05;

        // Colisión por proximidad
        const dist = Math.sqrt((obj.x - user.x)**2 + (obj.y - user.y)**2);
        if (dist < user.size) {
            applyStat(obj);
            objects.splice(i, 1);
        }
        if(obj.y > canvas.height + 100) objects.splice(i, 1);
    });

    if(stats.health <= 0) endGame("SYSTEM FAILURE", "Stability depleted. Balance is mandatory for success.");
}

function applyStat(obj) {
    if(obj.stat === 'money') stats.money += obj.impact;
    if(obj.stat === 'biz') stats.biz += obj.impact;
    if(obj.stat === 'health') stats.health = Math.max(0, Math.min(100, stats.health + obj.impact));
    
    document.getElementById('val-money').innerText = stats.money;
    document.getElementById('val-health').innerText = stats.health + "%";
    document.getElementById('val-biz').innerText = stats.biz;
}

function draw() {
    ctx.fillStyle = 'rgba(2, 2, 5, 0.2)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // AVATAR / SCANNER
    ctx.shadowBlur = 25;
    ctx.shadowColor = "#00f2ff";
    ctx.strokeStyle = "#00f2ff";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(user.x, user.y, user.size - 10, 0, Math.PI * 2);
    ctx.stroke();

    // ELEMENTOS DEL CAMINO (PROYECCIÓN CLARA)
    objects.forEach(obj => {
        const offset = Math.sin(obj.pulse) * 8;
        ctx.shadowBlur = 20;
        ctx.shadowColor = obj.color;
        
        // Texto Superior (Muy visible)
        ctx.fillStyle = "#FFFFFF";
        ctx.font = "900 18px Orbitron";
        ctx.textAlign = "center";
        ctx.fillText(obj.text, obj.x, obj.y - 30 + offset);

        // Emoji Central
        ctx.font = "50px Arial";
        ctx.fillText(obj.emoji, obj.x, obj.y + offset);
    });
}

function endGame(title, msg) {
    active = false;
    alert(`${title}\n\n${msg}`);
    location.reload();
}

setTimeout(() => {
    document.getElementById('overlay').style.display = 'none';
    active = true;
    setInterval(spawn, 900);
    loop();
}, 2000);

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
