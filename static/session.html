<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAMIZEN SESSION</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #0b0f1a;
    color: #ffffff;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

#startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0b0f1a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
}

input {
    padding: 10px;
    font-size: 18px;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
}

#ui {
    position: absolute;
    top: 10px;
    left: 10px;
}

#timer {
    position: absolute;
    top: 10px;
    right: 10px;
}

#centerText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    font-size: 24px;
}

.word {
    position: absolute;
    color: #00f2ff;
    font-size: 18px;
    animation: float 5s linear forwards;
}

@keyframes float {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-200px); opacity: 0; }
}
</style>
</head>
<body>

<div id="startScreen">
    <h1>KAMIZEN LIFE SYSTEM</h1>
    <input id="nameInput" placeholder="Enter your name">
    <button onclick="startApp()">Start</button>
</div>

<div id="ui"></div>
<div id="timer"></div>
<div id="centerText"></div>

<script>
let userName = localStorage.getItem("kamizen_name") || "";
let missionIndex = parseInt(localStorage.getItem("mission_index") || "1");

let state = {
    phase: "idle"
};

if(userName){
    document.getElementById("nameInput").value = userName;
}

function startApp(){
    const input = document.getElementById("nameInput").value;
    if(!input) return;

    userName = input;
    localStorage.setItem("kamizen_name", userName);

    document.getElementById("startScreen").style.display = "none";

    startSession();
}

async function startSession(){

    const res = await fetch("/api/session/start");
    const data = await res.json();

    localStorage.setItem("mission_index", data.index);

    missionIndex = data.index;

    await showStory(data.story);

    await floatingGame(300);

    await showMission(data.mission);

    await floatingGame(300);

    await breathingPhase(missionIndex);

    endSession();
}

function showStory(story){
    return new Promise(resolve => {
        if(!story){ resolve(); return; }

        document.getElementById("centerText").innerText = story.story?.en || "";

        setTimeout(() => {
            document.getElementById("centerText").innerText = "";
            resolve();
        }, 5000);
    });
}

function showMission(mission){
    return new Promise(resolve => {
        if(!mission){ resolve(); return; }

        document.getElementById("centerText").innerText = mission.b?.[0]?.tx?.en || "MISSION";

        setTimeout(() => {
            document.getElementById("centerText").innerText = "";
            resolve();
        }, 6000);
    });
}

function floatingGame(duration){
    return new Promise(resolve => {
        let time = duration;

        const timer = setInterval(() => {
            time--;

            document.getElementById("timer").innerText = time;

            spawnWord();

            if(time <= 0){
                clearInterval(timer);
                resolve();
            }
        }, 1000);
    });
}

function spawnWord(){
    const words = ["FOCUS","CALM","TRUTH","CONTROL","AWARENESS"];
    const word = document.createElement("div");
    word.className = "word";
    word.innerText = words[Math.floor(Math.random()*words.length)];

    word.style.left = Math.random()*window.innerWidth + "px";
    word.style.top = Math.random()*window.innerHeight + "px";

    document.body.appendChild(word);

    setTimeout(()=>word.remove(), 5000);
}

function breathingPhase(index){
    return new Promise(resolve => {

        let silence = Math.min(30 + (index * 5), 180);

        let t = 30;

        const breath = setInterval(()=>{
            t--;
            document.getElementById("centerText").innerText = (t%2==0)?"INHALE":"EXHALE";

            if(t<=0){
                clearInterval(breath);
                startSilence(silence, resolve);
            }
        }, 1000);
    });
}

function startSilence(seconds, resolve){

    let t = seconds;

    document.getElementById("centerText").innerText = "SILENCE";

    const s = setInterval(()=>{
        t--;
        document.getElementById("timer").innerText = t;

        if(t<=0){
            clearInterval(s);
            resolve();
        }
    },1000);
}

function endSession(){

    document.getElementById("centerText").innerText = "SESSION COMPLETE";

    setTimeout(()=>{
        window.location.reload();
    },4000);
}

</script>

</body>
</html>
