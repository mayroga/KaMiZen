<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>KAMIZEN SESSION</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">

<style>
:root {
    --blue:#00e5ff;
    --gold:#f1c40f;
    --red:#ff3131;
    --green:#22c55e;
    --bg:#050508;
}

body {
    margin:0;
    background:var(--bg);
    color:white;
    font-family:Orbitron;
    overflow:hidden;
}

/* ===== SCREENS ===== */
.screen {
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.hidden { display:none !important; }

/* ===== LOADING ===== */
#loading-screen h1 {
    color:var(--blue);
    letter-spacing:6px;
}

/* ===== START ===== */
#start-btn {
    padding:20px 40px;
    background:var(--blue);
    border:none;
    font-weight:900;
    cursor:pointer;
}

/* ===== STORY ===== */
#story-text {
    max-width:800px;
    font-size:22px;
    color:var(--blue);
}

#story-btn {
    margin-top:20px;
    padding:15px 30px;
    background:var(--gold);
    border:none;
    font-weight:900;
}

/* ===== MISSION ===== */
#answers button {
    width:80%;
    margin:10px;
    padding:15px;
    background:#111;
    border:1px solid var(--blue);
    color:white;
    font-weight:900;
}

.correct { background:var(--green) !important; }
.wrong { background:var(--red) !important; }

#mission-info {
    margin-top:15px;
    color:var(--gold);
}

/* ===== BREATHING ===== */
#breath-circle {
    width:220px;
    height:220px;
    border-radius:50%;
    border:6px solid var(--blue);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    font-weight:900;
    transition:transform 2s ease;
}
</style>
</head>

<body>

<!-- ================= LOADING ================= -->
<div id="loading-screen" class="screen">
    <h1>LOADING SYSTEM</h1>
    <p>Initializing neural flow...</p>
</div>

<!-- ================= START ================= -->
<div id="start-screen" class="screen hidden">
    <h1>KAMIZEN LIFE SYSTEM</h1>
    <button id="start-btn">START TRAINING</button>
</div>

<!-- ================= STORY ================= -->
<div id="story-screen" class="screen hidden">
    <h2 id="story-id"></h2>
    <p id="story-text"></p>
    <button id="story-btn" class="hidden">CONTINUE</button>
</div>

<!-- ================= MISSION ================= -->
<div id="mission-screen" class="screen hidden">

    <h2 id="mission-category"></h2>
    <p id="mission-main"></p>

    <div id="answers"></div>

    <p id="mission-info"></p>

    <button id="continue-btn" class="hidden">CONTINUE</button>
</div>

<!-- ================= BREATHING ================= -->
<div id="breathing-screen" class="screen hidden">
    <div id="breath-circle">
        <span id="breath-text">INHALE</span>
    </div>
    <p id="breath-info"></p>
</div>

<!-- ================= GAME ================= -->
<div id="game-screen" class="screen hidden">
    <canvas id="gameCanvas"></canvas>
</div>

<!-- ================= ENGINE ================= -->
<script src="/static/js/engine.js"></script>

</body>
</html>
