<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KAMIZEN SESSION - AURA BY MAY ROGA</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-gold: #f1c40f;
            --neon-red: #ff3131;
            --bg-dark: #050508;
            --neon-green: #2ecc71;
        }
        body { 
            margin: 0; overflow: hidden; background: var(--bg-dark); 
            color: white; font-family: 'Orbitron', sans-serif; touch-action: none; 
        }
        
        /* HUD Superior */
        #hud {
            position: absolute; top: 15px; width: 100%;
            display: flex; justify-content: space-evenly;
            z-index: 100; pointer-events: none;
        }
        .data-box {
            background: rgba(0, 0, 0, 0.9); border: 2px solid var(--neon-blue);
            padding: 10px; text-align: center; min-width: 120px;
        }
        .label { font-size: 10px; color: var(--neon-blue); letter-spacing: 2px; display: block; }
        .value { font-size: 20px; font-weight: 900; display: block; }

        /* Contenedor Central de Contenido */
        #main-stage {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 40px; z-index: 50; background: radial-gradient(circle, #111 0%, #000 100%);
        }

        #display-text { font-size: 2.5rem; font-weight: 900; color: var(--neon-blue); text-shadow: 0 0 20px var(--neon-blue); max-width: 800px; }
        #sub-text { font-size: 1.2rem; color: var(--neon-gold); margin-top: 20px; max-width: 700px; }

        /* Botones de Misión */
        #options-container { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 500px; }
        .btn-opt {
            padding: 15px; background: transparent; border: 2px solid var(--neon-blue);
            color: white; font-family: 'Orbitron'; font-weight: 900; cursor: pointer;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-opt:hover { background: var(--neon-blue); color: black; }
        .correct { background: var(--neon-green) !important; border-color: var(--neon-green); color: white; }
        .wrong { background: var(--neon-red) !important; border-color: var(--neon-red); color: white; }

        /* Círculo de Respiración */
        #breath-wrap { display: none; flex-direction: column; align-items: center; }
        #breath-circle {
            width: 200px; height: 200px; border: 10px solid var(--neon-blue);
            border-radius: 50%; transition: transform 4s ease-in-out;
            box-shadow: 0 0 50px var(--neon-blue); display: flex; align-items: center; justify-content: center;
        }

        /* Palabras Flotantes (No tocables) */
        .floating-word {
            position: absolute; pointer-events: none; font-weight: 900;
            color: white; background: rgba(0,0,0,0.7); padding: 5px 10px;
            border-radius: 4px; font-size: 1.5rem; z-index: 10;
            animation: floatUp 5s linear forwards;
        }

        @keyframes floatUp {
            from { transform: translateY(100vh) scale(0.5); opacity: 0; }
            to { transform: translateY(-10vh) scale(1.2); opacity: 1; }
        }

        #timer-clock { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 30px; color: var(--neon-red); }
        .hidden { display: none !important; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="hud">
    <div class="data-box"><span class="label">ASSETS</span><span id="stat-money" class="value">$0</span></div>
    <div class="data-box" style="border-color: var(--neon-gold);"><span class="label">SESSION</span><span id="stat-id" class="value">0</span></div>
    <div class="data-box" style="border-color: var(--neon-red);"><span class="label">STABILITY</span><span id="stat-health" class="value">100%</span></div>
</div>

<div id="main-stage">
    <div id="content-area">
        <h2 id="display-text">INITIALIZING SYSTEM...</h2>
        <p id="sub-text"></p>
        <div id="options-container" class="hidden"></div>
    </div>

    <div id="breath-wrap">
        <div id="breath-circle"><span id="breath-label" style="font-size: 1.5rem;">INHALE</span></div>
    </div>

    <button id="start-btn" style="padding: 20px 50px; font-size: 1.5rem; background: var(--neon-blue); border: none; cursor: pointer; font-family: 'Orbitron'; font-weight: 900; margin-top: 20px;">
        START TRAINING
    </button>
</div>

<div id="timer-clock">00:00</div>

<script>
    let sessionData = null;
    let stats = { money: 0, health: 100, index: 0 };
    let timerInterval;
    let totalSeconds = 1200; // 20 Minutos

    const ui = {
        text: document.getElementById('display-text'),
        sub: document.getElementById('sub-text'),
        options: document.getElementById('options-container'),
        breath: document.getElementById('breath-wrap'),
        circle: document.getElementById('breath-circle'),
        label: document.getElementById('breath-label'),
        startBtn: document.getElementById('start-btn'),
        clock: document.getElementById('timer-clock')
    };

    async function fetchSession() {
        const res = await fetch('/api/session/start');
        sessionData = await res.json();
        stats.index = sessionData.index;
        document.getElementById('stat-id').innerText = stats.index;
    }

    function updateClock() {
        const m = Math.floor(totalSeconds / 60);
        const s = totalSeconds % 60;
        ui.clock.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        if(totalSeconds > 0) totalSeconds--;
    }

    const sleep = ms => new Promise(r => setTimeout(r, ms));

    async function runSession() {
        ui.startBtn.classList.add('hidden');
        timerInterval = setInterval(updateClock, 1000);

        while (totalSeconds > 0) {
            await fetchSession();
            
            // 1. PHASE: STORY (Basado en stories.json)
            ui.text.innerText = sessionData.story.t || "KAMIZEN STORY";
            ui.sub.innerText = sessionData.story.en; 
            await sleep(8000);

            // 2. PHASE: MISSION BLOCKS (Basado en missions_XX_XX.json)
            const mission = sessionData.missions[0]; 
            for (const block of mission.b) {
                await processBlock(block);
            }

            // 3. PHASE: TRAINING VISUAL (Palabras flotantes)
            await runVisualTraining(30); 
        }
    }

    async function processBlock(block) {
        ui.options.innerHTML = "";
        ui.options.classList.add('hidden');
        ui.breath.style.display = "none";
        ui.sub.innerText = "";

        switch (block.t) {
            case 'v': // Voice/Header
            case 'h': // Header
                ui.text.innerText = block.tx.en;
                await sleep(4000);
                break;

            case 'story': // Mini story
                ui.text.innerText = "REFLECT";
                ui.sub.innerText = block.en || block.story.en;
                await sleep(7000);
                break;

            case 'br': // Breathing
            case 'breath_auto':
                ui.text.innerText = "RECENTER";
                ui.breath.style.display = "flex";
                let duration = block.d || 10;
                for(let i=0; i < duration/4; i++){
                    ui.label.innerText = "INHALE";
                    ui.circle.style.transform = "scale(1.5)";
                    await sleep(2000);
                    ui.label.innerText = "EXHALE";
                    ui.circle.style.transform = "scale(1.0)";
                    await sleep(2000);
                }
                ui.breath.style.display = "none";
                break;

            case 'd': // Decision
                ui.text.innerText = block.q.en;
                ui.options.classList.remove('hidden');
                return new Promise(resolve => {
                    block.op.forEach((opt, idx) => {
                        const btn = document.createElement('button');
                        btn.className = 'btn-opt';
                        btn.innerText = opt;
                        btn.onclick = async () => {
                            const isCorrect = (idx === block.c);
                            btn.className = isCorrect ? 'btn-opt correct' : 'btn-opt wrong';
                            ui.sub.innerText = block.ex[idx];
                            if(isCorrect) stats.money += 500; else stats.health -= 10;
                            updateStats();
                            await sleep(5000);
                            resolve();
                        };
                        ui.options.appendChild(btn);
                    });
                });
                break;
            
            case 'sil': // Silence
                ui.text.innerText = "SILENCE & FOCUS";
                ui.sub.innerText = block.tx.en;
                await sleep(block.d * 1000);
                break;
        }
    }

    function runVisualTraining(sec) {
        return new Promise(resolve => {
            ui.text.innerText = "STAY ALERT";
            ui.sub.innerText = "Observe the pillars of success";
            let count = 0;
            const spawn = setInterval(() => {
                createFloatingWord();
                count++;
                if (count > sec) { clearInterval(spawn); resolve(); }
            }, 1000);
        });
    }

    function createFloatingWord() {
        const words = ["TRUTH", "AWARENESS", "SAFETY", "CALM", "CONTROL", "FOCUS", "METHOD", "LIMITS"];
        const el = document.createElement('div');
        el.className = 'floating-word';
        el.innerText = words[Math.floor(Math.random() * words.length)];
        el.style.left = Math.random() * 80 + 10 + "%";
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 5000);
    }

    function updateStats() {
        document.getElementById('stat-money').innerText = "$" + stats.money;
        document.getElementById('stat-health').innerText = stats.health + "%";
    }

    ui.startBtn.onclick = runSession;
</script>
</body>
</html>
