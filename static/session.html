<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAMIZEN SESSION</title>
<style>
    :root { --primary: #00f2ff; --bg: #05070d; }
    body { 
        margin:0; background: var(--bg); color:#fff; 
        font-family: 'Segoe UI', Arial, sans-serif; overflow:hidden; 
        transition: background 0.4s ease;
    }

    /* PANTALLA INICIAL DE SEGURIDAD */
    #overlay {
        position: fixed; inset: 0; background: var(--bg);
        display: flex; flex-direction: column; justify-content: center;
        align-items: center; z-index: 1000;
    }

    #timer { 
        position:absolute; top:20px; left:50%; transform:translateX(-50%); 
        font-size:60px; color:var(--primary); font-weight:bold; z-index:100; 
    }

    #centerText { 
        position:absolute; top:45%; left:50%; transform:translate(-50%,-50%); 
        font-size:32px; width:85%; text-align:center; z-index:50; line-height: 1.5;
    }

    .btn-main { 
        padding:20px 60px; font-size:24px; background:var(--primary); color:#000; 
        border:none; border-radius:50px; cursor:pointer; font-weight:bold;
        box-shadow: 0 0 30px var(--primary); transition: transform 0.2s;
    }
    .btn-main:active { transform: scale(0.95); }

    #btnContinue { display:none; position:absolute; bottom:80px; left:50%; transform:translateX(-50%); z-index: 200; }

    /* GAMEPLAY UI */
    #explanationBox {
        position:absolute; bottom:30px; left:30px; width:300px; padding:20px;
        background: rgba(0,242,255,0.1); border-left: 5px solid var(--primary); 
        font-size:16px; opacity:0; transition: opacity 0.5s; z-index:60;
    }

    #indicators {
        position:absolute; right:30px; top:50%; transform:translateY(-50%);
        display:none; flex-direction:column; gap:15px; z-index:100;
    }
    .bar { width:12px; height:70px; background:rgba(255,255,255,0.1); border-radius:10px; position:relative; }
    .fill { position:absolute; bottom:0; width:100%; height:0%; background:var(--primary); transition: height 0.4s; }

    /* BREATHING */
    #breathContainer {
        display:none; position:fixed; inset:0; flex-direction:column; 
        justify-content:center; align-items:center; z-index:150; background: var(--bg);
    }
    #breathCircle {
        width: 200px; height: 200px; border-radius: 50%;
        background: radial-gradient(circle, #00f2ff 0%, #0044ff 100%);
        box-shadow: 0 0 60px #00f2ff;
        display:flex; justify-content:center; align-items:center;
        font-weight:bold; font-size:24px; color:white; transition: all 4s ease-in-out;
    }

    #finalModal {
        display:none; position:fixed; inset:0; background:var(--bg); z-index:300;
        flex-direction:column; justify-content:center; align-items:center; padding:40px; text-align:center;
    }

    .word { position:absolute; font-size:26px; color:var(--primary); font-weight:bold; cursor:pointer; animation: float 5s linear forwards; }
    @keyframes float { 0%{transform:translateY(0); opacity:0;} 10%{opacity:1;} 90%{opacity:1;} 100%{transform:translateY(-350px); opacity:0;} }
</style>
</head>
<body>

<div id="overlay">
    <h1 style="color:var(--primary); letter-spacing: 5px;">KAMIZEN</h1>
    <button class="btn-main" onclick="Engine.startSystem()">START SESSION</button>
</div>

<div id="timer">00:00</div>
<div id="centerText"></div>
<button id="btnContinue" class="btn-main" onclick="Engine.startTraining()">CONTINUE</button>

<div id="explanationBox">
    <strong id="expTitle"></strong><br><span id="expBody"></span>
</div>

<div id="indicators">
    <div class="bar"><div class="fill" id="f-0"></div></div>
    <div class="bar"><div class="fill" id="f-1"></div></div>
    <div class="bar"><div class="fill" id="f-2"></div></div>
    <div class="bar"><div class="fill" id="f-3"></div></div>
</div>

<div id="breathContainer">
    <div id="breathCircle">IDLE</div>
    <div id="scienceText" style="margin-top:50px; width:70%; text-align:center; color:var(--primary); font-style:italic;"></div>
</div>

<div id="finalModal">
    <h1 style="color:var(--primary)">DIAGNOSIS COMPLETE</h1>
    <div id="diagText" style="margin-bottom:40px; font-size:20px;"></div>
    <button class="btn-main" onclick="location.reload()">RESTART</button>
</div>

<audio id="bgMusic" loop src="https://assets.mixkit.co/music/preview/mixkit-lo-fi-night-chill-1616.mp3"></audio>
<audio id="sfxGlass" src="https://www.soundjay.com/misc/sounds/glass-break-01.mp3"></audio>

<script>
const Engine = (() => {
    let state = { phase: 'init', index: 1, stats: {}, clicks: 0, data: null, gameTime: 300 };

    const pillars = {
        "LIMITS": { cat: "Defense", desc: "Protección: Enseña a decir NO y cuidar tu espacio.", color: "#ff2e2e" },
        "PERSISTENCE": { cat: "Resilience", desc: "Lucha: El error es parte del proceso, no el final.", color: "#ffa500" },
        "METHOD": { cat: "Structure", desc: "Método: Caos por pasos lógicos. Aprender a aprender.", color: "#00ff88" },
        "VALUE": { cat: "Wealth", desc: "Riqueza: El dinero sigue al valor que aportas.", color: "#ffd700" },
        "ADAPTACION": { cat: "Survival", desc: "Entorno: Fluidez y resolución en el cambio.", color: "#00ccff" }
    };

    const startSystem = async () => {
        document.getElementById("overlay").style.display = "none";
        try {
            const res = await fetch("/api/session/start");
            state.data = await res.json();
            state.index = state.data.index || 1;
            runStory();
        } catch (e) {
            document.getElementById("centerText").innerText = "Connection Error. Reloading...";
            setTimeout(() => location.reload(), 2000);
        }
    };

    const runStory = () => {
        state.phase = 'story';
        const text = state.data.story.en;
        document.getElementById("centerText").innerText = text;

        const synth = window.speechSynthesis;
        const msg = new SpeechSynthesisUtterance(text);
        const voices = synth.getVoices();
        msg.voice = voices.find(v => v.name.includes("David") || v.name.includes("Male")) || voices[0];
        msg.rate = 0.8;
        msg.onend = () => {
            document.getElementById("btnContinue").style.display = "block";
        };
        synth.speak(msg);
    };

    const startTraining = () => {
        state.phase = 'game';
        document.getElementById("btnContinue").style.display = "none";
        document.getElementById("centerText").innerText = "";
        document.getElementById("bgMusic").play();

        let timeLeft = state.gameTime;
        const gameLoop = setInterval(() => {
            timeLeft--;
            document.getElementById("timer").innerText = formatTime(timeLeft);
            spawnWord();

            if (state.gameTime - timeLeft >= 60) {
                document.getElementById("explanationBox").style.opacity = "0";
                document.getElementById("indicators").style.display = "flex";
            }

            if (timeLeft <= 0) {
                clearInterval(gameLoop);
                runSilence();
            }
        }, 1000);
    };

    const spawnWord = () => {
        const keys = Object.keys(pillars);
        const key = keys[Math.floor(Math.random()*keys.length)];
        const p = pillars[key];

        const el = document.createElement("div");
        el.className = "word";
        el.innerText = key;
        el.style.left = Math.random()*80 + 10 + "%";
        el.style.top = Math.random()*60 + 20 + "%";

        el.onclick = () => {
            document.getElementById("sfxGlass").cloneNode().play();
            document.body.style.background = p.color + "33";
            setTimeout(() => document.body.style.background = "#05070d", 150);

            state.clicks++;
            state.stats[p.cat] = (state.stats[p.cat] || 0) + 1;
            updateBars();

            if (state.gameTime - parseInt(document.getElementById("timer").innerText.split(":")[1]) < 60) {
                document.getElementById("explanationBox").style.opacity = "1";
                document.getElementById("expTitle").innerText = key;
                document.getElementById("expBody").innerText = p.desc;
            }
            el.remove();
        };
        document.body.appendChild(el);
    };

    const updateBars = () => {
        const cats = ["Defense", "Wealth", "Structure", "Resilience"];
        cats.forEach((c, i) => {
            const val = (state.stats[c] || 0) * 10;
            document.getElementById(`f-${i}`).style.height = Math.min(val, 100) + "%";
        });
    };

    const runSilence = async () => {
        state.phase = 'silence';
        document.getElementById("bgMusic").pause();
        document.getElementById("breathContainer").style.display = "flex";
        document.getElementById("scienceText").innerText = "Neuro-Reset: La coherencia rítmica reduce el cortisol y activa tu potencial cognitivo.";

        let t = Math.min(30 + (state.index * 5), 180);
        while (t > 0) {
            document.getElementById("timer").innerText = formatTime(t);
            await breathCycle("INHALA", 1.8);
            await breathCycle("RETIENE", 1);
            await breathCycle("EXHALA", 0.7);
            t -= 12;
        }
        showFinal();
    };

    const breathCycle = (label, scale) => {
        return new Promise(resolve => {
            const circle = document.getElementById("breathCircle");
            circle.innerText = label;
            circle.style.transform = `scale(${scale})`;
            setTimeout(resolve, 4000);
        });
    };

    const showFinal = () => {
        document.getElementById("breathContainer").style.display = "none";
        document.getElementById("finalModal").style.display = "flex";
        const top = Object.keys(state.stats).reduce((a, b) => state.stats[a] > state.stats[b] ? a : b, "Proceso");
        document.getElementById("diagText").innerHTML = `SESIÓN COMPLETADA<br>Tu enfoque principal hoy: <b>${top}</b>.<br>Tu sistema nervioso está ahora en equilibrio óptimo.`;
    };

    const formatTime = (s) => {
        const m = Math.floor(s/60);
        const sec = s%60;
        return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    };

    return { startSystem, startTraining };
})();
</script>
</body>
</html>
