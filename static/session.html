<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN TRAINING</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#000;
    color:#00f2ff;
    overflow:hidden;
}

/* CENTER TEXT */
#centerText{
    position:absolute;
    top:35%;
    width:100%;
    text-align:center;
    font-size:30px;
    font-weight:bold;
    padding:0 20px;
    z-index:2;
}

/* TIMER */
#timer{
    position:absolute;
    top:10px;
    right:20px;
    font-size:18px;
    z-index:2;
}

/* START SCREEN */
#startScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
}

#nameInput{
    padding:12px;
    font-size:18px;
    margin-bottom:15px;
    border:none;
    outline:none;
    width:220px;
    text-align:center;
}

#startBtn{
    padding:12px 25px;
    font-size:18px;
    cursor:pointer;
    background:#00f2ff;
    border:none;
    color:#000;
}

/* CHOICES */
#choices{
    position:absolute;
    bottom:140px;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    z-index:3;
}

.choiceBtn{
    width:85%;
    padding:14px;
    font-size:16px;
    cursor:pointer;
    border:none;
    background:#111;
    color:#fff;
    transition:0.2s;
}

.choiceBtn:hover{
    background:#00f2ff;
    color:#000;
}

/* RESULT COLORS */
.correct{ background:green !important; }
.mid{ background:yellow !important; color:#000 !important; }
.low{ background:orange !important; }
.bad{ background:red !important; }

/* EXPLANATION */
#explanationBox{
    position:absolute;
    bottom:10px;
    right:10px;
    width:300px;
    background:#111;
    padding:10px;
    opacity:0;
    transition:0.3s;
    border:1px solid #00f2ff;
    z-index:4;
}

#expTitle{
    font-weight:bold;
    margin-bottom:5px;
}

#expBody{
    font-size:14px;
}

/* CONTINUE */
#continueBtn{
    position:absolute;
    bottom:80px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 25px;
    display:none;
    cursor:pointer;
    background:#00ff41;
    border:none;
    z-index:4;
}

/* RESET */
#resetBtn{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 25px;
    display:none;
    background:#ff0040;
    border:none;
    color:#fff;
    cursor:pointer;
    z-index:4;
}

/* WORDS */
.word{
    position:absolute;
    color:#00ff41;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
    z-index:1;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
    <h2>Enter your name</h2>
    <input id="nameInput" placeholder="Your name">
    <button id="startBtn">Start</button>
</div>

<!-- MAIN -->
<div id="centerText"></div>
<div id="timer"></div>

<!-- CHOICES -->
<div id="choices"></div>

<!-- CONTINUE -->
<button id="continueBtn">Continue</button>

<!-- RESET -->
<button id="resetBtn">Restart</button>

<!-- EXPLANATION -->
<div id="explanationBox">
    <div id="expTitle">Info</div>
    <div id="expBody"></div>
</div>

<!-- AUDIO -->
<audio id="sfxGlass" src="https://assets.mixkit.co/sfx/preview/mixkit-glass-click-1110.mp3"></audio>

<!-- ENGINE -->
<script src="js/engine.js"></script>

<script>
let playerName = "Player";
let started = false;

/* =========================
   START APP (ANTI-FREEZE)
========================= */
document.getElementById("startBtn").onclick = () => {

    if(started) return;
    started = true;

    playerName = document.getElementById("nameInput").value.trim() || "Player";

    document.getElementById("startScreen").style.display = "none";

    Engine.init();

    safeSpeak("Welcome " + playerName);

    document.getElementById("centerText").innerText = "Welcome " + playerName;

    setTimeout(() => {
        Engine.start();
    }, 1500);
};

/* =========================
   SAFE SPEECH (FIX FREEZE)
========================= */
let speaking = false;

function safeSpeak(text){
    try{
        if(speaking) return;
        speaking = true;

        speechSynthesis.cancel();

        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = "en-US";
        msg.rate = 0.92;
        msg.pitch = 0.9;

        const voices = speechSynthesis.getVoices();
        if(voices.length){
            const male = voices.find(v =>
                v.name.toLowerCase().includes("male") ||
                v.name.toLowerCase().includes("david") ||
                v.name.toLowerCase().includes("mark") ||
                v.name.toLowerCase().includes("alex")
            );
            if(male) msg.voice = male;
        }

        msg.onend = () => speaking = false;
        msg.onerror = () => speaking = false;

        speechSynthesis.speak(msg);

    }catch(e){
        speaking = false;
    }
}

/* =========================
   RESET
========================= */
document.getElementById("resetBtn").onclick = () => {
    speechSynthesis.cancel();
    location.reload();
};

/* =========================
   VOICE LOAD FIX (CRUCIAL)
========================= */
window.speechSynthesis.onvoiceschanged = () => {
    speechSynthesis.getVoices();
};

/* =========================
   GLOBAL FAILSAFE (ANTI FREEZE)
========================= */
setInterval(() => {
    if(speechSynthesis.speaking && speechSynthesis.pending){
        speechSynthesis.cancel();
    }
}, 8000);

</script>

</body>
</html>
