<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>KAMIZEN LIFE SYSTEM - CORE SESSION</title>
    <style>
        :root{
            --bg:#0b1220;
            --card:#111a2e;
            --primary:#3b82f6;
            --success:#22c55e;
            --danger:#ef4444;
            --text:#ffffff;
            --dim:#94a3b8;
        }
        *{ box-sizing:border-box; }
        body{
            margin:0;
            font-family:'Segoe UI', Arial, sans-serif;
            background:var(--bg);
            color:var(--text);
            display:flex;
            flex-direction: column;
            align-items:center;
            min-height:100vh;
        }
        #main-container{
            width:100%;
            max-width:700px;
            padding:20px;
        }
        .card{
            background:var(--card);
            padding:20px;
            border-radius:16px;
            margin:15px 0;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
            border:1px solid rgba(255,255,255,0.05);
        }
        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:var(--primary);
            color:white;
            font-weight:bold;
            cursor:pointer;
            transition:0.2s;
            margin-bottom: 5px;
        }
        button:hover{ transform:translateY(-2px); }
        button:disabled{ background: #334155; cursor: not-allowed; transform: none; }
        
        .answer{
            background:#1f2937;
            padding:12px;
            margin:8px 0;
            border-radius:10px;
            cursor:pointer;
            border-left:4px solid var(--primary);
            transition:0.2s;
        }
        .answer:hover{ transform:translateX(5px); background:#374151; }

        /* Estilo para el círculo que genera el JS */
        .breath-circle{
            width:140px;
            height:140px;
            border-radius:50%;
            margin:30px auto;
            border:4px solid var(--primary);
            display:flex;
            align-items:center;
            justify-content:center;
            transition: transform 4s ease-in-out; /* Crucial para el JS */
        }

        h1,h2,h3{ margin:10px 0; }
        .small{ font-size:12px; color:var(--dim); }
        .center{ text-align:center; }
    </style>
</head>
<body>

<div id="main-container">
    <!-- HEADER FIJO -->
    <div class="card center">
        <h2 style="color:var(--primary);">KAMIZEN LIFE SYSTEM</h2>
        <p class="small">Neural Training • Awareness • Discipline • Control</p>
    </div>

    <!-- ÁREA DE RENDERIZADO (Aquí es donde el engine.js trabajará) -->
    <div id="app">
        <div class="card center">
            <h3>INITIALIZING SYSTEM...</h3>
            <p>Please wait while we sync missions.</p>
        </div>
    </div>

    <!-- CONTROL DE SALTO (Fuera del render para que no desaparezca) -->
    <div class="card">
        <input id="missionInput" type="number" placeholder="Enter mission ID (1 - 49)" 
               style="width:100%;padding:12px;border-radius:8px;border:none;margin-bottom:10px; background:#1f2937; color:white;">
        <button onclick="jumpToMissionManual()">GO TO MISSION</button>
        <p class="small center">Missions 1–35 | Exam 36–42 | Exam 43–49</p>
    </div>
</div>

<script src="/static/js/engine.js"></script>

<script>
// Puente seguro con el motor
function jumpToMissionManual() {
    const input = document.getElementById("missionInput");
    const id = Number(input.value);
    
    // El motor usa state.missions, así que buscamos el índice
    if (id > 0 && typeof jumpToBlock === "function") {
        // Simulamos el prompt que pide el motor o llamamos a la lógica interna
        const idx = state.missions.findIndex(m => m.id === id);
        if (idx !== -1) {
            window.speechSynthesis.cancel();
            clearInterval(state.timer);
            state.currentIndex = idx;
            state.currentBlock = 0;
            state.phase = "story";
            render();
        } else {
            alert("Mission not found");
        }
    }
}
</script>
</body>
</html>
