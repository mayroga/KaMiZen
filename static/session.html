<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN EXPERIENCE</title>

<style>
body{
    margin:0;
    background:#000;
    color:#00f2ff;
    font-family:Arial;
    overflow:hidden;
}

#app{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:20px;
    padding:20px;
}

#message{
    max-width:800px;
    padding:20px;
    border:1px solid #00f2ff;
    background:rgba(0,10,20,0.9);
    text-align:center;
    font-size:22px;
    min-height:160px;
    transition:all 0.5s ease;
}

#circle{
    width:100px;
    height:100px;
    border-radius:50%;
    background:rgba(0,242,255,0.2);
    box-shadow:0 0 30px #00f2ff;
    display:none;
}

#options{
    display:none;
    gap:10px;
}

button{
    padding:14px;
    border:1px solid #00f2ff;
    background:transparent;
    color:#00f2ff;
    cursor:pointer;
}

.correct{
    background:#00ff88;
    color:#000;
}

.wrong{
    background:#ff3355;
    color:#fff;
}

#timer{
    font-size:18px;
}
</style>
</head>

<body>

<div id="app">
<div id="message">TOUCH TO START</div>
<div id="circle"></div>
<div id="timer"></div>
<div id="options"></div>
</div>

<script>

let session_id=null;
let currentBlock=null;
let autoMode=true;
let locked=true;

/* AUDIO */
const ctx = new (window.AudioContext||window.webkitAudioContext)();

/* VOZ */
function speak(text){
    return new Promise(resolve=>{
        if(!text){resolve();return;}

        const u=new SpeechSynthesisUtterance(text);
        u.rate=0.9;
        u.onend=resolve;
        speechSynthesis.speak(u);
    });
}

/* START */
async function start(){

    await ctx.resume();

    const res = await fetch("/start",{method:"POST"});
    const data = await res.json();

    session_id=data.session_id;

    runBlock(data.story);
}

/* MOTOR PRINCIPAL */
async function runBlock(block){

    locked=true;
    hideOptions();

    const text =
        block.text?.en ||
        block.analysis?.en ||
        block.question?.en ||
        "...";

    await showMessage(text);

    switch(block.type){

        case "story":
        case "analysis":
        case "micro_explanation":
        case "final_lesson":
            await delay(1500);
            nextAuto();
        break;

        case "tvid":
            await runTVID(block);
        break;

        case "breath_focus":
            await runBreath(block);
            nextAuto();
        break;

        case "riso_tvid":
            await runRiso(block);
            nextAuto();
        break;

        case "silence_challenge":
            await runSilence(block);
            nextAuto();
        break;
    }
}

/* MENSAJE */
async function showMessage(text){
    document.getElementById("message").innerText=text;
    await speak(text);
}

/* TVID */
async function runTVID(block){

    locked=false;
    showOptions(block);

    return new Promise(resolve=>{
        window.resolveTVID = resolve;
    });
}

function showOptions(block){

    const opts=document.getElementById("options");
    opts.innerHTML="";
    opts.style.display="flex";

    block.options.forEach(o=>{
        const b=document.createElement("button");
        b.innerText=o.text.en;

        b.onclick=()=>{
            if(locked) punish();

            if(o.correct){
                b.classList.add("correct");
                showMessage(o.reason.en);
                locked=true;
                setTimeout(()=>{
                    hideOptions();
                    window.resolveTVID();
                },1500);
            }else{
                b.classList.add("wrong");
                showMessage(o.reason.en);
            }
        };

        opts.appendChild(b);
    });
}

function hideOptions(){
    document.getElementById("options").style.display="none";
}

/* RESPIRACIÓN */
async function runBreath(block){

    const msg="Now we will breathe. This increases control and clarity.";
    await showMessage(msg);

    const c=document.getElementById("circle");
    c.style.display="block";

    let grow=true;

    const interval=setInterval(()=>{
        c.style.transform=grow?"scale(2)":"scale(1)";
        grow=!grow;
    },2000);

    await countdown(block.duration_sec);

    clearInterval(interval);
    c.style.display="none";
}

/* RISOTERAPIA */
async function runRiso(block){

    const msg="Now we activate a light smile. This resets your emotional state.";
    await showMessage(msg);

    await countdown(block.duration_sec);
}

/* SILENCIO */
async function runSilence(block){

    const msg="Now silence challenge. Stay present. This builds mental strength.";
    await showMessage(msg);

    await countdown(block.duration_sec);
}

/* TIMER */
function countdown(sec){

    return new Promise(resolve=>{
        const t=document.getElementById("timer");

        let s=sec;
        t.innerText=s+"s";

        const i=setInterval(()=>{
            s--;
            t.innerText=s+"s";

            if(s<=0){
                clearInterval(i);
                resolve();
            }
        },1000);
    });
}

/* NEXT AUTO */
async function nextAuto(){

    const res = await fetch("/judge",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({session_id,decision:"NEXT"})
    });

    const data = await res.json();

    runBlock(data.story);
}

/* CASTIGO */
function punish(){
    document.body.style.background="#300";
    setTimeout(()=>{
        location.reload();
    },1000);
}

/* DELAY */
function delay(ms){
    return new Promise(r=>setTimeout(r,ms));
}

/* START */
document.getElementById("message").onclick=start;

</script>

</body>
</html>
