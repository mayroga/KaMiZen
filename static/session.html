<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AL CIELO - STREET WISDOM</title>
    <style>
        :root { --neon-blue: #00f2ff; --neon-gold: #f1c40f; --neon-red: #ff3131; --bg-dark: #050508; }
        body { margin: 0; overflow: hidden; background: var(--bg-dark); color: white; font-family: 'Orbitron', sans-serif; touch-action: none; }
        #hud { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-evenly; z-index: 100; pointer-events: none; }
        .data-box { background: rgba(0, 0, 0, 0.8); border: 1px solid var(--neon-blue); padding: 8px; text-align: center; min-width: 120px; }
        .label { font-size: 9px; color: var(--neon-blue); display: block; }
        .value { font-size: 20px; font-weight: 900; }
        #timer-display { position: absolute; bottom: 20px; width: 100%; text-align: center; color: var(--neon-gold); font-size: 35px; font-weight: 900; }
        canvas { display: block; }
        #overlay { position: fixed; inset: 0; background: black; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .start-btn { padding: 20px 40px; background: var(--neon-blue); border: none; font-family: 'Orbitron'; cursor: pointer; font-weight: 900; }
        #breathing-ui { display: none; text-align: center; color: white; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="hud">
    <div class="data-box"><span class="label">STREET CAPITAL</span><span id="val-money" class="value">$0</span></div>
    <div class="data-box"><span class="label">STABILITY</span><span id="val-health" class="value">100%</span></div>
    <div class="data-box"><span class="label">AUTONOMY</span><span id="val-rec" class="value">0/3</span></div>
</div>

<div id="timer-display">10:00</div>

<div id="overlay">
    <div id="intro-content">
        <h1 style="color: var(--neon-blue);">AL CIELO</h1>
        <button class="start-btn" onclick="startGame()">START MISSION</button>
    </div>
    <div id="breathing-ui">
        <h2 id="breath-text">PREPARE</h2>
        <div id="circle" style="width:100px; height:100px; border:4px solid var(--neon-blue); border-radius:50%; margin:20px auto; transition: transform 4s ease-in-out;"></div>
        <p>1 MINUTE SILENCE FOR WISDOM</p>
        <button id="reset-btn" class="start-btn" style="display:none; margin-top:20px;" onclick="location.reload()">REINITIALIZE</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let active = false;
let objects = [];
let stats = { money: 0, health: 100, recovery: 0, time: 600 };
let user = { x: 0, y: 0, size: 50 };
let isShooting = false;

// Configuración de palabras
const wordBank = {
    hard: ["SMUGGLING", "FEDERAL OFFENSE", "SYSTEM BREACH"],
    neg: ["DEBT", "LIES", "DANGER", "CHAOS", "FIGHT", "TRAP"],
    pos: ["STABILITY", "PROFIT", "KNOWLEDGE", "SOP", "CBP", "IATA"]
};

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

function startGame() {
    document.getElementById('intro-content').style.display = 'none';
    document.getElementById('overlay').style.backgroundColor = 'transparent';
    document.getElementById('overlay').style.pointerEvents = 'none';
    active = true;
    setInterval(spawn, 800);
    countDown();
    loop();
}

function spawn() {
    if(!active) return;
    let type = Math.random() > 0.7 ? "pos" : "neg";
    let text;
    let speedMult = 1;
    let isHard = false;

    if (Math.random() > 0.85) {
        text = wordBank.hard[Math.floor(Math.random()*wordBank.hard.length)];
        speedMult = 2.5;
        isHard = true;
    } else {
        text = type === "pos" ? wordBank.pos[Math.floor(Math.random()*wordBank.pos.length)] : wordBank.neg[Math.floor(Math.random()*wordBank.neg.length)];
    }

    objects.push({
        text, type, isHard,
        x: Math.random() * canvas.width,
        y: -20,
        vx: (Math.random() - 0.5) * 4,
        vy: (2 + Math.random() * 2) * speedMult,
        opacity: 1
    });
}

function countDown() {
    const t = setInterval(() => {
        if(!active) return;
        stats.time--;
        let m = Math.floor(stats.time/60), s = stats.time%60;
        document.getElementById("timer-display").innerText = `${m}:${s<10?'0':''}${s}`;
        if(stats.time <= 0) { clearInterval(t); endSession(); }
    }, 1000);
}

function update() {
    if(!active) return;

    objects.forEach((o, i) => {
        o.x += o.vx;
        o.y += o.vy;

        // Rebote lateral suave
        if(o.x < 0 || o.x > canvas.width) o.vx *= -1;

        // Dificultad: Las palabras "Hard" esquivan al usuario
        if(o.isHard && Math.hypot(o.x - user.x, o.y - user.y) < 150) {
            o.vx = o.x < user.x ? -5 : 5;
        }

        // Detección de Láser Continuo
        if(isShooting && Math.abs(o.x - user.x) < 35 && o.y < user.y) {
            if(o.type === "neg") {
                o.type = "pos";
                o.text = "RESOLVED";
                stats.money += 100;
            }
        }

        // Colisión con Avatar
        if(Math.hypot(o.x - user.x, o.y - user.y) < user.size/2) {
            if(o.type === "neg") {
                stats.health -= 10;
                stats.recovery = 0;
            } else {
                stats.money += 500;
                stats.recovery++;
            }
            objects.splice(i, 1);
        }

        if(o.y > canvas.height) objects.splice(i, 1);
    });

    // HUD Update
    document.getElementById("val-money").innerText = `$${stats.money}`;
    document.getElementById("val-health").innerText = `${stats.health}%`;
    document.getElementById("val-rec").innerText = `${stats.recovery}/3`;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Laser visual
    if(isShooting) {
        let grad = ctx.createLinearGradient(user.x, user.y, user.x, 0);
        grad.addColorStop(0, "rgba(0, 242, 255, 0.8)");
        grad.addColorStop(1, "transparent");
        ctx.fillStyle = grad;
        ctx.fillRect(user.x - 15, 0, 30, user.y);
    }

    // Dibujar Palabras (con superposición permitida)
    objects.forEach(o => {
        ctx.fillStyle = o.type === "neg" ? "rgba(255, 49, 49, 0.9)" : "rgba(0, 255, 65, 0.9)";
        if(o.isHard) ctx.fillStyle = "var(--neon-gold)";
        
        ctx.font = o.isHard ? "bold 22px Orbitron" : "16px Orbitron";
        ctx.textAlign = "center";
        ctx.fillText(o.text, o.x, o.y);
    });

    // Avatar
    ctx.strokeStyle = varColor('--neon-blue');
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(user.x, user.y, user.size/2, 0, Math.PI*2);
    ctx.stroke();
}

function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

function loop() {
    update(); draw();
    if(active) requestAnimationFrame(loop);
}

function endSession() {
    active = false;
    const overlay = document.getElementById('overlay');
    overlay.style.backgroundColor = 'rgba(0,0,0,0.95)';
    overlay.style.pointerEvents = 'all';
    document.getElementById('breathing-ui').style.display = 'block';
    
    let cycle = 0;
    const circle = document.getElementById('circle');
    const text = document.getElementById('breath-text');
    
    const breathLoop = setInterval(() => {
        cycle++;
        if(cycle === 1) { text.innerText = "INHALE"; circle.style.transform = "scale(2)"; }
        if(cycle === 2) { text.innerText = "HOLD"; }
        if(cycle === 3) { text.innerText = "EXHALE"; circle.style.transform = "scale(1)"; }
        if(cycle === 4) { cycle = 0; }
    }, 4000);

    setTimeout(() => {
        clearInterval(breathLoop);
        text.innerText = "SESSIONS COMPLETE";
        document.getElementById('reset-btn').style.display = 'inline-block';
    }, 60000); // 1 Minuto de silencio/respiración
}

window.addEventListener("mousemove", e => { user.x = e.clientX; user.y = e.clientY; });
window.addEventListener("mousedown", () => isShooting = true);
window.addEventListener("mouseup", () => isShooting = false);
window.addEventListener("touchstart", (e) => { 
    isShooting = true; 
    user.x = e.touches[0].clientX; 
    user.y = e.touches[0].clientY; 
});
window.addEventListener("touchend", () => isShooting = false);
</script>
</body>
</html>
