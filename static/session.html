<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KaMiZen Engine V2</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
    font-size: 22px;
}

#app {
    padding: 25px;
    max-width: 900px;
    margin: auto;
}

/* TITLES */
h1 {
    font-size: 36px;
    margin-top: 30px;
}

h2 {
    font-size: 26px;
    color: #60a5fa;
}

/* BUTTONS */
button {
    display: block;
    margin: 10px auto;
    padding: 14px;
    width: 80%;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* ANSWERS STATES */
.correct { background: #16a34a; color: white; }
.wrong { background: #dc2626; color: white; }
.medium { background: #f59e0b; }
.low { background: #fb923c; }

/* CONTINUE BUTTON */
.next {
    background: #2563eb;
    color: white;
    margin-top: 20px;
}

/* BREATHING CIRCLE */
.circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: #1e90ff;
    margin: 25px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    transition: transform 3s ease-in-out;
}

/* SILENCE MODE */
.silence {
    font-size: 24px;
    opacity: 0.7;
    margin: 20px;
}

/* STORY TEXT */
.story {
    font-size: 20px;
    opacity: 0.9;
    margin: 20px;
}

/* INPUT SCREEN */
input {
    padding: 12px;
    font-size: 18px;
    width: 70%;
    margin-top: 20px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
/* =========================
   🌐 GLOBAL STATE
========================= */

let userName = "";
const app = document.getElementById("app");

/* =========================
   🔊 VOZ (INGLÉS)
========================= */
function speak(text) {
    if (!text) return;
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "en-US";
    msg.rate = 0.95;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(msg);
}

/* =========================
   🧼 CLEAR SCREEN
========================= */
function clear() {
    app.innerHTML = "";
}

/* =========================
   👋 SALUDO + NOMBRE
========================= */
function startApp() {
    clear();

    const title = document.createElement("h1");
    title.innerText = "Welcome to KaMiZen";
    app.appendChild(title);

    speak("Welcome to Ka Mi Zen");

    const input = document.createElement("input");
    input.placeholder = "Enter your name";

    const btn = document.createElement("button");
    btn.innerText = "Start";

    btn.onclick = () => {
        userName = input.value || "User";
        speak("Hello " + userName);
        loadStories();
    };

    app.appendChild(input);
    app.appendChild(btn);
}

/* =========================
   📖 STORIES LOAD
========================= */
async function loadStories() {
    clear();

    const res = await fetch("/api/stories");
    const data = await res.json();

    const title = document.createElement("h1");
    title.innerText = "Stories";
    app.appendChild(title);

    speak("Starting stories");

    let i = 0;

    function next() {
        if (i >= data.stories.length) {
            loadMissions();
            return;
        }

        const s = data.stories[i];
        i++;

        clear();

        const box = document.createElement("div");
        box.className = "story";
        box.innerText = s.title || "Story";

        app.appendChild(box);

        speak(s.title || "");

        setTimeout(next, 2500);
    }

    next();
}

/* =========================
   🎯 MISSIONS LOAD
========================= */
async function loadMissions() {
    clear();

    const res = await fetch("/api/missions");
    const data = await res.json();

    let i = 0;
    let bIndex = 0;

    function renderBlock(block, next) {
        clear();

        /* TITLE */
        if (block.t === "v") {
            speak(block.tx.en);
            const h = document.createElement("h1");
            h.innerText = block.tx.en;
            app.appendChild(h);
            setTimeout(next, 2000);
        }

        /* HEADER */
        else if (block.t === "h") {
            const h = document.createElement("h2");
            h.innerText = block.tx.en;
            app.appendChild(h);
            setTimeout(next, 1500);
        }

        /* STORY */
        else if (block.story) {
            const s = document.createElement("div");
            s.className = "story";
            s.innerText = block.story.en;
            app.appendChild(s);
            speak(block.story.en);
            setTimeout(next, 3000);
        }

        /* QUESTION */
        else if (block.t === "d") {

            const q = document.createElement("h2");
            q.innerText = block.q.en;
            app.appendChild(q);

            block.op.forEach((opt, idx) => {

                const b = document.createElement("button");
                b.innerText = opt;

                b.onclick = () => {

                    const correct = idx === block.c;

                    if (correct) {
                        b.className = "correct";
                        speak("Correct");
                    } else {
                        b.className = "wrong";
                        speak("Incorrect");
                    }

                    const exp = document.createElement("div");
                    exp.className = "story";
                    exp.innerText = block.ex[idx] || "";
                    app.appendChild(exp);

                    const cont = document.createElement("button");
                    cont.innerText = "CONTINUE";
                    cont.className = "next";

                    cont.onclick = next;
                    app.appendChild(cont);
                };

                app.appendChild(b);
            });
        }

        /* BREATHING */
        else if (block.t === "breath_auto") {

            const circle = document.createElement("div");
            circle.className = "circle";
            circle.innerText = "INHALE";

            app.appendChild(circle);

            speak(block.tx.en);

            let inhale = true;

            const interval = setInterval(() => {
                if (inhale) {
                    circle.innerText = "INHALE";
                    circle.style.transform = "scale(1.4)";
                } else {
                    circle.innerText = "EXHALE";
                    circle.style.transform = "scale(0.8)";
                }
                inhale = !inhale;
            }, block.d * 500);

            setTimeout(() => {
                clearInterval(interval);
                circle.innerText = "DONE";
                circle.style.transform = "scale(1)";
                next();
            }, block.d * 1000);
        }

        /* SILENCE */
        else if (block.t === "sil") {

            const box = document.createElement("div");
            box.className = "silence";
            box.innerText = "SILENCE...";

            app.appendChild(box);

            setTimeout(() => {
                box.innerText = "DONE";
                next();
            }, block.d * 1000);
        }

        else {
            next();
        }
    }

    function runMission(m) {

        let bIndex = 0;

        function next() {
            if (bIndex < m.b.length) {
                renderBlock(m.b[bIndex], () => {
                    bIndex++;
                    next();
                });
            } else {
                setTimeout(runNextMission, 1500);
            }
        }

        next();
    }

    function runNextMission() {

        if (i >= data.missions.length) {
            clear();

            const done = document.createElement("h1");
            done.innerText = "SYSTEM COMPLETE";
            app.appendChild(done);

            speak("System complete");
            return;
        }

        runMission(data.missions[i]);
        i++;
    }

    runNextMission();
}

/* =========================
   🚀 START
========================= */
startApp();
</script>

</body>
</html>
