<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | SESSION PRO</title>

<style>
:root{
    --neon:#00f2ff;
    --bg:#000;
    --panel:rgba(0,15,30,0.92);
    --danger:#ff4444;
    --success:#33ff33;
}

body{
    margin:0;
    background:var(--bg);
    font-family:Arial;
    color:var(--neon);
    overflow:hidden;
}

#app{
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    position:relative;
}

/* CONTROLS */
#controls{
    position:absolute;
    top:10px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 10px;
}

.ctrl-btn{
    padding:6px 10px;
    font-size:12px;
}

/* LANGUAGE */
#langToggle{
    position:absolute;
    top:50px;
    right:10px;
}

/* CIRCLE */
#circle{
    width:70px;
    height:70px;
    border-radius:50%;
    background:rgba(0,242,255,0.2);
    box-shadow:0 0 30px var(--neon);
}

/* TEXT */
#message{
    position:absolute;
    bottom:180px;
    width:85%;
    max-width:700px;
    padding:15px;
    background:var(--panel);
    border:1px solid var(--neon);
    text-align:center;
    min-height:140px;
}

/* OPTIONS */
#options{
    position:absolute;
    bottom:70px;
    width:85%;
    max-width:700px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

button{
    padding:12px;
    border:1px solid var(--neon);
    background:transparent;
    color:var(--neon);
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:var(--neon);
    color:#000;
}

/* SILENCE */
#silence{
    position:absolute;
    top:80px;
    font-size:12px;
    opacity:0.7;
}

.flashFail{
    background:rgba(255,0,0,0.4);
}
.flashSuccess{
    background:rgba(0,255,0,0.3);
}
</style>
</head>

<body>

<div id="app">

<div id="controls">
<button class="ctrl-btn" onclick="restart()">RESTART</button>
<button class="ctrl-btn" onclick="back()">BACK</button>
<button class="ctrl-btn" onclick="skip()">SKIP</button>
</div>

<button id="langToggle" onclick="toggleLang()">ES</button>

<div id="silence">SILENCE: <span id="silenceLevel">20</span>s</div>

<div id="circle"></div>

<div id="message" onclick="start()">TAP TO START</div>

<div id="options"></div>

</div>

<script>

/* STATE */
let session_id=null;
let history=[];
let lang="en";
let loading=false;

/* AUDIO */
const audio=new (window.AudioContext||window.webkitAudioContext)();

function sound(type){
    const o=audio.createOscillator();
    const g=audio.createGain();

    o.connect(g);
    g.connect(audio.destination);

    if(type==="ok") o.frequency.value=520;
    if(type==="fail") o.frequency.value=120;
    if(type==="click") o.frequency.value=300;

    g.gain.value=0.15;
    o.start();
    o.stop(audio.currentTime+0.2);
}

/* MUSIC */
let music;
function startMusic(){
    music=audio.createOscillator();
    const g=audio.createGain();
    music.frequency.value=220;
    g.gain.value=0.03;
    music.connect(g);
    g.connect(audio.destination);
    music.start();
}

/* START */
async function start(){
    if(audio.state==="suspended") await audio.resume();

    sound("ok"); sound("ok"); // DOPAMINA
    startMusic();

    const res=await fetch("/start",{method:"POST"});
    const data=await res.json();

    session_id=data.session_id;
    history=[];

    render(data);
}

/* SEND */
async function send(code){

    if(loading) return;
    loading=true;

    sound("click");

    const res=await fetch("/judge",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({session_id,decision:code})
    });

    const data=await res.json();
    history.push(data);

    render(data);
    loading=false;
}

/* RENDER */
function render(data){

    if(!data||!data.story) return;

    const s=data.story;

    let text = s.text?.[lang] || s.text_en || s.text_es || "";

    /* ANALYSIS */
    if(s.analysis){
        text += "\n\n" + (s.analysis[lang] || "");
    }

    /* SILENCE INFO */
    if(s.type==="silence_challenge"){
        document.getElementById("silenceLevel").innerText =
            s.duration_sec || 20;

        if(s.reward){
            text += "\n\n" + (s.reward[lang] || "");
        }
    }

    document.getElementById("message").innerText=text;
    document.getElementById("options").innerHTML="";

    /* RIDDLE / MATH */
    if(s.type==="mini_riddle"||s.type==="mini_math"){

        document.getElementById("message").innerText =
            s.question?.[lang] || "";

        s.answers.forEach(a=>{
            const b=document.createElement("button");
            b.innerText=a.text?.[lang];

            b.onclick=()=>{
                if(a.correct){
                    sound("ok");
                    flash(true);
                }else{
                    sound("fail");
                    flash(false);
                }
                setTimeout(()=>send("TDB"),800);
            };

            document.getElementById("options").appendChild(b);
        });

        return;
    }

    /* OPTIONS */
    let opts=s.options||[];

    if(opts.length===0){
        opts=[{code:"TDB",text:{en:"CONTINUE",es:"CONTINUAR"}}];
    }

    opts.forEach(o=>{
        const b=document.createElement("button");
        b.innerText=o.text?.[lang]||"OK";

        b.onclick=()=>{
            sound("click");

            if(o.reason){
                document.getElementById("message").innerText =
                    o.reason[lang] || "";
            }

            if(o.correct){
                sound("ok");
                flash(true);
            }else{
                sound("fail");
                flash(false);
            }

            setTimeout(()=>send(o.code),1000);
        };

        document.getElementById("options").appendChild(b);
    });
}

/* FLASH */
function flash(success){
    const app=document.getElementById("app");
    app.classList.add(success?"flashSuccess":"flashFail");

    setTimeout(()=>{
        app.classList.remove("flashSuccess","flashFail");
    },300);
}

/* CONTROLS */
function skip(){ send("TDB"); }
function back(){
    if(history.length<2) return;
    history.pop();
    render(history[history.length-1]);
}
function restart(){ location.reload(); }

/* LANG */
function toggleLang(){
    lang = lang==="en"?"es":"en";
    document.getElementById("langToggle").innerText =
        lang==="en"?"ES":"EN";
}

</script>

</body>
</html>
