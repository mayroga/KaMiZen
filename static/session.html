<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KaMiZen Engine V2</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: white;
    text-align: center;
}

/* MAIN CONTAINER */
#app {
    padding: 20px;
    max-width: 900px;
    margin: auto;
}

/* BUTTONS */
button {
    padding: 12px 20px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
}

.primary { background: #2563eb; color: white; }
.good { background: #22c55e; }
.warn { background: #facc15; }
.bad { background: #f97316; }
.danger { background: #ef4444; }

/* STORY BOX */
.card {
    background: #111a2e;
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
    text-align: left;
}

/* BREATHING CIRCLE */
.circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    margin: 20px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    border: 3px solid #3b82f6;
    animation: breathe 6s infinite ease-in-out;
}

@keyframes breathe {
    0% { transform: scale(0.9); opacity: 0.6; }
    50% { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(0.9); opacity: 0.6; }
}

/* ANSWERS */
.answer {
    background: #1f2937;
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    cursor: pointer;
}

.hidden { display: none; }

.small { font-size: 14px; opacity: 0.8; }
</style>
</head>

<body>
<div id="app"></div>

<script>
/* =========================
   ENGINE STATE
========================= */
let state = {
    name: "",
    step: "welcome",
    stories: [],
    missions: [],
    sIndex: 0,
    mIndex: 0
};

/* =========================
   SPEECH (Narrator)
========================= */
function speak(text) {
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "en-US";
    msg.rate = 1;
    window.speechSynthesis.speak(msg);
}

/* =========================
   LOAD JSON
========================= */
async function loadData() {
    const storiesRes = await fetch("/stories.json");
    const missionsRes = await fetch("/missions.json");

    state.stories = await storiesRes.json();
    state.stories = state.stories.stories || state.stories;

    state.missions = await missionsRes.json();
    state.missions = state.missions.missions || state.missions;
}

/* =========================
   RENDER ENGINE
========================= */
function render() {
    const app = document.getElementById("app");
    app.innerHTML = "";

    /* WELCOME */
    if (state.step === "welcome") {
        app.innerHTML = `
            <h1>Welcome to KaMiZen</h1>
            <p>Enter your name</p>
            <input id="nameInput" placeholder="Your name"/>
            <br/>
            <button class="primary" onclick="startApp()">Start</button>
        `;
        return;
    }

    /* NAME CONFIRM */
    if (state.step === "named") {
        app.innerHTML = `
            <h2>Hello, ${state.name}</h2>
            <button class="primary" onclick="startStories()">Begin Journey</button>
        `;
        return;
    }

    /* STORIES */
    if (state.step === "story") {
        const s = state.stories[state.sIndex];

        if (!s) {
            state.step = "missions";
            render();
            return;
        }

        speak(s.en);

        app.innerHTML = `
            <h2>Story ${s.id}: ${s.t}</h2>
            <div class="card">
                <p>${s.en}</p>
            </div>

            <button class="primary" onclick="nextStory()">Continue</button>
        `;
        return;
    }

    /* MISSIONS */
    if (state.step === "missions") {
        const m = state.missions[state.mIndex];

        if (!m) {
            state.step = "complete";
            render();
            return;
        }

        app.innerHTML = `
            <h2>Mission ${m.id}</h2>
            <div class="card">
                <p>${m.question}</p>

                <div>
                    ${m.answers.map((a, i) =>
                        `<div class="answer" onclick="checkAnswer(${i}, ${m.correct})">${a.text}</div>`
                    ).join("")}
                </div>

                <div id="feedback"></div>
            </div>

            <button class="primary" onclick="nextMission()">Continue</button>
        `;
        return;
    }

    /* BREATHING MODULE */
    if (state.step === "complete") {
        app.innerHTML = `
            <h1>Training Complete</h1>

            <div class="circle" id="breathCircle">
                <span id="breathText">Inhale</span>
            </div>

            <p class="small">This exercise trains calm focus and nervous system control.</p>

            <button class="primary" onclick="restart()">Restart</button>
        `;

        startBreathing();
        return;
    }
}

/* =========================
   FLOW CONTROL
========================= */
function startApp() {
    state.name = document.getElementById("nameInput").value || "User";
    state.step = "named";
    render();
}

function startStories() {
    state.step = "story";
    state.sIndex = 0;
    render();
}

function nextStory() {
    state.sIndex++;
    render();
}

function nextMission() {
    state.mIndex++;
    render();
}

/* =========================
   ANSWER SYSTEM
========================= */
function checkAnswer(index, correct) {
    const fb = document.getElementById("feedback");

    if (index === correct) {
        fb.innerHTML = `<p style="color:#22c55e">Correct</p>`;
    } else {
        fb.innerHTML = `<p style="color:#ef4444">Incorrect</p>`;
    }
}

/* =========================
   BREATHING LOOP
========================= */
function startBreathing() {
    const text = document.getElementById("breathText");

    let inhale = true;

    setInterval(() => {
        if (!text) return;

        if (inhale) {
            text.innerText = "Inhale";
        } else {
            text.innerText = "Exhale";
        }

        inhale = !inhale;
    }, 3000);
}

/* =========================
   RESTART
========================= */
function restart() {
    location.reload();
}

/* =========================
   INIT
========================= */
(async function init() {
    await loadData();
    render();
})();
</script>

</body>
</html>
