<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AL CIELO: TOTAL LIFE TRAINING</title>

<style>
:root {
    --neon-blue:#00f2ff;
    --neon-green:#00ff41;
    --neon-red:#ff003c;
    --neon-yellow:#ffff00;
    --matrix-bg:#00050a;
    --neon-gold:#ffcc00;
}

body {
    margin:0;
    background:var(--matrix-bg);
    color:#fff;
    font-family:'Courier New', monospace;
    overflow:hidden;
    user-select:none;
    transition:background 0.3s;
}

.correct-flash { background:#002a00 !important; }
.wrong-flash { background:#2a0000 !important; }

#security-alert {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:8px;
    background:var(--neon-green);
    z-index:1000;
    box-shadow:0 0 15px var(--neon-green);
}

#lang-btn {
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:999;
    padding:10px 18px;
    border:2px solid var(--neon-blue);
    background:rgba(0,0,0,0.8);
    color:var(--neon-blue);
    cursor:pointer;
    font-weight:bold;
    border-radius:5px;
}

#hud {
    position:fixed;
    top:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px;
    z-index:50;
    box-sizing:border-box;
}

#timer-box {
    font-size:2.8rem;
    color:var(--neon-blue);
    text-shadow:0 0 20px var(--neon-blue);
}

#score-box {
    border:3px solid #fff;
    padding:8px 20px;
    font-size:1.8rem;
    background:rgba(255,255,255,0.1);
}

#mastery-lvl {
    color:var(--neon-green);
    font-size:1.2rem;
    font-weight:bold;
}

#life-stats {
    position:fixed;
    bottom:20px;
    left:20px;
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    z-index:50;
    max-width:95%;
}

.stat-pill {
    border:2px solid #333;
    padding:10px 15px;
    font-size:0.9rem;
    background:rgba(0,0,0,0.9);
    border-radius:6px;
}

.stat-pill span {
    font-weight:bold;
    color:var(--neon-blue);
}

#v-money { color:var(--neon-gold)!important; }
#v-safety { color:var(--neon-red)!important; }
#v-happy { color:#ff00ff!important; }

.floating {
    position:absolute;
    padding:15px 30px;
    font-weight:900;
    font-size:1.5rem;
    border-radius:10px;
    background:rgba(0,0,0,0.9);
    z-index:10;
    animation:floatUp 7s linear forwards;
    cursor:pointer;
}

.word-power { border:3px solid var(--neon-green); color:var(--neon-green); }
.word-risk { border:3px solid var(--neon-red); color:var(--neon-red); }
.word-silence { border:3px solid var(--neon-yellow); color:var(--neon-yellow); }
.word-money { border:3px solid var(--neon-gold); color:var(--neon-gold); }
.word-business { border:3px solid #00e5ff; color:#00e5ff; }
.word-growth { border:3px solid #00ff99; color:#00ff99; }

@keyframes floatUp {
    from { transform:translateY(110vh); }
    to { transform:translateY(-25vh); }
}

.explode { animation:blast 0.5s ease-out forwards!important; }

@keyframes blast {
    0% { transform:scale(1); opacity:1; }
    100% { transform:scale(4); opacity:0; }
}

#overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,5,10,0.95);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:500;
    text-align:center;
    padding:30px;
}

#decision-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:30px;
    width:100%;
    max-width:800px;
}

.choice-btn {
    padding:22px;
    border:3px solid var(--neon-blue);
    background:none;
    color:#fff;
    cursor:pointer;
}

#continue-btn{
    margin-top:20px;
    padding:15px 30px;
    border:2px solid #fff;
    background:none;
    color:#fff;
    display:none;
    cursor:pointer;
}

#breath-circle{
    width:160px;
    height:160px;
    border-radius:50%;
    border:4px solid var(--neon-blue);
    margin:10px auto;
    display:none;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-weight:bold;
    color:var(--neon-blue);
    animation:pulse 4s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);opacity:0.5;}
    50%{transform:scale(1.4);opacity:1;}
    100%{transform:scale(1);opacity:0.5;}
}
</style>
</head>

<body>

<div id="security-alert"></div>
<button id="lang-btn" onclick="toggleLang()">EN</button>

<div id="hud">
    <div id="timer-box">05:00</div>
    <div id="score-box">0</div>
    <div id="mastery-lvl">MASTERY x1</div>
</div>

<div id="life-stats">
    <div class="stat-pill">Respect: <span id="v-respect">50</span></div>
    <div class="stat-pill">Peace: <span id="v-peace">50</span></div>
    <div class="stat-pill">Leadership: <span id="v-lead">50</span></div>
    <div class="stat-pill">Money: $<span id="v-money">100</span></div>
    <div class="stat-pill">Safety: <span id="v-safety">100</span>%</div>
    <div class="stat-pill">Happiness: <span id="v-happy">50</span>%</div>
</div>

<div id="breath-circle">INHALE</div>

<div id="overlay">
    <h1 id="phase-title"></h1>
    <p id="phase-desc"></p>
    <div id="decision-grid"></div>
    <button id="continue-btn">CONTINUE</button>
</div>

<script src="/static/engine.js"></script>

<script>

let lang="en";
let gameMode="idle";

let state={
    score:0,
    mastery:1,
    timer:300,
    stats:{respect:50,peace:50,lead:50,money:100,happy:50,safety:100},
    spawnRate:1300
};

function speak(t){
    if(!t) return;
    let u=new SpeechSynthesisUtterance(t);
    u.lang="en-US";
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
}

function updateHUD(){
    document.getElementById("score-box").innerText=state.score;
    let m=Math.floor(state.timer/60);
    let s=state.timer%60;
    document.getElementById("timer-box").innerText=
        String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
    for(let k in state.stats){
        let el=document.getElementById("v-"+k);
        if(el) el.innerText=state.stats[k];
    }
}

/* BREATH FULL SYSTEM 18s */
async function breathingExercise(withVoice=true){
    let c=document.getElementById("breath-circle");
    let desc=document.getElementById("phase-desc");

    c.style.display="flex";

    for(let i=0;i<3;i++){
        c.innerText="INHALE";
        desc.innerText="Oxygen enters blood. Heart rate stabilizes. Brain focus increases.";
        if(withVoice) speak("Inhale slowly");
        await new Promise(r=>setTimeout(r,3000));

        c.innerText="EXHALE";
        desc.innerText="Stress leaves body. Muscles relax. Nervous system resets.";
        if(withVoice) speak("Exhale slowly");
        await new Promise(r=>setTimeout(r,3000));
    }

    c.style.display="none";
}

/* WORDS */
const words={
power:["LISTEN FIRST","STAY CALM","THINK BEFORE","CONTROL EMOTION","RESPECT OTHERS"],
risk:["REACT ANGRY","BLAME OTHERS","LOSE CONTROL","FOLLOW CROWD"],
silence:["OBSERVE PEOPLE","BREATHE DEEP","WAIT MOMENT","INNER CONTROL"],
money:["INVEST SMART","BUILD VALUE","CASHFLOW","SAVE MONEY","THINK SCALE"],
business:["BUILD SYSTEM","SELL VALUE","LEAD MARKET","BRAND POWER","EXPAND NETWORK"],
growth:["LEARN FAST","IMPROVE DAILY","BUILD SKILL","LONG TERM THINK"]
};

function spawnWord(){
if(gameMode!=="words") return;

const cats=["power","risk","silence","money","business","growth"];
const styles=["word-power","word-risk","word-silence","word-money","word-business","word-growth"];
const c=cats[Math.floor(Math.random()*cats.length)];

let div=document.createElement("div");
div.className="floating "+styles[cats.indexOf(c)];
div.innerText=words[c][Math.floor(Math.random()*words[c].length)];
div.style.left=Math.random()*80+"vw";

div.onclick=()=>{
if(div.dataset.clicked) return;
div.dataset.clicked=true;
div.classList.add("explode");

let positive = ["power","silence","money","business","growth"].includes(c);

if(positive){
    state.score+=20;
}else{
    state.score-=10;
}

if(c==="money") state.stats.money++;
if(c==="business") state.stats.lead++;
if(c==="growth") state.stats.happy++;
if(c==="power") state.stats.respect++;
if(c==="risk") state.stats.safety--;
if(c==="silence") state.stats.peace++;

updateHUD();
setTimeout(()=>div.remove(),500);
};

document.body.appendChild(div);
setTimeout(()=>div.remove(),7000);
}

/* QUESTION */
async function triggerQuestion(){
const res=await fetch("/api/mission/next?lang="+lang);
const data=await res.json();
if(!data||!data.options) return;

let overlay=document.getElementById("overlay");
let grid=document.getElementById("decision-grid");
let desc=document.getElementById("phase-desc");
let title=document.getElementById("phase-title");
let cont=document.getElementById("continue-btn");

overlay.style.display="flex";
grid.innerHTML="";
cont.style.display="none";

title.innerText=data.theme;
desc.innerText=data.story;

if(desc.innerText.toLowerCase().includes("inhale")){
    await breathingExercise(true);
}
if(desc.innerText.toLowerCase().includes("silence")){
    await breathingExercise(false);
}

data.options.forEach(opt=>{
let btn=document.createElement("button");
btn.className="choice-btn";
btn.innerText=opt.text.en;

btn.onclick=()=>{
let correct=opt.correct;

if(correct){
state.score+=30;
document.body.classList.add("correct-flash");
}else{
state.score-=20;
document.body.classList.add("wrong-flash");
}

setTimeout(()=>{
document.body.classList.remove("correct-flash","wrong-flash");
},500);

desc.innerText=opt.explanation.en;
speak(opt.explanation.en);

grid.innerHTML="";
cont.style.display="block";

updateHUD();
};

grid.appendChild(btn);
});

cont.onclick=()=>{
overlay.style.display="none";
};
}

/* TIMER */
setInterval(()=>{
if(state.timer>0){
state.timer--;
updateHUD();
}
},1000);

/* LOOP */
async function mainLoop(){
while(true){
gameMode="words";

let end=Date.now()+45000;

while(Date.now()<end){
spawnWord();
await new Promise(r=>setTimeout(r,state.spawnRate));
}

document.querySelectorAll(".floating").forEach(e=>e.remove());

gameMode="question";
await triggerQuestion();

await new Promise(r=>setTimeout(r,3000));
}
}

function toggleLang(){
lang=(lang==="en")?"es":"en";
document.getElementById("lang-btn").innerText=lang.toUpperCase();
}

updateHUD();
mainLoop();

</script>

</body>
</html>
