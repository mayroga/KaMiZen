<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KamiZen Session</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#0b0f1a;
    color:white;
    text-align:center;
}

/* ================= HEADER ================= */
#app {
    padding:20px;
}

/* ================= BUTTONS ================= */
button {
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.btn {
    background:#1f2a44;
    color:white;
}

.btn:hover {
    background:#2b3a5f;
}

.continue {
    background:#00c3ff;
    color:black;
}

/* ================= COLORS ================= */
.correct { background:#00c853 !important; }
.wrong { background:#d50000 !important; }
.partial { background:#ff9100 !important; }
.almost { background:#ffd600 !important; }

/* ================= BREATHING ================= */
.circle {
    width:160px;
    height:160px;
    border-radius:50%;
    margin:20px auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    font-weight:bold;
}

.breath {
    border:4px solid #00c3ff;
    animation:pulse 4s infinite;
}

.silence {
    border:4px solid #aaa;
    opacity:0.7;
}

@keyframes pulse {
    0% { transform:scale(1); }
    50% { transform:scale(1.3); }
    100% { transform:scale(1); }
}

/* ================= BOX ================= */
.box {
    background:#111a2e;
    padding:20px;
    border-radius:10px;
    margin:10px;
}

/* ================= SMALL ================= */
small {
    color:#aaa;
}

/* ================= INPUT ================= */
input {
    padding:10px;
    border-radius:8px;
    border:none;
    width:200px;
}
</style>
</head>

<body>

<div id="app"></div>

<script src="/static/js/engine.js"></script>

<script>
// =====================================
// GLOBAL STATE
// =====================================
let engine;
let userName = "";
let stories = [];
let missions = [];
let storyIndex = 0;

// =====================================
// START SCREEN
// =====================================
function startApp() {
    const app = document.getElementById("app");

    app.innerHTML = `
        <h1>Welcome to KamiZen</h1>
        <p>Awareness • Calm • Control • Focus</p>
        <button class="btn" onclick="askName()">Start</button>
    `;
}

// =====================================
// ASK NAME
// =====================================
function askName() {
    const app = document.getElementById("app");

    app.innerHTML = `
        <h2>What is your name?</h2>
        <input id="nameInput" placeholder="Enter name"/>
        <br><br>
        <button class="btn" onclick="saveName()">Continue</button>
    `;
}

function saveName() {
    userName = document.getElementById("nameInput").value || "User";
    loadStories();
}

// =====================================
// LOAD STORIES
// =====================================
async function loadStories() {
    const res = await fetch("/api/stories");
    stories = Object.values(await res.json());

    showStory();
}

function showStory() {
    const app = document.getElementById("app");

    if (storyIndex >= stories.length) {
        loadMissions();
        return;
    }

    let s = stories[storyIndex];

    app.innerHTML = `
        <div class="box">
            <h2>Story ${storyIndex + 1}</h2>
            <p>${s.text || JSON.stringify(s)}</p>
        </div>

        <button class="continue" onclick="nextStory()">Continue</button>
    `;
}

function nextStory() {
    storyIndex++;
    showStory();
}

// =====================================
// LOAD MISSIONS
// =====================================
async function loadMissions() {
    const res = await fetch("/api/missions");
    const data = await res.json();

    missions = data.missions;

    engine = new KamiZenEngine({ container: "app", lang: "en" });
    engine.load(data);
    engine.start();
}

// =====================================
// BREATHING VISUAL (HOOK)
// =====================================
window.showBreathing = function(type, text, info, duration) {
    const app = document.getElementById("app");

    let cls = type === "silence" ? "circle silence" : "circle breath";

    app.innerHTML = `
        <div class="${cls}" id="circle">${text}</div>
        <p><small>${info}</small></p>
    `;

    let inhale = true;

    const interval = setInterval(() => {
        document.getElementById("circle").innerText = inhale ? "INHALE" : "EXHALE";
        inhale = !inhale;
    }, 2000);

    setTimeout(() => {
        clearInterval(interval);
    }, duration * 1000);
};

// =====================================
// QUESTION COLOR FEEDBACK (HOOK)
// =====================================
window.showAnswerFeedback = function(state, explanation) {
    const app = document.getElementById("app");

    let color = "partial";

    if (state === "correct") color = "correct";
    if (state === "wrong") color = "wrong";
    if (state === "almost") color = "almost";

    app.innerHTML += `
        <div class="box ${color}">
            <p>${explanation}</p>
            <button class="continue" onclick="engine.nextBlock()">Continue</button>
        </div>
    `;
};

// =====================================
// INIT
// =====================================
startApp();
</script>

</body>
</html>
