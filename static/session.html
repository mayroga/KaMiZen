<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>KaMiZen - AL CIELO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body {
            background: #000;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-position: center;
            background-repeat: no-repeat;
            background-size: 110%;
            transition: background-image 2s ease-in-out;
        }

        .zoom-active {
            animation: infiniteZoom 15s linear infinite alternate;
        }

        @keyframes infiniteZoom {
            from { background-size: 110%; }
            to { background-size: 160%; }
        }

        #app {
            width: 90%;
            max-width: 450px;
            background: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        #logo {
            font-size: 42px;
            font-weight: 600;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        #lang-btn {
            position: absolute; top: 25px; right: 25px;
            padding: 6px 14px; border-radius: 10px;
            border: 1px solid #60a5fa; background: transparent;
            color: #60a5fa; cursor: pointer; font-weight: 600;
        }

        #mental-panel {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 20px; border-radius: 15px; margin-bottom: 25px;
            display: flex; justify-content: space-between; font-size: 14px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        #block-container {
            min-height: 280px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        #text-content {
            font-size: 22px; font-weight: 300; line-height: 1.5;
            margin-bottom: 20px; min-height: 80px;
        }

        /* Círculo Respiratorio */
        #breath-circle {
            width: 120px; height: 120px;
            border-radius: 50%;
            background: rgba(96, 165, 250, 0.2);
            border: 4px solid #60a5fa;
            display: none;
            justify-content: center; align-items: center;
            margin: 20px 0;
            position: relative;
            box-shadow: 0 0 30px rgba(96, 165, 250, 0.4);
        }

        .breathing-anim {
            animation: breathe 5s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(0.8); background: rgba(96, 165, 250, 0.1); }
            50% { transform: scale(1.3); background: rgba(96, 165, 250, 0.4); }
        }

        #timer-display {
            font-size: 52px; font-weight: 600; color: #60a5fa;
            margin: 15px 0; text-shadow: 0 0 15px rgba(96,165,250,0.5);
        }

        button {
            padding: 20px; margin: 10px 0; border: none; border-radius: 18px;
            cursor: pointer; background: #2563eb; color: white;
            width: 100%; font-weight: 600; font-size: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover:not(:disabled) { background: #3b82f6; transform: scale(1.02); }
        button:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }

        .secondary { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.1); }

        #warning-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.98); z-index: 1000;
            justify-content: center; align-items: center; text-align: center;
        }
    </style>
</head>
<body class="zoom-active">
    <audio id="bg-music" loop></audio>
    
    <div id="warning-modal">
        <div style="padding:40px;">
            <h2 style="color:#ef4444; font-size: 38px; margin-bottom:20px;">INACTIVITY</h2>
            <p style="font-size: 20px; margin-bottom:30px;">Wake up. Tap to stay Al Cielo.</p>
            <button onclick="resetInactivity()" style="width: auto; padding: 15px 50px;">I AM HERE</button>
        </div>
    </div>

    <div id="app">
        <button id="lang-btn">ES</button>
        <div id="logo">KaMiZen</div>
        
        <div id="mental-panel">
            <div id="streak">Streak: 0</div>
            <div id="level-display">Level: 1</div>
        </div>

        <div id="block-container">
            <div id="text-content">The journey begins now. Focus.</div>
            
            <div id="breath-circle">
                <span id="breath-text" style="font-size: 14px; font-weight: 600;">BREATHE</span>
            </div>

            <div id="timer-display" style="display:none;">00:00</div>
        </div>
        
        <button id="main-btn">Start Session</button>
        
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button id="back-btn" class="secondary" style="font-size: 12px; padding: 10px;">Back</button>
            <button id="fwd-btn" class="secondary" style="font-size: 12px; padding: 10px;">Forward</button>
        </div>
    </div>

    <script src="/static/scripts.js"></script>
</body>
</html>
