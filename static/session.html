<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>KaMiZen - Al Cielo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* Reset y Base */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body {
            background: #020617;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background 1.5s ease; /* Para el cambio de fondo por bloque */
        }

        #app {
            width: 95%;
            max-width: 420px;
            background: rgba(17, 24, 39, 0.95);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 2;
        }

        /* Cabecera y Status */
        #logo {
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        #lang-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            padding: 6px 14px;
            border-radius: 10px;
            border: 1px solid #60a5fa;
            background: transparent;
            color: #60a5fa;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: 0.3s;
        }

        #lang-btn:hover { background: rgba(96, 165, 250, 0.1); }

        #mental-panel {
            background: rgba(2, 6, 23, 0.6);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Contenido Dinámico */
        #block {
            font-size: 20px;
            line-height: 1.5;
            min-height: 240px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .fade-in { animation: fadeIn 0.6s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Círculo de Respiración T-VID */
        .breath-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: radial-gradient(circle, #60a5fa, #2563eb);
            margin: 25px auto;
            transition: transform 4s ease-in-out; /* Controlado por JS */
            box-shadow: 0 0 40px rgba(37, 99, 235, 0.6);
            border: 4px solid rgba(255, 255, 255, 0.2);
        }

        /* Botones y Grid de Quiz */
        .options-grid {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 16px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            background: #2563eb;
            color: white;
            width: 100%;
            font-weight: 600;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover { 
            transform: scale(1.02); 
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4); 
        }

        .secondary { 
            background: #374151; 
            margin-top: 10px;
        }

        .nav-controls {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 15px;
        }

        /* Capa de fondo para profundidad */
        #bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .explanation-text {
            font-size: 15px;
            color: #94a3b8;
            margin-top: 15px;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div id="bg-layer"></div>

    <div id="app">
        <button id="lang-btn">ES</button>
        
        <div id="logo">KaMiZen</div>

        <div id="mental-panel">
            <div id="streak">🔥 Streak: 0</div>
            <div id="level">Level: 1</div>
        </div>

        <div id="block">
            <div class="fade-in">Ready to master your reality?</div>
        </div>

        <button id="start-btn">Start Session</button>
        
        <button id="next-btn" style="display:none;">Next</button>

        <div class="nav-controls">
            <button id="back-btn" class="secondary">Back</button>
            <button id="forward-btn" class="secondary">Forward</button>
        </div>

        <button id="restart-btn" class="secondary" style="display:none;">Restart</button>
    </div>

    <script src="/static/scripts.js"></script>

</body>
</html>
