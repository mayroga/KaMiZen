<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>AL CIELO - LIFE ENGINE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #0ff; font-family: 'JetBrains Mono', monospace; }
        canvas { display: block; filter: contrast(1.2) brightness(1.1); cursor: crosshair; }
        
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; display: flex; flex-wrap: wrap; pointer-events: none; }
        .box { margin: 5px; padding: 10px; border: 1px solid #0ff; background: rgba(0,0,0,0.8); font-size: 13px; border-radius: 4px; box-shadow: 0 0 10px rgba(0,242,255,0.2); min-width: 80px; text-align: center; }
        .box span { display: block; font-size: 16px; font-weight: bold; color: #fff; }
        
        #age-display { position: absolute; top: 15px; right: 25px; font-size: 28px; color: #0ff; text-shadow: 0 0 10px #0ff; font-weight: bold; }
        #timer-display { position: absolute; top: 60px; right: 25px; font-size: 18px; color: #fff; }

        #text-content { position: absolute; bottom: 140px; left: 30px; color: #fff; z-index: 20; font-size: 20px; text-shadow: 2px 2px 4px #000; max-width: 70%; font-weight: bold; line-height: 1.4; pointer-events: none; }
        #options { position: absolute; bottom: 50px; left: 30px; z-index: 20; display: flex; gap: 15px; }
        
        button { padding: 15px 25px; background: rgba(0,0,0,0.9); border: 2px solid #0ff; color: #0ff; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; border-radius: 8px; text-transform: uppercase; }
        button:hover { background: #0ff; color: black; box-shadow: 0 0 20px #0ff; transform: translateY(-3px); }

        /* PANTALLA DE RECUPERACIÓN TVID */
        #recovery-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #001a33 0%, #000 100%); 
            z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; 
        }
        #breathing-circle { 
            width: 250px; height: 250px; border-radius: 50%; 
            border: 8px solid #007bff; box-shadow: 0 0 60px #007bff; 
            transition: transform 4s ease-in-out; 
        }
        #recovery-text { color: #0ff; font-size: 32px; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 5px; }
        #story-box { color: #fff; max-width: 700px; text-align: center; margin-top: 50px; font-size: 22px; font-style: italic; line-height: 1.6; }
    </style>
</head>
<body>

<div id="ui">
    <div class="box">MENTAL <span id="m">100</span>%</div>
    <div class="box">SALUD <span id="h">100</span>%</div>
    <div class="box">DINERO <span id="d">1000</span></div>
    <div class="box">SOCIAL <span id="s">50</span></div>
    <div class="box">VICIO <span id="v">0</span>%</div>
</div>

<div id="age-display">EDAD: <span id="a">18.0</span></div>
<div id="timer-display">SESIÓN: <span id="clock">00:00</span></div>

<div id="text-content">Sincronizando con May Roga LLC...</div>
<div id="options"></div>

<div id="recovery-screen">
    <h2 id="recovery-text">RESPIRA</h2>
    <div id="breathing-circle"></div>
    <div id="story-box">El éxito es la calma con la que manejas la tormenta.</div>
</div>

<canvas id="game"></canvas>

<script src="/static/scripts.js"></script>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x: 120, y: canvas.height / 2, size: 45 };
let enemies = [];
let projectiles = []; 
let frame = 0;
let gameActive = true;
let startTime = Date.now();

// Actualización de UI Global
window.updateSimState = (newState) => {
    if(!newState) return;
    const update = (id, val) => {
        const el = document.getElementById(id);
        if(el && val !== undefined) el.innerText = Math.floor(val);
    };
    
    update("m", newState.mental);
    update("h", newState.health);
    update("d", newState.money);
    update("s", newState.social);
    update("v", newState.addiction);
    
    const ageEl = document.getElementById("a");
    if(ageEl && newState.age) ageEl.innerText = newState.age.toFixed(1);
    
    if(newState.status === "recovery") startRecoveryPhase();
};

window.addEventListener("mousemove", e => { if(gameActive) player.y = e.clientY; });

window.addEventListener("mousedown", () => {
    if(gameActive) {
        projectiles.push({ x: player.x + 25, y: player.y, speed: 15, owner: 'player' });
    }
});

function spawnEnemy(type) {
    if(!gameActive) return;
    const icons = { "dinero":"💰", "amor":"❤️", "enfermedad":"🚜", "oportunidad":"💠", "tentacion":"🍺", "conflicto":"🚁", "crisis":"📉" };
    enemies.push({
        x: canvas.width,
        y: Math.random() * (canvas.height - 200) + 100,
        type: type,
        icon: icons[type] || "❓",
        speed: 5 + (frame / 6000)
    });
}

function startRecoveryPhase() {
    if(!gameActive) return;
    gameActive = false;
    document.getElementById("recovery-screen").style.display = "flex";
    const circle = document.getElementById("breathing-circle");
    const text = document.getElementById("recovery-text");
    
    let step = 0;
    setInterval(() => {
        if(step === 0) { circle.style.transform = "scale(1.8)"; text.innerText = "INHALA"; step = 1; }
        else if(step === 1) { text.innerText = "RETIENE"; step = 2; }
        else { circle.style.transform = "scale(1)"; text.innerText = "EXHALA"; step = 0; }
    }, 4000);
}

function loop() {
    if(!gameActive) return;

    ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Reloj de sesión
    let elapsed = Math.floor((Date.now() - startTime) / 1000);
    let mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
    let secs = (elapsed % 60).toString().padStart(2, '0');
    document.getElementById("clock").innerText = `${mins}:${secs}`;

    // Dibujar Jugador
    ctx.shadowBlur = 20; ctx.shadowColor = "#0ff";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size/2, 0, Math.PI*2);
    ctx.fillStyle = "#0ff"; ctx.fill();
    ctx.shadowBlur = 0;

    // Proyectiles
    projectiles.forEach((p, pi) => {
        p.x += p.speed;
        ctx.fillStyle = p.owner === 'player' ? "#fff" : "#ff0055";
        ctx.fillRect(p.x, p.y - 3, 15, 6);
        
        if(p.owner === 'enemy' && Math.hypot(p.x - player.x, p.y - player.y) < 25) {
            if(typeof handleCollision === "function") handleCollision("ataque_enemigo");
            projectiles.splice(pi, 1);
        }
        if(p.x > canvas.width || p.x < 0) projectiles.splice(pi, 1);
    });

    // Entidades (Vía Real)
    enemies.forEach((e, i) => {
        e.x -= e.speed;
        ctx.font = "50px Arial";
        ctx.textAlign = "center";
        ctx.fillText(e.icon, e.x, e.y);

        if(["enfermedad", "conflicto", "crisis"].includes(e.type) && frame % 110 === 0) {
            projectiles.push({ x: e.x, y: e.y, speed: -10, owner: 'enemy' });
        }

        projectiles.forEach((p, pi) => {
            if(p.owner === 'player' && Math.hypot(p.x - e.x, p.y - e.y) < 40) {
                if(typeof handleCollision === "function") handleCollision(e.type);
                enemies.splice(i, 1);
                projectiles.splice(pi, 1);
            }
        });

        if(Math.hypot(e.x - player.x, e.y - player.y) < 45) {
            if(typeof handleCollision === "function") handleCollision(e.type);
            enemies.splice(i, 1);
        }
        if(e.x < -100) enemies.splice(i, 1);
    });

    if(frame % 85 === 0 && window.currentEvent) spawnEnemy(window.currentEvent);
    frame++;
    requestAnimationFrame(loop);
}

// INICIALIZACIÓN BLINDADA
window.onload = () => {
    console.log("AL CIELO Engine: Iniciando componentes...");
    loop(); // Inicia el renderizado aunque no haya datos aún
    
    let attempts = 0;
    const checkBrain = setInterval(() => {
        if (typeof startLifeFlow === "function") {
            console.log("Cerebro conectado. Lanzando flujo de vida.");
            startLifeFlow();
            clearInterval(checkBrain);
        } else {
            attempts++;
            if(attempts > 20) {
                document.getElementById("text-content").innerText = "ERROR: No se detecta scripts.js";
                clearInterval(checkBrain);
            }
        }
    }, 300);
};

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
