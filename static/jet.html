<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | LIFE SURVIVAL SIM</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
    --cyan:#00f2ff;
    --red:#ff3b3b;
    --green:#00ff88;
    --gold:#ffcc00;
    --bg:#030303;
}

body{
    margin:0;
    background:var(--bg);
    overflow:hidden;
    font-family:'JetBrains Mono';
    color:var(--cyan);
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    z-index:1000;
}

.box{
    padding:8px 12px;
    border:1px solid var(--cyan);
    background:rgba(0,0,0,0.8);
    font-size:11px;
}

canvas{display:block;}

button{
    position:absolute;
    top:10px;
    right:10px;
    z-index:2000;
    padding:10px;
    background:black;
    color:var(--cyan);
    border:1px solid var(--cyan);
}
</style>
</head>

<body>

<div id="ui">
    <div class="box">MENTAL: <span id="mental">100</span></div>
    <div class="box">SOCIAL: <span id="social">50</span></div>
    <div class="box">ESCUDO: <span id="shield">0</span></div>
    <div class="box">NIVEL: <span id="level">1</span></div>
    <div class="box">EVENTO: <span id="event">---</span></div>
</div>

<button onclick="togglePause()">PAUSA</button>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

// ================= BACKEND =================
let session_id=localStorage.getItem("session_id");
let currentEvent="neutral";

async function judge(decision){

    if(!session_id) return;

    try{
        const res=await fetch("/judge",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                session_id,
                decision,
                context:currentEvent
            })
        });

        const data=await res.json();

        if(data.state){
            state.mental=data.state.mental;
            state.social=data.state.social;
            state.shield=data.state.discipline || state.shield;
        }

        if(data.next_event){
            currentEvent=data.next_event;
        }

        if(data.phase_alert===3){
            startMeditationPhase();
        }

        if(data.status==="end"){
            gameOver(data.type);
        }

    }catch(e){
        console.log(e);
    }
}

// ================= PLAYER =================
let state={
    mental:100,
    social:50,
    shield:0,
    level:1,
    score:0,
    active:true,
    paused:false
};

let player={x:80,y:innerHeight/2};
let keys={};
let bullets=[];
let enemies=[];
let drops=[];
let frame=0;

// ================= INPUT =================
addEventListener("keydown",e=>keys[e.code]=true);
addEventListener("keyup",e=>keys[e.code]=false);

// CLICK = DISPARO
addEventListener("click",()=>{

    if(state.paused) return;

    bullets.push({
        x:player.x+30,
        y:player.y,
        speed:10,
        type:"player",
        color:"#00f2ff",
        damage:1
    });

    judge("TDB");
});

// ================= ENTIDADES =================
class Enemy{
    constructor(){
        this.x=innerWidth+100;
        this.y=Math.random()*innerHeight;
        this.speed=2+Math.random()*state.level;
        this.hp=2+Math.floor(state.level/2);
    }

    update(){
        this.x-=this.speed;

        if(Math.random()>0.98){
            bullets.push({
                x:this.x,
                y:this.y,
                speed:-6,
                type:"enemy",
                color:"#ff3b3b",
                damage:10
            });
        }
    }

    draw(){
        ctx.fillStyle="#ff3b3b";
        ctx.font="22px Arial";
        ctx.fillText("🚁",this.x,this.y);
    }
}

// ================= DROPS BUENOS =================
class Drop{
    constructor(){
        this.x=Math.random()*innerWidth;
        this.y=Math.random()*innerHeight;
        this.type=Math.random()>0.5?"HEALTH":"SHIELD";
        this.life=600;
    }

    draw(){
        ctx.fillStyle=this.type==="HEALTH"?"#00ff88":"#ffcc00";
        ctx.font="18px Arial";
        ctx.fillText(this.type==="HEALTH"?"❤️":"🛡️",this.x,this.y);
    }
}

// ================= LOOP =================
function loop(){

    if(!state.active || state.paused) return;

    ctx.fillStyle="rgba(0,0,0,0.4)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // MOVIMIENTO
    if(keys["ArrowUp"]) player.y-=6;
    if(keys["ArrowDown"]) player.y+=6;

    // PLAYER
    ctx.fillStyle="#fff";
    ctx.beginPath();
    ctx.arc(player.x,player.y,12,0,Math.PI*2);
    ctx.fill();

    // SPAWN
    if(frame%90===0) enemies.push(new Enemy());
    if(frame%300===0) drops.push(new Drop());

    // BULLETS
    bullets.forEach((b,i)=>{
        b.x+=b.speed;

        ctx.fillStyle=b.color;
        ctx.fillText("•",b.x,b.y);

        // colisión jugador
        if(Math.abs(b.x-player.x)<20 && Math.abs(b.y-player.y)<20){
            if(b.type==="enemy"){
                state.mental-=10;
            }
            bullets.splice(i,1);
        }

        if(b.x<-100||b.x>innerWidth+100) bullets.splice(i,1);
    });

    // ENEMIGOS
    enemies.forEach((e,i)=>{
        e.update();
        e.draw();

        bullets.forEach((b,j)=>{
            if(b.type==="player" &&
               Math.abs(b.x-e.x)<20 &&
               Math.abs(b.y-e.y)<20){

                e.hp-=1;
                bullets.splice(j,1);

                if(e.hp<=0){
                    state.score+=10;
                    state.social+=2;
                    enemies.splice(i,1);
                }
            }
        });

        if(Math.abs(e.x-player.x)<25){
            state.mental-=15;
        }
    });

    // DROPS
    drops.forEach((d,i)=>{
        d.draw();
        d.life--;

        if(Math.abs(d.x-player.x)<25){

            if(d.type==="HEALTH") state.mental=Math.min(100,state.mental+20);
            if(d.type==="SHIELD") state.shield+=3;

            drops.splice(i,1);
        }

        if(d.life<=0) drops.splice(i,1);
    });

    // NIVEL
    state.level=1+(frame/1500);

    // UI
    document.getElementById("mental").innerText=Math.max(0,Math.floor(state.mental));
    document.getElementById("social").innerText=state.social;
    document.getElementById("shield").innerText=state.shield;
    document.getElementById("level").innerText=state.level.toFixed(1);
    document.getElementById("event").innerText=currentEvent;

    // GAME OVER
    if(state.mental<=0){
        state.active=false;
        alert("COLAPSO TOTAL: vida mental perdida");
    }

    frame++;
    requestAnimationFrame(loop);
}

// ================= PAUSA =================
function togglePause(){
    state.paused=!state.paused;
}

// START
loop();

</script>

</body>
</html>
