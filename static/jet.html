<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO | SIMULADOR</title>
    <link rel="stylesheet" href="/static/style.css"> <style>
        body { background: #000; color: #00f2ff; font-family: sans-serif; text-align: center; }
        #interface { max-width: 500px; margin: auto; padding: 20px; border: 1px solid #0077ff; border-radius: 15px; margin-top: 50px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #050a0c; padding: 10px; border: 1px solid #004466; }
        #text-content { font-size: 1.2rem; margin: 20px 0; min-height: 60px; color: #fff; }
        #options button { margin: 5px; padding: 10px 20px; background: #0077ff; color: #000; border: none; cursor: pointer; font-weight: bold; }
        .recovery-mode { border-color: #ff00ff !important; box-shadow: 0 0 20px #ff00ff; }
    </style>
</head>
<body>

<div id="interface">
    <h2>AL CIELO</h2>
    
    <div class="stat-grid">
        <div class="stat-box">SALUD: <span id="val-health">100</span>%</div>
        <div class="stat-box">MENTAL: <span id="val-mental">100</span>%</div>
        <div class="stat-box">DINERO: $<span id="val-money">0</span></div>
        <div class="stat-box">EDAD: <span id="val-age">0</span></div>
    </div>

    <div id="text-content">Iniciando sistema...</div>
    
    <div id="options">
        </div>
</div>

<script src="/static/scripts.js"></script>

<script>
    // ESTA FUNCIÓN CONECTA EL BACKEND CON LA INTERFAZ
    window.updateSimState = function(data) {
        const s = data.state || data;
        document.getElementById("val-health").innerText = Math.round(s.health);
        document.getElementById("val-mental").innerText = Math.round(s.mental);
        document.getElementById("val-money").innerText = Math.round(s.money);
        document.getElementById("val-age").innerText = s.age.toFixed(1);

        // Si entramos en recuperación, cambiamos el color de la interfaz
        if (data.status === "recovery") {
            document.getElementById("interface").classList.add("recovery-mode");
        } else {
            document.getElementById("interface").classList.remove("recovery-mode");
        }
    };
</script>

</body>
</html>
