<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JET LIFE AI | Predictive System</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    color:#00f2ff;
    font-family:Arial;
}

/* HUD */
#ui{
    position:absolute;
    top:10px;
    left:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.box{
    padding:10px;
    border:1px solid #00f2ff;
    background:rgba(0,0,0,0.6);
}

/* CANVAS */
canvas{
    display:block;
}

/* CROSSHAIR */
#crosshair{
    position:fixed;
    left:50%;
    top:50%;
    width:20px;
    height:20px;
    border:2px solid #00f2ff;
    transform:translate(-50%,-50%);
    border-radius:50%;
}

/* CONTROLS */
#controls{
    position:absolute;
    bottom:20px;
    left:20px;
}

button{
    padding:10px;
    border:1px solid #00f2ff;
    background:transparent;
    color:#00f2ff;
    cursor:pointer;
}

/* DECISION */
#decisionBox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}
</style>
</head>

<body>

<!-- HUD -->
<div id="ui">
<div class="box">MENTAL: <span id="mental">100</span></div>
<div class="box">SOCIAL: <span id="social">50</span></div>
<div class="box">MONEY: <span id="money">1000</span></div>
<div class="box">AGE: <span id="age">25</span></div>
<div class="box">THREAT: <span id="threat">0</span></div>
</div>

<div id="crosshair"></div>

<canvas id="game"></canvas>

<div id="controls">
<button onclick="restart()">RESTART</button>
<button onclick="shoot()">SHOOT 🔫</button>
</div>

<script>

// =========================
// 🧠 ESTADO
// =========================
let state = {
    mental:100,
    social:50,
    money:1000,
    age:25,
    discipline:50
};

// =========================
// 🎯 IA PREDICTIVA
// =========================
function predictThreat(){

    let base = Math.random()*100;

    if(state.mental < 40) base += 30;
    if(state.social < 30) base += 20;
    if(state.money < 200) base += 25;
    if(state.age > 60) base += 15;

    return Math.min(100, base);
}

// =========================
// 🎮 CANVAS
// =========================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// =========================
// 👤 PLAYER
// =========================
let player = {x: innerWidth/2, y: innerHeight/2};

// =========================
// 🔴 ENEMIGOS (EVENTOS)
 // =========================
let threats = [];

// =========================
// 🎯 CLICK MOUSE
// =========================
window.onclick = shoot;

// =========================
// 🔫 DISPARO REAL
// =========================
function shoot(){

    threats.forEach((t,i)=>{

        if(
            Math.abs(t.x - player.x) < 50 &&
            Math.abs(t.y - player.y) < 50
        ){
            threats.splice(i,1);

            state.discipline += 2;
            state.mental += 1;
        }
    });
}

// =========================
// 🔥 SPAWN IA
// =========================
function spawnThreat(){

    let level = predictThreat();

    document.getElementById("threat").innerText = level.toFixed(0);

    let type =
        level > 70 ? "CRISIS" :
        level > 40 ? "EVENT" :
        "OPPORTUNITY";

    threats.push({
        x: innerWidth,
        y: Math.random()*innerHeight,
        speed: 2 + level/25,
        type:type,
        size: 40 + level/10
    });
}

// =========================
// 🎮 LOOP
// =========================
function loop(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // PLAYER
    ctx.fillStyle="#00f2ff";
    ctx.fillRect(player.x, player.y, 20, 20);

    // THREATS
    threats.forEach((t,i)=>{

        t.x -= t.speed;

        ctx.strokeStyle =
            t.type === "CRISIS" ? "red" :
            t.type === "EVENT" ? "orange" :
            "lime";

        ctx.lineWidth = 3;
        ctx.strokeRect(t.x,t.y,t.size,t.size);

        ctx.fillStyle="#fff";
        ctx.fillText(t.type, t.x, t.y - 5);

        // COLISIÓN (FAIL SI NO DISPARAS)
        if(t.x < player.x + 10){

            state.mental -= 5;
            state.social -= 2;

            threats.splice(i,1);
        }
    });

    // UI
    document.getElementById("mental").innerText = state.mental;
    document.getElementById("social").innerText = state.social;
    document.getElementById("money").innerText = state.money;
    document.getElementById("age").innerText = state.age;

    requestAnimationFrame(loop);
}

// =========================
// ⚡ GENERADOR IA
// =========================
setInterval(()=>{
    spawnThreat();
}, 1500);

// =========================
// 🔄 RESTART
// =========================
function restart(){
    location.reload();
}

// =========================
// START
// =========================
loop();

</script>

</body>
</html>
