<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAYKAMI | VIDA SIM REAL</title>

<style>
body{
    margin:0;
    background:black;
    color:#00f2ff;
    font-family:Arial;
    overflow:hidden;
}

/* HUD */
#ui{
    position:absolute;
    top:10px;
    left:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.box{
    padding:10px;
    border:1px solid #00f2ff;
    background:rgba(0,0,0,0.6);
    font-size:13px;
    min-width:120px;
}

/* CONTROLES */
#controls{
    position:absolute;
    bottom:20px;
    left:20px;
    display:flex;
    gap:10px;
}

button{
    padding:10px 14px;
    border:1px solid #00f2ff;
    background:transparent;
    color:#00f2ff;
    cursor:pointer;
}

/* DECISION */
#decisionBox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.96);
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:999;
}

#decisionBox h2{
    font-size:28px;
}

#decisionBox p{
    font-size:18px;
    max-width:500px;
}

#choices button{
    margin:8px;
    padding:12px 16px;
    font-size:16px;
}
</style>
</head>

<body>

<!-- HUD -->
<div id="ui">
<div class="box">MENTAL: <span id="mental">100</span></div>
<div class="box">SALUD: <span id="health">100</span></div>
<div class="box">DINERO: <span id="money">1000</span></div>
<div class="box">SOCIAL: <span id="social">50</span></div>
<div class="box">EDAD: <span id="age">25</span></div>
</div>

<!-- CANVAS -->
<canvas id="game"></canvas>

<!-- CONTROLES -->
<div id="controls">
<button onclick="restart()">🔄 RESTART</button>
<button onclick="forceEvent()">⚡ CONTINUE</button>
</div>

<!-- DECISION -->
<div id="decisionBox">
<h2 id="eventTitle"></h2>
<p id="eventDesc"></p>
<div id="choices"></div>
</div>

<script>

// =========================
// 🧠 ESTADO REAL
// =========================
let state = {
    mental:100,
    health:100,
    money:1000,
    social:50,
    age:25
};

let profile = { stage:"adulto" };

// =========================
// 🎮 CANVAS
// =========================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// =========================
// 👤 PLAYER
// =========================
let player = {x:120, y:200};

// =========================
// 🔴 EVENTOS
// =========================
let obstacles = [];
let currentEvent = null;
let playing = true;

// =========================
// 🧠 MOVIMIENTO
// =========================
window.onmousemove = e => player.y = e.clientY;

// =========================
// 📊 UI
// =========================
function updateUI(){
    document.getElementById("mental").innerText = state.mental;
    document.getElementById("health").innerText = state.health;
    document.getElementById("money").innerText = state.money;
    document.getElementById("social").innerText = state.social;
    document.getElementById("age").innerText = state.age;
}

// =========================
// 🔥 GENERAR EVENTO
// =========================
async function getEvent(){

    const res = await fetch("/judge",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            decision:"INIT",
            context:"life"
        })
    });

    const data = await res.json();

    state = data.state;
    currentEvent = data.next_event;

    spawnEvent(currentEvent);
    updateUI();
}

// =========================
// 🔴 EVENTO VISUAL (CUADRO GRANDE)
// =========================
function spawnEvent(type){

    obstacles.push({
        x: canvas.width,
        y: Math.random()*canvas.height,
        type: type,
        size: 60 + Math.random()*40,
        color: "#ff0033"
    });
}

// =========================
// 🎮 LOOP VIDA
// =========================
function loop(){

    if(!playing) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // jugador
    ctx.fillStyle="#00f2ff";
    ctx.fillRect(player.x,player.y,25,25);

    // eventos
    obstacles.forEach((o,i)=>{

        o.x -= 5;

        ctx.strokeStyle = o.color;
        ctx.lineWidth = 3;
        ctx.strokeRect(o.x,o.y,o.size,o.size);

        ctx.fillStyle = "#ff0033";
        ctx.font = "14px Arial";
        ctx.fillText(o.type, o.x, o.y - 10);

        // colisión REAL
        if(
            Math.abs(o.x-player.x)<30 &&
            Math.abs(o.y-player.y)<30
        ){
            openDecision(o.type);
            obstacles.splice(i,1);
        }

        if(o.x < -100) obstacles.splice(i,1);
    });

    requestAnimationFrame(loop);
}

// =========================
// ⚖️ DECISIONES
// =========================
function openDecision(event){

    playing = false;

    document.getElementById("decisionBox").style.display="flex";
    document.getElementById("eventTitle").innerText = event;

    document.getElementById("eventDesc").innerText =
        getDescriptionByAge(event);

    const choices = ["TDB","TDM","TDN","TDP","TDG"];
    const box = document.getElementById("choices");

    box.innerHTML="";

    choices.forEach(c=>{

        const btn = document.createElement("button");
        btn.innerText = c;

        btn.onclick = async ()=>{

            const res = await fetch("/judge",{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({
                    decision:c,
                    context:event,
                    age: state.age
                })
            });

            const data = await res.json();

            state = data.state;

            document.getElementById("decisionBox").style.display="none";

            state.age += 1; // tiempo real

            spawnEvent(data.next_event);
            updateUI();

            playing = true;
            loop();
        };

        box.appendChild(btn);
    });
}

// =========================
// 🧠 DESCRIPCIÓN POR EDAD REAL
// =========================
function getDescriptionByAge(event){

    if(state.age < 13){
        return "Algo ocurre... elige con intuición.";
    }

    if(state.age < 25){
        return "Situación emocional y social activa.";
    }

    if(state.age < 60){
        return "Decisión con impacto en tu futuro.";
    }

    return "Momento crítico de vida avanzada.";
}

// =========================
// ⚡ CONTINUE
// =========================
function forceEvent(){
    spawnEvent(currentEvent || "conflicto");
}

// =========================
// 🔄 RESTART
// =========================
function restart(){
    localStorage.clear();
    location.reload();
}

// =========================
// 🚀 START
// =========================
getEvent();
loop();

</script>

</body>
</html>
