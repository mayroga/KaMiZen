<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAYKAMI | Vida Real</title>

<style>
body{
    margin:0;
    background:black;
    color:#00f2ff;
    font-family:Arial;
    overflow:hidden;
}

/* HUD */
#ui{
    position:absolute;
    top:10px;
    left:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.box{
    padding:8px;
    border:1px solid #00f2ff;
    background:rgba(0,0,0,0.5);
    font-size:12px;
}

/* CONTROLES */
#controls{
    position:absolute;
    bottom:20px;
    left:20px;
    display:flex;
    gap:10px;
}

button{
    padding:10px;
    border:1px solid #00f2ff;
    background:transparent;
    color:#00f2ff;
    cursor:pointer;
}

/* DECISION */
#decisionBox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}
</style>
</head>

<body>

<div id="ui">
<div class="box">MENTAL: <span id="mental">100</span></div>
<div class="box">MONEY: <span id="money">1000</span></div>
<div class="box">SOCIAL: <span id="social">50</span></div>
</div>

<canvas id="game"></canvas>

<div id="controls">
<button onclick="restart()">🔄 RESTART</button>
<button onclick="forceEvent()">▶ CONTINUE</button>
</div>

<div id="decisionBox">
<h2 id="eventTitle"></h2>
<p id="eventDesc"></p>
<div id="choices"></div>
</div>

<script>
// =========================
// 🧠 CARGAR PERFIL REAL
// =========================
let profile = JSON.parse(localStorage.getItem("profile"));
let state = JSON.parse(localStorage.getItem("state"));

// =========================
// 🎮 CANVAS
// =========================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// =========================
// 🎮 PLAYER
// =========================
let player = {x:100, y:200};

// =========================
// 🔴 EVENTOS
// =========================
let obstacles = [];
let currentEvent = null;
let playing = true;

// =========================
// 🎮 MOVIMIENTO
// =========================
window.onmousemove = e => player.y = e.clientY;

// =========================
// 🔥 GENERAR EVENTO
// =========================
async function getEvent(){

    const res = await fetch("/judge",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            decision:"INIT",
            context:"start"
        })
    });

    const data = await res.json();

    state = data.state;
    currentEvent = data.next_event;

    spawnEvent(currentEvent);
    updateUI();
}

// =========================
// 🔴 CREAR CUADRO ROJO
// =========================
function spawnEvent(type){

    obstacles.push({
        x: canvas.width,
        y: Math.random()*canvas.height,
        type: type
    });
}

// =========================
// 🎮 LOOP
// =========================
function loop(){

    if(!playing) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // jugador
    ctx.fillStyle="#00f2ff";
    ctx.fillRect(player.x, player.y, 20, 20);

    // eventos
    obstacles.forEach((o,i)=>{

        o.x -= 4;

        ctx.strokeStyle="red";
        ctx.strokeRect(o.x,o.y,40,40);

        ctx.fillStyle="red";
        ctx.fillText(o.type,o.x,o.y-5);

        // colisión
        if(Math.abs(o.x-player.x)<20 && Math.abs(o.y-player.y)<20){
            openDecision(o.type);
            obstacles.splice(i,1);
        }

        if(o.x < -50) obstacles.splice(i,1);
    });

    requestAnimationFrame(loop);
}

// =========================
// ⚖️ DECISION
// =========================
function openDecision(event){

    playing = false;

    document.getElementById("decisionBox").style.display="flex";
    document.getElementById("eventTitle").innerText = event;

    const desc = buildDescription(event);
    document.getElementById("eventDesc").innerText = desc;

    const choices = ["TDB","TDM","TDN","TDG"];
    const box = document.getElementById("choices");

    box.innerHTML="";

    choices.forEach(c=>{

        const btn = document.createElement("button");
        btn.innerText = c;

        btn.onclick = async ()=>{

            const res = await fetch("/judge",{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({
                    decision:c,
                    context:event
                })
            });

            const data = await res.json();

            state = data.state;

            document.getElementById("decisionBox").style.display="none";

            spawnEvent(data.next_event);
            updateUI();

            playing = true;
            loop();
        };

        box.appendChild(btn);
    });
}

// =========================
// 🧠 DESCRIPCION INTELIGENTE
// =========================
function buildDescription(event){

    if(profile.stage === "nino"){
        return "Algo pasó... ¿qué haces?"
    }

    if(profile.stage === "adulto"){
        return "Situación crítica detectada. Decide."
    }

    if(profile.stage === "anciano"){
        return "Este momento tiene peso emocional..."
    }

    return "Toma una decisión.";
}

// =========================
// 📊 UI
// =========================
function updateUI(){
    document.getElementById("mental").innerText = state.mental;
    document.getElementById("money").innerText = state.money;
    document.getElementById("social").innerText = state.social;
}

// =========================
// 🔄 CONTINUE
// =========================
function forceEvent(){
    spawnEvent(currentEvent || "conflicto");
}

// =========================
// 🔄 RESTART
// =========================
function restart(){
    localStorage.clear();
    location.href="/";
}

// =========================
// 🚀 START
// =========================
getEvent();
loop();

</script>

</body>
</html>
