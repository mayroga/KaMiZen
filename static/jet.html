<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaykaMi | LIFE SIM REAL</title>

<style>
body{
    margin:0;
    background:black;
    color:#00f2ff;
    font-family:Arial;
    overflow:hidden;
}

/* HUD */
#ui{
    position:absolute;
    top:10px;
    left:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.box{
    padding:8px;
    border:1px solid #00f2ff;
    background:rgba(0,0,0,0.5);
    font-size:12px;
}

/* BOTONES CONTROL */
#controls{
    position:absolute;
    bottom:20px;
    left:20px;
    display:flex;
    gap:10px;
}

button{
    padding:10px;
    border:1px solid #00f2ff;
    background:transparent;
    color:#00f2ff;
    cursor:pointer;
}

/* CANVAS */
canvas{
    display:block;
}

/* DECISION */
#decisionBox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}
</style>
</head>

<body>

<div id="ui">
<div class="box">MENTAL: <span id="mental">100</span></div>
<div class="box">MONEY: <span id="money">1000</span></div>
<div class="box">SOCIAL: <span id="social">50</span></div>
</div>

<canvas id="game"></canvas>

<!-- CONTROLES -->
<div id="controls">
<button onclick="goBack()">⬅ BACK</button>
<button onclick="restart()">🔄 RESTART</button>
<button onclick="continueGame()">▶ CONTINUE</button>
</div>

<!-- DECISION -->
<div id="decisionBox">
<h2 id="eventTitle"></h2>
<p id="eventDesc"></p>
<div id="choices"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// =========================
// 🧠 ESTADO
// =========================
let state = {
    mental:100,
    money:1000,
    social:50
};

// =========================
// 🔴 EVENTOS REALES (CUADROS ROJOS)
// =========================
let obstacles = [];
let currentScene = [];
let history = [];

// =========================
// 🎮 JUGADOR
// =========================
let player = {x:100, y:200};

// =========================
// 🧠 EVENTOS DESDE BACKEND
// =========================
async function getEvent(){
    const res = await fetch("/judge", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            decision:"NEXT",
            context:"flow"
        })
    });

    const data = await res.json();

    updateState(data.state);

    spawnEvent(data.next_event);
}

// =========================
// 🔴 CREAR CUADRO ROJO REAL
// =========================
function spawnEvent(type){

    obstacles.push({
        x: canvas.width,
        y: Math.random()*canvas.height,
        type: type,
        color:"#ff0033"
    });

    currentScene.push(type);
}

// =========================
// 🎮 LOOP
// =========================
function loop(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // jugador
    ctx.fillStyle="#00f2ff";
    ctx.fillRect(player.x,player.y,20,20);

    // eventos
    obstacles.forEach((o,i)=>{

        o.x -= 4;

        ctx.strokeStyle = o.color;
        ctx.strokeRect(o.x,o.y,40,40);

        ctx.fillStyle="#ff0033";
        ctx.fillText(o.type,o.x,o.y-5);

        // colisión
        if(Math.abs(o.x-player.x)<20 && Math.abs(o.y-player.y)<20){
            openDecision(o.type);
            obstacles.splice(i,1);
        }

        if(o.x < -50) obstacles.splice(i,1);
    });

    requestAnimationFrame(loop);
}

// =========================
// ⚖️ DECISIONES
// =========================
function openDecision(event){

    document.getElementById("decisionBox").style.display="flex";
    document.getElementById("eventTitle").innerText = event;
    document.getElementById("eventDesc").innerText = "Evento de vida activo";

    const choices = ["TDB","TDM","TDN","TDG"];

    const box = document.getElementById("choices");
    box.innerHTML="";

    choices.forEach(c=>{

        const btn = document.createElement("button");
        btn.innerText = c;

        btn.onclick = async ()=>{

            const res = await fetch("/judge", {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify({
                    decision:c,
                    context:event
                })
            });

            const data = await res.json();

            updateState(data.state);

            history.push(event);

            document.getElementById("decisionBox").style.display="none";

            spawnEvent(data.next_event);
        };

        box.appendChild(btn);
    });
}

// =========================
// 📊 ACTUALIZAR ESTADO
// =========================
function updateState(s){
    state = s;
    document.getElementById("mental").innerText = s.mental;
    document.getElementById("money").innerText = s.money;
    document.getElementById("social").innerText = s.social;
}

// =========================
// ⬅ BACK
// =========================
function goBack(){
    history.pop();
}

// =========================
// 🔄 RESTART
// =========================
function restart(){
    location.reload();
}

// =========================
// ▶ CONTINUE
// =========================
function continueGame(){
    getEvent();
}

// =========================
// INICIO
// =========================
getEvent();
loop();

</script>

</body>
</html>
