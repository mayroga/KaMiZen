<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAYKAMI | LIFE SYSTEM AI</title>

<style>
body{
    margin:0;
    background:#000;
    color:#00f2ff;
    font-family:Arial;
    overflow:hidden;
}

canvas{
    display:block;
}

/* UI */
#ui{
    position:absolute;
    top:10px;
    left:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    z-index:10;
}

.box{
    padding:8px;
    border:1px solid #00f2ff;
    background:rgba(0,0,0,0.7);
    font-size:12px;
}

/* BOTONES */
#controls{
    position:absolute;
    bottom:20px;
    left:20px;
    display:flex;
    gap:10px;
    z-index:10;
}

button{
    padding:10px;
    border:1px solid #00f2ff;
    background:transparent;
    color:#00f2ff;
    cursor:pointer;
}

/* DECISION */
#decisionBox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:100;
    text-align:center;
}

#timer{
    font-size:30px;
    margin:10px;
    color:#ffcc00;
}
</style>
</head>

<body>

<div id="ui">
<div class="box">MENTAL: <span id="mental">100</span></div>
<div class="box">MONEY: <span id="money">1000</span></div>
<div class="box">SOCIAL: <span id="social">50</span></div>
<div class="box">AGE: <span id="age">18</span></div>
</div>

<canvas id="game"></canvas>

<div id="controls">
<button onclick="restart()">RESTART</button>
<button onclick="nextEvent()">CONTINUE</button>
</div>

<!-- DECISION PANEL -->
<div id="decisionBox">
<h2 id="eventTitle"></h2>
<p id="eventDesc"></p>
<div id="timer">5</div>
<div id="choices"></div>
</div>

<script>

// =====================
// 🧠 STATE (VIDA)
// =====================
let state = {
    mental:100,
    money:1000,
    social:50,
    health:100,
    addiction:0,
    discipline:50,
    age:18,
    history:[]
};

let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let player = {x:120,y:200};
let obstacles = [];
let currentEvent = null;

let timer = 5;
let interval = null;

// =====================
// 🎮 VOZ
// =====================
function speak(text){
    let u = new SpeechSynthesisUtterance(text);
    u.lang="es-ES";
    speechSynthesis.speak(u);
}

// =====================
// 🔴 EVENTOS VIDA REAL
// =====================
const EVENTS = [
"rechazo","dinero","amor","oportunidad","crisis","salud","traicion","sabiduria"
];

// =====================
// 🔥 SPAWN EVENT
// =====================
function spawnEvent(){

    let type = EVENTS[Math.floor(Math.random()*EVENTS.length)];

    obstacles.push({
        x:canvas.width,
        y:Math.random()*canvas.height,
        type:type,
        size:60
    });

    currentEvent = type;
}

// =====================
// 🔴 CUADROS GRANDES
// =====================
function drawObstacles(){

    obstacles.forEach((o,i)=>{

        o.x -= 4;

        ctx.fillStyle = o.type==="dinero" || o.type==="amor" || o.type==="sabiduria"
        ? "#00ff88"
        : "#ff0033";

        ctx.fillRect(o.x,o.y,o.size,o.size);

        ctx.fillStyle="#fff";
        ctx.fillText(o.type,o.x,o.y-10);

        // COLISION
        if(Math.abs(o.x-player.x)<40 && Math.abs(o.y-player.y)<40){
            openDecision(o.type);
            obstacles.splice(i,1);
        }
    });
}

// =====================
// 🎮 LOOP
// =====================
function loop(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // PLAYER
    ctx.fillStyle="#00f2ff";
    ctx.fillRect(player.x,player.y,20,20);

    drawObstacles();

    requestAnimationFrame(loop);
}

// =====================
// ⚖️ DECISION SYSTEM
// =====================
function openDecision(event){

    document.getElementById("decisionBox").style.display="flex";

    document.getElementById("eventTitle").innerText=event;

    let desc = "Evento detectado: " + event;
    document.getElementById("eventDesc").innerText=desc;

    speak(desc);

    let choices=["TDB","TDM","TDN","TDP","TDG","TDK","TDMM"];

    let box=document.getElementById("choices");
    box.innerHTML="";

    // TIMER
    timer=5;
    if(interval) clearInterval(interval);

    interval=setInterval(()=>{

        timer--;
        document.getElementById("timer").innerText=timer;

        if(timer<=0){
            clearInterval(interval);
            autoDecision(event); // NO ACCIÓN = TDM
        }

    },1000);

    choices.forEach(c=>{

        let b=document.createElement("button");
        b.innerText=c;

        b.onclick=()=>applyDecision(event,c);

        box.appendChild(b);
    });
}

// =====================
// 🧠 AUTO DECISION
// =====================
function autoDecision(event){
    applyDecision(event,"TDM");
}

// =====================
// ⚖️ MOTOR IA
// =====================
function applyDecision(event,decision){

    document.getElementById("decisionBox").style.display="none";

    if(decision==="TDB"){
        state.mental+=5;
        state.social+=2;
    }

    if(decision==="TDM"){
        state.mental-=5;
        state.addiction+=2;
    }

    if(decision==="TDN"){
        state.mental+=3;
    }

    if(decision==="TDP"){
        state.discipline+=5;
    }

    if(decision==="TDG"){
        state.social-=5;
        state.mental-=5;
    }

    if(decision==="TDK"){
        state.social+=5;
    }

    if(decision==="TDMM"){ // MADRE
        state.mental+=8;
        state.health+=3;
    }

    // MEMORIA
    state.history.push({event,decision});

    updateUI();

    spawnEvent();
}

// =====================
// 📊 UI
// =====================
function updateUI(){
    document.getElementById("mental").innerText=state.mental;
    document.getElementById("money").innerText=state.money;
    document.getElementById("social").innerText=state.social;
    document.getElementById("age").innerText=state.age;
}

// =====================
// ▶ NEXT
// =====================
function nextEvent(){
    spawnEvent();
}

// =====================
// 🔄 RESTART
// =====================
function restart(){
    location.reload();
}

// =====================
// START
// =====================
spawnEvent();
loop();

</script>

</body>
</html>
