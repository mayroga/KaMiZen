<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AL CIELO - LIFE ENGINE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #0ff; font-family: 'JetBrains Mono', monospace; }
        canvas { display: block; filter: contrast(1.2) brightness(1.1); }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; display: flex; flex-wrap: wrap; }
        .box { margin: 5px; padding: 10px; border: 1px solid #0ff; background: rgba(0,0,0,0.7); font-size: 13px; border-radius: 4px; box-shadow: 0 0 10px rgba(0,242,255,0.2); }
        #text-content { position: absolute; bottom: 120px; left: 20px; color: #fff; z-index: 20; font-size: 18px; text-shadow: 2px 2px #000; max-width: 600px; font-weight: bold; }
        #options { position: absolute; bottom: 40px; left: 20px; z-index: 20; display: flex; gap: 10px; }
        button { padding: 12px 20px; background: black; border: 1px solid #0ff; color: #0ff; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0ff; color: black; box-shadow: 0 0 15px #0ff; }
        #age-display { position: absolute; top: 10px; right: 20px; font-size: 24px; color: #0ff; }
    </style>
</head>
<body>

<div id="ui">
    <div class="box">MENTAL: <span id="m">100</span>%</div>
    <div class="box">SALUD: <span id="h">100</span>%</div>
    <div class="box">DINERO: $<span id="d">1000</span></div>
    <div class="box">SOCIAL: <span id="s">50</span></div>
    <div class="box">VICIO: <span id="v">0</span>%</div>
</div>

<div id="age-display">EDAD: <span id="a">18.0</span></div>
<div id="text-content">Iniciando sistema...</div>
<div id="options"></div>

<canvas id="game"></canvas>

<script src="/static/scripts.js"></script>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x: 100, y: 300, size: 30 };
let enemies = [];
let frame = 0;

// Sincronización de estado con scripts.js
window.updateSimState = (newState) => {
    document.getElementById("m").innerText = Math.floor(newState.mental);
    document.getElementById("h").innerText = Math.floor(newState.health);
    document.getElementById("d").innerText = Math.floor(newState.money);
    document.getElementById("s").innerText = Math.floor(newState.social);
    document.getElementById("v").innerText = Math.floor(newState.addiction);
    document.getElementById("a").innerText = newState.age.toFixed(1);
};

// Control del Jugador
addEventListener("mousemove", e => { player.y = e.clientY; });

function spawnEnemy(type) {
    enemies.push({
        x: canvas.width,
        y: Math.random() * (canvas.height - 100) + 50,
        type: type,
        speed: 3 + (Math.random() * 2)
    });
}

function loop() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Dibujar Jugador (Esfera de Conciencia)
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size/2, 0, Math.PI*2);
    ctx.fillStyle = "#0ff";
    ctx.fill();
    ctx.strokeStyle = "#fff";
    ctx.stroke();

    // Dibujar Enemigos (Eventos de la Vía Real)
    enemies.forEach((e, i) => {
        e.x -= e.speed;
        
        let icon = "🚁"; 
        if(e.type === "dinero") icon = "💰";
        if(e.type === "amor") icon = "❤️";
        if(e.type === "enfermedad") icon = "🚜";
        if(e.type === "oportunidad") icon = "💠";
        if(e.type === "tentacion") icon = "🍺";

        ctx.font = "40px Arial";
        ctx.fillText(icon, e.x, e.y);

        // Colisión con el Jugador
        let dist = Math.hypot(e.x - player.x, e.y - player.y);
        if(dist < 35) {
            handleCollision(e.type);
            enemies.splice(i, 1);
        }

        if(e.x < -50) enemies.splice(i, 1);
    });

    if(frame % 120 === 0 && window.currentEvent) spawnEnemy(window.currentEvent);

    frame++;
    requestAnimationFrame(loop);
}

// Iniciar
window.onload = () => {
    const savedState = JSON.parse(localStorage.getItem("state"));
    if(savedState) window.updateSimState(savedState);
    loop();
    startLifeFlow(); // Función en scripts.js
};
</script>
</body>
</html>
