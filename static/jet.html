<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMIZEN | Tactical Balance</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --red: #ff3b3b; --gold: #ffcc00; --bg: #030303; --green: #00ff88; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'JetBrains Mono', monospace; color: var(--cyan); }
        
        #ui { position: absolute; top: 10px; left: 10px; display: flex; gap: 10px; flex-wrap: wrap; z-index: 100; pointer-events: none; }
        .box { padding: 8px 12px; border: 1px solid var(--cyan); background: rgba(0, 0, 0, 0.8); font-size: 11px; }
        .box span { font-weight: bold; color: #fff; }

        #menu-btn { position: absolute; top: 10px; right: 10px; z-index: 1100; padding: 10px 20px; background: black; border: 1px solid var(--cyan); color: var(--cyan); cursor: pointer; }
        
        canvas { display: block; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        .hidden { display: none !important; }
        
        .shield-active { box-shadow: 0 0 20px var(--green); border-radius: 50%; }
        button { padding: 15px 30px; background: none; border: 1px solid var(--cyan); color: var(--cyan); cursor: pointer; font-family: inherit; margin: 10px; }
        button:hover { background: var(--cyan); color: #000; }
    </style>
</head>
<body>

<div id="ui">
    <div class="box">ENFOQUE: <span id="mental">100</span>%</div>
    <div class="box">PODER: <span id="social">50</span></div>
    <div class="box">ESCUDO: <span id="shield-status">INACTIVO</span></div>
    <div class="box">AMENAZA: <span id="diff">1.0</span></div>
</div>

<button id="menu-btn" onclick="togglePause()">PAUSA / MENÚ</button>

<div id="pause-screen" class="overlay hidden">
    <h1>SISTEMA EN PAUSA</h1>
    <p>La vida no se detiene, pero tu mente necesita calibración.</p>
    <button onclick="togglePause()">REANUDAR VUELO</button>
    <button onclick="location.reload()">REINICIAR MISIÓN</button>
</div>

<div id="game-over" class="overlay hidden">
    <h1 id="over-title">SISTEMA COLAPSADO</h1>
    <p id="over-msg"></p>
    <button onclick="location.reload()">REENCARNAR</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===============================
// 🔥 BACKEND CONNECTION (FASTAPI)
// ===============================
let session_id = localStorage.getItem("session_id") || null;

async function sendJudge(decision, context="neutral"){
    if(!session_id) return;

    try {
        const res = await fetch("/judge", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                session_id,
                decision,
                context
            })
        });

        const data = await res.json();

        if(data.state){
            state.mental = data.state.mental;
            state.social = data.state.social;
            state.shield = data.state.discipline || state.shield;
        }

        if(data.next_event){
            currentEvent = data.next_event;
        }

        if(data.status === "end"){
            state.active = false;
            document.getElementById('game-over').classList.remove('hidden');
            document.getElementById('over-msg').innerText = "FIN DEL SISTEMA";
        }

    } catch(e){
        console.log("Judge error", e);
    }
}

// ===============================
// GAME STATE
// ===============================
let state = { mental: 100, social: 50, shield: 0, difficulty: 1, active: true, paused: false };
let player = { x: 80, y: canvas.height/2, w: 50, h: 30, speed: 7 };
let threats = [];
let projectiles = [];
let frame = 0;
let keys = {};
let currentEvent = null;

const NEGATIVE_WORDS = ["POBREZA", "ESTRÉS", "CALAMIDAD", "BRUTALIDAD", "NO-PODER", "AMBICIÓN"];
const POSITIVE_WORDS = ["SABIDURÍA", "BIENESTAR", "DINERO", "AMOR", "PODER", "INTELIGENCIA"];

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// ===============================
// TVID = DISPARO = DECISIÓN
// ===============================
window.onclick = function shoot(){
    if(!state.active || state.paused) return;

    const decision = "TDB"; // puedes cambiar dinámico luego UI

    projectiles.push({
        x: player.x + 40,
        y: player.y,
        speed: 10,
        type: 'PLAYER',
        word: 'ENFOQUE',
        color: '#00f2ff'
    });

    // 🔥 ENVIAR DECISIÓN AL BACKEND
    sendJudge(decision, currentEvent);
};

function togglePause(){
    state.paused = !state.paused;
    document.getElementById('pause-screen').classList.toggle('hidden');
    if(!state.paused) loop();
}

// ===============================
// ENTITY
// ===============================
class Entity {
    constructor(isGood=false){
        this.isGood = isGood;
        this.x = canvas.width + 100;
        this.y = Math.random() * (canvas.height - 150) + 75;
        this.speed = (2 + Math.random()*3) * (isGood ? 1.5 : state.difficulty);
        this.sym = isGood ? '💠' : '🚁';
        this.color = isGood ? '#00ff88' : '#ff3b3b';
    }

    draw(){
        ctx.fillStyle = this.color;
        ctx.font = "30px Arial";
        ctx.fillText(this.sym, this.x, this.y);
    }

    update(){
        this.x -= this.speed;

        // 🔥 ENEMIGO DISPARA TAMBIÉN
        if(!this.isGood && Math.random() > 0.97){
            projectiles.push({
                x: this.x,
                y: this.y,
                speed: -7,
                type: 'ENEMY',
                word: NEGATIVE_WORDS[Math.floor(Math.random()*NEGATIVE_WORDS.length)],
                color: '#ff3b3b'
            });
        }
    }
}

// ===============================
// LOOP
// ===============================
function loop(){
    if(!state.active || state.paused) return;

    ctx.fillStyle = "rgba(3, 3, 3, 0.4)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    if(keys['ArrowUp']) player.y -= player.speed;
    if(keys['ArrowDown']) player.y += player.speed;

    ctx.fillStyle="#fff";
    ctx.beginPath();
    ctx.arc(player.x, player.y, 15, 0, Math.PI*2);
    ctx.fill();

    if(frame % 120 === 0) threats.push(new Entity(false));

    projectiles.forEach((p,pi)=>{
        p.x += p.speed;
        ctx.fillStyle = p.color;
        ctx.fillText(p.word, p.x, p.y);

        if(p.x < -200) projectiles.splice(pi,1);
    });

    threats.forEach((t,ti)=>{
        t.update();
        t.draw();

        if(Math.abs(t.x-player.x)<40){
            state.mental -= 10;
            threats.splice(ti,1);
        }
    });

    document.getElementById('mental').innerText = Math.max(0,Math.floor(state.mental));
    document.getElementById('social').innerText = state.social;
    document.getElementById('diff').innerText = (1 + frame/2000).toFixed(1);

    if(state.mental <= 0){
        state.active = false;
        document.getElementById('game-over').classList.remove('hidden');
        document.getElementById('over-msg').innerText = "Sistema colapsado";
    }

    frame++;
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
