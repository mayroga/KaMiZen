<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | CINEMATIC LIFE ENGINE</title>

<style>
body {
    margin:0;
    background:#000;
    overflow:hidden;
    font-family:Arial Black, sans-serif;
    color:#00f2ff;
}

/* ================= UI ================= */
#ui {
    position:absolute;
    top:10px;
    left:10px;
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:10px;
    z-index:10;
}

.box {
    padding:8px 12px;
    border:2px solid #00f2ff;
    background:rgba(0,0,0,0.7);
    font-size:13px;
}

/* ================= MESSAGE PANEL ================= */
#messageBox {
    position:absolute;
    bottom:120px;
    left:50%;
    transform:translateX(-50%);
    width:80%;
    max-width:700px;
    padding:15px;
    border:2px solid #00f2ff;
    background:rgba(0,0,0,0.85);
    text-align:center;
    font-size:16px;
    z-index:20;
}

/* ================= TVID MENU ================= */
#tvidMenu {
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:8px;
    z-index:20;
}

button {
    padding:10px 12px;
    background:black;
    border:2px solid #00f2ff;
    color:#00f2ff;
    cursor:pointer;
    font-weight:bold;
}

button:hover {
    background:#00f2ff;
    color:black;
}
</style>
</head>

<body>

<!-- ================= UI ================= -->
<div id="ui">
    <div class="box">MENTAL: <span id="mental">100</span></div>
    <div class="box">SOCIAL: <span id="social">50</span></div>
    <div class="box">KARMA: <span id="karma">0</span></div>
    <div class="box">DISCIPLINA: <span id="disc">50</span></div>
</div>

<!-- ================= CINEMATIC MESSAGE ================= -->
<div id="messageBox">
    Cargando sistema...
</div>

<!-- ================= TVID ACTIONS ================= -->
<div id="tvidMenu">
    <button onclick="sendDecision('TDB')">TDB</button>
    <button onclick="sendDecision('TDM')">TDM</button>
    <button onclick="sendDecision('TDN')">TDN</button>
    <button onclick="sendDecision('TDP')">TDP</button>
    <button onclick="sendDecision('TDG')">TDG</button>
    <button onclick="sendDecision('TDK')">TDK</button>
</div>

<script>

// ===============================
// STATE ENGINE
// ===============================
let session_id = localStorage.getItem("session_id");
let state = JSON.parse(localStorage.getItem("state") || "{}");

let currentEvent = null;
let isLocked = false;

// ===============================
// UPDATE UI
// ===============================
function updateUI() {
    document.getElementById("mental").innerText = state.mental ?? 100;
    document.getElementById("social").innerText = state.social ?? 50;
    document.getElementById("karma").innerText = state.karma ?? 0;
    document.getElementById("disc").innerText = state.discipline ?? 50;
}

// ===============================
// SHOW MESSAGE
// ===============================
function showMessage(text) {
    document.getElementById("messageBox").innerText = text;
}

// ===============================
// START EVENT LOOP
// ===============================
async function init() {

    if (!session_id) {
        showMessage("ERROR: No session found");
        return;
    }

    showMessage("Sistema activado. Iniciando experiencia humana...");

    // primer estado visual
    updateUI();
}

// ===============================
// DECISION ENGINE
// ===============================
async function sendDecision(decision) {

    if (isLocked) return;
    isLocked = true;

    try {

        const res = await fetch("/judge", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                session_id,
                decision,
                context: currentEvent || "neutral"
            })
        });

        const data = await res.json();

        if (data.state) {
            state = data.state;
            localStorage.setItem("state", JSON.stringify(state));
        }

        updateUI();

        if (data.status === "end") {
            showMessage("🔴 SISTEMA TERMINADO: ciclo humano cerrado");
            return;
        }

        if (data.narrative) {
            showMessage(data.narrative);
        }

        currentEvent = data.next_event;

        // pequeña pausa cinematográfica
        setTimeout(() => {
            isLocked = false;
        }, 800);

    } catch (e) {
        console.error(e);
        isLocked = false;
    }
}

// ===============================
// AUTO EVENT SYNC (ATMOSFERA CINEMÁTICA)
// ===============================
setInterval(() => {

    if (!session_id) return;

    // micro-feedback psicológico visual
    const mood = state?.psychology?.stress_memory || 0;

    if (mood > 70) {
        document.body.style.background = "#120000";
    } else if (state?.karma > 50) {
        document.body.style.background = "#001a12";
    } else {
        document.body.style.background = "#000";
    }

}, 2000);

// ===============================
window.onload = init;

</script>

</body>
</html>
