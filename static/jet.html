<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LIFE AI ENGINE - MAYKAMI</title>

<style>
body{
    margin:0;
    background:#000;
    overflow:hidden;
    color:#0ff;
    font-family:Arial;
}

canvas{display:block}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
}

.box{
    margin:5px;
    padding:6px;
    border:1px solid #0ff;
    background:rgba(0,0,0,0.5);
    font-size:12px;
}

#text-content{
    position:absolute;
    bottom:20px;
    left:20px;
    color:#0ff;
    z-index:20;
    font-size:14px;
}

#options{
    position:absolute;
    bottom:60px;
    left:20px;
    z-index:20;
}

button{
    margin:3px;
    padding:8px;
    background:black;
    border:1px solid #0ff;
    color:#0ff;
    cursor:pointer;
}
button:hover{
    background:#0ff;
    color:black;
}
</style>
</head>

<body>

<div id="ui">
<div class="box">MENTAL <span id="m">100</span></div>
<div class="box">SOCIAL <span id="s">50</span></div>
<div class="box">DINERO <span id="d">1000</span></div>
<div class="box">EDAD <span id="a">18</span></div>
<div class="box">CHOQUES <span id="c">0</span></div>

<button onclick="pauseGame()">PAUSA</button>
<button onclick="resumeGame()">SEGUIR</button>
<button onclick="location.reload()">REINICIAR</button>
</div>

<div id="text-content"></div>
<div id="options"></div>

<canvas id="game"></canvas>

<script>

// =========================
// CANVAS
// =========================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// =========================
// ESTADO VIDA
// =========================
let state = {
    mental:100,
    social:50,
    money:1000,
    age:18
};

let player = {x:100,y:200};
let bullets = [];
let enemies = [];

let collisions = 0;
let frame = 0;
let eventNow = "conflicto";
let paused = false;

// =========================
// PAUSA
// =========================
function pauseGame(){
    paused = true;
}

function resumeGame(){
    paused = false;
}

// =========================
// MOVIMIENTO REAL
// =========================
addEventListener("mousemove", e=>{
    player.y = e.clientY;
});

// DISPARO TVID
addEventListener("click", ()=>{
    bullets.push({
        x:player.x+30,
        y:player.y,
        speed:10,
        type:"TDB"
    });
});

// =========================
// BACKEND EVENTOS
// =========================
async function nextEvent(){
    try{
        const r = await fetch("/judge",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                decision:"AUTO",
                context:eventNow
            })
        });

        const d = await r.json();
        state = d.state;
        eventNow = d.next_event;
    }catch(e){}
}

// =========================
// SPAWN
// =========================
function spawn(){
    enemies.push({
        x:innerWidth,
        y:Math.random()*innerHeight,
        type:eventNow,
        size:40
    });
}

// =========================
// DAÑO CONTEXTUAL REAL
// =========================
function damage(type){

    collisions++;

    // 🔴 impacto por choques
    if(type === "dinero"){
        state.money -= 100;
        state.mental -= 5;
    }

    if(type === "amor"){
        state.social -= 10;
        state.mental -= 5;
    }

    if(type === "enfermedad"){
        state.mental -= 15;
    }

    if(type === "oportunidad"){
        state.money -= 20;
        state.mental += 5;
    }

    if(type === "conflicto"){
        state.social -= 8;
        state.mental -= 10;
    }

    // 🔥 castigo acumulativo
    if(collisions >= 3){
        state.mental -= 20;
        state.money -= 200;
    }
}

// =========================
// LOOP
// =========================
function loop(){

    if(paused){
        requestAnimationFrame(loop);
        return;
    }

    ctx.fillStyle="rgba(0,0,0,0.4)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // =====================
    // PLAYER
    // =====================
    ctx.fillStyle="#0ff";
    ctx.fillRect(player.x,player.y,20,20);

    // =====================
    // BULLETS
    // =====================
    bullets.forEach((b,i)=>{
        b.x += b.speed;

        ctx.fillStyle="yellow";
        ctx.fillRect(b.x,b.y,6,6);

        enemies.forEach((e,j)=>{
            if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20){
                enemies.splice(j,1);
                bullets.splice(i,1);

                state.money += 20;
                state.mental += 2;
            }
        });

        if(b.x > innerWidth) bullets.splice(i,1);
    });

    // =====================
    // ENEMIGOS (VIDA REAL VISUAL)
    // =====================
    enemies.forEach((e,i)=>{

        e.x -= 3;

        let icon = "🚁";
        if(e.type === "dinero") icon = "💰";
        if(e.type === "amor") icon = "❤️";
        if(e.type === "enfermedad") icon = "🚑";
        if(e.type === "oportunidad") icon = "💠";
        if(e.type === "conflicto") icon = "⚔️";

        ctx.font = "30px Arial";
        ctx.fillText(icon, e.x, e.y);

        ctx.font = "10px Arial";
        ctx.fillText(e.type.toUpperCase(), e.x, e.y+15);

        // COLISIÓN REAL
        if(Math.abs(e.x-player.x)<30 && Math.abs(e.y-player.y)<30){
            damage(e.type);
            enemies.splice(i,1);
        }

        if(e.x < 0) enemies.splice(i,1);
    });

    // =====================
    // SPAWN
    // =====================
    if(Math.random()<0.03) spawn();

    // =====================
    // IA EVENTO
    // =====================
    if(frame % 200 === 0) nextEvent();

    // =====================
    // UI
    // =====================
    document.getElementById("m").innerText = Math.floor(state.mental);
    document.getElementById("s").innerText = Math.floor(state.social);
    document.getElementById("d").innerText = Math.floor(state.money);
    document.getElementById("a").innerText = state.age;
    document.getElementById("c").innerText = collisions;

    // =====================
    // FINAL
    // =====================
    if(state.mental <= 0){
        alert("COLAPSO MENTAL");
        location.reload();
    }

    frame++;
    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
