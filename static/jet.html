<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaykaMi | Neural Jet LIFE</title>

<style>
body {
    margin:0;
    background: radial-gradient(circle, #001a1a, #000);
    color:#00f2ff;
    font-family: Arial;
    overflow:hidden;
}

#ui {
    position:absolute;
    top:10px;
    left:10px;
    display:flex;
    gap:15px;
}

.box {
    background:rgba(0,0,0,0.6);
    border:1px solid #00f2ff;
    padding:10px;
    font-size:12px;
}

#exit {
    position:absolute;
    bottom:20px;
    right:20px;
    padding:10px 20px;
    background:#00f2ff;
    color:#000;
    border:none;
    cursor:pointer;
}

#decisionBox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.92);
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.decision-btn{
    margin:10px;
    padding:12px 20px;
    border:1px solid #00f2ff;
    background:transparent;
    color:#00f2ff;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">
<div class="box">SYNC: <span id="sync">100</span>%</div>
<div class="box">MONEY: <span id="money">1000</span></div>
<div class="box">MENTAL: <span id="mental">100</span></div>
</div>

<canvas id="c"></canvas>
<button id="exit">EXIT</button>

<div id="decisionBox">
    <h2 id="eventTitle"></h2>
    <p id="eventDesc"></p>
    <div id="choices"></div>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// =====================
// 🧠 ESTADO LOCAL UI
// =====================
let state = {
    sync: 100,
    mental: 100,
    money: 1000
};

let jet = {x:80, y:200};
let obstacles = [];
let playing = true;

// =====================
// 🔥 EVENTO ACTUAL (DEL BACKEND)
// =====================
let currentEvent = null;

// =====================
// 🎮 MOVIMIENTO
// =====================
window.onmousemove = e => jet.y = e.clientY;

// =====================
// 🔄 OBTENER PRIMER EVENTO
// =====================
async function getNextEvent(){
    const res = await fetch("/judge", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            decision: "START",
            context: "init"
        })
    });

    const data = await res.json();
    currentEvent = data.next_event;
    syncState(data.state);
}

// =====================
// 🔴 LOOP PRINCIPAL
// =====================
function loop(){
    if(!playing) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // jugador
    ctx.fillStyle="#00f2ff";
    ctx.fillRect(jet.x, jet.y, 20, 20);

    // spawn eventos desde backend
    if(Math.random()<0.02 && currentEvent){
        obstacles.push({
            x: canvas.width,
            y: Math.random()*canvas.height,
            event: currentEvent
        });
    }

    obstacles.forEach((o,i)=>{
        o.x -= 5;

        ctx.strokeStyle = "#ff0033";
        ctx.strokeRect(o.x,o.y,30,30);

        ctx.fillStyle="#ff0033";
        ctx.fillText(o.event,o.x,o.y-5);

        // colisión
        if(Math.abs(o.x-jet.x)<20 && Math.abs(o.y-jet.y)<20){
            triggerDecision(o.event);
            obstacles.splice(i,1);
        }

        if(o.x<0) obstacles.splice(i,1);
    });

    requestAnimationFrame(loop);
}

// =====================
// ⚖️ DECISIÓN
// =====================
function triggerDecision(event){

    playing = false;

    const box = document.getElementById("decisionBox");
    const choices = document.getElementById("choices");

    box.style.display="flex";

    document.getElementById("eventTitle").innerText = event.toUpperCase();
    document.getElementById("eventDesc").innerText = "Evento de vida activo";

    const options = ["TDB","TDM","TDN","TDG"];

    choices.innerHTML="";

    options.forEach(opt=>{

        const btn = document.createElement("button");
        btn.className="decision-btn";
        btn.innerText = opt;

        btn.onclick = async ()=>{

            const res = await fetch("/judge", {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify({
                    decision: opt,
                    context: event
                })
            });

            const data = await res.json();

            syncState(data.state);

            box.style.display="none";
            playing = true;

            // 🔥 nuevo evento REAL del backend
            currentEvent = data.next_event;

            loop();
        };

        choices.appendChild(btn);
    });
}

// =====================
// 📊 ACTUALIZAR UI
// =====================
function syncState(newState){
    state = newState;

    document.getElementById("sync").innerText = state.mental;
    document.getElementById("mental").innerText = state.mental;
    document.getElementById("money").innerText = state.money;
}

// =====================
// 🚪 SALIDA
// =====================
document.getElementById("exit").onclick = ()=>{
    localStorage.setItem("final_state", JSON.stringify(state));
    window.location.href="/";
};

// =====================
// 🚀 INICIO
// =====================
getNextEvent();
loop();

</script>

</body>
</html>
