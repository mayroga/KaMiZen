<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CIELO | LIFE ENTRY SYSTEM</title>

    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #00121a, #000);
            color: #00f2ff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #app {
            width: 92%;
            max-width: 420px;
            padding: 30px;
            background: rgba(0, 15, 20, 0.8);
            border: 2px solid #00f2ff;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(15px);
        }

        h1 {
            color: #00f2ff;
            font-size: 32px;
            margin-bottom: 2px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00f2ff;
        }

        .subtitle {
            font-size: 12px;
            color: #0077ff;
            margin-bottom: 25px;
            font-weight: bold;
            text-transform: uppercase;
        }

        label {
            display: block;
            text-align: left;
            font-size: 11px;
            margin: 12px 0 5px 5px;
            color: rgba(0, 242, 255, 0.8);
            letter-spacing: 1px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            background: #050a0c;
            border: 1px solid #0077ff;
            color: #fff;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: #00f2ff;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .start-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #00f2ff, #0077ff);
            border: none;
            color: #000;
            font-weight: 900;
            cursor: pointer;
            border-radius: 12px;
            margin-top: 25px;
            font-size: 16px;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0, 119, 255, 0.4);
            transition: transform 0.2s, filter 0.3s;
        }

        .start-btn:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        .small {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 20px;
            line-height: 1.5;
            color: #fff;
        }

        .footer-brand {
            margin-top: 25px;
            font-size: 10px;
            letter-spacing: 5px;
            color: #0077ff;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="app">
    <h1>AL CIELO</h1>
    <div class="subtitle">Asesoría de Vida Real</div>

    <label>EDAD CRONOLÓGICA</label>
    <input id="age" type="number" placeholder="Ej. 25" min="5" max="99" value="25">

    <label>ESTADO EMOCIONAL DOMINANTE</label>
    <select id="emotion">
        <option value="neutral">Neutral / Estable</option>
        <option value="stress">Bajo Presión (Estrés)</option>
        <option value="lonely">Aislamiento (Soledad)</option>
        <option value="loss">Duelo / Pérdida</option>
        <option value="motivated">Alta Motivación</option>
    </select>

    <label>COMPLEJIDAD DEL ENTORNO</label>
    <select id="difficulty">
        <option value="1">Entorno Favorable (Normal)</option>
        <option value="2">Entorno Hostil (Difícil)</option>
        <option value="3">Entorno Crítico (Extremo)</option>
    </select>

    <label>MODO DE PROCESAMIENTO INICIAL (TVIDE)</label>
    <select id="tvideMode">
        <option value="balanced">Equilibrio (TDB + TDP)</option>
        <option value="survival">Supervivencia (TDM + TDG)</option>
        <option value="creative">Exploración (TDN + TDK)</option>
    </select>

    <button class="start-btn" onclick="startLife()">🚀 INICIAR PROCESAMIENTO</button>

    <p class="small">
        ESTA ASESORÍA SIMULA CONSECUENCIAS ACUMULATIVAS.<br>
        LA INACCIÓN SE PROCESARÁ COMO UNA DECISIÓN AUTOMÁTICA.
    </p>

    <div class="footer-brand">AURA BY MAY ROGA LLC</div>
</div>

<script>
async function startLife(){
    const ageValue = parseInt(document.getElementById("age").value || 25);
    const emotion = document.getElementById("emotion").value;
    const difficulty = document.getElementById("difficulty").value;
    const tvideMode = document.getElementById("tvideMode").value;

    let stage = "adult";
    if (ageValue < 13) stage = "child";
    else if (ageValue < 25) stage = "young";
    else if (ageValue >= 60) stage = "elder";

    const profile = {
        age: ageValue,
        emotion: emotion,
        difficulty: difficulty,
        tvideMode: tvideMode,
        stage: stage,
        created: Date.now()
    };

    // Estado inicial basado en la configuración del usuario
    const state = {
        mental: 100,
        health: 100,
        money: difficulty === "3" ? 200 : 500,
        social: 50,
        discipline: 50,
        addiction: emotion === "stress" ? 15 : 0,
        age: ageValue
    };

    try {
        const res = await fetch("/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ profile, age: ageValue })
        });

        const data = await res.json();

        localStorage.setItem("profile", JSON.stringify(profile));
        localStorage.setItem("state", JSON.stringify(data.state || state));

        // Redirige al simulador real (donde se carga el motor de scripts.js)
        window.location.href = "/simulador"; 
    } catch (error) {
        console.error("Error de conexión:", error);
        alert("Error al sincronizar con el motor neural.");
    }
}
</script>

</body>
</html>
