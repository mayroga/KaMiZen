<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAYKAMI - REAL GAME ENGINE</title>

<style>
body {
    margin:0;
    overflow:hidden;
    background:#000;
    color:#00f2ff;
    font-family:Arial;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
    display:flex;
    gap:10px;
}

.box{
    border:1px solid #00f2ff;
    padding:6px;
    background:rgba(0,0,0,0.6);
    font-size:12px;
}

button{
    position:absolute;
    bottom:10px;
    left:10px;
    z-index:10;
    padding:10px;
    background:transparent;
    border:1px solid #00f2ff;
    color:#00f2ff;
}

canvas{display:block;}
</style>
</head>

<body>

<div id="ui">
<div class="box">MENTAL: <span id="mental">100</span></div>
<div class="box">ENERGÍA: <span id="energy">100</span></div>
<div class="box">PUNTOS: <span id="score">0</span></div>
</div>

<button onclick="pauseGame()">PAUSA</button>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let keys = {};
let paused = false;

let player = {
    x:100,
    y:200,
    speed:6
};

let bullets = [];
let enemies = [];

let state = {
    mental:100,
    energy:100,
    score:0
};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

document.addEventListener("click", shoot);

function pauseGame(){
    paused = !paused;
    if(!paused) loop();
}

// 🔫 DISPARO REAL
function shoot(){
    if(paused) return;

    bullets.push({
        x: player.x + 40,
        y: player.y,
        speed:10
    });
}

// 🔴 ENEMIGOS GRANDES VISIBLES
function spawnEnemy(){
    enemies.push({
        x: canvas.width,
        y: Math.random() * canvas.height,
        size: 40,
        speed: 2 + Math.random()*2
    });
}

// 🔄 LOOP REAL
function loop(){

    if(paused) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // MOVIMIENTO
    if(keys["ArrowUp"] || keys["w"]) player.y -= player.speed;
    if(keys["ArrowDown"] || keys["s"]) player.y += player.speed;
    if(keys["ArrowLeft"] || keys["a"]) player.x -= player.speed;
    if(keys["ArrowRight"] || keys["d"]) player.x += player.speed;

    // PLAYER
    ctx.fillStyle="#00f2ff";
    ctx.fillRect(player.x,player.y,30,30);

    // BULLETS
    bullets.forEach((b,i)=>{
        b.x += b.speed;

        ctx.fillStyle="yellow";
        ctx.fillRect(b.x,b.y,10,4);

        enemies.forEach((e,j)=>{
            if(b.x < e.x+40 && b.x > e.x && b.y < e.y+40 && b.y > e.y){

                enemies.splice(j,1);
                bullets.splice(i,1);

                state.score += 10;
            }
        });

        if(b.x > canvas.width) bullets.splice(i,1);
    });

    // ENEMIGOS
    enemies.forEach((e,i)=>{
        e.x -= e.speed;

        ctx.fillStyle="red";
        ctx.fillRect(e.x,e.y,e.size,e.size);

        if(e.x < player.x+30 &&
           e.x+e.size > player.x &&
           e.y < player.y+30 &&
           e.y+e.size > player.y){

            state.mental -= 10;
            enemies.splice(i,1);
        }

        if(e.x < -100) enemies.splice(i,1);
    });

    // SPAWN CONSTANTE
    if(Math.random() < 0.02) spawnEnemy();

    // UI
    document.getElementById("mental").innerText = state.mental;
    document.getElementById("energy").innerText = state.energy;
    document.getElementById("score").innerText = state.score;

    if(state.mental <= 0){
        alert("GAME OVER");
        location.reload();
    }

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
