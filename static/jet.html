<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | Tactical Life Engine</title>

<style>
body { margin:0; background:#020202; overflow:hidden; font-family:'Arial Black', sans-serif; color:#00f2ff; }
canvas { display:block; }

#ui {
    position:absolute; top:10px; left:10px;
    display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; z-index:10;
}
.box {
    padding:8px 12px;
    border:2px solid #00f2ff;
    background:rgba(0,0,0,0.8);
    font-size:14px;
    font-weight: bold;
}

/* MENÚ TÁCTICO TVID */
#tactic-menu {
    position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
    display:flex; gap:10px; z-index:20;
}
.tvid-btn {
    padding:10px 15px; background:black; border:2px solid #00f2ff;
    color:#00f2ff; cursor:pointer; font-weight:bold;
}
.tvid-btn:hover { background:#00f2ff; color:black; }

#overlay {
    position:fixed; inset:0;
    background:rgba(0,0,0,0.95);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:#00f2ff;
    z-index: 100;
}

#med-text { font-size: 80px; letter-spacing: 10px; }

#breath-circle {
    width: 200px; height: 200px;
    border: 8px solid #00f2ff; border-radius: 50%;
    margin: 40px; transition: transform 3s ease-in-out;
}
.inhale { transform: scale(1.6); }
.exhale { transform: scale(0.8); }
</style>
</head>

<body>

<div id="ui">
    <div class="box">ENFOQUE: <span id="mental">100</span></div>
    <div class="box">SOCIAL: <span id="social">50</span></div>
    <div class="box">KARMA: <span id="karma">0</span></div>
    <div class="box">FASE: <span id="phase">1</span></div>
</div>

<div id="tactic-menu">
    <button class="tvid-btn" onclick="executeTVID('TDB')">TDB</button>
    <button class="tvid-btn" onclick="executeTVID('TDP')">TDP</button>
    <button class="tvid-btn" onclick="executeTVID('TDMM')">TDMM</button>
    <button class="tvid-btn" onclick="executeTVID('TDG')">TDG</button>
    <button class="tvid-btn" onclick="executeTVID('TDK')">TDK</button>
</div>

<div id="overlay">
    <h1 id="med-text">RESPIRA</h1>
    <div id="breath-circle"></div>
    <p>FASE DE MEDITACIÓN CONSCIENTE ACTIVADA</p>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let state = {
    mental:100,
    social:50,
    karma:0,
    phase:1,
    shield:0,
    stress:0,
    active:true,
    meditating:false
};

let player = {x:80,y:canvas.height/2, size: 40};
let bullets = [];
let enemies = [];
let frame = 0;
let keys = {};

// ================= INPUT =================
window.addEventListener("keydown",e=>keys[e.code]=true);
window.addEventListener("keyup",e=>keys[e.code]=false);

// ================= CLICK SHOOT =================
window.onclick = () => executeTVID('TDB');

// ================= TVID SHOOT =================
function executeTVID(type){

    if(state.meditating || !state.active) return;

    bullets.push({
        x:player.x+30,
        y:player.y,
        speed:12,
        word: type === 'TDB' ? "PROPÓSITO" : "DISCIPLINA",
        color: "#00f2ff",
        type
    });

    sendDecision(type, "combate_activo");
}

// ================= ENEMIGOS IA =================
function spawnEnemy(){
    const rand = Math.random();

    let type = "avion";
    let icon = "✈️";
    let life = 1;
    let word = "ESTRÉS";

    if(rand > 0.7){
        type = "helicoptero";
        icon = "🚁";
        life = 3;
        word = "CRISIS";
    }

    enemies.push({
        x:canvas.width+100,
        y:Math.random()*(canvas.height-100)+50,
        speed: 3 + state.phase,
        type,
        icon,
        life,
        word,
        shootTimer:0
    });
}

// ================= BACKEND =================
async function sendDecision(decision,context){
    const session_id = localStorage.getItem("session_id");
    if(!session_id) return;

    try {
        const res = await fetch("/judge",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({session_id,decision,context})
        });

        const data = await res.json();

        if(data.state){
            state.mental = data.state.mental;
            state.social = data.state.social;
            state.karma = data.state.karma || state.karma;
            state.phase = data.state.phase || 1;
        }

        if(data.phase_alert === 3){
            startMeditation();
        }

    } catch(e){ console.error(e); }
}

// ================= MEDITACIÓN =================
function startMeditation(){
    state.meditating = true;
    const overlay = document.getElementById("overlay");
    overlay.style.display="flex";

    let inhale = true;

    const med = setInterval(()=>{
        document.getElementById("med-text").innerText = inhale ? "INHALA" : "EXHALA";
        document.getElementById("breath-circle").className = inhale ? "inhale" : "exhale";
        inhale = !inhale;
    },3000);

    setTimeout(()=>{
        state.meditating = false;
        overlay.style.display="none";
        clearInterval(med);
    },300000);
}

// ================= LOOP =================
function loop(){

    if(state.meditating) return requestAnimationFrame(loop);

    ctx.fillStyle="rgba(0,0,0,0.3)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    if(keys["ArrowUp"]) player.y-=7;
    if(keys["ArrowDown"]) player.y+=7;

    // DIBUJO PLAYER
    ctx.font = "40px Arial";
    ctx.fillText("🧘", player.x-20, player.y+15);

    if(frame%60===0) spawnEnemy();

    // ================= BULLETS =================
    bullets.forEach((b,i)=>{
        b.x+=b.speed;

        ctx.fillStyle=b.color;
        ctx.font = "bold 18px Arial";
        ctx.fillText(b.word, b.x, b.y);

        enemies.forEach((e,j)=>{
            if(Math.abs(b.x-e.x)<40 && Math.abs(b.y-e.y)<40){
                e.life--;
                bullets.splice(i,1);

                if(e.life<=0){
                    enemies.splice(j,1);
                    state.karma++;
                }
            }
        });

        if(b.x>canvas.width) bullets.splice(i,1);
    });

    // ================= ENEMIES IA REAL =================
    enemies.forEach((e,i)=>{

        e.x-=e.speed;

        // IA DISPARO
        e.shootTimer++;
        if(e.shootTimer > 90 && Math.random() > 0.7){
            bullets.push({
                x:e.x,
                y:e.y,
                speed:-8,
                word:"ATAQUE",
                color:"#ff3b3b",
                enemy:true
            });
            e.shootTimer = 0;
        }

        ctx.font = e.icon.length>1 ? "40px Arial" : "30px Arial";
        ctx.fillText(e.icon, e.x, e.y);

        ctx.fillStyle="#ff3b3b";
        ctx.font="14px Arial";
        ctx.fillText(e.word, e.x, e.y-30);

        // COLISIÓN PLAYER
        if(Math.abs(e.x-player.x)<40 && Math.abs(e.y-player.y)<40){

            if(state.shield>0){
                state.shield -= 10;
            } else {
                state.mental -= 15;
                state.stress += 5;
            }

            enemies.splice(i,1);
        }

        if(e.x<-100){
            enemies.splice(i,1);
            state.mental -= 5;
        }
    });

    // ================= INACCIÓN DAÑO =================
    state.mental -= 0.01;

    // ================= UI =================
    document.getElementById("mental").innerText=Math.floor(state.mental);
    document.getElementById("social").innerText=state.social;
    document.getElementById("karma").innerText=state.karma;
    document.getElementById("phase").innerText=state.phase;

    if(state.mental<=0){
        state.active=false;
        alert("COLAPSO MENTAL");
        location.reload();
    }

    frame++;
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
