<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMIZEN | Life Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --red: #ff3b3b; --green: #00ff88; --bg: #030303; --yellow: #f1c40f; --purple: #a29bfe; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'JetBrains Mono'; color: var(--cyan); }
        
        /* HUD */
        #ui { position: absolute; top: 10px; left: 10px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; z-index: 1000; pointer-events: none; }
        .box { padding: 8px 12px; border: 1px solid var(--cyan); background: rgba(0,0,0,0.8); font-size: 11px; text-transform: uppercase; }
        .critical { border-color: var(--red); color: var(--red); animation: blink 0.5s infinite; }
        
        /* CONTROLES TÁCTICOS TVID */
        #tactic-menu { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 2000; }
        .tvid-btn { padding: 10px; border: 1px solid var(--cyan); background: black; color: var(--cyan); font-size: 12px; cursor: pointer; transition: 0.3s; }
        .tvid-btn:hover { background: var(--cyan); color: black; }
        .tvid-btn span { display: block; font-size: 8px; opacity: 0.7; }

        #menu-btn { position: absolute; top: 10px; right: 10px; z-index: 2000; padding: 10px; border: 1px solid var(--cyan); background: black; color: var(--cyan); }
        canvas { display: block; }

        /* OVERLAYS */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; text-align: center; }
        .hidden { display: none; }
        
        /* MEDITACIÓN */
        #breath-circle { width: 150px; height: 150px; border: 5px solid var(--cyan); border-radius: 50%; transition: transform 4s ease-in-out; margin: 20px; }
        .breathing-in { transform: scale(1.6); box-shadow: 0 0 50px var(--cyan); }
        .breathing-out { transform: scale(0.8); opacity: 0.5; }

        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="ui">
    <div class="box">ENFOQUE: <span id="mental">100</span></div>
    <div class="box">SALUD: <span id="health">100</span></div>
    <div class="box">DINERO: $<span id="money">0</span></div>
    <div class="box">SOCIAL: <span id="social">50</span></div>
    <div class="box">DISCIPLINA: <span id="discipline">40</span></div>
    <div class="box">KARMA: <span id="karma">0</span></div>
    <div class="box" style="grid-column: span 3; text-align: center;">EVENTO: <span id="event" style="color:var(--yellow)">CONECTANDO...</span></div>
</div>

<button id="menu-btn" onclick="togglePause()">PAUSA</button>

<div id="tactic-menu">
    <button class="tvid-btn" onclick="executeTVID('TDB')">TDB<span>BIEN</span></button>
    <button class="tvid-btn" onclick="executeTVID('TDP')">TDP<span>PADRE</span></button>
    <button class="tvid-btn" onclick="executeTVID('TDMM')">TDMM<span>MADRE</span></button>
    <button class="tvid-btn" onclick="executeTVID('TDK')">TDK<span>BESO</span></button>
    <button class="tvid-btn" onclick="executeTVID('TDN')">TDN<span>NIÑO</span></button>
    <button class="tvid-btn" onclick="executeTVID('TDG')">TDG<span>GUERRA</span></button>
</div>

<div id="meditation-overlay" class="overlay hidden">
    <h1 id="breath-instruction">INHALA</h1>
    <div id="breath-circle"></div>
    <p>FASE 3: MEDITACIÓN CONSCIENTE<br>Recuperando sistema nervioso...</p>
    <div class="box">KARMA ACTUAL: <span id="karma-med">0</span></div>
</div>

<div id="game-over" class="overlay hidden">
    <h1 id="over-title">SISTEMA APAGADO</h1>
    <p id="over-msg"></p>
    <button onclick="location.href='/'">REINICIAR CICLO</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let session_id = localStorage.getItem("session_id");
let currentEvent = "neutral";
let state = { active: true, paused: false };

// --- MOTOR DE JUICIO (Llamada al main.py) ---
async function executeTVID(decision) {
    if (!state.active || state.paused) return;
    
    try {
        const res = await fetch("/judge", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ session_id, decision, context: currentEvent })
        });
        const data = await res.json();
        
        if (data.status === "continue" || data.status === "ready") {
            updateUI(data.state);
            currentEvent = data.next_event;
            if (data.phase_alert === 3) startMeditation();
        } else if (data.status === "end") {
            showGameOver(data.type);
        }
    } catch (e) { console.error("Error táctico:", e); }
}

function updateUI(s) {
    document.getElementById("mental").innerText = Math.floor(s.mental);
    document.getElementById("health").innerText = Math.floor(s.health);
    document.getElementById("money").innerText = Math.floor(s.money);
    document.getElementById("social").innerText = s.social;
    document.getElementById("discipline").innerText = s.discipline;
    document.getElementById("karma").innerText = s.karma;
    document.getElementById("event").innerText = currentEvent.toUpperCase();
    
    // Alerta visual si el enfoque es bajo
    document.getElementById("mental").parentElement.classList.toggle("critical", s.mental < 30);
}

// --- FASE DE MEDITACIÓN ---
function startMeditation() {
    state.active = false;
    document.getElementById("meditation-overlay").classList.remove("hidden");
    let mode = "inhale";
    
    const interval = setInterval(() => {
        const circle = document.getElementById("breath-circle");
        const text = document.getElementById("breath-instruction");
        if (mode === "inhale") {
            circle.className = "breathing-in";
            text.innerText = "INHALA CONTROL";
            mode = "exhale";
        } else {
            circle.className = "breathing-out";
            text.innerText = "EXHALA REACCIÓN";
            mode = "inhale";
        }
    }, 4000);
}

function togglePause() {
    state.paused = !state.paused;
    document.getElementById("game-over").classList.toggle("hidden", !state.paused);
    document.getElementById("over-title").innerText = "PAUSA";
    document.getElementById("over-msg").innerText = "Respira. Evalúa tu próxima TVID.";
}

function showGameOver(type) {
    state.active = false;
    document.getElementById("game-over").classList.remove("hidden");
    document.getElementById("over-msg").innerText = type.replace("_", " ").toUpperCase();
}

// --- SIMULACIÓN VISUAL (FONDO) ---
let particles = [];
function initParticles() {
    for(let i=0; i<50; i++) particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
}

function draw() {
    if (state.paused) return requestAnimationFrame(draw);
    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width, canvas.height);
    
    ctx.fillStyle = "#00f2ff33";
    particles.forEach(p => {
        p.y += p.s;
        if (p.y > canvas.height) p.y = 0;
        ctx.fillRect(p.x, p.y, 2, 2);
    });
    
    requestAnimationFrame(draw);
}

initParticles();
draw();

// Primer evento al cargar
setTimeout(() => executeTVID("TDB"), 1000);
</script>
</body>
</html>
