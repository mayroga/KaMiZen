<!-- =============================== -->
<!-- KAMIZEN JET ENGINE (FIXED CORE) -->
<!-- MOTOR DE JUEGO ESTABLE SIN FREEZE -->
<!-- =============================== -->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | Stable Tactical Engine</title>

<style>
body { margin:0; background:#020202; overflow:hidden; font-family:Arial Black; color:#00f2ff; }
canvas { display:block; }

#ui {
    position:absolute; top:10px; left:10px;
    display:grid; grid-template-columns: repeat(2, 1fr);
    gap:10px;
    z-index:10;
}

.box {
    padding:8px 12px;
    border:2px solid #00f2ff;
    background:rgba(0,0,0,0.7);
    font-size:14px;
    font-weight:bold;
}

#tactic-menu {
    position:absolute; bottom:20px; left:50%;
    transform:translateX(-50%);
    display:flex; gap:10px;
    z-index:20;
}

button {
    padding:10px 15px;
    background:black;
    border:2px solid #00f2ff;
    color:#00f2ff;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">
    <div class="box">MENTAL: <span id="mental">100</span></div>
    <div class="box">SOCIAL: <span id="social">50</span></div>
    <div class="box">KARMA: <span id="karma">0</span></div>
    <div class="box">VIDAS: <span id="life">3</span></div>
</div>

<div id="tactic-menu">
    <button onclick="executeTVID('TDB')">TDB</button>
    <button onclick="executeTVID('TDP')">TDP</button>
    <button onclick="executeTVID('TDMM')">TDMM</button>
    <button onclick="executeTVID('TDG')">TDG</button>
    <button onclick="executeTVID('TDK')">TDK</button>
</div>

<canvas id="game"></canvas>

<script>

// ===============================
// 🔥 STATE SAFE ENGINE
// ===============================
let realState = JSON.parse(localStorage.getItem("state") || "{}");

function safeState(){
    if(!realState || typeof realState !== "object"){
        realState = {};
    }
    return realState;
}

// ===============================
// 🔥 LOCK SYSTEM (ANTI FREEZE)
// ===============================
let judgeLock = false;
let pendingDecision = null;

// ===============================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===============================
let player = {x:80,y:canvas.height/2};
let bullets = [];
let enemies = [];
let enemyBullets = [];
let gifts = [];

let frame = 0;
let keys = {};

// ===============================
// INPUT
// ===============================
window.addEventListener("keydown",e=>keys[e.code]=true);
window.addEventListener("keyup",e=>keys[e.code]=false);

// ===============================
// CONTROL DECISION (FIXED)
// ===============================
function sendDecision(type){

    if(judgeLock){
        pendingDecision = type;
        return;
    }

    judgeLock = true;

    const session_id = localStorage.getItem("session_id");

    fetch("/judge",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            session_id,
            decision:type,
            context:"accion"
        })
    })
    .then(r=>r.json())
    .then(data=>{

        if(data.state){
            realState = data.state;
            localStorage.setItem("state", JSON.stringify(data.state));
        }

        judgeLock = false;

        if(pendingDecision){
            const next = pendingDecision;
            pendingDecision = null;
            sendDecision(next);
        }
    })
    .catch(()=>{ judgeLock = false; });
}

// ===============================
function executeTVID(type){
    sendDecision(type);

    bullets.push({
        x:player.x+30,
        y:player.y,
        speed:10
    });
}

// ===============================
// SPAWN SAFE LIMITERS
// ===============================
function spawnEnemy(){
    if(enemies.length > 6) return;

    enemies.push({
        x:canvas.width+50,
        y:Math.random()*canvas.height,
        speed:2 + Math.random()*1.5,
        life:2,
        timer:0
    });
}

function spawnGift(){
    if(gifts.length > 2) return;

    gifts.push({
        x:canvas.width+50,
        y:Math.random()*canvas.height,
        type: Math.random()>0.5 ? "life" : "karma"
    });
}

// ===============================
// MAIN LOOP (FIXED STABLE ENGINE)
// ===============================
function loop(){

    ctx.fillStyle="rgba(0,0,0,0.35)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // PLAYER
    if(keys["ArrowUp"]) player.y -= 5;
    if(keys["ArrowDown"]) player.y += 5;

    ctx.font="40px Arial";
    ctx.fillText("🧘",player.x,player.y);

    let s = safeState();
    let mental = s.mental ?? 100;
    let life = s.life ?? 3;

    // ===============================
    // SPAWN CONTROL FIXED
    // ===============================
    if(frame % 100 === 0) spawnEnemy();
    if(frame % 450 === 0) spawnGift();

    // ===============================
    // BULLETS (SAFE LOOP)
    // ===============================
    for(let i = bullets.length - 1; i >= 0; i--){

        let b = bullets[i];
        b.x += b.speed;

        ctx.fillText("⚡",b.x,b.y);

        for(let j = enemies.length - 1; j >= 0; j--){

            let e = enemies[j];

            if(Math.abs(b.x-e.x)<40 && Math.abs(b.y-e.y)<40){

                e.life--;
                bullets.splice(i,1);

                s.karma = (s.karma || 0) + 1;
                realState = s;

                if(e.life <= 0) enemies.splice(j,1);
                break;
            }
        }
    }

    // ===============================
    // ENEMIES SAFE LOOP
    // ===============================
    for(let i = enemies.length - 1; i >= 0; i--){

        let e = enemies[i];
        e.x -= e.speed;

        ctx.fillText("🚁",e.x,e.y);

        e.timer++;

        if(e.timer > 80){
            enemyBullets.push({x:e.x,y:e.y,speed:5});
            e.timer = 0;
        }

        if(Math.abs(e.x-player.x)<30){
            s.life = (s.life ?? 3) - 1;
            enemies.splice(i,1);
            continue;
        }

        if(e.x < -100) enemies.splice(i,1);
    }

    // ===============================
    // ENEMY BULLETS SAFE
    // ===============================
    for(let i = enemyBullets.length - 1; i >= 0; i--){

        let b = enemyBullets[i];
        b.x -= b.speed;

        ctx.fillText("💥",b.x,b.y);

        if(Math.abs(b.x-player.x)<30){
            s.life = (s.life ?? 3) - 1;
            enemyBullets.splice(i,1);
        }
    }

    // ===============================
    // GIFTS SAFE
    // ===============================
    for(let i = gifts.length - 1; i >= 0; i--){

        let g = gifts[i];
        g.x -= 2;

        ctx.fillText("🎁",g.x,g.y);

        if(Math.abs(g.x-player.x)<30){

            if(g.type==="life") s.life = Math.min(3,(s.life ?? 3)+1);
            if(g.type==="karma") s.karma = (s.karma ?? 0)+1;

            realState = s;
            gifts.splice(i,1);
        }
    }

    // ===============================
    // GAME OVER SAFE
    // ===============================
    if(life <= 0){
        alert("GAME OVER - SYSTEM STOP");
        location.reload();
        return;
    }

    // ===============================
    // UI UPDATE
    // ===============================
    document.getElementById("mental").innerText = mental;
    document.getElementById("social").innerText = s.social ?? 50;
    document.getElementById("karma").innerText = s.karma ?? 0;
    document.getElementById("life").innerText = life;

    frame++;
    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
