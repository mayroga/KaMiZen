<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIZEN | Tactical Life Engine</title>

<style>
body { margin:0; background:#020202; overflow:hidden; font-family:'Arial Black', sans-serif; color:#00f2ff; }
canvas { display:block; }

/* UI */
#ui {
    position:absolute; top:10px; left:10px;
    display:grid; grid-template-columns: repeat(2, 1fr);
    gap:10px; z-index:10;
}
.box {
    padding:8px 12px;
    border:2px solid #00f2ff;
    background:rgba(0,0,0,0.8);
    font-size:14px;
    font-weight:bold;
}

/* MENÚ TVID */
#tactic-menu {
    position:absolute; bottom:20px; left:50%;
    transform:translateX(-50%);
    display:flex; gap:10px;
    z-index:20;
}
.tvid-btn {
    padding:10px 15px;
    background:black;
    border:2px solid #00f2ff;
    color:#00f2ff;
    cursor:pointer;
}

/* VIDA */
.life {
    color:#ff3b3b;
}

/* CANVAS */
canvas { display:block; }
</style>
</head>

<body>

<div id="ui">
    <div class="box">ENFOQUE: <span id="mental">100</span></div>
    <div class="box">SOCIAL: <span id="social">50</span></div>
    <div class="box">KARMA: <span id="karma">0</span></div>
    <div class="box">VIDAS: <span id="life">3</span></div>
</div>

<div id="tactic-menu">
    <button class="tvid-btn" onclick="executeTVID('TDB')">TDB</button>
    <button class="tvid-btn" onclick="executeTVID('TDP')">TDP</button>
    <button class="tvid-btn" onclick="executeTVID('TDMM')">TDMM</button>
    <button class="tvid-btn" onclick="executeTVID('TDG')">TDG</button>
    <button class="tvid-btn" onclick="executeTVID('TDK')">TDK</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let state = {
    mental:100,
    social:50,
    karma:0,
    life:3,
    active:true
};

let player = {x:80,y:canvas.height/2};
let bullets = [];
let enemyBullets = [];
let enemies = [];
let gifts = [];

let frame = 0;
let keys = {};

// =========================
// INPUT
// =========================
window.addEventListener("keydown",e=>keys[e.code]=true);
window.addEventListener("keyup",e=>keys[e.code]=false);
window.onclick = ()=>executeTVID("TDB");

// =========================
// PLAYER SHOOT
// =========================
function executeTVID(type){

    bullets.push({
        x:player.x+30,
        y:player.y,
        speed:12,
        word:type,
        size:20
    });
}

// =========================
// ENEMY SHOOT
// =========================
function enemyShoot(e){
    enemyBullets.push({
        x:e.x,
        y:e.y,
        speed:6,
        size:18
    });
}

// =========================
// SPAWN ENEMIES
// =========================
function spawnEnemy(){
    enemies.push({
        x:canvas.width+100,
        y:Math.random()*canvas.height,
        speed:2 + Math.random()*2,
        size:70,
        life:3,
        shootTimer:0
    });
}

// =========================
// GIFTS / REWARDS
// =========================
function spawnGift(){
    gifts.push({
        x:canvas.width+100,
        y:Math.random()*canvas.height,
        type: Math.random()>0.5 ? "life" : "karma",
        size:50
    });
}

// =========================
// LOOP
// =========================
function loop(){

    ctx.fillStyle="rgba(0,0,0,0.35)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // MOVIMIENTO
    if(keys["ArrowUp"]) player.y -= 6;
    if(keys["ArrowDown"]) player.y += 6;

    // PLAYER (más visible)
    ctx.font="50px Arial";
    ctx.fillText("🧘",player.x,player.y);

    // =====================
    // PLAYER BULLETS
    // =====================
    bullets.forEach((b,i)=>{
        b.x += b.speed;

        ctx.font="20px Arial";
        ctx.fillStyle="#00f2ff";
        ctx.fillText("⚡",b.x,b.y);

        enemies.forEach((e,j)=>{
            if(Math.abs(b.x-e.x)<40 && Math.abs(b.y-e.y)<40){
                e.life--;
                bullets.splice(i,1);
                state.karma++;
                if(e.life<=0) enemies.splice(j,1);
            }
        });
    });

    // =====================
    // ENEMIES (IA + SHOOT)
    // =====================
    enemies.forEach((e,i)=>{

        e.x -= e.speed;

        ctx.font="70px Arial";
        ctx.fillText("🚁",e.x,e.y);

        // ENEMY SHOOT
        e.shootTimer++;
        if(e.shootTimer > 80){
            enemyShoot(e);
            e.shootTimer = 0;
        }

        // COLLISION PLAYER
        if(Math.abs(e.x-player.x)<40 && Math.abs(e.y-player.y)<40){
            state.life--;
            enemies.splice(i,1);
        }

        if(e.x < -100) enemies.splice(i,1);
    });

    // =====================
    // ENEMY BULLETS
    // =====================
    enemyBullets.forEach((b,i)=>{
        b.x -= b.speed;

        ctx.font="18px Arial";
        ctx.fillStyle="#ff3b3b";
        ctx.fillText("💥",b.x,b.y);

        if(Math.abs(b.x-player.x)<30){
            state.life--;
            enemyBullets.splice(i,1);
        }
    });

    // =====================
    // GIFTS
    // =====================
    gifts.forEach((g,i)=>{
        g.x -= 2;

        ctx.font="45px Arial";
        ctx.fillText("🎁",g.x,g.y);

        if(Math.abs(g.x-player.x)<40){

            if(g.type==="life" && state.life<3) state.life++;
            if(g.type==="karma") state.karma++;

            gifts.splice(i,1);
        }
    });

    // =====================
    // SPAWN CONTROL
    // =====================
    if(frame % 120 === 0) spawnEnemy();
    if(frame % 500 === 0) spawnGift();

    // =====================
    // GAME OVER
    // =====================
    if(state.life <= 0){
        alert("GAME OVER - SISTEMA COLAPSADO");
        location.reload();
    }

    // =====================
    // UI
    // =====================
    document.getElementById("mental").innerText = state.mental;
    document.getElementById("social").innerText = state.social;
    document.getElementById("karma").innerText = state.karma;
    document.getElementById("life").innerText = state.life;

    frame++;
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
